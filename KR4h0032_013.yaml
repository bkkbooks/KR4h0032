body:
  text: 宋文選巻十三曽子固文唐論成康殁而民生不見先王之治日入於亂以至於秦盡除前聖數千載之法天下既攻秦而亡之以歸於漢漢之為漢更二十四君東西并有天下垂四百年然大抵多用秦法其改更秦事亦多附已之意非放先王之法而有天下之志也有天下之志者文帝而已然而天下之材不足故仁聞雖美矣而當世之法度亦不能放於三代漢之亡而彊者遂分天下之地晉與隋雖能合天下於一然而合之未久而已亡其為不足議也代隋者唐更十八君垂三百年而其治莫盛於太宗太宗之為君也詘已從諫仁心愛人可謂有天下之志以租庸任民以府衛任兵以職事任官以材能任職以興義任俗以尊夲任衆賦役有定制兵農有定業官無虛名職無廢事人習於善行離於末作使之操於上者要而不煩取於下者寡而易供民有農之實而兵之備存有兵之名而農之利在事之分有歸而禄之岀不浮材之品不遺而治之體相承其亷耻日以篤其田野日以闢以其法脩則安且治廢則危且亂可謂有天下之材行之數嵗粟米之賤斗至數錢居者有餘蓄行者有餘貲人人自厚幾於刑措可謂有治天下之效夫有天下之志有天下之材又有治天下之效然而不得與先王並者法度之行擬之先王未備也禮樂之具田疇之制庠序之教擬之先王未備也躬親行陣之間戰必勝攻必克天下莫不以為武而非先王之所尚也四夷萬國古所未及以政者莫不服從天下莫不以為盛而非先王之所務也太宗之為政於天下者得失如此由唐虞之治五百餘年而有湯之治由湯之治五百餘年而有文武之治由文武之治千有餘年而始有太宗之為君有天下之志有天下之材又有治天下之效然而又以其未備也不得與先王並而稱極治之時是則人生於文武之前者率五百餘年而一遇治世生於文武之後者千有餘年而未過極治之時也非獨民之生於是時者之不幸也士之生於文武之前者如舜禹之於唐八元八凱之於舜伊尹之於湯太公之於文武率五百餘年而一遇生於文武之後者千有餘年雖孔子之聖孟軻之賢而不遇雖太宗之為君而未可以必得志於其時也是亦士民之生於是時者之不幸也故述其是非得失之迹非獨為人君者可以考焉士之有志於道而欲仕於上者可以鍳矣國體辨或曰事之弊作而更之歟安而弗顧歟曰作而更之也人之不善按而誅之歟安而弗顧歟曰按而誅之也然而作而更弊世以為紛紛也按而誅不善世以為刻訐也何謂歟曰有以也事之體有小大罪之情有深淺彼以繫者大而罪也深任忠義者之視之也則皦然反之蹇然辨之作而更之按而誅之恐未果也何則為國家天下之計然也人見忠義者之然也不識其心而希之也曰事皆然也我顧不能然歟當其坐於府立於庭而議之於四方使彼其繫者小而罪也淺而皦然反之蹇然辨之作而更之按而誅之恐不果也甚者搆而侈之也為國家天下之計乎則未然也於是讙然厭其紛紛也病其刻訐也豈惟厭且病歟當世誠有任忠義者為其所當然則上必惡彼紛紛者之所行刻訐之所存而皆讓焉誠有任忠義者為其所當然則不之見信幸而信則奸與庸者得扳厭且病之事而間之矣嗟夫事有似之而不然者此是非之所以亂虛實之所以昧不可惡也歟惡則如何亦察焉其請而更者利害也大繫國家天下也循之有理也則固忠義者之事其請而誅者奸佞也大繫於國家天下也循之有理也則固忠義之事也反是也則末也然則弊之細也惡之淺也安而弗顧歟曰考其弊而更之得其大者焉審其罪而誅之當其深者焉則細且淺者熄焉覩細者淺者之可憂抑其不熄則徐徐而治可也豈安而弗顧也歟或曰彼雖紛紛也刻訐也然其於事也情歟曰或情不情焉雜也然則凡彼之所以美也有讓而不情情而不以其地則罪始讓者歟否則彼之紛紛也刻訐也或情或不情時也罪忠義亦可歟問堯或曰堯之聖不逮舜堯不能用九官誅四罪而舜能焉曰舜之所以聖由堯之聖舜之用與誅宜也曰然則堯之時獨不可用與誅乎曰將以遺舜也其以遺舜奈何堯信舜之聖乆矣將舉而禪焉且以信於衆因四嶽之舉遂試之其試由是夫起聖人不苟以名服天下必信其德於衆德莫大於用賢誅惡於是遂授以位焉而天下率信用與誅葢假之舜云耳曰然則堯之聖將蔽賢縱惡乎曰否用與誅至於舜之時可也故堯遲之云耳以成於舜也則其德在堯者多矣曰然則堯其私於舜乎非私舜也私其所以為天下也曰左氏傳所謂不能者何也曰吾所論聖人之說彼左氏何與焉論習治亂之夲在君之好惡好惡在所習少習也正其長也必賢少習也不正其長難與共為治矣不幸而然則將磨之孰能磨之擇人焉朝夕相與俱出入言動相綴接為是則可磨之也主然而是者助之主然而違者替之不釋則極論之勉焉除其蔽歟而接之以道不見邪者而變焉其志素定矣然後可與共為治其為大體不亦艱且勤歟然於習之也有漸矣古之所以為治者豈異焉此衆官不有任也豈必人之不材也朝夕未嘗相與居也岀入言動未嘗相綴接也是焉而不能助違焉而不能替不釋而莫之極論也其蔽欲日益固其為道日益拙所見寺人女婦邪者也其志素定矣未也其可共為治乎其為大體不亦怠且忽歟噫宰相雖尊也然其見也有間矣置斯職也不愼歟使職此者不盡也而寺人婦女得其心其誰曰可也噫左右侍從之官其非所謂常伯侍郎給事諫議司諌正志歟邪正辨正者一邪者一烏知正者之為正邪者之為邪歟曰考其實焉爾言者曰某正人也必考焉其言與行果正也猶曰無乃其迹然歟必也夲其情情果正也斯正人也曰某邪人也必考焉其言與行果邪也亦曰無乃其迹然歟必也夲其情情果邪也斯邪人也必本其情者為迹之未可以必信也迹之未可以信者有無之有似之有構之者也以正人焉俟之勿疑之也有間之必辨焉不隂受之也以邪人焉處之勿邇之也有助之必辨焉不隂受之也審邪正之術循是也不失矣抑未盡於是也孰謂未盡任與責之之謂也正者曰天下未治也以天下之事考之見其未治焉安得不任之以救其未治也邪者曰已治矣則思曰我之天下未治也正者曰用是策可以治以先王之道人之情考之見可以治焉安得不用其策邪邪者曰彼策也不可用則思曰我考之可用也必也待其終而質其效不戾於其始也有賞戾則有咎未至於其終而質其效賞與咎無所委焉不茍然而易也任與責之之術如是也故正者得盡其道邪者不得其間於㝠㝠之間於計也素定於信用也不輕以蔽於號令也一於賞罰也明於治也幾矣考之其實爾此之謂也不知正者之為正邪者之為邪豈異焉不此之尚而已言者曰某正人也某邪人也自亦曰某正人也某邪人也於其言與行則未之考也茍考焉則亦其迹而已矣或無之或似與構之者也於其情則未之考也以正人俟之或疑焉有間之者則隂受之不之辨也以邪人處之或邇焉有助之者則隂受之不之辨也正者曰天下未治也邪者曰已治也邪者勝正者十常八九以天下之事考之耶則未嘗也任正者之策邪者曰可置則必置之以先王之道人之情考之待其終而質其效正其賞與咎耶則未嘗也其於是非用舍茍焉而已矣夫然故正者不得盡其道邪者得間之於冥冥之間於計無必定也於信用輕以蔽也於號令也二於賞罰也不明於治也疏矣正與邪兩尊焉一日而有敗烏有職其責者歟或曰大賢大佞之不可以考其實也曰子之言不可以考其實者不以大賢之謂賢大佞之為佞或無其迹歟吾固言之也無其迹則孰由而知之歟必也夲其情之謂也夲其情是亦考其實也豈不可歟知不循其迹又不夲其情而欲知其賢與佞顧非不可歟然則子之言者惡其迹之難知也吾云爾者以其情而知之也其意易者鮮矣説勢周之初天下列為諸侯而君者以千數力小易使也勢便易治也此所以不惟承號令奉職貢而已固實有以翼戴天子也及其衰也大國兼數千里而王令之不能誅之不能加之并為六國合為秦而周亡矣非封建罪也地過王制也漢興襲其衰制尋亦大亂秦人壊列國而郡縣之其勢誠小而易使也尺兵不得制斗粟不得專眂徙置守宰若奕碁然爾勢甚便而治豈得行也上之與吏吏之與民不異於燕趙之相觀一有變則翻而從冦爾而能有以翼戴天子乎故一夫唱叛而秦滅矣非郡縣罪也守宰亡具甚耳今病封建者必曰用秦法病郡縣者必曰用周制皆不得其理也且從而更其事以為天下可得更乎否也天下之存亡視其大倫大法之治亂爾其次惟其所制制之使力小而易使勢便而易治皆善也地過王制埶奪於下皆害也借使韓魏燕趙列為百里之國而侯雖至今存可也秦之郡縣勢足以自治力足以自衛雖以萬世無患可也天下之勢豈不誠易知哉後世矯前之敝法寢藩鎮權功成求遂矣然而尚未反守宰之分職伸州縣之幹翼豈計之善也萬一水旱疾疫其或有覬倖之人岀者州縣其胡以備之徐樂山濤之論可不念耶誠念之不難擇人而任之分勢而使之如斯而已矣說用物有根而殖柯葉而茂芽若穗而實翼而天飛足而陸走啄而鳴息而食嚙者其形類多矣非有主於虛空以蕃而息之者歟吾觀其用亦宻矣彼使之水而濡火而焚雷而動風霆而鳴雪霜而悴雨露而滋碩則世得而知之矣若其裁之為形散之為聲充之為氣始終之為死生則非水也火也雷也風霆也雪霜也雨露也所能使為之也世固不可測其所以為也然而萬物相得以為生是則其用非宻耶今夫羣而居縫而衣燧而食築土石構竹木而廬者其嗜欲衆矣非有制而一之者則其争滋不息吾觀其用也宻矣彼立之君臣父子夫婦兄弟之序為之衣食器用之物節之以儀通之以聲習之以言束縳之以刑則世皆得而知之矣若其擾之使相親和之使相悦厚之使相讓以不争結之使樂岀其死而不顧其私遷之使去於利而就於誼則非序也物也儀也聲也氣也言也形也所能使為之也世固不測其所以為也然而萬民相得以治是則其用亦非宻耶吾有以知之矣生而死萬物者隂與陽也運於内而莫顯於外不可得而窮其妙也世之以水火雷風雪霜雨露而求之者妄也親而善萬人者仁與義也興於上而隂被於下馴於其心而不可强通於其耳目不可得而識其微也世之侈於儀繁於聲音執於噐據於文字以力驅而法縛者之求之也愈妄易曰隂陽不測之謂神又曰顯諸仁藏諸用善播萬物善教萬民者為之也說言上之收羣言其務當而已誠使貴且信者其言非必不可以聼也賤且疎者其言是則必可舍乎否也蘄為有補於治而已夫然則豈惟上之得失可質焉天下之邪正舉白矣昔舜之逹四聰明四目也故元凱在下不能抑也四凶在上不能葢也其治由此而已昧者反此喜是其所用不廣聼於其所忽雜然當否莫有主也豈惟上之失德不聞焉天下之隂狡者舉進矣秦之敝以斯高漢以莽操晉以荀賈唐以牛李裴盧其大較然已可不懲歟或曰不已察耶曰䋲其大慝行其小過誅其實施其文何察焉噫吾有為而言之也使貴且信者皆得其人兹說其不可以已耶說非異人不能相持以生於是聖人者起紹天開治治者罔不云道德仁義禮智六逹而不悖然後人乃克羣遊族處生養舒愉歴選列辟無有改此者也獨浮屠崛起西陲荒忽梟亂之地假漢魏之衰世基借跡文詭辯奮詭行至晉梁破正擅邪詖行中國有卑世主輕海内之實盛從詭譎嵬𤨏恣睢之邪情馳騖祓祥傾盪怪神之邪說離君臣叛父子捐耒耜桑柘之務髠而緇不儷不嗣辟而無用意者在削滅典刑剗學刮語寢禮萌樂塗民視聼遂将除唐虞汨沉三代杜塞仲尼之訓檢自賢其滛妄然使天下混然不知是非治亂之所存為言動居處皆變諸異端緬惟在昔尊禮義而尚闕疇圯廢而克終故聖明者稱唐虞暴亂者蹈幽厲况欲盡汎掃人之所以生息之道漂蕩聖賢數千載功業專遂已之私而可以行之哉雖宿儒碩生䋲其僻邪乘剌勒懇於策書然世主莫之寤其波流汗漫無其救止其徒相與唱而大之習為譸張幻惑下旤降休若探諸篋與百姓交於道而接於市悉天下之財什伍而奉焉其廬益侈其衆益蕃其辨益枝葉耗費無窮而怪亂無極耗矣衰哉孰抑而正之與或曰斯疾其迹庶矣盍䆒其源其源情性奭然與孔子異意凡為之者不愛官尊能賢夫維印組為務遂遂然相軋也曰多明先王之道内足以不惑外足以行事情性有不平歟背而之他将失其平尚何有於孔子之意官也以行吾道能也以治不能或争而軋之者自其戾先王之道而教義不行也尊教興義則上讓而下競疇軋之乎謀末而遺夲以售其辭斯害也已浮圗利心無足而假無欲也行偽儉穢而彊高言淡泊也惡在其為賢哉則又以為愚者設之故鬼神之相司察冥報陰謫灾福相勝相摩之説以震恐於其心覬其感懼而創艾是又惑也其以冥報隂謫之可畏孰與畏刑而慕賞哉謇謇者陳禮義損益灼然著乎其前當世之法生殺岀入升黜成敗焯乎廹於其心而猶不知省而避也奚暇顧未至之祓祥哉若晉魏梁隋之間蹈道者相勸而抵觸者衰止歟否也則浮圗之說無益已可知矣今者虞庠夏校之制未備而塔廟叢於海㝢縁南畆操機杼之民寡而斷髮胡服之𨽻肩相摩踵相交也綴學立制補禮改樂之道未極而蠻貊之書眩中國者驪駕駢駟不足載䆳宇高楝不足容也聲明文物之具未完而洪鐘壘鼓之聲鏗鏘於閭閻也崇奉之侈古之未極者今復盡行之矣民父子糲梁之食褐衣之襲舉捐之矣是以在下不免乎有凍餓之民操觚囊而為溝中瘠也為今之策先民所謂復其人廬其居明先王之道以道之岀於中計斥禱祠之末制厭勝之嵬學自上先焉埸廟勿新也誦試勿數也冠而𨽻籍五百髠其一人為老子學槌提仁義截絶禮法亂人倫耗農桑之務其源不可不深為制倣此頗損其數亦創艾之一端也王者正德以應天純仁以得民羣天下之智愚而告之以徃古教之以至順粲為寰宇之間形氣之内聖人之典章存焉可以外運造化内霑毫芒寢之以純嘏矣惡用明夷之治荒唐之學哉治之難以天下而行唐虞三代之道不唐虞三代如者無有也然而治之難也何故治世非無小人也其信正人已固其相参非庸者也雖有小人弗病也唐之時四罪立唐之朝周之時三監在周之廷唐堯周公大聖人也其辨之也不疑其知之也果彼雖幸而至乎大臣諸侯之間矣拙矣於正人焉無病也漢元之初蕭望之相漢劉向周堪張猛為之腹心東漢之末李固陳蕃杜喬相漢李膺范滂之徒布據禁寺光大矣天下仰而待治也去斯時則已矣使充其所施功德萬計夫孝元桓靈帝主也其相參者史髙稚圭韋𤣥成胡廣趙戒而下庸也而邪者囂其間其於辨衆賢之不明而用之也不果雖進而立於公卿之内儇然而危矣可得天下國家之安乎嗚呼治之難也以此觀天下者不觀小人正人貴賤升黜觀其用否如何耳則治亂審矣讀賈誼傳余讀三代兩漢之書至於竒辭奥㫖光輝淵澄洞達心腑如登高山以望長江之活流駭其氣之壮也故詭辭誘之而不能動滛辭廹之而不能顧考是與非若别白黑而不能惑浩浩洋洋波徹際涯雖千萬年之遠而若㑹於吾心葢自喜其資之者深而得之者多也既而遇事輙發足以自壮其氣覺其辭源源来而不離剔吾粗以迎其眞植吾夲以質其華其高足以凌青雲抗太虛而不入於詭誕其下足以盡山川草木之理形狀變化之情而不入於卑汙及其事多而憂深慮逺之激扞有觸於吾心而干於吾氣故其言多而岀於無聊讀之有憂愁不忍之態然其氣要以為無傷也於是又自喜其無入而不宜矣使予位之朝廷視天子所以措置指畫號令天下之意作之訓辭鏤之金石以傳太平無窮之業葢未必不有可觀者遇其所感寓其所志則自以為皆無傷也余悲賈生之不遇觀其為文經畫天下之便宜足以見其康天下之心觀其過湘為賦以弔屈原足以見其憫時憂國而有觸於其氣後之人責其不一遇而為是憂怨之言乃不知古詩之作皆古窮人之辭要之不悖於道義者皆可取也賈生少年多才見文帝極陳天下之事毅然無所阿避而絳灌之武夫相遭於朝譬之投規於矩雖彊之不合故斥去不得與聞朝廷之事以奮其中之所欲言彼其不發於一時猶可托文以攄其藴則夫賈生之志其亦可罪耶故予之窮餓足以知人之窮者亦必若此又嘗學文章而知窮人之辭自古皆然是以於賈生少進焉嗚呼使賈生卒其所施為其功業宜有可述者又豈空言以道之哉予之所以自悲者亦若此然已之知者其誰歟雖不吾知誰患耶書魏鄭公傳予觀太宗常屈已以從羣臣之議而魏鄭公之徒喜遭其時感知已之遇事之大小無不諫諍雖其忠誠所自至亦得君而然也則思唐之所以治太宗之所以稱賢主而前世之君不及者其淵源皆岀於此也能知其有此者以其書存也及觀鄭公以諫諍事付史官而太宗怒之薄其恩禮失終始之義則未嘗不反復嗟惜恨其不思而益知鄭公之賢焉夫君之使臣與臣之事君者何大公至正之道而已矣大公至正之道非滅人言以揜已過取小亮以私其君此其不可者也又有甚不可者夫以諫諍為當揜是以諫諍為非美也則後世誰復當諫諍乎况前代之君有納諫之美而後世不見則非惟失一時之公又将使後世之君謂前代無諫諍之事是啟其怠且忌矣太宗末年羣下既知此意而不言漸不知天下之得失至於遼東之敗而始恨鄭公不在世未嘗知其悔之萌芽岀於此也夫伊尹周公何如人也伊尹周公之諫切其君者其言至深而其事至廹也存之於書未嘗揜焉至今稱太甲成王為賢君而伊尹周公為良相者以其書可見也令當時削而棄之成區區之小讓則後世何所據依而諫又何以知其賢且良與桀紂幽厲始皇之亡則其臣之諫詞無見焉非其史之遺乃天下不敢言而然也則諫諍之無傳乃此數君之所以益暴其惡於後世而已矣或曰春秋之法為尊親賢者諱與此戾矣夫春秋之所諱者惡也納諫諍豈惡乎然則焚藁者非歟曰焚藁者誰歟非伊尹周公為之也近世取區區之小亮者為之耳其事又未是也何則以焚其藁為揜君之過而使後世傳之則是使後世不見藁之是非而必其過常在於君美常在於已也豈愛其君之謂歟孔光之去其藁之所言其在正衺未可知也而焚之而惑後世庸詎知非謀已之奸計乎或曰造辟而言詭辭而岀異乎此曰此非聖人之所曽言也令萬一有是理亦謂君臣之間議論之際不欲漏其言於一時之人耳豈杜其告萬世也噫以誠信待已而事其君而不欺乎萬世者鄭公也益知其賢云豈非然哉豈非然哉宋文選巻十三
