body:
  text: 宋文選卷三十二陳瑩中文五辰論揚子曰聲生于律律生于辰自子至亥所謂辰也辰配于日其數十二而謂之五辰也者不離于五行之故也以水生木以木生火由是而推之五行之所以相繼以火勝金以金勝木由是而推之五行之所以相治其相繼也道之所以行也其相治也器之所以成也道以制器生利天下之治由此而出焉故因其性而利導之者五行之所以不汨五行不汨則天道之所以不悖不汨不悖何憂乎不治撫于五辰所以為治也蓋安民之政始于知人知人之術賴于九德合衆德而受之敷衆德而施之百工于是乎無所不治庶績于是乎無所不凝庶績之凝則五辰之不失其所運可知也苟欲不失其所運非撫之也而可乎順其相生之叙而使之相繼制其相勝之理而使之相治興事造業而人力無不至者焉則所制以為材者可勝用哉若然者臯陶之所謂撫也然撫于五辰者必至于百工之既時則不患乎庶績之不凝臯陶言知人安民之道至于撫于五辰則已矣故繼之以庶績其凝謂之凝者以明庶事至此而成耳水火金木土榖謂之六府六府惟修則材用之所自出也五行相制而不沴則物材有繼而無絶材之弗絶則事之作也何往而不成乎哉自其成而言之故謂之凝也堯命羲和以定四時成嵗而繼之以庶績咸熙謂之熙者以明如事而作之焉耳帝之出也萬物作焉帝之入也萬物復焉物之方作則聖人之治政事者庶績于是乎熙矣物之既復則聖人之治政事者庶績于是乎凝矣熙言其作譬之于時則春是也凝言其成譬之于時則秋是也其作焉如春非謂先時而起成焉如秋非謂後時而縮聖人之所以法天者如是而已周之禮樂庶事備論周自后稷而下艱難積纍非止一人前後相望非止一日而太平之業始定于成王之時君臣上下同德相濟逺邇內外和洽如一而禮樂遂逹于天下夫其收功享治所以終至于如是之隆者乃始于庶事之備而已矣蓋其有為之迹散乎萬物之上而物之為數不可窮也則天下之事烏能以一二而計哉然聖人以方寸之地而酬酢無窮之變來則應之求則與之各足其分各厭其欲雖鬼神之幽蠻夷之逺草木之微鳥獸之賤而無有不治者焉其治至此則所謂禮樂者乃飾之之具而已爾治之于始飾之于終有為之君孰不若是而觀其禮樂以考當時之事則厯古以來未有如周之備也且自成周而上循環損益所以相繼民所巳厭于是變之民所已倦于是革之稼穡興矣然後佃漁不可以為養宫室成矣然後穴居不可以為安故伏犧之法至舜而可謂之陋夏商之文至周而可謂之野然上世之所行自足以宜于一時則雖有未備而不纍其有為之功自周而觀之則昔所未有者或至于今日而益焉昔所既有者或至于今日而損焉苟在所損苟在所益則謂之未備也不亦可乎周公之制作無意于苟異而庶事之獨備者其時然也是以設官分職數倍于商而不以為衆巡狩之時十有二年而不以為久蓋其務衆矣則設官而不期于寡其法審矣則修法而不嫌于踈非以夫庶事之已備故耶是以五禮六樂具于典冊前此而觀之則有所未備後此而觀之則不能過也至于春秋之時諸侯放恣僣亂禮樂然後饗賔而及于肆夏用舞而及于八佾三歸而備于管仲雍徹而用于三家當是時也孔子傷之聞韶而不知肉味者有意于樂也不去告朔之餼羊者有意于禮也意之所加而志則不就是以禮樂陵遲至秦而遂壞彼秦之天下非能以仁義治之庶事之不備而遽及于禮樂是徒見周公之不難而不知紹周之難也與鄒至文書近見魏季修與正彥書云大凡修學當思要處泛泛多讀卒無所濟亦當念親旋為舉業至文有意于此不三年當自見效爾欲吾友留意于此也正彥聞此益自奮勵以思要念親為務此朋友忠告之善也然今應舉所先唯在答義答義工夫或苟或敬志于速售朝習而暮成者苟也敬其事者趣時立本一以其道雖經有成說不敢少違而孔孟說經之要載于論語孟子者亦學法之所不禁也遵而用之亦何害于進取哉且以詩書言之孔子曰多識于鳥獸草木之名夫鳥獸草木之名必略觀爾雅注疏然後可識非妙說𤣥談之所能辨棄粗取妙以速多識之訓則其于詩也四可二事亦將蔑智而用鑿矣由述舊之明師不鑿之智則其于詩也寧至為髙叟之固乎固也者不化之謂志在執詞不過而吝則于仲尼可怨之辭大舜自怨之志胥失之矣其所害者豈特詩人之志而已哉執北山之辭倒尊卑之分微孟子告之則咸丘䝉于北面之說何自而化乎辭礙而不化志疑而未治卒能問焉以去志之害此咸丘䝉得師之利也然則以文以辭而蔽于義者皆有害焉蓋相感以情則有利無害雜之以僞則害必生矣所惡于鑿者為其僞也僞而不信則其感人也滕口而已情遷心化無所留係唯孔孟說經之從則其于詩也何習而不利乎非特詩為然也孟子曰盡信書則不如無書吾于武成取二三策而已矣滕口之學誣孟子信取之辭遂至于糟粕六經不取不信下喬入幽信彼無徴之誕以為髙妙其不信在此其信在彼不曰以辭之害歟離析一體以為多學則欲驅人而盡信其說率情而違道離此而適彼有信焉有不信焉其為以辭之害一而已矣揚子曰書心畫也性與知覺合而名心心則非物畫而在紙者物而已矣六經之道心物混一則象亦心也心自心物自物則象豈心乎心物合而誠明一誠明一則天地良知不見乎小大之别此橫渠先生之說而學者之所宜信也信乎否乎繫乎其人中立先生銘游執中先生之墓曰物我異觀天人殊歸而髙明中庸之學析為二致士欲𨽻學以考疑則無其師資以輔仁則無其友而枝辭蔓說亂經甚矣某得此文而讀之厯年已多內訟改過實遇師于此焉季修所謂大凡修學當思要處而欲祈可見之效某竊謂辭不亂經則其要明矣三年至榖豈非可見之效歟念親之本莫要于此因正彥持書見示喜季修能盡忠于朋友欲以此辭輔益其志未知是否欲俟相見面講而羈囚待盡恐無㑹晤之期書不盡意若非其人不可示也衰危不復自吝時為親知深慮耳四明尊堯集序臣聞先王所謂道德者性命之理而已矣此王安石之精義也有三經焉有字說焉有日録焉皆性命之理也蔡卞蹇序辰鄧洵武等用心純一主行其教其所謂大有為者性命之理而已矣其所謂繼𫐠者亦性命之理而已矣其所謂一道德者亦以性命之理而一之也其所謂同風俗者亦以性命之理而同之也不習性命之理者謂之曲學不隨性命之理者謂之流俗黜流俗則竄其人怒曲學則火其書故自卞等用事以來其所謂國是者皆出于性命之理不可得而動搖也臣昨在諫省所上章疏嘗以安石比于伊尹伊尹聖人也而臣乃以安石比之者臣于時猶蔽于國是故也又臣所上章疏謂安石為神考之師神考堯舜也任用安石止于九年而已矣初用後棄何嘗終以安石為是乎臣以安石為神考之師者臣于此時猶蔽于國是故也臣昨者以言取禍幾至誅殛賴陛下委曲保全賜臣餘命臣感激流涕念念循省得改過之義焉蓋臣之所當改者亦性命之理而已矣孔子曰乾道變化各正性命又曰地道無成而代有終也性命之理其有以易此乎臣伏見治平中安石唱道之言曰道隆而德駿者雖天子北面而問焉而與之迭為賔主自安石唱此說以來幾五十年矣國是之淵源蓋兆于此臣聞天尊地卑乾坤定矣定則不可改也天子南面公侯北面其可改乎今安石性命之理乃有天子北面之禮焉夫天子北面以事其臣則人臣何面以當其禮臣于性命之理安得而不疑也傳曰君之所以不臣于其臣者二當其為祭主則弗臣也當其為師則弗臣也師無北面則是弗臣之禮也豈有天子而可使北面者乎漢顯宗之于桓榮所以事之者可謂至矣而所施之禮亦不過榮坐東嚮而已矣若乃以君而朝臣以父而拜子則是齊東野人之語龎勛無父之教以此為教豈不亂名分乎亂名分之教豈可學乎臣既誤學其教豈可以不悔乎易曰不逺復無祗悔元吉臣于既往之誤豈敢祗悔而不改乎臣昔以安石為神考之師是臣重安石而輕神考也臣昔以安石比伊尹之聖是臣戴安石而誑陛下也臣為陛下耳目之官而妄進輕誑之言臣之罪惡如丘山矣臣若不洗心自新痛絶王氏則何以明臣改過之心乎臣之所以著尊堯集者為欲明臣改過之心而已矣莊周曰明此以南嚮堯之為君也明此以北面舜之為臣也莊周之道虛誕無實而不可以治天下然于名分之際不敢不嚴也飛蜂走蟻猶識上下豈可以人臣自聖而至于缺名分哉孔子曰名不正則言不順言不順則事不成安石北面之言可以謂之順乎崇此不順之教則所述熙豐之事何日而成乎廢大法而立私門啓攘奪而生後患可謂寒心孰大于此臣請序而言之昔紹聖史官蔡卞專用王安石日録以修神考實録薄神考而厚安石尊私史而壓宗廟臣居諫省請改裕陵實録及在都司進日録辨當是之時臣于日録未見全帙知其為私史而已未知其為增史也自去闕以來尋訪此書偶得全編遂獲周覽竄身雖逺不廢討論路過長沙曾留轉藏之語待盡合浦又著垂絶之文考詆誣譏玩之言見蔡卞僞增之意尚謂安石趣録皆可憑據卞之所增乃有誣僞當是之時臣于日録考之未熟知其為增史而已未知其為悖史也蓋由臣智識昏鈍覺悟不早追思諌省奏章乃至合浦舊述語乖正理隨俗妄談既輕神考又誑陛下若他時後日陛下以此怒臣臣將何以自救敢不悔乎日録云卿朕師臣也乃安石矯造之言又云督責朕有為豈神考親發之訓既託訓以自譽又託訓以輕君輕君則訕侮譏薄欲棄名分自譽則驕蹇陵犯前無祖宗其語實繁聊具一二其日録云朕自覺材極凡庸恐不足以有為恐古之賢君皆須天資英邁此非託訓以輕君乎又云朕頑鄙初未有知自卿在翰林始得聞道德之說心稍開悟此非託訓以輕君乎又云卿初任講筵勸朕以講學為先朕意未知以此為急此非託訓以輕君乎又云卿莫只是為在位久度朕終不足與有為故欲去此非託訓以輕君乎又云所以為君臣者形而已矣形故不足纍卿此非託訓以輕君乎訕侮輕薄欲棄名分可以略見于此矣日録又云王安石造理深能見得衆人所不能見此託詞以自譽也又云如安石不是智識髙逺精密不易抵當流俗天生明俊之才可以庇覆生民此託訓以自譽也又云卿無利欲無適莫非獨朕知卿人亦盡知若餘人則安可保此託訓以自譽也又云卿才德過于人望朕知卿了天下事有餘此託訓以自譽也又云朕用卿豈與祖宗時宰相一般此託訓以自譽也驕蹇陵犯前無祖宗可以略見于此矣聖上以奉先為孝羣臣以承上為忠明知其誣誰敢核實則可以箝塞衆口可以熒惑聖聽誑脅之術莫工于此始則留身乞批以脅制于同列終則著書矯訓以傳述于後人誣脅臣鄰何足縷道上干君父可不辨乎自到闕以來至為參政之始不録經筵之欵對但書七對之逰辭載神考降問之咨詞無一問仰及于三代言神考但慕魏葛謂厥身不異臯伊仍于供職之初辰首論理財之不可恐宣利而壞俗陳孟子之耻言凡他人極論之辭掠為已說彼所獻管商之術歸過先猷書神考之謙辭則曰以朕比文王豈不為天下後世笑論太祖之征伐則曰江南李氏何嘗理曲恣揮悖躁之筆盡假烈考之詞矯誣上天孰甚于此祖宗之威靈如在聖主之繼述日新若不辨托訓之誣何以解在天之怒而况託訓之外肆詆尤多神考小心慎微彼則曰好察細務神考畏天省事彼則曰畏慎過當神考欲除苛細之法彼則曰元首叢脞神考欲寬疑似之獄彼則曰陛下含糊神考體貌勳賢彼則曰含容奸慝神考嘉納忠直彼則曰不懲小人又謂奸罔之徒陛下能誅殺否比忠良于元濟責神考為憲宗謂不可以罷兵當必殺而後已神考守祖宗不殺之戒以天地好生為心厭棄其言眷待寖薄先逐鄧綰次出安石至熙寧之末而安石前日之所怒者復見收矣至于元豐之末司馬光等前日之所言者復見思矣卞等不遵神考末命但務圖已之私以專紹安石為心以必行誅殺為事請于哲宗而哲宗不許請于陛下而陛下拒之人心歸仁天助有德遂使奸謀內潰逆黨自彰卞既不敢居金陵人亦不復聖安石悔從王氏豈獨臣哉朝廷縉紳協心享上庠序義理士所同然科舉藝能孰肯遽陳其所蘊有用之士亦將先忍而後為變王氏誣君之習合春秋尊元之義濟濟多士何患無人又况安石所施其事既往若不自述于文字後人安知其用心著為此書天使之也然安石著書之意豈是便欲施行卞所安排非無次序自謂舉無遺策何乃急于流傳宣示逺近不太速乎然則流傳之速天使之也天之右序我宋而不助王氏亦可知也如臣昔者妄推安石謂之聖人如視蟻垤以為泰山如指蹄涔以為大海易言無責鬼得而誅駟不可追齰舌何補聖人人倫之至也傲上亂倫豈聖人乎聖人百世之師也教人誣僞豈聖人乎孔子集大成者也尚以不居為謙光武有天下者也猶下禁言之詔豈可身處北面人臣之位而甘受子雱驕僭之名乎雱為安石畫像贊曰列聖垂教參差不齊集厥大成光乎仲尼蔡卞書之大刻于石與雱所撰諸書經義並行于世臣昔以答義應舉析字談經方務趣時何敢立異改過自新請自今始于是取安石日録編類其語得六十五假釐為八門一曰聖訓二曰論道三曰獻替四曰理財五曰邊機六曰論兵七曰處已八曰寓言事為之論又于逐門總而論之凡為論四十有九篇合二門為一卷并序一卷共為五卷臣以憂患之餘精力困耗披文索義十不得一加以海隅衰陋人無賜書神考御集無由恭録又日録矯誣與御批日厯時政記抵牾同異無文可考欲校不得但專據私書略分真僞雖不能盡究底蘊亦可以窺其大概矣凡臣之所論以紹述宗廟為本以辨明聖訓為先蓋所述在彼則宗廟不尊誣語未判則真訓不白何以光揚神考有為之心何以將順陛下述事之志凡今之士學古入官身雖未試于朝廷心亦不忘于畎畝戴天履地寧忍同誣日拙心勞徒唱爾僞犯古今之公議極典籍之所非隂奉窽言顯違格訓安石欲置四輔神考以為不可神考欲建都省安石以為不然今則四輔成矣都省毁矣道路為之流涕聖主能不痛心人皆獨罪于一京安知謀發于蔡卞至于宿衛之法亦敢更張變亂舊規創立三衛用私史包藏之計據新經穿鑿之文以畏憚不改為非以果斷變易為是按書定計以使其兄當面贊成退而竊喜京且由之而不悟他人豈測其用心事過而窺蹤跡乃露齎咨痛恨雖悔何追在私家何足偹論于國事豈冝如此謂塘濼未必有補可以决水為田謂河北要省民徭可以减州為縣至于言江南利害則曰州縣可析論民兵將領則曰奬拔豪傑四海本是一家何為分彼分此大法無過宿衛安得率爾動搖棄舊圖新厥意安在昔元祐更張之始方安石身歿之初衆皆獨罪于惠卿或以安石為朴野優加贈典欲鎮浮薄司馬光簡尺具存吕惠卿責詞猶在深懲在列曲恕元台凡同時議論之臣無一人指黜安石往往言章疑似或干裕陵致卞以窺伺為心包藏而待潤色誣史增行忠賢凡慍懟曾布之言與怒罵惠卿之語例皆刋削意在牢籠欲使共述私書將以濟其大欲布等在其術內卞計無一不行良由議贈之初不稽其敝若使早崇名分何至橫流司馬光誤國之罪可勝言哉臣聞熙寧之初論安石之罪而中其肺肝之隱者吕誨一人而已矣熙寧之末論安石之罪而中其肺肝之隱者吕惠卿一人而已矣吕誨之言曰大奸似忠大詐似信外視朴野中藏巧詐驕蹇傲上隂賊害物吕惠卿之言曰安石書棄素學而隆尚縱橫之末數以為竒術以至譖訴脅持蔽賢黨奸移怒行狠方命矯令罔上要君凡此數惡莫不備具雖古之失志倒行而逆施者殆不如此平日聞望一旦掃地不知安石何苦而為此也謀身如此以之謀國實無逺圖而陛下既以不可少而安之臣固未易言也又曰陛下平日以何如人遇安石安石平日以何等人自任不意窘急乃至于此又曰君臣防嫌豈可為安石而廢哉又曰臣之所論皆中其肺肝之隱臣某竊謂元祐臣僚于吕誨之言則譽之太過于惠卿之言則毁之太過此二臣者趣向雖異至于論安石之罪獻忠于神考則其言一也豈可專譽吕誨而偏毁吕惠卿乎偏毁惠卿此王氏所以益熾也元祐之偏可不鑒哉臣竊以天下譬如一舟舟平則安舟偏則危臣之以言取禍初緣此語然臣自視此語猶野人之視芹也切于愛君又欲貢獻前日之欲殺臣者必益瞋矣然臣之肝腦本是報國之物臣若愛吝此物則陛下不得聞安石之罪矣陛下不得聞安石之罪則人臣之利美成在久為我宋之臣豈可以不思乎乃者天子幸學拜謁宣尼本朝故臣坐而不立躋此逆像卞倡之也輔臣縱逆而養交禮官舞禮而行諂僭自內始逹于四方萬國寒心外裔非笑鷩冕夷俟載籍所無履加于冠何以示訓自有中國以來五品不遜未有此比然則觀此一像而八十卷之大概可以未讀而知矣蔡氏鄧氏薛氏皆塑安石之像祠于家廟朝拜而頌之曰聖矣聖矣暮拜而頌之曰聖矣聖矣國學風化之首也豈三家之家廟乎臣故曰廢大法而立私門啓攘奪而生後患可為寒心莫大于此尊主愛國之士孰敢以此為是乎是非之心人皆有之極天下之所非而可以謂之國是哉嗚呼講先王之道而以咈百姓為先論周公之功而以僭天子為禮咈民嵗久蠧國日深僭語為胎遂産逆像以非為是態度日移廢道任情今甚于昔昔者初立國是使惇行之惇既竄逐移是于布布又竄逐移是于京三是皆發于卞謀三罪同歸乎誤國然則果國是乎果卞是乎若以卞是為是則操心頗僻賦性奸回如鄧綰者不當逐也若以卞是為是則以塗炭必敗之語詆誣神考如常立者不當竄也神考逐綰可以見悔用安石之心哲宗竄立可以見斥絶安石之意兩朝威斷天下皆以為至明陛下光揚亦以去卞為先務掃除舊穢允協人心布澤日新上合天意樂于將順搢紳所同夢闕馳誠各恨踈逺彼元祐元符之籍雖漸縱弛而人未見用應詔上書之罪雖已釋放而士猶沮辱沮辱者不可復問未用者自當退藏其餘雖在朝廷或非言路明哲之士又務保身縱有彊聒之流自無私史之隙惟臣因論私史禍隙至深得存餘命全由獨斷臣之所以報聖恩者敢不勉乎兼臣年老病多决知處世難久與其齎志于歿後寧若取義于生身義在殺生志惟尊主故以臣所著日録論名之曰四明尊堯集云李彥方字序恃智力者以強而勝弱寶清淨者以弱而勝強是皆有勝物之心焉物與我敵迭勝迭負何時而已耶以有涯之生逐無涯之智矜必殆之強勝無可奈何之有有不終有我豈常勝其留也似止其勝也暫樂留勝不偶樂止隨化則是物常往而我常悲也出乎悲樂之境離乎物我之對者為似之矣然且立已以作靜空物以趨獨存辨而泯交欣離而厭入強柔之境可得而出哉老子曰自勝者強其庶幾乎法天行之不息勝一已之自私屢空而鄰極者進乎此矣然于學也方且好之而未已其于仁也方且事之而不違是其于視聽言動猶有從容而未中者也微礦之尚在則金不可以息火涓流之未復則水不可以棄防克之而後復復矣而後樂樂則至矣而樂天知命之所憂者又將勉焉勉則烏可已也生生而無數念念而在兹豈有勝物之暇哉優優乎方外亹亹乎域中同乎一道而其途必異皆有能事而能各不全彼其所謂天全者寧可以迹窺而能見耶是以性命之說賜不得聞非無言也雖言而世無可聞也世聞之聞既不容于心受不能之能又安可以意作然則德之有心心之有意皆私之而未勝者也力足以蹈白刃辭爵祿而無以勝其自私之纍則其為強也寧免于有恃耶莊周之言曰生奚足恃死奚足悲死生亦大矣而不足以易其強也豈有恃而然哉是故物乾坤者易也而物物者之在心猶㸃雲耳至大無外俱往俱來詎有既耶其往也蕩而無涯其來也小而有止獲乎一而不二止乎正而不他則用力之地豈不優乎為人臣者止此而為忠為人子者止此而為孝止則無動動則不變不變者常無動者靜曰靜曰常有方之訓在矣故曰方有定位不圖而方地道無成半圍而已李公名時亮字端夫其子曰倞而以彥方字之教子之義其有以易此乎公以文學智略被遇神考能以所學著之于事辨論明審不主于辭自萬里之外被㫖入對張膽奏疏憂深慮逺舜明灼知天奬隆厚方且付以疆事益加採拔而遭值元祐棄不復録餘言緒論鬱于塵編可為太息者也彥方受名于襁褓獲字于未冠稟所期訓長而力行與其兄彥國心合趣一朝訪夕議日講時習所以勝其私而止乎是者必于其先訓稽焉淵積而流長鬱于先而發于後理固然也某以常論日録負恩觸怒聖主察其敬恭未忍誅殛囚身瘴癘屏息待盡杜門終嵗人莫敢叩彥方伯仲獨過門而弔之此豈操心危慮之所敢安乎勉者用力焉以有免也惠然肯來盍思所以自免乎子雖强尚勉之哉過楊循義序太虛無形寂然不動而天地氤氳之義循環升降屈伸聚散未嘗休己人之于道知氤氳之不異而不已則義發于仁可勝禦哉知鬼神之情狀與天地相似而不違者其惟大人乎湛乎其正也浩乎其動也其止也順其動也健所以立行乎天地之中者謂之易所以立人之道者謂之仁謂之義實一而名二體混而才三莫不有乾坤之義焉義之為義其大如是大則無外也而告子外之眩其名之異昧其實之同而仁之與義間不合矣禹稷顔回一窮一逹其仁同其動異易地以觀之則時措之異所以為同也烏乎同哉各行吾敬同乎宜而已矣一窮一逹存乎命措而皆宜存乎義命義合一存乎理存理之學致曲不二洞明俱照習焉而察之行之而有未宜也則徙焉而已不徙則不精不精則不足以致用循而集之當以其序將以精義而吝不知徙則滯于有方之地終于不化而已矣故曰義仁之動也流于義者于仁或傷仁體之常也過于仁者于義或害然則義或傷仁仁或害義是皆固而不化之病弗吝而徙焉斯得藥矣聚有妄之毒雜君臣之品而返攻無妄非瞑眩之藥其何以止膏肓乎可藥而吝冝止而進何如其義譬如纍土為山習之孜孜不息雖百仞之崇可指日而成然其所孜孜而為者是仁義之山乎非仁義之山乎功虧一簣所宜戒也然有孜孜乎彼未成一簣而宜止者如曰吾功垂成曷可虧疑力策之終以不倦止乎遂非之地而其進益鋭蓋必進至于無可奈何而後已習坎之習不舍晝夜盈科而後進其進豈如是哉丘陵學山不至于山止乎自畫之分耳習坎之習不舍晝夜以必為賢以不改為是以無可奈何為終陷溺之傷甚於告子之禍曾不若丘陵之弗進轉變而不已者也是故進吾之善而不善自止止彼不善而其善將進闔闢無二理進止無殊習天下亹亹而不窮夫子循循而不倦其教也而已矣舜之徒孜孜焉跖之徒亦孜孜焉其進同其為異為跖而垂成者能徙而適舜則述循循之義者將受之乎將拒之乎觀太虛循環之義存文王在帝之仁習中庸時措之宜曰損曰益曰益曰損方止方進方進方止無適也無莫也比義而已焉不在養吾浩然之氣乎必有事焉勿忘勿揠非急辭之所能致也在瞬養息存而已矣某于仁義之說溺于詖陷吝而不化者為日已多微橫渠先生直攻其蔽則詖陷外傷愈久愈固而自還之路終茅塞矣棄舊德于垂成覆新陷于平地既逺乃復默懷暮覺之愧可勝嘆哉循義聞善于庭淵源深逺其于動靜光明之道纓冠閉户之宜聞之久而肄之熟矣今執謙養晦下問不能豈克己之學當如是乎顔何人哉晞之則是某方畏仰不暇其何以益髙明哉聊誦先覺遺編之頌述而讚之以致老愧欽慕之心焉學易說生生之謂易易可學也學易者可不興乎有而為可不作乎世無憂患何易焉憂患在我何作焉作有德僞無得焉非德也有德焉非道也非德則僞非道則情情則不真故曰僞得而私之其止不行故德以履為基基如地非如空乾乾焉惕惕焉如履虎尾不斯須懈也不嘻人則以亨亨者情之正也如春陽之逹何物不和何所不至而未始有所之也知和矣斯執之其執也𢎞而不弛其弛也稱物而不偏自小而非狹自下而不可踰也雖不可踰常和其光常和其光安往而不敬古之制也其出也敬和其入也復出入無疾然後朋來無咎無疾無咎是以亨亨者情之正也見天地之心則其亨而大其辨而小皆無疾也朋來無咎自知而已同此者誰乎有大焉必與同焉無同則無恆言有物而行有恆家人之道也德行易簡乾坤之恆也日月得天而能久照四時變化而能久成聖人久于其道而天下化成恆久而不已一也辨其一其恆乎有息焉磨而磷矣雜而厭者息不厭而染者二二則枝矣古之觀者式此而自損益焉損以逺害其修也先難益以興利其裕也無作元吉無咎可貞孚乎不有之時以往以涉無不利矣其往也其涉也逹此而已元者善之長也貞者事之幹也涉大川者有吉凶焉困其凶也吉其大也一亨一貞尚口乃窮不言而信存乎德行德其得也行其生也得而不捐生而非續形畢而不失其通其志遂矣出怨不怨而不為無怨其出也一而已一豈多乎一故不遷往來井井出入之所亨也邑改而不改奚取于井哉可用汲者在焉養而不窮地而已乎居而不居所而非所不遷而遷孰往孰來奚得奚喪非無疾之音闕辨之哉利往利見動語以制是以小亨其語也默故稱而隱其動也豈實乎寒泉之地䝉以養之風自火出同一太空知不立知覺而非覺融而聞之不亦聰乎出入無疾權實皆得得之初也在此而已初終一際不出于是故曰加我數年易可學也聖人君子之學乎善人有恆者之學乎恆乎有恆乎不興則不辨矣震動也君子興焉兌說也君子習焉艮山也君子止焉坎孚惟心亨君子湛焉㢲風也風以散之君子散焉離日也日以烜之君子晦焉闔户謂之坤君子法焉闢户謂之乾君子象焉一闔一闢君子恆焉易可學也恆而矣文辨豫于治經之暇喜攻文詞摘竒抉異可喜可愕客有視之而笑者作而曰上方以經術作士美其才而用之開未發之聰明滌已昏之智慮片能可用不靳爵祿苟在所棄雖貴必賤太學萬楹􅌨比鱗次良師先逹朱紫焜晃孰教孰講三經巍巍法有不善隨改隨革降詔四方搜剔草茅聞風而動者紛紛如也于是膏轄秣駟裹囊舉槖擔簦躡屐千百其輩岷峨甌越不以為逺轂擊肩摩駢凑闕下秉氣抱術布其所長陳義吐詞必性必命商周而上萬口同舌秦漢以來皆所不道視大人者有意于藐論軒冕者不以為榮敝風靡俗愈久愈變何君子之獨未化也濡墨含毫文不載理澡身于泛濫之淵疲精于詞說之囿負天子作人之意非學者取仕之謀豈所以獵名譽而享尊榮哉豫聞其言而笑曰豫出其文客論其質豫示其迹客疑其心辨則辨矣恐不免于誤也客之云云毋乃好隨而失上之意歟文非其文豫之過也客之誤者客其聽之方今天德清明聖學淵懿九州萬務無一不理大業巍巍神道蕩蕩百姓皡皡不識不知號令雷奔政教風靡雖天雖神不能違也公正之路與陽俱開私邪之門與隂俱閉子奚不攀朋拉友連鑣並駕而蹀躞乎既通之路而乃﨑嶇跛􅀈憂恐戰掉而敲擊乎已閉之門哉必欲奉令承教循職辨務用子之才而拂其貪利之謀享上之心而去其揣摩之意然後使知人之宰輔體天子憂勤之心籠絡賢才而汲汲于薦進之務則如客者不憂其窮矣然而士行其志各有兩塗不在官守斯有言責于二者今皆無之冝息而動神所不與可默而言道所不載客今之勢實似于此為所可為文字而已不外乎道不違乎理不用此以釣名而取位亦何苦苟作而狥俗也哉且天下有道庶人不議士之所學固異乎民鹽梅醯醢異品相用以水濟水又焉用之客將因豫之文而授豫以揣摩之術是無異操瑟而倚齊門者也客復怒而言曰議論既一風俗既同時文之體既可師矣又欲譊譊以勝其以我為非耶人其以爾為非耶豫復笑而答曰君子之文歸于是而已矣豈有時不時哉五經之文久而愈新百家之辭是者長存講之不精其理乃昧論乎其文則古猶今也惟魏晉隋唐之間道德滅裂之後其理益開其文益彰于是有曹劉沈謝之詞刻鏤以為工王楊盧駱之體纎艷以為巧一時之工一時之巧謂之時文不亦冝乎若夫國語左氏史遷班固之倫雖或說理而有疵孰不論文而可貴秦漢而下所厯者幾年而經幾時矣亦可以謂之時文乎况今日之所謂文者發明道德之意劈析性命之學所以潤色鴻猷揚厲偉績追三代于顧盼之中而運四海于指掌之上畢在于斯文而已豈若魏晉隋唐之所謂文者特變一時之體而已哉是以真是真非既立于朝廷之上妄譽妄毁不行于閭巷之間議所已定則確乎豈支山之立法所己行則浩乎如巨川之流匹夫之毁譽夫何足以增損其已成之勢哉客乃欲窒吾之心而相期于時文之內變吾之守而見置于流俗之中飛辨騁辭咆哮奮迅自以為得上之意也豈不欺哉且夫天地之大無所不容萬物之內無所不有是以四凶在廷而不足以貶唐虞之治客不知此而以謂知其為文者人人是矣非愚則諛非子而誰斯可不足以堪秋蟬之翼而欲舉烏獲之任不足以見泰山之狀而欲鬬離婁之明譬猶虎背而馳逐影而走驚悸掉蕩死而不休然則腐草之餘果何補于日月涓滴之溜果何益乎滄溟也哉子以為時文自不時者矣客不悅宋文選卷三十二
