body:
  text: 宋文選卷三司馬君實文周論周自平王東遷日已衰微至于戰國又分而為二其土地人民不足以比強國之大夫然而天下猶尊而事之以為共主守文武之宗祧綿綿焉久而不絶其故何哉植本固而發源深也昔周之興也禮以為本仁以為源自后稷已來至於文武成康其講禮也偹矣其施仁也至矣民習于耳目浹于骨髓雖後世微弱其民將有陵慢之志則畏先王之禮而不敢為將有離散之心則思先王之仁而不忍去此其所以享國長久之道也不然以區區數邑處于七暴國之間一日不可存况數百年乎韓論韓以微弱之國居天下之衝首尾腹背莫不受敵然猶社稷血食幾二百年豈非昭侯奉法之謹賞不加無功罰不失有罪後世雖不肖猶得蒙遺烈以自存乎嗚呼有國者安可以無法哉魏論魏文侯以列國大夫好賢禮士終為天下之顯諸侯至于今稱之惠王有一商鞅不能用而棄之於秦使還為國害喪地七百里竄身大梁子孫遂微賢不肖之相望豈不逺哉無忌去而魏輕還而魏重安釐王猶以為疑無忌死而魏亡賢者之于國家如何哉楚論楚自祝融鬻熊以來其有國幾何年矣方其盛也奄有南海憑陵諸夏及懷王放廢忠良親近讒慝惑張儀之口而耳目不能自守見欺而不悟亡師而不悔以失濟失客死於秦使其子孫銜涕忍恥以事仇讎強之女而不敢辭陵廟焚而不敢怨兔逃鼠伏自屏于陳束兵不戰而攻之不解割地請和而侵之不止卒不見赦而國以淪亡不亦悲乎燕論燕在春秋時玉帛不通於中國簡策所書鮮焉及文侯始大與諸侯約從以擯秦王噲慕堯舜以國授子之而敗死為天下笑求名失實乃至是乎昭王刻意勤身招賢下士卒用弱燕以報強齊有志者功無不成也惠王信讒以喪垂成之業惜哉丹以尺八匕首欲劫秦王以安社稷不亦戲乎遂使召伯之廟不祀忽諸罪孰大焉而論者或謂之賢豈不過哉趙論武靈王不顧流俗變胡俗習以射騎制林胡滅中山大啓上宇威加強秦可謂賢君矣及溺于嬖寵欲分國以王二子卒餒死沙丘宫佚欲之為敗也如此夫趙于三晉為最強及貪上黨之田以喪長平之師用郭開之讒而棄亷頗李牧使宗廟不血食言之可為長欷矣齊論齊地廣而民衆負滄海以臨中夏重以威宣之賢國家富強及湣王驕汰不可盈厭自取顛沛苟無田單齊不國矣凡遊士言縱橫者雖更相傾覆要之合從者六國之利也齊為燕楚三晉之根柢三晉燕楚為齊之籓蔽秦雖強暴百有餘年不能一諸侯者以其表裏相鈎帶也及齊王建用后勝之説信秦間之言拱手以事秦不救五國五國已亡而齊并為虜理勢然也秦論孔子曰知及之仁不能守之雖得之必失之秦之謂矣善夫賈生之言曰秦以區區之地千乘之權招八州而朝同列百有餘年然後以六合為家殽函為宫一夫作難而七廟隳身死人手為天下笑者何哉仁義不施而攻守之勢異也西楚論世稱項王不王秦而歸楚故失天下觀其擁百萬之衆西入函谷擅天下之勢裂山河以王諸侯自謂可以逞其私心而人莫敢違安行無禮忍為不義欲以一夫之力服億兆之心才髙者見疑功大者被絀推此道以行之雖得百秦之地將能免於敗亡乎前漢論髙祖奮布衣提三尺劍八年而成帝業其收功之速如是何哉惟其知人善任使而已故髙祖自謂鎮國家撫百姓不如蕭何運籌䇿決成敗不如子房戰必勝攻必取不如韓信三者皆人傑吾能用之所以取天下韓信亦曰不善將兵而善將將斯言盡之矣吕氏之亂漢氏不絶如線然而卒不能為患者外有宗籓之強內有絳灌之忠也文景之時天下家給人足幾致刑措後世皆稱慕而莫能及之夫民之情何嘗不欲安樂而富壽哉文景能勿擾而已矣孝武喜淫侈慕神仙宫室無度巡遊不息窮兵於四夷嚴刑而重賦迹其行事視秦皇何逺哉正以崇儒重道求賢納諫故其成敗若此之殊也孝昭以童稚之年辨霍光之忠確然不可動何天資之明也然光猶專政而不歸此則光之罪矣孝宣綜核名實信賞必罰使吏稱其職民安其業方之孝武功烈優焉孝元優遊不斷漢業始衰孝成荒于酒色委政外家孝哀狠愎不明嬖幸盈朝陵夷至于孝平以幼沖嗣位王莽因之遂移漢祚莽恃其詐慝煩民玩兵罪盈怨積而天下叛之矣後漢論新室之末民心思漢如渴之望飲飢之待餔也是以諸劉奮臂一呼而逺近響應曾未期年元惡授首更始入雒之初天下已服矣而素無人君之器紀綱不修諸將暴橫不旋踵而亡固其宜也光武以仁厚之德濟英傑之志昆陽之役驅烏合之衆掃滔天之敵使海內翻然變而為漢宜陽之師不戰而赤眉束手百萬之盜一朝皆散皆希世之竒功也至于待劉盆子止于不死取良吏卓茂以為太傅戒馮異以安集關中不務戰攻取勝雖當草創之際可謂有帝王之逺略矣天下已定不失舊物乃偃武修文崇德報功勤政治養黎元興禮樂宣教化表行誼勵風俗繼以明章守而不失於是東漢之風忠信亷耻幾於三代矣及孝和以降政令寢弛外戚專權近習放恣然猶有骨鯁忠烈之臣忘身以徇國故雖衰而不亡豈非建武永平之餘烈歟至于桓靈而紀綱大壞廢錮英俊賊虐忠正鬻獄賣君濁亂四海何進見殺袁紹不勝其憤遂燔燒宫闕肆行誅戮外召董卓以脅朝廷於是虺蜴雖除而虎貙入室矣卓貪愎殘忍廢主遷都州郡奮然稱兵以討之卓死而天下大亂漢室遂亡哀哉蜀論昭烈以敗亡之餘羈旅漢南而能屈體英傑要結同志推沮勍敵因敗為功顛沛之際不忘德義美矣劉璋昧弱侮而兼之遂奄有巴蜀君臨一隅安樂公材雖中下然委任賢相抗衡中國及薑黃用事而靣縛為虜宜矣魏論漢室不綱羣雄麋擾乘輿播遷莫之收省太祖獨奉迎而相之披荆棘以立朝廷則其名義固足以結民心矣加之英威明略過絶于人驅䇿賢豪奮除姦宄于是張繡屈膝吕布授首公路野死本初覆亡劉琮獻地韓馬遁逃中原肅清外域請服然則魏取天下於盜手而非取之於漢室也惜其狹中多詐猜忌賢能此海內所以不盡服也及文帝受禪明帝繼業內綏外禦不廢前功而明帝於彌留之際為姦臣牽率嗣子幼弱寄托非人曹爽驕戅黨與輕佻禍自內興遂哀微不振以至易姓悲夫吳論孫堅破虜以孤逺之兵決忠憤之志首犯賊鋒深蹂川洛汛掃陵寢有足多者討逆以童子提一旅之衆揮馬箠而下江東耆儒宿將狼狽失據開地千里真英才也大帝承父兄之烈師友忠賢以成前志赤壁之役決策定慮以摧大敵非明而有勇能如是乎遂奄有荆揚騁於南海傳祚纍世宜矣侯官景帝皆明慧敢決有先世之風歸命驕愎殘虐浮于桀紂求欲不亡得乎西晉宣帝始以重望髙才榮名魏世西却諸葛東舉公孫若以忠順終之足為良臣矣遭爽晏忌疾乘間而發專制朝柄誅鉏異已平昔之美掃地盡矣及景文相繼遂遷魏祚武帝席卷全吳纘禹舊服恃其治安荒于酒色以開基之始不為逺圖崇尚浮華敗棄禮法惠帝昏愚不辨菽麥譬如萬金之寶委之中衢無人守之安得不為他人有乎禍生于閨闥成于宗室骨肉相殘而劉石姚苻慕容爭乘其弊剖裂中原韲醢生民積骸成丘流血成淵幾三百年豈不哀哉前趙論劉淵以胸奴遺種乘晉室之衰奄有河汾天下蜂起之衆輻湊而歸之石勒王彌皆北靣為臣聰承其故業遂陷兩都執辱二帝矜夸淫縱殘暴無親幸以病終墳草未生家為屠肆矣曜以踈屬屢建大功專制關中遭靳凖之亂興師討賊遂承漢業及揚戈隴阪則陳安授首按甲西河則張茂稱藩亦一時之雄俊也然始與靳氏約降則非義終滅其家則非信使石勒因而自絶則非智乃知二三其德而能成功者鮮矣及乘髙堠之捷以圍金墉一戰而跌生為禽虜雖其輕易以取禍亦不幸而天亡也後趙論石勒以淵聰賤𨽻崛起皂櫪之間連百萬之衆橫行天下斫喪晉室東擒苟晞北取王浚西逐劉琨南舉兖豫皆如俯拾地芥劉曜席戰勝之威長驅伊洛有并吞山東之志勒舉鞭一麾曜惛然就縳遂兼其國奄有中區羌氐咸服其才不有過人者能如是乎虎以悍戾之資濟貪狡之志賊虐其孤而剽奪其位恃其詐力以凌人暴物窮奢極欲不可盈饜自以為非天崩地陷則抱子弄孫無復後憂及夫父子相殘兄弟相攻尸浮漳濱家無噍類積惡不已舍滅亡何適哉前燕論慕容氏世為君長深據海隅及廆始大屬晉室板蕩諸夏之民皆襁負而歸之廆撫循勞來收其髦俊以贊國政逺奉王命以示大順務農積穀秣馬厲兵心窺鄰國之釁故能斬將搴旗大啓土宇承其遺烈恢大前功于是吞假遼并宇文俘髙麗翦夫餘蠶食幽并而與強趙為敵矣及石氏內亂俊乘時而動驅勵精蓄鋭之兵以掃離散土崩之衆無不順風而靡遂走王午服張平戮假龕禽冉閔左縈右拂而幽并青冀悉定矣暐之立也太宰恪佐之內修政事養士愛民外開封疆威行鄰敵及評為政妒宗室勛賢之人逐之以資鄰敵君暗臣鄙以當苻堅王猛之威安得不亡乎後燕論慕容垂以美才茂功不容于昏亂之朝自歸于秦秦主以國士遇之淮南之役不乘人之弱亦足以小償其惠矣垂之去燕燕人如失其父兄及其還也人向之如趨市故數年之間掉馬箠從容而收故業自然之勢也寶以不克負荷開門延敵坐而待攻又不能固守中山無故逃遁期年之間蹙國殆盡子弟親戚剪為仇讐進退失據卒隕其身何其愚也盛以孺子孤窮自投于仇人之懷終踞其喉而刺其腹以成其志而復其位自非智勇過人能如是乎不幸遇盜而夭熙以一婦人之故遂亡其國彼何人哉德以燕室至親居方伯之任總南夏之師敵至不能禦民散不能安君窮不能救盡喪其田而奪人之田以居之其智仁勇皆無足稱者然禮賢納諫以保全青土可謂善敗者不亡矣超以聲伎之故輕犯強敵又不能善用其謀自取滅亡惜哉前秦論石氏之強也氐羌之屬無不內從而為臣一朝失馭而角立為患理固然也苻洪徘徊枋頭有虎據中原之志以健為不肖然猶西取關中并姚襄却桓溫遂為強國堅以雄力英略加之慈惠忠信舉王猛于布衣任之以政勳舊不能離親戚不敢妒非至明能如是乎故能吞強燕舉河西兼巴蜀包漢沔俘索頭屠龜兹奄有天下十分之九永嘉以來未有如堅者也觀其舉百萬之衆以攻晉先為之降官築第以待其君臣意以為羅中之禽往無不獲也及一戰而敗遂顛沛不振昔之俘囚降卒皆起而為敵數月之間冦仇遍于四方戍馬塞于郊甸以至身死人手子孫殄滅何哉論者皆咎堅寵信羌與鮮卑而伐晉彼皆睹其迹而言之未達其本也要之堅恃其強大易而無備此其所以敗亡也夫後秦論姚弋仲以西羌酋帥立于二石之朝以鯁直勇果著名而得其耆艾豈非忠信之致然耶襄才氣豪邁兼資文武有孫䇿之風然適晉不容攻秦見殺亦其命也萇藉父兄之烈值符氏之衰鳴鼓中原醜類雲集不能報舊君之德乘其窮約而弒之不仁甚矣興承父之志奄有關中涼夏諸豪靡不率服然處攻戰之世不能收羅英雄以治國訓兵而專率臣民譯經拜佛及泓繼世骨肉內離冦敵外侵遂亡其族雖泓器業之不肖亦興貽謀之未逺也東晉論晉室既衰中原雲擾劉石慕容之輩彌漫河洛蟠據岱華宫闕蕪沒陵寢隳焚元帝以宗室踈屬遁居江表天下士民有思晉者皆裹糧而歸之國於荆揚之間子孫相承不絶如線獨明帝英武克清大憝不幸享國不永自餘孱弱孤危外陵內叛寄命于虎狼之口幾遭吞食者數次矣然卒能保其位號宗廟血食百有餘年何哉有王𨗳卞壼溫嶠陶侃謝安謝幼度為之臣也羣賢既沒使道子元顯之徒輔之敗亡不亦宜乎宋論晉氏渡江以來君弱臣強禍亂相繼至于元興而桓氏篡位髙祖首倡大義糾合同志起于草萊之間奮臂一呼凶黨瓦解遂梟靈寶之首奉迎乘輿再造晉室厥功已不細矣既而治兵誓衆經營四方揚旗東征廣固橫潰卷甲南趨盧循殄滅偏師西上譙縱授首鋭卒北驅姚泓靣縛遂迅掃伊洛修奉園陵震驚旃裘之心發舒華夏之氣南國之盛未有過于斯時者也然區宇未一蹂干天位委棄秦雍以資冦敵使大功不成惜哉文帝勤于為治子惠庶民足為承平之良主而不量其力橫挑強敵使師徒殱于河南戎馬飲于江津及其末路狐疑不決卒成子禍豈非文有餘而武不足耶夫以孝武之驕淫明帝之猜忌得保首領以沒于牖下幸矣何後嗣之有哉南齊論髙帝以功名之盛不容于昏暴之朝逆取而順守之亦一時之良主也明帝自以得于不義猜忌髙武子孫誅夷殆盡深戒東昏以先事制人而大臣疑懼禍變相尋卒亡其國夫不務令德而殺人以自安自古以來未有能濟者也梁論武帝當齊之季任居方靣危不自安乘時奮起以除昏主而成大業及享國日久普通大通之際遭魏氏衰微王公牧守襁屬而歸之戎車北征至于洛汭觀其勤身約已好尚文雅拊循士大夫亦可謂恭儉寬惠之君矣然以萬乘之主為桑門之行屈身傾國以奉浮屠恩勝于威紀綱不立信佞臣之謀貪河南之地棄與國寵叛人遂使臺城覆沒老而餒死江淮以南鞠為荆棘其智未足稱也夫德澤不能及而享其大利聖人禍之譬如恱盜賊之財而延之入室財不可得而喪其所有必矣其子孫各擁強兵列居重鎮不救君父之危而窺間乘便更相屠滅元帝於兄弟之中殘忍尤甚是以雖翦凶渠而克復故業旋踵之間身為俘馘豈特人心之不與哉亦天地之所誅也後魏論後魏之先世居朔野有國久矣道武乘燕氏之衰悉舉引弓之民以憑陵中夏馬首所向無不望風奔潰南取并州東舉冀幽兵不留行而數千里之地定矣繼以明元大武兼青兖包荆豫摧赫連開關中梟蒲洪吞遼碣虜沮渠并河右髙車入臣蠕蠕逺遁自淮以北逾于大漠悉為其有子孫稱帝者百有餘年左袵之盛未之有也及孝文嗣世乃貶逺人風俗修帝王之政崇儒雅興禮樂其風聲文采蔚然可觀矣宣武懦弱不克負荷寵信讒諛賊虐親賢元氏之業于兹始衰重之以孝明幼沖胡后淫恣嬖幸盈朝政出多門賞罰無章紀綱大壞守令貪殘黎民愁怨盜賊蜂起日滋月溢上之人曽無悛心而內自暌離以招外盜於是爾朱榮乘之而起興晉陽之甲直指京洛后主沉于回淵公卿百官血濡馬足雖孝昭勇決手刃賊臣而枝黨四集禍不旋踵孝武惡髙歡之過逃遁入關遭宇文泰之禍不能自脫東西分裂相繼皆亡嗚呼人主當國全盛之時宴安怠墮以失其威福之柄及民心已去禍亂已成雖有明斷之才猶不能救况庸君乎北齊論神武以髙世之略平爾朱之亂功大勢盛為魏武所疑雖有逐君之慙而能惓惓盡恭以事靜帝沒身不怠此其可稱者也文襄有俊才而無重德悖慢無禮終隕身于奴𨽻文宣淫湎殘暴甚于桀紂而能信用賢臣委之以政威加鄰敵終其天年蓋亦有以得之矣孝昭明達愷弟實有齊之令主享國不永惜哉武成驕淫奢縱齊業始衰後主繼之昏狂尤甚誅翦忠良信用讒邪十年而亡已為幸矣後周論文帝以關中之乘東迎孝武收疲散之兵撫貧困之民任賢使能列官布職明部分務農桑以輔魏室雖以髙氏之強不能陵也其所為典法施于後世可不謂賢乎武帝以英傑之資受制羣臣恭默端拱十有餘年須其罪盈惡熟為衆所棄一旦除之若撥蘇振稿可謂知柔知剛智勇兼偹者矣然後親統六師以征東夏齊之險阻不守士卒不戰數月之間縛其君臣致于鼓下使有周之境東漸于海南薄于江雖魏室全盛之時不能及也惜乎宣帝恣其淫侈逞其竒譎自絶于天結怨于民不及三年而為異姓所有悲夫陳論武帝與王僧辨同事梁室誅夷侯景乘時伺間以詐力取國然率羸弊之衆當強齊乘勝之勢卒成大功奄有江南斯亦難矣文帝恭勤政事足為良主孝宣值齊之衰而啓土逢周之興而喪師豈非不恃內而恃外者耶夫以陳國區區不能居天下五分之一栗栗危懼猶不能保其社稷况後主荒淫無道以趣之納身眢井不亦宜乎隋論文帝于周室非有元功厚德素洽于人直以天元暴崩嗣君幼弱姦臣矯命徼幸得之然明敏儉約勤于政事隨才任官信賞必罰故能取江南三百年之國易于反掌使天下復為一統百姓繁庶衣食豐衍突厥室韋靺鞨林邑髙昌女國之屬莫不稽顙稱臣奉珍入貢雖兩漢全盛之時不能過也向使後嗣僅得中才以守之則十世之內未易亡也煬帝以悖逆詐謀坐承冨強之業志驕氣溢然後慕秦皇漢武之為人窮侈極欲連兵四夷政煩賦重盜賊蜂起而猶遊幸不息以樂滔淫惡聞直言喜自壅蔽噫率是道也雖禹湯文武之子孫未或不亡况隋無積善之基乎唐論髙祖舉晉陽精兵承亡隋之弊席卷長驅奄有關中命將出師掃除亂略遂降李密係建德禽世充芟武周翦黑闥夷蕭銑六年之中海內咸服何成功之速哉蓋以太宗為之子也太宗文武之才髙出前古驅䇿英雄網羅俊乂好用善謀樂聞直諫拯民于湯火之中而措之于袵席之上使盜賊化為君子呻吟轉為謳歌衣食有餘刑措不用突厥之渠係頸闕庭北海之濱悉為郡縣蓋三代以還中國之盛未之有也惜其好尚功名而不及禮樂父子兄弟之間慙德多矣髙宗沉溺宴安仁而不武使天后斫喪唐室屠害宗支流毒搢紳迹其本原有自來矣中宗久罹幽辱備嘗險阻一旦得志荒淫不悛糞土之墻不可圬也睿宗鑑前之禍立嗣以功所謂可與權矣明皇能斷有謀再清內難開元之初憂勤庶政好賢樂善利民愛物海內富庶四夷賓服浸淫于貞觀之風矣及天寶已降自以為功成治定無有後艱志欲既滿侈心乃生忠直寖踈讒諛並進以娛遊為良謀以聲色為急務以李林甫楊國忠為周召以安祿山哥舒翰為方虎癰疽結于心腹而不悟豺狼遊于籓籬而不知一旦變生所忽兵起邉隅廟堂執檄而心醉猛將望塵而束手腥羶汚于伊洛流血染于河潼乘輿播遷生民塗地禍亂並興不可救藥使數十年之間干戈爛熳而不息嗟乎靡不有初鮮克有終安之不可恃治之不可保如此夫肅宗以國之元子收兵靈武反斾而東不失舊物代宗分命羣帥翦除凶醜使大河南北復為唐臣其功皆不細矣然此兩君者武不足以決疑明不足以燭理向無郭子儀之忠李光弼之智因僕固懷恩以用回紇之師則天下已非唐有矣夫以肅宗之孝慈而制于李輔國不能養其父惑于張后不能庇其子則其武可知矣以代宗之寬仁而聽讒臣之言使光弼不敢入朝慙憤而死懷恩招引外冦幾致亡國則其明可知矣而又不思經緯之謀專為姑息之政盜賊據州郡者因用為牧守士卒殺主帥者因授之旄鉞使強暴縱橫下陵上替積習成俗莫知其非唐之紀綱大壞不可復振則肅代之為也德宗憤積世之弊憫王室之卑南靣之初赫然有撥亂之志而識度暗淺資性猜愎親信多非其人舉措不由其道賦斂煩重果于誅殺故關外之冦未平而京師之盜先起矣于是困辱于奉天播遷于山南公卿拜于賊庭鋒鏑集于黃屋尚賴陸贄盡心于內李晟渾瑊輸力于外故能誅夷元凶遷奉宗社自是之後消剛為柔刓方為圓逮其晚節偷懦之政甚于祖考矣順宗不幸嬰疾姦邪肆志而能委政冡嗣以安社稷足為賢矣憲宗聰明果決得于天性選任忠良延納善謀師老則屈異論輻湊而不為之疑盜發都邑屠害元宰而不為之懼卒能取靈夏清劍南誅浙西俘澤潞平淮右復齊魯于是天下深根固蒂之盜皆狼顧鼠拱納質效地稽顙入朝百年之憂一旦廓然矣而怠于防微變生肘腋悲夫穆宗蒙已成之業承既平之緒授任非才為謀不臧使柙中之虎復縱暴于原野網中之魚得自脫于深淵元和之功于兹墜矣敬宗輕易荒縱自貽顛覆文宗優遊不斷受制家臣雖有好賢之心文雅之美皆不足稱也武宗英敏特達委任能臣克上黨如拾芥取太原如反掌功業不究惜哉宣宗少歷艱難長年踐位人之情偽靡不周知盡心民事精勤治道賞簡而當罰嚴而必故方內樂業殊俗順軌求諸漢世其孝宣之流亞與懿宗驕奢無度賊虐不忌輔弼之任委于嬖寵四海之財竭于淫樂民怨不知神怒不恤李氏之亡于兹決矣且唐自至德以來近習用攘籓臣跋扈譬如羸病之人以糜粥養之猶懼不濟又况飲之毒酒其能存乎及僖昭嗣位天祿已去民心已離盜賊遍于寰區蓬蒿塞于城闕漂泊幽辱寄命諸侯當是之時雖欲救之其將能乎梁論太祖始以黃巢降將秉旄宣武逞其詐力蠶食東夏地廣兵強威權日熾志欲無厭遂遷唐祚淫虐不悛禍自內興不得其死宜矣均王膏梁之子材不過人棄敬翔王彥章而用趙巖張歸霸以與莊宗為敵能無亡乎後唐論武皇以沙陀微種奄有河東黃巢之亂有大功于唐室上源之變訟于朝廷而不能自直遂與朱氏治兵相攻紏紛不解流血成川僵尸蔽野至其晚節鋒鋭益衰窮居一隅僅能自保莊宗以弱齡襲位麾下諸將皆白首行陳與武皇並轡齊驅之人乃能以恩信折其心英果折其氣莫不竭力致命頥指如意遂服真定徙中山取漁陽兼魏博䇿馬渡河而梁氏失國當是之時天下莫不震動諸侯陸梁踞肆者皆愕眙相顧莫敢保其土地王衍恃其險逺辭禮倨慢偏師西指而蜀閣不守觀其行兵可謂能矣惜其志小氣迫驕心易生矜功自喜御衆無法便嬖是恱婦言是用才及三年隕身亡族悲夫明宗無取國之心而為衆所附資性寬厚克終天祿清泰于危難之中坐受神器得之非難失之孔易負扆未安家為煨燼十年之中易姓者四禍福相循何其速哉晉論髙祖以地尊勢重迫于猜嫌親執臣子之禮以事戎狄賂之土田藉其兵力以取天下夫羽翼未成不可以髙飛國家未治不可以慮敵齊王舍桑維翰之深謀信景延廣之狂䇿內政不修而外挑強鄰使黎民塗野草胡騎汚宫闕生為降虜死為羈魄非不幸也漢論髙祖擁精鋭之兵居形便之地屬胡騎北旋中原乏主故雍容南靣而天下歸之豈其才德之首出哉乃會其時之可為也夫根踈者不固基薄者易危隱帝雖有南靣之名而政非已出民不知君輕信羣小之謀欲除跋扈之臣禍不旋踵自然之勢也父子相繼四年而滅自古享國之短未有若兹者也周論太祖負震主之威挾不賞之功措身無所乘危而發雖履天下之籍而家室先覆矣世宗以異姓之親入承大統知近世之弊起于威令不行下陵上替故髙平之役首誅樊何以振軍法遂能變弱為強因敗為功乘勝逐北至于太原歸而簡師習戰并心進取于是南割江淮西克秦鳯北開關南攻無堅城戰無強陳又以桴鼓之隙治律厯興禮樂審法令修政事收賢才養百姓可謂能知治安之本矣大功未成中道而亡蓋太平之業天將啓皇宋而授之固非人謀之所及也宋文選卷三
