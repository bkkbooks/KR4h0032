body:
  text: 宋文選巻六范希文文帝王好尚論老子曰我無為而民自化我好靜而民自正我無欲而民自樸此則述古之風以警多事之時也三代以還異於太古王天下者身教化使民從善故禮曰人君謹其所好惡君好之則民從之孔子曰上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情由此言之聖帝明王豈得無好在其正而己堯設敢諫鼓建進善旌舜好問而成至化禹拜昌言而立大功湯五聘伊尹文王躬迎吕望周公握髮吐哺以待白屋之士鄭武公好賢而詩雅歌之燕昭王築臺募士而智者歸之斯聖賢好尚如是之急也桀紂好利欲不好諫諍而天下亡秦好兵刑不好仁義而天下歸漢隋煬帝好逸豫不好恭儉而天下歸唐使桀紂好諫諍秦好仁義隋煬帝好恭儉豈有喪亂之禍哉推委臣下論天生兆人得主乃定萬幾百度不可獨當内立公卿大夫士外設公侯伯子男先擇材以處之次推公以與之然則委以人臣之職不委以人君之權臣請辨之夫執持典禮修舉政教均和法令調理風俗内養萬民外撫四彛師表百僚經緯百事此宰輔之職也練兵戎謹城壁修方畧威逺人此將帥之職也肅朝廷之儀觸縉紳之邪此御史府之職也治繁劇制豪猾此京尹之職也至於金榖刑法各有攸司之職矣撫民人宣風化均徭役平賦斂此刺史縣令之職也是皆人臣之職不可不委之也若乃區别邪正進退左右操榮辱之柄制英雄之命此人主之權也不可盡委於下矣何以明之論語孔子曰天下有道政不在大夫晉委三卿趙文子韓宣子魏獻子延陵季子曰晉國之政歸此三家矣後果分晉為三國漢髙祖招納羣英有將將之權而取天下至於子孫不知祖宗之謀而獨委霍光又獨委王鳯至於王莽皆有大禍西漢遂傾焉後漢光武親用二十八將而取天下後之子孫不知祖宗之謀而獨委后族至於宦官故奸雄競起以去惡為名東漢遂傾焉魏委司馬晉委劉裕其禍亦然唐太宗駕馭英雄取天下致太平至髙宗朝李義府以立后之功獨見委用䧟害忠良天下憤怨明皇初用姚崇宋璟為相而天下大治推心委之遂成故事及李林甫代其任仍復委之林甫奸邪能中傷善人朝廷無敢言得失者於是明皇不聞諫諍自謂宰相得人泰然無為矣言路已絶故至禄山犯闗嚮闕而明皇不知一旦喪亂天下瓦解唐德遂衰初以推委而天下治終以推委而天下亂何弊之然哉當推委之際擢十人上從其九是九分之恩出於下矣如此則數年之間左右前後皆權臣之黨也若黜辱十人上從其九是九分之威出於下矣如此則數年之間中外逺近無敢忤權臣者故下之情不逹而上之勢孤矣此明皇之失為後代之鑒王者將收其權必先采人采人為難豈無其要孔子之辨門人標以四科一曰德行二曰政事三曰言語四曰文學以四科辨之思過半矣然則朝廷清要之位覬覦者衆必審賢以與之賢傑之才讒嫉者衆必先時以辨之是故先王孜孜求賢以備選用且千官百辟豈能獨選必委之於輔弼矣惟清要之職雄劇之任不可輕授於人僉諧之外更加親選聖帝明王常精意於求賢不勞慮於臨事精意求賢則日聰明而自廣勞心臨事則日叢脞而自困宜乎屏煩細而廣詢訪其深於正道有憂天下之心可備輔相者記之其精於經術通聖人之㫖可備顧問者記之其敢言正色有端士之操可備諫諍者記之其能言方畧有烈士之風可備將帥者記之如斯之人精而求之熟而觀之然後寘清要之職授雄劇之任使人人竭力爭為腹心於是乎得以操榮辱之柄制英雄之命庶務委於下而柄歸於上始可以言無為矣猶復置御史大夫中丞使縉紳無敢慢者置諍臣七人使言路無敢蔽者置門下封駁司使制勅無得悞者此又推委無為之中而不廢其防不失其權者矣若留意逸豫不孜孜於求賢親選之時無賢可用則進退賞罰復歸於下雖有爵禄不足為上之恩雖有誅罰不足為上之威矣選任賢能論王者得賢傑而天下治失賢傑而天下亂張良陳平之徒秦失之亡漢得之興房杜魏禇之徒隋失之亡唐得之興故曰得士者昌失士者亡書曰先王昩爽丕顯坐以待旦旁求俊彦啟迪後人其勤求人材如是之急也然則求之之道不可一端皐陶賛禹曰亦行有九德乃言曰載采采禹曰何臯陶曰寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而廉剛而塞強而義彰厥有常吉哉孔子之門人目以四科一曰德行謂顔淵閔子騫也二曰政事冉有季路也三曰言語宰我子貢也四曰文學子游子夏也此所謂求人之道非一端也又書之說命篇曰旁求俊乂列於庶位是朝廷庶位惟俊乂是求唐太宗曰天下英雄落吾彀中語曰邦有道則智邦無道則愚智則可與治國家安天下愚則可與避怨惡而全一身故聖人以俊乂為得不以柔訥為行如以柔訥為行而寵之則四海英雄失望於時矣使英雄失望於時則秦失張陳隋失房杜豈不悞天下之計矣上皇帝時務書天聖三年四月二十日文林郎守大理寺丞臣范仲淹謹詣閣門再拜死罪上書皇太后陛下皇帝陛下臣聞巧言者無犯而易進直言者有犯而難立然而直言之士千古謂之忠巧言之人千古謂之佞今臣勉思藥石竊犯雷霆不遵易進之塗而居難立之地者欲傾臣節以報國恩恥佞人之名慕忠臣之節感激而發萬死無恨况臣之所言皆聖朝當行之事而未之行者諒有以也聖人之心豈不至此蓋當乎一日萬幾未暇餘論大臣之心豈不至此蓋懼乎上疑下謗未克果行臣請言之以發聖慮臣聞國之文章應於風化風化厚薄見乎文章是故觀虞夏之書足以明帝王之道覽南朝之文足以知衰靡之化故聖人之理天下也文弊則救之以質質弊則救之以文質弊而不救則晦而不彰文弊而不救則華而將落前代之季不能自救以至於大亂乃有來者起而救之故文章之薄則為君子之憂風化其壊則為來者之資惟聖帝明王文質相救在乎己不在乎人易曰窮則變變則通通則久亦此之謂也伏望聖慈與大臣議文章之道師虞夏之風况我聖朝千載而㑹惜乎不追三代之高而尚六朝之細然文章之列何代無人蓋時之所尚何能獨變大君有命孰不從風可敦諭詞臣興復古道更延博雅之士布於臺閣以救斯文之薄而厚其風化也天下幸甚臣又聞聖人之有天下也文經之武緯之此二道者天下之大柄也昔諸侯暴武之時孔子曰俎豆之事則嘗聞之矣此聖人救之文也文武之道相濟而行不可斯須而去焉唐明皇之時太平日久人不知戰國不慮危大冦犯闕勢如瓦解此失武之備也經曰禍兮福所倚福兮禍所伏又曰防之於未萌治之於未亂聖人當福而知禍在治而防亂故善安身者在康寧之時不謂終無疾病於是有節宣方藥之備焉善安國者當太平之時不謂終無危亂於是有教化經畧之備焉我國家文經武緯天下大定自真宗皇帝之初猶有舊將舊兵多經戰敵四彛之患足以禦防今天下休兵餘二十載昔之戰者今已老矣今之少者未知戰事人不知戰國不慮危豈聖人之意哉而况守在四夷不可不慮古來和好鮮克始終漢和親而匃奴大舉唐封冊而吐蕃至渭上陸贄議云威之下悟撫之不懐雖或時有盛衰大抵常為邊患屬方靖中夏未遑外虞因其乞盟遂許結好加恩降禮有欲無違而乃邀求䆮多翻覆不定託因細事嘖有煩言猜矯多端其斯可騐此唐人之至論也今自京至邊並無關嶮其或恩信不守釁端忽作戎馬一縱信宿千里各邊少名將則懼而不守或守而不戰或戰而無功再扣澶淵豈必尋好未知果有幾將可代長城伏望聖慈鑒明皇之前轍察陸贄之讜議與大臣論武於朝以保天下先命大臣宻舉忠義有謀之人授以方畧委之邊任次命武臣宻舉壯勇出羣之士試以武事遷其等差壯士䝉知必懐報效列於邊塞足備非常其或自謂無虞不欲生事輕長世之策苟一時之安邊患忽來人情大駭自古兵不得帥魚肉無殊乃於倉卒鬬戰之間拔萃為將豺狼競進真偽交馳此五代之前鑒也至於塵埃之間豈無壯士宜復唐之武舉則英雄之輩願在彀中此聖人居安慮危之備備而無用國家之福也惟聖意詳之臣又聞先王建官共理天下必以賢俊授任不以爵禄為恩故百僚師師各揚其職上不輕授下無冒進此設官之大端也我國家累聖求理而致太平大約紀綱法象唐室以臣觀之宜法唐興之時不宜法唐衰之後唐興之時特開館殿以待賢俊得學士十八人聲滿天下此文皇養將相之材以論道經邦而大化也暨之中興往往得人唐衰之後此選不盛我朝崇尚館殿目為清華相輔之材多由此選三館清宻古謂登瀛近歳遷出内庭逼居坊陌非唐所謂集仙之館也又其間校讎之職或不由科第以恩而除限以歳年漸於清顯輕十八學士之選恐非文皇養將相之材之意也伏望聖意與大臣議其可否重為制度以法唐興之時而延廊廟之器此國家之大義也惟聖意詳之又諫官御史耳目之司不諱之朝宜有賞勸自陛下臨政以來未聞旌一諫員賞一御史若言而無補是選之不精言而有補豈賞之不行徒使犯顔者危緘口者安以進藥石為虚言以陳絲髮為供職三載之後進退雷同臣恐天下竊議朝廷言路未廣忠臣未勸將令諫官御史之徒尸素於朝非國家之福也惟聖意詳之臣又聞先王義重君臣賞延於世大勲之後立賢為嗣餘子則以才自調不使混淆而後大防一隳頽波千載凡居近位歳進子孫簮紱盈門冠蓋塞路賢與不肖例升京朝謂之賞延無乃太甚此必前代君危臣僣之際務相姑息因為典故以至於斯又百司之人本避鄉役不踰數歳例與出官莫非貪惡之徒絶異孝廉之舉使親民政其弊如何開此二途歳取百數無所不有實累王風恐非任官惟賢之體也人避衆怨不敢上言遂令仕路紛紜禄位填委文武官吏待闕踰年貪者益勵其爪牙廉者悉困於寒餓徒於禮闈之内増其艱難壯士惜年數歳一舉廼為奔競至有訟爭而况修辭者不求大才明經者不問大㫖師道既廢文風益澆詔令雖繁何以勸戒士無廉讓職此之由其源未澄欲波之清臣未之信也倘國家不思改作因循其弊官亂於上風壊於下恐非國家之福也儻為長久之策則願與大臣特新其議澄清此源不以謗議為嫌當以治亂為意此國家之福也惟聖意詳之臣聞以德服人天下欣戴以力服人天下怨望堯舜以德則人愛君如父母秦以力則人視君如仇讎是故御天下者德可憑而力不可恃也伏惟皇太后陛下皇帝陛下日崇聖德以求服天下之心若夫敦好生之志推不忍之心薄於刑典厚於惻隱在物祝網於民泣辜常戒百官勿為苛酷示天下之慈也唯聖人能之恥珠玉之玩罷組綉之貢焚晉武之雉裘出文皇之宫人少度僧尼不興土木示天下之儉也唯聖人能之雞鳴而起孜孜聴政毎有餘暇則召大臣講議文武訪問艱難此皇王之勤也唯聖人勉之貴賤親踈賞罰惟一有功者雖憎必賞有罪者雖愛必罰捨一已之私從萬人之望示天下之公也唯聖人行之自古帝王與佞臣治天下天下必亂與忠臣治天下天下必安然則忠臣骨鯁而易踈佞臣柔順而易親柔順似忠多為美言骨鯁似強多所直諫美言者得進則佞人滿朝直諫者見疎則忠臣避世二者進退何以辨之但日聞美言則知佞人未去此國家之可憂也日聞直諫則知忠臣在右此國家之可喜也伏惟聖明不可不察自古王者外防强敵内防姦邪强敵侵國姦邪敗德國侵則害加黎庶德敗則禍起蕭墻乃知姦邪之凶甚於夷狄之患伏惟聖明常好正直以杜姦邪此致理之本也臣又聞聖人宅九重之深鎮萬國之望以靜制動以重為威如天之髙如地之深使人不得容易而議也昨覩鑾駕順動稍頻恐非深居九重靜鎮萬國之意况進奏院報於天下天下聞之恐損威重先朝以御宇日深功成天下廵幸之費尚或諫止今繼明之始聖政方新宜加憂勤深防逸豫則人心大恱天道降康不比先帝功成之年未可輕為廵幸伏惟聖慈再三詳覽毎有順動必循典禮以服天下之望臣又聞人主納逺大之謀久而成王道納淺末之議久而成亂政方今聖人在上賢人在側取舍之際豈有未至然而刑法之吏言絲髮之重輕錢榖之司舉錙銖之利病則往往謂之急務響應而行或有言政教之源流議風俗之厚薄陳聖賢之事業論文武之得失則往往謂之迂說廢而不行豈朝廷薄逺大之謀好淺末之議哉伏望聖慈納人之謀用人之議不以逺大為迂說不以淺末為急務則王道大成天下幸甚臣又聞聖人之至明也臨萬幾之事而不敢獨斷聖人之至聰也納羣臣之言而不敢偏聽獨斷則千慮或失偏聽則衆心必離人心離則社稷危而不扶聖慮失則政教差而彌逺故先王務公共設百官而不敢獨斷者懼一慮之失也開言路采羣議而不敢偏聽者懼衆心之離也今聖政方新動思公共委任兩地出入萬幾萬幾之繁能無得失乃許羣臣上言以補其闕使上無䝉蔽下無壅塞有以見聖人之不獨斷也天下幸甚然而臣下上言宻陳得失未可盡信以為實亦當深究其宜或務窺人短長或欲希㫖上下動揺賞罰之柄離隔君臣之情似是而非言偽而辨雖聖鑒之下能無惑焉偶動宸衷無益王道似此宻奏之類更望聖慈深加詳覽與大臣議論可否然後施行倘宻奏之言便以為實内降處分一面施行則讒譛之人縁隙而進以訐為直以詐為忠使内外相疑政教不一非致理之本也古人有言曰為君難為臣不易者其在此乎伏惟聖明不可不察又自古親近小臣率多纎佞恃國恩寵為人階縁公議未行私請先至如此則人皆由徑政有多門伏望聖慈深為防慮以存至公之道也臣曲陋之人本無精識覽前王之得失究聖朝之取捨因敢罄而陳之伏望聖慈詳擇一二干犯天威臣無任戰汗激切屏營之至臣仲淹昩死謹言上執政書天聖五年月日丁憂人范仲淹謹擇日望拜上書於史館相公集賢相公參政侍郎參政給事某居親之喪上書言事踰越典禮取笑天下豈欲動聖賢之知為身名之計乎仲淹謂居喪越禮有誅無赦豈足動聖賢之知耶矧親安之時官小禄薄今親亡矣縱使異日授一美衣對一盛饌尚當泣感風樹憂思無窮豈今几筵之下可為身名之計乎不然何急急於言哉蓋聞忠孝者天下之大本也其孝不逮矣忠可忘乎此所以冒哀上書言國家事不以一心之戚而忘天下之憂庶乎四海生靈長見太平况今聖人當天四賢同德此千百年中言事之秋也然聖賢之朝豈資下士之補益乎蓋古之聖賢以芻蕘之談而成大美者多矣豈俟仲淹引而質之况儒者之學非道不談仲淹敢企仰萬一因擬議以言之皆今易行之事其未易行者仲淹所不言也恭惟相府居百辟之首享萬鍾之厚夙興夜寐未始不欲安社稷躋富壽答先帝之知致今上之美况聖賢存誠以萬物為體思與天下同其安樂然非思之難致之難矣仲淹竊覽前書見周漢之興聖賢共理使天下為富為壽數百年則當時致君者功可知矣周漢之衰奸雄競起使天下為血為肉數百年則當時致君者罪可知矣李唐之興也如周漢焉其衰也亦周漢焉自我宋之有天下也經之營之長之育之以至於太平累聖之功豈不大哉然否極者泰泰極者否天下之理如循環焉惟聖人設卦觀象窮則變變則通通則久非知變者其能久乎此聖人作易之大㫖以授於理天下者也豈徒然哉今朝廷久無憂矣天下久太平矣兵久弗用矣士曽未教矣中外方奢侈矣百姓久困窮矣朝廷無憂則苦言難入天下久平則倚伏可畏兵久弗用則武備不堅士曽未教則賢材不充中外奢侈則國用無度百姓困窮則天下無恩苦言難入則國聽不聰矣倚伏可畏則奸雄或伺其時矣武備不堅則鄰狄或乗其隙矣賢材不充則名噐或假於人矣國用無度則民力已竭矣天下無恩則邦本不固矣倘相府思變其道與國家磐固基本一旦王道復行使天下為富為壽數百年由今相府致君堯舜之功也儻不思變其道而但維持歳月一旦亂階復作使天下為血為肉數百年亦今相府負天下之過也昔曹參守蕭何之規以天下久亂與人息肩而不敢有為者權也今天下久平修理政教制作禮樂以防㣲杜漸者道也張華事西晉之危而正人無徒故維持紀綱以延歳月而終不免禍以大亂天下今聖人在上老成在右豈取維持之功而忘磐固之道哉仲淹竊請相府報國致君之功正在乎固邦本厚民力重名噐備鄰敵杜奸雄明國聴也固邦本者在乎舉縣令擇郡守以救民之弊也厚民力者在乎復游散去冗僣以阜時之財也重名噐者在乎慎選舉敦教育使代不乏材也備逺人者在乎育將材實邊郡使人無覬覦也杜奸雄者在乎朝廷無過生靈無怨以絶亂之階也明國聽者在乎保直臣斥佞人以致君於有道也夫舉縣令擇郡長以救民之弊者何哉仲淹觀今之縣令循例而授多非清識之士衰老者為子孫之計則志在苞苴動皆狥已少壯者恥州縣之職則政多苟且舉必近名故一邑之間簿書不精吏胥不畏徭役不均刑罰不中民利不作民害不去鰥寡不恤游惰不禁播蓻不増孝悌不勸以一邑觀之則四方縣政如此者十有七八焉而望王道之興不亦難乎仲淹恐來代之書論得失者謂相府有不救其弊之過矣如之何使斯人之徒為民父母以困窮其天下又朝廷久有擇縣令郡長之議而不遂行者蓋思退人以禮不欲動多士之心故務因循而重改作也豈長世之策哉倘更張之際不失推恩又何損於仁乎今約天下令録自差京朝官外不過千數百員自來郊天之恩鮮及州縣若天下令録自大禮以前滿十考者可成資日替與職官七考以上可滿日循其資俸除録事㕘軍則縣令中昏邁常常之流可去數百人矣蓋職官録事㕘軍不甚親民為害亦細此謂退人以禮士豈有怨心哉其間課最可尚論薦頗多俟到銓衡别議疇賞前既善退後當精選其判司簿尉仍賜令録之俸其曽任令録有遇該恩合入本資者可依初入之例頒此數條合入者鮮然後委清望官於幕職判司簿尉中歴三考以上具理績舉充其川廣福建縣令可委轉運使等就近於判司簿尉中舉移庶從人便若此後諸處縣令特有課最可旌尚者宜就遷一官更留三載庶其宣政者可以成俗其僥倖者自從朝典如此行之三五年中天下縣政可澄清矣願相府為天下生靈而行之為國家磐固基本而思之不以聴芻蕘為嫌而罷之則天下幸甚幸甚仲淹又觀今之郡長鮮克盡心有尚迎送之勞有貪燕射之逸或急急於富貴之援或孜孜於子孫之計志不在政功焉及民以獄訟稍簡為政成以教令不行為坐鎮以移風易俗為虚語以簡賢附勢為知幾清素之人非縁囑而不薦貪黷之輩非寒素而不糾縱胥徒之奸剋寵風俗之奢僣况國有職制禁民越禮頒行已久莫能舉按使國家仁不足以及物義不足以禁非官實素飡民則菜色有恤鰥寡則指為近名有抑權豪則目為掇禍苟且之弊積習成風俾斯人之徒共理天下王道何從而興乎仲淹恐來代之書論得失者亦謂聖朝有不救其弊之過矣然朝廷以黜陟郡長為難者官有定制不欲動揺懼其招怨謗而速僥倖爾故知縣兩任例升通判通判兩任例升知州奈何在下之時飾身修行邀其清舉居上之後志滿才乏愆於素持止能偷安未至覆餗故賢愚同等清濁一致此乃朝廷避怨於上移虐於下俟其自敗民何以堪故鄭莊公伺共叔之自斃而春秋罪焉以其長惡也易曰履霜堅氷至由辨之不早辨也此聖人昭昭之訓豈用於先王而廢於今日者哉近年諸處郡長以贓致罪者數人皆貫盈之夫久為民患如此之類至終不敗者豈止數人而已乎雖轉運使提㸃刑獄職在訪察其如位望相亞怨仇可敵非致敗露鮮敢發明宜乎論道之間無以激揚天下古者天子五載一廵皇上凝命於今六載矣以軍國重大未可行逺古之道今郊禮之餘宜宣大慶可於兩制以上宻選賢明廵行諸道以興利除害黜幽陟明舒慘四方豈同常務可命御史嚴諭百僚與出使之官絶書刺往返之禮仍翌日省途以禁請託苟利天下大體何傷所出使之官宜以宣慶為名安逺聴也其諸道知州通判耄者懦者貪者虐者輕而無法者墮而無政者皆可奏降以激尸素又四方利弊得以上聞未舉巡守之禮而遣觀風之使非不典也然後委清望官於朝臣通判中舉諸郡長於朝臣知縣中舉諸通判今後通判之官非著顯效及有殊薦雖或久次止可加恩郡國之符不當輕授其知縣之人入通判者宜比此例如此行之天下郡政其濫鮮矣今一司一務猶或舉官一郡之間生靈數萬反可輕授於人乎願相府為天下生靈而行之為國家磐固基本而行之不以聴芻蕘為嫌而罷之天下幸甚幸甚仲淹前所謂官有定制不欲動揺懼其招怨謗而速僥倖者兩宫聖人臨軒命使激揚善惡澄清天下何怨謗之有乎自兹以降非舉不授舉官之責厥典非輕何僥倖之有乎如所舉之人果成異政則宜旌尚舉主以勸來者聖朝未行此典葢亦闕矣縣令郡長既得其才然後復游散去冗僣以阜時之財者何哉仲淹觀天下榖帛厥價翔起議者謂生靈既庶使之然矣仲淹謂生者既庶則作者復衆豈既衆之為累哉蓋古者四民秦漢之下并及緇黄共六民矣今又六民之中浮其業者不可勝紀此天下之大蠧也士有不稽古而禄農有不竭力而饑工多竒噐以敗度商多竒貨以亂禁兵多冗而不急緇黄蕩而不制此則六民之浮不可勝紀而皆衣食於農者也如之何物不貴乎如之何農不困乎仲淹謂榖帛之貴由其播藝不増而資取者衆也金銀之貴由其制度不嚴而噐用者衆也或謂資四夷之取而使之然則山川之所出與恩信之所給自可較之非仲淹所敢知也今議更張之制繁細非一仲淹敢略而陳之夫釋道之書以真常為性以清淨為宗神而明之存乎其人智者尚難於言而况於民乎君子弗論者非今理天下之道也其徒繁穢不可不約今後天下童行可於本貫陳牒必詰其鄉黨苟有罪戾或父母在鮮人共養者勿從其請如已受度而父母在别無子孫勿許方遊則民之父母鮮轉死於溝壑矣斯亦養惸獨助孝悌之風也其京師寺觀多招四方之人宜給本貫憑由乃許收録斯亦辨奸細復游散之要也其天下寺觀毎建殿塔蠧民之費動踰數萬止可完舊勿許創新斯亦與民阜財之端也又古者兵在於民且耕且戰秦漢之下官軍為常貴武勇之精備征伐之急也今諸軍老弱之兵詎堪征伐旋降等級尚費資儲然國家至仁㫖在存活若詔諸軍年五十已上有資産願還鄉里者一可聴之稍省軍儲復從人欲無所歸者自依舊典此去冗之一也又諸道廵檢所統之卒皆本城役徒殊非武士使之禁暴十不當一而諸州常患兵少日旋招致榖帛之計其耗萬億以仲淹觀之自京四嚮千里之間或多冦盗蓋創制廵檢路分頗多而卒伍至羸捕掩無效非要害者宜悉罷之所存之處資以禁軍訓練既精冦盗如取况千里之内抽發非難又使少歴星霜不至驕惰彼無用之卒可減萬數庶使諸郡節於招致此去冗之次也又京畿三輔五百里内民田多隙農功未廣既已開導溝洫復須舉擇令長使詢訪父老研求利病數年之間力致富庶下被什一之稅繼以百萬之糴則江淮餽運庶幾减半挽舟之卒從而省焉此亦去冗之大也至於工之竒噐敗先王之度商之竒貨亂國家之禁中外因之侈僣上下得以驕華宜乎大變澆漓申嚴制度使珠玉寡用榖帛為寳此又去僣豐財之本也今盛明之代何事而不可行乎曩者國家禁泥金之飾久未能絶一旦使命婦不服工又不作於今天下無敢衣者使其餘奢僣皆如泥金之法亦何患不禁乎又播蓻之家古皆督責今國家有勸農之名無勸農之實毎於春首則移文於郡郡移文於縣縣移文於鄉鄉矯報於縣縣矯報於郡郡矯報於使利害不察上下相䝉豈朝廷之意乎若縣令郡長一變其人乃可詔書丁寧復游散之流抑工商之侈去士卒之冗勸稼穡之勤以周禮司徒之法約而行之使播者蓻者以時以度勤者惰者有勸有戒然後致天下富之壽之彼不我富不我壽者豈能革之哉此則厚民力固邦本之道也觀夫國風之七月小雅之甫田皆以農夫之慶為王化之基豈聖人不思而述者乎故周漢李唐雖有禍亂而能中興者人未厭德作亂者不能革天下之心是邦本之固也六朝五代之亂鮮克中興者人厭其德弔民者有以革天下之心是邦本之不固也然則厚民力固邦本非舉縣令擇郡長則莫之行焉或謂舉擇令長久則乏人亦何道以嗣之仲淹謂用而不擇賢孰進焉擇而不教賢孰繼焉宜乎慎選舉之方則政無虚授敦教育之道則代不乏人今士林之間患不稽古委先王之典宗叔世之文詞多纎穢士惟偷淺言不及道心無存誠暨於入官鮮於致化有出類者豈易得哉中人之流浮沉必矣至於明經之士全暗指歸講議未嘗聞威儀未嘗學官於民上貽笑不暇責其能政百有一焉詩謂長育人材亦何道也古者庠序列於郡國王風云邁師道不振斯文銷散由聖朝之弗救乎當太平之朝不能教育俟何時而教育哉乃於選用之際患其才難亦由不務耕而求穫矣今春詔下禮闈凡修詞之人許存策論明經之士特與旌别天下之望翕然稱是其問所存策論不聞其誰激勸未明人將安信倘使呈試之日先策論以觀其大要次詩賦以觀其全才以大要定其去留以全才升其等級有講貫者别加考試人必彊學副其精舉復當深念治本漸隆古道先於都督之郡復其學校之制約周官之法興闕里之俗設文學掾以專其事敦之以詩書禮樂辨之以文行忠信必有良噐蔚為邦材况州縣之用乎天庠序之興由三代之盛王也豈小道哉孟子謂得天下英材而教育之一樂也豈偶然哉行之數年士風丕變斯擇材之本致理之基也又李唐之盛常設制科所得大才將相非一使天下竒士學經綸之盛業為邦家之大噐亦策之上也先朝偶屬多務暫停此科今可毎因貢舉之時申其墜典必有國士繼於唐人豈非邦家之盛選歟勿謂未必得人遂廢其道此皆慎選舉敦教育之道亦何患乏人哉倘國家行此數事若今刑政之用心無不成焉前代亂離鯨吞虎噬無卜世卜年之意故斯道久缺反為不急之務既在承平之朝當為長久之道豈如西晉之禍而有何公之嘆者乎願朝廷念祖宗之艱難相府建風化之基本一之日圖之二之日行之不以聴芻蕘為嫌而罷之則天下幸甚幸甚至於岩穴草澤之士或節義敦篤或文學髙古宜從聘召之禮以厚澆競之風國家近年羔雁弗降或有考槃之舉不踰助教之命孝亷之士適以為辱何敦勸之有乎又流外之官澄清未至沿之則百姓受弊革之則諸司乏人將使羣謗不興衆心知勸不若敦仍舊之制加奬善之方自簿尉兩任有舉奏者許入録事參軍録事參軍有舉奏者許入職事官或換三班使臣既有進身之階豈無畏法之志設使流内之人無遷進之望而能盡公者必亦鮮矣今後百司新入之人或采其藝能或出于仕族行藏必審考試必精避役之人無圖之類嚴革其弊髙為之防既激其流復澄其源亦何患流外之冗乎仲淹又謂育將材實邊郡使人無覬覦者何哉蓋聞古之善禦敵者將不乏人則師戰而不衂邊不乏廩則城圍而不下敵疑且畏罔敢深入此劉漢之所以長也不善禦敵者將在貴臣邊須逺饋故戰之則衂圍之則下敵無疑畏乗虚深入此石晉之所以亡也今兵久不用未必為福在開元之盛有潼關之敗可龜鑑矣何哉昔之戰者耄然已老今之壯者囂而未戰聞名之將往往衰落豈無晩輩未聞邊功此必廟堂之所思也仍聞沿邊諸將不謀方畧不練士卒結援弭謗固禄求寵一旦急用萬無成功加以邊民未豐邊廩未實罷武之際兵足食寡如屯大軍必煩逺饋則中原益困四夷益驕深入之虞未可量也於時廟堂之上雖有皋陶之謀伯益之賛不亦難乎夫天下禍福如人家道成於覆簣敗於疾雷聖朝豈恃其太平而輕其後計王衍之鑒豈曰不明清談之間坐受其弊蓋備之弗預知之弗為許下之兵日血十萬豈不痛心哉今西北和好誠為令圖安必慮危備則無患昔成周之盛王道如砥及觀周禮則大司馬陣戰之法粲然具存乃知禮樂之朝未嘗廢武今孫呉之書禁而廢學苟有英傑受亦何疑且秦之焚書也將以愚其生人長保天下及其敗也陳勝呉廣豈讀書之人哉况前代名將皆洞逹天人嗣續忠孝將門出將史有言焉今將家子弟蔑聞韜鈐無所用心驕奢而已文有武備此能備乎今可於忠孝之門捜智勇之噐堪將材者宻授兵畧歴試邊任使其識山川之向背歴星霜之艱難一朝用之不甚顛沛十得三四不云盛乎至於四海九州必有壯士宜設武舉以收其遺唐郭子儀武舉所得者也斯可遺乎又臣僚之中素有才識可賜孫呉之書使知文武之方異日安邊多可指任此皆育將才之道也又沿邊知同精加舉擇特授詔命專謀耕桑三五年間豐其軍廩此則實邊郡之道也將材既育邊郡既實師戰而不衂城圍而不下敵疑且畏敢深入乎縱有騷動朝廷可髙枕矣前代禦敵其策非一唐陸贄議縁邊備守之術請置本土之兵勤營田之利與今事宜相近可約而行也本土之兵者若今之北邊有雲翼招收之軍更可増致作為竒兵至於營田之利宜常興作而加焉願相府為國家安危思之五代之亂非逺也為河朔生靈思之景德之前未久也今相府勞一夕之思絶百代之恥無使中原見新羈之馬赤子入無知之俗則天下幸甚幸甚聖人曰微管仲吾其被髮左袵又曰民到於今受其賜管仲伯臣也而能安邊境保華夏功髙當時賜及來代况朝廷之盛德乎仲淹又謂朝廷無過生靈無怨以絶亂之階者何哉蓋天下奸雄無代無之或窮為夜舞或起為大盗伺朝廷之過執以為辭幸生靈之怨弔而稱義不然亦何名而動哉今明盛之朝豈有大過亦宜辨於毫末杜其堅氷或戚近撓權或土木耗國或禄賞未均或綱紀未修或任使未平斯亦過之漸也仲淹敢小舉其失以言之國家戚近之人不可不約除拜之際宜量其才非曰惜恩懼乎致冦若力小任重則撓權亂法増朝廷之過啟奸雄之志易曰小人而乗君子之噐盗思奪之矣所謂盗者其奸雄之謂乎今道路傳聞或緇黄之流或術藝之輩結託戚近邀求進貢或受恩賜或與官爵此撓權之漸矣可不畏乎夫賞罰者天下之衡鑑也衡鑑一私則天下之輕重妍醜從而亂焉此先王之所慎也又土木之興久為大蠧或謂土木之費出於内帑無傷財害民之弊故為之而弗戒也仲淹謂内帑之物出於生靈太祖皇帝以來深思逺慮聚之積之為軍國急難之備非謟神佞佛之資也國家祈天永命之道豈在兹乎如洞真壽寧之宫以延燎之災一夕逮盡豈非天意警在帝心示土木之所崇非神靈之所據也安可取民人膏血之利輟軍國急難之備奉有為之惑冀無狀之福豈不誤哉一旦有倉卒之憂須給賞之資雖欲重困生靈暴加率斂其可及乎此耗國之大也可不戒哉倘謂内藏豐盈用不可竭則日者黄河之役使數十州之人極力負資奔走道路豈惜府庫之餘而不用之耶故土木之妖宜其悉罷豈相府之不言乎兩宫之不聴乎又文武百官之禄取兵荒五代之制或職輕禄重或職重禄輕重輕之間奔競者至大亨之世猶患不均豈聖朝之意乎所宜損之益之以建其極又今三司之官差除頗異禄賜弗輕何知弊而不言多養望以自進天下金榖浹於羣胥掊克無厭取怨四海使先帝寛財之命弗逮於民和氣屢傷豐年寡遇曽不謂之過乎蓋由三司之官不制考限不責課最朝受此職夕求他官直云假塗相與匿禍天下受弊職此之由豈聖朝之意乎宜其别制攷課重議賞罰激朝端之俊傑救天下之疲瘵其庶幾乎又古之勲臣賞延於世今則毎舉大慶必行此典自両省以上奏薦子弟並為京官比於庶僚亦既優矣而特毎歳聖節各序子孫謂之賞延黷亂已甚先王名噐私假於人曽不謂之過乎非君危臣僣之朝何其姑息之如是耶遂使廕序之人塞於仕路曽未稽古使以司民國家患之屢有釐革然但革其下而不革其上節於彼而不節於此天下豈以為然哉我相府豈惜一孺之恩不為百辟之表乎又逺惡之官多在寒族權貴之子鮮離上國周旋百司之務懵昩四方之事况百司者朝廷之綱紀風教之户牖咸在童孺曽無激揚使寺省之規剥床至足公卿之嗣懐安敗名未嘗試難何以致逺非獨招縉紳之議實亦玷鈞衡之公此則禄賞未均任使未平綱紀未修之類也斯弊已久何可極乎惟我相府能革其弊能變其極而天下化成不為難矣晉趙王倫石勒之徒心窺天子口責丞相豈非奸雄之人伺朝廷之過乎又今久安之民不經塗炭勞則易怨擾則易驚猛將謀臣威信未著况邊民尚困邊廩尚乏苟有騷動饋運所艱武備未堅敵志可騁既撓之以征戰或加之以飢饉生靈窮匱奸雄奮迅鼓舞羣小血視千里此五代之鑒昭昭焉非止方册之有云抑亦耳目之可接也我太祖皇帝亦嘗有事四方勞於饋運而生靈不敢怨奸雄不敢動者何哉一則餘民久在塗炭乍覩明盛如子得母縱有勞役未甚曩昔此生靈所以不敢怨也又當乗天開之運震神武之威征伐四方動如山壓况躬擐甲冑備嘗艱難猛將如雲謀臣如雨此奸雄所以不敢動也所謂彼一時此一時爾今朝廷豈謂當時之易而不慮今日之難乎又謂保直臣斥佞人以致君於有道者何哉有若人未之病則苦口之藥鮮進焉國未之危則逆耳之言鮮用焉故佞人易進直言易退其致君於有道也難哉及其既病也藥必錯雜而進故鮮效焉及其既危也言必錯雜而用故鮮功焉蓋佞人在矣直人逺矣其悔之也難哉今朝廷久安苦言而不用者勢使之然矣天深戒而不變者禍可畏矣伏聞京師去歳大水今歳大疫四方聞之莫不大憂此天之有以戒也豈徒然乎而京師之災甚於四方何哉蓋京師者政教之所出君相之所居也禍未盈而天未絶故鑒戒形焉不獨恐懼其心必使修省其政國家之德尚可隆天下之道尚可行也倘弗懼於心弗修於政漸盈於禍漸絶於天則國家四海將何如哉或謂國家之災由厯數之定非政教之出若如所論則夏商九疇之書果妖言耶豈欲棄而焚之乎苟天下有善則歸諸己天下有禍則歸諸天豈聖賢之用心哉願黜術士之言奉先王之訓必不謬矣必無過矣至於保直臣斥佞人則兩宫二省之心如日星焉孰可蔽其明乎縱有行偽而堅言偽而辨試於行事人焉廋哉往日不極言而今極言者學陋之人思慮未精又親安之時上懼失禄不幸親今亡矣朝廷或怒之自頂至踵惟忠也又何憂乎倘相府思變其道與國家作長久之計固其基本一旦王道復行使天下為富為壽數百年則福在國家功在相府得與天下生靈長見太平幸甚幸甚竊以五代以來諸侯暴酷視民如芥生殺由之皇朝龍興典章一寛真宗皇帝至仁如天盡心於此内則舉執法之吏外則創按刑之司徒流之間無敢差者若今於教化之道復如刑名之用心亦何患不至乎今縉紳之間多議按刑之司無益於外亦思之未深耳如得其人糾察四方絶斯民之寃恊先帝之志豈無益乎得人而已不可謂川之久平可壊其防也今王刑既清王道可行此天下士人為相府惜其時也或曰天下之事猶指諸掌豈相府弗克行乎亦在兩宫之意爾謂夫人主在上或喜怒生殺或好惡邪正則諫諍之際為臣不易也若乃修四方之政教正百司之綱紀澄清風俗相府之職也豈必兩宫之意乎倘相府疑仲淹之言謂欲求聖賢之知為身名之計豈不能終喪之後為歌為頌潤色盛德以順美於時亦何必居喪上書踰越典禮進逆耳之說求終身之棄而自置於貧賤之地乎蓋所謂不敢以一心之戚而忘天下之憂是不為身名之計明矣觀前代國家當其安也士人上言論興亡之道非聖王賢相則百不一采及其往也則後之史臣收於簡策為來代之鑒今日之言願相府采其一二為國家天下之益不願後之史臣收於簡策為來代之鑒狂斐之人誅赦惟命以廟堂深嚴恐不得上乃敢相門之下各致此書庶有一逹於聰明干犯台嚴下情無任惶恐激切之至不次仲淹死罪惶恐再拜上晏侍郎書天聖八年月日具銜范仲淹謹齋沐再拜上書於資政侍郎閤下仲淹近者伏䝉召問曽上封章言朝廷禮儀事果有之乎仲淹嘗辱不次之舉矧公家之事何敢欺黙因避席而對曰有之遽奉嚴教云爾豈憂國之人哉衆或議爾以非忠非直但好竒邀名而已苟率易不已無乃為舉者之累乎仲淹方一二奉對公曰勿為彊辭仲淹不敢犯大人之威再拜而退退而思之則自疑而驚曰當公之知惟懼忠不如金石之堅直不如藥石之良才不為天下之竒名不及泰山之髙未足副大賢人之清舉今乃一變為尤能不自疑而驚乎且當公之知為公之悔倘黙黙不辨則恐搢紳先生誚公之失舉也如此仲淹何面目於門墻哉請露肝膂之萬一皆質於前志非敢左右其説惟公之采擇庶幾仲淹進不為賢人之疑退不為賢人之累死生幸甚死生幸甚仲淹天不賦智昩於幾微而但信聖人之書師古人之行上誠于君下誠于民深切自謂有憂天下之心由是時政得失或嘗言之豈所謂不知量也蓋聞昔者聖人求天下之言以共理天下於是命百官箴闕百工獻藝則大臣小臣無非諫也建善旌立諫鼓諮芻蕘采謡詠斯則何逺何近咸可言也此誠歴代令王懼上有所未聞下有所未逹特崇此道以致天下之言俾九重之深無所蔽也亦必憂國大臣懼義有所未從諫有所未上復廣此道以致天下之情冀萬乗之心有以動也仲淹又聞事君有犯無隱有諫無訕殺其身有益於君則為之衛顗曰非破家為國殺身成君者誰能犯顔色觸忌諱建一言哉亦忠臣之分也而曰不在其位不謀其政者謂各司其局不相侵官如當二千石之位則不責尚書之政當尚書之位則不責三公之政非言畧之謂矣又曰天下有道庶人不議蓋言有道之朝教化純被則庶人無所議為仲淹登進士第由幕府歴宰寺為九卿之屬似非庶人敢不議乎如云逺不當諫則伯夷叩馬諫武王豈近臣哉太公謂之義士夫子稱其賢人曽不以逺而為過也至於潁考叔曹劌杜簣弦髙魯仲連梅福之徒皆逺而謀國者也前史嘉之况國家以公之清舉置仲淹於近閤同文館之列唐文皇於此延天下之才使多識前言往行以諮政教之得失備廊廟之選用如朝廷延才之意不減於前則仲淹事君於此非逺也又聞言未及而言謂之躁今國家詔百官轉對使明言聖躬之過失宰司之闕遺其不預轉對者俾實封章奏以聞則仲淹非言未及而言也若以仲淹好竒為過則伊尹負鼎太公直釣仲尼誅侏儒以尊魯夷吾就縲絏而霸齊藺相如奪璧於強鄰諸葛亮邀主於敝廬陳湯矯制而大破單于祖逖誓江而克清中原房喬杕策於軍門姚崇臂鷹於渭上此前代聖賢非不竒也仲淹患好之未至爾若以仲淹邀名為過則聖人崇名教而天下始勸莊叟云為善無近名乃道家自全之說豈治天下者之意乎名教不崇則為人君者謂堯舜不足慕桀紂不足畏為人臣者謂八元不足尚四凶不足恥天下豈復有善人乎人不愛名則聖人之權去矣經曰立身揚名又曰善不積不足以成名又曰恥没世而名不稱焉又曰榮名以為寳是則教化之道無先於名三古聖賢何嘗不著於名乎仲淹患邀之未至爾仲淹又聞天生蒸民自食其力惟士以有德可以安君可以庇民於是聖人率民以養士易曰不家食吉如其無德何食之有仲淹官小禄微然歳受俸禄僅三十萬竊以中田一畆取粟不過一斛中稔之秋一斛所售不過三百金則千畆之獲可給三十萬以豐歉相半則仲淹歳食二千畆之入矣其千畆中播之耨之穫之斂之其用天之時地之利民之力多矣倘仲淹無功而食則為天之螟為民之螣使鬼神有知則為身之殃為子孫之患仲淹今職在校讎務甚清素前編後簡海聚雲積其間荒唐詭妄之書十有七八朱紫未辨膏肓奈何仲淹棲遲於斯絶無補益上莫救斯文之弊下無庇斯人之德誠無事而食矣所可薦於君者惟忠言耳况我國家以六合之廣四葉之盛撫既濟之㑹防未然之幾兢兢持盈旰昃不暇謂今天下民庶而未富士薄而未教禮有所未格樂有所未諧多士之源有所未澄百司之綱有所未振兵輕而有所未練邊虚而有所未計賞罰或有所未一恩信或有所未充乃詔百官轉對其未預者並許封章此吾君盡心以虚受天下之言也亦天下君子盡心以助成王道之日也然獻言之初上或有所賞於是浮淺僥覬之輩爭為煩言或采其細而傷其大或誇其利而隱其害下冒上之寵而矯其辭上疑下之躁而輕其說此政教之大害也仲淹逺觀五帝三王爵以尚德禄以報功未有賞其空言者至於舜俞禹拜惟重其言而行之逮夫春秋之時則有舉賢之賞唐文皇賞孫伏伽之諫以天下始定而權以進之未始久行焉今朝廷必欲求有道之言在其擇而必行不在其誘於必賞言而無賞則真有憂天下之心者不廢其進焉然後下不冒上之寵而直其辭上不疑下之躁而重其説此政教之大利也仲淹亦嘗聞長者之餘論鬱於胸中而莫敢罄發者恥與浮淺僥覬之徒受上之疑於國門矣仲淹昨輒言國家冬至上壽之禮者斯言有罪必不疑其僥覬矣是故輕一死以重萬代之法請皇帝率親王皇族於内中上皇太后聖壽請詔宰官率百僚於前殿上兩宫聖壽實無減皇太后尊崇之盛又足存皇帝貴髙之體蓋一人與親王皇族上壽於内則母子之義親君臣之禮異與百僚上壽於外則是行君臣之儀非敦母子之義在今兩宫慈聖仁孝之德而行此典則未見其損奈何後代必有舊族強熾竊此為法以仰制人主者矣聖朝既不能正之使後代忠臣何所執議先王制禮之心非萬世利則不行焉或謂五帝不相沿樂三王不相襲禮此何泥於古乎仲淹謂禮樂等數沿革可移帝王名器乾坤定矣豈沿革之可言哉若謂仲淹不知聖人之權則孔子何以謂晉文公譎而不正以臣召君不可以訓書曰天王狩於河陽是諱其權而正其禮也豈昩於權哉小臣昩死力言大臣未能力救苟誠為今日之事未量後代之患豈小臣之狂言大臣之未思也仲淹天拙之效不以富貴屈其身不以貧賤移其心倘進用於時必有甚於今者庶幾報公之清舉如求少言少過自全之士則滔滔乎天下皆是何必仲淹之舉也夫天下之士有二黨焉其一曰我發必危言立必危行王道正直何用曲為其一曰我遜言易入遜行易合人生安樂何用憂為斯二黨者常交戰於天下天下理亂在二黨勝負之間爾倘危言危行獲罪於時其徒皆結舌而去則人主蔽其聰大臣喪其助而遜言遜行之黨不戰而勝將寖盛於中外豈國家之福大臣之心乎人皆謂危言危行非逺害全身之謀此未思之甚矣使搢紳之人皆危其言行則致君於無過致民於無怨政教不墜禍患不起太平之下浩然無憂此逺害全身之大也使搢紳之人皆遜其言行則致君於過致民於怨政教日墜禍患日起大亂之下忷然何逃當此之時縱能遜言遜行豈逺害全身之得乎凡今之人生於太平非極深研幾豈斯言之信哉昔魏晉之亂哲人罹憂至有管寧之徒涉海而遁仲淹今進危言於君親蹈危機於朝廷不猶愈於涉海之險而遁於異域者乎倘以仲淹逺而盡心不謂之忠言而無隱不謂之直則而今而後未知所守矣惟公察仲淹之詞求仲淹之志謂尚可教則願不悔前日之舉而加平生之知使仲淹罄誠於當時垂光於將來報德之心宜無窮已倘察仲淹之志如不可數則願昌言於朝以絶其進前奏既已免咎此書尚可議責使黜之辱之不為賢人之累則仲淹退藏其身省求其過不敢以一朝之責而忘平生之知報德之心亦無窮已恭惟資政侍郎羽翼舊賢股肱近輔赫赫之猷天下所望願論道之餘一賜鑒慮與其進則天下如仲淹之徒皆不召而進矣與其退則天下如仲淹之徒皆不斥而自退矣决天下進退者其在公一言乎干犯台嚴不任戰懼之至不宣仲淹再拜上時相議制舉書天聖八年五月日具位仲淹再拜上書於昭文相公閤下仲淹昨者伏䝉聖恩優賜差任蓋鈞造之際靡不獲所退省疎拙且驚且懼况唐虞舊域風俗淳儉獄無積訟亭鮮過客棲遲偃仰何以報國然嘗試思之似有所補敢不冒黷而言之夫善國者莫先育材育材之方莫先勸學勸學之要莫尚宗經宗經則道大道大則才大才大則功大蓋聖人法度之言存乎書安危之幾存乎易得失之鑒存乎詩是非之辨存乎春秋天下之制存乎禮萬物之情存乎樂故俊哲之人入乎六經則能服法度之言察安危之幾陳得失之鑒析是非之辨明天下之制盡萬物之情使斯人之徒輔成王道復何求哉至於叩諸子獵羣史所以觀異同質成敗非求道於斯也有能理其書而不深其㫖者雖樸愚之心未可與適道然必顧瞻禮義執守規矩不猶愈於學非而博者乎今文庠不振師道久缺為學者不根乎經籍從政者罕議乎教化故文章柔靡風俗巧偽選用之際常患才難仲淹聞前代盛衰與文消息觀虞夏之純則可見王道之正觀南朝之麗則知國風之衰惟聖人質文相救變而無窮前代之季不能自救則有來者起而救之是故文章以薄則為君子之憂風俗其壊則為來者之資今朝廷思救其弊興復制科不獨振舉滯淹詢訪得失有以勸天下之學育天下之才是將復小為大抑薄歸厚之時也斯文丕變在此一舉然恐朝廷命試之際謂所舉之士皆能熟經籍之六義知王伯之要畧則反屏而弗問或將訪以不急之務雜以非聖之書辨二十八將之功勲陳七十二賢之德行如此之類何所補益蓋欲伺其所未至誤其所常習不以教育為意而以去留為功若如所量恐非朝廷勸學育才之道也何哉國家勸學育才必求為我噐用輔我風教設使皆明經之士並練王伯之術問一得十亦朝廷教育之本意也况文有精粗理有優劣明試之下得失尚多何患去留之難乎今或伺其所未至誤其所常習則天下賢俊莫知所守將博習非聖旁攻異端聖人之門無復啟發逮於後舉差之益逺如此則制科之設足以誤多士之心不足以救斯文之弊恭惟前聖之文之道昭昭乎為神器於天下得之者昌失之者亡後世聖人開學校設科等率賢俊以趨之各使盡其心就其器將以共理於天下故書曰咸有一德斯之謂矣願相府為此一舉倘昌言於兩制如能命試之際先之以六經次之以正史該之以方畧濟之以時務使天下賢俊翕然修經濟之業以教化為心趨聖人之門成王佐之器十數年間異人杰士必穆穆於王庭矣何患俊乂不充風化不興乎救文之弊自相公之任也當有吉甫輩頌吾君之德吾相之功登於金石永於天地者矣四海幸甚千載幸甚干犯台嚴無任僣越戰汗之至仲淹再拜南京書院題名記皇宋闢天下建太平功掲日月澤注河漢金革塵積弦誦風布乃有睢陽先生贈禮部侍郎戚公同文以賁於丘園教育為樂門弟子由文行而進者自故兵部侍郎許公驤而下凡若干人先生之嗣故都官郎中維樞宻直學士綸並純文浩學世濟其美清德素行貴而能貧祥符中鄉人曹氏請以金三百萬建學於先生之廬學士之子殿中丞舜賔時在私庭俾幹其裕故太原奉常博士瀆時與賢良始掌其教故清河職方員外郎吉甫時以管記以領其綱學士畫一而上真宗皇帝為之嘉歎而可其奏今端明殿學士盛公侍郎度文其記前參預政事陳公侍郎堯佐題其額由是風乎四方士也如狂望兮梁園歸歟魯堂章甫如星縫掖如雲講議乎經詠思乎文經以明道若太陽之御六合焉文以通理若四時之妙萬物焉誠以日至義以日精聚學為海則九河我吞百谷我尊淬詞為鋒則浮雲我决良玉我切然則文學之器天成不一或醇醇而古或郁郁於時或峻於層雲或深於重淵至於通易之神明得詩之風化洞春秋褒貶之法逹禮樂制作之情善言二帝三王之書博涉九流百家之説者蓋互有人焉若夫廊廟其器有憂天下之心進可為卿大夫者天人其學能樂古人之道退可為鄉先生者亦不無矣觀夫二十年間相繼登科而魁甲英雄儀羽臺閤蓋翩翩焉未見其止宜觀名列以勸方來登斯綴者不負國家之樂育不孤師門之禮教不忘朋簮之善導孜孜仁義惟日不足庶幾乎刋金石而無愧也抑又使天下庠序規此而興濟濟羣髦咸底於道則皇家三五之風步武可到戚門之光亦無窮已他日門人中絶德至行髙尚不仕如睢陽先生者當又附此焉嚴先生祠堂記先生漢光武之故人也相尚以道及帝握赤符乗六龍得聖人之時臣妾億兆天下孰加焉惟先生以節髙之既而動星象歸江湖得聖人之清泥塗軒冕天下孰加焉惟光武以禮下之在蠱之上九衆方有為而獨不事王侯髙尚其事先生以之在屯之初九陽德方亨而能以貴下賤大得民也光武以之蓋先生之心出乎日月之上光武之量包乎天地之外微先生不能成光武之大微光武豈能遂先生之髙哉而使貪夫廉懦夫立是大有功於名教也仲淹來守是邦始搆堂而奠焉廼復其為後者四家以奉祠事又從而歌曰雲山蒼蒼江水泱泱先生之風山髙水長朱從道名述天聖紀號之六載樞宻留守侍郎齊郡公以東朝舊德右弼上賢將啟秉鈞之猷尚圖分政之任善下成乎江海養浩充乎天地誠明之際無隱不及居一日曰祖宗之都儀刑萬邦道德之所興禮樂之所出風化不作四方何仰哉乃首訪膠庠躬省弦誦敦六籍以恢本發四科以彰善於是人樂名教復鄒魯之盛士為聲詩登周召之美既而丘園初秀閥閱令嗣拳拳允集濟濟如歸沛國朱生世嚴冠冕幼苦霜露憫先構之將墜忽中陵之見育公特命就學果知向方豹以革而有文鴻亦漸而無咎公又嘉其遷善以從道而名焉仍命字之云在復之六四曰中行獨復以從道也言能體中而行特從於道以斯而復君子之象請字曰復之庶左右於名矣然則道者何率性之謂也從者何由道之謂也臣則由乎忠子則由乎孝行已由乎禮制事由乎義保民由乎信待物由乎仁此道之端也子將從之乎然後可以言國可以言家可以言民可以言物豈不大哉若乃誠而明之中而和之揖讓乎聖賢蟠極乎天地此道之致也必大成於心而後可言焉朱生其拜公之命勉之哉抑文與學者道之器也以君子乗之則積而不敗不以君子乗之則滿而致覆朱生其拜公之命慎之哉嘻子未預於教也弗學而志窮如玉之未攻如泉之在䝉汨焉而弗見其寳昩焉而莫朝於宗子既預于教也克學而神悟如金之在鑄如驥之方御躍焉可成乎美器騰焉可致乎夷路者也仲淹觀士人中有青衿詩書素髮畎畆名不登搢紳之議目弗接軒冕之姿彼何不遇之甚哉朱生進德有漸屬文未幾始登庠序之列廼被巖廊之知此何遇之甚哉繄爾門之濟美歟抑我公之善教歟論者曰公之㫖也豈徒正爾之名蓋將成爾之德激清學校騰休都邑俾夫多士聳善庶邦成流格美俗於詩書被頌聲於金石致我宋之文炳焉復三代之英抑公之盛德乎朱生振迹於盛德之下發名於善教之始何必申繻之劇論豈異夫子之榮褒者哉當夙夜懐之不墜我公之令訓也其庶幾乎宋文選巻六
