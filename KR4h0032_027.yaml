body:
  text: 宋文選巻二十七張文潛文子産論天下之大患莫大于不量力而不量力之患起於好髙今夫使人皆量力而無慕乎賢已者疑若怠惰而無志而不知夫力之所受於天者莫不有極強任而過使之則將有禍嗚呼怠惰而無志不猶愈于禍歟吾知量力之不可廢也今夫天下之才自匹夫以至聖人其别無窮然大要有三而已上智中人下愚是也昔者聖人之作天下使民之畏也有不待刑使人之愛也有不待賞夫無賞刑而畏愛行焉此天下之絶德也夫惟聖人而後能之而使中人之才其為治也去賞與刑以求天下之畏愛曰吾將學聖人也則亦敗而已矣使量力而行之治刑以明畏信賞以施愛其誰曰不可以為德不及於聖人耶不猶愈于敗乎夫烏獲之力至於舉千鈞而弱者至不舉一石以一石之力而負千鈞則膂絶而死此又天下之所知也昔者鄭國有灾有勸子産使遷國者子産曰吾不足以定遷矣夫遷國以免灾與安坐以待不測之禍二者孰利也然子産知其力之不能及則寧為安坐之計姑求其力之所及者而行之豈其心以謂不能定遷則其患將甚於安坐而待患歟蓋子産常鑄刑書而叔向非之子産卒行之也彼以謂議事以制不為刑辟者非我之所能故也余讀書至此未嘗不切嘆古之君子其知慮深逺而校利害也詳量分審力而不誘于天下之浮説而深悲後世之惑者夫宋襄公之求諸侯徐偃王之行仁義卒無所就而敗隨之而世之人遂悲仁義之不效而余不知二人者果能為文武之事者歟非仁義之負二人二人之負於仁義也或曰天下之士不可好卑而務近而量力之論不可以訓嗚呼使無妄學聖人者是豈使無學其德耶吾惡夫無其德而僣其事者也彼聖人之為聖豈好髙而為之哉其中之所有舉而措之而已使誠有其德吾何愛聖人之事而不使為之哉魯仲連論昔者君子之於仁義其行之非不勤而好之非不篤也然動而不得其中則君子不為是故罪至於可殺則君子不生之以為恩而鄉閭之鬭勢之所不能救則捨而不顧凡天下之事有可以不為而非不義者君子不強以為義也嗚呼君子之道豈固若是恝然而已哉彼誠以為事至於可以不為而無我責而我鰓鰓然求為之以為功則夫世之求為君子者蓋亦甚勞而我之心無乃非出于樂而後為之歟蓋昔者夫子之道未嘗不出於忠恕而其所以待物者亦甚厚矣然陳恒弑其君則孔子沐浴而言之朝告其君而請討之至其不能討而孔子不強於門人有以謂報怨以德者而夫子謂何以報德出而告之朝者吾之所職者止矣鄰國之不討賊非我之責也受人之德而樂之加吾以惡而怨之者是天下之常情也以德復德以怨復怨則理亦足矣故天下之人必將以所樂施所惡則夫為善者不亦枉其情歟彼魯仲連者里閭之自好者耳安知夫所謂真仁義者也以布衣游諸侯而不食其禄不當天下之責而出身以救天下之患功成事止而不享其報此魯仲連之所以為賢歟嗟夫魯仲連之所以為賢乃其所以為戾也夫當其位而後憂食其禄而後勞施其功而享其利解其憂而享其樂者孔子孟子之所不能過也而仲連者獨能不然吾見其越常棄禮亂世敗俗而已矣夫無責而憂人之憂致力而不享其報則使世之中人不勉于義必自仲連始使天下之賢者必如仲連而後可則亦率天下為偽而已矣蓋施義而不當其處者義之賊也嘗聞之昔者夫子之道所以行乎天下後世而不能廢者惟其不強仁義以為賢而不捨仁義以求自便也不強以為賢故為善者不難不捨以為便故不為者有所畏夫人不可不為而為之不難是天下之所以同守而不廢也而後之愚者常欲摩頂放踵以利天下而其自便者不以仁義易身之一毛而天下卒去之然則夫子之道為不易也樂毅論余觀夏侯太初之論樂毅稱毅之書以謂伊尹放太甲而不疑太甲受放而不怨以知毅之心不止於兼并而取毅之不取莒與即墨以謂明信義於天下將縱二城而降之以為王業之所起嗚呼何其言之過歟毅戰國之雄耳其智豈足以知王者之事哉一説昭王之平齊復其數年之仇毅之才盡是矣何以知毅之有心于王者之事哉且以戰國之際士馳説以干時君惟恐其言之不足以動人其所説一切不出于情實則樂生之稱伊尹太甲之事是乘其心歟且毅將燕師一戰而破齊虜獲其重器而逐其君以燕國之弱小而五歳動師于外親所下者凡七十餘城則士卒亦少弊而國之轉輸應接亦少勞矣故頓于二城之下盤桓而不能取且不終樂毅之計而騎刼代之矣由是觀之樂子之不拔二城者是力有所不足未得盡用其計謀而考毅之心固未始有縱二城以示民明信而有意於王業之事也且樂毅常一至臨淄中盡取齊寳財物祭器輸之于燕而下七十餘城其所殺傷不知幾何而即墨之大夫出死於戰齊民之視毅不啻若冦讐而乃欲以不攻二城以明信示民毅之為計必不若是之愚者且方是時田單守即墨單善為兵故其守即墨固而不易㧞耳何夏侯生之妄論也司馬遷稱異時事類蘇秦者皆附之秦故戰國策之事所載多不足信而遷之所載未始有此故余皆不信之商君論昔者商君之治秦貴利尚功明賞罰信號令使其日夜趨於功利之域而無閒暇樂生之心勇于公戰怯于私鬭蓋凡所以養生者非從事於公不可得也不過十年而秦遂以強後世因之以有天下蓋始皇之亡自商君起之而世之議者以謂秦以商君而興而不知商君之術是秦之所由亡也今夫世之善養生者和其血氣平其心志安養而徐用之導引屈伸以宣其滯而導其和故藥石飲食平易而舒緩惟其然故其效也得其所欲而無後患有賤丈夫焉不知其為如此不能忍歳月之勤而急其效于耳目之前於是服毒石餌惡草以激之方其效也剛壯勇力倍于平時然不過數年之後草木之力已盡而遺毒餘孽潰裂四出故癰疽壊决之變一日皆作而不可制至于是而不死者未之有也嗚呼用民之道亦何以異于此昔者三代之聖人也其得天下也不為旦夕之謀揉伏其民而和輯其國一出于愷悌忠厚之政使其民無勉強不得已之心故其功成事立而民莫有厭之之意是以享國長久而無後憂彼商君以謂仁人之術非所以速功朝有所為而夕望其利日夜峻治其刑罰以驅廹其民斬艾懲創以齊肅其怠惰之氣汲汲然常若不可以終日故方其效也所求者得所敵者破徭役使令莫不如意然至於後世天下已定而吾之所欲已得而後前日慘毒之志乃始大發而不可制故更二世而秦亡原其所以取怨于下者豈一日之積歟嗚呼商君實首之也夫民之力人之血氣一也可以徐治而不可以求近功夫欲求近功則必出于深刑痛罰毒石惡草夫四者用而危亡之禍可立而待故曰商君之術是亡國之術也應侯論余觀應侯之入秦其心未嘗不在穰侯也彼范睢困苦展轉既瀕于死其求報于魏也切骨腐心不可終日故其將奪穰侯之位而代之也慎重周審不敢輕發非如朝遊夕説之士徼幸一言而勝之何者其怨魏之心重故傾穰侯之心必傾人之心必則其計必出于萬全故其上秦昭王書曰其深者不敢載之于書及見秦王乃先言越韓魏以伐齊之非計也陽陳外事以嘗秦王之心而自固其權事成勢固乃一言穰侯太后之專恣不終朝而逐之則睢之憚穰侯而不敢輕發豈不甚哉太史公所序睢事如此乃言睢之始見秦王誤入永巷聞有穰侯太后而不聞有王也何言之誤耶且睢與秦王相得數年而後敢言穰侯太后之事者知己之與王交宻勢定而計穰侯之不能奪之也其始不敢載之于書一見秦王而不敢及之者知徒嬰其鋒不足以成吾事而吾將受其禍故也且一見秦王而語穰侯太后之惡如此彼獨不畏穰侯之聞之歟以匹夫無援之分而斥骨肉子母之親非獨取患於穰侯秦王亦且逐之矣彼睢之入關料穰侯惡諸侯之客下車而逃之其為計如此萬有一幸而得見王徐徐而圖人何所不可而遽為是鹵莽之計哉且秦自孝公以來操法繩下最嚴于宫闥之禁所以自衛者皆以峻法防其下故荆軻刺始皇而殿下之兵不敢輙動安有誤入永巷事耶揚子曰子長多愛竒也此亦好竒之過歟呉起論吾讀呉起傳觀與田文論功發三問文不得二然則起之才豈淺淺者耶及田文為之言主少國疑大臣未附百姓不信當是時屬之子乎屬之我乎起曰屬之子矣吾嘗疑起之才何獨短于此而不敢與文較及觀起之相楚方悼王之死未幾而楚之宗室大臣起而殺呉起方是時悼王死起相新君可謂主少國疑矣起也于是乎不免然則起之才是誠短于是則其始無以抗田文之言蓋無足怪而田文之于知人也亦明矣然則田文之知起之不足以處此者何説也起之為人也明厲而不逹于變從事于法而不知權是二者蓋相疑國輔少主親未附而安亦信者之所深忌也昔者鄭國有難而子孔當國乃為載書以序位聴政辭而子産請焚之夫子孔之序載書叙羣臣而使之聴政豈有所不可哉而子産請焚而鄭國果定何哉蓋誠未加于物則吾之所為衆之所疑故急之則亂繩之則怨方是時法有所不行是非有所不較徒知吾法之不欺而不顧物之情此取禍之道也故曰衆怒難犯專欲難成蓋當新造之國與夫衆情反側之際者不可以求定乎法而取必于理之是非而其權乃在夫人情可否之際此子産所以焚之而國定也史稱呉起治楚明法審令捐不急之官廢公族疎逺者夫起當新難之國輔未壯之主而馭不附之大臣與不信之百姓而其所行苟若是而不知變是其死也不亦宜乎嗚呼智士因變聖人乘時一龍一蛇與化推移庸得而制之哉吾悲呉起之志故論其説云陳軫論陳軫之辨不及蘇秦張儀然軫常從容于戰國之際而儀秦汲汲不能補其所不及秦以客死儀迯于魏其周流諸國不得少休用智巧而為力勞何也蓋遊説不可取必于一端而儀秦之術一定故也何者蘇秦必于縱張儀必於横夫一室之人不同心一日之心不同事以叛散相傾之六國而使之一心以為縱雖孺子知其不可以久此蘇秦之所窮且天下嘗見為縱之利矣一日而散為横雖足以解約然合散未可必此張儀之蔽也縱者不敢横雖見横之利而不敢陳也而游説以非之是強其所不親横者不敢縱雖見縱之利亦不敢陳也而強詞以亂之是讒其所不怨強其所不親是交胡越之道也讒其所不怨是間兄弟之道也天下固有胡越之可親而兄弟為可間者矣然其親與間之際勞矣且夫胡越者是必親之而後可兄弟者是必間之而後可中道不幸而謀失者必敗故儀秦之身顛沛而瀕于禍者數矣秦以此死而儀僅以免故縱横者危道也横常負天下之責縱則任天下之咎故縱而散者蘇秦負其責横而合者張儀任其咎然天下之勢故不一要之合散必不可以一定夫操不可以一定之勢而身當其任故曰縱横危道也陳軫之智不逮二子而不主縱横之任乘勢伺變而行其説故其為説不勞而其身處於安佚然則陳軫者其説士之巨擘者也田横論余讀田横傳横之將死告其客予與漢王俱南面稱孤今漢王為天子而横乃為亡虜而北面事之其恥固己甚矣讀韓王信陳豨盧綰等傳切怪此數人者其受漢恩亦厚矣或拔于士伍而王之或皆恩暱親黨然少不得志則起而為亂蓋其所素蓄積未常不在于亂特因事而後發而考其本心蓋亦如田横之所恥者耶夫髙祖以匹夫將羣雄取天下非有德義禮樂以畏懐天下之心而其下非有樂推不厭之意髙祖特以才勝之爾故怏怏以就北面乃其所甚恥而禍亂起于恩暱親黨之際亦無足怪也故國之興也不以仁而君臣無禮義以相與而以利合則國之所以存者幸也今觀髙祖之時韓王信首反以招陳豨而盧綰隂使匈奴與豨連衡而淮隂謀亂于長安内外禍結髙祖奔走不息而僅勝之一有不及天下非漢矣漢之所以存庸非幸乎文王之興也商士膚敏祼將于京商士從之矣而况周人乎則恩暱親黨之際可知也商之興也曰非商求于下民惟民歸於一德則其有天下非一日之幸也嗚呼漢與三代文王之際異矣陳平論余觀陳平使人刼酈商使其子説吕禄陸賈勸陳平以百金交歡絳侯而平勃日以親卒用此滅吕氏未嘗不切嘆也夫士不以仁義相與則其於利害之際其能不以詐謀相欺者鮮矣酈商為列侯事髙祖十餘年其視吕氏之危漢其心豈能無惻然哉雖不刼之豈不肯使其子也絳侯漢之大臣雖無百金未必與平異心也平之心豈不知酈商絳侯之未必背漢也然必為是之區區者其心不能無疑於此二人故也彼其不能無疑者何也士必以仁義相與而其合也以權利則其利害之際安能無疑者昔周公為師召公為保而不悦周公詳説而審諭之夫師保之際有所不悦而周公不忌焉諭之以義開之以理而已嗚呼聖賢之事為不可及也蕭何論髙祖論蕭何為漢三傑之首及論功行封為諸將百計諭曉卒以何為第一髙祖之待何也可知矣髙祖之有何是人之有五臟木之有根魚之有水也使何雖有大過猶將容之然一日與民請苑中地髙祖發怒奮然如斥奴𨽻使有司械繫辱之而不疑此在常人為之則必以為狂易反常而髙祖獨安為此其心蓋有説也髙祖知何之才而不能不疑者也何之居關中用鮑生邵平之説而帝乃大説二生之説淺夫畏嫌之常情也而其術足以當帝之心是帝于何未有無間不疑之至信也吾未能安枕于何之心則其心惟恐其恃功驕恣而以我之不忍侵辱之也故以天下之大功一日有㣲罪則以奴𨽻之辱加之而不疑使何意知我之不憚侵辱之如此者務以抑去其驕蹇之意此髙祖之術也其後絳侯立文帝以天下與人論功宜如何一日有疑謗下之獄吏幾死而僅免夫文帝非不德絳侯其心未免于疑如髙祖之于何也雖然絳侯吹簫之羈民其驍武勇鷙疑其恃功而喜亂恐其驕而抑折之可也若蕭相國謹為德厚之君子雖共天下可以無疑而馭之乃與韓彭同術然則文帝得之髙帝過矣子房論天下之善辨者不過能折天下之人以理而已矣夫折人之情使從于理惟畏理者而後能從之彼無所顧於理者雖極天下之理而與之辨彼將漠然而不信蓋言至於此而後不足恃是故莫若示之以事而動其心夫天下之人雖不顧於理有所不畏然至於心之所不樂亦不為也昔者鄭莊公疾叔段而出姜氏夫子出其母天下之大惡也彼其民必有以不義而正之者矣而莊公卒為之然則是雖有諫者而不聴也至於頴考叔為一言于飲食之間而莊公若不可以終日易其平日忿疾之意為孝弟不忍之心是何也蓋莊公不可以言奪而可以心相感天下之人固有告之以禮樂孝弟而不諭者然退而視其所為未必不愛其父母而樂其兄弟矣則外雖不免於愚而心之智猶在也吾之智足以發其心則彼固無俟乎區區之辨折而使之矣子房之立惠帝其説近是矣彼髙祖之為人出於草莽戰爭之中豈知所謂廢嫡立庶之説耶故叔孫通之徒極其説而不納亦無足怪也至於子房乃引四老人而輔之從容於片言之際而太子得不易雖有戚姬如意之愛而卒不能間彼子房以謂髙帝者雖非理之所能曉至於感之以利害之計則猶足以抒其平日之惑彼能屈其所難致者而為之臣則天下之心歸之而吾捨之則必有禍彼髙帝雖不顧天下之所當立而亦知天下之所歸者之不可易也此子房之所以謂智歟故折人於理從者十五感其心而動之從者十九夫人之于理其信與否相半也故十得五而人有感於心則無不從雖天下之至悍未有行其所不樂者也故十得九其後唐武后欲以武氏易唐而中宗已極危矣彼獨傲然不顧其下雖有忠諫無所用之蓋人以為説者皆其所忽故也其後狄仁傑為之一言以感動其惻怛之情而唐遂以濟嗚呼是子房之術也魏豹彭越論余愛司馬遷論魏豹彭越之不恥囚虜以至刑戮也曰彼無異故智略絶人獨患無身耳得攝尺寸之柄其雲蒸龍變欲有所㑹以故幽囚而不辭嗚呼何其論之之至也漢自髙祖之後其將在者皆常才中人而其名將皆已誅死族滅彭越以疑死韓信黥布相繼以反誅余嘗疑漢之於功臣少恩如是推遷所論而後知髙祖之誅功臣勢變之不獲已而世之論髙祖不善馭功臣如光武故相繼族誅者皆妄論不推原當世之故常試論之曰秦之亡豪傑並起世之英雄才過十人者無不興起而士大夫去戰國未逺其人皆有六國豪傑之遺風故其用兵行師有可稱述方此時人人皆有帝王之心如韓信之徒其屈體為臣者其初心豈將屈體委身而已乎髙祖豈不知其然而收之者何也夫操白挺驅市人而爭天下非得如斯人者則誰肯為吾使彼亦將有所寄以求所欲也彼之視髙祖猶髙祖之用二人何則兩各有所私利而非君臣之分故也且彼之所以臣我者非有至誠之心而不厭其所欲則反顧而去耳故非裂天下而王之其勢不可使故固陵之敗子房勸髙祖分王韓信彭越且是時天下之地分於二人者何啻十五而子房不敢愛者不如是不足以留二人故也夫以英雄好亂之姿無君臣至親之分而據萬乘之強國此其勢非得天下則不厭何則如韓信彭越之徒束手為虜而不恥者其心猶冀萬有一不死而庶幾得尺寸之柄以施其智而况南面稱王據有甲兵士民之衆肯帖然而為人之下哉嗚呼髙祖安得髙枕而卧也昔楚王田於雲夢有熊當路而不去弓矢戈㦸之力不能殺王患之或曰南山之虎其勇無敵方饑而休驅而逐熊其能勝之哉王曰善驅虎當熊未及死而王之左右六鈞之弓百鍊之戈當虎之衝虎食熊未盡而殺之矣夫楚王之用虎非樂使之也非是則無能勝熊者矣其殺之也非有疾怨也不殺且及我矣彼虎之視熊其與視楚王無以異也不乘其便而殺之一失所制則後雖欲殺不可得矣虎之食熊非為我除患也勢驅之而不知其為人怒也故髙祖之用三人非樂使之無是三人則項籍不為我擒矣髙祖非以怨殺三人也知其終不為我用故也三人之為我亡楚也非為至誠欲王漢也勢有動其心故也為長者之論曰漢封功臣其地太過故及天下既定當明制度别上下稍裁之庶幾矣嗚呼彼晏坐無事猶狼顧其上况削之乎故髙祖于是三人者不得不分天下而封之而三人者封之亦反削之亦反其勢必誅之而後定故余悲髙祖於此有不獲已焉衛青論自古中和深厚之士可以保富貴處功勛而不足於名髙輕俠慷慨之士立可喜之行者可以為名髙而多履危禍二者若皆有所不足然為可喜以取名者其技止此耳使為中和深厚必不可得而中和深厚之士其於取名驚世者或者能之而有不為也司馬遷論李將軍之死曰知與不知皆為流涕論大將軍曰以柔自媚於上其於天下未有稱之愚意李廣之所為青之所不願而非不足也以青為奴虜庸人遭時幸㑹以取富貴者耶則汲黯不拜大將軍曰使大將軍有揖客顧不重耶青由此益重黯李敢怨其父死至擊傷青青為諱不言青知揖之重於拜權足以報敢而為諱之懲田竇之事至絶口不荐士不斬蘇建使歸命天子言之如不快人意而其知時見逺皆中幾㑹青顧不能交議夫籍福之歡而為使意斬伐者之所為耶凡此類非庸人所能也使非庸人而為此則必有道矣而遽欲賢廣而貶之不亦過哉夫好名之士常鼓舞於壯鋭可喜之節而不快於持重逺見之士廣之所為天下之輕勇者好之其明者未必善也後世論郭子儀李光弼二人者未嘗不右子儀夫善戰而有謀果敢而精鋭是數者子儀若不及其寛緩仁愛宜若魯鈍矣而卒過光弼者何也子儀之所長光弼之所不能光弼之所長子儀或未必為是故也淮南王與伍被為反計而被獨稱大將軍以折之彼其仗節死義則憚汲黯用兵决戰則忌青然則為天下未有稱者又果然哉司馬相如論司馬相如雖以文章事武帝而慨然有君子之風蓋其心不專以其技易寵禄又有不忍欺其君者東方朔論上林苑害民田號為正諫咈人主之欲而相如上林賦其終所陳與方朔何異且相如事景帝游梁羈旅不偶亦思泰矣起而逄其合持末技以求售此常人之情惟恐失其意也愛惡未可必而諫及之此其心似不志於利者也其後為帝開夜郎通西南夷既至蜀得其父老之説頗自悔其失作書為諭蜀而實以風夫既已開其利於前矣徐覺其害又不忍黙然此其心似不忍自欺者與夫遂非而忍媿者亦異始相如亦自以慕藺相如彼其從來有足觀者矣司馬遷論上司馬遷作伯夷傳言非公正不發憤而遇禍灾此特遷自言為李陵辨而武帝刑之耳論管晏之事則於晏子獨曰使晏子而在雖執鞭所欣慕焉遷之為是言者蓋晏子出越石父於縲絏而方遷被刑漢之公卿無為遷言故於晏子致意焉且方李陵之降其為漢與否未可知而遷獨激昻不顧出力辨之如此幾於愚乎與夫時然後言片言解紛者異矣不知其失而惑天道之是非何哉至怨時人之不援已於禍而拳拳晏子遷亦淺矣司馬遷論下司馬遷尚氣好俠有戰國豪士之餘風故其為書叙用兵氣節豪俠之事特詳其言侯嬴自殺以報魏公子而樊於期自殺以頭遺荆軻皆竒誕不近人情不足考信以嬴既進朱亥以報魏公子不自殺未害為信而樊於期自匿以求苟免尚安肯憤然刼以浮詞以首遺人哉此未必非燕丹殺之也余讀刺客傳頗愛曹沬豫讓之事沬有補於其國而讓為不負其君然皆不合大義而庶幾可謂好勇者如聶政荆軻之事此特賤丈夫之雄耳予觀竇嬰田蚡灌夫之事考嬰與蚡皆庸人不學其所立無可稱録而灌夫屠沽之人也鬭爭於酒食之間不啻若奴妾是皆不足載之於書而遷序聶政荆軻竇嬰田蚡之事特詳反覆叙録而不厭蓋其尚氣好俠事投其所好故不知其言之不信而忘其事之為不足録也趙充國論余讀趙充國傳觀其用兵决策若可以有竒功然提大兵對五方之先零持久頓兵數年而不决其取之也又非有竒變可喜之功蓋嘗疑其多畏而少斷及見其言兵勢國之大事當為後法而後知其非徒然也夫先零之事㣲矣然其規畧即古之謀臣智士之遺法也古之善計者未嘗一日不志於功名而不肯為僥倖之利而其術本於觀時時非吾之所能為而吾能引而致之不然則安坐以待其變捨是未有肯妄動者夫提兵决戰斬級捕虜以與敵鬭吾可以有功而不可以無患也未可以無患則變生不常而勝負未有所在謀人之國都而吾之勝負未有所在是天下之危道也充國闕非離其交黨遣其降者以亂其腹心培之於覆亡乃徐待其勢而後振之夫充國豈以謂力戰决死為必敗哉以謂善戰者其法不當出此故也昔余嘗怪武帝用衛青霍去病出萬死萬戰以蹂踐匈奴之疆此兩人斬馘降虜不可勝數單于逺遁漠南空虚而終不能得志至其晚年漢與匈奴兩不振矣唐太宗與頡利臨渭水而盟方是時内有太宗之彊而李靖李勣為之將帥致頡利於室中而閉其門覆軍殺將何求而不可太宗意不出此而其後頡利危殆國中空虚李靖以五千騎談笑而滅之夫武帝之無大功何也戰匈奴之彊而不能致匈奴於弱而後戰而太宗之明知頡利之方彊雖足以取而未可以無患李靖以孤軍而功過衛霍之百戰彼惟得其時故也其後太宗舉國以取髙麗猛將鋭卒自以無前而頓兵堅城逡廵而退何則蓋蘇文之雄而欲以亡國處之過矣髙宗之時蓋蘇文既死則用一李勣取之而有餘夫勣之才豈過太宗我敵之時異也勾踐與范蠡百計而謀呉勾踐不能忍而欲發也數矣蠡獨不可而至稻蟹之變則遂起而不疑何則彼之至計不獨以一戰為也故充國以善戰之才謀五方之衆至百計蹙取稱年而後成彼非惡速戰也以謂此用兵之法也陳湯論余觀漢公卿論陳湯矯制斬郅支之賞其守常不通者則曰是不當賞且開後奉使者乘危㣲倖生事夷狄而竒其功憤其為庸臣所詘者則稱譽賛説大功不録小過大美不疵細瑕宜加尊寵以勸有功此劉向之論也夫奮不顧身决計出竒以孤軍取單于之頭梟之藁街自漢擊匈奴以來未有能如此者而欲以一切矯制生事謂之有罪而赦之不使有尺寸之賞此天下皆知其不近人情而人不服也然湯之還使朝廷遂厚賞之一不問其矯制如受命討伐而有功者則亦不可何則大臣不待命而有功恃其功以邀我則亦為國者之所病也故劉向之論善矣而未盡也元帝遂從而賞之愈於賞不才也所以為説則終亦未有以服惡矯制者之論惜乎無有以余説語之者矣所惡夫賞矯制而開後患者謂其功可以初踵而比肩者也隂山之北凡幾單于自漢擊匈奴以來得單于者幾人終漢之世獨一陳湯得單于耳兵不可以常徼倖而立功者又寡少如此則裂地而封湯乃著之令曰有能矯制斬單于如陳湯者無罪而封侯吾意漢雖欲再賞一人而未可得何遽有邀功生事之憂哉故上足以尊明湯之有功褒顯之而無疑下不長來乎徼功生事之論天下之善計也古之為法者行法而已矣人情當夫事實而亦不使之不可繼凡若此也昔者韓患秦之無厭也下令曰有能得秦王者寡人與之國大夫皆諫曰賞不可以若是其重也韓王笑曰得秦王而寡人與之國是賞有再乎且得秦王矣寡人其憂無國哉是賞湯之説也邴吉論邴丞相為人至深厚也余獨有恨焉敵入雲中詔問丞相御史以敵所入郡吏御史不能對得譴責而丞相能具知至見為憂邊思職夫吉之能知馭吏之力也夫平日不知從事於其所急而一時際㑹於他人之力亦可以為徼幸矣謂之真憂邊思職也可乎因徼幸以得譽遂從而冒之坐視人之得譴責而不分謗則亦少欺矣龔遂因王生一言天子以為長者遂不敢以為出已曰此乃臣議曹教臣夫遂之能歸功于君其善㣲而不諱人之善其德厚矣方天子讓御史吉如曰臣與御史等耳臣之僕有先白臣者臣是以知之此其為能豈獨憂邊思職而已哉世人有未常射挾弓注矢一發而中不知者曰天下之善射者也其人不讓則知之者笑之矣邴吉脱宣帝於死能絶口不道獨貪一馭吏之功殆必不然傳曰思則得之不思則不得也其未之思歟夫冒徼倖之福而安處之此庸人之所常行獨為邴丞相恨也王鄭何論昔孔子論令尹子文陳文子皆以忠清與之而不與之仁管子之德不及二子逺矣而以仁與之何也夫仁之為道雖大然其實以濟物為本濟物之事非一善可以當之必其才德為世所賴得我則存非我則亡我之所在家安而國治如是則有一大不善為不仁而有小不善於仁未害也余觀王祥鄭冲何曽三人者考其行事之迹從容無事之際雖謂之君子可也然為魏大臣隂相司馬氏以喪魏室卒導而授之夫平日則我慎君子之行忽而當事則為小人所不忍為此所謂色取仁而行違在家在邦必聞者也昔西漢之衰有似乎此孔光師丹皆盗當世賢君子之名而或屈乎董賢或廹於王莽使為奸者反依之以取重嗚呼治天下其不可以無才智骨鯁之士也淮南王欲為亂獨憚大將軍與汲黯畏衛青畏其武畏汲黯畏其直也夫世固有德不足以化奸才不足以止亂而可以謂之仁人君子乎夫使令尹子文陳文子當管仲之任則不勝矣李德裕曰平淡和雅世所謂君子者平居必不能急病理煩當難必不能捐軀濟厄可以羽儀朝廷潤色名教如宗廟瑚璉園林鴻鵠者此數子之謂張華論裴頠勸張華以黜賈后而華不可其言曰聊以優游卒歳當時華有天下之望奸臣孽后切齒於華久矣雖不舉大事可得優游卒歳與華之知寧不知此而為是言何也夫華為之亦死不為亦死徼倖苟免自安之言耳方是時華之計無可為者矣與外臣為仇則賈后得藉口以誅之與孽后為怨則彊王援以仗正而行其意起貧賤取富貴既無素履之髙文名重累自衆所不置已有遯尾之厲嗟乎華於是時蓋知不免矣自古為是言者不以賢不肖皆不免者董卓築郿塢曰事成雄據天下不成守此塢夫事不成而塢可得而守歟卓雖愚亦知之矣曹爽不能用桓範之計而曰不失為富家翁其措意亦如此華之優游董卓之守塢爽之富翁皆知不免而僥倖苟且之言耳不足論也士之謀身亦可悲也夫王導論余觀王導之為晉有以也哉自古開國建邦尚功利修戰伐其俗好戰喜功其國家法度修立若是者必連彊而無内亂然當其亡也必為大敵取之何則法制素立人畏而不敢犯夫無内亂雖國小勢單而有所恃必敢鬭其人才可用則不能下人夫小國敢鬭而不下人大國之取也呉蜀是已諸葛亮治蜀法制謹宻兵武修立糧儲豐而器械精故以區區之蜀而魏人不敢犯亮既死姜維恃其餘力黷武好戰而魏取之孫權之為呉也江東才武之士悉用而無遺其將帥多可用之才權既死而規畧風聲不改其舊孫皓不肖俯俛畏縮為自守之計時用其武而晉取之故曰小國敢鬭而不下人大國之所取也夫政和俗弱畏患自守者多内侮其弊也内之彊有力者取之然不待其力盡勢窘則不亡何則内有彊力之臣而無所忌則必起然國人未去則取之也難非極弊不可復振之際則不可得東晉是也導相元帝於江東所以立國者不過賔延賢士招禮名勝設學校謹選舉力為寛仁和厚之政而已夫當西晉之末夷狄並起天下大亂非有商君管仲之節制刻深以圖功利起怠墮收蓄天下才勇之士不畏勞苦往反與之深入力爭未有能立者也而導顧為此豈其才不足歟或者曰導之意以謂限長江而與關洛交兵相元帝而與劉曜石勒爭雄駕御賀循紀瞻之徒而與夷狄馳逐此百舉而百敗曽不如勿為之愈也是以置江北之紛紛而為保國之計苟為後世不遽亡之策而可矣夫王敦蘇峻之内侮桓温桓元之倔彊大則君廢大臣誅小則控制上流而朝廷奔命宜若朝夕而亡矣卒之劉裕取之於陵夷甚弊之後是固導之深圖也齊之政強魯之政弱魯朝齊而齊先亡乃自古然矣屈突通論屈突通知隋之亡力不足以救也審矣然力盡勢極猶為萬一之計其心皎然未負隋也通未及死而被擒其不死者非自免也唐赦之也唐之為隋之仇明矣通不負其所事而捨其生然忘其仇而食其禄責通報其怨非也天之所與者通安得而報之君子於其仇度非其所得報則不敢行其私然亦不敢忘其私故食其禄者通之罪也凡負恩圖存於可為之時者得罪於通可也忠亦不足為矣裴守真論先王之禮不明於世日以廢壊遂至於滅亡者其初未始不自於䛕夫盗儒苟欲媚世主之私而不務行先王之意而俯從今世之便也先王以至誠仁義之心誠意於禮樂之際齋明盛服如臨師保父母之嚴一有不中㓙咎從之而使後世之汚君習於安樂驕傲者勉而為之其欲捨而從我也固己不勝其怠而䛕夫盗儒又從而為之解説旁引曲取既使之便其私意而又曰自義理之所安嗚呼先王之禮何從而興乎秦并六國典禮盡滅髙祖撥天下之亂庶幾其有興矣而叔孫通阿其意不能尊其所聞而行之乃為是苟且滅裂之具而漢之禮終以不明則起於叔孫通之狥其君余讀裴守真傳守真善容與為大常博士當時謂才稱其官至論射牲禮曰古者天子自射牲漢遣侍中今天子奠玉酌獻而已可也古今異宜不必射牲破陣慶善二舞入天子為起守真言古無天子立觀舞者請從古夫射牲古也古也勞而今也佚則從今立觀舞今也今也勞而古也佚則從古守真非能法古也特從其佚便使人主便之而已夫先王之禮惟惡夫好便而無制者而後為是曲折制度之嚴也使有司之禮近於人情者非其至也嗚呼自秦漢以來天子之車金珠翠羽婦人之衣竒文巧畫房闥之玩山靈鬼怪可駭之物雕韋織毳戎狄之用皆有之矣推其禍本亂原未有不起於好便安者為之也夫一守真不足道也而世遂謂才稱其官則知史説偷風瞽俗相扇而不知恥也可勝嘆哉韓愈論韓退之以為文人則有餘以為知道則不足何則文章自東漢以來氣象則已卑矣分為三國又裂為南北天下大亂士氣不振而又雜以蠻夷輕淫靡嫚之風亂以𦍑人悍魯鄙悖之氣至於唐而大壊矣雖人才衆多如貞觀風俗平治如開元而惟文章之衰未有能振其弊者愈當正元中獨却而揮之上窺典謨中包遷固下逮騷雅沛然有餘浩乎無窘是愈之方有見於聖賢之大而後知其在夫子之門將追㳺夏而及之而比之於漢以來齷齪之文人則不可然則愈知道歟曰愈未知也愈之原道曰博愛之謂仁行而宜之之謂義由是而之焉之謂道果如此則舍仁與義而非道也仁與義為定名道與德為虚位道有君子有小人德有㓙有吉若如此道與德特未定而仁與義皆道也是愈於道本不知其何物故其言紛紛異同而無所歸而獨不知子思之言乎天命之謂性率性之謂道修道之謂教曰性曰道曰教而天下之能事畢矣禮樂政刑所謂教也而出於道仁義禮智所謂道也而出於性性則原於天論至於此而足矣未嘗持一偏曰如是謂之道如是謂之非道曰定名曰虚位也則子思實知之矣愈者擇焉而不精語焉而不詳而健於言者歟李郭論雄傑好亂之士可伏以天下之大義而不可掩以匹夫之小數何也彼其心甘為理屈不肯負人以其智幸而掩之得志其後必大亂㓙悖放恣而後其志乃已此不可不慎也漢髙祖苟一時之便偽游雲夢而執韓信雖能執信而信之反心自此生矣當此時髙才智士亦有輕其君之心故英布貫髙之亂繼踵而起者此非伏英雄之道也李光弼提孤軍與安史健虜百鬭百勝其治軍行兵風采出郭子儀之右而當時諸將皆望風伏子儀如敬君父而光弼之在彭城諸將已不為使子儀能使吐蕃謂父而史思明乃上書請誅光弼大抵光弼之實不及子儀之名子儀安坐而有餘光弼馳騁之不足余嘗思其故讀史思明傳見光弼使烏承恩潛殺史思明事而後知李郭之優劣蓋子儀之為人至誠不欺主於忠信其胸中洞然大人也故靜則人安其德動則人伏其義光弼用烏承恩使襲殺史思明此雖狡夫猾將之常態意其人雖雄悍驃勇而中有所不可得信者市井之智盗賊之謀有時而用也不然何以召史思明之侮而田承嗣之膝獨為尚父屈歟此於伏人之道小矣嗚呼成事以才不若以德服人以智不若以理惟德與理始鈍終利以之治大以之行逺未之有侮也李德裕論李德裕制變遇事之方裴度有所媿然度之制變務出於中和故事出而人不驚事已而身安德裕矜才而悏意者也故其所發竦動人之觀聴而後多悔言者劉承偕監劉悟軍悟不堪其侮而言之朝憲宗以其有寵於母后也問計於度請斬之又曰不能斬則流之夫斬之則風采足以震動而於事也健然苟求下足以厭悟意上不傷太后心流之亦足矣何必求動人之視聴哉此度過人者也劉稹之叛計策出於郭誼為多稹勢已窘蹙誼斬稹以降此在稹為可怒在朝廷為可賞德裕以為劉稹小子安能反誼始教之而終賣稹以求生卒斬之德裕之出此不過欲明大義立風聲以殊動視聴耳若誼者置而不問斯可矣何必求名而殺之耶是時彊藩叛鎮力足以拒王命而所深忌者左右之竊發也誅郭誼而叛臣始安心於其下其為慮蓋已疎矣德裕惡僧儒其傾僧孺也曰僧孺聞劉從諫滅而慷慨義結成其往來之迹夫傾大臣惟有交反者之罪為無以加人主之所不恕僧孺由此遂竄德裕於復怨則快矣而君子豈忍為是哉故一失勢起而擠之身没南荒非偶然也宋文選巻二十七
