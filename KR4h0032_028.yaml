body:
  text: 宋文選卷二十八張文潛文答李推官書李君足下南來多事久廢讀書昨送簡人還忽辱惠及所作病暑賦及雜詩等誦詠愛歎既有以起其竭涸之思而又喜世之學者比來稍稍追求古人之文章述作體製往往已有所到也耒不才少時喜為文詞與人遊又喜論文字謂之嗜好則可以為能文則世自有人決不在我足下與耒平居飲酒笑語忘去屑屑而忽持大軸細書題官位姓名如卑賤之見尊貴此何為者豈妄以耒為知文謬為恭敬若請教者乎欲持納而貪於愛玩勢不可得捨雖怛然不以自寧而既辱勤厚亦不敢隱其所知於左右也足下之文可謂竒矣捐去文字常體力為瓌竒險怪務欲使人讀之如見數千歲前科斗鳥迹所記弦匏之歌鐘鼎之文也足下之所嗜者如此固無不善者抑耒之所聞所謂能文者豈謂其能竒哉能文者固不徒以竒為主也夫文何為而設也知理者不能言世之能言者多矣而文者獨傳豈獨傳哉因其能文也而言益工因其言工而理益明是以聖人貴之自六經以下至於諸子百氏騷人辨士論述大抵皆將以為寓理之具也是故理勝者文不期工而工理愧者巧為粉澤而隙間百出是猶兩人持牒而訟直者操筆不待纍纍讀之如破竹橫斜反覆自中節目曲者雖使假詞於子貢問字於揚雄如列五味而不能調和食之於口無一可愜何况使人玩味也乎故學文之端急於明理夫不知為文者無所復道如知文而不務理求文之工世未嘗有是也夫決水於河江淮海也水順道而行滔滔汨汨日夜不止衝砥柱絶吕梁放於江湖而納之海其舒為淪漣鼓為濤波激之為風飈怒之為雷霆蛟龍魚黿噴薄出沒是水之竒變也而水初豈如此哉順道而決之因其所遇而變生焉溝瀆東決而西竭下滿而上虛日夜激之欲見其竒彼其所至者蛙蛭之玩耳江河淮海之水理逹之文也不求竒而竒至矣激溝瀆而求水之竒此無見於理而欲以言語句讀為竒之文也六經之文莫竒於易莫簡於春秋夫豈以竒與簡為務哉勢自然耳傳曰吉人之詞寡彼豈惡繁而好寡哉雖欲為繁而不可得也自唐以來至今之人好竒者不一甚者或為缺句斷章使脈理不屬又取古書訓詁希於見聞者衣被而説合之或得其字不得其句或得其句不知其章反覆咀嚼卒亦無有此最文之陋也足下之文雖不若此然其意靡靡似主於竒矣故預為足下陳之願無以僕之言質俚而不省也上孫端明書昔樂正子用於魯孟子為之喜而不寐夫功名進退之際君子本不以纍其心其來何足喜其去何必愠一樂正子用於區區之魯而足以悅孟子浩然之懷何也夫天下之事不如人意者常多而其委曲會合與人同謀者常少故也豈特少哉蓋千百而一遇焉夫人之修身為善擇地而蹈之者豈嘗一日不願取諸其身而布之天下哉而世之人視夫賢人君子之有立於世其心亦豈不願為之奔走而受其澤也此二者宜若物理之所當然者然其行也或止之其親也或間之讒邪閉於其前憸巧伺於其後而賢人君子又不肯少屈其意俯俯而有就戛戛乎其勢欲合而常離故使夫物理之所當然者一旦更指之為不可逢之會可勝歎哉由此言之則其萬一有合而得施其用豈不可喜也耒生三十有五年矣其聞執事之名亦久矣方先帝時羣才並進多士滿朝而天下之人指以為正人大丈夫不為利回不為義疚挺然於羣枉之中其進退用捨繫天下輕重者凡七八人而公其一也天下之士其望受賜於公久矣然其間何其屹屹乎欲合之難耶今春以來前日所指以為正人大丈夫者翕然四合而至矣公雖優遊近藩然聞之道塗以謂入陪輔弼實在旦暮夫如今日之所用其磊落震動人者皆往時天下之士將至於絶望而不得見者也今也一旦而盡見之則其喜也是宜不獨不寐而止也耒之家弟來幸得望履幕下未嘗不欣然自負以為辱公之知而某今也為令沈五得在使部聞公之府有慶也日夜喜躍樂頌其事而願有獻焉故不量其賤且愚喜為執事一道之而耒之家世單寒無勢力自援於當途而方天下治平賢俊振起區區之心未能自甘於無用來歲之春公將有薦其屬為京官者耒願沾其一於闕天下之士願奔走於君子而君子亦豈一日忘天下之士哉伏惟察之進退俟命投知己書五月日耒謹因漢夫可拜獻書某官耒聞古之致精竭思以事一藝而其知不分者其心之所思意之所感必能自逹於其技使人觀其動作變態而逆得其悲歡好惡之微情故工樂者能使喜愠見於其聲工舞者能使欣感見於其容當其情見於物而意泄於外也蓋雖欲自掩而不可得者伯牙之所好者琴耳鍾子期坐而聽之而伯牙不能藏其微情夫伯牙之情豈與琴謀哉惟其專意一心以事其技故意之所動默然相援而不自知也耒自丱角而讀書十有三歲而好為文方是時雖不能盡通古人之意然自三代以來聖賢騷人之述作與夫秦漢而降文章詞辨詩賦謡頌下至雕蟲繡繪小章碎句雖不合於大道靡不畢觀時時或有所感發已能見之於文字所習益久所親益衆所嗜益深故自十有三歲而至今三十有二年身之所歷耳目之所聞見著於當世而可知與夫考於前古而有得者無一不發之於文字不幸少苦貧賤十有七歲而親病又三年而親喪既仕而困於州縣者十有二年矣其悲憂驚悖煎熬逼迫之情憔悴萎薾鬱塞憤悶之氣充滿羡溢盈心滿懷而又飢寒困窘就食以活其妻孥者往來奔走率嘗數千里西走巴蜀南盡吳會陸困于周秦而水窮于江淮江湖波濤魚龍之驚重山復嶺猿猱猩鼯之出入大夏炎暑流金裂石與夫雷電雨潦之震恐積隂大寒裂風霰雪龜手刮肌之悽愴皆已習見而安行晝則接於起居夜則見於夢寐計其安危飽燠脫憂危而解逼仄揚眉開口無事一笑者百分之中不占其一又觀一世之情其所矜尚可以自振於貧賤厄窮者耒素於其身無有其一故雖出仕四方修身治官庶幾於有聞而門卑族薄氣熖寒冷執板趨拜以見大吏大則罵辱詬責小則詰問凌侮得其漠然不問棄置其誰何則退而欣然輒自慶喜其窘愁困塞有不可勝言者又豈獨此哉古之能為文章者誰不著書大率窘人之詞十居其九蓋其心之所激者既已沮遏壅塞而不得肆獨發於言語文章無掩其口而窒之者庶幾可以紓其情以自慰于寂寞之濵耳如耒之窘者亦可以謂之極矣其生平之區區既嘗自致其工於此而又遭會窘厄投其所便故朝夕所接事物百態長歌慟哭詬罵怨怒可喜可駭可愛可惡出馳而入息陽麗而隂肅沛然於文若有所得耒之於文雖不可謂之工然其用心亦已專矣夫文章之於人心其理之相近與夫工人之於技見有間矣耒之區區蓋已盡布於此則世之髙明博逹之君子俯而聽之蓋有不待夫疑而問問而後知其心也伏惟某官以文章學術暴著天下方為朝廷訓詞文臣而不腆之文嘗欲奬與人誰不欲自逹於世之顯人而耒自顧所藏無一不可敢書其平日之文與詩凡九十篇以辱左右伏惟間暇而賜觀焉則耒之情誠雖欲毫髮自伏而不可得矣公亦念之耶上文潞公獻所著詩書古之言詩者以為動天地感鬼神莫近於詩夫詩之興出於人之情喜怒哀樂之際皆一人之私言而至大之天地極幽之鬼神而詩乃能感動之者何也蓋天地雖大鬼神雖幽而惟至誠能動之彼詩者雖一人之私意要之必發於誠而後作故人之於詩不感於物不動於情而作者蓋寡矣今夫世之人有順于其心而後樂有逆於其欲而後怨當樂而反悲當怨而反愛者世之所未嘗有而樂與怨者無有使之莫使其然而然者也豈非至誠之動也哉彼詩者宣所樂所怨之文也夫情動於中而無偽詩導其情而不苟則其能動天地感鬼神者是至誠之説也夫文章之興其變多矣惟詩獨邇於誠故欲觀人者莫如詩故古之君子相與燕樂酬酢之際必賦詩以觀賔主之意雖未必作於其人而每取古人之詩以見其志故先王之時大至於朝廷之政事廣至於四方之風俗微至於匹夫賤士之悲嗟婦人女子之幽怨一考於詩而知之而使有司以時采取而藏諸大師又播之樂章大者薦之郊廟而次者陳之燕享則夫詩之可以觀政察物其重蓋如此自周衰以來後世作者紛然並出以至于今數千年其間變制異技竒言詭述不可勝記其間卓然可稱者不過數人其餘紛紛籍籍皆不足道而違情拂志之作往往或有非如古之於詩必出於誠意而不誣也然違情拂志者蓋有之矣至於顯情之真發志之實者尚十九也某不肖自幼至今頗考歷世之為詩者上自風雅之興而中觀騷人之作下考蘇李以來至於唐掃除蕃穢而托其真刋落蔓衍而食其實頗有得於前人面目時時心之所感發亦竊見之於詩句夫人之生於天地之間目之所見耳之所聞心之所思一日之間無頃刻之休而又觀夫四時之動敷華發秀於春成材布實於夏凄風冷露鳴蟲隕葉而秋興重雲積雪大寒飛霰而冬至則一歲之間無一日隙以人之無情對物之無定候則感傷交戰旦夜相召而欲望其不發于文字言語以消去其情蓋不可得也則又知詩者雖欲不為有所不能上邵提舉書人之才能其别雖殊然其大要有二而已太上無所不能其次則一人之身所長不過一端能冶而不能陶知賈則不知農專力于所知以致其功是以隨其大小有補丁世所謂無所不能者求之古人有幾何歟孔孟而上不可以才較無所復論矣其次所謂周才全智用之不見其所窘窺之不見其所不足在齊不過管仲在秦不過商君此兩人者治國用兵理財制敵術兼四民智通天下人莫能出其右然自周衰至秦歷世如此其久其間可稱二人而己子産不能以鄭霸晏仲不能以齊興子玉之才不過三百乘而陶朱之略屈於四境之內若是數人者其智慮心術亦非世之淺人矣然各有所乏而終亦不能自勉以滿其所不足然則人人望其無所不能其亦難乎聖人知人才之不可以全盡也故因任之如人之有耳目口鼻使各效其職而收其全利於一身故天下之才樂致用而無廢人而不至於兩毁之也何謂兩毁夫居楚者責之習楚可也使不思其他而惟楚之知則其於楚也無遺慮矣捨楚而問燕焉則楚既忌之燕亦卒不可知也是謂兩毁之故為政而兩毁之者常有乏才之憂也再上邵提舉書昔韓退之以書三見宰相以自獻其所有至于一再而未售也則又激訐奮厲以動之嗟乎其言亦少詆矣退之平生其有求于人以濟所欲者非一也甚哉武夫軍師苟有勢力可以拯之於貧賤者皆一往而嘗之善辭以導其心高言以動其意挾書懷刺趨走于當位者之門既晚而後少得所欲讀其書未嘗不悲之夫如愈之文章類非隨世汨沒待其自逹而後見於世者也何其取知於人若是其勞哉至其人之不吾知也以退之之好剛自信有以自樂于道藝之際視世之夸者不一動其心宜其邈然自絶與世兩忘長往而不顧夫何其忍恥降志庶幾萬一之遇又若是其勞且不厭也由是觀之則人之挾其所有與所待而見于世者實難視人之知與不知一不介其意人不吾知而遂止者又難也若人之能薄矣一日而三號於通衢庶幾間而或省之車敗於奔馳足趶於步趨毁只而就寸求百而冀一其始也赧然自羞退而觀古之君子皆未免乎此則又自恕而有待夫功名之會天下之至難也使皆畏勞避辱不肯少抑以有所就則事功之成者或寡矣代高玘上彭器資書古之君子如子思孟軻之徒其亷潔自重不肯少屈以求合於世四方諸侯操幣委贄望其門墻不敢失容至於禮備而意誠而求之吾身無毫髮之辱乃始一往而就之尊之為師禮之為賔不敢一言少拂其意然片言之不從闕之不修望望乎其去之矣嗚呼何其自重好高而不可屈者此其至矣耒又嘗觀古之功名之士若管仲之賢寧戚之竒商君之才或愛其死而不畏囚虜之恥忘其君而事其仇或悲歌歎慨庶幾自見其志或挾數持術以卜其君之所好至於受侮被斥屢進而不恥嗚呼若是數人者智豈皆不足以少知君子之道哉不然何其冒昧汙辱若是其不知恥也蓋嘗深思其故而得之夫古之任其下者有尊之者有使之者尊之者謂之賢使之者謂之能而世之士其修身立誠以待上之任使者亦有是二道焉有以德者有以才者德者上而才者下上者人就之下者屈己以就人求售其技而已世之君子之愛子思孟軻而羞道管仲寧戚商鞅之事以為甚汙而不足為其亦過矣彼之所行者各其分也上曽子固書耒嘗以謂君子之文章不浮於其德其剛柔緩急之氣煩簡舒斂之節一出乎其誠不隱其所已至不強其所不知譬之楚人之必為楚聲秦人之必衣秦服也惟其言不浮乎其心故因其言而求之則潛德遁志不可隱伏蓋古之人不知言則無以知人而世之惑者徒知夫言與德二者不可以相通或信其言而疑其行嗚呼是徒知其一而不知夫君子之文章固出於其德與夫無其德而有其言者異位也耒之相為文最喜讀左氏離騷之書丘明之文美矣然其行事不見於後不可得而考屈平之仁不忍私其身其氣狷其趣高故其言反覆曲折初疑於煩左顧右挽中疑其迂然至誠惻怛於其心故其言周密而不厭考乎其終而知其仁也憤而非懟也異而自潔而非私也倣徨悲嗟卒無有省之者故剖志抉慮以死自顯此屈原之忠也故其文如明珠美玉明麗而可悅也如秋風夜露凄忽而感惻也如神仙煙雲高逺而不可挹也推其言以考其事其有不合者乎自三代以來最喜讀太史公韓退之之文司馬遷竒邁慷慨自其少時周遊天下交結豪傑其學長於討論尋繹前世之迹負氣敢言以蹈於禍故其文章踈蕩明白簡朴而馳騁惟其平生之志有所鬱於中故其餘章末句時有感激而不泄者韓愈之文如先王之衣冠郊廟之鼎俎至其放逸超卓不可收攬則極言語之瓌巧有不足以過之者嗟乎退之之於唐蓋不愚矣然其犯人主忤權臣臨義而忘難剛毅而信實而其學又能獨立於道德滅裂之後纂孔孟之緒餘以自立其説則愈之文章雖欲不如是蓋不可得也自唐以來更五代之紛紜宋興鉏叛而討亡及仁宗之朝天下大定兵戈不試休養生息日趨於富盛之域士大夫之遊於其時者談笑佚樂無復向者幽憂不平之氣天下之文章稍稍興起而廬陵歐陽公始為古文近揆兩漢逺追三代而出於孟軻韓愈之間以立一家之言積習而益髙淬濯而益新而後四方學者始恥其舊而惟古之求而歐陽公於是時實持其權以開引天下之豪傑而世之號能文章者其出歐陽之門者居十九焉而執事實為之冠其文章議論與之上下聞之先逹以謂公之文其興雖後于歐公屹然歐公之所畏忌其後來而論友者也耒自初讀書即知讀執事之文既長而思之廣求逺訪以盡攬其變嗚呼如公者真極天下之文者歟上唐運判書耒聞昔者三代之時公卿大夫之待其下何其仁愛忠厚發於至誠而能盡下之情也下之事上何其夷易簡直各得自獻其意無有阻塞不逹之恐而不限於勢也夫惟上能盡下之情故下不限於勢上俯而就之下仰而及之故尊卑之情通而貴賤之事逹然耒嘗疑之天下急於求其上者物理之所當然公卿大夫既貴矣宜其偃然無待于物彼汲汲以求于下苟有善焉如恐失之此其故何也蓋天下之位有尊卑貴賤之不同者勢之所當然非其事亦判然兩為而不相與也今夫貴者止于自安一切無事於功名可也苟有功名之心則貴者之功賤者之力也尊者之名卑者之成也故上之求乎下猶下之求其上也昔周公既聖矣身履天下之富貴而後世稱急賢待士者必稽焉故其效也百官庶府莫不修治制度文理莫不彰明周公之身無遺德焉夫豈周公一人之力哉惟其然故古之公卿大夫不敢苟簡守常以便其私尊者汲汲不遺於賤夫上有至誠惻怛之心不敢遺忘疏逺之士則士之在下者亦不敢復愛其所有至於奮厲出竒惟恐不逮者由此故也三代之政既亡公卿大夫無復向者至誠盡天下之意謹身無過自處甚重忌其立功立事之心漫然鉏去感發激昻之氣以謂無所事於賤微於下者不過言功不幸功不至焉雖有過人拔俗之才不問之矣其斥而去之不過論罪幸而無過雖天下之冗瑣不復問之矣情阻而不合氣否而不交下畏其上則有之矣而不受也下恭其上則有之矣而不忠也貴賤異志尊卑不親而三代之風泯然矣事功之不立豈不以此哉耒嘗讀西漢書見吳公之取賈生田延年之用尹翁歸暴勝之禮雋不疑蓋嘗切歎三人者猶能降心近古之人忘尊以禮賢致誠以納士以太守之尊使者之貴親與匹夫下士相接務盡人之才而忘下之瀆之也夫如前三君者未足道也然巳能如此然則天下之賢者多矣安知無有慨然能用古又不溺於流俗有功名之心而忘其區區之尊嚴者耶嗚呼安得斯人者而處天下之富貴哉使誠有之天下之遺賢潛德庶幾乎興矣上黃判監書耒嘗怪夫人之於道何其所見之不一而其言之各異也蓋自周衰以來諸子各以其説行於世而其言獨能推本道德之意知本而不流於末守真而不陷於偽者莫近於老莊然是二人者乃棄仁義斥禮樂絶學棄智以自明其説考其心以謂為其術必棄仁義禮樂而四者固其術之害也惟其然是故得罪於後世之儒者自炎漢以來天下學者頗知推本仁義其言禮樂治道有足觀者矣而未嘗有一言及於性命道德之本蓋以謂道德性命者原無所用於禮樂也是二者之説孑然不可以並立各擯其所可及而求全其所長而耒之不肖嘗切歎以為不然何者所謂道者固無乎不在蓋大至於天地衆至於萬物無有一物不資其用者豈其缺然有所不足歟使道之有不足則安取道於是思有以合二者之論而得其説為道德之論者本於虛無而無形執禮樂之論者滯于著見而有迹極無形之論至於忘言推有迹之至則至於終身言而不盡此其所以齟齬而不同以謂有無之相害耶則有者固自以為有耳而有未始非無也無者固自以為無耳而無未始非有也有與無二者特命於我耳而我之為是説果何自而起也在物無定形在我無定心然則無乃出於忘意和知而非物之正耶由是觀之則方其在仁義禮樂者未始非道德性命也方其在道德性命者亦未始非仁義禮樂也同聖而非一也兩立而非二也圓融和會而物與我兩冥矣尚何區區之辨哉蓋孔子之道本於寂然不動矣然方其感於物而天下之故無所不通洗心齋戒退藏於密矣然天下之至頥萬物之至動未嘗厭也耒之於學切有得於此而後視天下之大萬物之衆今古之不齊而無往而不一焉所謂萬物一府死生同狀者推其端乃一本於此而後知夫子之道之為全也答杜鋒書耒啓罪垢謫官於此多病懶放舊學荒廢無以見賢後闕久不果奉謁而足下意益勤兩墜珠玉又副以新文一軸披讀纍日不勝欽仰試誦所疑其一篇曰非季札夫季札何可非也札之逹於禮樂蓋孔子之所與而其人之賢則非管晏叔向子産韓厥所可及也然則其於辭受之際宜亦至矣彼其辭千乘之國於爭奪之世蓋欲制行以髙天下而教後世將以愧夫盜據竊取而使亂臣賊子之禍少息焉使季札受亦可辭亦可而卒辭之者亦行其志云耳夫豈有所不可哉夫季札非忘吳也豈不曰國之存亡廢興天也非人之所能為也昔孤竹君以國與叔齊叔齊讓伯夷而卒皆逃去入周不返其國而孤竹之後不聞有興者而孔子之論二子曰求仁而得仁未嘗罪以忘其國也夫子之不非夷齊則季札之不得罪於夫子明矣足下試詳思之世之貴王衍以器用言之譬如玩好間一物耳未可格以法度也愚以謂季札為不可非于王衍為不足非也三傑贊文字豐縟布敘詳密有作者之風更加老成則無可議辱問甚勤不敢不盡再答杜鋒書承諭亹亹似未逹鄙意嗟乎季子讓國幾千餘歲歷數聖賢未嘗有説獨見黜於吾子蓋夫子謂後生可畏者夫季子之不肯受吳直是不欲有國耳故其言曰願附子臧之義彼視棄千乘之國如草芥亦必有樂乎此而易彼者苟求其所以讓之之名則壽夢欲越諸兄而立之季子固不可也至餘昧卒而子僚之才亦足以君國則季子不得廢嫡而立孟子曰天之所廢必若桀紂者故益伊尹周公不有天下此札之所以必辭者惡亂君臣之大分也季札之於道德其深矣哉吳屈庸曰季子守節者也雖有國不立可謂知其心矣孟子曰好名之人能讓千乘之國則自夷齊以來季札一人而已所謂聖人之清者也夫豈在所黜哉孟子曰若夫成功則天也則古之論存亡興廢未有不言天者非幸不幸也孤竹之君欲越次而立叔齊叔齊辭之可也伯夷長當立而辭之何哉商人世及則叔齊將以次亦當立也而夫子初不論此直曰古之賢人也其意可見季子之聽樂其於禮樂之際深矣其於辭受必不草草更宜詳之答汪信民書耒啓上教授汪君足下過符離偶多事然雖聞車馬嘗見臨而卒不能一到左右也必蒙深察到家忽便人惠書如見問以文墨事耒於文詞竊嘗好之而不能著也其知所以告左右者抑聞之古之文章雖制作之體不一端大抵不過記事辨理而已記事而可以治世辨理而足以開物皆詞逹者也雖然有道詞生於理理體於心苟邪氣不入於心僻舉不接於耳目中和正大之氣溢於中發於文字言語未有不明白條暢盍觀於語者乎直者文簡事核而理明雖使婦人童子聽之而諭曲者枝詞遊説文繁而事晦讀之三反而不見其情此無待而然也足下以文章取髙科言語之工妙天下而僕敢獻其陳説則有罪矣然既以仰答盛意之辱又因以求教也春寒自愛偶以連日冗甚修答不時恕之恕之心宣耒再拜宋文選卷二十八
