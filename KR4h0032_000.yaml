body:
  text: 宋文選目録總集類巻一歐陽永叔文巻二歐陽永叔文巻三司馬君實文巻四司馬君實文巻五司馬君實文巻六范希文文巻七王禹偁文巻八孫明復文巻九孫明復文巻十王介甫文巻十一王介甫文巻十二余元度文巻十三曾子固文巻十四曾子固文巻十五石守道文巻十六石守道文巻十七石守道文巻十八李邦直文巻十九李邦直文巻二十李邦直文巻二十一李邦直文巻二十二李邦直文巻二十三唐子西文巻二十四張文潛文巻二十五張文潛文巻二十六張文潛文巻二十七張文潛文巻二十八張文潛文巻二十九張文潛文巻三十張文潛文巻三十一黄魯直文巻三十二陳瑩中文臣等謹案宋文選三十二巻不著編緝者姓氏案張邦基墨莊漫録稱崔伯易有金華人記編入聖宋文選後集中則此乃其前集在南渡以前矣所選皆北宋之文自歐陽以下十四人惟取其有闗於經術政治者詩賦碑銘之類不載焉中無三蘇文字而黄廷堅張耒之文則録之豈當時蘇文之禁最嚴而黄張之類則稍寛歟又其中無二程文盖不以文士目之也何焯義門讀書記䟦所校元豐類稿後曰己夘冬於保定行臺案焯是時在直𨽻巡撫李光地署中閲内府所賜大臣古文淵鑒有在集外者六篇則書魏鄭公傳後邪正辨説用上田正言書上歐蔡書也後知立齋相公案立齋為大學士徐元文之别號有建本聖宋文選數冊其中有南豐文二巻嘉善柯崇樸借鈔遂傳於外此六篇者皆在焉云云按書魏鄭公傳後一篇宋文鑑亦載不僅見於此集中焯盖考之未審然南豐外集續稿今並不傳其佚篇惟賴此集以存是亦不為無功矣宋人選宋文者南宋所傳尚夥北宋惟此集存耳其賅備雖不及文鑑然用意嚴慎當為能文之士所編尢未可與南宋建陽坊本出於書賈雜抄者一例視之也乾隆四十五年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
