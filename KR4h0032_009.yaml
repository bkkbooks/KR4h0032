body:
  text: 宋文選卷九孫明復文無為指上無為者其虞氏之大德歟非曠然不為也始不求于天下而天下自歸之終不受于天下而天下授之自生民以來虞氏一人而已昔在歷山而耕焉雷澤而漁焉河濱而陶焉當是時也彼孰有意于天下哉及乎孝德升聞堯遽以天下禪之舜既受堯禪夙夜兢兢懼德弗類以天下者堯之天下也不以堯之道治之則其天下之民有不得其所者矣于是盡履堯之道而行之俾其天下之民不異于堯之世也舜居位既久復以堯之天下堯之道盡與諸禹此舜之德其可謂大德也矣夫舜之天下堯之天下也舜之道堯之道也舜始得之于堯而終傳之于禹此舜之無所為也章章矣噫上無堯下無禹孰可髙視而稱于無為哉上堯而下禹舜所以得髙視而無為也不然則孔子上顧伏羲下訖文武筆于六經為萬世法何不曰無為治者伏羲也黃帝也堯也禹也湯也文武也止曰其舜也歟哉若以無為為曠然而不為則書何以曰齊七政類上帝禋六宗又曰覲四嶽班瑞于羣后又曰東巡狩至于岱宗協時月正日同律度量衡修五禮五玉又曰南巡狩至于南嶽西巡狩至于西嶽北巡狩至于北嶽又曰肇十有二州封十有二山又曰流宥五刑又曰流共工放歡兜竄三苗殛鯀又曰詢四嶽闢四門明四目達四聰又曰禹平水土又曰黎民阻飢后稷播植百穀又曰百姓不親五品不遜又曰蠻夷猾夏冦賊姦宄以至五十載陟方乃死之類此舜有為其繁也如是之甚矣且書者聖筆親刪也孔子觀舜之有為其繁也如是之甚矣安可反謂之無哉由是觀之則知無為者非曠然而不為也無為指下無為之道其至矣哉非虞舜孰能與於此後之帝天下者不思虞帝之德而慕虞帝之無為吾未見其可也三代而後不思虞帝之大德而冒虞帝之無為者衆矣又世之險佞偷巧之臣或啓導之既不陳虞帝之大德以左右厥治則枉引佛老虛無清淨報應因果之說交亂乎其間敗于君德吁可痛也觀其惑佛老之說忘祖宗之勤罔畏天命之大靡顧神器之重委威福于臣下肆宴安于人上冥焉莫知其所行蕩焉莫知其所守曰我無為矣至綱頽紀壞上僭下逼昏然而不寤者得不痛哉且夫天下之廣億兆之衆一日萬幾兢兢翼翼猶懼不逮而佛老之說其可惑乎祖宗之勤其可忘乎天命之大其可罔畏乎神器之重其可肆于人上乎斯何沈惑不開如是甚也昔秦始漢武始則惑于虛無清淨之說終則溺于長生神仙之事梁武齊襄姚興始則惑乎報應因果之說終則溺于解脫菩提之事卒皆淪胥以亡勢不克救此簡䇿具載可覆而驗也惟漢賴髙祖除秦之暴功宏德茂天未厭絶兹亦幸而已何足尚哉吾嘗求無為之端且病歷代諸儒不能揚孔子之言鋪而明之俾其炳炳如也故佛老之徒得以肆其怪亂之說厠于其間為千古害故盡擴其所以然作無為指庸為帝天下者戒寄范天章書一月日布衣孫復謹再拜寓書于判監天章執事今主上聰明睿哲紹隆三聖之緒十有四年將固太平之業傳之于無窮也夙夜兢兢弗敢怠荒思得中正純亮之臣協贊之以執事頃居諫署多針規藥石之益亟自蘇臺召入將大用之而執事拜章懇求涖于太學者斯蓋執事不汲汲于富貴而孜孜于聖賢之教化也夫太學者教化之根本禮樂之淵藪王道之所由興人倫之所由正俊良之所由出是故舜禹文武之世莫不先崇大于膠序而洽至治于天下者焉今執事懇求而涖之者我知之矣執事將俾吾宋之學為舜禹文武之學也既俾吾宋之學為舜禹文武之學是將俾吾宋公卿大夫之子弟為舜禹文武公卿大夫之子弟也既教吾宋公卿大夫之子弟為舜禹文武公卿大夫之子弟然後以舜禹文武之道上致吾君為舜禹文武之君也既致吾君為舜禹文武之君然後以舜禹文武之道下濟吾民為舜禹文武之民也自京師刑于邦國達于天下皆雍雍如也兹其執事之心也已然念欲求舜禹文武之道者必質諸周公孔子而後至焉爾今執事既涖是學也將行是道也非一手一目之所能必須博求鴻儒碩老能盡知舜禹文武周公孔子之道者增置學官相左右之俾朝夕講議舜禹文武周公孔子之道以教育乎國子也復竊嘗觀于今之士人能盡知舜禹文武周公孔子之道者鮮矣何哉國家踵隋唐之制專以辭賦取人故天下之士皆奔走致力于聲病偶對之間探索聖賢之閫奧者百無一二向非挺然獨立不狥世俗之士則孰克捨于彼而取于此乎由是言之則執事涖是學行是道增置學官之際可不慎擇乎今有大名府魏縣校書郎士建中南京留守推官石介二人者其能知舜禹文武周公孔子之道者也非止知之又能揭而行之者也執事若上言于天子次言于執政以之為學官必能恢張舜禹文武周公孔子之道以左右執事教育國子丕變于今之世矣復閒退之人固不當語及于是然敢孜孜布于執政之左右者非為諸己也蓋為諸人也非為諸人也蓋為諸道也執事以為如何若以復愚且賤而言可取則復學聖人之道三十年雖愚且賤豈忘言乎惟執事圖之寄范天章書二伏以宋有天下八十餘祀四聖承承龎鴻赫奕逾唐而跨漢者逺矣主上思復虞夏商周之治于聖世也考四代之學崇橋門璧水之制故命執事以涖之大哉主上尊儒求治之心也至矣然則虞夏商周之治其不在于六經乎捨六經而求虞夏商周之治猶泳斷湟汚瀆之中望屬于海也其可至哉噫孔子既沒七十子之徒繼往六經之㫖欎而不章也久矣加以秦火之後破碎殘缺多所亡散漢魏而下諸儒紛然四出爭為注解俾吾六經之㫖益亂而學者莫得其門而入觀夫聞見不同是非各異駢辭贅語數千百家不可悉數今之所陳者止以先儒注解之說大行于世者致于左右幸執事之深留意焉國家以王弼韓康伯之易左氏公羊穀梁杜預何休范寧之春秋毛萇鄭康成之詩孔安國之尚書鏤版藏于太學頒于天下又每嵗禮闈設科取士執為凖的多士較藝之際有一違戾于注說者即皆駁放而斥逐之復至愚至暗之人不知國家以王韓左氏公羊穀梁杜何范毛鄭孔數子之說咸能盡于聖人之經耶又不知國家以古今諸儒服道窮經者皆不能出于數子之說耶若以數子之說咸能盡于聖人之經則數子之說不能盡于聖人之經者多矣若以古今諸儒服道窮經皆不能出于數子之說則古今諸儒服道窮經可出于數子之說者亦甚衆矣噫專守王弼韓康伯之說而求于大易吾未見其能盡于大易者也專守左氏公羊穀梁杜預何休范寧之說而求于春秋吾未見其能盡于春秋者也專守毛萇鄭康成之說而求于詩吾未見其能盡于詩者也專守孔安國之說而求于書吾未見其能盡于書者也彼數子之說既不能盡于聖人之經而可藏于大學行于天下哉又後之作疏者無所發明但委曲踵于舊之注說而已復不佞遊于執事之牆藩者有年矣執事病注說之亂六經六經之未明復亦聞之矣今執事以內閣之榮居太學教化之地是開聖闡幽芟蕪夷亂興起斯文之秋也幸今天下無事太平既久鴻儒碩老駕肩而起此又豈減於漢魏之諸儒哉執事亟宜上言天子廣詔天下鴻儒碩老置于太學俾之講求微義殫精極神參之古今核其歸趣取諸卓識絶見大出王韓左穀公杜何毛范鄭孔之右者重為注解俾我六經廓然瑩然如揭日月于上而學者庶乎得其門而入也如是則虞夏商周之治可不日而復矣不其休哉執事若以數子之說行之已久不可遽而去之則唐李善以梁昭明太子文選五臣注未盡别為注釋且文選者多晉宋齊梁間文人靡薄之作雖李善注之何足貴也國家尚命鏤版置諸太學况我聖人之經乎安可使其欎而不章者哉幸執事之深留意焉上孔給事書月日布衣孫復謹再拜獻書孔知府龍圖執事復名晦迹沈學夫子之道三十年雖不為世之所知未嘗以此搖其心敢一日而叛去所謂夫子之道者治天下經國家大中之道也其道基于伏羲漸于神農著于黃帝堯舜章于禹湯文武周公然伏羲而下創制立度或略或繁我聖師夫子從而益之損之俾協厥中筆為六經由是治天下經國家大中之道煥然而備此夫子所為大也其出乎伏羲神農黃帝堯舜禹湯文武周公也逺矣噫自夫子沒諸儒學其道得其門而入者鮮矣惟孟軻氏荀卿氏揚雄氏王通氏韓愈氏而已彼五賢者天俾夾輔于夫子者也天又以代有空闊誕謾竒嶮淫麗譎怪之說亂吾夫子之道故不並生之一賢殁一賢出羽之翼之垂諸無窮此天之意也亦甚明矣不然則戰國逮于李唐空闊誕謾竒嶮淫麗譎怪之說亂吾夫子之道者數矣非一賢殁一賢出羽之翼之則晦且墜矣既晦且墜則人無君親矣民皆鳥獸矣由是言之則五賢之烈大矣後之人不以夫子之道為心則已若以為心則五賢之烈其可忽哉近得友人石介書盛稱執事于聖祖家廟中搆五賢之堂象而祠之且孔侯之心至矣吾輩不是之而將何之也復聞之躍然而起大呼張浻李緼曰昔夫子之道得五賢而益尊今五賢之烈由龍圖而愈明龍圖公聖人之後也為宋巨賢宜乎盡心于此矣龍圖公其不盡心則孰盡心哉國朝自栁仲塗開王元之禹稱孫漢公何种明逸放張晦之景既往雖來者紛紛鮮克有議于斯文者誠可悲也斯文之下衰也久矣俾天下皆如龍圖搆五賢之堂象而祠之則斯文其有不興乎吾輩得不奔走門牆之下一拜龍圖公之賢哉又且賀斯文將復也接之拒之惟執事之命答張洞書復白明逺足下十月洎正月中兩辱手書辭意勤至道離羣外以僕居今之世樂古聖賢之道與仁義之文也逺以尊道扶聖立言垂範之事問于我我幸而志于斯也有年矣重念世之號進士者率以砥礪辭賦睎覘科第為事若明逺頴然獨出不汲汲于彼而孜孜于此者幾何人哉然懼明逺年少氣勇而欲速成無至于斯文也故道其一二明逺熟察之而已夫文者道之用也道者教之本也故文之作也必得之于心而成之于言得之于心者明諸內者也成之于言者見諸外者也明諸內者故可以適其用見諸外者故可以張其教是故詩書禮樂大易春秋皆文也總而謂之經者也以其終于孔子之手尊而異之爾斯聖人之文也後人力薄不克以嗣但當佐佑名教夾輔聖人而已或則發列聖之微㫖或則名諸子之異端或則發千古之未寤或則正一時之所失或則陳仁政之大經或則斥功利之末術或則揚賢人之聲烈或則寫下民之憤歎或則陳天人之去就或則述國家之安危必皆臨事托實有感而作為論為議為書疏歌詩贊頌針解銘說之類雖其目甚多同歸于道皆謂之文也若肆意構虛無狀而作非文也乃無用之瞽言爾徒汚簡冊何所貴哉明逺無志于文則已若有志也必在潛其心而索其道則其所得也必深其所得也既深其所言者必逺既深且逺則庶乎可望于斯文也不然則淺且近矣曷可望于斯文哉噫斯文之難至也久矣自西漢至李唐其間鴻生碩儒摩肩而起以文章垂世者衆矣然多楊墨佛老虛無報應之事沈謝徐庾妖艷邪侈之言雜乎其中至有盈編滿集發而視之無一言及于教化者此非無用瞽言徒汚簡冊者乎至于終始仁義不叛不離者惟董仲舒揚雄王通韓愈而已由是言之則可容易而至之哉若欲容易而至則非吾所聞也明逺熟察之無以吾言為忽不宣兖州鄒縣建孟子廟記孔子既沒千古之下駕邪怪之說肆竒險之行侵軼吾聖人之道者衆矣而楊墨為之魁故其罪劇孔子既沒千古之下攘邪怪之說夷竒險之行夾輔吾聖人之道者多矣而孟子為之首故其功巨昔者二豎去聖人之世未百年也以無君無父之教行乎天下天下惑而歸之嗟嗟君君臣臣父父子子邦國之大經也人倫之大本也不可斯須去矣而彼皆無之是驅天下之民舍中國之夷狄也禍孰甚焉非孟子莫能救之故孟子慨然奮起大陳堯舜禹湯文武周公孔子之法驅除之以絶其後拔天下之民于異端之中而復置之中國俾我聖人之道炳焉不墜故揚子雲有言曰古者楊墨塞路孟子辭而闢之廓如也韓退之有言曰孟子之功豫以為不在禹下然子雲述孟子之功不若退之之言深且至也何哉洚水橫流大禹不作則天下之民魚鱉矣楊墨暴行孟子不作則天下之民禽獸矣謂諸此也景祐丁丑嵗適拜龍圖孔公為東魯之二年也公聖人之後以恢宏大教興復斯文為己任嘗謂諸儒之有大功于聖人門者無先于孟子孟子力平二豎之禍而不得血食于後兹其闕也甚矣祭法曰能禦大菑則祀之能捍大患則祀之孟子可謂能禦大菑能捍大患者也且鄒昔為孟子之里今為所治之屬邑吾嘗訪其墓而表之新其祠而祀之以旌其烈于是符下俾其官吏博求之果于邑之東北三十里有山曰四基四基之陽得其墓焉遂命去其榛莽肇其堂宇以公孫萬章之徒配越明年春廟成俾泰山孫復銘而志之復學孔而睎孟者也世有蹈邪怪竒險之迹者常思嗣而攻之况承公命而志其廟又何敢讓嘻子雲能述孟子之功而不能盡之退之能盡之而不能祀之惟公既能盡之又能祀之不其美哉故直筆以書景祐五年嵗次戊寅三月日記信道堂記聖賢之迹無進也無退也無毁也無譽也惟道所在而已用之則行舍之則藏孰為進哉孰為退哉考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑孰為毁哉孰為譽哉吾之所謂道者堯舜禹湯文武周公孔子之道也孟軻荀卿揚雄王通韓愈之道也吾學堯舜禹湯文武周公孔子孟軻荀卿揚雄王通韓愈之道三十年處乎今之世故不知進之所以為進也退之所以為退也毁之所以為毁也譽之所以為譽也其進也以吾堯舜禹湯文武周公孔子孟軻荀卿揚雄王通韓愈之道進也于吾躬何所進哉其退也以吾堯舜禹湯文武周公孔子孟軻荀卿揚雄王通韓愈之道退也于吾躬何所退哉其見毁也以吾堯舜禹湯文武周公孔子孟軻荀卿揚雄王通韓愈之道見毁也于吾躬何所毁哉其獲譽也以吾堯舜禹湯文武周公孔子孟軻荀卿揚雄王通韓愈之道獲譽也于吾躬何所譽哉故曰聖賢之迹無進也無退也無毁也無譽也惟道所在而已豫丁丑嵗秋九月作堂於泰山之陽明年春堂既成以是道處是堂故名之曰信道堂云景祐五年正月三日記宋文選卷九
