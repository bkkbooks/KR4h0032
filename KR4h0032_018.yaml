body:
  text: 宋文選卷十八李邦直文論略漢儒之治經終其身而無所倦能名其師説者上或召用之髙下其材為將士郎大夫部刺史至九卿丞相御史者接迹而有已不以經為進而聽上之自揮故其人識趨向矜重名節今學者徒焉玩章句而已何其偷淺而不能如古也今之取人格之以一日之間有未能通經而適合於程度者有治經知道而偶拙於倉猝之對者取之多失實故學者愈不篤苟借經術以卜射祿利得則撥棄不復置力於其間如淺丈夫今日穫而明日捨其耒耜故其徒華而不根未至於道而止不知致君行已之大操而天下之治因是而日衰嘗以謂古之學者樂之者也今之學者利之者也樂之與利之於道之淺深豈可同概而論哉荀卿曰道者古今之正權也離道而內自擇則不知禍福之所託夫人君之為治人臣之有所為曷嘗不本於學夫苟不學萬事之錯邪正善惡之變雜然交至乎其前吾無所守於中必有所眩於外故君臣之間皆不可以無學也學則名教之樂入之矣名教之樂先入而不善之樂繼來先入者主之則繼來者必不勝雖萬事之錯邪正善惡之變雜然交至而有以一之此聖賢所以用力省而為治多也昔漢武帝明春秋宣帝受詩明帝通歐陽尚書唐文皇序晉史明皇釋孝經憲宗喜觀實録今人主選經術德誼之老畨侍講讀又有學行大臣以備顧問固已隆學而重道矣歉歉焉曾未厭於道又使科舉賤士各獻其所論著非獨稱較其能亦所以廣聰明博仁義也孟子曰齊人無以仁義與王言者豈以仁義為不美也其心曰是何足與言仁義也云爾則不敬莫大乎是我非堯舜之道不敢以陳於王前故齊人莫如我敬王也臣嘗治經史粗識仁義之大歸略涉古今治亂之體竊慕孟軻之所謂非道而不敢陳者故托師説取其有益者而言庶備人主之采覽臣謂象數妖祥之説勝則亂人事故有易論三篇王法舉則天下自治故有春秋論二述禮之所起有禮論三見聖人勸警後世之君反覆而丁寧有詩論上下破偽論尊正術有史論上下道誠明之學有四子論二入至神之化不言之治有唐虞論推建侯置守之安危有三代論傷仙老之屢敗於下有秦論王者不可以無剛德有西漢論誅忠而嬖佞者失天下之心有東漢論治天下非忠厚則不可久有魏論釋二貸禍福姦臾貨賞罰為世之大殘有梁論為天下以吏材則不足為天下以王道則有餘有隋論生民之憂常自中起有唐論久安者危有五代論統其大旨為略惟明聖鑒之而已矣易論上嘗病世之學者不能知易之本遺人事而泥天道其卑者入於象數而髙者不過入於名理自焦延夀京房毛爽祖孝孫之徒為六日七分之説曰辰之支幹律吕之清濁風雨寒暑節氣之候與天文厯法以為皆法易而生故術者咸自託於易五行家曰吾之術出於易也太一家曰吾之術出於易也律家亦云然厯家之所云又然已而參同方伎卜相筮占之流莫不持籌衍圖指畫天地自以為知易意者借聖人以為髙祈世人之弗疑其妄而尊已之學也晚有韓康伯頗號知易至於聖人之精義又往往溺入於名理趣向大與佛老相類故仲長子光嘗稱老易夫象數之與名理固易之自出然而本非聖人所以教世者故不言人事而言天道謂之伎術非聖人之徒也自周秦間已謂易為卜筮之一法及秦燒書欲以愚黔首始皇與李斯曾不知卦爻有仁義之説學之者可以不愚易於此脫於亂世獨得不火後世傳授不絶然亦幾矣後之學者又墜易之旨不能究極人事而推天授神故其言於惝恍冥迷之外務以惑世何易之少通而多塞如此哉夫是非定於目前而難以眩者人事也易偽而不可詰者天道也彼以謂已能談天衆人必以我為洞隂陽而測變化吾智甚大而吾學甚逺為力甚近而得名甚髙且有難詰之幸此如畫師喜為鬼神而憚為狗馬以鬼神難知而狗馬易較故也嗟乎髙者入於象數卑者入於名理而聖人之旨固已微矣夫聖人立易豈止作空器與後世為古法而已耶固將以利天下也卦之不同一卦之體當一世之事爻之不同一爻之體當一人之事位之不同一位之體當一時之事處治處亂宜進宜退處晦處明宜剛宜柔處上處下宜為宜否偶其時位其事曲折萬變聖人皆有術以處之故出沒於天地之間而利不能誘禍不能繼惡不能垢譽不能驕小以之治身大以之治天下無異道者斯則聖人以有用而為之矣因人以及三才可也學者奚獨以象數為哉易論中或曰易之所以為易吉凶禍福而已矣吉凶禍福見於象數者也今學易而不為象數又何以知吉凶禍福之所自耶曰有天之禍福有人之禍福有天之吉凶有人之吉凶君子信乎其在人者不治乎其在天者天之所為人有所不能為人之所為天有所不能為日月星辰之運動風雨霜露之時不時此天之所為也禮樂之興壞人倫之廢起賢愚之貴賤通塞時世之改易物之聚散兵之成敗此人之所為也天能自為其所為而不能為人之為人能自為其所為而不能為天之為故天雖神不能勝人人雖靈不能勝天此天人之職也而世之妄者持天以勝人其言雜乎巫史卜祝星工厯學僻妖幻邪之間以謂吉凶禍福如有佛神在上瞰天下之衆而司之者溺乎小數而泥乎大道或者率人以勝天曰吾可以郤日月星辰之災而召風雨霜露之和使答我如響此之謂干天人之職比干雖忠信力爭於紂則死微子捨之而去則存季跖雖暴無明天子賢諸侯則盜而夀人歟天歟天下之事不滿於求而異乎所素期者亦世人未之究耳而皆謂之天至於淺丈夫一金之得失曲士一祿秩之進退莫不指天以為記天何預於此哉故逹者略幽而視明求形而不察影木石之怪羽毛之妖青眚赤祥人痾犬禍沓然而有不足畏也修吾人事而已矣矞雲景星祥風甘露繼日而至丹芝瑞􅀢神爵騶虞不曠月而出不足矜也民之治亂如何而已矣或曰然則易之所謂吉凶禍福而可以前知者如何曰人事有將然之理深微而難見紛錯而不可一者常人所未知而聖人已逆知之故寄之易曰此時而此為則吉則有慶則無不利則利有攸往此時而此為則凶則有厲則有悔則無攸利亦事之必至者耳顧其多岐而常人疑之以為其狀若變化矣何預於此哉學易未能極人事而叛乎天地陰陽非易之本旨也易論下十翼皆孔子之言乎不得而知之也然而有疑焉其所謂序卦者自韓康伯已明其非易之藴而未明其所以非也何謂耶夫三才之交錯萬事之紛揉未嘗有獨行而無徒唱之而無應者是故剛柔相配消長相隨天地陰陽也小大相承強弱相長夫婦父子君臣也善惡相返治亂相易君子小人之分也禍福相生盈虧相旋物理之進退也二二而同出如晝夜之相代寒暑之相從黑白之不能不相資也有剛必有柔有消必有長故言天必言地言陰必言陽有大必有小有強必有弱故言夫必言婦言父必言子言君必言臣有善必有惡有治必有亂故言君子必言小人有禍必有福有盈必有虧故言進必言退此事之常而作者所不可遺也故配偶而言之則理愜而易明離合而雜舉之則混亂而不可考夫易卦之序豈非二二而相從者乎今夫上經之卦乾天坤地故乾對坤屯氣之始蒙識之始故屯對蒙需和而訟乖故需對訟師憂也比樂也故師對比小畜以陰而制陽履以陰而承陽故小畜對履泰對否同人明於外大有明於內故同人對大有謙自小而豫自大故謙對豫隨少為而蠱多事故隨對蠱臨下對觀上噬嗑之明獄對賁之明政剝對復無妄之剛動對大畜之剛止頥養之中對大過之過坎之水對離之火此上經之次也下經之卦以咸之動對恆之靜以遁之陰長對大壯之陽長以晉之明對明夷之暗以家人之同而異對睽之異而同以蹇難對解通以損對益以夬之五陽決一陰對姤之一陰遇五陽以萃之聚而來對升之進而去以困之在下而塞對升之在下而通以革之變之用對鼎之變之器以震動對艮止以漸之女吉對歸妹之女凶以豐之附而光對旅之單而隱以巽之順對兌之悅以渙之散對節之收以中孚之誠在中對小過之行在外以既濟對未濟此下經之次也不惟其義之若是觀其九六竒偶之畫或上或下或相返或相生以兩之而為此則易卦二二而相從豈不甚明哉今夫序卦之文蓋不協矣有義之苟合者有義之不合而強通者是豈聖人之言耶學者究之而自知此不可以遍舉也學易者知夫所謂二二而相從則於三才之淵萬事之變可以心通而得易道之半矣春秋上言春秋者何為其紛紛不決也病在於好竒而不好道好名而不好實公羊曰左氏出於此矣我之説不可復出乎此乃出乎彼榖梁曰公羊出於彼矣我之説不可復出乎彼乃出乎此至於騶夾董仲舒劉向劉歆何休賈逵伏虔杜預范寧尸子啖趙陸淳之徒莫不皆然有出乎彼我必出乎此有出乎此我必出乎彼一彼一此惟求異於學者而勝於前人有所異者謂之新意有所同者謂之沿襲此春秋之學所以支離而不一聖人之意所以晦而不明者乎公羊家曰春秋褒貶在乎日與不日月與不月為左氏者曰否榖梁家曰春秋之褒貶在乎書名書字書氏書人書國書爵之間耳或曰非也至後世之顓儒各守其意迭相姍笑操矛而相攻者不知幾人師弟子異論而父子異學嗚呼孔子大法孰從而一之昔者周既衰微王者不能舉其法召陵踐土之盟而天下之政在諸侯雞澤溴梁之會而天下之政又在大夫大抵肆欲妄行與無王同故孔子作春秋以寄王法蓋誅天下之不臣者也故春秋以王法為本曲直善惡次之不本王命而戰爭盟會則曲直善惡皆為春秋之罪人奉王命而陷於惡則罪在上而不在下此春秋之本統也有如文武為王周召為相坐明堂而治天下之諸侯猝焉有兩諸侯不以王命舉兵以相殘王者執而治之則將來誅其不以王命而起兵乎將賞其直者而刑其曲者乎又將偕誅之乎又有諸侯或列國之臣棄其宗廟社稷之祭祀踰疆喪職不以王命禮典而盟會者紛紜於天下王者治而止之將誅其未命而行乎將賞其有益而為之乎此譬之人子奮呼袒裸持捉鬬爭而相掊擊於父母之前使良有司者治之必且罪瀆上亂禮之惡而未暇及所爭之曲直也又譬之人子不告父母而行以逐利於千里之外使賢父兄者訊之必且罪其輒往亦未暇問利之得失也如此以治春秋豈不簡約而易明哉故學者之惑有二一曰忘大法較曲直二曰棄顯義求微文曰圍曰入曰侵曰伐曰滅曰戰齊魯之相兵晉楚之相陵曰朝曰聘曰盟曰會諸侯之相從大夫之相交乃其不以王命則其罪固不容誅於聖人之筆矣此之謂大法捨此而規規剪剪辨其小善小惡此之謂曲直人君人臣非義不道之舉孔子未嘗沒其實曰賊曰盜之類觀其所書而見其惡其為貶也足矣此之謂顯義捨此而煩為之説欲格之以日月名字之例其例或與善惡乖忤而不協則又以曲辨而妄意之此之謂微文治春秋者提大法而信顯義則於聖人之意皎然而無所惑矣春秋論下聖人之道惟其是而已矣天下之事不一聖人所以行之者圓方橫邪髙下曲折或抑或揚或微或章而一趨於是孔子曰言必信行必果硜硜然小人哉又曰可與共學未可與適道可與適道未可與立可與立未可與權夫權之為名何哉猶物之在權能不失其輕重而已矣仁義孝悌忠信道之大經也君臣父子夫婦人倫之大經也聖人不以短妨長不以小破大短長皆順小大皆應其歸於道也易而直不幸而有梗不平於其間不可以偕得則必捐小以從大略短以圖長不殺則不仁則殺之者所以為仁也不取則不義則取之者所以為義也遇鄉人之長者俯伏而拜之長者仇其父則挺創而追之何哉輕重後先之理不得不然也其於道之大經蓋未嘗戾也其於人倫之大經亦未嘗亂也此其為不失輕重之節而聖人之所謂權者矣後世有公羊氏者出獨喜言權變欲教天下之臣子一切反經而為功其述春秋多以權之説赦姦臣賊子偽逆之罪使後世莫務為正而肆其邪心大亂聖人之道或者輒假此以起非常之迹據倚公羊氏之語勇為而無所疑事有不屬於中不入於正則曰吾以為權耳常人不吾知而吾亦弗恤也小則盜國大則攘天下詐者得成其志亂者得逃其誅是儒者言權之罪矣彼孔子語人者不曰學然後適道適道然後立立然後權輕重而行之孔子以適道為權而公羊氏以反經為權歟或曰孔子於其下又繼之以逸詩唐棣之辭以明反經之義豈不謂之然哉曰非也可與立未可與權句斷孔子别言逸詩之文曰唐棣之華偏其反而豈不爾思室是逺而彼作詩者因兄弟之乖離而喻之以唐棣子曰未之思也夫何逺之有蓋曰兄弟之未親已之孝悌不至耳意謂詩人之失辭此所以刪而不取也而釋者附之於權以符公羊反經之説豈不妄哉故謂公羊氏言雖辨而實聖人之罪人春秋之巨蠧禮論上嘗讀戴記其言禮樂詳矣髙出於太古深入於無間窮乎天地之際汪洋瀰漫殆不可知而後及於用學者之言曰禮樂者非天地之所出非人之所樂為聖人憂亂而矯為之不得已而人從焉者也人之所樂從所不學而能者情欲也聖人拂人之欲以就乎善抑抗詭切天下之衆以入乎禮是聖人之術也若是則戕夫天理賊乎道本而後以為聖人矣豈戕賊天理道本而為聖人耶大莫大於天下長莫長於萬世天所無者雖至聖不能強之使久立天所有者雖多力不能強之使必亡今夫禮也先天地而不見其始窮今古而不見其終傑者不得而逃暴者不得而滅惟其與人俱生原於自然而後能也故聖人知禮樂之出乎天地性情之所自有故因其理而導之探其本而文之不行則已行之斯成不言則已言之斯立大可以被天下久可以傳萬世桀紂率天下之人而赴情欲欲以絶禮禮不絶而桀紂亡秦焚聖人之書而樹已意欲以絶禮禮不絶而秦亡莊列之虛無楊墨之僻邪申商之殘刻秦儀之詭偽王樂之浮曠簧鼓其説馳鶩於禮之外欲以破禮禮終不可破而數子者後世不可宗禮非出於自然而何也晉有阮籍者知禮之足以為治而不知禮之原其言曰禮豈為我輩設哉抑亦妄矣彼亦無他以已之厭禮法而謂君子皆然覩薄世之溺夫欲而謂聖人之事不足樂特為侈論以髙天下也虛無之説勝而晉亡斯籍輩為之耳故禮者生於古始成於聖人小人復情以歸禮君子循性以安禮智者待禮而後尊愚者待禮而後存人之生於禮之中宕泆而出於禮之外者亡鱗介之生於河海之中躍而離於河海者死此禮樂所以為天下命也故曰故禮必本於大一又曰必本於天又曰天尊地卑君臣定矣卑髙以陳貴賤位矣動靜有常小大殊矣方以類聚物以羣分則性命不同矣在天成象在地成形如此則禮者天地之别也知此者其通於誠明之學乎禮論中禮生乎天地出乎人心循乎性發乎情其斯以為本人不能無生有生故有父子人不能無長幼有長幼故有兄弟人不能無正偶有正偶故有夫婦人不能不相親相親故有朋友人不能無強弱有強弱故有君臣故父子兄弟夫婦朋友君臣之禮其本則天地生之其節則聖人為之也因飲食之欲而饗食之禮作因男女之情而冠婚之禮作因其死藏生哀而喪祭之禮作因其羣聚嬉樂而射鄉之禮作故饗食冠婚喪祭射鄉之禮其本則人心固有之其文則聖人為之也凡天下之人利害不相稽則秦楚之人而讓怵乎利迫乎害則骨肉之戚而爭則是讓出於心爭出於事也讓出於心爭出於事則讓自中起而爭自外來也凡天下之人有餘則讓不足則爭有餘則讓則是讓出於心不足則爭則是爭出於不得已也此禮讓循乎性而有也凡小人之情雖奮拏攘攫而得之然或有愧於其色是奮拏攘攫者其偽而愧赧者其真也此讓禮依乎情而生也故禮之本非天地不因禮之節文非聖人不備循乎性依乎情交乎語言動乎容貌浹乎四體將之以辭讓濟之以物采悠爾而順翼爾而同方洋盈乎天下欲雖止之不可能也禮生乎天地而事天地出乎人心而治人心循乎性發乎情而安性情此之謂反本豺獺有祭祀雉鵀有妃匹蜂蟻有君臣鵲烏有孝慈鴻鴈有行列次序荒逺有喪葬聲樂天地之氣全於人不全於物故物得其偏人得其正聖人之功及乎中國不及乎夷狄故荒逺得其粗中國得其詳人可貴也禽獸可賤也中國可貴也荒逺可賤也中國之人而不能禮則不能異於物者幾希此之謂樂其所賤而忘其所貴禮論下自秦焚書之後學者不得完經亡者已亡而存者大抵皆雜亂已不可全信漢之儒者各守所見務以自名其家亦有非聖人之言而託之於聖人學者謂聖人之重也不敢輒議又從而傳師之故五常之道為之不明斯教之大害也孟子曰吾於武成取二三䇿而已孟子先秦而去孔子未逺猶謂古書之不可盡信况秦火之餘哉五經獨禮樂尤為秦所惡絶滅幾盡今之禮經蓋漢儒鳩集諸家之説博取纍世之殘文而後世立之於學官夏商周秦之事無所不統蓋不可以盡信矣嘗觀禮運雖有夫子之言然其冠篇言大道與三代之治其語尤雜而不倫夫聖人之所以持萬世與天地長久而不變者君臣父子而已矣苟無君臣父子則強者攫拏弱者駭動竄而憖憖息而盰盰人之黨將為禽獸之所勝其禍亂何如哉故楊朱為我墨翟兼愛卒以其説敗天下置天下之民於禽獸賴孟子出力而距之然後君父之教明聖人之道復存今其言曰大道之行也天下為公人不獨親其親不獨子其子如是而謂之大同又曰大道既隱天下為家各親其親各子其子如是而謂之薄俗又曰禮義以為紀以正君臣以篤父子以睦兄弟以和夫婦如是而謂之起兵作謀賊亂之本以禹湯文武周公之治而謂之小康鄭氏釋之又以老氏之言為之證薄禮而厚忠信嗚呼禮不出於忠信而安出哉鄭氏之學如此而尚有所牽惑豈聖人之禮生於詐偽者耶有天地則有生民有生民則有情欲有情欲則有爭奪民與天地同時而生情欲與民同時而生事與情欲同時而生故雖太古不能無事若版泉涿鹿之戰炎帝之虐而敗帝摯之戕而亡此其亂亡之大者餘皆久逺茫昧而不傳泯滅而後世不得聞之古之時未有城郭宫室則民皆有一旦之憂未知為耕織則皆有寒飢死亡之患未知為兵則若豺狼蛇豕之鬬未有書契則上之教令不行於下下之情訴不通於上由聖智之人繼出日除其所害嵗興其所利是故器用至後世而益便禮法至後世而益詳人靈益尊萬物益不勝有欲為治者不待創設而治天下之具明備周足不乏一物矣而世之妄儒忽近而歸逺輕其所見而重其所聞率以為後世之治不及太古必竹簡而書爼豆而食履古之舄服古之服坐於茅茨之下然後以為髙誦空言而忘治亂之大數是拘僻之病已故大道小康之説果夫子之遺言則是聖人之道有二也荀子曰文武之道同伏羲王者有意於為治居今之時用今之器而述五帝三王之仁義以安天下之民是亦五帝三王而已矣詩論上五經之道易可以潛而書可以彰春秋可畏而詩可樂禮嚴而不可踰其辭不同而為道一也世之學者常為祿利毁譽之所怵得之則止是以志之而不能詳學之而不能極其義知其文而不能知其道故五經之道益微嗚呼安得外祿利遺毁譽之人而使學之哉嘗觀於古君臣之相諭兩國之相交君子之言已志未嘗不稱詩溫乎其可愛也至後世禮樂皆亡而後詩道廢文存而聲不傳章句之師多而義不明紛紛於蟲魚草木間而未聞心通者釋詩者莫若毛鄭毛之説簡而深此河間獻王所以髙其學也至鄭氏之釋繁塞而其失愈多矣夫鄭氏之學長於禮而深於經制至乎訓詩又以經制言之詩性情也禮制迹也彼以禮訓詩是案迹而議性情也此其所以繁塞而多失者歟緑衣之詩而鄭氏以為䘵不諫亦入而鄭以為入於宗廟狼跋狀周公安間自得於讒疑之中故有公孫碩膚赤舄几几之句而鄭謂之公遜庭燎見宣王有怠政之漸而鄭以為不設雞人之官諸如此者不可以悉舉豈可謂之知詩耶蓋嘗觀詩學至於治世之作明君良臣相得於上而天下之民莫不各得其所夫耕婦饁擊鼓祭祝相與從事於田畝之間熙然怡然無愁苦怨嘆之聲未嘗不慨慕想見其性情嗟乎此真孟子之所謂王政者治至於此而足矣及觀衰亂之時歎悼之作又惘然若有所失也臣之於君欲其覺悟則誘之針之規之誨之戒之救之惡長而不變則刺之怨之閔傷之憂懼之尚不知止則或疾而或哀或思而或悔反覆而不捨躑躅而不厭故於一篇之中屢致其意其大意要出於其愛君之情而已矣賢者之處於世思以其道變亂為治而不以治亂變其志或為正或為變其大要出於仁義忠孝之性而已也其文詁訓所能釋而講師所能盡其性情非詁訓所能明而非講師所能言也學者欲觀於詩宜無為祿利毁譽之所怵浸潰優遊先入於道義而後入於性情然後有得於其間矣孟子曰説詩者不以文害辭不以辭害志以意逆志是為得之其性情之謂歟詩論下國風雅頌為風者不為小雅為小雅者不為大雅為風雅者不為頌學者以為章句之短長與夫美刺之義不甚相絶而分别若此或曰太師分之也或曰孔子分之也是皆未為知詩夫詩者古之樂曲故可以歌可以被於金石鐘鼓之節其聲之曲折其氣之髙下詩人作之之始固已為風為小雅為大雅為頌風之聲不可以入雅雅之聲不可以入頌不待太師與孔子而後分也太師知其聲孔子知其義爾亦猶今之樂曲有小有大聲之不同而辭之不相入亦作者為之後來者所不能易也孔子未刪之前世未嘗惑於四始何哉古樂存而詩之聲可知也樂亡然後學者惑詩矣周官大司樂之職已嘗謂之六詩風雅頌乃其音而比興賦乃其體季札觀樂於孔子之前而有國風雅頌之名於時諸侯賦詩以相樂者未嘗敢歌頌歌大雅者亦謂之僣則古樂未亡之時詩已班然而有次第豈太師與孔子強分之耶至孔子之時新詩復出而多古詩復雜而亂多者刪之而亂者正之爾故曰自衛反魯然後樂正雅頌各得其所也夫民能有喜怨而不能為詩時之賢者斷之以禮義而代之作以著見民之性情故政令之所及則喜怨之聲為之生喜怨之聲生則風雅為之作政令之所及者近而民聲狹其詩之體也必小其聲必為風作之者與録之者固不能張而為雅也政令之所及者逺而民聲廣其詩之體也必大其聲必為雅作之者與録之者亦不能蹙而為風也故雖文王之德才及於周召二國而未及於天下詩人無自而為雅二南是也及其盛也爵雖諸侯而功德如天子四方之民莫不歌舞之詩人亦無自而為風文王正雅是也此正風正雅之體所以異也幽厲雖無道政令猶可以及於天下其惡足以動四方之怨故其詩未為王風而尚為變雅平王止能號令畿內民而四方之民幾不知有王者故其詩不能為雅而為王風此愛風變雅也體所以異也禮樂征伐不出於天子列國之君得以恣睢橫行而魯輒為頌此周魯之頌所以異也故王者之業因正風正雅而復能至於頌頌亡而後至於變雅雅又息而王復為風王為風而諸侯敢為頌周有風魯有頌而春秋為之作興衰治亂如循環焉正風正雅王者積功纍德始起之迹也頌功德結於民王業之成也大小雅今王可叛而先王之德未可忘先王之基業未可傾也王風名為王而實如諸侯也故孔子刪定而録之先以周召之風以起其業次之以邶鄘衛國之風以著其鑒又次之以王風以伸其誡若曰從此不能正則必繼商而亡也先之以正小雅以見自微而勤勞次之以變小雅以見其怠惰而不德若曰先王勤勞如此而後王弗為何也先之以正大雅以見其盛次之以變大雅以見其衰若曰先王之業如此而後王喪敗之何也先之以周頌以見其治平次之以魯頌以見其王無可頌而諸侯妄作又次之以商頌以見諸侯妄作而不已周室將復為商若曰上有明王彼諸侯安得而盛也政不行而王猶不能奮諸侯盛而王不能自警胡不觀商之先功德基業如何今而為亡國也一經之體如是而已亦猶蕩之一篇之體本刺周室之大壞而止言商惡至其末章又言夏后氏其辭曰文王曰咨咨女殷商人亦有言顛沛之揭枝葉未有害本實先撥殷鑒不逺在夏后之世以三代之興衰反覆而為諷豈非聖人之意欲扶持全安後世之君申重不已而丁寧不厭者哉史論上天生孔子不獨為魯雖孔子其憂亦未嘗不在天下也周之末列國爭為雄長而天下騷然苦兵孔子拳拳於其間欲以一已捍天下之難故不用於魯則之齊之衛之荆之陳之蔡不用於諸侯則欲為政於費不用於中國則欲為政於蠻夷車馬之迹環於四方削迹伐樹流離困厄而不悔聖人憂天下之民不得其所而欲行其道如此其勤也孔子之門其弟子皆世之仁賢自顔淵而下惟仲由子貢得聖人之道尤多然而終出顔下者性有所蔽而弗全也仲由蔽於勇子貢蔽於辨顔淵終日靜默而孔子亟稱之以為已而仲由子貢或矜其勇辨孔子未嘗不屈折其氣而誡之也孔子歿聖人之道息天下於是益亂諸侯務相吞滅爭地逐利兵滿於天下不復知有仁義一切以權謀詐力相髙故輕險之士乘時而出摩吻淬舌起為縱橫之説以聳踴暴鷙之君而邀取勢利視民之死於兵如蚍蜉豚彘而曾不為之嚬顔故蘇張范蔡陳軫樓緩樗里甘茂商鞅韓非之徒皆長於揣摩辨議而當時號為賢智此固衰世之亂人也嘗讀司馬氏史至於數子列傳未嘗不歎憤以謂或與孔子同時使孔子有殺罰之權必不先少正卯而後數子及讀孔子弟子傳乃以為齊將伐魯而孔子私於父母之國使子貢遊説於外者凡十年存魯亂齊亡吳霸越而強晉子貢一出而五國皆有變細觀其所以説之辭則殊淺陋濶誕又非有䇿畫可以動五國嗚呼聖賢而肯爾為耶遷有史才而不入於道又其著書多采戰國䇿楚漢春秋以博其辭意其六國楚漢之間有僻士者戲弄文墨附著之孔子子貢以為小説而耀世迹其所從則童子可以不惑而司馬氏輒為之信尚而收採之歟五國之變亂其事皆載於左氏傳未聞孔子子貢之為人也孔子雖欲苟全丘墓之國使數國之民皆死於兵乎昔者楚昭王亡弓曰楚人亡之楚人得之又何求焉子聞之曰惜乎其不大也不曰人亡之人得之何必楚也此豈聖人之心已私其里人而移禍於他者皆小人之情活一鳥獸殺一鳥獸憂一草木害一草木厚其妻孥而暴其家厚其家而暴其鄰厚其鄰而暴其鄉國中人之所不為而謂聖人私魯而殘天下乎不表其非而出之則後世庸學必有疑縱橫家自聖人之門而出者矣史論下自古史才為難下左氏而得司馬遷下司馬遷而得班固至於范曄陳夀之徒又為班馬之亞其才如鱗之差而不齊也嘗嘆司馬遷如彼其才如彼其博贍而不能深入聖人之道以為已病先黃老後六經髙氣俠重貨殖則班固既言之矣又世家孔子而不為傳使孔子與陳項爭列欲尊大聖人而反小之其所以稱孔子者識會稽之骨辨羵羊之怪道楛矢之異測桓僖之災斯以為聖而已矣一何其鄙陋也及讀班氏史則與遷同其弊惜乎有史才而皆不能完也故能言遷之失而不知已之妄豈非有離婁之明而不見目睫者耶遷之自序已嘗分九流矣及固為藝文志迹其餘説遂以儒者與道法陰陽名墨縱橫雜分家農家分峙而齊驅且其説曰王道既微時君世主好惡殊方九家之術蜂出並作各引一端崇其所善以此馳説取合諸侯嗚呼固以為儒者取合於世而已乎宜固之附竇憲而死於非義也夫儒者之術教化仁義而已也使儒者在人主左右得以仁義教化為天下之治則所謂道家者不過為巖野居士名法家者不過為賤有司陰陽者食於太史局而縱橫雜墨之流或馳一傳或效一官農家者流耕王田奉國賦以樂天下之無事彼得與儒者相抗而為流哉小大輕重之不均不啻若太山與一羽之比也而固一之彼皆剽盜吾儒之枝業尚未得其正乃尊大之使與道並立於世以增學者之惑仁義之罪人也老莊釋氏楊墨之術雖曲見淺聞無足法者然其徒皆能張其師持其説故以區區之論而常橫行於天下以譁世而邀寵而聖人之教多衰替不揚世以此數溺於大亂實皆學者自戕其道以成衆家者如固出沒於經傳不為不博矣而其識褊狹如此扶持小説為股肱之材而抑儒者之道謂其止出於司徒之官未設則前世之所以為治者將無仁義教化儒者之道乎聖人之徒不務立論有事而後言事已而言已故其言精淳而不妄至班氏而下必欲足其編秩多其文辭捃剝天下之異端論以附已意立事以資其言事已而言未已由汗漫汙雜不可考信則聖人之徒遺文而文益髙不知道之比比以多言為纍故為力雖勤終不能一望聖人之藩墻其學者之病歟四子論上一氣之未判也明者莫能見智者莫能名強求其所以然字之曰元元有物耶有者安在謂無物耶天地萬物奚從而生哉故自然之有混而相與為一一與太虛等此之謂元元判而為氣氣判而為形天之旋地之遊日月星辰之光運動於上草木之華暢茂於下人之靈也神竒之荒忽也禽獸之衆多也昆蟲之微也莫不生於元氣之始曰元識之始曰性性之未判也猶夫元也及其判也為志意為情欲為德行為才能為善為惡為昧為明或動而見於外或靜而返於內動靜出入循環而不窮然後擾擾焉而多事矣其多事者性之用其無事者性之體也故曰寂然不動惑而遂通嗚呼得性而不盡言者其惟聖人乎昔者諸子蓋嘗言性告子孟子荀子揚子韓子五者皆天下之能言者也而其説莫有同者告子曰生之謂性孟子曰善荀子曰惡揚子曰善惡混韓子曰有生而有善有生而有惡有生而有善惡混告子之言則入乎命孟子之言則入乎德荀子之言則入乎情揚子之言則入乎意韓子之言則入乎才何謂入乎命其言曰生之謂性可生則可死命可以生死而言性不可以生死言也何謂入乎德其言曰人之性善善之名對惡而生而非獨有者也由昔者有無益於人而有害於天下者故謂之惡無害於天下而有益於人者故謂之善善有迹也性無迹也何謂入乎情其言曰目好色耳好聲口好味心好利骨體膚理好愈浹是感而自然不待事而後生者故謂之人性惡是情也而荀子謂之性何謂入乎意其言曰氣者適善惡之闕夫離性以為意意與氣相輔然後駕氣而之善惡則善惡之地去性也有間矣何謂入乎才性一而才百才可以别而性未可以别也故命也德也才也非性而皆出於性者也非性而出於性猶三才者出於元而非元也雖然尋其流而推之亦可以至於性不涉其流而造性之元者聖人而已矣學者欲知性莫若觀聖人四子論下聖人之性如何而觀之觀其道不觀其性道者聖人之所言性者聖人之所不言也沿道之本而究之以至於其極不觀而至於性矣聖人不言性者何故非晦其説而務以惑世未可盡之以言也有形者可以繪畫而知有物者可以揣摸而知有色者可以視而知有聲者可以聽而知有氣者可以動而知惟性也離乎形異於物不入於色不發於聲不假於氣知之則得之弗知則弗得也此其無可以喻也可喻則或非性矣今夫諸子者莫不爭言乎性愈辨則愈失愈詳則愈非何幾不思其不可言而強言之者也風霆無形鬼神無物天地日月無正色土石草木無聲氣於此有人焉曰吾無不能吾能收風霆之形而係鬼神之迹寫天地日月之正色而呼召草木之聲氣其所為者必妄矣性不可言而強為之言者安得而不妄歟子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也子貢不聞斯學者可知矣然而聖人雖不言君子不可以不知欲知性必先知道欲知道必觀夫子之文章陶乎易之禍福深於春秋之治亂極乎書之仁義逹乎詩之孝弟忠信性可以自知矣欲觀海外者談乎荒怪像乎波濤支頥沉想馳鶩其神於海之外亦不能有所至泛淮湖涉河濟而東則不日而至於海海可以必至也性猶未可以必至也故至於性者易謂之至至禮謂之知至箕子謂之皇極而子思謂之中庸文中子曰無所由亦不至於彼彼道之方也必也無至乎至者不得已而名之耳又可以煩言為之哉曰然則孟荀楊韓皆非耶曰四子者其蔽在言性近乎性者亦莫過乎四子之説也學者觀四子之所言而思聖人之所不言則自得之矣宋文選卷十八
