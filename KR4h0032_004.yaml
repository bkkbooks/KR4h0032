body:
  text: 宋文選卷四司馬君實文名分説臣聞天子之職莫大于禮禮莫大于分分莫大于名何謂禮紀綱是也何謂分君臣是也何謂名公侯卿大夫是也夫以四海之廣兆民之衆受制于一人雖有絶倫之力髙世之智莫不奔走而服役者豈非以禮為之紀綱哉是故天子統三公三公率諸侯諸侯制卿大夫卿大夫治士庶人貴以臨賤賤以承貴上之使下猶腹心之運手足根本之制枝葉下之事上猶手足之衛心腹枝葉之庇本根然後能上下相保而國家治安故曰天子之職莫大于禮也文王序易以乾坤為首孔子繫之曰天尊地卑乾坤定矣卑髙以陳貴賤位矣言君臣之位猶天地之不可易也春秋抑諸侯尊周室王人雖微序于諸侯之上以是見聖人于君臣之際未嘗不惓惓也非有桀紂之暴湯武之仁人歸之天命之君臣之分當守節伏死而已矣是故以微子而代紂則成湯配天矣以季札而君吳則太伯血食矣然二子寧亡國而不為者誠以禮之大節不可亂也故曰禮莫大于分也夫禮辨貴賤序親踈裁羣物制庶事非名不著非器不形名以命之器以别之然後上下粲然有倫此禮之大經也名器既亡則禮安得獨存哉昔仲叔于奚有功于衛辭邑而請繁纓孔子以為不如多與之邑惟名與器不可以假人君之所司也政亡則國家從之衛君待之而為政孔子欲先正名名不正則民無所措手足矣夫繁纓小物也而孔子惜之正名細務也而孔子先之誠以名器既亂則上下無以相保故也夫事未有不生于微而成于著聖人之慮逺故能謹其微而治之衆人之識近故必待其著而後救之治其微則用力寡而功多救其著則雖竭力而不能及也易曰履霜堅氷至書曰一日二日萬幾謂此類也故曰分莫大于名也嗚呼幽厲失德周道日衰綱紀敝壞下陵上替諸侯專征大夫擅政禮之大體十喪七八矣然文武之祀猶綿綿相屬者蓋以周之子孫尚能守其名分故也何以言之昔晉文公有大功於王室請隧于襄王襄王不許曰王章也未有代德而有二王亦叔父之所惡也不然叔父有地而隧又安請焉文公于是懼而不敢違是故以周之地則不大於魯滕以周之民則不衆於邾莒然歷數百年宗主天下雖以晉楚齊秦之強不敢有加者何哉蓋以名分尚存故也至于季氏之于魯田常之于齊白公之于楚智伯之于晉其勢皆足以逐君而自為然而卒不敢者豈其力不足而心不忍哉乃畏姦名犯分而天下共誅之也今晉大夫暴蔑其君剖分晉國天子既不能討又寵秩之使列于諸侯是區區之名分復不能守而并棄之也先王之禮于斯盡矣或者以為當是之時周室微弱三晉強盛雖欲弗許其可得乎是大不然夫三晉雖強苟不顧天下之誅而犯義侵禮則不請於天子而自立矣不請於天子而自立則為悖逆之臣天下苟有桓文之君必奉禮義而征之今請于天子而天子許之是受天子之命而為諸侯也誰得而討之故三晉之列于諸侯非三晉之壞禮乃天子自壞之也嗚呼天子之禮既壞矣則天下以智力相雄長遂使聖賢之後為諸侯者社稷無不泯絶生民之類磨滅幾盡豈不哀哉智伯説智伯之亡也才勝德也夫才與德異而世俗莫之能辨通謂之賢此其所以失人也夫聰察強毅之謂才正直中和之謂德才者德之資也德者才之帥也雲夢之竹天下之徑也然而不矯揉不羽括則不能以入堅棠溪之金天下之利也然而不鎔範不砥礪則不能以擊強是故才德全盡謂之聖人才德兼亡謂之愚人德勝才謂之君子才勝德謂之小人凡取人之術苟不得聖人君子而與之與其得小人不若得愚人何則君子挾才以為善小人挾才以為惡挾才以為善者善無不至矣挾才以為惡者惡無不至矣愚者雖欲為不善智不能周力不能勝譬之乳狗摶人人得而制之小人智足以遂其姦勇足以發其暴是虎而翼者也其為害豈不多哉夫德者人之所嚴而才者人之所愛愛者易親嚴者易踈是以察者多蔽于才而遺于德自古昔以來國之亂臣家之敗子才有餘而德不足以至于顛覆者多矣豈特智伯哉故為國為家者苟能審于才德之分而知所先後又何失人之足患哉信説夫信者人君之大寶也國保于民民保于信非信無以使民非民無以守國是故古之王者不欺四海霸者不欺四鄰善為國者不欺其民善為家者不欺其親不善者反之欺其鄰國欺其百姓欺其兄弟欺其父子上不信下下不信上上下離心以至于敗所利不能藥其所傷所獲不能補其所亡豈不哀哉昔齊桓公不背曺沫之盟晉文公不貪伐原之利魏文侯不失虞人之期秦孝公不廢徙木之賞此四君者道非粹白而商君尤稱刻薄又處戰攻之世天下趨于詐力猶且不敢忘信以畜其民况為四海治平之政者哉孟嘗君説君子之養士以為民也易曰聖人養賢以及萬民夫賢者其德足以敦化正俗其才足以頓綱振紀其明足以燭微慮逺其強足以結仁固義大以利天下小以利一國是以君子豐祿以富之隆爵以尊之養一人而及萬人者養賢之道也今孟嘗君之養士也不恤智愚不擇臧否盜其君之祿以立私黨張虗譽上以侮其君下以蠧其民是姦人之雄也烏足尚哉書曰受為天下逋逃主萃淵藪此之謂也范雎説穰侯援立昭王除其災害薦白起為將南取鄢郢東屬地于齊使天下諸侯稽首而事秦秦益強大者穰侯之助也雖其專恣驕貪足以賈禍亦未至盡如范雎之言若睢者亦非能為忠謀直欲得穰侯之所處故扼其吭而奪之耳遂使秦王絶母子之義失舅甥之恩要之睢真傾危之士也哉君子親其親以及人之親愛其國以及人之國是以功大名美而享有後福也今睢為秦畫謀而首欲覆其宗國以售其言罪不容于死矣烏足愍哉燕丹説燕丹不勝一朝之憤以犯虎狼之秦輕慮淺謀挑怨速禍使召公之廟不祀忽諸罪孰甚焉而論者或謂之賢豈不過哉夫為國家任官以才立政以禮懷民以仁交鄰以信是以官得其人政得其節百姓懷其德四鄰親其義夫如是則國家安如磐石熾如炎火觸之者死犯之者焦雖有強暴之國尚何足畏哉丹釋此不為顧以萬乘之國決匹夫之怒逞盜賊之謀功隳身僇社稷為墟不亦悲哉夫膝行蒲伏非恭也復言重諾非信也縻金散玉非惠也刎首決腹非勇也要之謀不逺而動不義其楚勝白公之流乎荆軻懷其豢養之私不顧七族欲以尺八匕首強燕而弱秦不亦愚乎故揚子論之以要離為蛛螫之靡聶政為壯士之靡荆軻為刺客之靡皆不可謂之義又曰荆軻君子盜諸善哉縱橫説縱橫之説反覆百端然大要合縱者六國之利也昔先王建萬國親諸侯使之朝聘以相交饗宴以相樂會盟以相結者無他欲其同心戮力以保國家也向使六國能以信義相親則秦雖強暴安得而亡之哉夫三晉者齊楚之藩蔽齊楚者三晉之根柢形勢相資表裡相依故以三晉而攻齊楚者自絶其根柢也以齊楚而攻三晉者自徹其藩蔽也安有撤其藩蔽以媚盜曰盜將愛我而不攻豈不悖哉丁公説髙祖起豐沛以來網羅天下豪傑招亡納叛亦已多矣及即帝位而丁公獨以不忠受戮何哉夫進取之與守成其勢不同當羣雄角逐之際民無定主來者受之固其宜也及貴為天子四海之內無不為臣苟不明禮義以示之使為臣者人懷二心以僥大利則國家其能久安乎是故斷以仁義使天下曉然皆知為臣不忠者無所自容而懷私結恩者雖至于活已猶以義不與也戮一人而千萬人懼其慮事豈不深且逺哉子孫享有天祿四百餘年宜矣張良説張良為髙帝謀臣委以心腹冝其知無不言安有聞諸將謀反必待髙帝自見偶語然後乃言之耶蓋以髙帝初得天下數用愛憎行誅賞或時害至公羣臣往往有觖望自疑之心故良因事納忠以變移帝意使上無阿私之失下無猜忌之謀國家無虞利及後世若良者可謂善諫矣韓信説世或以韓信為首建大䇿與髙祖起漢中定三秦遂分兵以北禽魏取代仆趙脅燕東擊齊而有之南滅楚垓下漢之所以得天下者大抵皆信之功也觀其拒蒯通之説迎髙祖于陳豈有反心哉良由失職怏怏遂陷悖逆夫以盧綰里閈舊恩猶南面王燕信乃以列侯奉朝請豈非髙祖亦有負于信哉臣以為髙祖用詐謀禽信于陳言負則有之雖然信亦有以取之也始漢與楚相拒滎陽信滅齊不還報而自王其後漢追楚至固陵與信期共攻楚而信不至當是之時髙祖固有取信之心矣顧力不能耳及天下既定則信復何恃哉夫乘時以徼利者市井之志也酬功而報德者士君子之心也信以市井之志利其身而以士君子之心望于人不亦難哉是故太史公論之曰假令韓信學道謙讓不伐已功不矜其能則庶幾哉于漢家勳可以比周召太公之徒後世血食矣不務出此而天下已集乃謀叛逆夷滅宗族不亦冝乎漢文説李德裕以為漢文帝誅薄昭斷則明矣于義則未安也秦康送晉文興如存之感况太后尚存唯一弟薄昭斷之不疑非所以慰母氏之心也愚以為法者天下之公器惟善持法者親踈如一無所不行則人莫敢有所恃而犯之也夫薄昭雖素稱長者文帝不為置賢師傅而用之典兵驕而犯上至于殺漢使者非有恃而然乎若又從而赦之則與成哀之世何異哉魏文帝嘗稱漢文帝之美而不取其殺薄昭曰舅后之家但當養育以恩而不當假借以權既觸罪法又不得不害譏文帝之始不防間昭也斯言得之矣然則慰母心者將慎之于始乎程李説易曰師出以律否臧凶言治衆而不用法無不凶也李廣之將使人人自便以廣之材如此焉可也然不可以為法何則其繼者難也况與之並時而為將使夫小人之情樂于安肆而昧于近禍彼既以程不識為煩擾而樂于從廣臣將仇其上而不服然則簡易之害非徒廣軍無以禁敵之倉卒而已也故曰兵事以嚴終為將者亦嚴而已矣然則倣程不識雖無功猶不敗效李廣鮮不覆亡哉漢武説孝武窮奢極欲繁刑重斂內侈宫室外事四夷信惑神怪巡遊無度使百姓疲弊起為盜賊其所以異于秦始皇者無幾矣然秦以之亡漢以之興者孝武能尊先王之道知所慕效受忠直之言惡人欺蔽好賢不倦誅賞嚴明晚而改過顧託得人此其所以有亡秦之失而免亡秦之禍乎霍光説霍光之輔漢室可謂忠矣然卒不能庇其宗何也夫威福者人君之器也人臣執之久而不歸鮮不及矣以孝昭之明十四而知上官桀之詐固可以親政矣况孝宣十九即位聰明剛毅知民疾苦而光久專大柄不知避去多置親黨充塞朝廷使人主蓄憤于上吏民猜怨于下切齒側目待時而發其得免于身幸矣况子孫以驕侈趣之哉雖然向使孝宣專以祿秩賞賜冨其子孫使之食大縣奉朝請亦足以報盛德矣乃復任之以政授之以兵及事叢釁積更加裁奪遂至怨懼以生邪謀豈徒霍氏之自禍哉亦孝宣醖釀以成之也昔鬬椒作亂于楚莊王滅其族而赦針尹克黃以為子文無後何以勸善夫以顯禹雲山之罪雖應夷滅而光之忠勳不可不祀遂使家無噍類孝宣亦少恩哉孝宣説以孝宣之明魏相丙吉為丞相于定國為廷尉而趙蓋韓楊之死皆不厭衆心惜哉其為善政之纍大矣周官司冦之法有議賢議能若廣漢延壽之治民可不謂能乎寬饒惲之剛直可不謂賢乎然則雖有死罪猶將宥之况罪不足以死乎揚子以韓馮翊之訴蕭為臣之自失夫所以使延壽犯上者望之激之也上不之察而延壽獨蒙其辜不亦甚哉王霸説王霸無異道昔三代之際禮樂征伐自天子出則謂之王天子微弱不能治諸侯諸侯有能率其與國同討不庭以尊王室者則謂之霸其所以行之也皆本仁祖義任賢使能賞善罰惡禁暴誅亂顧名位有尊卑道德有深淺功業有巨細政令冇廣狹耳非若黑白甘苦之相反也漢之所以不能復三代之治者由人主之不為非先王之道不可復行于後世也夫儒有君子有小人彼俗儒者誠不足與為治也獨不可求真儒而用之乎稷契臯陶伯益伊尹周公孔子皆大儒也使漢得而用之功烈豈若是而止耶孝宣謂太子懦而不立暗于治體必亂我家則可矣乃曰王道不可行儒者不可用豈不過甚矣哉殆非所以訓示子孫垂法將來者也漢成説晏嬰有言天命不諂不二其命禍福之至安可移乎昔楚昭王宋景公不忍移災于卿位曰移腹心之疾置諸股肱何益也藉使其災可移仁君猶不肯為况不可乎使方進罪不至死而誅之以當大變是誣天也方進有罪當刑隱其誅而厚其葬是誣人也孝成欲誣天人而卒無所益可謂不知命矣隱逸説古之君子邦有道則仕邦無道則隱隱非君子之所欲也人莫已知而道不得行羣邪共處而害將及身故深藏以避之王者舉逸民揚側陋固為其有益于國家非以徇世俗之耳目也是故有道德足以尊主智能足以庇民被褐懷玉深藏不市則王者當盡禮以致之屈體以下之虗心以誘之克己以從之然後能利澤施于四表功烈格于上下蓋取其道不取其人務其實不務其名也其或禮備而不至意勤而不起則姑內自循省而不敢強致其人曰豈我德之薄而不足慕乎政之亂而不可輔乎羣小在朝而不敢進乎誠心不至而憂其言之不用乎何賢者之不我從也苟其德已厚矣政已治矣羣小逺矣誠心至矣彼將叩閽而自售又安有勤求而不至者哉荀子曰耀蟬者務在明其火振其木而已火不明雖振其木無益也今人主有能明其德則天下歸之若蟬之歸明火也或者人主耻不能致乃至誘之以髙位脅之以嚴刑使彼誠君子邪則位非所貪刑非所畏終不可得而致也可致者皆貪位畏刑之人也烏足貴哉若乃令聞著于家庭行誼隆于鄉曲利不苟取仕不苟進潔已循分優遊卒歲雖不足以尊主庇民是亦清修之士也王者當褒優安養俾遂其志若孝昭之待韓福光武之遇周黨以勵亷耻美風俗斯亦可矣固亦不當如范升之詆毁又不可如張楷之責望也至于飾偽以邀譽釣竒以驚俗不食君祿而爭屠沽之利不受小官而窺卿相之位名與實反心與迹違斯乃華士少正邜之流不得免于聖王之誅尚何聘召之有哉用法説漢家之法已嚴矣而崔實猶病其寬何哉蓋衰世之君率多柔懦凡愚之佐惟知姑息是以攘幸之臣有罪不坐豪猾之民犯法不誅仁恩所施止于目前姦宄得志綱紀不立故崔實之論以矯一時之枉非百世之通義也孔子曰政寬則民慢慢則紏之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和斯不易之常道矣保身説天下有道君子揚于王庭以正小人之罪而莫敢不服天下無道君子囊括不言以避小人之禍而猶或不免儻人生昏亂之世不在其位四海橫流而欲以口舌救之臧否人物激濁揚清撩虺蛇之頭踐虎狼之尾以至身被淫刑禍及朋友士類殱滅而國隨以亡不亦悲乎夫唯郭泰既明且哲以保其身申屠蟠見幾而作不俟終日卓乎其不可及已宋文選卷四
