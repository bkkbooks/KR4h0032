body:
  text: 宋文選卷十九李邦直文唐虞論唐虞載堯之治曰謀於四嶽欠欠焉憂其天下終身而不得寧載舜之治吁俞疇咨以盡萬事之變而又巡狩天下遂老於蒼梧禮樂兵刑雜然舉之而各有條理觀其勤有過於堯者是不為無為矣而孔子嘗曰大哉堯之為君惟天為大惟堯則之蕩蕩乎民無能名焉巍巍乎其有成功也煥乎其有文章又曰無為而治者其舜也歟夫何為哉恭已正南靣而已矣學者嘗惑於此夫虞舜之所載者治之迹而孔子所言者治之神也何謂其然也夫營為動作之由已莫過乎人今完安無疾之人手可以執足可以馳耳目可以視聽而腹心可以慮欲有所措無不應者皆可以自為之矣則以為營為動作莫不出乎已及詰其極究其所以能然者則雖智者猶不能自知也故由已而可為者迹不自知其所以然而然者神也天地之化氣之所感雨之所濡莖葉之勾直長短圓斜狹大華實之濃淡芬芳臭色之不齊味之衆多莫不各足其形一陽之所溫一雷之所震飛者躍者巢者穴者吟者默者或鱗而泳或翼而升或毛而羣或介而潛莫不各足其分此人之所可見也此化之迹也詰其何為而能然而誰為之者則明哲所不能計智巧所不能匠雖聖人莫之或知也此化之神也人之可以自為者猶不能自知變化之出乎天又果知天之能自知其所以然耶故聖人法道以為用體神以為治溟涬真朴漠然而全陶然而遂萬事不能滑其中安安而有餘如遺天下者天下之人鼓舞之而不足用之而不知自化也自安也自悅也自威也則終日言而如未嘗言終日為而如未嘗為此堯舜之所以為大也彼昧道者不然一君之心兩耳目之聰明耳而臨四海之廣穰穰之繁欲御之以智縻之以力矜其健察作其巧辨雕鎪百為咻噢萬狀焦焦然日置天下於其胸中而又為情偽喜怒之所紛亂智索力殫矣而天下囂然方不可勝理則醇且醨願且詐傑者為之僅得小治而已矣安能如嚮堯舜之治耶孟子曰王者之民皥皥如也霸者之民歡虞如也知此然後知堯舜矣故大聖人之為治雖有為於外必無係於心藏其神致其用使天下之人莫能窺已之涯譁趨奮起以為幸故靜而不爭所謂無為之治也後世王者暗乎有用樂乎無為不知堯舜之神其化則又欲其摽枝芻狗治天下溺入於老釋逍遙寂滅之説兀兀焉宴坐於深宫以待天下之自治是烏知孔子之所謂無為者歟三代論揚雄班固王通之儔莫不以三代諸侯為久安之術而罪秦之郡縣至柳宗元獨曰古之諸侯聖人之意非不欲去也其勢不能去也以為其治不若郡守嘗究之矣夫王者處乎髙危而以一姓孤立於四海之上一姓之安危乃天下之所以為治亂死生也夏商周之君相傳者數十世雖有屈強之諸侯時不免於戰伐然亦未嘗有流血天下兵火之禍如後世者幾二千年而才三易姓亦必有大惡如桀紂至聖如湯武又其祖宗之著德甚久然後可以集有天下之諸侯自秦至於五代覆亡之宗紛焉如風中之稿葉生民數陷於大禍則是諸侯之前民數百年乃一擾而變侯置守之後天下之人常栗栗焉而無所係也論者多取周季戰伐之紛亂以為建侯之罪夫幽厲懿夷之王較其昏暴王之於郡縣之時非莽卓盜之則陳項有之矣惟其諸侯之國各疆土據桀強者未能并服而為一故衰亂而周不亡也論者又取晉之宗室舉兵相殘以為鑒夫以惠懷在上政亂於中而號令不行於天下於時謂之互市又使不義之君得舉兵以擊義國其微暗不道雖糜爛而亡不足怪也其所以未亡而再進於元帝者藩國之勢也故上有明天子則諸侯而治郡縣而治為上者其非道則諸侯者亂郡縣者亡禍之輕重也有殊矣彼周之時吳楚齊晉雖悖傲而不臣力非不足也而不敢曖周之鼎何哉列國皆有兵有賦而用周公之禮樂彼未能一旦而君此此未能一旦而臣彼由此而然也晉宋梁隋之所以得扼吭拊背於中傳檄而天下定郡縣雖有忠勇之臣莫不拱手聽命圜視而不敢動何哉天下之權素有所一也兩漢之有天下王侯郡縣雜建而年以四百雖有七國諸吕之難而劉氏以中興唐之有天下宗室為刺史勳賢為藩鎮僅如諸侯之制而年以三百雖有齊蔡燕趙魏之寇二朱安史之憑陵而李氏以長權散於天下而莫能一也以天下之大而明主不世出後世鑒存亡之效可不約三代漢唐之制雜樹親賢於外少為王者之拱衛耶子厚之説未識治亂之大計亟云以為異論耳不亦妄哉秦論易曰本乎天者親上本乎地者親下氣可上而形不可上此必然之理也故曰魂魄歸於天骨肉歸於土天無形則無敝有形則有敝雖天不能使之易此言者也是故生而死堯舜之聖禹湯周孔之仁智之所同賁育之力之所不免也至秦始皇既以力併諸侯而以氣攝天下矣舉六國之宫室寫之咸陽之坂以為其居舉六國之玉帛而輸之函谷以為其用舉六國之女色鐘鼓納之於阿房以足其欲羣臣莫不稱頌其功德秦皇坐亡國之殿聽亡國之音趨走遮列亡國之臣心侈意廣自以為萬世莫吾及顧少羽翼而升耳於是車轍馬迹交於海上登之罘浮江湘以望方士之所謂三島者棄其赤子航之於東夷以卜其所謂仙不務事事而跕跕然狂人客死於沙丘不得親傳之良嗣遂亡其國自黃帝葬於橋陵下及於三代之盛未嘗有仙之説至漢孝武侈欲極而外道之惑乘其隙而入用方士之言邀神靈而祠鬼物橋陵者存而方士輒曰此葬其衣冠耳又從而信然之以其女女方士與方士傳車而宿當是之時天下幾大亂周之末有李耳者為虛無無用之語以髙世雖背仁義之教而馳然亦未害為處士避世之小道也使李耳之存於時王者召而禮之不過賜之粟帛杖履而退之養之一丘而足矣至唐明皇曰李耳吾祖也今存而仙其位髙大與天帝並遂推其言以為經而為之祠宇散滿天下賤禮樂刑政謂之俗務而弗親中國幾為安史之所有秦漢唐之君皆命世之才也咸以仙敗終其世而不悟可不哀哉古之時王教之害尚鮮至後世而其弊百出曰楊墨者曰佛者曰老氏者循環而交以攻先王之仁義使仁義衰而異教立嗚呼自是以來生民之命搖然無所附矣其禍也始於秦而流於漢昌大於唐室至後世而不可破後之仁君將復有仙亡其國者矣西漢論嘗觀西漢之君大抵承秦之餘以剛斷明烈為任文景武宣皆有君人之至概宣帝以孝元柔仁知其必亂天下已而果然夫人君之氣必主於剛其柔仁者濟物之變補事之隙時為之用耳不可以為常也故君者天也陽也其明日也其令風雷也天健而運日實而麗雷烈而威風行而無迹四者不廢然後可以生萬物而齊變化陽不足則天有時而裂日有時而虧雷或不發而風或不播休弛鬱塞之氣極而妖厲災疾作於下下至於昆蟲草木莫不蒙其疴易曰天行健君子以自強不息又曰剛健中正純粹精也剛健純粹此所以為天之體而為君之德乎髙祖最剛而最明故其基宇廓大而宏逺不可以亟壞其餘勝遺烈猶足以震動天下之耳目而制大臣之心故惠帝孱懦髙后女主哨哨於簾戶之間而嬰噲平勃之徒攝衣而趨交臂而受職莫敢先後而不率至文景之為君其治出於恭儉仁恕然其君臣之間尊嚴而甚可憚繼之孝武雖侈且虐生民之屠於兵大臣之夷滅於法者幾且大半天下之怨可謂極矣而能興禮樂隆儒術拓土傳祚為漢英主孝昭幼而明斷故燕王蓋主桑羊上官謀發而中敗不得有所措孝宣承之核刑名而責功實天下遂至於太平此六七君者亦非有完德具美也事之失度而過中者不為寡矣然且不失為治教化以之行社稷以之強固非以其有人君之概主之以剛德而然耶元成哀平固未嘗有顯惡大過暴不若桀紂淫不若幽厲徒以濡弱偷墮無剛明之氣終不能一奮人主之威卓然有所立愔愔默默以至於亡可不惜或有天子之仁義有大臣之仁義有匹夫之仁義天子兼萬事之柄將以制中國而威四方而專為匹夫之仁處士之行拳然以小亷細謹自持者則是失其所以為大則天下無所恃而姦權嬖幸特以朝廷為戲維持牽制貿亂人主之所為各任其私意以暴民而侵掠天下人主雖不貪取而天下不勝其困人主雖不好殺而天下不得其生賢君則不然以為忠信孤逺之臣待我之剛然後得以立至弱之民待我之剛然後得以振其剛明以強本而威衆使內外大小皆有所恃於上而天下不勝其樂書曰天降下民作之君作之師惟曰其助上帝寵之四方有罪無罪惟我在天下曷敢有越厥志此武王之剛也鑒乎西漢之存亡治亂則君之剛德可一日而廢之哉善觀君德者無取其一善一惡要其有人君之概而已矣東漢論聖人之所以長有天下者無他得其民心而已矣末世之所以失之者喪其民心而已矣民心之所欲歸兵不可以驅而散其所欲去利不可以誘而還也其事至近而所繫至大其説至易見而智亦時有所惑也西漢之亡也其君非有苛毒加於民特以柔暗而無決承之以幼懦主之以母后聰明威令不能過房闥之外而天下之柄姦臣得以盜而有非漢之失民非民之厭漢也及化為王氏有王田之擾有六管之侵師旅興於前旱蝗繼於後夷狄攻其外寇盜攘其內使天下之民潰裂四出而不知所從遂以攻莽而亡之當是之時民苦其亂而思嚮時之安以為能安天下者劉氏而已耳故聖公起於荆盆子起於海曲王郎起於趙劉永起於睢陽伯升起於宛皆唱之於劉氏奮梃以為器揭竿以為旗徒步振呼而郡國之衆雲集霧聚莫不為之用雖有隗囂公孫述張步之徒相與馳逐奮取卒所以得之者劉氏也及天下定於東漢而百姓果得其所欲以光武之聖顯肅之明其治皆雜於儒雅而隆師重道修舉禮樂以率其民民之興行為義幾多於三代殤安之後女主權臣常握禍福之柄民之所以未入於塗炭者行義之臣奮不顧死力爭於朝以折嬖邪之鋒也及桓靈繼統宦官之勢愈烜赫於天下矣而賢者終不為之少屈彼賢者之盛於下知其必能再起劉氏之治而不利於已誅其一人則死者一人而已未足以痛杜其後而為忠信之戒也乃目之以鈎黨禁錮誅殺天下之賢人處士殆盡其禍蓋不減於秦又以宦官子弟為民之牧宰侵掠殘困民焦然不知為生之樂莫不挼掌捩腕疾視其上欲漢之亡者蓋十九矣故黃巾一起同日而應者三十六萬何盜之多耶民以為漢德不若黃巾之可從也及東漢將亡所謂袁紹袁術者以庸庸之材幾有天下之半人歸之者襁負而相屬彼以袁為可歸耶誠以袁氏繼世為漢三公其所出力而排禍難者德有多於劉氏如此而已以此知劉氏之見絶於天下也孔明承之又欲以區區之蜀為光武之舉信大義而復之漢其名雖盛而四方莫應豈非民心去漢而然哉勤苦艱難終不能以亟定是非昭烈之罪桓靈之惡怨於民心之深也其如霸蜀之業則孔明之才力致之與魏吳他姓之興者蓋等耳非有思漢之助也西漢亡而復之之易東漢亡而復之之難民心之去就可不畏歟書曰民可近不可下故王者之禍莫大於失民心或曰漢之興亡天也非人事也是烏足以知治亂魏論孟軻之言王道常賤利而本仁義當世之諸侯皆謂之闊疏而後之學者亦或疑其為空説以示訓嘗竊觀之先鈍而後利王之易者莫若仁義之為用小利而大拙力殫而功少名敗而實從之者莫弊於權謀也周既亡而秦能一天下之諸侯秦之亂髙祖起兵才五戰而天下定於漢西漢之業為莽所盜者十二載而世祖興世祖之興三年而復為東漢髙光之建業一何其易也基宇一何其宏大也傳之子孫一何其長也東漢之亂豪傑據國而虎爭善用兵者莫過於魏武建安之元始迎獻帝以入於許自是中國之權歸於曹氏官賞兵刑紀綱號令莫不自曹氏出漢帝挈挈守空器而已於時取之之易若拔一毛然而止能集天下之勢故不敢取用天子禮樂者凡二十五年而身終於北靣及丕受獻祚四方之君者三魏一再傳而其政已為司馬氏所有觀魏武之建業一何其難也基宇一何其狹也傳之子孫一何其弗永也豈謂魏武之用兵不及於髙光耶謂天之意不欲天下之亟定於曹氏耶謂用兵不及於髙光則魏武固能兵矣謂天之意不欲天下之亟定則天下之厭亂不為不久矣何難易小大長短之不相若也如此嘗以為天下大物也不可以詭譎服不可以威力御有偽而霸無偽而王有偽而享國無偽而享天下彼髙祖世祖之所以興雖褰裳奮劍馳逐而得之然皆有仁義之資忠厚之量故人心易一數載而成大業已成而天下怡怡不復搖動魏武則不然其治身其任臣其使民其取天下一本於詭譎威力無復錙銖仁義忠厚之實是以孔融楊修誅死而不肯臣荀彧感恨喑噎而斃天下義士雲長之徒掉臂而徐去管寧之屬浮海而避之惟得巧詐之士而與之共國競競焉憂竊發之變故雖虜張繡走二袁擒吕布馘髙幹戎旗北指而烏丸踏頓為之破兵鋒西向而宜堪超遂為之平有智者莫不憚有力者莫不屈兵強戰勝而天下益疑之思與之為敵用力勤於二漢而土分於吳蜀垂業至於二世而運奪於宣景何哉失之於險害刻薄而不以仁義忠厚撫天下也人之形可劫而人之心不可劫人之財可掠而取而人之心不可掠而取天下之土可以強而兼而天下之心不可以強而兼迅疾不讓怒若風火者雖速必緩欺其人而得之者雖得必失得民之心者不欲有民而民必歸之大國之賈出其貨財貿易於廛市持之以信守之以亷意思間緩如不欲多得者故利之歸也愈厚其為富也必久有貪賈者持籌如變化罔利如寇攘人由是莫敢與之賈以至於飢而死孟子曰苟行仁政四海之內皆舉首而望之欲以為君魏武何知焉孔明之為蜀先以仁義治其國後以仁義之聲動天下三州舉土以歸於我而輒不取是以一舉而魏之君臣相聚而憂當是之時民心雖已去漢以孔明仁義之才挾備而自為亦可以有所立天下之未歸蜀者特須時耳孔明不幸功未成而且死使孔明不死魏吳其一而為劉蜀乎孝明之區區焉能抗之哉梁論先王之教皆本於禮義世之不得則不生如此其急也然而禮義之教至後世日以消亡而以之大亂有賢者出莫不欲引古而復之而已亡之教終不能復佛者夷狄之教也一入中國中國之人為之奔走惟恐在後衣食可絶而佛費以為不可絶法可犯而所謂戒律者以為不可犯父母可慢而以為佛不可慢流熾植大至於今世而日以盛有賢者攘袂而詬之操矛而攻之力憊矣而終不能去何禮義之去而不可復佛之來而不可去也是亦有説焉夫小人之情好私而忌公禮義惟公而佛惟私小人常多而君子常少此禮義之所以易衰而佛之所以易盛也所謂公與私者何謂今夫禮樂之為教人果秩秩而循之則終身安焉而不扺於戮辱其利於人者為不少矣而小人莫為彼佛者之説則曰汝且終日放其情欲殺人以逞欺衆以牟財已而事吾佛則罪釋而無害汝且朝而為惡夕而事佛壯而為惡晚而事佛不惟罪釋而無害且有厚祿而加汝焉書其效於紙揭其狀於壁小人既不能無為惡故為惡而得利則分其財於佛之徒以求解如是盡天下之室為佛居舉天下之衆為佛衆亦不足怪也故曰小人之情好私而忌公禮義惟公而佛惟私小人常多而君子常少小人固無足異矣又况世之君子時有陷溺於其教榜而唱之者耶嘗觀東漢以來佛説之惑世晉之末凶悍驕逆屠滅生靈以為戲其暴過於豺狼者莫甚於石虎姚興禮義曾不足以動之而畏佛最甚下此則髙齊既以戰得之弗返於禮義以靖亂而欲事佛以自救梁武之用兵亦工矣侯景之師將至於城下而率其臣誦佛於庭卒以此亡國不亦悲哉夫既天下之信尚之也小人之倚佛以為貨者把執禍福嚇欺愚聾如挾劵質量其所入金錢之少多而交手貿賣上至於京師下至於夷狄至於一邑之衝一鄉之聚必有其徒焉如是者紛紛於天下上之人不能盛禮樂之教以敵之其所以為治者一皆出於文法固以薄矣而文法又多為姦吏之所貨姦民之請於吏隨其重輕或可以得意幽則約於佛明則要於吏私既勝而公道廢王者禮義之教皆不預天下之權嗚呼安求其不大亂也斯弊也根固而源逺不可以亟拔不可以亟塞矣後之君臣陷溺於此者其不觀梁之所為乎隋論治天下者以王道不可為之以吏治吏治可以苟天下之安而不可久也純以王道而治者三代是也吏治與王道雜然而用者漢唐是也純用吏治者隋文是也自禹至於桀自湯至於紂自武王至於赧三代長久各數十世安而少變者幾二千年自髙祖至於孝平自光武至於獻帝自髙祖太宗至於僖昭兹二姓者或四百年或三百年不及於三代之長而有過於歷世之祚若隋文帝之於天下於時亦可謂之治平而寡事矣然才三世三十九年而亡其故何也吏治與王道之效不同也故三代用王道而長漢唐雜之以吏治而不及於三代隋文專以吏治而不及漢唐是非王道與吏治厚薄之效耶夫隋文九年滅陳而天下始一奮勵於為政每一坐朝或至日昃五品以上引之論事宿衛之士傳飱而食至於兵革不用天下遊食之人户口嵗增過於兩漢其富庶而康寧如此常人之所謂太平而識者皆知其不能久也何者無禮義以維持其政無忠信以固結其臣教化不足以導其民紀綱不足以防其後一切以辨敏勤察為能處三王之位而卑卑焉任智數核文法此特吏才之尤者耳非王者之為也故王通謂其終以不學為纍而房喬於清平之時而獨知其將亡彼或用王道而常為百世慮國祚之永人可得而近測之哉嘗觀於三代其為治之旨皆本於仁義禮樂先教化而後刑名厚道德而薄功實其始雖若迂逺而其成以至於兵寢刑措暴炙百姓之耳目浸漬涵糅百姓之骨髓其勢蟠大膠固如置方石於平土之上天下之形可以漸亂而不可以亟壞也末世中君德既不及於古才亦不至於道所用者皆俗人而所尚者皆細法爭於功用勇於擊斷謂簿書刀筆之間可以為治語之以王道則項背而竊笑強者為之及其盛猶可以自守一有勢罅則怨心紛然內外皆為之擾動姦豪乘其弊而起其撓天下如驅羣羊而蕩王業如振欹器耳是故民衆而益亂地大而益危嗚呼彼安知三代有長久難動之法乎後之王者鑒於三代兩漢隋唐之事亡恃吏治之安而留意於王道斯可以長有天下之民矣唐論天下之亂常起於內不起於四方先之以朝廷之姦繼之以藩鎮之盜未有朝廷無􅑆隙而藩鎮敢叛渙者也人之弱於氣者寒暑疾病易為之侵木之傷於心者風雨蝎蠧易為之敗明君賢相整豫法度修豫甲兵撫豫人民雖有強梗必為忠順一有弗率天下之所共攻也苟不能自治雖有臣妾必為豺虎唐之亂也人皆知藩鎮之亡而不知唐之有以自亡也一軍闕帥上擇賢人置之則已矣而必取帥於其軍其姦將豪卒內交強臣而外交敕使以市兵權得之則取償於其民宦者之使陰得寶賂偽以一軍之勢嚇劫朝廷而取必彼小人者一旦據土地擁旗甲權盛氣完約堅謀合罔不睢盱自疑恃衆而為盜而朝廷方且用姑息之法慰之以金劵飽之以玉帛欲以息兵此其所以樹兵者歟柄既去矣藩鎮既強矣又不能信任天下之賢以為將相使之整法度修甲兵撫人民為所以禦盜之具所以圖事於宫中不過一二邪臣三四宦竪措置萬事舛謬顛倒方正之路塞幸曲之門開惟埋藏機牙以中傷賢者為事故天下之心咎其上而易以生變此以見非獨藩鎮之亡唐而唐之有以自亡也有國忠林甫之蔽然後有函陵之師有魚朝恩程元振之讒然後有永泰之亂有盧杞之邪然後有奉天之厄有惠王昭愍之驕昏然後有藩鎮之叛章武中興一裴度而已裴度用則藩鎮為唐之臣度不用則藩鎮為唐之盜故曰天下之患常起於內不起於四方也杜牧善論兵其為罪言盡河北逆順之勢曰上䇿莫如自治中䇿莫如取魏最下䇿為浪戰夫蠻夷盜賊彼雖無賴然亦有桀黠之才小人之智有以窺測朝廷之所為權量其輕重強弱而自為計我自治且弗辨則蠻夷盜賊投其隙而動使唐之君皆能如杜牧之言而自治任得其人政得其道則藩鎮為我之手足耳目竭蹶趨走之不暇如正觀開元時矣焉得而憑陵哉五代論天下之治亂如昏明寒暑之相從也五帝三王既去而天下為秦秦亡而為漢自漢帝之元年嵗在協洽以及於今千二百有七十年其間亂世多而治世少基業宏大足以傳之子孫而久者漢唐聖宋而已魏雖有蜀而不能有吳及魏入於晉晉平吳而天下始一一之者未久散為一十六國而晉遷於南魏起於北魏衰而又為東西東魏入於髙齊西魏入於周閔相與鼎峙而立周能併齊而天下尚為二及周入於隋隋既而平陳然後一天下而君之隋不能堅又化而為唐唐亡而為五代抑亦屢變矣舍夫漢唐而觀之餘據土而君者一爝火之明也然而自古亂亡莫甚於五代周秦漢晉之間以兵攘間有天下之豪傑或借仁義本謀術五代之際率皆凶卒小盜公行而無愧膾胾生民而盡之禮義亷恥無髮遺矣莊周曰後世必有人相食者豈知後世之亂有過於相食耶然而不大亂不大治五代之大亂天所以開聖宋也宋有天下相繼者四明聖百餘年間生民之安過於漢唐內無擅威之臣外無強大諸侯下無姦民攻掠之變十人之盜起則不月而傳駭於天下之耳目况能容大盜耶其安治如此然而識者觀天之勢尚為之憂栗而不寧其故何也夫始治者天下之所樂而久治者明知之所憂也實之美者多蠧味之甘者生醯雞康樂而克逸者萌疾病物慎乎其極則必至於變古之王者知其物理之極懼其變而為危則先自為之變使變而治此其所以久也居治之久而未知所以變此非今之可憂者與今天下之民丁黃老幼孶育而繁夥其數多於漢之文景唐之貞觀間元見生齒之極於此矣耕者升山巔樵者入窮谷土不為不辟農不為不力而常有凍飢之人天時豐穰則中戶已上歉歉僅足一有水旱螟霜之嵗則百姓流冗轉移相枕藉而死於道路可以常豐而不可以有凶災見其用天時出地利之極於此矣國之於利算及行人租及動物小吏為公家而坐列販賣如賈人焉者信於治人之官世入之用朝而夕謀夕而朝憂有日月之慮而無二三嵗之計可以常無事而不可以忽有為可以常靜而不可以一動見財力之極於此矣至於上之政令下之奔走或疲極而倦厭而朝廷之治特為偷且欲以循循而格萬世之安卒未能磨濯剗􅩊奮然而有所變竊恐其失於不變也天下之治亂如昏明寒暑之相從也可不前計而預慮者哉宋文選卷十九
