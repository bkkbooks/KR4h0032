body:
  text: 宋文選卷十二余元度文堯舜非諡論迹驟五帝德規百王者有堯舜焉言常道尼父首之于書大一統馬遷列之為紀釋者云堯舜諡也翼善傳聖曰堯仁聖盛明曰舜後之學者罔不宗焉豫嘗考世系之端辨質文之變頗疑是説請試明之粵自邃古聖人迭興真淳乍散制度未備尊盧赫胥以前未有姓氏皆以教民之事而名之鑽燧改火則曰燧人穴處巢居則曰有巢是也逮及三皇頗推五勝乘火帝者曰炎帝應土運者曰黃帝少昊金天亦襲其故迭觀興廢漸有兵戰自顓頊以來天下之號則因其名顓頊與嚳則其名也帝摯帝堯帝舜亦其名也以國言之則顓頊稱髙陽氏帝嚳稱髙辛氏帝堯稱陶唐氏帝舜稱有虞氏皆以所興之地為國號也帝摯非改姓易代之主故不稱氏以名言之則顓頊嚳摯堯舜皆名也頊正也嚳極也摯大也堯髙也舜華也古雖敦朴知以美字為稱因不疑矣夫諡法者著于周公蓋三代之際世有僻王嗜音酣酒者有之荒禽冒忌者有之飾非愎諫者有之剖忠害賢者有之欲使聞美號而知勸見惡諡而思懼垂易名之典為觀行之則此周公之制也豈以周制而逆觀堯舜之世耶且堯之典曰有鰥在下曰虞舜當羣臣舉善之初釐降試難之善未顯賔門納麓之功未著安有對萬乘而不稱其名在側陋而先定其諡哉斯固知其不然也明矣釋者又云受禪成功曰禹豈舜受堯禪而不能成功乎夏商之王以名為號者多矣仲康太甲之類是也禹之保邦莫非堯舜之制而加以繁文縟禮烏有捨勸誡而就質略哉若以夏道尚質則禹非夏耶愚謂周公之著諡法也特取堯舜禹湯之名以為訓解將後之下武守文者慕其名而襲其行也周人以諱事神諱其名而稱其諡者周道也諡興于周為得彌文之實漢武不宜稱宗論創帝基革天命濟率土于塗炭者祖之盛恢聲教同文軌納蒸民于富夀者宗之最存則詠其德沒則觀其諡所以序昭穆于百世之下配禘郊于羣廟之上親雖盡而不毁者祖宗之隆也昔武皇之撫運紹炎漢之重熙拓蠻夷之境則衛青去病之勛立而民疲于干戈矣惑神仙之談則少翁欒大之寵崇而吏煩于祠祀矣悅韓嫣之佞而處以副車則君臣之位失矣信江充之譛而誅及戾園則父子之恩絶矣舉其大概何昏如之至于即世之日羣臣加諡曽不為靈若厲而反壯其武而為世宗虧周公之法敗三王之制當時洪儒碩士如夏侯勝黃次公議其樂章遽抵詔獄不亦甚乎且祖有功宗有德若夏之少康商之太戊武丁皆廢而復興不失舊物然始為之宗也周人自文武而下雖德如成康刑措不用宣王中興姬道再盛廟在迭毁亦無異號暨乎漢室髙帝以英武特起紲嬰刃籍戴之曰祖斯固宜矣孝文崇仁義省刑罰弭兵革服節儉而囹圄空虛宇內太平廟稱太宗斯又宜矣孝武雖廓地斥境而亡德及民不加惡諡固亦幸矣尊之為宗無乃失其正乎或曰孝武雄才遠略髙出百王而開夜郎之境東建朝鮮之郡丐奴徙庭甌越請吏修典禮嚮儒學登封告成而漢之制度於是乎備若如所論不亦過乎曰邦土雖闢兵已黷矣遠人雖服民已耗矣樂府雖盛雅亦亂矣泰山雖封制亦侈矣文景之俗由是而􅉵可勝道哉末年下哀痛之詔進管𣙜之術有富民之心而不能得其道也世謂漢家雜以霸道愚以武帝觀之曽霸者之不及代廟弗毁後嗣何以觀乎西漢稱宗者四而東漢無復區别至於安桓亦有廟號其失自武帝始故著論云秦論上前世高論咸以河山之險秦得百二遂并天下者地勢便利使之然也所以奉春進計田肯建言著之文牘千古稱善愚謂秦人之興有由然矣自伯翳至於秦仲率以立功克守其業而僻在岐雍諸侯以要荒處之穆公之世得人而昌廣地開國悉由任賢之勛矣百里奚亡虞之臣也而授以國政孟明奔軍之將也而委以師律引咎自責卒復河西之地由余在戎公以為憂當其未聘也降千乘之尊而接以殊禮坐則曲席食則傳器及其來歸以客卿待之故能益國十二闢地千里遂霸西戎而抗衡中國矣暨乎即世之日三良殉葬國人哀之賦以黃鳥秦人不復東征數世不競者奪其善人故也及孝公嗣守宗祊七雄並立當是時齊威楚宣魏惠燕悼悉已稱王韓哀趙成亦復強大諸侯力攻而周室卑矣孝公增修穆公之德寤寐賢者列爵而尊之分土而與之衛鞅以孽公子來見遂用其謀開阡陌急耕戰法行民便亦以稱霸後世遵陳軫范睢蔡澤離疏釋蹻而取卿相任賢之術速于置郵卒能滅二周吞六國而并天下者用此術也且蘇秦反覆之臣燕王一聼其言而合從山東秦人不敢窺函谷者十五年以此思之一賢之功堅於山河遠矣在用與不用耳湯以亳武王以鎬而王天下其政何如哉百二之説於是為負秦論下世言秦所以亡者趙髙讒邪胡亥蔽愚毒痡齊民四海瓦解而宗社墟矣愚嘗以謂亡秦而賊天下者李斯也秦人據形便之國氣凌山東穆公任由余孝公用商鞅而霸業基矣蠶食虎視纍世橫鶩有起翦恬鷔握其兵穰魏雎澤執其政斥地滅敵日加其疆李斯始以儒學西遊於秦乃進一六合兼諸侯之説秦人除逐客之令以從其計破縱擅橫卒并天下以斯為相且斯以布衣徒步遊説數年而取宰相不為不遇也海內既一屬心於斯六國厭戰爭之苦兵待我乎偃秦人因廬井之廢土待我乎闢父子薄耰鋤之異民待我乎教斯學帝王之術居輔弼之地脫或戴其君與成康之列躋其民於仁夀之域如反掌耳乃背戾古始拔夲塞源燔棄詩書愚弄黔首絶尺寸之封以孤其勢侈封禪之制以驕其心築宫彌山川勒銘遍海內戮誹謗禁偶語刑煩令淫國紀隳矣綱紀既隳而國不危者未之有也世子者所以接統而著代君行則守有守則從古之制也故曰太子天下之夲夲根一搖天下必蕩安有著名儲二而握兵邊徼廢弦誦之大業習鼓旗之末節衣裳顛倒莫甚于兹默而不言焉用彼相及沙丘之變趙高以褻近之質啓亡國之言丞相當于此時正人臣無將之誅以視天下召扶蘇而立之從先帝之約扶蘇仁明備嘗險阻輔以至道可至太平若剗去嚴刑罷遣謫戍民無怨讟則秦之社稷未可量也斯惑趙高之詞越録而拔胡亥小人在下兵徭並起使四海之人血膏邊城骨填驪山比屋嗸嗸半為盜賊尚乃建言督責以固恩寵豈不愚哉賊屠三川卒被高譛黃犬之嘆得無晚乎使亥得位趙高得權皆斯之由也倒持太阿受人以柄斯之謂乎故曰亡秦而賊天下者斯之罪也卒被五刑非不幸也漢論上史氏以孝成委政外家祿去王室哀平二帝享年不永賊莽乘之盜竊神器漢祚中絶者孝成始之也竊謂漢家之禍不始于孝成蓋孝惠源之陳平者決而泄之使其橫流不已瀰漫于景武宣元之際孝成復敗其隄防而極于昏墊也昔者高皇帝逐秦鹿而得之英雄樂推遂正宸極后族呂氏侯者三人奉朝請食租賦而已賞刑大議未嘗及之孝惠踐祚相州仁弱呂后殺三趙王號令自出惠帝不能以新造之漢正無窮之法定君臣之分專生殺之柄而乃感人彘之酷意不久生自促壽命以成高后之勢不曰孝惠源之乎高祖之約非劉氏不王非功臣不侯彼陳平者用辟疆率爾之辨尊王諸呂分將南北軍中宫稱制以臨天下當是之時而無周勃朱虛之謀齊楚諸侯之兵使祿産體不近下一有羿奡之材則漢之社稷幾為他姓所得矣不曰決而泄之使其橫流不已乎厥後魏其侯以竇后兄子武安侯以王后異父同母之弟並託肺腑繼為丞相孝武最稱英明而田蚡為相權移主上上曰若除吏盡未吾亦欲除吏此蓋近中宫之勢而用之內積憤悶而宣于言也衛青霍去病唯以軍功服大位然亦因椒房之重孝昭之時上官桀父子霍媪之謀幾傾漢室皆帷牆之親也許史丁傅之家印纍纍綬若若分茅土握符節秉鈞軸乘朱輪華轂而朝者不可勝數不曰瀰漫于景武宣元之際乎漢之鼎所以不移者賴忠賢之士簡而持之耳及孝成之在位也趙氏妹弟專寵賊害士子王氏五世將權外擅國命故莽因元后之勢席諸父之基肆其姦險以取名器復緣哀平短祚國統三絶張禹師丹之輩諂諛邪佞故取宗室幼稚未能持國者挾之以令天下使漢祚中缺者職此之由也不曰敗其隄防而極于昏墊乎西漢之禍于是乎在漢論下前史稱光武中興再造漢室戮新都驅赤眉應四七之王賞謀臣籌戰功得萬世之利以為胙土錫壤不侈其封域帶河礪山克保其專嗣因謂高祖創漢基剗秦制封宗子封異姓或連城數十或裂地千里兵足以張其威權賦足以充其嗜欲故韓彭英盧身陷爼醢綿世史學罔不𣙜論咸以高帝之賞也地廣力強所以易叛光武之封也國小勢弱所以易寧于是謂高祖之策為非而光武之事為得愚雖不敏嘗謂不然何則賞元勳誅大憝者法也順世機息民患者時也聖人立法先乎順時堯授舜舜授禹湯放桀武王伐紂時也秦并六國蠶食天下尺土寸封不在他姓一夫奮臂四方瓦解豈封建之罪乎高祖以巴蜀僻左返攻三秦東戰滎陽與項為敵當此之時叛主驕將爭逐秦鹿者衆矣陔下之役子房請捐山東之地以與功臣楚乃可滅夫言捐之者非漢之有也且陳餘于項氏無纎芥之勞環封三縣尚怨項籍况韓彭者名雖君臣勢等鄰敵不設重賞其誰肯來豈能以區區侯爵制其去就哉安可比吳鄧輩疆邑數四而已耶及世祖之興也出自宗室剪除凶醜以順制逆以仁易亂因思漢之民成復興之業先帝馭臣之與奪得以增損前世建侯之利病得以沿革于是限其土宇削其兵衛足以奉其身而酬其勛杜震主之權大使指之臂終能全其首領不陷刑戮者斯亦可制之時矣使高光易地而居勢不可奪禮曰時為大順次之宜次之其此之謂乎必若美世祖之權則可矣若又短高皇之失策則非觀時之術也正瑞論夫上古明王言為天下法動為後世則猶恐怠惰故立左右史以規之是則史之設所以謹言行于一人正褒貶于千古不獨記嵗月辨起居而已矣三皇墳五帝典記言之史也楚檮杌魯春秋記事之史也訓誥誓命之詞得失存亡之迹發簡可見未聞祥瑞之言焉逮于兩漢則有赤芝白鴈醴泉甘露卿雲寶鼎之應豈古史闕略而後史該備乎蓋有司失為史之夲意也竊謂國之興也在乎德不在乎瑞國之亡也在乎亂不在乎妖故堯以敦九族和萬邦而興舜以舉十六相去四凶而興禹以平水土興湯以行仁政興周人以積德纍行興夫是者雖無祥瑞可不謂聖且治乎癸以奢侈亡辛以暴虐亡厲王以聚斂亡幽王以女色亡夫是者雖無妖怪可不謂昏且亂乎桑穀生朝高宗復商熒惑守心景公安宋此則明君在上妖不為害矣魯獲麒麟哀公出奔漢鳴鳳凰平帝失國此則暗主在上瑞不為美矣仲尼筆削春秋書日食地震山隤星隕蝝生鶂飛之變者非廣乎異聞也蓋欲人君責躬修德見災思懼而臻于治也特于篇末因麟之無應以明述作之意耳其他瑞則無聞焉鶴舞晉庭龍見渭水不由德至斥而弗敘若是之比求名而亡則聖人微旨可見矣子長孟堅椎輪怪誕其啓國也以斬蛇大澤為受命之符而英雄之略棄矣其定制度也以龍見成紀為易服之感而古人之象隳矣及乎蔚宗悉失其實則亡某郡上言其瑞以示微意與其疑而列之曷若正而削之之愈乎今之郡縣時推祥瑞以為紀事之端愚謂非良直之法也必若德施于民政易其俗賞不僣刑不濫則四靈為畜日遊于君之宫沼郊藪矣又何用索異傳怪惑天下之耳目哉苟存神者默而不言則亦之嗣得無懼乎姚璹論古者天子之立史官也不獨紀嵗月遠近辨朝會同異而已矣蓋以王者居億兆之上喜如春陽怒如雷霆豫奪生殺無不從也故立史以謹其言動動則右史書之言則左史書之以示後嗣欲其畏後世之名而不敢過舉者也竊見兩漢而下有唐制度最為詳備而史官廢置未臻大中敢試論之唐之修史其實有二武德故事小省之官更直近陛執筆對仗隨而撰録書之方册謂之起居注姚璹建議秉鈞之臣訏謨便殿嘉猷善經退必編次送之史館謂之時政記于是周官六史之職不復甄敘矣纍朝著作之局不復刋修矣璹議既行而起居之官立于外朝仗退之後迹便疏遠雖延英數刻之對聖人有泣辜解網之言應機成務之謀不可得而聞也若非宰臣撰述則軍政之圖要何由知之由是而言有不可者三焉古者帝王不得見當代之史何則史之為書不隱惡不虛美謂之實録史而可見則其臣不可以實書書而不實為己闕矣實而不諱為己戮矣不得見史者以此也宰臣監修是使自司其過也其不可者一也昔者成王尚幼與唐叔戲剪桐葉而與之曰以是封汝明日太史上輿地圗請封唐叔自是成王終身無戲言夫是則史官常在左右也今史臣隨伏出入則是用史臣于頃刻之間耳戲言過行尚奚史之畏哉其不可者二也古者大臣不掌注記故董狐得以直筆于晉南史氏得以執簡于齊設有史官外朝既罷則目不見帝王之容耳不聞帝王之言近臣奏對孰邪孰正孰諛孰諍咸莫之辨也用他人注記為己之筆削夫是則史官失職莫甚于此其不可者三也語曰使亷士守藏不如扃鐍之固也使義士分財不如設鈞之平也何則有情之與無情也夫以廣淵之謀居翊亮之位緝熙庶績裁成萬幾而後代文臣撰述固亦勞矣向儀房杜姚宋擊轂軌而自序策略人猶疑之脫不幸而有元載盧杞當其任則安所取信哉太宗文皇帝正觀中所論政體皆可冠冕古今粉澤王度著在方册昭昭然者史臣得侍于內朝故也姚璹雖知注記之詳未知先王立史之意一失其源而莫之敢議惜哉三統論夫王者受命必先改正朔易服色者蓋以示民之有初也故三統之義于是彰焉然而先儒所論止及乎三王之世是以夏之寅而黑商之丑而白周之子而赤可得而述也至于堯舜以上則雖仲尼之説亦無聞焉豈非旨深而意遠乎而鄭康成之徒則據此而逆推以為舜與周同堯與商同高辛氏乃與夏同正朔三而止文質再而復自古而然也非但不經抑亦于帝王之道有所昧焉嘗試論之夫帝王步驟不同文質亦異三皇正厯歲準攝提格古之為君因民而治故唐虞以上無變易逮夏后之繼統也是以德衰不及二帝又知夫時將漓矣必示之以制度故其沿革頗漸于文是以小正之説尚黑之義于是著焉然而服色有所尚而正朔不必改也但記之于政令而已故仲尼稱述三代則曰行夏之時蓋以其合于古而得天數也禮因于虞而不言其所損益者蓋謂此乎及湯武之革命既以兵勝俗又寖弊欲示民以改作而新其耳目俾知夫令出諸已故有服色之變又以服色之制夲象于正朔商人以建丑而易寅新其令也尚白而易黑象其朔也周之尚赤而建子由是新焉然三王之易服改正必取三微之月蓋以君之出令象嵗功陽氣之始也是以垂訓于百王文質制度于斯備矣後王雖興制作不出于此也故仲尼曰其或繼周者百世可知其此之謂矣夫謂正朔三而止者月過三微不可以為法也斯亦王者之制耳安可及于上古哉且五帝之書二典存焉其堯之書則曰敬授人時順厯數也又曰日中星鳥以正仲春日短星昴以正仲冬此則分至之候正在四仲契古厯而符夏正也又烏聞建丑之説乎舜在璿璣以齊七政審已之德當天心與不爾至于厯數而不異于堯又曷觀建子之言乎及其制服則曰觀古人之象故山龍日月之度較然可知也又何服色之改乎然則五帝之德淳三王之俗薄德淳則制簡俗薄則政備故三統之義起于三代而雖自太昊或推五德之運蓋順天之數也正朔則無所更焉至三王則政有偏矣夫有偏則有弊故後之興者必舉其偏而救其弊也若謂文質可推于上古是則夏尚忠商尚敬周尚文此三政者又可行于帝皇之代乎斯見其不然也自秦漢以下服色俱依于五勝此又不可推于三王亦明矣康成既已失之而杜佑孔頴逹之徒復引為證疑誤後學甚矣夫禘郊論先儒之所以解經者蓋欲𨗳前聖之淵源啓後學之鈐鍵授古有據垂世不惑者也祭祀之儀國之大典今之禮經以鄭注為正而康成釋禘祭之文前後駁雜大傳曰禮不王不禘王者禘其祖之所自出鄭云謂祭感生帝于南郊也祭法曰有虞氏禘黃帝而郊嚳祖顓頊而宗堯鄭云禘謂祭昊天于圜丘也祭上帝于南郊曰郊祭五帝五神于明堂曰祖宗皆謂祭祀以配食也觀鄭所釋似有未悟嘗試論之夫禘者宗廟大祭之名也王者禘其祖之所自出謂虞氏之祖出自黃帝不立廟祧故五年盛祭則及之夏亦禘黃帝商周禘嚳蓋姓氏所出是為遠祖也諸侯之禘則降乎王者止祭始封之君不得禘姓氏所出之祖故曰諸侯及其太祖是也而鄭謂太微五帝遞王而王者之興必感其一因其所感别祭以尊之故以感生之帝祭于圜丘而祀上帝于南郊非據緯書以釋經義太微為星象昊天亦謂北辰蒼穹之號遂有二天郊丘之名分為二祀斯皆舛謬深用軫惜何則郊與圜丘俱是祭天之所王肅所謂猶王城之內與京師異名而同處也豈可郊丘分為二祀祖宗合為一祭乎康成俱以禘文在郊祭之前其祀必尊當為圜丘皆罔研經意肆其臆説耳又以祖宗五帝五神于明堂小德配寡大德配衆鄭之此説殊為失旨誤取孝經宗祀之名以解祖宗之義乃以二主泛配五帝若謂太微五帝耶則鄭説太微與昊天上帝為六天矣天尚無二安得有六按天官書太微宫有五帝者自是五精之神不在穹蒼之例若以為太昊炎帝之屬耶則又非仲尼配天之意也周禮曰王將旅上帝張氊案設皇邸祀五帝張大次由此言之上帝也與五帝自有差殊豈可混而為一乎古者祖有功宗有德蓋若周人尊文武之功不毁其廟非謂配食明堂者也鄭引孝經而反違其旨惜哉漢承秦滅學之後遂使儒者進無經據康成最為明禮而于禘郊之義不能盡之故其釋祭法即云祀感生帝解大傳即云祭昊天箋周頌又云大于四時之祭而小于祫注左傳稱郊配靈威仰箋商頌又稱郊為祭天首尾紛拏自相矛盾孰為辨之哉宋文選卷十二
