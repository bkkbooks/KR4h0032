body:
  text: 宋文選卷十七石守道文唐鑑序夫前車覆後車戒前事之失後事之鑑湯以桀為鑑故不敢為桀之行而湯德克明隆祀六百周以紂為鑑故不敢為紂之惡而周道至盛傳世三十漢以秦為鑑故不敢為秦之無道而漢業甚茂延洪四百年唐以隋為鑑故不敢為隋之暴亂而唐室攸乂永光十八葉國家雖承五代之後實接唐之緒則國家亦當以唐為鑑臣逖覽往古靡不以女后豫事而喪國家者臣觀唐最甚矣武氏變唐為周韋庶人安樂公主鴆殺中宗太平公主潜謀逆亂楊貴妃召禍天寶臣歷觀前世鮮不以閹宦用權而傾社稷者臣視唐尤傷矣代宗遭輔國之侮蔑憲宗被陳慶之弒逆昭宗為季述之囚辱臣眇尋歷代無不以奸臣專政而亂天下者臣視唐至極矣祿山之禍則林甫國忠為之也朱泚之亂則盧杞為之也陳慶之弒則皇甫鏄為之也嗚呼奸臣不可使專政女后不可使豫事宦官不可使任權明皇始用姚崇宋璟則治終用林甫國忠則亂德宗始用崔祐甫陸贄則治終用裴延齡盧杞則亂憲宗始用裴度則治終用皇甫鏄則亂自武后奪國迄于中睿暨天寶末年政由女后而李氏幾喪自肅宗踐位歷于代宗德宗順宗憲穆文武宣懿僖昭權在中官而唐祚終去詩曰赫赫宗周褒姒滅之然則巍巍巨唐女后亂之奸臣壞之宦官覆之臣故採托唐史中女后宦官奸臣事迹各類集作三卷謂之唐鑑噫唐十八帝惟武德貞觀開元元和百數十年禮樂征伐自天子出女后亂之於前奸臣壞之於中宦官覆之於後顛側﨑危綿綿延延乍傾乍安若續若絶僅能至於三百年何足言之後之為國者鑑李氏之覆車勿專政於女后勿假權於中官勿委任於奸臣則國祚延洪歷世長遠當傳於子孫可至千萬世豈止齪齪十八帝局促三百年者哉伏惟明主戒之石曼卿詩集序詩之作與人生偕者也函愈樂悲鬱之氣必舒於言能者材之傳於律故其流行無窮可以播而交鬼神也古之有天下者欲知風教之感氣俗之變必立官司採掇而監聽之由是張弛其務以足其所思乃能享世長久弊亂無由而生厥後官廢詩不傳在上者不復知民之所嚮故政化傾悖治道亡矣詩之於時蓋亦大物於文字尤為古尚但作者才致鄙迫不揚不入其域耳國朝祥符中民風豫而泰操筆之士率以藻麗為勝惟曼卿與穆參軍伯長自任以古道所作之文必經實不放於世而曼卿之詩時震竒秀發蓋能取古之所未至託諷物象之表警時鼓衆未嘗徒設闕能文者纍數十百言不能卒其義獨以徑語蟠泊㑹而終於篇而復氣橫去意舉飄出章句之外學者不可尋其屏閾而依倚之其詩之豪者歟曼卿資宇軒豁遇事輒詠前後所為不可計其逸亡而存者才三百餘篇古律不異分為二册一日觴豫酒作而謂豫曰子賢於文而又知詩能為我序詩乎豫應曰諾遂有作欲使觀者知詩之原故卒於用而已矣送龔鼎臣序山陽龔輔之學為古文問文之㫖魯人石介對曰夫與天地生者性也與性生者誠也與誠生者識也性厚則誠明矣誠明則識粹矣識粹則其文由以正矣然則文夲諸識矣聖人不思而得識之至也賢人思之而至識之幾也詩易書禮春秋言而為中動而為法不思而得也孟荀揚文中子吏部勉而為中制而為法思之而至也至者至於中也至於法也至於中至於法則至於孔子也至於孔子而為極焉其不至焉者識雜之也甚者為楊墨為老莊為申韓為鬼佛識雜之為害也如此輔之將學為文厚乃性明乃誠粹乃識確乎不可移嚴乎不可譁也直乎不可屈也一焉於聖人之道妖惑邪亂之氣無隙而入焉於斯文也其庶幾矣然道知之不為難守之為難守之不為難行之為難行之不為難久之為難夫知之守之行之久之不為難篤之為難知之不篤不能守也守之不篤不能行也行之不篤不能久也久之不篤不能終也守之以誠而持之以篤惟輔之勉之輔之且往仕於孟州因以為離别之贈云送祖擇之序擇之罷濟南將歸闕自歷山南走三百里别明復先生暨於泰山徂來相與講道德䆒經術耽雲霞玩水石舉觴賦詩五日而後去以所坐乘重為明復之夀為豫書先君之銘於石以為勒擇之以文章登甲科天下之望甚盛不十年當輔相天子為宋大臣為人資材已高又自能知堯舜周公孔子之道顧明復與豫饑寒山谷中何有毫髮利於擇之而冒苦辛傾肝膽豫二人豈有求邪明復謂無以謝擇之發聖人之藴明王道之極擇之拜而受之嗚呼春秋賞罰二百四十二年至矣仲尼之心獨撥衰周一世之亂反諸於正十二經揭如日月昭明於天後之聖賢得之多者帝得之少者王不得者霸明復之報為不輕矣豫經學淺不能希明復然義不可默夫趨時物之情也狥道人之難也噫諸侯交迎傾國封之枉尺直尋吾死不為見之孟軻尋邑三公舜歆高爵不作符命甘投於閣見之子雲潮州八千幾死瘴烟歸來京兆不肯嬋娟見之吏部嗟嗟李績徇主從昏咄咄闕元附權邀官觀而始節豈為不完弗能有終至今痕瘢擇之與豫說緼深矣此去近天子得與宰相磨切天下是非亦得時見上講道君政得失天子宰相曰是擇之曰是天子宰相曰非擇之曰非擇之官日進而寵日深矣天子宰相曰是擇之曰非天子宰相曰非擇之曰是擇之前有鼎鑊而後有鈇鉞矣古之君子辭官職而違寵祿趨鼎鑊而就釱鉞非以官職寵祿為避而鼎鑊鈇鉞為樂也道適當然也擇之於道安之者非利而行行之者非畏罪而强之者也豫所以云姑為報之資爾送張季常序孔子之大道為異端侵害不容於世實三十年諸公能維而持之不能排而去之維之持之道不絶矣不去其害道終病矣韓文公所謂不塞不流不止不行是也豫不自揆度乃奮獨力直斥其人而攻之我寡彼徒衆反攻豫者日以千數視子之內虎動吻而狼磨牙賴聖君天覆地容得免於禍濮人張禹功李遵道者其居與豫不相遠耳目接於豫固熟則其宜知子之所為如是得禍如是輒不憚直以身冒豫之禍來山中而助豫揚子雲稱軻之勇若禹功遵道者其勇者歟太史正崔杼之罪殺之其弟又書杼又殺之南史聞之執簡以往太史初正杼之罪知為史者然猶未知必得誅於杼若南史聞已殺二人矣又執簡以往是真不畏死者矣豫攻害孔子者豫知為孔子者然亦未知必得罪於害孔子之徒若禹功遵道已見豫之所得禍如是又來助豫是真勇者矣豫今年三十七而髮半白然心益壯而氣不衰禹功少豫十四嵗遵道少豫十五嵗其文如進六軍而作鼓者嚴猛齊厲張皇奮施可式可畏當與豫周旋焉達也以孔氏之道窮也以孔氏之道達而萬物不通乎窮而垂之於後世不明乎窮達之間綽綽然有餘裕其有能動心乎禹功藏用於神其得天下之幾歟遵道直道而行其明天下之治歟幾近易治近春秋二子之道皆中道也與世不甚迂其必達矣去舉進士子醉之以酒復贈之以言以釋相離之懷辛巳夏五月二日石介序祥符詔書記祥符二年翰林學士楊億知制誥錢惟演祕閣校理劉筠唱和宣曲詩述前代掖庭事辭多浮艷真宗聞之曰辭臣學者宗師也安可不戒於流宕乃下詔曰國家道蒞天下化成域中敦百行於人倫闡六經於教化兾斯文之復古期末俗之還淳而近代已來屬辭多弊侈靡滋甚浮艷相高忘祖述之大猷競雕刻之小巧爰從物議俾正源流咨爾服儒之人示乃為學之道夫博聞強識豈可讀非聖之書修辭立誠安可乘作者之志必思教化為主典訓是師無尚空言當遵體要仍聞别集衆製刻鏤已多倘許攻乎異端則不誤於後學式資誨誘宜有甄明今後屬文之士有辭涉浮華玷於名教者必加朝典庶復古風其古今文集可以垂範欲雕印者委夲路轉運使選部內文士詳看可者即具夲以聞又天章閣待制劉公隨常言故楊翰林少知古道故孫漢公集中有送楊序說其年十一月建州召試授祕書省正字詔褒之有精彩神助文字生知之語是時名播天下道路拭目或勸以歌頌上美更祈清賞者則掉臂不顧或以其早成夙悟比前代王勃輩者則愀然曰吾將勉力庶幾子雲近之長驅古今豈止於辭人才子乎又崖椽初覽其斷文數十篇大竒之持以示漢公曰皇甫持正栁州少年時正當如是夲朝文人稱孫丁而皆推重之則楊為少知古道明矣然以性識浮近不能古道自立好名事勝獨驅海內謂古文之雄有仲塗黃州漢公謂之輩度已終莫能出其右乃斥古文而不為遠襲唐李義山之體作為新制楊亦學問通博筆力宏壯文字所出後生畏而愛之然破碎大道雕刻元質非化成之文而古風遂變時執政馮文懿與二三朝士竊病之又黃州漢公皆已死他人柔弱無以摧楊之鋩惟胡大監繼周名旦以罪廢屏居廬江乃相與延譽徐言於上乞召知制誥以拉楊之虎牙繼周既至真宗命上殿賜坐從容延問曰知卿雖謫官猶不廢學今復用卿知制誥繼周以久去班行朝禮多廢即拜謝於殿上真宗亦不之罪繼周既退直趨舍人院箕倨坐㕔上睥睨言曰適來見上上金口命胡旦復知制誥胡旦老矣豈能重入此小兒隊裡知得它制誥矜傲輕忽旁若無人真宗以繼周素無行尚疑之潜令小黃門一人隨其後觀之黃門盡以告明旦真宗見文懿直道其事乃曰胡旦終未可用觀其言朕亦似被輕文懿以繼周自為之亦無如之何繼周但得通判襄陽去楊遂肆然無復回避為文章宗主二十年故斯文之弊至於今矣可惜矣夫介讀祥符二年詔書知真宗皇帝真英主矣聞劉待制之說知文懿真賢相矣易曰觀乎人文化成天下為天子能知乎文之夲而思復於古非英主歟為宰相能悼乎風之變而思救其弊非賢相歟介竊懼聖君賢相之事異日泯落因私記之宋城縣夫子廟記天地吾知其易毁也一德不修則裂日月吾知其易喪也一政不行則缺山嶽吾知其易壞也一化不明則崩河洛吾知其易涸也一令不善則竭大哉吾聖人之道彌亘億千萬世而不傾橫維四方上下而不絶莫亂於戰國莫妖於楊墨莫毒於秦嬴莫逆於莽賊曹馬譎詐宋齊亡慝虐神侮弱曰聰曰勒唱誕放邪曰聃曰釋下至唐季接武踵迹昏君暴德莫不滅裂衣冠隳拆法則焚燒詩書芟刈禮易吁吾聖人之道受戕害被毁擊斯亦多矣而巍然中居竟不可毁息由根柢堅而枝幹茂也淵源濬而流派遠也三才五常為根柢不亦堅乎堯舜禹湯為枝幹不亦茂乎六籍九疇為淵源不亦濬乎孟荀揚韓為流𣲖不亦遠乎故天地有裂焉日月有缺焉山嶽有崩焉河洛有竭焉吾聖人之道無有窮也夫天地日月山嶽河洛皆氣也氣浮且動所以有裂有缺有崩有竭吾聖人之道大中至正萬世常行不可易之道也故無有虧焉宋有天下純用文治制度禮樂一出儒術吾聖人之道大行君君而臣臣父父而子子京師達於郡縣皆崇嚴廟貌而尊祀之宋城在南京為赤縣夫子祠宇尚闕春秋則釋奠於今之㕔事噫其為䙝亦甚矣李大夫堯俞以儒學仕能知聖人為尊不敢黷慢於是拆佛宇毁淫祠十數區取其材作廟於縣署之右棟宇壯焉丹艧麗焉穹穹闢陽耽耽闔隂夫子被王衮冕執圭尺有二寸負斧依當寧而坐顔淵閔子騫十一人列侍翼如有嚴有威廟成俾豫記之嗚呼異哉李大夫作是廟有三善焉撤佛宇弱夷法也毁淫祠革邪俗也尊聖師明大道也有是三善不可不記故敢承命而不敢讓景祐四年五月一日泰山書院記自周以上觀之賢人之達者臯陶傅說伊尹呂望召公畢公是也自周以下觀之賢人之窮者孟子揚子文中子吏部是也然較其功業德行窮不必易達吏部後三百年賢人之窮者又有泰山先生孟子楊子文中子吏部皆以其道授弟子既授之弟子亦將傳之於書將使其書大行其道大耀乃以其道於泰山之陽起學舍構堂聚徒先聖之書滿屋與羣弟子而居之當時游從於泰山之陽起學舍游從之貴者孟子則有梁惠王齊宣王滕文公之屬楊則有劉歆桓談之屬文中子則有越公之屬吏部則有裴晉公鄭相國張僕射之屬門人之高第者孟則有萬章公孫丑樂克之徒楊有侯芭劉棻之徒文中子則有常程元薛收李靖杜如晦房魏之徒吏部則有李觀李翺李漢張籍皇甫湜之徒今先生游從之貴者故王沂公蔡二卿李泰州孔中丞今李丞相范經略明子京張安道士熙道祖擇之門人之高第者石介劉收姜潜張浻李溫足以相望於千百年之間矣孰謂先生窮乎大哉聖賢之道無屯泰孟子楊子文中子吏部皆屯於無位與小官而孟子泰於七篇楊子泰於法言太𤣥文中子泰於續經中說吏部泰於原道論佛骨表十餘萬言先生嘗以謂盡孔子之心者大易盡孔子之用者春秋是二大經聖人之極筆也治世之大法也故作易說六十四篇春秋尊王發微十七卷疑四凶之不去十六相之不舉故作正名解美出處之得明傳嗣之嫡故作四皓論先生述作上宗周孔下擬韓孟是亦為泰先生孰少之哉介樂先生之道大先生之為請以此說刋之石陷於講堂之西壁康定元年七月十八日記青州州學公田記故僕射相國沂公初作青州學成奏天子天子賜學名且頒公田三十頃次入於學公患田少不足又旁學作屋百二十間嵗入於學錢三十一萬逮今十稔學益興而士倍多太守趙集賢廣公之意取南城隙地入作屋八十三室别為鈎盾六十二門嵗入於學通六十七萬學之功用於是大充而養士之道稱矣學官與諸弟子多請記於壁曰立其法萬世不改者道之夲也通其變使民不倦者道之中也夲故萬世不改也中故萬世可行也若伏羲神農黃帝堯舜氏樹君臣父子上下之制立其法萬世不改者也是之謂夲焉服牛乘馬上棟下宇弧矢網罟之宜舟楫耒耜之利棺椁之便臼杵之用通其變使民不倦者也是之謂中焉相國㳂三代明王作取古者家有孰黨有庠術有序國有學之制建學於青立夲也集賢由易大畜飬賢頥養正需飲食宴樂充朋友講習之義立寬於學制其中也大凡舒則人暇局則人困故善教者優游而至道不善教者急速而強人其要貴夫勞逸之節焉禮曰張而不弛文武不為也一弛一張文武之道也今夫學者六藝經傳千萬言以時而諷之其為功博矣仁義禮樂忠信孝悌之道天地隂陽星辰災變之動以時而求之其為業廣矣廣博而難卒勤苦而後能成蚤起夜誦寒暑不廢衣冠不解則是常張之矣嵗有田日有秋勞有休怠有養所以息焉游焉之一張一弛之道也君子謂相國集賢善教矣張而不急弛而不廢初集賢樂學之經始甚亟乃擇材吏得節度推官蔡君亶用董其役作屋若鈎盾百四十五間而取材於縣官之餘借力於公家之隙不煩於府不擾於民和說而以成豫謂相國善作也集賢善述也蔡君善卒相國集賢之志也見詳斯文既不得讓因記其嵗月云宋文選卷十七
