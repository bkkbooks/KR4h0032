body:
  text: 宋文選卷二歐陽永叔文上皇帝封事書月日臣修謹昧死再拜上書于皇帝陛下臣近准詔書許以封章言事臣學識愚淺不能廣引深逺以明治亂之原謹採當今急務條為三弊五事以應詔書所求伏惟陛下裁擇臣聞自古王者之治天下雖有憂勤之心而不知致理之要則心愈勞而事愈乖雖有納諫之明而無力行之果斷則言愈多而聽愈惑故為人君者以細務而責人專大事而獨斷此致理之要術也納一言而可用雖衆議不得以沮之此力行之果斷也知此二者天下無難致理矣臣伏見國家大兵一動天下騷然陛下思社稷之安危念兵民之困弊四五年來憂勤可謂至矣然而兵日益老賊日益強并九州之力平一西戎小者尚無一人敢前今又北方大者違盟妄作其將何以禦之從來所患者西北今西北叛矣所惡者盜賊今盜賊起矣所憂者水旱今水旱作矣所仰者民力今民力困矣所急者財用今財用乏矣陛下之心日憂于一日天下之勢歲危于一嵗臣所謂用心雖勞而不知致理之要也近年朝廷雖廣言路獻計之士不下數千然而事緒轉多枝梧不暇從前所采衆議紛紛至于臨事誰策可用此臣所謂聽言雖多不如力行之果斷也臣伏思聖心所甚憂而當今所最闕者不過曰無兵也無將也無財也無禦戎之策也無可任用之臣也此五者陛下憂其未有而臣謂今皆有之然陛下未得而用之者陛下未思其術也國家創業之初四方割據中國地狹兵民不多然尚能南取荆楚西平蜀國東下并潞北窺幽燕當是時所用兵財將吏其數幾何蓋善用之故不覺其少也豈如今日承百年祖宗之業盡有天下之富強人衆物盛十倍于昔故臣敢曰有兵有將有財用有禦戎之策有可用任之臣然陛下皆不得而用者何哉由朝廷有三大弊故也何謂三大弊一曰不慎號令二曰不明賞罰三曰不責功實此弊因循于上則萬事弛慢廢壞于下臣聞號令者天子之威也賞罰者天子之權也若號令煩而不信賞罰行而不當則天下不服故又須責臣下以功實然後號令不虗出而賞罰不濫行是以慎號令明賞罰責功實此三者帝王之竒術也自古人君英雄如漢武帝聰明如唐太宗皆能知此三術而自執威權之柄故二帝所求無不得所欲皆如意漢武帝好用兵則誅滅四夷收功萬里以快其心欲求將則衛霍之材供其指使欲得賢士則有公孫董汲之徒以稱其意唐太宗好用兵則誅突厥破遼東威加四海以逞其志欲求將則有李靖李績之儔入其駕馭欲得賢士則有王魏房杜之輩奉其左右此二帝凡有所為後世莫及可謂所求無不得所欲皆如意無他術也唯能自執威權之柄耳伏惟陛下以聖明之資超越二帝又盡有唐漢之天下然而欲禦邉則常患無兵欲破賊則常患無將欲贍軍冨國則常患無財欲威服四夷則常患無策欲任使賢才則常患無人是所求皆不如意其故無他由不用威權之術也自古帝王或為強臣所制或為小人所惑權柄不出于已方今外無強臣之患又無小人獨任之惑內外臣庶尊陛下如天愛陛下如父傾耳延首願聽陛下所為何憚而久不為哉若一日赫然奮威權以臨之可使萬事皆辦何患五者之無奈何為三弊之因循而一事之不集臣請言三弊夫言多變則俗不信令頻改則下難從今出令之初不加詳審行之未久尋又更張以不信之言行難從之令故每有處置之事天下知朝廷未是一定之命則官吏咸相謂曰且未可行不久必須更改或曰備禮行下略與應破指揮旦夕之間果然又變至于官吏更易道路疲于迎送文牒縱橫上下莫能遵禀官吏軍民或聞而歎息或聞而竊笑歎息者有憂天下之心竊笑者有輕朝廷之意號令如此欲感天下其可得乎此不慎號令之弊一也古今用人之術不過賞罰而已然賞及無功則恩不足勸罰失有罪則威無所懼雖有人不可用也臣嘗聞之太宗皇帝時王全斌等破蜀歸功不細矣犯法一貶十年不問蓋是時方伐江南故黜全斌與諸將立法及江南已下乃復其官太宗神武英斷所以能平天下者賞罰分明皆如此也自關西用兵四五年矣賞罰之際是非莫分大將以無功而依舊居官軍中見無功者不妨居好官則諸將誰肯立功矣偏裨柔懦逗留者皆當斬罪或暫貶而尋遷或不貶而依舊軍中見有罪者不誅則諸將誰肯用命矣是謂賞不足勸罰無所懼賞罰如此而欲用人其可得乎此不明賞罰之弊二也自兵動以來處置之事不少然多有名無實請略舉其一二則其他可知數年以來㸃兵不絶諸路之民半為兵矣其間老弱病患短小怯懦者不可勝數其額空多所用者少此有㸃兵之虗名而無得兵之實效也新集之兵所在教習追呼上下民不安居主教者非將領之才所教者無旗鼓之法往來州縣怨歎嗷嗷既多是老弱怯懦之人又無訓齊精練之術此有教兵之虗名無訓兵之實效也諸州所造器械數不少矣工作之際已勞民力輦運般送又苦道路然而鐵刃不鋼筋膠不固長短大小多不中度蓋造作之所但務充數而速了不計所用之不堪經歷官司又無檢責此有器械之虗名而無器械之實用也以無實之法教小怯之兵執鈍折不堪之器械百戰百敗理在不疑臨事而悟何可及乎故事無大小悉皆鹵莽此不責功實之弊三也臣故曰三弊因循於上則萬事弛慢廢壞於下四方事不可盡言臣請略言其大者五事其一曰兵臣聞攻人以謀不以力用兵鬪智不鬪多前代用兵之人多者常敗少者常勝漢王尋等以百萬之師遇光武九千人而敗是多者敗而少者勝也苻堅以百萬之衆遇謝𤣥二三萬人而敗是多者敗而少者勝也曹操以三十萬青州兵敗于吕布退而歸許復以二萬人破袁紹兵四十萬人是用兵多則敗而少者勝之明驗也况于荒逺尤難以力爭只可以計取李靖破突厥于定襄只用兵三千人其後破頡利于隂山亦不過萬人其他以三五千人立功塞外者不可悉數蓋兵不在多能用計耳故善用兵者以少而為多不善用兵者雖多而為少臣謂方今添兵則耗國减兵則破敵今沿邉之兵不下七八十萬可謂多矣然訓練不精又有老弱虗數十人不當一人是七八十萬之兵不得七八十萬人之用加之軍無統制分散支離分多為寡兵法所忌此所謂不善用兵者雖多愈少故常戰而常敗也願陛下赫然奮威飭勵諸將精加訓練去其老弱七八十萬中可得四五十萬人古人用兵一以當百今既未能但得以一當十則五十萬數可當五百萬兵之用此所謂善用兵者以少而為多古人所以少而勝多者以此也今不思實效但務添多耗國耗民遷延日月賊雖不至天下已困矣此一事也其二曰將臣又聞古語曰將相無種故或出于士或出于卒伍或出于奴僕或出于盜賊唯能不次而用之乃為名將耳今國家求將之意雖切選將之路太狹今詔近臣舉將而限以資品則英豪在下位者不可得矣試將材者限以弓馬一夫之勇則智略萬夫之敵皆遺之矣山林竒傑之士召而至者以其貧賤而薄之不過與一主簿借職使之怏怏而去則古之屠釣飯牛之傑皆激怒而失之矣以至無人可用則寧用癃鍾跛躃庸懦暗劣之人皆委之要地授以兵柄天下三尺童子皆為朝廷危之前日澶州之卒幾為國家生事此可見也議者不知取將之無術但云當今之無將臣願陛下革去舊弊奮然精求英豪之士不須限以下位知略之人不必試以弓馬山林之傑不必薄其貧賤唯陛下以非常之禮待人臣人臣亦將以非常之效為報又何患于無將哉此二事也其三曰財用臣又聞善治病者則醫其受病之處善救弊者必塞其起弊之原今天下財用困乏其弊安在起于兵興而費大也昔漢武帝好弄兵用盡纍世之財當時耀兵單于臺不過十萬人尚能困其國力况今日七八十萬連四五年而不解所以罄天地之所生竭萬民之膏血而用不足也今雖有知者物不能增而計無所出矣唯有減冗卒之虗費練精兵而速戰功成兵罷自足用矣今兵有可减之理而無人敢當其事賊有速擊之便而無人敢奮其勇後時敗事徒耗國而耗民唯陛下以威權督責之乃有期耳此三事也其四曰禦敵之策臣又聞兵法曰上兵伐謀其次伐交北敵與朝廷通好近四十年不敢妄動今一旦發其狂謀者其意何在蓋見中國頻為元昊所敗故敢啓其貪心伺隙而動耳今督厲諸將選兵秣馬疾入西界但能痛敗昊賊一陳則吾軍威大振而敵計沮矣此所謂上兵伐謀者也今論事者皆知北敵與西賊通謀欲并二國之力窺我河北陜西若使二敵並冦則難以力支今若我能先擊敗其一國則敵勢减半不能獨舉此兵法所謂伐交者也元昊地狹賊兵不多向來攻我傳聞契丹常有助兵今若北人自有㸃集之謀而元昊驟然被擊必求助于契丹契丹分兵助昊則可牽其南冦之力若不助昊則二國有隙自相疑二此亦伐交之策也假令二國剋期分路來冦我能先期大舉則元昊蒼皇自救不暇豈能與契丹相為表裡是破其素定之約乖其尅日之期此兵法所謂親而離之亦伐交之䇿也昊賊叛逆以來幸而屢勝長有輕視諸將之心今又見朝廷北憂契丹方經營于河朔必謂我師不能西出今乘其驕怠正是疾驅急擊之時此兵法所謂出其不意者取勝之上策也前年西將有請出攻者當時賊氣方盛我兵未練朝廷尚許其出師况今元昊有可攻之勢此不可失之時彼方幸吾憂河北而不虞我能西征出其不意此可攻之勢也自四路分帥今已半年訓練恩信兵已可用故近日屢奏小捷是我師漸振賊氣漸衄此可攻之勢也苟失此時而使二敵先來則吾無策矣臣願陛下不以臣言為狂密詔四路之帥協議而行之此四事也其五曰可任之臣臣又聞語曰十室之邑必有忠信况今文武常選之官盈于朝廷遍于天下其間非無材智之人陛下總治萬幾之大既不暇盡識其人故不能躬自進賢而退不肖執政大臣動循舊例又不敢進賢而退不肖審官吏部三班之職但掌文簿差除而已又不敢越次進賢而退不肖是上自天子下至有司無一人得進賢而退不肖者所以賢愚混雜僥幸相容三載一遷更無旌别平居無事常患太多而差除不行一旦臨事要人常曰無人使用自古任人之法無如今日之謬也今議者或謂以舉主轉官為進賢犯罪即黜為退不肖此不知其弊之深也大凡善惡之人各以類聚故好贓汚者各舉貪濁之人好財利者各舉誅求之人性庸懦者各舉不才之人守亷節者乃舉公幹之人朝廷不問是非但見舉主數足便與遷官則公幹者進矣貪濁者亦進誅求者亦進矣不才者亦進矣混淆如此便可為進賢之法乎方今出責官吏豈有澄清糾舉之法哉唯犯贓之人因民論訴者乃能出之耳夫能舞弄文法而求財賄者亦強黠之吏政事必由己出故雖誅剝豪民尚或不及貧弱至于不才之人不能主事衆胥羣吏共為奸欺則民無貧富一時受弊以此而言則贓吏與不才之人為害等耳今贓吏因自敗者乃加黜責十不去其一二至于不才之人上下共知而不問寬緩容奸其弊如此便可為退不肖之法乎賢不肖既無别則冝乎設官雖多而無人可用也臣願陛下明賞罰責功實則材皆列於陛下之前矣臣故曰五者皆有然陛下不得而用者為有弊故也三弊五事臣既已詳言之矣唯陛下擇之天下之務不過此也方今天文變于上地理逆于下人心怨乎內四夷攻于外事勢如此殆非遲疑寬緩之時唯陛下留意狂直甘俟誅夷臣昧死再拜上范司諫書月日具官謹齊沐拜書司諫學士執事前月中得進奏吏報云自陳州召至闕拜司諫即欲為一書以賀多事匆卒未能也司諫七品官爾于執事得之不為喜而獨區區欲一賀者誠以諫官者天下之得失一時之公議繫焉今世之官自九卿百執事外至一郡縣吏非無貴官大職可以行其道也然縣越其封郡逾其境雖賢守長不得行以其有守也吏部之官不得理兵部鴻臚之卿不得理光祿以其有司也若天下之得失生民之利害社稷之大計惟所見聞而不繫職司者獨宰相可行之諫官可言之爾故士之學古懷道者仕于時不得為宰相必為諫官諫官雖卑與宰相等天子曰不可宰相曰可天子曰然宰相曰不然坐乎廟堂之上與天子相可否者宰相也天子曰是諫官曰非天子曰可行諫官曰必不可行立于殿陛之前與天子爭是非者諫官也宰相尊行其道諫官卑行其言言行道亦行也九卿百司郡縣之吏守一職者任一職之責宰相諌官繫天下之事亦任天下之責然宰相九卿而下失職者受責于有司諫官之失職也取譏于君子有司之法行乎一時君子之譏著之簡册而昭明垂之百世而不泯甚可懼也夫七品之官任天下之責懼百世之譏豈不重耶非才且賢者不能為也近執事始被召於陳州洛之士大夫相與語曰我識范君知其才也其來不為御史必為諫官及命下果然則又相與語曰我識范君知其賢也他日聞有立天子陛下直辭正色靣諍庭論者非他人必范君也拜命以來翹首企足竚乎有聞而卒未也竊惑之豈洛之士大夫能料於前而不能料於後也將執事有待而為也昔韓退之作諍臣論以譏陽城不能極諫卒以諫顯人皆謂城之不諫蓋亦有待而然退之不識其意而妄譏修獨以為不然當退之作論時城為諫議大夫已五年後又二年始廷論陸贄及沮裴延齡作相欲裂其麻才兩事耳當德宗時可謂多事矣授受失宜叛將強臣羅列天下又多猜忌進任小人於此之時豈無一事可言而須七年耶當時之事豈無急於沮延齡論陸贄兩事耶謂宜朝拜官而夕奏疏也幸而城為諫官七年適遇延齡陸贄事一諫而罷以塞其責向使止五年六年而遂遷司業是終無一言而去也何所取哉今之居官者率三嵗而一遷或一二歲甚者半嵗而一遷此又非可以待乎七年也今天子躬親庶政化理清明雖為無事然自千里詔執事而拜是官者豈不欲聞正議而樂讜言乎然今未聞有所言說使天下知朝廷有正士而彰吾君有納諫之明也夫布衣韋帶之士窮居草莽坐誦詩書常恨不見用及用也又曰彼非我職不敢言或曰我位猶卑不得言得言矣又曰我有待是終無一人言也可不惜哉伏惟執事思天子所以見用之意懼君子百世之譏一陳昌言以塞重望且解洛士大夫之惑則幸甚幸甚與張秀才第一書修頓首致書秀才足下前日辱以詩賦雜文啓事為贄披讀三四不能輒休足下家籍河中為鄉進士精學厲行嘗已選于里升于府而試于有司矣誠可謂彼邦之秀者歟然士之居也遊必有友學必有師其鄉必有先生長者府縣必有賢守長佐吏彼能為足下稱才而述美者宜不少矣今乃越數百里犯風霜干大國望官府下首于閽謁者以道姓名趨走拜伏于人之階廡間何其勤勞乎豈由心負其所有而思以一發之耶將顧視其鄉之狹陋不足自廣而為夫大國多賢士君子可以奮揚而光逺之耶則足下之來也其志豈近而求豈小耶得非磨光濯色計之熟卜之吉而後勇决以來耶今市之門旦而啓商者趨焉賈者坐焉持寶而欲價者之焉賫金而求寶者亦之焉閒民無資攘臂以遊者亦之焉洛陽天下之大市也來而欲價者有矣坐而為之輕重者有矣豫居其間其官位學行無動人也是非可否不足取信也其亦無資而攘臂以遊者也今足下之來試其價既就于可以輕重者矣而反以及豫夫以無資者當求價之責雖知貪于所得而不知有以為價也故辱賜以來且慙且喜既不能塞所求以報厚意姑道此以為謝答李詡書修白前辱示書及性詮三篇見吾子好學善辨而文能盡其意之詳今世之言性者多矣有所不及也故思與吾子卒其說修患世之學者多言性故常為說曰夫性非學者之所急而聖人之所罕言也易六十四卦不言性其言者動靜得失吉凶之常理也春秋二百四十二年不言性其言者善惡是非之實録也詩三百五篇不言性其言者政教興衰之美刺也書五十九篇不言性其言者堯舜三代之治亂也禮樂之書雖不完而雜出于諸儒之記然其大要治國修身之法也六經之所載皆人事之切于世者是以言之甚詳至于性也百不一二言之或因言而及焉非為性而言也故雖言而不䆒豫之所謂不言者非謂絶而無言蓋其言者鮮而又不主于性而言也論語所載七十二子之問于孔子者問孝問忠問仁義問禮樂問修身問為政問朋友問鬼神者有矣未嘗有問性者孔子之告其弟子者凡數千言其及于性者一言而已豫故曰非學者之所急而聖人之罕言也書曰習與性成語曰性相近習相逺者戒人慎所習而言也中庸曰天命之謂性率性之謂道者明性無常必有以率之也樂記亦曰感物而動性之欲也明物之感人無不至也然終不言性果善果惡但戒人慎所習與所感而勤其所以率之者爾豫故曰因言以及之而不究也修少好學知學之難凡所謂六經之所載七十二子之所問者學之終身有不能達者矣于其所達行之終身有不能至者矣以豫之汲汲于此而不暇乎其他因以知七十二子亦以是汲汲而不暇也又以知聖人所以教人垂世亦皇皇而不暇也今之學者于古聖賢所皇皇汲汲者學之行之或未至其一二而好為性說以窮聖賢之所罕言而不䆒者執後儒之偏說事無用之空言此豫之所不暇也或有問曰性果不足學乎子曰性者與身俱生而人之所皆有也為君子者修身治人而已性之善惡不必䆒也使性果善耶身不可以不修人不可以不治使性果惡耶身不可以不修人不可以不治不修其身雖君子而為小人書曰惟聖罔念作狂是也能修其身雖小人而為君子書曰惟狂克念作聖是也治道備人斯為善矣書曰黎民於變時雍是也治道失人斯為惡矣書曰殷頑民又曰舊染汙俗是也故為君子者以修身治人為急而不窮性以為言夫七十二子之不問六經之不主言或雖言而不䆒豈略之哉蓋有意也或又問曰然則三子言性過歟曰不過也其不同何也曰始異而終同也使孟子曰人性善矣遂怠而不教則是過也使荀子曰人性惡矣遂棄而不教則是過也使揚子曰人性混矣遂肆而不教則是過也然三子者或身奔走諸侯以行其道或著書纍千萬言以告于後世未嘗不區區以仁義禮樂為急蓋其意以為善者一日不教則失而入于惡惡者勤而教之則可使至于善混者驅而率之則可使去惡而就善也其說與書之習與性成語之性近習逺中庸之有以率之樂記之慎物所感皆合夫三子者推其言則殊察其用心則一故豫以為推其言不過始異而終同也凡論三子者以豫言而一之則嘵嘵者可以息也豫之所說如此吾子其擇焉送方希則序蒙莊以紳笏為柴栅班伯以聲名為韁鎖夫軒裳輝華人之所甚欲彼豈惡之耶蓋將有激云爾是以君子輕去就隨卷舒富貴不可誘故其氣浩然勇過乎賁育毁譽不以屑其量恬然不見于喜愠能及是者達人之節而大方之家乎希則茂才入官三舉進士不利命乖數竒時不見用冝且夷然拂衣師心自往推否泰以消息輕寄物之去來淵乎其大雅之君子而幾類于昔賢者乎余自來上都寓謁舍化衣京塵穿履金門者再見春矣㑹天子方向儒學招徠俊良開賢科命鄉舉而四方之傑齎貢函詣公車者十百千數余雖後進晚出而掎裳摩趺攘臂以遊其間交者固已多矣晚方得君傾蓋道途一笑相樂形忘乎外心照乎內雖濠梁之遊不若是也未幾君召試中臺以枉于有司奪席見罷縉紳議者咸傷寃之君方淡乎冲襟競于使人不能窺也後數日齎裝具舟泛然東下以余辱交者索言以為贈夫恢識宇以見乎逺窮倚伏以至于命此非可為淺見寡聞者道也希則達人爾可一言之昔公孫常退歸鄉人再推射䇿遂苐一更生書數十上每聞報罷而終為漢名臣以希則之資材識業而沉冥欎堙者豈非天將張之而固翕之耶不然何邅回而若此也夫良工晚成者器之大後發先至者驥之良異日垂光虹霓濯髮雲漢使諸儒後生企仰而不暇此固希則禇囊中所畜爾豈假豫詳言之哉觴行酒半坐者皆欲去操觚率然詞不逮意同年景山欽之識之亦賦詩以為别則祖離道舊之情偹之矣此不復云送梅聖俞歸洛序至寶潜乎山川之幽而能先羣物以貴于世者負其有異而已故珠潜乎泥玉潜乎璞不與夫蜃蛤珉石混而棄者其先膺美澤之氣輝然特見于外也士固有潜乎卑位而與夫庸庸之流俯仰上下然卒不混者其文章才美之光氣亦有輝然而特見者也然求珠者必之乎海求玉者必之乎藍田求賢士者必之乎通都大邑據其㑹就其名而擇其精焉耳洛陽天子之西都距京師不數驛搢紳仕宦雜然而處其亦珠玉之淵海歟豫方據是而擇之獨得于梅君聖俞其所謂輝然特見而精者耶聖俞志髙而行潔氣秀而色和嶄然獨出于衆人中初為河南主簿以親嫌移佐河陽常喜與洛之士遊故因吏事而至于此余嘗與之徜徉于嵩洛之下每得絶崕倒壑深林古宇則必相與吟哦其間始而歡然以相得終則暢然覺乎熏蒸浸漬之為益也故久而不厭既而以吏事訖言歸余且惜其去又悲夫潜乎下邑混于庸庸然所謂能先羣物而貴于世者特其異而已則光氣之輝然者豈能掩之哉送廖倚歸衡山序元氣之融結為山川山川之秀麗稱衡湘其蒸為雲霓其生為杞梓人居其間得之為俊傑秀才生于衡山之陽而秀麗之精英者得之尤多故其文則雲霓其材則杞梓始以鄉進士舉于有司不中遂遊公卿間所至無不虗館設席爭以禮下之今永興太原公雅識沈正器君尤深初其鎮秦州也請君與俱行遂趨函關以覽秦都則西方士君子得以承望乎風采矣凡居秦幾歲而東將過京師以歸豫嘗以上計吏客都中識君于交逵辱之以友益當君之西也獲餞于國門及夫斯來又相見于洛道語故舊數日乃行夫山川固能産異物而不能畜之者誠有利其用者耳今君之行也余疑夫不能久蓄于衡山之阿也送徐無黨南歸序草木鳥獸之為物衆人之為人其為生雖異而為死則同一歸于腐壞澌盡泯滅而已而衆人之中有聖賢者固亦生且死于其間而獨異于草木鳥獸衆人者雖死而不朽愈逺而彌存也其所以為聖賢者修之于身施之于事見之于言是三者所以能不朽而存也修于身者無所不獲施于事者冇得有不得焉其見于言者則又有能有不能也施于事矣不見于言可也自詩書史記所傳其人豈必皆能言之士哉修于身矣而不施于事不見于言亦可也孔子弟子有能政事者矣有能言語者矣若顔淵者在陋巷曲肱饑卧而已其羣居則默然終日如愚人然自當時羣弟子皆推尊之以為不敢望而及而後世更百千歲亦未有能及之者其不朽而存者固不待施于事况于言乎豫讀班固藝文志唐四庫書目見其所列自三代秦漢以來著書之士多者至百餘篇少者猶三四十篇其人不可勝數而散亡磨滅百不一二存焉豫竊悲其人文章麗矣言語工矣無異草木榮華之飄風鳥獸好音之過耳也方其用心與力之勞亦何異衆人之汲汲營營而忽焉以死者雖有遲有速而卒與三者同歸于泯滅夫言之不可恃也蓋如此今之學者莫不慕古聖賢之不朽而勤一世以盡心于文字間者皆可悲也東陽徐生少從豫學為文章稍稍見稱于人既去而與羣士試于禮部得髙第由是知名其文辭日進如水湧而山出豫欲摧其盛氣而勉其思也故于其歸告以是言然豫固亦喜為文辭者亦因以自警焉送王陶序六經皆載聖人之道而易著聖人之用吉凶得失動靜進退易之事也其所以為之用者剛與柔也乾健坤順剛柔之大用也至于八卦之變六爻之錯剛與柔迭居其位而吉亨利無咎凶厲悔吝之象生焉蓋剛為陽為德為君子柔為隂為險為小人自乾之初九為姤而上至于剝其卦五皆隂剝陽之卦也小人之道長君子靜以退之時也自坤之初六為復而上至于夬其卦五皆剛决柔之卦也小人之道消君子動以進而用事之時也夫剛之為德君子之常用也庇民利物功莫大焉其為卦過泰之三而四為大壯五為夬壯者壯也夬者決也四陽雖盛而猶有二隂然陽衆而隂寡則可用壯以攻之故其卦為壯五陽而一隂隂不足為直可决之而已故其卦為夬然則君子之用其剛也審其力視其時知隂險小人之必可去然後以壯而决之夫勇者可犯也強者可詘也聖人于壯决之用必有戒焉故大壯之彖辭曰大壯利正其象辭曰君子非禮弗履夬之彖辭曰健而說决而和其象辭曰居德則忌以明夫剛之不可獨任也故復始而亨臨浸而長泰交而大壯以衆攻其寡夬乘其衰而决之夫君子之用其剛也有漸而不失其時又不獨任必以正以禮以說以和而濟之則功可成此君子動以進而用事之方也太原王陶字樂道好剛之士也常嫉世隂險之小人多居京師不妄與人遊力學好古以自信自守今其初仕于易得君子動以進之象故豫為剛說以贈之大壯之初九曰壯于趾征凶夬之初九亦曰壯于趾往不勝為咎以此見聖人之戒用剛也不獨于其彖象而又常深戒于其初嗚呼世之君子少而小人多君之力學好剛以蓄其志未始施之于事也今其往尤冝慎乎其初章望之字序校書郎章君嘗以其名望之來請字曰願有所教使得以勉焉而自朂者豫為之字曰表民而告之曰古之君子所以異乎衆人者言出而為民信事行而為世法其動作容貌皆可以表于民也故紘綖冕辨以為首容佩玉玦環以為行容衣裳黼黻以為身容手有手容足有足容揖讓登降獻酬俯仰莫不有容又見其寬柔溫厚剛嚴果毅之色以為仁義之容服其服載其車立乎朝廷而正君臣出入宗廟而臨大事儼然人皆望而畏之曰此吾民之所尊也非民之知尊君子而君子者能自修而尊者也然而行不充于內德不偹于人雖盛其服文其容民不尊也名山大川一方之望也山川之嶽瀆天下之望也故君子之賢于一鄉者一鄉之望也賢于一國者一國之望也名烈著于天下者天下之望也功德被于後世者萬世之望也孝慈友悌達于一鄉古所謂鄉先生者一鄉之望也春秋之賢大夫若隨之季梁鄭之子産者一國之望也位于中而奸臣賊子不敢竊發于外若漢之大將軍出入將相朝廷以為輕重天下繫其安危如唐之裴丞相者天下之望也其人已沒其事已久聞其名想其人若不可及者䕫龍稷契是也其功可以及百世其道可以師百王雖有賢聖莫敢過之者周孔是也此萬世之望而皆所以為民之表也傳曰在其賢者識其大者逺者章君儒其衣冠氣剛色仁好學而有志其潔然修乎其外而輝然充乎其內以發乎文辭則又辨博放肆而無涯是數者皆可以自擇而勉焉者也是固能識夫逺大者矣雖豫何以朂焉第因其志廣其說以塞請梅氏詩集序豫聞世謂詩人少達而多窮夫豈然哉蓋世所傳詩者多出于古窮人之辭也凡士之藴其所有而不得施于世者多喜自放于山巔水涯之間見蟲魚草木風雲鳥獸之狀類往往探其竒怪內有憂思感憤之鬱積其興于怨刺以道羈臣寡婦之所嘆而寫人情之難言蓋愈窮則愈工然則非詩之能窮人殆窮者而後工也豫友梅聖俞少以䕃補為吏纍舉進士輒抑于有司困于州縣凡十餘年年今五十猶從辟書為人之佐鬱其所蓄不得奮見于事業其家宛陵幼習于詩自為童子出語已驚人長學乎六經仁義之說其為文章簡古純粹不求苟說于世世之人徒知其詩而已然時無賢愚語詩者必求之聖俞聖俞亦自以其不得志者樂于詩而發之故其平生所作于詩尤多世既知之矣而未有薦于上者昔王文康公嘗見而歎曰二百年無此作矣雖知之深亦不果薦也若使其幸得用于朝廷作為雅頌以歌詠大宋之功德薦之清廟而追商周魯頌之作者豈不偉歟奈何使其老不得志而為窮者之詩乃徒發于蟲魚物類羈愁感歎之言世徒喜其工不知其窮之久而將老也可不惜哉聖俞詩既多不自收拾其妻之兄子謝景初懼其多而易失也取其自洛陽至于吳興已來所作次為十卷豫嘗嗜聖俞詩而患不能盡得之遽喜謝氏之能類次也輒序而藏之其後十五年聖俞以疾卒于京師余既哭而銘之因索于其家得其遺藁千餘篇并舊所藏掇其尤者六百七十七篇為十五卷嗚呼吾于聖俞詩論之詳矣故不復云廬陵歐陽修序傳易圖序孟子曰盡信書不如無書夫孟子好學者豈獨忽于書哉蓋其自傷不得親見聖人之作而傳者失其真莫可考正而云也然豈獨書之如此余讀經解至其引易曰差若毫釐謬以千里之說又讀今周易有何謂子曰者至其繫辭則又曰聖人設卦繫辭焉欲考其真而莫可得然後知孟子之歎蓋有激云爾說者言當秦焚書時易以卜筮得獨不焚其後漢興他書雖出皆多殘闕而易經以故獨完然如經解所引考于今易亡之豈今易亦有亡者耶是亦不得為完書也昔孔子門人追記其言作論語書其首必以子曰者所以别夫子與弟子之言又其言非一事其事非一時文聮屬而言難次第故每更一事必以子曰以起之若文言者夫子自作不應自稱子曰又其作于一時文有次第何假子曰以發之乃知今周易所載非孔子文言之全篇也蓋漢之易師擇取其文以解卦體至其有所不取則文斷而不屬故以子曰起之也其先言何謂而後言子曰者乃講師自為答問之言耳取卦體以為答也亦如公羊穀梁傳春秋先言何曷而後導其師之所傳以為傳也今上繫凡有子曰者亦皆講師之說也然則今易皆出于講師臨時之說也幸而講師所引者得載於篇不幸其不及引者其亡豈不多耶嗚呼歷弟子之相傳經講師之去取不徒存者不完而其僞謬之失其可䆒耶夫繫者有所繫之謂也故曰繫辭焉以斷其吉凶是故謂之爻言其為辭各聮屬其一爻者也是則孔子專指爻辭為繫辭而今乃以孔子贊易之文為上下繫辭者何其謬也卦爻之辭或以為文王作或以為周公作孔子言聖人設卦繫辭焉是斥文王周公之作為繫辭必不復自名其所作又為繫辭也况其文乃概言易之大體雜論易之諸卦其辭非有所繫不得謂之繫辭也必然自漢諸儒已有此名不知從何而失之也漢去周最近不應有失然所為繫辭者得非不為今之繫辭乎易需之辭曰需于血出自穴艮之辭曰艮其限列其夤睽之辭曰見豕負塗載鬼一車是皆險怪竒絶非世常言無為有訓故考證而學者出其臆見隨事為解果得聖人之㫖耶文言繫辭有可考者其證如此而其非世常言無可考者又可知矣今徒從夫臆出之說果可盡信之耶此孟子所歎其不如亡者也易之傳注比他經為尤多然止于王弼其後雖有述者不必皆其授受但其傳之而已大抵易至漢分為三有田何之易焦贑之易費直之易田何之易傳自孔子有上下二篇又有彖象繫辭文言說卦等自為十篇而有章句凡學有章句者皆祖之田氏焦贑之易無所傳授自得乎隱者之學專于隂陽占察之術凡學隂陽占察者皆祖之焦氏費直之易亦無所授又無章句惟以彖象文言等十篇解上下經凡以彖象文言等參入卦中者皆祖之費氏田焦之學廢于漢末費氏獨興遞傳至鄭康成而王弼所注或用康成之說是弼即鄭本而為注今行世者惟有王弼易其源出于費氏也孔子之古經亡矣詩譜後序歐陽子曰昔者聖人已沒六經之道幾熄于戰國而焚棄于秦自漢以來收拾亡逸發明遺義而正其訛謬得以粗備傳于今者豈一人之力哉後之學者因迹前世之所傳而較其得失或有之矣若使徒抱焚餘殘脫之經倀倀于去聖千百年後不見先儒中間之說而欲特立一家之學者果有能哉吾未之信也然則先儒之論苟非詳其終始而抵牾質于聖人而悖理害經之甚有不得已而後改易者何必徒為異論以相訾也毛鄭于詩其學亦已博矣豫嘗依其箋傳考之于經而證以序譜惜其不合者頗多蓋詩述商周自生民𤣥鳥上陳稷契下訖陳靈公千五六百嵗之間旁及列國君臣世次國地山川封域圖牒鳥獸草木魚蟲之名與其風俗善惡方言訓詁盛衰治亂美刺之由無所不載然則孰能無失于其間哉豫疑毛鄭之失既多然不敢輕為改易者意其為說不止于箋傳而恨已不得盡見二家之書未能遍通其㫖夫不盡見其書而欲折其是非猶不盡人之辭而欲其斷訟之曲直其能果于自决乎其能使之必服乎世言鄭氏詩譜最詳求之久矣不可得雖崇文總目祕書所藏亦無之慶厯四年奉使河東至于絳州偶得焉其文有注而不見名氏然首尾殘闕自周公致太平已上皆正之其國譜旁行尤易為訛舛悉皆顛倒錯亂不可復考凡詩雅頌兼列商魯其正變之風十有四國而其次比莫詳其義惟封國變風之先後不可以不知周召王豳同出于周弼鄘并于衛檜魏無世家其可考者陳齊魏晉曹鄭秦此封國之先後也豳齊衛檜陳唐秦鄭魏曹此變風之先後也周南召南弼鄘衛王鄭齊豳秦魏唐陳曹此孔子未刪詩之前周太師樂歌之次第也周召弼鄘衛王檜鄭齊魏唐秦陳曹豳此鄭氏詩譜次第也黜檜後陳此今詩次比也初豫未見鄭譜嘗略考春秋史記本紀世家年表而合以毛鄭之說為詩圖十四篇今因取以補鄭譜之亡者足以見二家所說世次先後甚備因據而求其得失較然矣而仍存其圖庶幾以見豫于鄭氏之學盡心焉耳夫盡其說而有所不通然後得以論正豫豈好為異論者哉凡補其譜十有五補其文字二百七增損塗乙改正者三百八十三而鄭氏之譜復完矣譜序自周公致太平已上皆亡其文豫取孔頴達正義所載之文補足因為之注自周公已下即用舊注云韻總序倕工于為弓而不能射羿與逢䝉天下之善射者也奚仲工于為車而不能御王良造父天下之善御者也此荀卿子所謂藝之至者不兩能信哉儒者學乎聖人聖人之道直以簡然至其曲而暢之以通天下之理以䆒隂陽天地人鬼事物之變化君臣父子吉凶生死凡人之大倫則六經不能盡其說而七十子與孟軻荀揚之徒各極其辨而莫能殫焉夫以孔子之好學而其所道者自堯舜而後則詳之其前蓋略而弗道其亦有所不暇者歟儒之學者信哉逺且大而用功多則其有所不暇者冝也文字之為學儒者之所用也其為精也有聲形曲直毫釐之别音響清濁相生之類五方言語風俗之殊故儒者莫暇精之其有精者則往往不能乎其他是以學者莫肯捨其所事而盡心乎此所謂不兩能者也必待乎用心專者而或能之然後儒者有以取焉洛僧鑒聿為韻總五篇推子母輕重之法以定四聲考求前儒之失辨正五方之訛顧其用心之精可謂入于忽微若櫛之于髮績之于絲雖細且多而條理不亂儒之學者莫能難也鑒聿通于易能知大演之數又學乎隂陽地理黃帝岐伯之書其尤盡心者韻總也世本儒家子少為浮圖入武當山往來江漢之旁十餘年不妄與人交有不可其意雖王公大人亦莫肯顧聞士有一藝雖千里必求之介然有古獨行之節所謂用心專者也宜其學必至焉耳浮圖之書行于世者數百萬言其文字雜以夷夏讀者罕得其真往往就而正焉鑒聿之書非獨有取于吾儒亦欲傳于其徒也集古録目序物嘗聚于所好而常得于有力之彊有力而不好好之而無力雖近且易有不能致之象犀虎豹蠻夷山海殺人之獸然其齒角皮革可聚而有也玉出崑崙流沙萬里之外經十餘譯乃至乎中國珠出南海常生深淵採者腰絙而入水形色非人往往不出則下飽蛟魚金礦于山鑿深而穴逺篝火餱糧而後進其崖崩窟塞則遂葬于其中者率常數十百人其逺且難而又多死禍常如此然而金玉珠璣世常兼聚而有也凡物好之而有力則無不至也湯盤孔鼎岐陽之鼓岱山鄒嶧㑹稽之刻石與夫漢魏以來聖君賢士桓碑彛器銘詩序記下至古文籕篆分𨽻諸家之字書皆三代以來至寶怪竒偉麗工妙可喜之物其去人不逺其取之無禍然而風霜兵火湮淪磨滅散棄于山崖墟莾之間未嘗收拾者由世之好者少也幸而有好之者又其力或不足故僅得其一二而不能使其聚也夫力莫如好好莫如一豫性顓而嗜古凡世人之所貪者皆無欲乎其間故得一其所好於斯好之已篤則力雖未足猶能致之故上自周穆王以來下更秦漢隋唐五代外至四海九州名山大澤窮崖絶谷荒林破冢神仙鬼物詭怪所傳莫不皆有以為集古録以謂傳寫失真故因其石本軸而藏之有卷帙次第而無時世之先後蓋其取多而未已故隨其所得而録之又以謂聚多而終必散乃撮其大要别為目録因并載夫可與史傳正其闕謬者以傳後學庶益于多聞或譏豫曰物多則其勢難聚聚久而無不散何必區區于是哉豫對曰足吾所好玩而老焉可也象犀金玉之聚其能果不散乎豫固未能以此而易彼也廬陵歐陽修序孫子後序世所傳孫武十三篇多用曹公杜牧陳皥注號三家孫子余頃與撰四庫書目所見孫子注者尤多武之書書本于兵兵之術非一而以不窮為竒冝其說者之多也凡人之用智有短長其施設各異故或膠其說于偏見然無出所謂三家者三家之注皥最後其說時時攻牧之短牧亦慨然最喜論兵欲試而不得者其學能道春秋戰國時事甚博而詳然前世言善用兵稱曹公曹公嘗與董吕諸袁角其力而勝之遂與吳蜀分漢而王傳言魏之諸將出兵千里每坐計勝敗授其成算諸將用之十不失一一有違者兵輒敗北故魏世用兵悉以新書從事其精于兵也如此牧謂曹公于注孫子尤略蓋惜其所得自為一書是曹公悉得武之術也然武嘗以其書干吳王闔閭闔閭用之西破楚北服齊晉而霸諸侯夫使武自用其書止于強霸及曹公用之然亦終不能滅吳蜀豈武之術盡於此乎抑用之不極其能也後之學者徒見其書又各牽于已見是以注者雖多而少當也獨吾友聖俞不然嘗評武之書曰此戰國相傾之說也三代王者之師司馬九伐之法武不及也然亦愛其文略而意深其行師用兵料敵制勝亦皆有法其言甚有次序而注者汨之或失其意乃自為注凡膠于偏見者皆抉去傳以己意而發之然後武之說不汨而明吾知此書當與三家並傳而後世取其說者往往于吾聖俞多焉聖俞為人謹質溫恭衣冠進趨眇然儒者也後世之視其書者與太史公疑張子房為壯夫何異筠州學記周衰先王之迹熄至漢六藝出因秦火之餘承千百家之後言道德者矜髙逺而遺世用語政理者務卑近而非師古刑名法家之術則狃于暴詐惟知經者為善美又爭為章句訓詁之學以其私見妄穿鑿為說故先王之道不明而學者靡然遊于所習當是時明先王之道者揚雄而已而雄之書世未知所好也然士之出于其時者皆勇于自立無苟簡之心其取與進退去就必度於禮義及其已衰而搢紳之徒抗志於強暴之間至於廢錮殺戮而其操愈厲者相望于後先雖有不軌之臣猶低回沒世不敢遂其篡奪自此至于魏晉以來其風俗之弊人才之乏久矣以迄于今乃有特起于千載之外明先王之道以悟後之學者世雖不能皆知其意往往好之故習其說者論道德之㫖而知應務之非近議政理之體而知法古之非迂不亂于百家不蔽于傳疏其所知者若此此漢之士所不能及然能尊而守之者即未必衆也故樂易淳朴之俗微而詭欺薄惡之習勝其于貧賤冨貴之地則養亷逺恥之意少而偷合苟得之行多此俗化之美所以未及于漢也夫所聞或淺而其義甚髙與所知有餘而其守不足者其故何哉由漢之士察舉于鄉閭故不得不篤于自修至于漸摩之久則果于義者非強而能者也今之士選用于文章故不得不篤于所學至于循習之深則得于心者亦不自知其至也由是觀之則知上之所好下必有甚者焉豈非信哉今漢與今有教化開導之方庠序養成之流則士于學行豈有彼此之偏先後之過乎夫大學之道將欲誠意正心修身以治其國家天下而必本于先致其知者固善之端而人所難致也以今之士于人之所難致者既幾矣則上之施化莫易于斯時顧吾之所向如何耳筠為州在大江之上其地僻絶當慶厯之初詔天下立學而筠獨不應詔州之士以為病至治平三年蓋二十有三年矣始告于知州事都官郎中董君儀董乃與通判鄭君相州之東南就亢爽之地築宫于其上齊祭之室講誦之堂休宿之廬至于庖厨庫廄各以立焉經始于春而落成于其八月之望既而來學者常數十百人二君乃以書之京師請記于豫豫謂二君之于政可謂知所務矣使筠之士相與升降乎其中講先王之道文以致其知其賢者超然以自信而獨立其中材勉焉以待上之教化則是二君之作非獨使夫求者玩思于空言以干世取祿而已故為之著豫之所闡者以為記而使歸刻焉非非堂記權衡之平物動則輕重差其于靜也錙銖不失水之鑒物動則不能有睹其于靜也毫髮可辨在乎人耳司聽目司視動則亂于聰明其于靜也聞見必審處身者不為外物眩晃而動則其心靜心靜則智識明是是非非無所施而不中夫是是近乎諂非非近乎訕不幸而過寧訕無諂是者君子之常是之何加一以觀之未若非非之為正也豫居洛之明年既新㕔事有文紀于壁末營其西偏作堂户北嚮植叢竹闢户于其南納日月之光設一几一榻架書數百卷朝夕居其中以其靜也閉目澄心鑒今照古思慮無所不至焉故其堂非非為名云仁宗御飛白記治平四年夏五月豫將赴亳假道于汝隂因得閲書于子履之室而雲章爛然輝映日月為之正冠肅容再拜而後敢仰視蓋仁宗皇帝之御飛白也曰此寶文閣之所藏也胡為于子之室乎子履曰曩者天子宴從臣于羣玉而賜以飛白余幸得與賜焉豫窮于世久矣少不恱于時人流離竄斥十有餘年而得不老死江湖之上者蓋以遭時清明天子嚮學樂育天下之材而不遺一介之賤使得與羣賢並遊于儒學之館而天下無事嵗時豐登民物安樂天子優游清閒不邇聲色方與羣臣從容于翰墨之娛而余于斯時竊獲此賜非惟一介之臣之榮遇亦朝廷一時之盛事也子其為我志之余曰仁宗之德澤涵濡于萬物者四十餘年雖田夫野老之無知猶能悲歌思慕于壠畝之間而况儒臣學士得望清光䝉恩寵登金門而上玉堂者乎于是相與泫然流涕而書之夫玉韞石而珠藏淵其光氣常見于外也故山輝如白虹水變而五色者至寶之所在也今賜書之藏于子室也吾知將有望氣者言榮光起而屬天者必賜書之所在也宋文選卷二
