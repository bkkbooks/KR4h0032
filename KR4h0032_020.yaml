body:
  text: 宋文選卷二十李邦直文䇿旨王者與之議天下之政有大臣在而又收訪賤者之言何也以謂人有逺近貴賤之殊而道則公治亂之計各或知之使之畢其説庶幾有補於世非特求其有補而已夫王者之於臣下既用則觀其事未用則觀其言事足以見其才言足以見其識故取人之微術莫若以其言也國家嘗詔內外官有可言者皆得置郵而聞之於上然其所陳之類不過法令金榖之間鮮有以仁義發揚人主之聰明而惠澤天下者朝廷亦嘗賤仁義之説以為汗漫無實而不適於事變夫珠犀象玉生於江海匿於窮山不逺千里皆列於人君之左右豈非以好之者篤求之者勤而後至於前耶珠犀象玉玩好之資耳言之可貴非徒珠犀象玉也陛下好之篤而求之勤則仁義之言日至賤之而弗為貴則嘉言不至而庸言來矣且陛下繼祖宗大業數十年間寬和門安無為而治以法堯舜未嘗有深誅痛斷於羣臣而姦邪睥睨傍有所憚而不敢輒肆奚其然哉畏指議者之不已也則言者之為益多矣緑衣小臣生長聖時樂於父兄師友之教行已之外竊嘗志天下利病僅得其一二大者故因可言之會條其略於篇以為貢臣以為古今之治無法者不能久悲申慎之愚於法而叛仁義故有法原事有形勢善同而功不齊為國者不可以不知故有勢原禮樂教化非刑不立故有議刑二篇國之興亡治亂常起於兵不忘用兵者兵置而不用故有議兵三篇瘡瘍非心腹可憂之疾瘡痬未止心腹之氣為之弗寧內疾或從是而起夷狄外物常擾吾治故有議戎二篇官治則事治事治則天下治故有議官三篇義利相形不得其中民必止散故有重計備不可不預兵為國命馬為兵本故有實備孔子曰赦小過舉賢才其斯為政故有明責激貪扶懦别白賢不肖故有勸吏根本強固木不可拔愚其宗子秦以亟亡故有固本化風不行王業終不及於三代故有厚俗未有左右正而事不治者也故有廣助士不素厲亡以應猝故有養材尊君卑臣法一而分定治天下如治一人故有審分政為神物王者司之援古鑒今可以善其後故有操柄窒禍本導其君於文明故有解蔽姦臣之所欲為者使人主素知之故有辨邪臣聞鮑宣之言少文多實史氏稱其忠臣言雖褊迫不文然皆當世之可行者涉其目可以知其大指有䇿旨法原䇿法者何也聖人所以齊天下之動至公大定之制也其原出於道德禮義而其用散於號令賞罰凡有天下之君未嘗有無法而久者也昏世嘗有無法之君矣奈何乎人之多欲而趨亂也如歸市人之多欲而無法以齊之故有臂者攘有足者馳勇者苦怯者而奪其資知者紿愚者而兼其利聲色耳目之奉紛紛籍籍其去禽獸者間不容一毫故聖人為之法使天下強弱小大貴賤逺近莫敢不一於法焉由法者安不由法者危由法者得其所欲而生不由法者失其所欲而死如是故法立法立而天下之心定而治道畢矣法為貴君位次之法壞則民亡民亡如之何其尊且安也故人主尊法懼法之不立也故以身先之懼天下之慢法而法壞也故一舉事而不敢忘法賞罰以法號令以法取豫以法廢置以法殺生以法動靜以法視法如神物而不敢侮如天墜地設不敢輒破壞改易也不以一事小害而損法不以一時苟利而增法使天下無有不由法而自為者故智者不得越法而謀辨者不得越法而議士不得背法而有名臣不得背法而有功我善可抑我忿可窒而法不可離骨肉可刑親愛可滅而法不可屈也故雖成王之叔不得以流言而亂政髙祖之父不得屈君臣之儀文帝元帝之子不得越王門絶馳道光武之姊不得保臧獲姦使吏民愛若孝王嬖若韓鄧功若陳湯馮奉世義若郭解不免於有司之議而天下不敢私恐其開亂法之原而後爭以為比也故明王之法左者不為右右者不為左上不奪下職下不使上事為廷尉者不以才有餘而道禮樂為太常者不以官優寡事而議刑法士者不為工商賈人不為士也令史大匠之起巨室彈畫一定木之曲直小大長短必皆就吾繩墨規矩焉其參差不齊齟齬不合則斤削燎括而已矣若毁我之彈畫而從木之情則工勞事拙紛擾而不可理矣故聖主立法賢主守法立法者使法必出於道德禮義而後布之天下以為法守法者使賞罰號令必出於法而後以為賞罰號令法不出於道德禮義者弊法也弊法者非法非法者未久而還賞罰號令不出於法者弊政也弊政者非政非政者法壞而天下不服故法一則成法二則疑法固則君尊法搖則君削法行則要而治多法不行則煩漫而無功今夫一人之寡居深戶之中傳盈尺之紙而風驅電行殺生廢置人於千里之外提癯夫羸老僅勝衣冠之人付之寸印而坐諸帷幄進退萬夫若羊彘然童子據奧室羣湖海之珍怪處女嬰珠玉而立乎衢途烏獲戾目而不敢動以法在也故天下視法如籓籬立法如封界強者以攣縮弱者以安全至哉法乎人君之衛天下所恃而生也暗主則不然不能以法制勝私欲不知已亦待法而後安故從欲而慢法其意若曰法者我之可自出也何有於法哉昵乎所愛則無勞而封爵有罪而不誅或利害僅如毛芥而輒變大法名分不立百職相侵日革月易人不知所循下皆知法之易撓而可踰也則險庸譎詭者舞其私意以動法幸諛便僻者倚上之恩以貨法悍暴傑偼者奮其亂力以干法如是故法亡法亡而民亡民亡而國亡矣如籓籬然臧獲者超履穿穴而主人勿禁安能使盜之不窺而保其室中之所有也如封界障隧然其羊童牛牧已嘗有蹊之徑之之迹矣安能制衆人之不來而全其果蔬稼穡也或曰法之説無乃膠固滯事而失於圓通徇物之道歟曰不然法者天下之公也千世之守也大道也通者人臣之私也一時之偷便也短術也法同而治異者吏不能舉法也吏之罪也法不可輕立亦不可屢變也立法之主必若禹湯文武漢祖唐宗者也議法之臣必若皋陶伊尹周召蕭張房杜者也朝錯且尚勿免况庸人乎臣竊規今之世朝廷或弛祖宗之法羣下或慢朝廷之法大臣或率胸臆而輕法庸士或作衆辨而侮法為牧伯者或擊斷於法外以為能臣恐紀綱制度緣是亂法緣是而亡故作法原勢原䇿君之所以安危國之所以存亡治亂令之所以行不行勢也不善知勢不能為創業之君不知勢之可畏而失其所以審度將順不可以為持成之君經治之臣故善用國者勢而已矣理勢循則行忤則變動則險止則平輕能重緩能速故物有至小而力不可勝即事有至易而功不可勝原發如毫芒針端而巨若丘阜本在拱把而逺際窮髮者勢也如戶之運也如車之馳也如弓之圓也如矢之激也如衡以一權而舉數倍之重也水之注於卑澤也原火之燎於風中也兵之奮寡而走衆也人之乘髙而制下也勢也豈惟萬物為然今夫一人而勝天下之大制天下之衆兼聽天下之廣沛焉有餘非勢而何如也故明者用勢而暗者用於勢明者提至要之處持其關鈕制其機樞動靜在我開闔在我弛張在我一教一令一賞一罰必輔之以形勢故教之而行者易令之而從者速賞一而千萬人勸罰一而千萬人懼仁少而悅者多義近而服者逺無他理勢為之也教令賞罰仁義而無形勢之輔必且人人而治之矣人人而治之教之行也必艱令之出也必煩天下之善有餘而賞不足天下之惡有餘而罰不足天下之民無窮而仁義不足無他理勢不先也夫千世之君可屈指而數之矣或善或惡或仁或義其間差不能銖寸而功名輒相倍蓰禍福輒相百萬者無他形勢之異使然也成湯祝獸網而歸者三十六國文王葬枯骨而天下三分有其二千世之君德有大於此者矣而湯文用此收天下之助其從民情而集天下之勢也方形勝之在桀紂夏臺之囚羑里之獄如拘亡夫及善惡之暴也形勢之變而遷也如林之師而莫敢射車中之木主故天下之勢安則動難動則安難當其安也垂紳端委深拱於堂奧戶牗之內而髙論治古之上尊明如天日閎隱如震霆煦煦如雨露肅肅如風霜指顧叱咜而天下莫不趨走鞭笞海外之島蠻若制童妾雖有劉項之魁雄曹馬之姦桀必且老死民籍而不敢倡及乎昏懦為之也席先王之位傳先王之民朝有遺臣故老事有綱目軌度先王之澤未涸天下之勢未運自視其安也以為無有危事也任一喜怒從一嗜欲矣而患未切已也以為可為而無傷也習知天下之尊服已也以為人終古莫敢蹙路馬之芻觸囿兔之毛也簸頓關紐嬉弄機樞動靜不以時開闔不以法張弛不以節淫樂在宫中而怨毒被天下略易在一朝而禍患遺千日民心之他屬也君柄之旁落也勢之翻然而離也雖欲安之不可能也竊譬之山之髙厚也萬夫不能毁壞也朽壤生乎中巋石震乎上及其傾也人力不能支柱而維持也非天事也勢也故前聖創業起今之利變今之害所以治天下之具甚備憂天下之慮甚深綴民心而久天下之勢堅牢固密為不可拔及其久未嘗無罅缺蠧漏也然而其剝也亦有漸矣在後聖時節其勢而繕之耳汰則約之危則平之擾則靜之微則養之弱則扶之急則縱之緩則持之塞則導之使萬事之理百物之節皆不至於窮極而大變則勢久而長無危亡之形矣故勢之在我也我蓄積之固執之審則發弗便則居故勢為我使而天下莫能逆也若一失其要則橫肆奔悍於外不可復之雖有天下一旦驅擠排壓而仆矣臣故曰如户之運也如車之馳也如弓之圓也如矢之激也如一權而舉數倍之重也如水之注於卑澤也如原火之燎於風中也如兵之奮寡而走衆也如人之乘髙而制下也其動不可不慎也人主知勢則處治如將亂處存如將亡處安如將危而亂與危亡亦且不至臣故作勢原議刑䇿上治天下如治馬馬之性剛則踶恐則齧氣作而脈張風逸於野乘之者將有奔墜之患故必待之以轡節之以銜揮之以䇿欲速則速欲止則止使之無一不若吾意者然而冶馬者亦有道行之以其塗羈之以其節䇿之以其事調順而不亂約易而不煩時其強弱而視其力之所任馬於是乎循理而服駕矣有越人焉不善治馬行之也非其塗羈之也非其節䇿之也非其事馬於是僨張狂惑而愈不知乘者之旨則馬之性妄行而乘者不得安矣故天下者馬也轡銜鞭䇿者法令也法令之使民如鞭轡之治馬聖人之善使民如王良造父之善治馬民之不可治之以苛如馬之不可迫之以煩也故法貴易知令貴易行法必簡而明令必約而信使民曉然皆見上之意則亹亹而從之矣而不善治民者繁為之法苛為之令使天下之民前有罻羅後有陷穽左則木索右則桁楊民皆惶駭惴栗不知自免之路而願者或有所置姦者或有所逃天下之詐日起而法令益不勝如是祈民之和順而循理安可得也故曰畢弋多鳥亂於上網罟多魚亂於水扼之齊之而馬知詭御竊轡故夫法密則犯者多犯者多則法不勝為髠鉗赭衣本所以涅小盜也髠鉗赭衣者大半於天下則相率而捍法以為大盜任強吏持急憲本所以摶摘隱伏也隱伏盡露法不足以勝之則不復隱伏而公為姦羅取細罪本所以止民為罪也不為罪之民既已羅入於罪而抵誅則不復愧恥畏讋然後為罪自古尚法之世莫過於秦秦用商鞅李斯之術以繩天下令民什伍相司偶語於市則刑棄灰於道則誅然天下之所以叛秦者以法卒所以亡秦者以刑人也漢祖乘之約法為三章蕭何裁增為九章極簡易矣宜罪有得漏而姦有得為然事益少民益畏罪至孝文而刑至於措具緩急繁簡之不同而治亂之勢異何哉法不可極而民不可勝也聖宋之於法可謂矜慎而留意矣太祖始詔置士官太宗設審刑之職章聖皇帝又建提點刑獄之任嵗必下寬詔滌桎梏而厚繫囚之飲食吏有深法而枉民於刑者廢抑而不得遷以懲其酷能活一囚之不當誅者弗論嵗考弗用保薦而輒增秩以勸其仁凡以疑讞聞上者皆生之其矜慎而留意如此宜有漢文刑措之效也而天下之執重繫者嵗嵗加多舉天下之民能終身而不受笞箠闔戶而不在刑籍者嵗嵗加少其所以然者臣以謂國家有輕刑之名而無輕刑之實法苛密而輕令煩雜而亂别勑他禁數倍於律由是之至也自古議獄之深者皆指秦以為首而臣謂今之民罪有薄於偶語棄灰而入者矣如之何安視而不為戚戚也議刑䇿下天子仁聖如此天下之民常患不得其所朝廷慎刑如是而臣謂之過於秦法何也古律有浮於事可蠲而未蠲令制有失於當可刋減而未為刋減者也今之律蓋秦漢之餘法而纍世增損附益而成之可謂小大無失而輕重無所漏矣巧民真姦善為天下未嘗為之罪亦皆有所科條而不能出乎其中矣不知向者又為無名之法而附於其末曰不可言而言不可為而為者皆坐之以彼罪之有狀而可科者既律之所不容凡無狀可科者則亦無罪而已又施羅織之意於其間以開苛吏舞文之端則行路之人皆可取之置於理一步作一謦咳搖手反臂無不觸罪上官之率私怒而加害於小吏吏之所以生意而牧良民者蓋莫不用此使無罪之吏坐此而絀殿無罪之民坐此而榜毒此律法之過焉者也古之為法之意丁寧而詳悉其大旨防民之為不義故為之法輔義而行之苟得其實則刑之殺之而民莫不服知其出於義也自咸平及於祥符及於天聖自天聖及於慶厯制勑之目數刋矣慶厯中刪之得一千七百五十七章頒以為定法其立法之目常汲汲於貨利而重募告訐之人涉禮義而輔教化者曾不能半夫上射利於下下競利於上上事利而用刑故刑之而民心弗改知其出於利也古以義用刑今以利用刑此勑法之過焉者也古之遺法曰律曰令曰式今之通行之法曰制勑曰附令故律所以佐典禮也令式所以佐律也制所以佐律令也附令所以佐制勑也故律有定刑而令式無定刑有事不循於令式者一止於笞所以為中法也今之慶厯勑或有定刑或無定刑律之而無定刑者輒鞭笞而勑法之中類多細防薄禁事有微小於令式之所約者條責簿書之朱墨按比券契之遲速賦役之常格廄庫之成事賣買之煩期會之末課督征權而欽會毛革其纎悉煩碎類非國體之大此皆宜傳諸令者而遽列於勑法更民毫釐之差亦獲大咎刑加於犯令凡數等此宜為令而為勑之失也臣以為律法當言當為主科可以蠲省惟戮其有名之罪則文吏不得髙下其手責利之門少告訐之路閉則天下國家先義而後利制勑之所禁煩細而無定刑者審擇而附之於令則薄罪不陷於重誅釐此三者刑庶幾乎清而民樂其生仁主之澤洋汪於天下矣議兵䇿上天下之事莫難於兵天下之才莫難於將今夫奉法令畜士民雖提頓矯暴之其逆順禍福持非嵗月之久理勢之極動之有非是虛徐而議倣徉而止利可以緩從患可以中避若夫羣數十萬之衆局熊羆之氣聚􅓔軀虎臂之力制之非其道則若奔馬之轡不可收厲吾人人而敵人與抗伺我有釁睨我小跌一有形罅若弩羽之來不可障是故朝為勝兵暮為野􅟆朝為強國暮為丘墟其存亡死生之速如是故曰天下之事莫難於兵生者人之所甚樂死亡人之所甚惡將使人觸白刃冒流矢赴死如赴生安逸人之所至願勞苦人之所最病將使之草食水飲介胄而騎角逐出入於死生之場趨勞如趨逸耳目之衆也將使之莫敢不一心志之異也將使之莫敢不同我之迹將使之不可窺彼之情將使之不可隱故曰天下之才莫難於將一治十十治百百治千千治萬萬一者將也百萬者兵也以一人動靜進退而百萬之命繫焉故國之命在師師之命在將國輕用將將輕用師危亡之夲也非仁不能以懷物非威不能以戢士非勇不能以震敵非智不能以應變非信不能以固結專於仁則慢而不為用專於威則怨而不為用專於勇則力折而機誤專於智則聲蔽而實窮專於信則事滯而利失備者多勝專者多敗故將之材得則兵未戰而先勝將之材失則兵未戰而先不勝有不可用之將無不可用之兵將勝則兵少以為多兵弱以為強將不勝則兵多而易亂兵強而陷速知兵必勝之將其大略蓋出於智謀仁義而仁義施之陽智謀藏之隂陽明而無不知陰潛而下不可見至哉知此者其知所謂為將乎故良將之材未易有也有之而未易知也知之而未易用也用之而未易終也非至君不能用將非至將不能用兵非至兵不能破敵兵事將材之難如此太祖皇帝角材智合冦讐而任之即位之四年慕容延釗入荆南髙繼沖獻其地五年王全斌伐蜀六年降孟昶平三川十一年潘美之兵趨廣南數月而縶劉鋹十五年一曹彬橋長江過師於采石十六年拔金陵俘李煜將明卒鋭勢如決河海聲若走風霰素定之䇿印圈鑰勘不失尺寸算日數刻以俟捷奏積世之珍入於王府數路之籍登於版圖以此之將將此之兵故兵用而武功成將出而敵國破長摹逺據以授後聖太平之業百年餘矣廟堂之上習於安娛轅門之口恬於豢養兵不知律將不知兵國不知將觀今之所謂將其在內者徒車騎容冶日奉朝謁利厚祿以肥子弟苟聲色美田宅而已其在外者資公養之費約結要人酣歌玉食希冠蓋之譽庇占惰卒便豆觥庖廄織絍繡畫針韗鳬煆伎巧玩好之事而已其於訓練之精粗賞罰之後先士氣之強怯地形之迂直鵝鸛之踈密敵情之誠偽慢焉不知百一以此之將將此之兵是故治安間暇之日名繁數稠髙位大俸索上農夫十戶之賦足以給一兵悉關市之征不足以奉一將濶視侈言尚各不滿一旦走檄傳警投之敵前而用之小出必小挫大舉必大比血丹原野膚殘鈍釼四夷以為大噱非天之災非地之變非時之不幸國不知將將不知兵兵不知律之禍也韓非曰所用非所養所養非所用故臣願陛下於優安寡事之時留神於兵垂意於將當塗以收之當術以驗之投之以難而觀其決付之以事而觀其應問之以疑而觀其慮嘗之以故而觀其材愒之以險而觀其忠較之以氣而觀其勇則將斯得矣詩曰逮天之未陰雨徹彼桑土綢繆牗戶今此下民或敢侮豫孔子曰為此詩者其知道乎能治其國家誰敢侮之北有枀陘之諸部西有赫連之遺種南有盤瓠雜獠丁黎餘民陛下畜十餘將練數萬人守則守戰則戰四邊必睨睥而不敢背慮之有素誰敢恐懼中國而侮之者陛下垂拱於太平之上淡不早圖嵗苟一嵗日苟一日養不可用之將蓄未嘗戰之兵猝有風塵從疆塞而起擾吾赤子掠吾土毛然後駭而為之則亦暮已議兵䇿中用兵收將之術臣概舉而奏之前篇矣請為陛下言其詳兵在內則內重兵在外則外重內重則強外重則弱兵在勳臣則勳臣重兵在近戚則近戚重兵在宦臣則宦臣重上重則安下重則亂唐太宗定天下增隋之舊開折衝果毅府以統兵籍設十六衛以宿將臣或蠻夷侵邊強臣不朝則取兵於府以事剪伐取將於衛以典師律事平功成則將歸於朝以奉宿衛兵散於野以力耕鋤兵雖有籍而府實空將雖有名而權實去兵將在內而京師實重又兵雖有籍而府實空是故無飼養之費無姑息之勞無一旦之變將雖有名而權實去是故無震主之忌無難制之勢無擅威之姦兵將在內而京師實重是故無尾大之憂無外侮之虞無割據之漸自古制兵之術莫善於唐太宗者兵農混一僅如宗周故王業最治至唐中年府兵廢而太宗之遺業勝事大壞兵重於外而不歸故藩鎮強大而叛兵重於內而不制故宦臣得柄而逆傳十餘君焦思勞精卒不能復以亡唐室流熾五代肉爛魚餒在外者分裂方土虓闞內視在內者收把威柄暴悖上陵五十四年傳六姓十四君而天下生靈百不一存矣太祖皇帝神武聖謀洗削禍亂收天下之柄歸之於已籠絡悍夫易以文吏雖籓鎮諸帥名號尚存祿賜尚豐而兵衆土地悉屬於上矣逆腸叛膽消縮順嚮莫敢不臣舉天下之卒凡可以勝甲荷戟者名之曰禁兵則皆天子之衛非人臣所得而有也聚之於京師以固內重之勢而威天下非蠻蜒戎狄守備抗扼之地川塗關嶺險害走集之所未嘗不遣戌而宿重兵屯戌之師三嵗而代妻子廬墓皆在京師補一小校汰一羸老必奏籍於中而俟上命以消殺四方之異志故天下兵柄外不在藩鎮內不在強臣不委宦臣不倚近戚利權重器在天子拱把之中雖有侍衛三師非有可專之威徒主符籍而呼趨指導於階前耳天子或御廣殿或獵近郊節以鉦鼓習以騎射角拳勇之材激忠順之氣或幸壁壘視其紀律而省其私隊長賞罰以上日預朝請而抃拜時預宴禮而犒飫嵗預衣裘繒絮之賜而華暖慶賞威刑撫取揀練縻制控約無不自天子為之者故百萬之衆目無他視情無他歸讋悼親愛皆在一人不在臣下如足戴身如指隨臂如子弟翼父兄如魚鳥從龍鳳至哉雖未能混一兵農實威服四海聖神久大之略也老氏曰利器不可以示人梅生曰秦倒持太阿授楚其柄誠能勿失其柄天下雖有不順莫敢觸其鋒夫太阿之鐏不可以倒持而利器之守不可以不固也陛下席三聖之烈撫萬世之圖富與地侔尊與天並恃隆平之極當無為之時遊神運化於沖漠之場棲遲含光於髙古之上堯舜不足稱為仁夀周武不足稱為逸樂夫亂生於治也危生於安也患生於不足慮也祖宗之事著於史牘傳於世臣故老之口粲若日月遺䇿具在按節而舉之朝祭之餘禮樂教化之暇一御廣殿一帳近郊一幸軍壁旄頭在驅黃屋徐勤從以橫吹烈響穿雲奮揚國靈聳動士衆斬牲禡野卒搜器而簡練訓誓之誅一庸慢甄一忠武以起士卒久安沈墮之氣以改易天下之視聽夫六馬在馭不提振其轡䇿收其羈勒而大酣小寢於其上猝有駭異不蹶則奔祖宗既已聚天下之兵於京師以為內重之勢而威天下付之於復聖矣非可以無為為之也惟陛下留神議兵䇿下臣於上篇言用兵次篇言養兵之制或曰二者孰難臣曰二者俱未易而養兵尤為難用兵之時成敗共濟死生同患而有幸而勝者治安之時養兵失其制則禍實躡武而起矣唐魏公對文皇曰創業易守成難非空言也唐穆宗於不用兵之時姑息而至於衰壞五代之君明斷武健莫過於後唐莊宗者起師雲中南向而爭天下驍雄智勇周德威之儔莫不畢命罄力百戰於河朔一日踰鄆趨汴而段凝之師雖號十萬解甲束手矣然無學術不知古今治亂之體不知持成養兵之道天下既定軍律遂弛或潰於外或變於內魄然滅亡矣以取則得以守則亡此承平養兵之難也李承進嘗事莊宗太宗以唐事問之承進對曰莊宗惟務姑息將士驕縱每乘輿出次近郊必叩馬首以丐恩賞若是者非一威令不行賜豫無節因而召亂太祖摶髀而嘆息其不能以軍法御之也故祖宗之時雄武掠人捕斬百卒川班欣例全軍誅殛索衛士之無賴者冶鐡以錮其頸將校雖領刺史者苟有罪必杖配士伍操畚鍤冒寒暑皆甘心焉祥符中副校吕遇醉酒馳馬以歸章聖皇帝曰將士亡故不令出本班置市買二人此軍制也祖宗朝法令嚴肅無敢犯者今安敢有醉酒馳馬以歸者乎苟有之遂置於理一祖二祖相承而治具堅明約束如此故能革五代之亂而納四海於仁夀秃髮之老生長太平含哺鼓腹不見變駭陛下御宇數十年循三聖法度而天下順治可謂仁義之主矣夫太平之久則法有弛而不舉者法弛而不舉則兵有􅑁而不習者也兵􅑁而不習法弛而不舉身無金痍未嘗受勞苦之事血氣態度柔脆驕飽繯衣佻容不類武士目曰禁衛矣而日操纎巧竒嬴遊蕩酈閈旅魁什長與部兵相從促襟接席醉呼博塞隳敗等級忘失名分恬不為怪莫敢訶詰祿賜嵗增帑廩大涸無名不功之賞期若責息輒不為恩噢咻喻咀嵗律寢壞士卒咸知主上之仁故將臣莫敢獨治之者一有奮張小欲控約懲戢之卒自為黨與悖氣橫胸憤口誹謗囂囂動矣慶厯以來大異三代作戍於保者以賜金中罷殺守倅脅將吏嬰城而假息戌於甘陵者挾妖民盜庫兵而為僭環衛誰何之人闖禁藩觸寶瑟臣思之寒入毛骨伍中之走卒躍出馳道排入省寺而詬辱大臣庶藩列羣縷帛囊米小不滿望則聚首而議變禍大亂芽孰甚於此者非人主霆斷電耀長轡逺䇿羈之有宜而為之有漸將何以革此陛下玩而不為之圖其耳目熟習其氣熖完就其根蔓盤織其角觡愈剛幾世之後必將豪奪閭里鍾係老幼俘取金帛使百姓不得寧翻易將帥使朝廷不得制陛下取唐末及五代之事觀之非臣言之過也故臣願於可為之時選賢將提法令節姑息之澤峻有罪之誅使恩出於非常威出於不測人主為之士心焉有不服者夫用兵養兵之術二者皆未易而養兵尤為難今兵不用矣養兵之術無他惟因事而痛治之無純以仁治而已矣議戎䇿上金燕古為瀕山多馬之國其土莾平宜畜牧耕稼其民翹健使弓矢習騎射樂鬬輕死中國得之足以蔽障外裔外裔得之足以搖動中國蚩尤有涿鹿之野故叛黃帝舜以青冀分野又大剖其北籬而為幽為并為營周官職方氏掌九服之圖漚夷淶易之浸皆在其地戰國之時為燕國唐之時為范陽節度夫燕一國也范陽一鎮也以一國之力斗絶在戎夷中獨立幾八百餘年遂與周室終始而不為丐奴所吞者是其力足以獨捍胸奴也范陽一鎮之地宿兵不滿數萬而奚契丹不能輒苦趙魏滄景者其力足以獨制外裔也昔以一國之力而不憚丐奴今以天下之力而不勝其勞敝昔以一鎮之力而不憚奚契丹今以天下之力而懍懍常為憂其故何也燕國有朝鮮遼東雲中九原􅀈山樓煩易水以為之塞范陽有盧龍古北松亭孤門之要以為守用力少而塞之易此其能以一國一鎮截然中立而不憚丐奴奚契丹也自石晉割幽薊檀順媯儒武應寰朔涿蔚賂戎以市天下而營平易亦陷於北阻固扼束我皆失之而劃滄霸瓦橋信安肅廣信保定常山欣岢嵐火山寧化千里平廣之地以為界戎軍冦馬馳突去來如股掌之上耳此天下之所以不勝勞敝而懍懍常為憂也敵侵之益易我守之益難故時平而屯戍之費不得息敵之覘中國也近中國備敵之處也多故力勞而勢益分間有憂國之將不過廣塘水而已獻謀之臣不過啖閼氏可汗悅來使而已使土在其外而為沮洳於腹中閼河川泉瀆灌廬墓耕牧之地包七州廣數百里東起泥沽海口西逹邊吳淀堆蒲藻魚蚌生之而拄食皆漕取於內地並西山尚缺百里曽未足限隔戎馬而邊民喪其業矣嵗輸者不可一日而不繼遺之珠犀劍帶皆府庫上選乘輿之副拳然而如鄭衛之地事晉楚聘使所出之郡補徼道牽馬牛圬亭候捕雉兔羅果蓏飭倡樂聚薪炭僕役於夷人者不可勝數和親不戰而勞費如用兵之時矣竊譬之千金之家冦盜在藩墻之內不治格鬭攘郤之具而方施塹閾下以為守盜者從而笑之塘水是也又譬之懦夫與鷙獸相厄於野棄體肉飼之而祈免於害不忍萬全之時而先事一聞和親之賂是也古者固非忘和親也晉諸侯國耳用大夫魏絳之説而和諸戎以獲實利日賈其上民狎於野穡人成功夷狄事晉師徒不勤兵甲不頓逺至邇安則和親之術誠利矣今幽營為敵有內地又為塘而民不得耕屈中國以奉殊無遺力矣而師徒之戍不得息逺者主而邇人不為之安如是而為和親何為者耶議者粗日月之安而慮之不先將見天賜之穴日盈中國之力不可支然後破盟犯約而突盜吾民矣議戎䇿下唐太宗如彼其才而持金帛盟辭頡利可汗館帝女於外而許延陀何也當時羣臣或不能通知太宗之意夫太宗雖以武定天下然民方厭苦於兵頡利延陀未有可誅之大罪故厚之以貨賂許之以婚姻若曰戰非我所欲而寧負愧所以甚戎之曲而盈中國之氣也故卒擒頡利可汗延陀衰破失據而死則太宗之謀不為不逺契丹本唐之松漠都督國於黃龍遼澤間東西才三千里自欽德間光啓之亂服屬逹靻奚室韋之屬而安巴堅下渤海夫餘晉祖以地與耶律夀則西至於大夏東距於女真南界於瓦橋北厭於靺鞨其氣常在中國上咸平景德間數獵於趙魏之郊殘城郭係老幼而去先聖仁術睿算不忍以吾民困敝於奔命姑與之和親所以結約慰藉之甚厚自慶厯以來又嘗為非意難可之詞以動中國頻走問使擾邊民之生朝廷徒增其好幣而足其求金人今日驕中國之怒而山東三尺童子皆思奮寸鐡以搏金人而償陵驁侵辱之宿憤矣臣竊意其為天亡之時也昔者賈誼欲施五餌三表係單于之頸以謂賜之以盛服車乘以壞其目盛食珍味以壞其口賜之以音樂婦人以壞其身賜之以髙堂會庫奴婢以壞其腹於來降者上召幸之相娛樂以壞其心而史氏言其術為疏濶今耶律氏之君臣醉於玉帛而沉溺於寶賂其民生長和親知戰也少不習冦盜而或為進士學不以騎射為生而樂土者安室家與古外裔之俗甚異誼之説且效於今矣臣聞之山後遺民苦其賦役而懷中土之思彼之將相雜用南北之人權力相傾爭其勢不平而相軋乘壞之隙殆將有豪傑舉土以屬於我而請為藩臣者彼久客我土中心疑畏而常不得寧故時為慢書以觀中國之強弱深淺而我輒為之擾駭則固宜為外裔之所輕矣天下大事有人臣不敢首議必俟人主之斷而自為然後可以成其功者河湟之計其一也陛下雖不欲戰戎人驕甚而天下不能堪其勢必至於戰厲兵選將舉得其䇿河湟可以一日而復扼范陽盧龍之塞窒松亭狐門古北之穴決去波塘化為沃土募耕戰之士人賦百畝而處之養馬積粟以實塞下財京師長無北顧之憂矣詩曰昔先王受命有如召公日辟國百里今也日蹙國百里惟今之人不尚有舊唐獻文尚能復河隴百年久陷之地而况於盛明之主乎陛下亦篤於和親而緩於兵備彼中之情不可必得他族逼處在肘腋之下伺河水可渡掩吾人之不虞萬世之憂也宋文選卷二十
