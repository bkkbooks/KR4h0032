body:
  text: 宋文選卷二十四張文潜文論法上古之善為天下者不患法不立而患不能為法不患法不足而患法密而不勝舉然則天下之治亂不係法之存亡歟夫亦有推本而後知其至也夫法之所生不生于無事事起而不可理則法從而經之事日益多法日益周事日益新政日益工並起而相制則不勝者受其患故法不勝事則天下之亂紛然而起故治天下者非無法之尚也為其無事之可貴也非法備之可削也為其事變之可慮也昔者三代之治不若堯舜商周之治不如夏后孔子曰後世有作者虞帝不可及也又曰虞夏之道寡怨于民商周之道不勝其弊夫舜之禮比于夏后之時則略矣商周之禮比于夏后之時則備矣夫四代之治否豈禮不具之罪哉制度日多淳粹日衰矣天下之勢譬如人之一身夫世之人有不畏寒暑不治藥石恣口之所食肆體之所安夫如是者問其年必壯者也深居奧處愛養備至藥石百物毒烈並進而炙艾針砭遍膚而無遺問其年則必老者也夫虞夏之道壯者也其不治可為也其不足可補也壯者之疾易治也其成質未虧而可以有為也商周之道老者也其不治難為也以其嘗治之而不信故也其不足難補也以其嘗補之而不滿故也彼之疾方來而吾之術已窮彼之變未休而待之道已盡如是則死繼之矣嗟夫天下之不願取辦于法也如此而世之君子撫事制變而尤法之不足豈不悲哉夫法度之弊起于德不足而求勝其民而敗于啓民之邪心而多怨夏之繼舜也豈不知舜之為不可及也商周之繼夏也豈不知其弊之將不勝也然而明見其弊而為不已何也豈其世變日繁而德有不足故耶德不足以還民之初熟視其亂而莫之禁則將以智加之故曰法起于德不足而求勝其民夫上以智勝其下則下亦以智勝其上不絡馬首則毁銜竊轡之馬終身而不知不立門户則穿窬竊發之盜終身而不為法之于民常制其一而開其一制之者易見而開之者難防上下以智相勝而姦邪詭僞不可勝究故天下之人始忘其歡欣戴君之心而有怨怒忌上之仇故曰敗于啓民之邪心而多怨嗚呼夏之後為商商之後為周三代之治未甚相變也其治亂之迹未甚相逺也周亡而為秦天下大亂三王之治掃滅而無餘治世之迹卒不能復先王之絲毫而三代之俗遂以不見于後世何也夫法未極則俗之變未足夏商之法嘗若極矣然民未大厭也民有未厭之心則其淳氣美質猶有存者周之法詳矣不可以復加其俗之變已窮而民之姦心邪態靡不畢出其智備其質盡其惡足其美殫故周之亡而不可復為矣此聖人所以深悲之而曰周人之末瀆神而貴爵刑罰窮矣此後所以為秦也歟論法中古之有天下者必得于紛爭放亂之後夫人之情出于亂亡之後則其情苦而思安夫惟其情苦而思安故其事簡而易教夫下有易教之俗則上無難立之法故有國家者其初下常綏靜而易治安平之日久而民之侈心生嗜欲之動無窮而罪過繁故居其上者乃始日夜補完其缺敗而調伏其崛彊曲為之防多為之制法度繁興刑政畢舉文勝而質不足名美而實不稱故大抵有國者中世以後天下之事常多而國家之觀美益泯民之過日滋而有司之文加備而世之惑者以謂能完上世之不足而務求前人之所未成以為成功而不知其不若使上世之質未散而前人之朴常在也天下之物其勢相激而後變生焉觀美者實之所由亡文備者僞之所自起蓋嘗以漢之事考之髙祖取天下於秦民出于百戰夷傷之餘父子兄弟僅相保聚以安其生故其氣帖然靜願而少事而髙祖文景得以畫一之法羈縻而安輯之歷數世而天下安妥內有大亂而豪傑不作此民淳而法簡之效也至于武宣天下之勢久習于無事民意日縱豪俠盜賊稍起于里閭而二帝乃修明制度收納天下之才講政備物以與天下戰于才智之中才者奮而姦者隨之强者勝而亂者因之紛紛籍籍以傳于不肖之子孫而漢以大壞此則事衆而法備之弊也故天下之難治不在于創始鹵莽之初而常在于積安大備之後是故君子必觀其兆而審其宜解其甚而不激其變使其勢不為周人之已甚而務使後世可以有加嗚呼其本果安在哉蓋天下之弊好極治者必召天下之大亂務窮利者必貽天下之大害汙尊而抔飲蕢桴而土鼓天下之人苟未厭其為禮樂也則吾之禮樂雖足以備天下聲容藏而勿陳可也搆巢營窟之居衣薪不封之葬天下之人苟未失其為生死之所安也則我之制度雖足以建九筵之堂五稱之衣棄而不用可也不亂則已不必邀其敬不欺則已不必盡其忠是謂不求備于民矣可久之道起于不求備而效于人不厭譬之萬金之家責之千金其力亦足以供我之求然吾日取一金焉于是有不得已而取之百金彼猶樂輸而不怨何則彼惟所有者未竭而不厭故也故禮樂刑政之設于下使民有未厭之意則後世有作者得以復加焉故其弊也可以有救而不至于術窮智竭而無繼嗚呼惑者徒見法度密而民不化文理具而功不立日夜從而加之嗚呼亦失其本矣天下之勢不可以激而民之智不可窮激之以所欲者必得其所不欲窮之以所能者必報之以其所不能徐導其欲激之勢而不扶其未用之智則天下可以久安而無虞然則周人其未足以知此歟彼或者遭其㑹而有不得已焉故也論法下鳴呼治天下之難也其為物也大而難舉其為情也雜而不類為之不得其要用之不中其節用力勞而功不成是故聖人本諸道而明于術凡吾所以為術者制物以使入於吾之道也然則何其不直致吾之所欲而為是委曲紆緩而使之從也夫人之情使之從我而劫之以刑則成功難隂有以役其心使之不得不從我則成功易今夫欲天下之畏也而陳之以刀鋸欲天下之愛也而陳之以金帛此直致其畏愛者也夫刑戮賞賜非不足以立畏愛也使必陳其物設其具則刀鋸玉帛亦不給矣且天下固有不愛金帛之賞者則賞之所不能悅也天下有不畏刀鋸之刑者則刑之所不能懼也故欲求吾欲而直遂焉者其事煩其教粗吾與物以力相勝而物之從之也內有不服之心而吾力之所不周者亂之所從起夫駟馬之于車也奔驟舒遲至難齊也夫人之于馬必待夫躬臨之而後如意耶則一車而四馭未能也今以一御而四馬之遲速惟十指之聽者以我所執者轡也以一轡之約制四馬之節者執馬之要雖欲不我聽而不可得也是先王之所以役天下者執天下之轡也今夫橋衡之舉水也右仰則左俯左抑則右揚夫曷不欲俯則卑之而仰者何與焉欲揚則舉之而抑者何與焉夫惟卑者有不能使之卑而後仰者用也舉者有不能使之舉而後抑者用也先王知天下之卑髙有不可以形為也故其為所以卑髙者而不為具形古之知是道者執天下之所必從者如轡而制物理之必應者如衡四凶天下之巨蠧也商容比干箕子商之望也舜能使天下不犯于有司而度罪之不可以盡刑也取天下之巨蠧者而擊之天下雖有悍强不化者知所畏矣舜非徒能施刀鋸也能沮其不畏之情也武王得商而善者未可盡賞也取世之望者三人而尊禮之而商之為善者恱矣夫武王非徒知尊賢能也能動其說我之心也故舜武王執天下之轡者也昔梁惠王以利問孟子而孟子非之然其終曰未有仁而遺其親者也未有義而後其君者也何必曰利夫使不遺其親不後其君利之大者也梁惠王以為利而孟子非之何也孟子者以謂不求不遺于民而後民守之不求不後于民而後民先之彼以利而責望于民則民散而惟利之從而卒不獲吾之所求梁惠王之術踈而孟子之術精梁惠王之事拙而孟子之事微老子之道拙術者也其言曰將欲翕之必固張之將欲取之必固與之又曰非以其無私耶故能成其私夫將翕之而合之將取而奪之行其私以成其私是以暑徴暑以寒致寒隂陽之所不能為也天之將寒也不以霜雪為之也金石烈土山焦者所以為今日之霜雪也天之將暑也不以蒸鬱為之也震風積雪者所以為今日之炎烈也故邀其及物之功不能逺守其復物之情不能復故孟子之術低昂天下之衡者也夫術有小大道有邪正天下之士徒見夫世之淺人執小術踽邪徑而流於譎詐之域而曰聖人無術直道而已矣嗚呼亦惑矣聖人之所謂直道非無術之言也過乎術者之言也故其道平易而有成惑者之所謂直道不及乎術者之言也故其道踈魯而多敗文王以仁義而王宋襄公以仁義而亡均為仁義而存亡異何也烏獲之力弛而不用遇盜而三揖之則盜知服矣無烏獲之力遇盜而揖焉則死矣文王過乎術者也宋襄公不及乎術者也而况乎聖人之未必不出乎術也本治論上治天下之道有歷萬世而可知者有朝不可以知夕者自三代以來至于今蓋已數千百年事勢之變雜出而不可期然而如是而為仁如是而為義得之則安失之則危者未始有改也此雖萬世而吾能知之者也雖然仁與義者我能知之其所以為仁義者吾不能必也今天下之所謂仁義者有生之而為仁亦有殺之而為仁有刑之而為義亦有宥之而為義彼聖人之治天下其可必者我之所為未有出于不仁不義者而已矣必將求其所以致仁義之迹則雖聖智我知其不能前知夫天下之事未始一也循之則弊激之則變反復相代而不可知今夫質之與文是無以異于氷炭之不可同也然質之弊則文必至是何也勢之所激故也故隂極不生隂而生陽寒極不生寒而生暑故物有以同相戾有以異相使此之謂激之而變者也彼先王之法其初固未嘗不善也而至于後世而不能行何也循之故也譬之水也决之而注于海則有所避有所就縱橫委曲而不可一而後海可至也有賤丈夫焉不知其為如此以謂水出于西則决而西水出于東則導而東當避而不知避當就而不知就則力可竭而海不可至也夫聖人之法何為而立也無乃出于此時去矣而法不改則雖聖人之法有所不能為區區而循之堅守而不變時日益異而吾方倀倀然抱已陳無用之物而求施之則亦何施而可哉此所謂循之而弊者也惟其循之而弊是故隨其所激而變從之天下之事如此而不可一也而世之惑者猶將舉腐餘已棄之空文而求為之無乃已踈乎凡此者朝不可以知夕者也治天下者必求至于仁義而無禍猶治身者必求至于安樂而無疾也夫求安樂而無疾則必察夫寒暑之動而為之應故狐貉以御冬而絺葛以去暑凡晦明燥濕之變吾皆有以制之而我初不能自必夫如是而後安樂可為也寒而為裘暑而不易暑而御葛寒而不變如是則疾而死耳尚何安逸之有哉嗚呼知此而後可以語治天下也本治論下或曰三代以來天下之未大治豈非天下之勢有不便歟嗚呼是未達夫變者之論也且天下之勢果何為而起也方三代之時列而諸侯為自王畿之外皆侯國也當其盛也藩翰屏蔽而王室以之彊及其衰也分裂四出更為雄彊而不可制而後天下之勢合于一而秦始為郡縣一收天下之權而其弊也天子孤立于上匹夫橫行而莫之禁至于漢而天下之勢雖或不同然當其改也必有所懲當其立也必有所利蓋自唐之末始有藩鎮之彊而唐以亡歷五代而不能改至于今而藩鎮之禍遂大去而不復今天下之勢委于守令而分于監司總于朝廷自三代以來至于今何其屢改而不一耶其無乃出于有所激歟故堯舜之不得不為諸侯猶今之不得不為郡縣也故兩出于不得不為則勢者因有所定而不可變故天下之政有是非而天下之勢無可否譬如人之自少而之壯自壯而之老也夫三者固未始同而各有所養亦各有所樂茍不知所以待老之具而必曰壯而後可則惑矣按今之勢而善為之其誰曰不可而必曰唐虞三代之勢而後可則天下卒不可得而治也然則三代以來其難于治者其病果安在哉蓋有二說一曰尚虛名而忘實利二曰謹小過而失大患何謂虛名好堯舜三代之名是也世之學者圜坐而議政未有不曰唐虞三代者也其言當時之病未有不曰不如唐虞三代者也夫唐虞三代之法豈誠有所不足哉時易而事遷世變而勢異譬之鑄金琢玉以為飲食雖美而無所用之矣有一人焉强立而不顧則必羣笑而競排之以謂臆說而不學而不知吾之于堯舜三代固相期于仁義之地而吾何求其名哉蓋昔夏為貢法以取其民至商而為助孟子曰莫善于助莫不善于貢嗚呼使世之惑者必曰禹之法豈有不善哉而不知夫末世之利聖人不能預為而已去之時聖人不能强至也嗚呼使堯舜三代之聖人復出于今而反顧當時之所為余知其必不復為之矣故夫天下之不治未始不自好名始也昔日王莽之井田後周之周官房琯之車戰嘗試之矣譬如病狂喪心之人越行妄作而不顧是果何益哉此之謂好虛名而忘實利者也何謂小過夫世之人有好種植者一日種之一日溉之一日培之朝俟其長夕伺其蕃一日百至而不倦是其愛之亦至矣然木不加盛而日槁又有一人焉既植而去之行三年而返而木之大可拱矣是何也凡物之性不擾則樂而滋數治則殘而槁且秦之吏比漢之初則勤矣逺邦小邦之民其知秦之政令則熟矣秦之命令布于田野閭里之間者亦至矣而民益怨苦而漢初之吏雖不如秦之勤而民樂之何則秦之所急者不過簿書文法之間謹嚴其細而勞擾之民固已不勝其弊矣此無以異于愛木而日擾也彼漢之初雖號為文濶而網踈然不過少弛于簿書期㑹纎悉委曲之間而民乃不至于勞擾則何怪乎天下之治哉彼一溉一培之失時于木之性未害也彼不求政之所病而乃尤天下之勢嗚呼其亦不知治本哉法制論昔者聖人之立法告天下以其意而已故常立其大防而其節目委曲所以施于事者聽夫人之自為而不求其一切先立于我是故法立而意行意行而利至蓋天下之事繁細瑣屑其情狀變故不可以一致以吾一人區區之聰明而先為之經畫于此而使之一從于我則事將有格而不得成者夫其勢不可以有成而必求行焉則物有受其弊者矣天下之法常壞于此而世之惑者未之或知也今夫世之敢戰者其為行列什伍亦不過數者而已彼豈不欲盡歟勢有所不可也何則敵人之智百出而不可測而我安能委曲而預測之耶必曰如是而後勝如是而後敗其委曲瑣屑一切先為之所使無顧於敵者之何如而惟我之為聽夫如是則必敗而已矣善教人者曉之以其道而不示以其事故告天下使無違吾意則其委曲瑣屑雖小不盡而吾之意猶在也嗚呼三代之聖人其聰明聖智足以深見天下之賾隱然其制法也亦何以異於此欲均天下之田而為之井田欲分天下之地而為之諸侯九夫為井人得百畝而耕之使夫大之不得以兼小彊之不得以并弱而後又為溝洫之制自一夫而積之至于萬夫公之地方五百里而男之地方百里使之大小有序而又列為九服之逺近夫分田建國之法如是而已矣夫天下之地髙卑之不齊廣狹之不一水泉畎畝之差殊與夫名山大川汙池藪澤之地常居十五則亦安能較然如畫於一枰之上哉彼聖人之法不為之纎悉瑣屑以盡之而特設其大端而已何也蓋聖人之告天下者特其意而已蓋當是時公卿凡當其職者皆得出其智以盡天下之變因規而為之規因矩而為之矩使之各稱其宜而不亂是以天子恭已優游於上而所以均齊天下之理亦莫不如意而天下安享其利人人皆得措手足於其中初若莫可據依而吾之法卒立乎天下此先王之所以有所動作而天下樂之雖天下之大事而為之無難者也不善為法者則不然窮析天下之理於一身之聰明持區區目前之智而斷萬里未來之勢故其法不患於不詳而天下卒不能行而不知其患乃出於好詳是故善用法者有違法無違意不善用法者有違意無違法法可違也意不可違也夫天下之情常樂於有所為而困於齟齬而不得放夫使人人足以自致而其終不失我之所欲則亦足矣何必區區乎使之從我而後可也治原論昔者堯舜三代之時天子拱已優游於上至於無為不言而天下向風百官有司夙夜以治職赴功而天下之務無有不成及其至也至廣之於人至幽之於神山川草木之無情天地隂陽之不測皆能制其動靜而導其和時其消息而治其變不至者能格之不順者能柔之蓋非特辨目前正人事茍為治安而已天地之功而與有力焉鬼神之造而與有制焉故堯舜三代之治至於匹夫匹婦皆有仁人君子之風者非過論也所至者然也九官之治莫不為萬世法蓋嘗更數聖人而莫之或加矣何則彼之所建立者極天下之理者也嗚呼自堯舜三代以來更秦漢數千載世之君子有意於治者仰望先王之時而俯視後世之莫及也咨嗟嘆息以謂卒不可至者衆矣蓋亦不原其本甚矣天下之理在我者有所不修而物無不可治立誠者有所不至而俗無不可善先王之時公卿大夫修身以裕格物而至精神以治職不過是二道而已嘗試言之君子之道至於言出而物應事舉而人喻者君子之末節而非其至也必也不言而物從泯事而人勸心正於內身修於外天下化之而不知所以化者君子之盛也故曰所過者化所存者神夫人之情不可誣也言之有不應者矣諭之有不勸者矣去言屏事而天下治者何也吾身之修故也吾身之所以能修者何也吾之誠立故也吾誠之所以能立者何也吾之性盡故也能盡性則能立誠能立誠則能修身能修身而後能正物蓋正物以迹者功淺而有窮故聲不能使聾者聽色不能使瞽者視彼其所及者盡其迹之所至者耳迹之所不至雖近而不感何則力治其外而無以鼓舞其內故也夫惟至誠積於心發於身其聲不待言其象不待事故其及物也得吾之所不期者焉譬之日月也日月之為光非期於辨是物也然日月無勞於上而天下之物茍有形者皆效其影於前枉直大小纎悉必察而日月豈固與是物辨哉譬之江海也注渟潤澤者吾之事固若是而已其于生物未數數然凡在吾澤之所及者槁者滋瘠者充而江海豈固澤是物哉故日月不期於明而明之所及者不能逃江海不期於潤而澤之所被者不能外君子修身立誠於上則其道大而化之矣凡物之在吾化者亦莫能逃養者自遂枉者自正未嘗怒也而惡者悛未嘗喜也而善者勸悠然使萬物莫不得其職而我初未嘗與物期也堯舜三代之治其能格物若此者何也修身之功也古之君子其治職也不恥有所不能而所能恥其不盡不恥有所不學而所學恥其不成王良之不能射不恥也車不正馬不順則恥之矣羿之不能御羿不恥也射而不能中則恥之矣故先王之因任也因能以授之而人之受之也無喜心則我之所當處也無侈慮何則終身由之猶懼其不能何暇外慕哉且物之在天下者人無不可為也有形之與無形有情之與無情至大而至毫釐至顯而至鬼神其初皆物也其動一至其事一理然判而别之使不相為異而絶之使不相通非其理然也世之淺術末智者不能盡其理之所通則其物也有所窒矣智之所窒者術之窮術窮於其智而天下無能事矣龍之為物世之所神而不可見者也然其初豢而御之也何以異於馬牛使人神之而不可見也非龍為之也人之智不足以致之而自絶之也故曰人實不智非龍實智天下之事舉何以異是哉先王之官其能致物者皆如龍也後世仰望而不可得者皆如以龍為神而不可見者也故先王之臣不求多能而能極其能修其官治其事有毫釐之不知則且以為辱矣夜以思之朝以行之父以是傳之子子以是傳之孫索之以極其微鉤之而窮其深是以百官皆修其方而能致其物凡在天地之間吾之力無有不能為者焉故善治者役物而不善治者役於物役物者物制於我故可慘可舒可翕可闢吾所欲致者物聽命焉役於物者聽命於物而我不能制故其緩也或急之其行也或止之惟物之所為而已故堯舜三代之官所以能治職而後世莫及者致精之功也嗚呼三代之政既亡刑名刻薄而為秦王霸雜揉而為漢天下之士知學者鮮矣雖或學焉得其正者亦鮮矣汙其身而望人以潔枉其身而望人以直何怪乎應者之不如其欲也官設於上而人覬於下不能其事而貪其名職廢於朝而咎不及其身敗其官而公冒其祿何怪乎物之不順令而至故身不修誠不充則雖有善教而民不從聾者之言宫商瞽者之言黑白聽者笑之矣何望其信之也何則彼言之者非其任矣人有樂進之心而殆其事與殆其事而不任其恥則是牛羊瘠而牧者無罪也幾何其牛羊之不盡斃矣身不修則妻妾違之一國一邑之衆而望其不我違也難矣學奕而志鴻鵠猶不足以勝其偶欲以滅裂之誠而成天下之務也亦難矣故秦漢不如三代也失其本矣故正學以修身明恥以致精而庶乎先王之治也天下之學有小大有本末隆其大建其本而使小者末者從之而後學之道正矣顔子之好學學其本也子游子夏之文學學其末也後世儒者非不務修身也惟其學者不知其本而趨其末先其文而後其實是以儒者接踵於上而無補於天下之治亂楊綰唐之君子也其望聖人也亦逺矣然綰至誠能儉而已一致其誠於儉而為相之日天下化之宿將大臣為之悛萃而不終日綰之學未必皆知本也獨於儉則有本矣有本之效至於如是之速則天下之不吾聽豈非士之修身本未立歟故格物在立本立本在修身修身在致誠致誠在盡性盡性在正學正學在乎隆本以抑末然後教化以行之勸沮以厲之官師以涖之而後所隆者人勸所沮者人畏此先王隆本抑末之政也將明恥者有道無隆人之所重無卑人之所輕均天下之事於一域而榮其能辱其不能則士有恥矣人之所輕而卑之則人恥習之矣人恥習之望其不能而知恥不可得也人之所重而隆之則事有輕且賤者矣使人恥賤而羞卑者未有不自此始也禹為相而䕫為樂工伯夷典禮而臯陶治囚論其所處則有貴賤精粗矣而舜之於數人者未嘗有輕重之别也均為朝廷之事耳是數人者知恥其職之不修而已不聞其有精粗貴賤之間其心也天下未嘗無竒才異能之士也惟其心侈大而不肯自守於一隅治職者不恥職之不修執技者不羞技之不工是天下之事卒以汗漫而無成蓋鯀不能抑洪水而罪至於殛死羲和廢時亂日而刑至於征故罰不至則罪不彰罪不彰則恥不明故嚴不職之刑者先王明恥之道也故正學明恥而先王之治其庶乎可為矣至誠論昔先王之為天下非徒為政刑以齊天下之民苟為無事而已也必有禮樂以成之禮行而天下無違俗樂作而萬物無邪心無違俗故恭遜孝悌行於匹夫匹婦之愚無邪心故蕃阜和樂至於昆蟲草木之細至於如此而後天下大治純被而無有可間矣先王之為是禮樂者豈與後世異哉其存乎形名見乎度數者典之有司著之文字雖歷千百年可考也舜之大韶周之衰猶能奏也三代之車服老師宿儒能說也後世之君曷嘗不舉先王之禮樂以施之宗廟朝廷哉然而先王用之而能治寓意於迹迹修而意行示教於物物陳而教達後世之君能用之而不能化能舉之而不能治迹修矣而人不化其意物陳矣而下不諭其教是何說也誠與不誠異也先王之為禮樂豈以為備故事修文物而已哉其心之於禮樂既已誠矣操至誠無間之心於內則其動於外也心之所存必能發之於器器之所示必能致之於物故人望其齊莊恭肅之容而無慢心聞其和豫雅正之音而無邪氣夫豈特容與聲之所能為哉其誠之所動物雖欲不感不可得也故物之於誠不能逃也立誠於此物遭而不化者非物之罪也是其中必有不足者矣物之化於誠猶氷雪之消於火火至矣而冰雪不息者非冰雪能拒之也其炎有不足故也故誠薄於此而求物之應不可得也誠至而物欲不從亦不可得也宗廟之間不恭而肅墟墓之間不哭而哀堯舜之政不令而從以夫在此者不欺故也後世之為禮樂者其心之於禮樂既已判然為兩矣舉是物曰此為禮也奏是音曰此為樂也心之所存不在器器之所作非其誠故禮樂之動也如偶人焉有其形而無其神如象龍焉有其似而無其威夫禮之為容樂之為聲譬之人則其形譬之龍則其象也至誠以主之者先王所以為其神與威也夫人不畏人之形而畏人之神不畏龍之象而畏龍之威神是而畏威加焉則何怪乎見者之變哉內無至誠無間之心而特備禮樂之聲容何以異偶人象龍以求人之畏之也故三代之亡歷數千百年而禮樂之效卒不如先王之時者豈其刑名度數不足之罪哉所以行之者其誠與昔之人異矣故曰熊渠子夜行見寢石以為伏虎張弓而射之滅矢飲羽下視而知其為石也却復射之矢摧無迹弓矢未改也石猶是也而一中一否者所為射之心不同故也而衰世之士方且區區於綴緝先王之道文補完經師之故說掩卷長息而傷禮樂之不明嗚呼是亦愚矣心誠恭歟酌水而獻之見者不敢慢矣先王之禮其在後世者未少也心誠正歟撡弦而鼓之聽者肅然矣先王之樂其在後世者尚多也故不取之心而求之物欲望禮樂如先王之時何可得哉昔者子思為中庸之說以導孔子之意始之於天命之謂性而其本一言以盡之曰誠而已故曰誠者天之道也誠之者人之道也又曰惟天下至誠為能盡其性而卒於參天地贊化育夫君子為善豈以謂人以為此善也吾行之人以為彼惡也吾去之歟其心之於善也無有驅而納之者忽然自至矣於惡也無有畏而劫之者判然不為矣凡此者吾心之於善誠好之其於不善誠惡之故也心誠之而無隙則物不可得而間物不可得而間則心一一心以格物則物為之動物為之動則天地之逺化育之微鬼神之無形隂陽之不測吾從役之矣故傳之所載古之為禮樂者其能交鬼神致異物調寒燠而育動植者非髙論也至誠之說曰不見而章不動而變無為而成天地之道可一言而盡禮樂之本蓋出諸此而已矣宋文選卷二十四
