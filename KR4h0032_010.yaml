body:
  text: 宋文選巻十王介甫文禮樂論氣之所禀命者心也視之能必見聴之能必聞行之能必至思之能必得是誠之所至也不聴而聰不視而明不思而得不行而至是性之所固有而神之所自生也盡心盡誠者之所至也故誠之所以能不測者性也賢者盡誠以立性者也聖人盡性以至誠者也神生于性性生于誠誠生于心心生于氣氣生于形形者有生之本故養生在于保形充形在于育氣養氣在于寧心寧心在于致誠養誠在于盡性不盡性不足以養生能盡性者至誠者也能至誠者寧心者也能寧心者養氣者也能養氣者保形者也能保形者養生者也不養生不足以盡性也生與性之相為因循志之與氣相為表裏也生渾則蔽性性渾則蔽生猶志壹則動氣氣壹則動志也先王知其然是故體天下之性而為之禮和天下之性而為之樂禮者天下之中經樂者天下之中和禮樂者先王所以養人之神正人氣而歸正性也是故大禮之極簡而無文大樂之極易而希聲簡易者先王建禮樂之本意也世之所重聖人之所輕世之所樂聖人之所悲非聖人之情與世人相反聖人内求世人外求内求者樂得其性外求者樂得其欲欲易發而性難知此情性之所以正反也衣食所以養人之形氣禮樂所以養人之性也禮反其所自始樂反其所自生吾于禮樂見聖人所貴其生者至矣世俗之言曰養生非君子之事是未知先王建禮樂之意也養生以為仁保氣以為義去情却欲以盡天下之性修神致明以趨聖人之域聖人之言莫大顔淵之問非禮勿視非禮勿聴非禮勿言非禮勿動則仁之道亦不逺也耳非取人而後聰目非取人而後視口非取諸人而後言也身非取諸人而後動也其守至約其取至近有心有形者皆有之也然而顔子且猶病之何也盖人之道莫大于此非禮勿聴非謂掩耳而避之天下之物不足以干吾之聰也非禮勿視非謂掩目而避之天下之物不足以亂吾之明也非禮勿言非謂止口而無言也天下之物不足以易吾之辭也非禮勿動非謂止其躬而不動天下之物不足以干吾之氣也天下之物豈特形骸自為哉其所由来盖㣲矣不聴之時有先聰焉不視之時有先明焉不言之時有先言焉不動之時有先動焉聖人之門惟顔子可以當斯語矣是故非耳以為聰而不知所以聰者不足以盡天下之聴非目以為明而不知所以明者不足以盡天下之視聰明者耳目之所能為而所以聰明者非耳目之所能為也是故待鐘鼓而後樂者非深于樂者也待玉帛而後恭者非深于禮者也簣桴土鼓而樂之道備矣燔黍捭豚汙尊抔飲禮既備矣然大裘無文大輅無飾聖人獨以其事之所貴者何也所以明禮樂之本也故曰禮之近人情非其至者也曽子謂孟敬子君子之所貴乎道者三動容貎斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣籩豆之事則有司存觀此言也曽子而不知道也則可使曽子而為知道則道不違乎言貎辭氣之間何待于外哉是故古之人目擊而道已存不言而意已傳不賞而人自勸不罰而人自畏莫不由此也是故先王之道可以傳諸言效諸行者皆其法度刑政而非神明之用也易曰神而明之存乎其人黙而成之不言而信存乎徳行去情却欲而神明生矣修神致明而物自成矣是故君子之道鮮矣齋明其心清明其徳則天地之間所有之物皆自至矣君子之守至約而其至也廣其取至近而其應也逺易曰擬之而後言議之而後動擬議以成其變化變化之應天人之極致也是以書言天人之道莫大于洪範洪範之言天人之道莫大于貎言視聴思大哉聖人獨見之理傳心之言乎儲精晦息而通神明君子之所不至者三不失色于人不失口于人不失足于人不失色者容貎精也不失口者語黙精也不失足者行止精也君子之道也語其大則天地不足容也語其小則不見秋毫之末語其強則天下莫能敵也語其約則不能致博記聖人之遺言曰大禮與天地同節大樂與天地同和盖言性也大禮性之中大樂性之和中和之情通乎神明故聖人儲精九重儀鳳凰修五事而關隂陽是天地位而三光明四時行而萬物和詩曰鶴鳴于九臯聲聞于天故孟子曰吾善養吾浩然之氣充塞乎天地之間揚子曰貎言視聴思性所有潛天而天潛地而地也嗚呼禮樂之意不傳久矣天下之言養生修性者歸于浮屠老子而已浮屠老子之說行而天下為禮樂者獨以順流俗而已夫使天下之人驅禮樂之文以順流俗為事欲成治其國家者此梁晉之君所以取敗之禍也然而世非知之也者何耶特禮樂之意大而難知老子之言近而易輕聖人之道得諸己從容人事之間而不離其類焉浮屠直空虚窮苦絶迹山林之間然後足以善其身而已由是觀之聖人之與釋老其逺近難易可知也是故賞與古人同而勸不同罰與古人同而威不同仁與古人同而愛不同智與古人同而識不同言與古人同而信不同同者道也不同者心也易曰苟非其人道不虚行昔宓子賤為單父宰單父之人化焉今王公大人有堯舜伊尹之勢而無子賤一邑之功者得非學術素淺而道未明歟夫天下之人非不勇為聖人之道為聖人之道者時務速售諸人以為進取之階今夫進取之道譬諸鉤索物耳幸而多得其數則行為王公大人若不幸而少得其數則裂逢掖之衣為商賈矣由是觀之王公大人同商賈之得志者也此之謂學術淺而道不明由此觀之得志而居人之上復治聖人之道而不捨焉幾人矣内有好愛之容蠱其心外有便嬖之諛驕其志向之所能者日已忘矣今之所好者日已至矣孔子曰有顔回者好學不遷怒不貳過又吾見其進未見其止也夫顔子之所學者非世人之所學不遷怒者求諸己不貳過者見不善之端而止之也世之人所謂退顔子之所謂進也人之所謂益顔子之所謂損也易曰損先難而後獲顔子之謂也耳損于聲目損于色口損于言身損于動非先難歟及其至也耳無不聞目無不見言無不信動無不服非後得歟是故君子之學始如愚人焉如童䝉焉及其至也天地不足大人物不足多鬼神不足為隠諸子之支離不足惑也是故天至髙也日月星辰隂陽之氣可端䇿而數也地至大也山川丘陵萬物之形人之常産可指籍而定也是故星厯之數天地之法人物之所皆前世致精好學聖人者之所建也後世之人守其成法而安能知其始焉傳曰百工之事皆聖人作此之謂也故古之人言道者莫先于天地言天地者莫先于身言身者莫先于性言性者莫先於精精者天之所以髙地之所以厚聖人所以配之故御人莫不盡能而造父獨得之非車馬之不同造父精之也射人莫不盡能而羿獨得之非弓矢之不同羿精之也今之人與古之人一也然而用之則二也造父用之以為御羿用之以為射盗蹠用之以為賊性論古之善言性者莫如仲尼仲尼聖之粹者也仲尼而下莫如子思子思學仲尼者也其次莫如孟軻孟軻學子思者也仲尼之言載于語子思孟軻之言著于中庸而明于七篇然而世之學者見一聖二賢性善之說終不能一而信之者何也豈非惑于語所謂上智下愚之說歟噫以一聖二賢之心而求之則性歸于善而已矣其所謂愚智不移者才也非性也性者五常之謂也才者智愚昏明之品也欲明其才品則孔子所謂唯上智與下愚不移之說是也欲明其性則孔子所謂性相近習相逺中庸所謂率性之謂道孟子所謂人無有不善之說是也夫有性有才之分何也曰性者生之質也五常是也雖上智與下愚均有之矣盖上智得之之全而下愚得之之微也夫人生之有五常也猶水之趨乎下而木之漸乎上也謂上智者有之而下愚者無之惑矣或曰所謂上智得之之全而下愚得之之㣲何也曰仲尼所謂生而知之子思所謂自誠而明孟子所謂堯舜先得我心之所同此上智也得之之全者也仲尼所謂困而學之子思所謂勉強而行之孟子所謂泰山之于丘垤河海之于行潦此下愚也得之之微者也曰然則聖人謂其不移何也曰謂其才之有大小而識之有昏明也至小者不可強而為大至昏者不可強而為明非謂其性之異也夫性猶水也江河之與畎澮小大雖異而其趨于下同也性猶木也楩楠之與樗櫟長短雖異而其漸于上同也智而至于極上愚而至于極下其昏明雖異然其于惻隠羞惡是非辭讓之端則同矣故曰仲尼子思孟軻之言有才性之異而荀卿亂之揚雄韓愈惑乎上智下愚之說混才與性而言之性命論天授諸人則曰命人受諸天則曰性性命之理甚逺且異也故曰保合太和各正性命是聖人必用其道以正天下之命也然命有貴賤乎曰有有夀短乎曰有故賢者貴不賢者賤其貴賤之命正也抑貴無功而賤碩徳命其正乎無憾而夀以辜而短其夀短之命正也抑夀偷容而死非罪命其正乎故命行則正矣不行則不正是以堯舜四門無凶人而比屋可封焉此其行貴賤夀短之命于天下也降及文王興而棫樸之詩作則士不僥倖而貴賤之命正矣成王刑措而假樂之詩作則民不憾死而夀短之命正矣以至仁及草木而天下之命其不正乎其後幽王有聖人之勢而不稱以徳故君子見微而思古小人播惡而思髙位詩曰謀之其臧則具是違謀之不臧則具是依夫有徳者舉窮不徳者舉達則貴賤之命行乎哉抑小人進用而刑罰不當故惡有所容而善斯以戮詩曰此宜無罪女反收之彼宜有罪女覆脫之夫是善者殺不善者或生則夀短之命行乎哉此知命非聖人不行也去周之逺不盡明情深于性分出于命而有命授分定之說是以漢唐之治亦曰堯舜之治堯舜以君子知命小民知分漢唐之治亦以君子知命民不知分然曰命與分則同矣其所以知之則異豈㮣於振古乎振古聖人行于上者也所謂君子知命則侯奉上卿奉官士奉制没而後止夫然貴賤夀短未始不悉以禮義上下也漢唐則不然其間隂陽之術熾而運數之惑興䜟緯之說侵而報應之訛起其所謂命者非曰性命也則命授分定也所謂行命者非曰聖人也則曰冥有所符黙有所主也故朝耕漢壠暮踰三國之魏晨籍唐版夕歸五代之梁此不曰不臣不民而曰命授分定者豈不瞽惑乎哉然亦誰階之乎其階賞罰不當而徳眚無歸民厭其勢而一歸于命悲夫名實論上事有異同則情有順逆故好惡而毁譽不能已是名生于天下之好惡而成于天下之貴賤時之所好果是也歟時之所惡果非也歟士不顧其傷志害徳隨物而上下故棄世之所惡而趨世之所好則天下貴之棄世之所好而趨時之所惡則天下賤之故曰不如鄉人之善者好之而不善者惡之是名生于好惡而好惡之情未嘗辨也是以近義則行何衆惡之足畏也逺義則止何衆好之能順也士有不得乎名則不急乎為善故名雖髙于其鄉而行不信于友立其朝而忠不盡于君是以不實之弊其所以有者也然得名而行于世則所惡而安闕故以名為事者身樂而意放此名出于人之所甚欲而得之不辭也是好名必求勝必用強好名則諱過而善不進求勝則幸人之不及而徒欲以自見也用強則過惟恐在已而善惟恐在人若然則爭能忌才之士並處于世而更為強弱嗟夫求名所以自厚適所以自薄好勝所以自髙乃所以自下以身狥物則内輕而外重非自薄歟信已不足而求人之必信非自下歟如能潔其身則全其内行其志而不求于外天下歸之不為恱天下去之不為憾顧天下或違或從盖無有已又奚毁之可加而得喪之存懐也故士無守名之累者所以得其實然勢不行法不立賢者少而不肖者多紛綸擾攘布處天下強者自其已強而樂其善弱者困于已弱而人樂其有過此人情之至惡因其疑心而有不能以自盡君子于斯其可以不察乎况欲為治則以得人為先用人則以名實為本然名實之弊如此其可以苟取而不慎乎名實論中一鄉之人不能辨則可欺以言一國之人不能察則可欺以行天下之士不能知則可欺以名盖聴有所不能至則巧言勝俗有所不能識則偽行尊道有所不能明則虛名立然而巧言雖傳不中理則尚有可辨偽行雖固不中義則尚或可察名不得其實而欲得其偽則雖糜嵗月殫思慮有不能盡之者故名亂實而欲求其偽則先王于道未嘗存而不講于政未嘗存而不議也是亦無所苟而已然近世之士矜名而自是好髙而不能相下也不知自虚所以有取自下所以有得故道失而無求政荒而無問自知不審而志欲求問于人如販夫之售貨耕人之待穫其役物而失性要時而喪已有待于外也如此是可悲已古者明于自得而無所蔽故常反身而觀其實其能可以居卑方其居卑則勞而不怨有志可以用大方其用大則安而不矜故居卑者不愧勞用大者不易事逺近相維本末相應而天下之治畢舉斯盖名浮實則實不可以妄加多而不可以妄損故名徹于朝廷公卿大夫之間而士不遺于窮邦陋壤之逺得之無疑用之必稱其名非有以欺世也及至誠之道亡而天下苟于従事上無以得下之情下無以應上之實名譽髙則其詭譎愈多行愈降則其養偽文飾愈甚進退不以誠相懐利害不以情相收求欲之心多而及物之志寡故其任重則顛覆任輕則怨誹是四方之士其意莫不以天下自任之患也奈何隨而用之則有喪而無得彼皆欲為其大則将執一二為之小則天下功薄而不修業廢而不補盖好名之士衆而去取之計昏雖有可用之士莫得而見疑足以亂實也好髙而不適于用士雖有所取而恥事其已能而務為其所不至遂亦喪其所而效不立此其弊也然而才有餘而治其寡則事舉而功倍才無餘而專其多則智寡而易敗此好名無實必至之勢也今工伎力役猶有所不奪也以伎従利雖不售則不怨易業而相為事惜其業之不專而亡其勢之必取也故函人不以治弓矢陶人不以治輪輿巧有所偏智有所盡不以其所不習自名而欺世取名也以力事人者雖不用終不以其所不能而求役于人自信其能而有待也故善于御車者不善操舟習于用陸者不習于用川其致力各得其至而所趨相反所效不同也故名實不亂不如工伎力役然士之好名舉欲兼天下之能盡天下之務意欲與聖人並遊于世而爭相先後故天下恃名而不恃實求勝而不求義傲侮當世而無所憚尊隆自許而無所愧然而天下從之而公論滅矣是以軒冕爵禄不及善士而無天下無勸矯偽澆浮之風起而不可禦其為惑天下也有甚于此乎名實論下自古深患莫大于不智而輕與次之不智則天下用巧直道隠而至倫廢矣輕與則天下苟于妄合而幸于偶遇其俗浮而其行偷也是天下不明而名也亂實惟至智則不以理惑兼衆人之所不能明盡衆人之所不能察觀所舉則知所志審所守則知所用天下至隠之情無所施于上如此則何名之可加而何實之可誣然而智有所強而不能盡于物則其可取者益疏其可棄者益密是故偽起于動止之間而莫之察奸出于俯仰之近而莫之辨至使貪者託名以肆欲夸者託名以擅權辨者託名以行說暴者託名以殘物實不足而名有餘則其為患也如此事有不容于天下則大無過于盗國小無賤于盗貨然盗國之雄盗貨之強數旅之師可掩而獲匹夫有勇則擒而戮至于盗名之士則雖有萬乗之尊百里之封土不敢與為君師不敢與友貴無驕而禮無敢亢悻悻然嘗恐天下以失上而議已也故盗名之士無王公之尊命令之重而屈人之勢移人之俗盖善為竒言異行以為髙世獨立之人以驚駭愚俗之耳目是以合徒成羣而天下俗向責其效則官學不足以成業從政不足以經世然公卿大夫無以窺其非而國人士民無以措其議名出于人上而有以伏其心故也盖亦求名有獲則利亦隨至故志于禄則偽辭以養安志于進則偽退以要寵世之人不知求其心而徒得其跡則天下稱之而不衰彌久而彌盛使好名之俗成而比周黨起安坐而觀則莫知其志之所在雖安摧衆口之辨屈百家之知奚足以勝其衆破其偽故名者天下之至公而用之以至私偽者天下之至惡而處之以美故上失于任下失于所望故自古亂者無他因名以得人則治因名以失人則亂故不智而且輕與則名實相疑而不明則有以養天下之大患然則無實之譽其可使獨推于世而居物之先哉大人論孟子曰充實而有光輝之謂大大而化之之謂聖聖而不可知之之謂神夫此三者皆聖人之名而所以稱之之不同者所措異也由其道而言謂之神由其徳而言謂之聖由其事業而言謂之大人古之聖人其道未嘗不入于神而其所稱止乎聖人者以其道存乎虚無寂寞不可見之間苟存乎人則所謂徳也是以人之道雖神而不得以神自名名乎其徳而已夫神雖至矣不聖則不顯聖雖顯矣不大則不形故曰此三者皆聖人之名而所以稱之之不同者所指異也易曰蓍之徳圓而神卦之徳方以智夫易之為書聖人之道于是乎盡矣而稱卦以智不稱以神者以其存乎爻也存乎爻則道之用見于器而剛柔有所定之矣剛柔有所定之則非其所謂化也其易之道于乾為至而乾之盛莫盛于二五而二五之辭皆稱利見大人言二爻之相求也夫二爻之道豈不至于神矣乎而止稱大人者則所謂見于器而剛柔有所定爾盖剛柔有所定則聖人之事業也稱其事業以大人則其道之為神徳之為聖可知也孔子曰顯諸仁藏諸用鼓萬物而不與聖人同憂盛徳大業至矣哉此言神之所為也神之所為雖至而無所見于天下仁而後著用而後功聖人以此洗心退藏于密及其仁濟萬物而不窮用通萬世而不倦也則所謂聖矣故神之所為當在于盛徳大業徳則所謂聖業則所謂大也世盖有自為之道而未嘗知此者以為徳業之卑不足以為道道之至在于神耳于是棄徳業而不為夫為君子者皆棄徳業而不為則萬物何以得其生乎故孔子稱神而卒之以徳業之至以明其不可棄盖神之用在乎徳業之間則徳業之至可知矣故曰神非聖則不顯聖非大則不形此天地之全古人之大體也致一論萬物莫不有至理焉能精其理則聖人也精其理之道在乎致其一而已致其一則天下之物可以不思而得也易曰一致而百慮言百慮之歸乎一也苟能致一以精天下之理則可以入神矣既入于神則道之至也夫如是則無思無為寂然不動之時也雖然天下之事固有可思可為者則豈可以不通其故哉此聖人之所以又貴乎能致用者也致用之效始見乎安身盖天下之物莫親乎吾之身能利其用以安吾之身則無所往而不濟也無所往而不濟則徳其有不崇哉故易曰精義入神以致用利用安身以崇徳此道之序也孔子既已語道之序矣患乎學者之未明也于是又取于爻以喻焉非其所困而困非其所據而據不恥不仁不畏不義以小善為無益以小惡為無傷凡此皆非所以安身崇徳也苟欲安其身崇其徳莫若藏器于身待時而後動也故君子舉是兩端以明夫安身崇徳之道盖身之安不安徳之崇不崇莫不由此兩端而已身既安徳既崇則可以致用于天下之時也致用于天下者莫善于治不忘亂安不忘危莫不善乎徳薄而位尊智小而謀大孔子之舉此兩端又以明夫致用之道也盖用有利不利者亦莫不由此兩端而已夫身安徳崇而又能致用於天下則其事業可謂備也事業備而神有未窮者則又當學以窮神焉能窮神則知微知彰知柔知剛夫于微彰剛柔之際皆有以知之則道何以復加哉聖人之道至于是而已也且以顔子之賢而未足以及之則豈非道之至乎聖人之學至于此則其視天下之理皆致乎一則莫能以惑其心也故孔子收損之辭以明致一之道曰三人行則損一人一人行則得其友也夫危以動懼以語者豈有他哉不能致一以精天下之理故也故孔子舉益之辭以戒曰立心勿恒凶勿恒者盖不一也嗚呼語道之序則先精義而後崇徳及喻人以修之之道則先崇徳而後精義盖道之序則自精而至粗學之之道則自粗而至精此不易之理也夫不能精天下之義則不能入神矣不能入神則天下之義亦不可得而精也猶之人身之于崇徳也身不安則不能崇徳矣不能崇徳則身豈能安乎凡此宜若一而必兩言之者語其序而已也王覇論仁義禮信天下之達道而王霸之所同也夫王之與霸其所以用者則同而其所以名者則異何也盖其心異而已矣其心異則其事異其事異則其功異其功異則其名不得不異也王者之道其心非有求于天下也所以為仁義禮信者以為吾所當為而已矣以仁義禮信修其身而移之政則天下莫不化之也是故王者之治知為之于此而不知求之于彼而彼固以化矣霸者之道則不然其心未嘗仁也而患天下惡其不仁于是示之以仁其心未嘗義也而患天下惡其不義于是示之以義其于禮信亦若是而已矣是故霸者之心為利而假王者之道以示其所欲其有為也唯恐民之不見而天下之不聞也故曰其心異也齊桓公刧于曺沫之刄而許歸其地夫欲歸其地者非吾之心也許之者免死而已由王者之道則勿歸焉可也而桓公必歸之地晉文公伐原約三日而退三日而原不降由王者之道則雖待其降焉可也而文公必退其師盖欲其信示于民者也凡所謂仁義禮信亦無以異于此矣故曰其事異也王者之大若天地然天地無所勞于萬物而萬物各得其性萬物雖得其性而莫知其為天地之功也王者無所勞于天下而天下各得其治雖得其治然而莫知其為王者之徳也霸者之道則不然若世之恵人耳寒而與之衣飢而與之食民雖知吾之恵而吾之恵亦不能及夫廣也故曰其功異也夫王霸之道則異矣其用至誠以求其利而天下與之故王者之道雖不求利之所歸霸者之道不主于利然不假王者之事以接天下則天下孰與之哉禄隠論孔子叙逸民先伯夷叔齊而後栁下恵曰不降其志不辱其身伯夷叔齊也栁下恵降志辱身矣孟子叙三聖人者亦以伯夷居伊尹之前而揚子亦曰孔子髙餓顯下禄隠夫聖人之所言髙者是所取于人而所行于已者也所言下者是所非于人而所棄于已者也然而孔孟生于可避之世而未嘗避也盖其不合則去則可謂不降其志不辱其身矣至于揚子則吾竊有疑焉爾當王莽之亂雖鄉里自喜者知逺其辱而揚子親屈其體為其左右之臣豈君子固多能言而不能行乎抑亦有以處之非必出于此言乎曰聖賢之言行有所同而有所不必同不可以一端求也同者道也不同者迹也知所同而不知所不同非君子也夫君子豈固欲為此不同哉盖時不同則言行不得無不同唯其不同是所以同也如時不同而固欲為之同則其所同者迹也所不同者道也迹同于聖人而道不同則其為小人也孰禦哉世之士不知道之不可一迹也久矣聖賢之宗于道猶水之宗于海也水之流一曲焉一直焉未嘗同也至其宗于海則同矣聖賢之言行一伸焉一屈焉未嘗同也至其宗于道則同矣故水因地而曲直故能宗于海聖賢因時而屈伸故能宗于道孟子曰伯夷栁下恵聖人也百世之師也如其髙餓顯下禄隠而必其出于所髙則栁下恵安擬伯夷哉揚子曰塗雖曲而通諸夏則由諸川雖曲而通諸海則由諸盖言事雖曲而通諸道則亦君子所當同也由是而言之餓顯之髙禄隠之下皆迹矣豈足以求聖賢哉唯其能無係累于迹是以大過于人也如聖賢之道皆出于一而無權時之變則又何聖賢之足稱乎聖者知權之大者也賢者知權之小者也昔紂之時微子去之箕子為之奴比干諫而死此三人者同道也而其去就若此者盖亦所謂迹不必同矣易曰或出或處或黙或語言君子之無可無不可也使揚子寧不至于耽禄于弊時哉盖于時為不可去必去則揚子之所知亦已小矣取材論夫工人之為業也必先淬礪其器用掄度其材榦然後致力寡而用功得矣聖人之于國也必先遴柬其賢能練覈其名實然後任使逸而事以濟矣故取人之道世之急務也自古守文之君孰不有意于是哉然其間得人者有之失士者不能無焉稱職者有之謬舉者不能無焉必欲得人稱職不失士不謬舉宜如漢左雄所議諸生試家法文吏課牋奏為得矣所謂文吏者不徒苟尚文辭而已必也通古今習禮法天文人事政教更張然後施之職事則以詳平政體有大議論使以古今參之是也所謂諸生者不獨取訓習句讀而已必也習典禮明制度臣主威儀時政沿襲然後施之職事則以縁飾治道有大議論則以經術斷之是也以今凖古今之進士古之文吏也今之經學古之儒生也然其䇿進士則但以章句聲病苟尚文辭類皆小能者為之䇿經學者徒以記問為能不責大義類皆䝉鄙者能之使通才之人或見贅于時髙世之士或見排于俗故屬文者至相戒曰涉獵可為也誣豔可尚也于政事何為哉守經者曰傳寫可為也誦習可勤也于義理何取哉故其父兄朂其子弟師長朂其門人相為浮豔之作以追時好而取世資也何哉其取舍好尚如此所習不得不然也若此之類而當擢之職位歴之仕塗一旦國家有大議論立辟雍明堂損益禮制更著律令决讞疑獄彼惡能以詳平政體縁飾治道以古今參之以經術斷之哉是必唯唯而已文中子曰文乎文乎苟作云乎哉必也貫乎道學乎學乎博誦云乎哉必也濟乎義故才之不可苟取也久矣必若差别類能宜少依漢之牋奏家法之義䇿進士者若曰邦家之大計何先治人之要務何急政教之利害何大安邊之計䇿何出使之以時務之所宜言之不直以章句聲病累其心䇿經學者宜曰禮樂之損益何宜天地之變化何如禮器之制度何尚各傳經義以對不獨以記問傳寫為能然後署之甲乙以升黜之庶其取舍之鑑灼于目前是豈惡有用而事無用辭逸而就勞哉故學者不習無用之言則業専而修矣一心治道則習貫而入矣若此之類施之朝廷用之牧民何嚮而不利哉其他限年之議亦無取矣委任論人主以委任為難人臣以塞責為重任之重而責之重可也任之輕而責之重不可也愚無他識請以漢事明之髙祖之任人也可以任則任可以止則止至于一人之身才有長短取其長則不問其短情有忠偽信其忠則不疑其偽其意曰吾以其人長于某事而任之在他事雖短何害焉吾以其人忠于我心而任之在他人雖偽何害焉故蕭何刀筆之吏也委之關中無復西顧之憂陳平亡命之虜也出捐四萬餘金不問出入韓信輕猾之徒也與之百萬之衆而不疑是三子者豈素著忠名哉盖髙祖推已之心置于其心則他人不能離間而事以濟矣後世循髙祖則鮮有敗事不循則失故孝文雖愛鄧通猶逞申屠之志孝武不疑金霍終成天下大䇿當是時守文之盛者二君而已元成之後則不然雖有何武王嘉師丹之賢而脅于外戚豎宦之寵牽于帷嬙近習之制是以王道寖微而不免負謗于天下也中興之後唯世祖能馭大臣以冦鄧耿賈之徒為任職所以威名不減于髙祖至于為子孫慮則不然反以元成之後三公之任多脅于外戚豎宦帷嬙近習之人而致敗由是置三公之任而事歸臺閣以虚尊加之而已然而臺閣之臣位卑事冗無所統一而奪于衆多之口此其為脅于外戚豎宦帷嬙近習者愈矣至于治有不進水旱不時灾異或起則曰三公不能燮理隂陽而䇿免之甚者至于誅死豈不痛哉冲質之後桓靈之間因循以為故事雖有李固陳蕃之賢皆挫于閹寺之手其餘則希世用事全軀而已何政治之能立哉此所謂任輕責重之弊也噫常人之性有能有不能有忠有不忠知其能則任之重可也謂其忠則委之誠可也委之誠者人亦輸其誠任之重者人亦荷其重使上下之誠相照恩結于其心是豈禽息鳥視而不知荷恩盡力哉故曰不疑于物物亦誠焉且蘇秦不信天下為燕尾生此一蘇秦傾側數國之間于燕獨以然者誠燕君厚之之謂也故人君以狗彘畜人者人亦狗彘其行以國士待人者人亦國士自奮故曰常人之性有能有不能有忠有不忠顧人君待之之意何如耳三不欺論昔論者曰君任徳則下不忍欺君任察則下不能欺君任刑則下不敢欺而遂以徳察刑為次盖未之盡也此三人者之為政皆足以有取于聖人矣然未聞聖人為政之道也夫未聞聖人為政之道而足以有取于聖人者盖人得聖人之一端耳且子賤之政使人不忍欺古者任徳之君宜莫如堯也然而驩兜猶或以類舉于前則徳之使人不欺豈可獨任也哉子産之政使人不能欺夫君子可欺以其方故使畜魚而校人烹之然則察之使人不欺豈可獨任也哉西門豹之政使人不敢欺夫不及于徳而任刑以治是孔子所謂民免而無恥者也然則刑之使人不欺豈可獨任也哉故曰此三人者未聞聖人為政之道也然聖人之道有出此三者乎亦兼用之而已昔堯舜之時比屋之民皆足以封則民可謂不忍欺矣驩兜以丹朱稱于前曰嚚訟可乎則民可謂不能欺矣四罪而天下咸服則民可謂不敢欺矣故任徳則有不可化者任察則有不可用者任刑則有不可服者然則子賤之政無以正暴惡子産之政無以周隠微西門豹之政無以漸柔良然而三人者能以治者盖足以治小具而髙亂世耳使當堯舜之時所大治者則豈足用哉盖聖人之政仁足以使民不忍欺智足以使民不能欺勇足以使民不敢欺然後天下無或欺之者矣或曰刑亦足任以治乎曰所任者盖亦非專用之而足以治也豹治十二渠以利民至乎漢吏不能廢民以為西門君所為不從吏以廢也則豹之徳亦足以感于民心矣然則尚刑故曰任刑焉耳使無以懐之而唯刑之見則民豈得或不敢欺之哉三聖人論孟子曰可欲之謂善有諸已之謂信充實之謂美充實而有光輝之謂大大而化之之謂聖聖之為名道之極徳之至也非禮勿視非禮勿聴非禮勿言非禮勿動此大賢者之事也賢者之事如此則可謂備矣而猶未足以鑽聖人之堅仰聖人之髙以聖人觀之猶泰山之于岡陵河海之于陂澤然則聖人之事可知其大矣易曰與天地合其徳與日月合其明與鬼神合其吉凶此盖聖人之事也徳苟不足以合于天地明苟不足以合于日月吉凶苟不足以合于鬼神則非所謂聖人矣孟子論伯夷伊尹栁下恵皆曰聖人也而又曰伯夷隘栁下恵不恭隘與不恭君子不由也夫動言視聴苟有不合于禮者則不足以為大賢人而聖人之名非大賢人之所得擬也豈隘與不恭者所得僭哉盖聞聖人之言行不苟而已將以為天下法也昔者伊尹制其行于天下曰何事非君何使非民治亦進亂亦進而後世之士多不能求伊尹之心者由是多進而寡退苟得而害義此其流風末俗之弊也聖人患其弊於是伯夷出而矯之制其行于天下曰治則進亂則退非其君不事非其民不使而後世之士多不能求伯夷之心者由是多退而寡進過亷而復刻此其流風末世之弊也聖人又患其弊於是栁下恵出而矯之制其行于天下曰不羞汙君不辭小官遺逸而不怨阨窮而不憫而後世之士多不能求栁下恵之心者由是多汙而寡潔惡異而尚同此其流風末世之弊也此三人者因時之偏而救之非天下之中道也故久必弊至孔子之時三聖人之弊各極于天下矣故孔子集其行而制成法于天下曰可以速則速可以久則久可以仕則仕可以處則處然後聖人之道大具而無一偏之弊矣其所以大具而無弊者豈孔子一人之力哉四人者相為終始也故伯夷不清不足以救伊尹之弊栁下恵不和不足以救伯夷之弊聖人之所以能大過人者盖能以身救弊于天下耳如皆欲為孔子之行而忘天下之弊則惡在其為聖人哉是故使三人者當孔子之時則皆足以為孔子也然其所以為之清為之任為之和者時耳豈滯于此一端而已乎苟在于一端而已則不足以為賢人也豈孟子所謂聖人哉孟子之所謂隘與不恭君子不由者亦言其時爾且夏之道豈不美哉而殷人以為野殷之道豈不美哉而周人以為鬼所謂隘與不恭者何以異于是乎當孟子之時有教孟子枉尺直尋者有教孟子權以援天下者盖其俗有似于伊尹之弊時也是以孟子論是三人者必先伯夷亦所以矯天下之弊耳故曰聖人之言行豈苟而已将以為天下法也揚孟論賢之所以賢不肖之所以不肖莫非性也賢而尊榮夀考不肖而厄窮死喪莫非命也論者曰人之性善不肖之所以不肖者豈性也哉此學乎孟子之言性而不知孟子之指也又曰人為不為命也不肖而厄窮死喪豈命也哉此學乎揚子之言命而不知揚子之指也孟子之言性曰性善揚子之言性曰善惡混孟子之言命曰莫非命也揚子之言命曰人為不為命也孟揚之道未嘗不同二子之說非有異也此孔子所謂言豈一端而已各有所當者也孟子之所謂性者正性也揚子之所謂性者兼性之不正者言之也揚子之所謂命者正命也孟子之所謂命者兼命之不正者言之也夫人之生莫不有羞惡之性有人于此羞善行之不修惡善名之不立盡力乎善以充其羞惡之性則其為賢也孰禦哉此得乎性之正者而孟子之所謂性也有人于此羞利之不厚惡利之不多盡力乎利以充羞惡之性則其為不肖也孰禦哉此得乎性之不正者而揚子之兼所謂性者也有人于此才可以賤而賤罪可以死而死是人之所自為也此得乎命之不正者而孟子之所兼謂命者也有人于此才可以貴而賤徳可以生而死是非人之所為也此得乎命之正者而揚子之所謂命也今夫羞利之不厚惡利之不多盡力乎利而至乎不肖則揚子豈以謂人之性而不以罪其人哉亦必惡其失性之正也才可以賤而賤罪可以死而死則孟子豈以謂人之命而不以罪其人哉亦必惡其失命之正也孟子曰口之於味也目之於色也耳之於聲也鼻之於臭也四肢之於安佚也性也有命焉君子不謂性也仁之於父子也義之於君臣也禮之於賓主也知之於賢者也聖人之於天道也命也有性焉君子不謂命也然則孟揚之說果何異乎今學者是孟子則非揚子是揚子則非孟子盖知讀其文而不知求其指耳而曰我知性命之理誣哉荀卿論楊墨之道未嘗不稱堯舜也未嘗皆不合於堯舜也然而孟子之所以疾之若是其至者盖其言出入于道而已矣荀卿之書備仁義忠信之道具禮樂政刑之紀上祖堯舜下法周孔豈不美哉然後世之名遂配孟子則非所宜矣夫堯舜周孔之道亦孟子之道也孟子之道亦堯舜周孔之道也荀卿能知堯舜周孔之道而乃以孟子雜于楊朱墨翟之間則何知彼而愚于此乎昔墨子之徒亦譽堯舜而非桀紂豈不至當哉然禮樂者堯舜之所尚也乃欲非而棄之然則徒能尊其空名爾烏能知其所以堯舜乎荀卿之尊堯舜周孔亦誠知所尊矣然孟子者堯舜周孔之徒也乃以雜于楊朱墨翟而并非之是豈異于譽堯舜而非禮樂者耶昔者聖賢之著書也将以昭道徳于天下而揚教化于后世爾豈可以託尊聖賢之空名而信其邪謬之說哉今有人於此殺其兄弟戮其子孫而能盡人子之道以事其父母則是豈得不為罪人耶荀卿之尊堯舜周孔而非孟子則亦近乎是矣昔告子以為性猶杞栁也義猶桮棬也孟子曰率天下之人而禍仁義者必子之言矣夫杞栁之為桮棬是戕其性而後可以為也盖孟子以為人之為仁義非戕其性而後可為故以告子之言為禍仁義矣荀卿以為人之性惡則豈非所謂禍仁義者哉顧孟子之生不在荀卿之後焉爾使孟子出其後則辭而闢之矣荀卿論下荀卿載孔子之言曰由智者若何仁者若何子路曰智者使人知己仁者使人愛己子曰可謂士矣子曰賜智者若何仁者若何子貢曰智者知人仁者愛人子曰可謂士君子矣子曰回智者若何仁者若何顔淵曰智者知己仁者愛己子曰可謂明君子矣是誠孔子之言歟吾知其非也夫能近見而後能逺察能利狹而後能澤廣明天下之理也故古之欲知人者必先求知己欲愛人者必先求愛己此亦理之所必然而君子之所不能易者也請以事之近而天下之所共知者喻之今有人于此不能見太山于咫尺之内者則雖天下之至愚知其不能察秋毫于百步之外也盖不能見于近則不能察於逺明矣而荀卿以為知己者賢於知人者是猶能察秋毫於百步之外者為不若見泰山於咫尺之内者之明也今有人於此食不足以厭其腹衣不足以周其體者則雖天下之至愚知其不能以贍足鄉黨也葢不能利於狭則不能澤於廣明矣而荀卿以謂愛己者賢於愛人者是猶以贍足鄉黨為不若食足以厭腹衣足以周體者之富也由是言之荀卿之言其不察理已甚矣故知己者智之端也可推以知人也愛己者仁之端也可推以愛人也夫能盡智仁之道然後能使人知己愛己是故能使人知己愛己者未有不能知人愛人者也能知人愛人者未有不能知己愛己者也今荀卿之言一切反之吾是以知其非孔子之言而為荀卿之妄矣揚子曰自愛仁之至也蓋言能自愛之道則足以愛人耳非謂不能愛人而能愛己者也噫古之人愛人不能愛己者有之矣然非吾所謂愛人而墨翟之道也若夫能知人而不能知己者亦非吾所謂知人矣宋文選巻十
