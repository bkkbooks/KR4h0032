body:
  text: 宋文選巻二十一李邦直文議官䇿上原今之大弊皆入仕之門雜而衆也入仕之門雜而衆故仕者日藩有罷職而歸幾渉三嵗不得再調者進未得祿仕退失其田廬故亷白之人身雖掛仕版名雖榮聖世而無貲以繼其生盻盻焉常不得其所上急於父母甘㫖滫瀡之養下廹於妻孥之饘粥則守節不篤者或乘其間隙匱困之時起而牟利買販江湖干托郡邑商􅄸盈縮秤校毫厘匿關市之征逐舟車之動以規什一之得進則為王官退則為市人進則冕笏而治事號為民師退則妄覬茍獲不顧行義故仕路汚辱而亷恥之風大墜朝廷患仕者之日藩無職以處之且使罷者久不獲其所故難棘其􅂗以蹈藉來者而有司苛為之文迂為之格張設難漏之宻網羅取非意之細罪離合増廣其薦員使其不得應條缺礙遲久其嵗考使其不得滿課從是而仕者益難故薄於得失而逐於勢利前者冒昧以進後來者竟隘而馳夸偽佻淺之流更相盻眮迭相攻攘相誅不操矛相覆不設穽而媮風熾險濤作恬讓靖黙真能實徳之士或羞與之偶寧自卻於羈旅草野而不入於其􅂗有恥者上欲進之而日益退無恥者上欲退之而日益進徒嵗為一禁時下一令詳明深切䋲約而條責之掲而示之以義利之路曰爾為篤厚無為薄惡如是將以復仁義革士風臣竊以為無益也故臣謂天下之大弊由仕者藩仕者藩由入仕之門雜而衆也夫入仕之門乃弊之原也而議者不塞其源欲止其流不迹其本欲救其末不能清入仕之門而束縛爬羅痛治其已仕者入仕之時如數兵徒如積麻竹不知名器之可惜也已仕之後如障冦盗如捕螟蝗不知士心愈離臣愚以為過矣故願陛下清入仕之門入仕者簡則職有餘裕吏無閒員而祿得以繼汚者反其亷困者遂其節争者息其險讓者榮其髙仕路平夷而風化易隆矣議官䇿中天下既然之弊臣言其端矣請復為陛下詳言所以革者夫爵祿所以分别賢不肖勸天下為善之具惟用之有當否輕重耳在小人則輕在君子則重故不可使小人得之也易得之則輕難得之則重故不可使人易得之也多得之則輕寡得之則重故不可使人多得之也爵祿輕則天下之人不知勸而朝廷輕爵祿重則天下之人知勸而朝廷重矣故爵祿由王者出而王者不敢易以予人天下莫不願而王者不敢常以予人有私人以賜無私人以官有世人以祿無世人以爵使天下瞻慕榮向之不足則君子登功樂職而治道進矣故古之聖賢之君相與謀議於廟堂之上厯數安危治亂之大計莫不先用人之急而後百事何哉其得失之間誠足為天下慮也傳曰法後王堯舜三代之事雖詩書之所詳具不可以復之於今矣祖宗之事皆耆艾耳目之接其慎惜名器而致天下於治今何憚而不為之法乎開寳之詔伎術之人不得外補天禧之詔已補者不得輙遷所謂廷尉評者固已目為清望官而責宰相之輕授於人爵祿如是之重也嵗登進士才十數而雜色入流之人尚寡宗戚貴近無澆沐之請過請者召而戒抑之為宰相子尚有褐衣未命者况下此者耶樂師以久次乞補外官太祖弗之許止以為大樂令予人如是之難也於時省寺府監與郡縣之秩皆有定員隨闕授擬而未嘗有家居待嵗者中外百職或久而不得代考課院患無閒員以足郡縣之闕官得之者如是之寡也今官選之徒如日中為市衝衝而來小有所挾皆可以得志或以門䕃進或以小史進或以醫卜工伎進或冨賈人持錢刀茭芻貿而得入或衛兵之校百十為輩捨挺而軒冕爵祿之輕也如此人主既務以恩澤為治向者政事之臣又或破壊故法瀰澷而誕散之故隂以賣安於時而自交於天下决隄防注雨露倒庫府傾纁黄以足進者之心使大弊流於今而未可以遽息予人之易也又如此今一官而數人共之有既去者有已至者有將至者三班吏部審官之籍不啻萬官文武之列十倍于昔其多也又如此祖宗之時而爵祿重今之世而爵祿輕祖宗之時而予人之難今之世而予人之易祖宗之時而得之者寡今之世而得之者多豈不謂予者之過而謂進者之罪耶夫賢者之見貴于天下有所施為而衆莫不率以名器待之于上而異于小人也將吏之所以令其衆而士卒氣懾神聳以涯分素殊而莫測其尊且大也今匹夫一伎之末僕役趨走之人而與君子同名而共器商販之賤知官之可市而得指手坐而為政者以謂輕于我之千金驅呵遮迾之卒知吾一日皆可以為將吏而辦其事冒慢其上驕桀而難令非所以示天下也嘉祐之始也嘗採議臣之䇿而懲其弊詔减任子之令期嵗補者為三嵗三嵗者為再郊罷三丞告老及外臣遷任之澤進士明經約以天聖之中式而令百司必滿實格不得假小勞縁他請蹙年而入仕矣議者黙計之以謂嵗可損千數施之五六載其數頗耗而仕者差澄清矣雖然其弊猶未甚大更者汚冗之類因仍而未盡釐也深惟陛下行鬻爵之令不若節財用緩刀筆姦吏選試之格與其賞姦吏不若節進亷能汰小人非冀之得與其愜滿小人之心不若寛天下良民之力則祖宗之治可繼也朝廷何不為此以囂怨之生于此耶人主弗為而人臣者為之則囂怨之所歸也唐開元之君罷斜封官三千而天下廓然無事惟人主未卓然而為之耳又何以囂怨為疑哉議官䇿下王者各有所貴堯舜貴道徳夏貴功商貴老周貴同姓秦貴法吏西漢貴才謀東漢貴經術魏貴文章晉貴名理周隋貴氏族所貴皆不同觀其所貴則知其治體之優劣然最無謂者其氏族乎非便國家也非利天下也非本教化也惟私貴者之子弟優足以强宗使之蠧國而漁食天下王者于彼何哉然氏族之家亦有可用而大有補于世者矣如其不較術業累累而貴之非公天下之道也古者不世爵有公卿大夫之子弟則國為之置師保羣衆而教之告之以禮樂詩書徳行道藝之説俟其器成德就然後以名聞于天子而升之太學次第而官使之故四十而仕五十而爵古之通制也夏王官人以世而成湯數之謂之惡政尹氏世職春秋議之今文武之臣自五品以上逺近其年髙下其等咸得保任其子孫矣子孫既官又保任其同宗矣宗族既官又得保任其外姻矣幸而夀則嫡庶之支内外之戚無不列為王官古未嘗有恩厚臣下若此者也故有褓乳嬉劇之嵗天子賜之訓誥而爵命之矣未能勝衣而襲以青紫曽不知四方車馬之數足而名籍于省寺加之士民之上掲于才賢而未用者之目此臣之所以嘆息駭異而為之言也朝廷知古之所以置設官爵之意乎以民之喜為不善恐靡然漸入于亂故標榜尊異其有徳之人以為之師又以物廣事衆一人不可兼聼之故選才智者使居衆愚者之上以分小大之務而司民之曲直如是而已故用人不可不慎也彼提孩何為者而官爵亟加之歟天下才徳之士抱其器或湮沉阨窮老死于田畝而不得用冺焉不若貴者之提孩冝乎士心之有不得于上也國家患進士明經之多間嵗一詔數以二百為之常限冠其選者始預京秩而貴者之䕃計嵗且踰百名波進雖聲病之學然取士之正路本格也取士凡二嵗而出一京秩以恩為之者輙百倍其多可謂本末不相侔臣願稍汰其弊而立年格使文武之官補䕃雖如故然必成童以上始得以其名聞惟餙終之澤無格年齒然復精為課試之令不能渉禮律而通時務者未許出仕則公卿之子孫咸竟于學幾于重慎爵祿之漸矣昔衛懿公好鶴鶴有乘軒者及與狄戰國人皆曰使鶴鶴實有祿位夫貴之提孩未可以官也國家之于臣下祿之重責之輕生有榮歿有報澤非不加矣爵祿天下之公器惟聖神留意焉重計䇿以王官易販夫貪賈之錢刀其為國之慁辱議者之所素病也而終不得寢役上農而闕郡國之漕輓其傷敗民産天下之所共閔也而終不可得蠲酒𣙜茶禁治私鹽筴闗河之征􅆵閈之賦凡百物之産皆有常稅苛取之術徧于天下又為告訐之募督索之刑以威名而誅亡命之人其敗化亂義有識者莫不惜此而終不得少損赤子耗病而不得收恤國體堕而朝廷不能顧是者何故非由經用之急乎今夫兵有常賜吏有常禄官省之所費郊廟之所奉河防之偹與夷狄之賂是皆不可已之用一旦弗繼則變故或縁是而起其勢誠不得緩故國家汲汲于此而以財物為首務議及教化則謂之虚語以金榖為要任禮樂者謂之贅疣之官善聚斂掊克者以為良能仁民愛物則謂之不任職非朝廷之好物勢使之然也國之號為太平亦已久矣宜可以追古之治而政日益煩俗日益薄民生長于無事之際而常遭罹兵冦凶灾天子仁儉如此而四海惶惶如值滛暴之世亦可嘆嗟也今凡可以得利之門無不為之不可以有加矣係民之頸鈐民之臂去攘奪者無幾而宜豐而有餘也罄入以為出惴焉尚恐弗支不幸而旁有他虞則將有度外之索非常之費不知何術以足之歟國務莫先于此者矣此未之救則雖堯舜不能以垂拱而治雖周公不能興禮樂雖臯陶不能以措刑也夫有朝暮之危者不及為百年之憂若饘粥之乏者未暇治藥石之事有所急者有所緩有所先者有所後也國家未欲為大治則已矣如欲措刑而興禮樂大有為于天下以格垂拱之治則救弊之䇿何俟而不先為哉臣嘗學易至于泰卦之變未嘗不歎也夫㤗變則賁賁變則蠱蠱生于賁賁生于泰泰者大通之世也賁者文明之世也蠱者當弊而出乎文明者也今之時承祖宗之業恩繁禮縟文眀之餘蠱之所生也陛下撫養天下之人未能為之節而又重之大蠱有三而他蠱尚不預費冗而為蠱兵冗而為蠱官冗而為蠱蠱生于昔而大熾于今不可以不變矣易窮則變變則通通則久國家之所憚為者嘗謂蠱已成而勢不可變變而去之則將羣起而呌詭陵突而怨上不得已而又復之是未知其道耳夫去蠱莫若漸人之常情猝據則擾駭平緩則静恬以嵗月去之而使之不知善變者也急于治者知蠱之不可不變又欲一瞬而去百年之蠱不已踈乎今之三司使皆用天下重名之臣為之者類不得久非譴而罷去則擢升二府如舟之寄于衝波瞥爾而㳺雖有志于此者亦何能盡其用耶夫百口之家以滛費多而附麗衆故貲業日殚而不足汨汨不治將至于寒饑悉力以供之挐邀貨利則有冦貪不善之名而招禍于外亟絶其費而斥遣僮奴謝去賔客則有難已之勢不平之論而搆怨于内方今之弊亦何以異于是屬之才者而使徐為之治日輯其樵牧月勤其種樹嵗謹其出入則浮費消蓄積長而内外莫之知實傋䇿易之象以龍馬眀乾坤之用夫乾坤之氣變化之大無窮而不可測而聖人獨以二物眀之者何故以為天之用而極其可見者雲雨風霆而已雲雨風霆非龍無以行之則天下之物有能盡天之用者莫過乎龍也地之用亦不可得而極其可見者際乎海深入乎蠻夷而無有涯畔人之力不足以勝之而馳騖戰鬬之渉地之逺非用馬則弗能濟則地之用又莫若乎馬此易之所以重乎龍與馬偕之于乾坤也國之寳畜獸之等夷莫重乎馬易象之所貴周官之所列小雅魯頌之所載史氏傳記兵家之説所偹兵之勝負繫焉國之虚實强弱繋焉蠻夷戎狄四方之民其俗不同其輕死而喜為中國冦盗一也然而能深入而為大患者自古常在于西北不在于東南其故何也馬出于西北而不出于東南也冒頓單于數十萬騎圍髙祖于平城駹驪駸白皆從其方之色多馬如此故能屈中國之勢孝武乘文景之冨奮撃匈奴匈奴少衰矣後以馬少遂無復出唐文皇既定天下席其勝勢破突厥誅髙昌平吐谷渾繼之以髙宗碎髙麗擒百濟而中國之地西至于焉􅂄北踰于隂山盡得多馬之土故分坊布于隴右而唐馬最盛今之馬大抵衰耗不及于漢唐者何也多馬之土不為中國而為狄也耶律氏之君以馬上為國不騎則不能戰故其兵以馬為命女真亦嘗通馬間市于我矣詔蠲大謝島氏租今操舟以泛馬耶律患之置戍于海岸而女真之貢不能至矣繼遷玩戰日久而馬大耗徳眀臣順以偷其安懐其種落專其畜牧者凡三十餘年寳元間至以谷量馬故元昊兵氣飄逸而為邉患矣秦夏雜𦍑雖以馬為市然皆癯疾之餘中國固未嘗得之也西北之産不入于中國中國之所恃蕃吾馬而已而馬官日以弛馬政日以壊朝廷曽莫之計以失兵傋猝然有不得已之戰顧欲驅步卒馳沙漢而捍堂堂之鋒乎伯益知鳥獸之情而畜馬息故帝舜氏之以嬴而俾世其任非子牧于汧渭而有功故周孝王邑之于秦而不奪其業王毛仲張萬嵗强幹而知馬事故唐付之以閑廏監牧之政勛階至開府而仍典焉是擇其人專其職乆其任而貴其功也今之羣牧數十年之間為之者凡幾人以知馬而任者誰耶任之而有功効者誰耶以無勞而得大譴者又誰耶間有可任者亦未及究馬之情諳馬之數而徙矣故馬官覩馬之耗登蔑若秦之視楚人之亡羊而弗之恤此國馬之所以不繁也周之時有庾人校人圉師牧人趨馬巫馬咸專其事而不復治他春秋之時鄭雖小國以下大夫為師則其餘列國莫不有馬官矣故任久職專則政舉而畜牧遂字令嘗求知馬之人而任之惟貴與侍從之人臣其貲地迭䖏而兼領焉上之任之也為恩而已非痛責以馬事也下之受是任幸増廪給便役使而已弗以其事自任也故不親其勞不悉其務田業有遺利吏卒有遺力國之寳畜聚散于沮洳潟鹵之澤暴露于氷雪無水草之野相枕藉僨路而物數以大耗可不為之惜哉夫畜牧止家人野夫之事爾少多之食出入之時惟其便而不可以素為之節要在適馬之性使蕃息而已矣不知付之于其人治之如家人野夫之事而嚴為條教舊令日積而新請繼至吏卒惶惑不知所以為者馬之疾不同而不敢不殊其寒温劑其肥瘠老壮所任之不同而不敢不均其出入與食之多少局局欲以文法治馬求國馬之蕃不可得也今欲養馬蕃之必擇其人必專其職必久其任使畢力于事而責成功吏之廢置卒之誅賞寒暑耕牧牝牡食息之節適其便而相宜一切無束以小法惟視其嵗増之數如何則馬政舉而兵備漸實矣國家于安閒無事之時其失嘗在于因循不能先事而有所思一朝急猝之變起則煩憂而不知措以敗大事為中國無窮之辱惟馬又非可以急索而得者可不預慮之哉眀責䇿今天下之勢如何哉君仁而民不被澤兵多而夷狄驕時平而生民困土廣而中國之氣嘗屈灾嵗少而財益匱文法備而吏民姦時之多弊也如此而以天下之大萬官之富卒未見奮然而大有為能一剗當世之弊致吾君復之乎前古之治者何乏人之如是耶豈治平之世無所施其才耶將用之非其道才有而不克施耶謂世之乏人則古未嘗有無人之世謂治平之世無施其才則多弊又如前所陳者夫隂陽之英氣天地之醇靈生而為賢智之士隂陽之英氣天地之醇靈未聞有時而歇故天下未嘗無賢也議者患治道之不及于古則曰天下無賢不知有賢而不能用也夫用賢而非其道瑰傑豪偉之材皆化為偷懦循縮而亡能為矣則以謂無人焉此可為悼歎者也亦嘗聞古者之用人矣視成不視始責大不責細過一而功百忘其闕而圖其效心至而迹未至則優假而待其所施茍付之以事固勿屑其餘也今者之用人較小罪而不觀大節恤浮語而不究實用雖有稷契周召之佐類以一言一事而為之進退迹稍出于庭壇畦隴之外志不獲就業不能訖而去矣惟圖已持禄避事隨時之人乃無譴而得安焉故庸平者安步而進忠憤者半途而氣折大臣懾法小臣陵兢而天下之事靡靡日入于衰敝其所以然者有其人而不能用用其人而不能盡之之失也今夫㧞一臣而加之百官之上以為輔相非求其謹潔而無過將任之以天下之責也㧞一士而加之一郡一邑之上以為守令非求其能自全將任之以一郡一邑之責也㧞一夫而加之萬衆之上以為將帥非求其循法而不失小行將任之以安危勝負之責也故古者責宰相必曰廣教化和隂陽使百官各任其職責郡守縣令必曰使豪强沮服盗賊不作百姓安業境内大治責將帥必曰士卒樂為用敵國不敢謀不此則凡執事者莫不皆有責焉故上下自任其責而天子無為矣今則不然罷退宰相皆攻其疵瑕而未嘗指天下之不治為宰相之罪糾劾守令者皆以小法而未嘗指郡邑之不治為守令之罪譴謫將帥者皆以庖厨宴饋之間微文細故之末未嘗以蠻夷驕横兵氣弗强為將帥之罪故上下莫自任其責局局自守惟求不入于罪而朝廷大計生民實患卒無有任者是故以天下之大萬官之富而嘗若無其人尊官厚禄者相繼而英績偉烈寂寂于數十載資格之所羈縛文法之所躪躒抱才負志不得有為而老死冺沒者相望于下可不惜哉夫人臣之姦身安于寵形無可罪而實不任責是為大姦張禹之所以黙黙而亡漢李林甫之所以守格令而亡唐也今皆重夫寡過以為賢而嫉夫敢為者以為生事一落䧟穽沒齒不復言故猾民悍吏得以輕罪把持其上游士談客得以口舌恐嚇内外之臣而招其貲胥史得以挾簿書執格例而争於廟堂之前當其任者知姦而不敢除見賢而不敢用天下之害不得亟罷天下之務不敢亟為因仍茍且相顧腹議名曰至公而萬事益病其弊莫甚于今之世者欲救斯弊是亦非難寛小過責大體而已矣勸吏䇿夫人之所以異于羣物者以其有恥也恥者趨善之本原而聖人之教所從而立也聖人因人情之有恥而示之以榮辱之路扶善而沮惡貴賢而賤不肖由于義則天下皆指以為君子莫不聳踴企慕之以為榮不由義則天下皆指以為小人又從而簡賤之羞與為親舊師友是以喜為顯名惡為汚名顯名之在身未爵禄而出處尊安志氣充飽汚名之在身雖位于衆人之上金玉盈其藏而嘗若心腹之抱疽毒首領之嬰木索又况于禍福之實加之哉故聖賢在上則榮人以賞辱人以刑聖賢在下則榮人以名辱人以義名義為之本刑賞為之用刑賞為一時之榮辱而其權在時君名義為萬世之榮辱而其權在清議刑賞猶有弊也名義未嘗有弊也故聖人先之以名義而後之以刑賞孔子曰政之不行也教之不成也爵禄不足勸也刑賞不足恥也先名義之謂也善觀天下者欲知天下治亂之勢無觀于他觀名義與刑賞斯知天下矣善觀人者欲知人之可使為善不可使為善無觀于他觀其有恥與無恥斯知人矣三代之所以治者亷恥存也末世之所以亂者廉恥䘮也朝廷之臣天下之俗頑悍無恥一作砉詬無節此賈誼之所以太息于漢也臣有一言可以不褻刑罰不費爵賞而起天下之治曰勸吏勸吏之要曰示榮辱今諸路各有監司以督藩郡郡有守倅以總屬邑于治皆得按察所部之吏然自非見告而入于罪與應條貫保薦者其餘貪亷强懦優劣臧否一切不以關意雖有龔黄卓魯之儔亦汨汨而去亡以異于常人此亷恥之道所以闕吏之所以不勸也臣願詔内外諸臣凡所部文武之吏各嵗差其材行為上中下三等而奏籍于朝惟臨部與在官未及期者乃使來嵗一部之吏則守倅上之一路之吏則監司上之文吏則文吏之長上之武吏則武吏之長上之天子與二府總天下之奏籍于中可以據幾案獵紙尾而知天下文武材行優劣之大畧其失實多者非私其人則鑒之妄也非鑒之妄則懈于事而不為之審也其得實多者或明而公或詳而能舉其職則以其得實失實之多少又可以坐視奏籍而知奏者之如何董仲舒曰所貢賢者有賞所貢不肖者有罰且以觀大臣之能此其是已臣以謂若此則為上官而法當按察者不敢因循塞黙而辜朝廷之寄必且審聴風謡孜孜于審核以求其吏之實為小官而在所部者恥名𨽻不肖之籍而期於在髙課以榮其志亦將激昻奮迅以兢于名節苛者可以抑而為寛懦者可以勉而為立貪者可以憚而為亷邪者可以沮而為直未䙝刑罰未費爵賞而揚清激濁掲榮辱之路以示天下天下之吏莫不知恥而避惡趨善矣臣故以此為勸吏之術宋文選巻二十一
