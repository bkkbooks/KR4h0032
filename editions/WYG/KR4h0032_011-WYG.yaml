body:
  text: 宋文選巻十一王介甫文上皇帝萬言書臣愚不肖䝉恩備使一路今又䝉恩召還闕廷有所任屬而當以使事歸報陛下不自知其無以稱職而敢縁使事之所及冒言天下之事伏惟陛下詳思而擇其中幸甚臣竊觀陛下有恭儉之徳有聰明睿智之才夙興夜寐無一日之懈聲色狗馬觀游玩好之事無纎介之蔽而仁民愛物之意孚于天下而又公選天下之所願以為輔相者屬之以事而不貳于讒邪傾巧之臣此雖二帝三王之用心不過如此而已宜其家給人足天下大治而效不至于此顧内則不能無以社稷為憂外則不能無懼于鄰敵天下之財力日以困窮而風俗日以衰壊四方有志之士諰諰然常恐天下之久不安此其故何也患在不知法度故也今朝廷法嚴令具無所不有而臣以為無法度者何哉方今之法度多不合乎先王之政故也孟子曰有仁心仁聞而澤不加于百姓者為政不法于先王之道故也以孟子之說觀之方今之失正在于此而已夫以今之世去先王之世逺所遭之變所遇之勢不一而欲一一修先王之政雖甚愚者猶知其難也然臣以為今之失患在不法先王之政者以為當法其意而已夫二帝三王相去盖千有餘嵗一治一亂其盛衰之時具矣其所遭之變所遇之勢亦各不同其施設之方亦皆殊而其為天下國家之意本末先後未嘗不同也臣故曰當法其意而已法其意則吾所改易更革不至乎傾駭天下之耳目囂天下之口而固已合乎先王之政矣雖然以方今之勢揆之陛下雖欲改易更革天下之事合乎先王之意其勢必不能也陛下有恭儉之徳有聰明睿智之才有仁民愛物之心苟加之誠意則何為而不成何欲而不得然而臣顧以為陛下雖欲改易更革天下之事合于先王之意其勢必不能者何也以方今天下之人才不足故也臣嘗試竊觀天下在位之人未有之于此時者也夫人才之于上則有沉廢伏匿在下而不為當時所知者矣臣又求之于閭巷草野之間而亦未見其多焉豈非陶冶而成之者非其道而然乎臣以謂方今在位之人才不足者以臣使事之所及則可知矣今以一路數千里之間能推行朝廷之法令知其所緩急而一切能使民以修其職事者甚少而不才苟簡貪鄙之人至不可勝數其能講先王之意以合當時之變者盖闔郡之間往往而絶也朝廷每一令下其意雖善在位者猶不能推行使膏澤加於民而吏輒縁之為奸以擾百姓臣故曰在位之人才不足而草野閭巷之間亦未見其多也夫人才不足則陛下雖欲改易更革天下之事以合先王之意大臣雖有能當陛下之意而欲領此者九州之大四海之逺孰能稱陛下之㫖以一二推行此而人人䝉其施者乎臣故曰其勢必未能也孟子曰徒法不能以自行非此之謂乎然則方今之急在乎人才而已誠能使天下人才衆多然後在位之才可以擇其人而取足焉在位者得其才矣然後稍視時勢之可否而因人情之患苦變更天下之弊法以趨先生之意甚易也今之天下亦先王之天下先王之時人才嘗衆矣何至於今而獨不足乎故曰陶冶而成之者非其道故也商之時天下嘗大亂矣在位貪毒禍敗皆非其人及文王之起而天下之才嘗少矣當是時文王能陶冶天下之士而使之皆有士君子之才然後隨其才之所有而官使之詩曰豈弟君子遐不作人此之謂也及其成也㣲賤罝之人猶莫不好徳罝之詩是也又况于在位之人乎夫文王惟能如此故以征則服以守則治詩曰奉璋峩峩髦士攸宜又曰周王于邁六師及之言文王所用文武各得其才而無廢事也及至夷厲之亂天下之才又嘗少矣至宣王之起所與圖天下之事者仲山甫而已故詩人歎之曰徳輶如毛維仲山甫舉之愛莫助之盖閔人才之少而山甫之無助也宣王能用仲山甫推其類以新美天下之士而後人才復衆於是内修政事外討不庭而復有文武之境土故詩人美之曰薄言采芑于彼新田于此菑畝言宣王能新美天下之士使之有可用之才如農夫新美其田而使之有可采之芑也由此觀之人之才未嘗不自人主陶冶而成之者也所謂陶冶而成之者何也亦教之養之取之任之有其道而已所謂教之之道何也古者天子諸侯自國至于鄉黨皆有學博置教導之官而嚴其選朝廷禮樂刑政之事皆在於學士所觀而習者皆先王之法言徳行治天下之意其材亦可以為天下國家之用苟不足以為天下國家之用則不教也苟可以為天下國家之用者則無不在于學此教之之道也所謂養之之道何也饒之以財約之以禮裁之以法也何謂饒之以財人之情不足於財則貪鄙苟得無所不至先王知其如此故其制禄自庶人之在官者其禄已足以代其耕矣由此等而上之每有加焉使其足以養亷恥而離貪鄙之行猶以為未也又推其禄以及其子孫謂之世禄使其生也既于父子兄弟妻子之養婚姻朋友之接皆無憾矣其死也又于子孫無不足之憂焉何謂約之以禮人情足於財而無禮以節之則又放辟邪侈無所不至先王知其如此故為之制度婚喪祭養燕享之事服食器用之物皆以命數為之節而齊之以律度量衡之法其命可以為之而財不足以具則弗具也其財可以具而命不得為之者不使有銖兩分寸之加焉何謂裁之以法先王于天下之士教之以道藝矣不帥教則待之以屏棄逺方終身不齒之法約之以禮矣不循禮則待之以流殺之法王制曰變衣服者其君流酒誥曰厥或誥曰羣飲汝勿佚盡執拘以歸于周予其殺夫羣飲變衣服小罪也流殺大刑也加小罪以大刑先王所以忍而不疑者以為不如是不足以一天下之俗而成吾治夫約之以禮裁之以法天下所以服從無抵冒者又非獨其禁嚴而治察之所能致也盖亦以吾至誠懇惻之心力行而為之倡凡在左右通貴之人皆順上之欲而服行之有一不帥者法之加必自此始夫上以至誠行之而貴者知避上之所惡矣則天下之不罰而止者衆矣故曰此養之之道也所謂取之之道者何也先王之取人也必于鄉黨必于庠序使衆人推其所謂賢能書之以告于王而察之誠賢能也然後隨其徳之大小才之髙下而官使之所謂察之者非専用耳目之聰明而私聽于一人之口也欲審知其徳問以行欲審知其才問以言得其言行則試之以事所謂察之者試之以事是也雖堯之用舜亦不過如此而已又况其下乎若夫九州之大四海之逺百官億醜之賤所須士大夫之才則衆矣有天下者又不可以一二自察之也又不可以偏屬于一人而使之於一日二日之間考試其行能而進退之也盖吾已能察其才行之大者以為大官矣因使之取其類以持久試之而考其能者以告于上而後以爵命禄秩予之而已此取之之道也所謂任之之道者何也人之才徳髙下厚薄不同其所任有宜有不宜先王知其如此故知農者以為后稷知工者以為共工其徳厚而才髙者以為之長徳薄而才下者以為之佐屬又以久於其職則上狃習而知其事下服馴而安其教賢者則其功可以至于成不肖者則其罪可以至于著故久其任而付之以考績之法夫如此故智能才力之士則得盡其智以赴功而不患其事之不終其功之不就也偷惰苟且之人雖欲取容於一時而顧僇辱在于後安得不勉乎若夫無能之人固知辭避而去矣居職任事之日久不勝任之罪不可以幸而免故也彼且不敢冒而知辭避矣尚何有比周讒諂爭進之人乎取之既已詳使之既已當處之既已久至其任之也又專焉而不一二以法束縛之而使之得行其意堯舜之所以理百官而熙衆工者以此而已書曰三載考績三考黜陟幽明此之謂也然堯舜之時其所黜者則聞之矣盖四凶是也其所陟者則皐陶稷契皆終身一官而不徙盖其所謂陟者特加之爵命禄賜而已耳此任之之道也夫教之養之取之任之之道如此而當時人君又能與其大臣悉其耳目心力至誠惻怛思念而行之此其人臣之所以不疑而于天下國家之事無所欲為而不得也方今州縣雖有學取牆壁具而已非有教導之官長育人才之事也唯太學有教導之官而亦未嘗嚴其選朝廷禮樂刑政之事未嘗在於學學者亦漠然自以禮樂刑政為有司之事而非已所當知也學者之所教講說章句而已講說章句固非古者教人之道也而近嵗乃始教之以課試之文章夫課試之文章非博誦強學窮日之力則不能及其能工也大則不足以用天下國家小則不足以為天下國家之用故雖白首於庠序窮日之力以帥上之教乃使之從政則茫然不知其方者皆是也盖今之教者非特不能成人之才而已又從而困苦毁壊之使不得成才者何也夫人之才成于專而毁于雜故先王之處民才處工於官府處農於畎畝處商賈於肆而處士於庠序使各專其業而不見異物懼異物之足以害其業也所謂士者又非特使之不得見異物而已一示之以先王之道而百家諸子之異說皆屏之而莫敢習者焉今夫士之所宜學者天下國家之用也今悉使置之不教而教之以課試之文章使其耗精疲神窮日之力以從事於此及其任之以官也則又悉使置之而責之以天下國家之事夫古之人以朝夕專其業于天下國家之事而猶才有能有不能今乃移其精神奪其目力以朝夕從事于無補之學及其任之以用然後卒然責之以為天下國家之用宜其才之足以有為者少矣臣故曰非特不能成人之才又從而困苦毁壊之使不得成才也又有甚害者先王之時士之所學者文武之道也士之才有可以為公卿大夫有可以為士其才之大小冝不冝則有矣至于武事則隨其才之大小未有不學者也故其大者居則為六官之卿出則為六軍之將也其次則比閭族黨之師亦皆卒兩師旅之師也故邊疆宿衛皆得士大夫為之而小人不得奸其任今之學者以為文武異事我知治文事而已至於邊疆宿衛之任則推而屬之于卒伍往往天下奸悍無賴之人苟其才行足以自託于鄉里者未有肯去親戚而從召募者也邊疆宿衛此乃天下之重任而人主之所當慎重者也故古者教士以射御為急其他伎能則視其人才之所宜而后教之其才之所不能則不强也至于射則男子之事盖人之生有疾則已苟無疾未有去射而不學者也在庠序之間固嘗從事于射也有賓客之事則以射有祭祀之事則以射别士之行同能偶則以射於禮樂之事未嘗不寓于射而射亦未嘗不在於禮樂祭祀之間也故易曰弧矢之利以威天下先王豈以射為可以習揖讓之儀而已乎固以為射者武事之尤大而威天下守國家之具也居則以是習禮樂出則以是從戰伐士既朝夕從事於此而能者衆則邊疆宿衛之任皆可以擇而取也夫士嘗學先王之道其行義嘗見推于鄉黨矣然後因其才而託之以邊疆宿衞之事此古之人君所以推干戈以屬之人而無内外之虞也今乃以天下之重任人主所當至慎之選推而屬之奸悍無賴才行不足自寄於鄉里之人此方今所以諰諰然常抱邊疆之憂而虞宿衞之不足恃以為安也今孰不知邊疆宿衞之士不足恃以為安哉顧以為天下學士以執兵為恥而亦未有能騎射行陣之事者也則非召募之卒伍孰能任其事者乎夫不嚴其教髙其選則士之以執兵為恥而未嘗有能騎射行陣之事固其理也凡此皆教之非其道故也方今制禄大抵皆薄自非朝廷侍從之列食口稍衆未有不兼農商之利而能充其養者也其下州縣之吏一月所得多者錢八九千少者四五千以守選待除守闕通之盖六七年而後得三年之禄計一月所得乃實不能四五千少者乃實不能及三四千而已雖厮養之給亦窘於此矣而其養生喪死昏姻𦵏造之事皆當出於此夫出中人之上者雖窮而不失為君子出中人之下者雖泰而不失為小人惟中人則不然窮則為小人泰則為君子計天下之士出中人之上下者千百而無什一窮而為小人泰而為君子者則天下皆是也先王以為衆不可以力勝也故制行不以已而以中人為制所以因其欲而利道之以為中人之所能守則其志可以行乎天下而推之後世以今之制禄而欲士之無毁廉恥盖中人之所不能也故今官大者往往交賂遺營貲産以負貪汙之毁官小者販鬻乞丐無所不為夫士已嘗毁廉恥以負累于世矣則其偷惰取容之意生矜奮自強之心息則職業安得而不弛治道何從而興乎又况委法受賂侵牟百姓往往而是也此所謂不能饒之以財也婚喪奉養服食器用之物皆無制度以為之節而天下以奢為榮以儉為恥苟其財之可以具則無所為而不得有司既不禁而人又以此為榮苟其財不足而不能自稱于流俗則其婚喪之際往往得罪于族人親姻而人以為恥也故富者貪而不知止貧者則勉強其不足以追之此士之所以重困而亷恥之心毁也凡此所謂不能約之以禮也方今陛下躬行儉約以率天下此左右通貴之臣所親見也然而其閨門之内奢靡無節犯上之所惡以傷天下之教者有已甚者矣未聞朝廷有所放絀以示天下昔周之人拘羣飲而被之以殺刑者以為酒之末流生害有至于死者衆矣故重禁其禍之所自生重禁禍之所自生故其施刑極省而人之抵于禍敗者少矣今朝廷之法所尤重者獨貪吏耳重禁貪吏而輕奢靡之法此所謂禁其末而弛其本然而世之識者以為方今官冗而縣官財用已不足以供之其亦蔽于理矣今之入官誠冗矣然而前世置員盖甚少而賦禄又如此之薄則財用之所不足盖亦有說矣吏禄豈足計哉臣于財利固未嘗學然竊觀前世治財之大畧矣盖因天下之力以生天下之財取天下之財以供天下之費自古治世未嘗以不足為天下之公患也患在治財無其道耳今天下不見兵革之具而元元安土樂業人致其力以生天下之財然而公私常以困窮為患者殆以理財未得其道而有司不能度世之宜而通其變耳誠能理財以其道而通其變臣雖愚固知増吏禄不足以傷經費也方今法嚴令具所以羅天下之士可謂密矣然而亦嘗教之以道藝而有不帥教之刑以待之乎亦嘗約之以制度而有不循理之刑以待之乎亦嘗任之以職事而有不任事之刑以待之乎夫不先教之以道藝誠不可以誅其不率教不先約之以制度誠不可以誅其不循理不先任之以職事誠不可以誅其不任事此三者先王之法所尤急也今皆不可得誅而薄物細故非害治之急者為之法禁月異而嵗不同為吏者至于不可勝紀又况能一一避之而毋犯者乎此法令所以玩而不行小人有倖而免者君子有不幸而及者焉此所謂不能裁之以刑者也凡此皆治之非其道也方今取士強記博誦而畧通于文辭謂之茂才異等賢良方正茂才異等賢良方正者公卿之選也記不必強誦不必博畧通于文辭而又嘗學詩賦則謂之進士進士之髙者亦公卿之選也夫此二科所得之技能不足以為公卿不待論而後可知而世之議者乃以為我嘗以之取士而才之可以為公卿者常出於此不必法古之取人然後得士也其亦蔽于理歟先王之時盡所以取人之道猶懼賢者之難進而不肖者之雜于其間也今悉廢先王所以取士之道而欲使天下之才士悉使為賢良進士則士之才可以為公卿者固宜為賢良進士而賢良進士亦固宜有時而得才之可以為公卿者也然而不肖者苟能雕蟲篆刻之學以此進至乎公卿才之可以為公卿者困於無補之學而以此絀死于巖野盖十八九矣夫古之人有天下者其所慎擇者公卿而已公卿既得其人因使推其類以聚于朝廷則百司庶職無不得其人也今使不肖之人幸而至乎公卿因得推其類聚之朝廷是以朝廷所以多不肖之人而雖有賢智往往困於無助不得行其意也且公卿之不肖既推其類以聚于朝廷朝廷之不肖又推其類以備四方之任使四方之任使者又各推其不肖以布於州郡則雖有同罪舉官之科豈足恃哉適足以為不肖之資而已其次九經五經學究明法之科朝廷固已嘗患其無用于世而稍責之以大義矣然大義之所得未有以賢於故也今朝廷又開明經之選以進經術之士然明經之所取亦記誦而畧通於文辭者則得之矣彼通先王之意而可以施于天下國家之用者顧未必得與於此選也其次則恩澤子弟庠序不教之以道藝官司不考問其才能父兄不保任其行義而朝廷輒以官予之而任之以事武王數紂之罪則曰官人以世夫官人以世而不計其才行此乃紂之所以亂亡之道而治世之所無也又其次曰流外朝廷固已擠之于亷恥之外而限其進取之路矣顧屬之以州縣之事使之臨士民之上豈所謂以賢治不肖者乎以臣使事之所及一路數千里之間州縣之吏出于流外者往往而有可屬任以事者殆無二三而當防閑其奸者皆是盖古者有賢不肖之分而無流品之别故孔子之聖而嘗為季氏吏盖雖為吏而上不害其為公卿及後世有流品之别則凡在流品外者其所成立固嘗自置於廉恥之外而無髙人之意矣夫以近世風俗之流靡雖自士大夫之才勢足以進取而朝廷嘗奨之以禮義者晚節末路往往怵而為奸况又其素所成立無髙人之意而朝廷固已擠之于亷恥之外限其進取乎其臨人親職放辟邪侈固其理也至於邊疆宿衞之選則臣固已言其失矣凡此皆取之非其道也方今取之既不以其道至于任人又不問其徳之所宜而問其出身之後先不論其才之稱否而論其歴任之多少以文學進者且使之治財已使之治財矣又轉而使之典獄已使之典獄矣又轉而使之治禮是則一人之身而責之以百官之所能備宜其人才之難為也夫責人以所難為則人之所能為者少矣人之能為者少則相率而不為故使之典禮未嘗以不知禮為憂以今之典禮者皆未嘗學禮故也使之典獄未嘗以不知獄為恥以今典獄者未嘗學獄故也天下之人亦以漸漬于失教被服于成俗見朝廷有所任使非其資序則相議而訕之至于任使不當其才未嘗有非之者也且在位者數徙則不得久于其官故上不能狃習而知其事下不肯服馴而安其教賢者則其功不可以及于成不肖者則其罪不可以及于著若夫迎新将故之勞縁絶簿書之弊固其害之小者不足悉數也設官大抵皆當久于其任而至于所部者逺所任者重則尤宜久于其官而後可以責其有為而方今尤不得久于其官往往數日輒遷之矣取之既已不詳使之既已不當處之既已不久至于任之則又不專而又一一以法束縛之使不得行其意臣固知當今在位多非其人稍假借之權而不一一以法束縳之則放恣而無不為雖然在位非其人而持法以為治自古及今未有能治者也即使在位皆得其人矣而一一以法束縳之不使之得行其意亦自古及今未有能治者也夫取之既已不詳使之既已不當處之既已不久任之又已不專而又一一以法束縳之故雖賢者在位能者在職與不肖而無能者殆無以異夫如此故朝廷明知其賢能足以任事苟非其資序則不以任事而輒進之雖進之士猶不服也明知其無能不肖苟非有罪為任事者所劾不敢以不勝任而輒退之雖退之士猶不服也彼誠不肖而無能然而士不服者何也以所謂賢能者任其事與不肖而無能者亦何以異故也臣前以為不能任人以職事而無不任事之刑以待之者盖謂此也夫教之養之取之任之有一非其道則足以敗亂天下之人才又况兼此四者而有之則在位不才苟簡貪鄙之人至于不可勝數而草野閭巷之間亦少可任之才固不足怪詩曰國雖靡止或聖或否民雖靡膴或哲或謀或肅或艾如彼泉流無淪胥以敗此之謂也夫在位之人才不足矣而閭巷草野之間亦少可用之才則豈特行先王之政而不得也社稷之託封疆之守陛下其能久以天幸為常而無一旦之憂乎盖漢之張角三十六萬同日而起而所在郡國莫能發其謀唐之黄巢横行天下而所至將吏無敢與之抗者漢唐之所以亡禍自此始唐既亡矣陵夷以至五代而武夫用事賢者伏匿消沮而不見在位無復有知君臣之義上下之禮者也當是之時變置社稷盖甚于奕棊之易而元元肝腦塗地幸而不轉死于溝壑者無幾耳夫人才不足其患盖如此而方今公卿大夫莫肯為陛下長慮後顧為宗廟萬世計臣竊惑之昔晉武帝趣過目前而不為子孫長逺之謀當時在位亦皆偷合苟容而風俗蕩然棄禮義捐法制上下同失莫以為戒有識固知其將必亂矣而其後果海内大擾一綫延于江左者僅百餘年伏惟三廟祖宗神靈所以付屬陛下固將為萬世血食而大庇元元于無窮也臣願陛下鑒漢唐五代之所以亂亾懲晉武苟且因循之禍明詔大臣思所以陶成天下之才慮之以謀計之以數為之以漸期深知于當世之變而無負于先王之意則天下之人才不勝用矣人才不勝用則陛下何求而不得何欲而不成哉夫慮之以謀計之以數為之以漸則成天下之才甚易也臣始讀孟子見孟子言王政之易行心則以為誠然及見與慎子論齊魯之地以為先王之制國大抵不過百里者以為今有王者起則凡諸侯之地或千里或五百里皆將損之至于數十百里而後止于是疑孟子雖賢其仁智足以一天下亦安能毋刼之以兵革而使數百千里之強國一旦肯損其地之十八九而比于先王之諸侯至其後觀漢武帝用主父偃之䇿令諸侯王地悉得推恩分其子弟而漢親臨定其號名輒别屬漢於是諸侯王之子弟各有分土而勢強地大者卒以分析弱小然後知慮之以謀計之以數為之以漸則大者固可使小強者固可使弱而不至于傾駭變亂敗傷之釁孟子之言不為過又况今欲改易更革其勢非若孟子所為之難也臣故曰慮之以謀計之以數為之以漸則其為甚易也然先王之為天下不患人之不為而患人之不能不患人之不能而患已之不勉何謂不患人之不為而患人之不能人之情所願得者善行美名尊爵厚利也而先王能操之以臨天下之士天下之士有能遵之以治者則悉以其所願得者以與之士不能則已矣苟能則孰肯舍所願得而不自勉以為才故曰不患人之不為而患人之不能何謂不患人之不能而患已之不勉先王之法所以待人者盡矣自非下愚不可移之才未有不能赴者也然而不謀之以至誠惻怛之心力行而先之未有能以至誠惻怛之心力行而應之者也故曰不患人之不能而患已之不勉陛下誠有意乎成天下之才則臣願陛下勉之而已臣又觀朝廷異時欲有所施為變革其始計利害未嘗不熟也顧一有流俗僥倖之人不恱而非之則遂止而不敢為夫法度立則人無獨䝉其幸者故先王之政雖足以利天下而當其承弊壊之後僥倖之時其創法立制未嘗不艱難也以其創法立制而天下僥倖之人亦順恱以趨之無有齟齬則先王之法至今存而不廢矣惟其創法立制之艱難而僥倖之人不肯順恱而趨之故古之人欲有所為未嘗不加之以征誅而後得其意詩曰是伐是肆是絶是忽四方以無拂此言文王先征誅而後得意于天下也夫先王欲立法度以變衰壊之俗而成人之才雖有征誅之難猶忍而為之以為不若是不可以有為也及至孔子以匹夫遊諸侯所至則使其君臣捐所習逆所順強所劣憧憧如也卒困於排逐然孔子亦終不為之變以為不如是不可以有為此其所守盖與文王同意夫在上之聖人莫如文王在下之聖人莫如孔子而欲有所施為變革則其事盖如此矣今有天下之勢居先王之位創立法制非有征誅之難也雖有僥倖之人不恱而非之固不勝天下順恱之人衆也然而一有流俗僥倖不恱之言則遂止而不敢為者惑也陛下誠有意乎成天下之才則臣又願斷之而已夫慮之以謀計之以數為之以漸而又勉之以誠斷之以果然而猶不能成天下之才則以臣所聞盖未有也然臣之所稱流俗之所不講而今之議者謂迂闊而熟爛者也竊觀近世士大夫所欲悉心力耳目以補助朝廷者有矣彼其意非一切利害則以為當世所能行者士大夫既以此希世而朝廷所取于天下之士亦不過如此至于大倫大法禮義之際先王之所立學而謹守者盖不及也一有及此則羣聚而笑之以為迂闊今朝廷悉心于一切之利害有司法令刀筆之間非一日矣然其效可觀矣則夫所謂迂闊而熟爛者惟陛下亦可以少留神而察之矣夫唐太宗貞觀之初人人異論如封徳彞之徒皆以為非雜用秦漢之政不足以為天下能思先王之事開太宗者魏文正公一人爾其所施設雖未能盡當先王之意抑其大畧可謂合矣故能以數年之間而天下幾至刑措中國安寧蠻夷順服自三王以来未有如此盛時也唐太宗之初天下之俗猶今之世也魏文公之言固當時所謂迂闊而熟爛者也然其效如此賈誼曰今或言德教之不如法令胡不引商周秦漢以觀之然則唐太宗之事亦足以觀矣臣幸以職事歸報陛下不自知其駑下無以稱職而敢及國家之大體者以臣䝉陛下任使而當歸報竊謂在位之人才不足而無以稱朝廷任使之意而朝廷所以任使天下之士者或非其理而士不得盡其才此亦臣使事之所及而陛下之所宜先聞者也釋此不言而毛舉利害之一二以汙陛下之聰明而終無補于世則非臣所以事陛下惓惓之意也伏惟陛下詳思而擇其中天下幸甚上曾參政書安石聞古之君子立而相天下必因其才力之所宜形勢之所安而役使之故人得盡其才而樂出乎其時今也安石材不足以任劇而又多病不敢自蔽而數以聞執事矣而閣下必欲使察一道之吏而寄之以刑獄之事非所謂因其材力之所宜也安石親老矣有上氣之疾日久比年加之風眩勢不可以去左右閣下必欲使之奔走䟦涉不常乎親之側非所謂因其形勢之所安也伏惟閣下由君子之道以相天下故安石得布其私焉論者或以為事君使之左則左使之右則右害有至于死而不敢避勞有至于病而不敢辭者人臣之義也安石竊以為不然上之使人也既因其才力之所宜形勢之所安則使之左而左使之右而右可也上之使人也不因其才力之所宜形勢之所安上將無以報我君下將無以慰我親然且左右惟所使則是無義命而苟恱之為可也害有至於死而不敢避者義無所避之也勞有至於病而不敢辭者義無所辭之也今天下之吏其才可以備一道之使而無不可為之勢其志又欲得此以有為者盖不可勝數則安石之事非所謂不可辭之地而不可避之時也論者又以為人臣之事君與人子之事親其勢不可得而兼也其才不足以任事而勢不可以去親之左右則致為臣而養可也安石又竊以為不然古之民也有常産矣然而事親者猶將輕其志重其禄所以為養今也仕則有常禄而居則無常産而特將輕去其所以為養非所謂為人子事親之義也且安石之材固不足以任使事矣然尚有可任者在我君與我相處之而已爾固不可以去親之左右矣然任豈有不便于養者乎在我君與我相處之而已爾然以安石之賤未嘗得比于門牆之側而慨然以鄙朴之辭自通于閣下之前欲得其所求自常人觀之宜其終齟齬而無所合也自君子觀之由君子之道以相天下則宜不為逺近易慮而不以親疏改施如天之無不幬而施之各以其命之所宜如地之無不載而生之各以其性之所有彼常人之心區區好忮而自私不恕已以及物者豈足以量之邪伏惟閣下垂聴而察焉使天下士無復思古之君子而樂出乎閣下之時而又使常人之觀閣下者不能量也豈非君子之所願而樂者乎冒瀆威尊不任惶恐之至上邵學士書仲詳足下數日前辱示樂安公詩石本及足下所撰復鑑湖記啓封緩讀心目開滌辭簡而精義深而明不俟按圖而盡越絶之形勝不俟入國而熟賢牧之愛民非夫誠發乎文文貫乎道仁思義色表裏相符者其孰能至于此哉因環列書室且欣且慶非有厚也公義之然也安石嘗患近世之文辭勿顧于理理勿顧于事以襞積故實為有學以雕繪語句為精新譬之擷竒花之英積而玩之雖光華馨采鮮縟可愛求其根柢濟用則蔑如也安石幸觀樂安足下之所著譬猶笙磬之貴圭璋之器有節奏焉有法度焉雖庸耳必知雅正之可貴温潤之可寶也仲尼曰有徳必有言徳不孤必有鄰其斯之謂乎昔昌黎為唐儒宗得子壻李漢然後其文益振其道益大今樂安公懿文茂行超越朝右復得足下以宏識清議相須光潤苟力而不已使後之議者必曰樂安公聖宋之儒宗也猶唐之昌黎而勛業過之又曰邵公樂安公之壻也猶昌黎之於李漢而器畧過之是則韓李蔣邵之名各齊驅並驟與此金石之刻不朽矣所以且欣且慶者在于茲焉郡庠拘率偶足下有西笑之謀未獲親交談義聊因手書以道欽謝之意且賀樂安公之得人也答韓求仁書比承手筆問以所疑哀荒久不為報勤勤之意不可以虚辱故畧以所聞致左右不自知其中否也惟求仁所擇耳盖序詩者不知何人然非達先王之法言者不能為也故其言約而明肆而深要當精思而熟講之耳不當疑其有失也二南皆文王之詩而其所繫不同者周南之詩其志美其道盛微至於赳赳武夫免罝之人逺至于江漢汝濆之域久至于衰世之公子皆有以成其徳召南則不能與於此此所以為諸侯之風而係之召公者也夫事出于一人而其不同如此者盖所入有淺深而所施有久近故爾所謂小雅大雅者詩之序固曰政有小大故有小雅焉有大雅焉然所謂大雅者積衆小而為大故小雅之末有疑于大雅者此不可不知也又作詩者其志各有所主其言及于大而志之所主者小其言及于小而志之所主者大此又不可不知也司馬遷以為大雅言王公大人而徳逮黎庶小雅譏小已之得失而其流及上此言可用也又宣王之大雅其善疑于小而幽王之小雅其惡疑于大盖宣王之善微矣其大者如此而已幽王之惡大矣其小者猶如此也凡序言刺某者一人之事也言刺時者非一人之事也刺言其事疾言其情或言其事或言其情其實一也何以知其如此牆有茨衞人刺其上也而卒曰國人疾之而不可道也是以知其如此也刺亂為亂者作也閔亂為遭亂者作也何以知其如此平王之揚之水先束薪而後束楚忽之揚之水先束楚而後束薪周之亂在上而鄭之亂在下故也亂在上則刺其上亂在下則閔其上是以知其如此也管叔為亂成王幼沖周公作䲭鴞以遺王非疾成王而刺之也特以救亂而已故不言刺亂也言刺亂刺褊刺奢刺荒序其所刺之事也言刺時者明非一人之事耳非謂其不亂也闗雎之詩所謂悠哉悠哉轉輾反側者孔子所謂哀而不傷者也何彼穠矣之詩所謂平王者猶格王寧王而已非果周之平王也所謂齊侯者非營丘之齊侯也鄭緇衣之詩冝也好也蓆也此其先後之序也此詩言武公父子善善之無已故序曰以明有國善善之功焉蓆多也冝者以言其所善之當也多者以言其所善之衆也緇衣者君臣同朝之服也適子之館者就之也為之改作緇衣而授之以粲者舉而養之也能就之又能舉而養之此所以為有國者之善善而異于匹夫之善善也夫有國之善善如此則優于天下矣其能父子善于其職而國人美之不亦宜乎生民之詩所謂是任是負以歸肇祀者言后稷既開國任負所種之穀以歸而肇祀爾非以謂兆帝祀于郊也所謂卬盛于豆于豆于登其香始升上帝居歆者言我既為天子得祀郊則盛于豆登其香始升而上帝居歆爾非以為后稷得郊也其卒曰胡臭亶時庶無罪悔以迄于今者言上帝所以居歆何臭之亶時乎乃以后稷肇祀則庶無罪悔以迄于今得郊祀之時爾盖所謂文武之功起于后稷故推以配天者此也衞有􅆁􅅠之詩而說者以為衞後世并􅆁􅅠而取之理或然也既無所受之則疑而闕之可也意誠而后心正心正則無所為而不正故孔子曰詩三百一言以蔽之曰思無邪此詩之言故曰詩三百一言以蔽之也非以為他經有異乎此也我之所受者為此則彼者我之所棄也所謂彼哉彼哉者盖孔子之所棄也孔子曰管仲如其仁仁也揚子謂屈原如其智不智也猶之詩以不明為明又以不明為昏考其辭之終始則其文雖同不害其意異也忠足以盡已恕足以盡物雖孔子之道又何以加于此而論者或以為孔子之道神明不測非忠恕之所能盡雖然此非所以告曽子者也好勇過吾也者所謂能勇而不能怯者也能勇而不能怯非成材也故孔子無所取古者鳳鳥至河出圖皆聖人在上之時其言鳯鳥不至河不出圖者盖曰無聖人在上而已矣顔子具聖人之體而微所謂美人也其于尊五美屏四惡非待教也若夫鄭聲佞人則由外鑠我者也雖若顔子者不放而逺之則其於為邦也不能無敗書曰能哲而恵何憂乎驩兜何畏乎巧言令色孔壬由此觀之佞人者堯舜之所難而况于顔子者乎夫佞人之所以入人者言而已言之入人不如聲之深則鄭聲之可畏固又甚矣孔子曰如有所譽其有所試矣謂顔子三月不違仁者葢有所試矣雖然顔子之行非終於此其後孔子告之以克已復禮而請事斯語矣夫能言動視聴以禮則葢已終身未嘗違仁非特三月而已也語道之全則無不在也無不為也學者所不能遽也而不可以不心存焉道之在我者為德德可據也以德愛者為仁仁譬則左也義譬則右也德以仁為主故君子在仁義之間所當依者仁而已孔子之去魯也知者以為為無禮也乃孔子則欲以微罪行也以微罪行也者依于仁而已禮體此者也智知此者也信信此者也孔子曰志於道據於徳依於仁而不及乎義禮智信者其說盖如此也揚子曰道以道之徳以得之仁以人之義以宜之禮以體之天也合則渾離則散一人而兼統四體者其身全乎老子曰失道而後徳失徳而後仁失仁而後義失義而後禮揚子言其合老子言其離此其所以異也韓文公知道有君子有小人徳有凶有吉而不知仁義之無以異于道徳此為不知道徳也管仲九合諸侯一匡天下此孟子所謂天之大任者也不能如大人正已而物正此孔子所謂小器者也言各有所當非相違也昔之論人者或謂之聖人或謂之賢人或謂之君子或謂之仁人或謂之善人或謂之士㣲子一篇記古之人出處去就盖畧有次序其終所記八士者其行特可謂之士而已矣當記此時此八人之行盖猶有所見今亡矣其行不可得而考也無君子小人至于五世則流澤盡澤盡則服盡而尊親之禮息萬世莫不尊親者孔子也故孟子曰余未得為孔子徒予私淑諸人也孟子所謂市㕓而不征法而不㕓者先儒以國中之地謂之㕓以周官考之此說是也㕓而不征者賦其市地之㕓而不征其貨法而不㕓者治之以市官之法而不賦其㕓或㕓而不征或法而不㕓盖制商賈者惡其盛盛則人去本者衆又惡其衰衰則貨不通故制法以權之稍盛則㕓而不征已衰則法而不㕓文王之時闗譏而不征及周公制禮則凶荒札喪然後無征盖所以權之也貢者夏后氏之法而孟子以為不善者不善非夏后氏之罪也時而已矣責難於君者我聞之矣責善於友者我聞之矣雖然其於君也曰以道事之不可則止其於友也曰忠吿而善道之不可則止王驩于孟子非君也非友也彼未嘗謀于孟子則孟子未嘗與之言不亦宜乎求仁所問于易者尚非易之藴也能盡于詩書論語之言則此皆不問而可知安石嘗學易矣讀而思之自以為如此則書之以待知易者質其義當是時非可以學易也惟無師友之故不得其序以過於進取乃今而後知昔之為可悔而其書往往已為不知者所傳追思之未嘗不愧也以安石之愧悔故亦欲求仁慎之盖以求仁之才能而好問如此安石所以告于左右者不敢不盡冀有以亮之而已至於春秋三傳既不足信故于諸經尤為難知辱問皆不果答亦冀有以亮之答陳柅書安石啓伏䝉不遺不肖而身辱先之示之文章使得窺究其所藴又取安石所以應見問者序而存之以寵其行足下之賜過矣不敢當也安石懦陋淺薄學未成而仕其言行往往背戾于聖人之道擯而後復者非一事也自度尚不足與庸人為師况如足下之才良俊明安能一有所補耶雖然足下過聽所序而存者或非安石所聞于師友之本指也則義不得黙而已莊生之書其通性命之分而不以死生禍福累其心此其近聖人也自非明智不能及此明智矣讀聖人之說亦足以及此不足以及此而陷溺于周之說則其為亂也大矣墨翟非亢然詆聖人而立其說于世盖學聖人之道而失之耳雖周亦然韓氏作讀墨而又謂子夏之後流而為莊周則莊墨皆學聖人而失其源者也老莊之書具在其說未嘗及神仙惟葛洪為二人作傳以為仙而足下謂老莊潛心於神仙疑非老莊之實故嘗為足下道此老莊雖不及神仙而其說亦皆不合於經盖有志于道者聖人之說博大而閎深要當不遺餘力以求之是二書雖欲讀抑有不暇安石之所聞如此其離合於道惟足下自擇之答王深甫書安石拘於此欎鬱不樂日夜望深甫之来以豁我心而得書乃不知所冀况自京師去潁良不逺深甫家事會當有暇時豈宜愛數日之勞而不一顧我乎朋友道喪久矣此我于深甫不能無望也向說天民與深甫不同雖䝉丁寧相教意尚未能與深甫相合也深甫曰事君者以容于我君為恱安社稷者以安我之社稷為恱天民者以行之天下而澤被于民為恱三者皆執其志之所殖而成善者也而未及乎知命大人則知命矣安石則以為善者所以繼道而行之可善者也孔子曰智及之仁能守之莊以蒞之動之不以禮未善也又曰武盡美矣未盡善也孔子之所謂善者如此則以容于我君為恱者未可謂能成善者也亦曰容而已矣以容于我君為恱者則以不容為戚安我社稷為恱則以不安為戚我身之不容與社稷之不安亦有命也而以為我戚此乃所謂不知命也夫天民者達可行於天下而後行之者也彼非以達可行於天下為恱者也則其窮而不行也豈以為戚哉視我之窮達而無恱戚于我心不知命者其何能如此且深甫謂以民係天者明其性命莫不禀于天也有匹夫求達其志于天下以養全其類是能順天者敢取其號亦曰天民安有能順天而不知命者乎深甫曰安有能視天以去就而德顧貶於大人者乎安石則以為古之能視天以去就其徳貶於大人者有矣即深甫所謂管仲是也管仲不能正已者也然而至于不死子糾而從小白其去就可謂知天命矣天之意固嘗甚重其民故孔子善其去就曰豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也此乃我所謂徳不如大人而尚能視天以去就者深甫曰正已以事君者其道足以致容而已不容則命也何恱于我心哉正已而安社稷者其道足以行天下而已不行則命也何窮達于我心哉安石則以為大人之窮達能無恱戚于我心不能無欲達孟子曰我四十不動心又曰何為不豫哉然而千里而見王是予所欲也不遇故去豈予所欲哉王庶幾改之予日望之夫孟子可謂大人矣而其言如此然則所謂無窮達于我心者殆非也亦曰無恱戚而已矣深甫曰惟其正已而不求于正物是以使萬物之正焉安石以為期于正已而不期正物而使萬物自正焉是無治人之道也無治人之道者是老荘之為也所謂大人者豈老荘之為哉正已不期正物者非也正已而期于正物者亦非也正已而不期于正物是無義也正已而期于正物是無命也所謂大人者豈顧無義命哉揚子曰先自治而後治人之謂大器揚子所謂大器者盖孟子之謂大人也物正焉者使物取正乎我而後能正非使之自正也武王曰四方有罪無罪惟我在天下曷敢有越厥志一人横行于天下武王恥之孟子所謂武王一怒而安天下之民不期于正物而使物自正則一人横行于天下武王無為怒也孟子没能言大人而不放于老莊者揚子而已深甫嘗試以安石之言與常君論之二君猶以為未也願以教我答吴子經書比得周秀才所示書即欲奉報以多病多事未能如志重承手問尤以感愧知生事彌困為之奈何安石亦以姻事見迫又田入不足故私計亦未能不以經心然勞逸有命當順以聴之耳前書所示大抵不出先志若子經欲以文辭髙世則世之名能文辭者已無過矣若欲以明道則離聖人之經皆不足以有明也自秦漢以来儒者惟揚雄為知言然尚恨有所未盡今學士大夫往往不足以知雄則其於聖人之經宜其有所未盡子經誠欲以文辭髙世則無為見問矣誠欲以明道則所欲為子經道者非可以一言而盡也子經所謂邪鑿以矯矢背柄以矯舟此天下之所同而舟矢已来未之改也先志所論有非天下之所同而特出子經之新意者則與矯舟矢之意為不類又子經以為詩禮不可以相解乃如安石之學則惟詩禮足以相解以其理同故也子經以為如何兩家各多難無由會合許明年見過幸甚未爾自愛送孫正之序時然而然衆人也已然而然君子也已然而然非私已也聖人之道在焉爾夫君子有窮苦顛跌不肯一失絀已以從時者不以時勝道也故其得志于君則變時而之道若反手然彼其術素修而志素定也時乎楊墨已不然者孟軻氏而已時乎釋老已不然者韓愈氏而已如孟韓者可謂術素修而志素定也不以時勝道也惜也不得志于君使真儒之效不白于當世然其于衆人也卓矣嗚呼余觀今之世圓冠峩如大裙襜如坐而堯言起而舜趨不以孟韓之心為心者果異衆人乎余官于揚得友曰孫正之正之行古之道又善為古文余知其能以孟韓之心為心而不已者也夫越人之望燕為絶域也比轅而首之苟不已無不至孟韓之道去吾黨豈若越人之望燕哉以正之之不已而不至焉余未之信也一日得志于我君而真儒之效不白于當世余亦未之信也正之之兄官于温奉其親以行將從之先為言以處余余欲黙然安得而黙也慶厯二年閏九月十一日䖍州學記䖍於江南地最曠大山長谷荒翳險阻交廣閩越銅鹽之販道所出入椎埋盗奪鼔鑄之奸視天下為多慶厯中常詔立學州縣䖍亦應詔而卑陋褊迫不足為美觀州人欲合私財遷而大之久矣然吏嘗力屈于聽獄而不暇顧此凡二十一年而後改築於州所治之東南以從州人之願盖經始於治平元年二月提㸃刑獄宋城蔡侯行州事之時而考之以十月者知州事錢塘元侯也二侯皆天下所謂才吏故其就此不勞而齋祠講說候望宿息以至庖湢莫不有所又斥餘財市田及書以待學者内外完善矣於是州人相與樂二侯之適已而来請文以記其成余聞之也先王所謂道徳者性命之理而已其度數在乎俎豆鐘鼓管絃之間而常患乎難知故為之官師為之學以聚天下之士期命辨說誦歌絃舞使之深知其意夫士牧民者也牧知地之所在則彼不知者驅之爾然士學而不知知而不行行而不至則奈何先王于是乎有政矣夫政非為勸沮而已也然亦所以為勸沮故舉其學之成者以為卿大夫其次雖未成而不害其能至者以為士此舜所謂庸之者也若夫道隆而徳駿者又不止此雖天子北面而問焉而與之迭為賓主此舜所謂承之者也蔽陷畔逃不可與有言則撻之以誨其過書之以識其惡待之以嵗月之久而終不化則放棄殺戮之刑隨其後此舜之所謂威之者也盖其教法徳則異之以智仁聖義忠和行則同之以孝友睦婣任恤藝則盡之以禮樂射御書數淫言詖行詭怪之術不足以輔世則無所容乎其時而諸侯之所以教一皆聽於天子天子命之矣然後乃興學命之厯數所以時其遲速命之權量所以節其豐殺命不在是則上之人不以教而為學者不道也士之奔走揖讓酧酢笑語升降出入乎此則無非教者髙可以至于命其下亦不失為人用其流及于既衰矣尚可以歌舞羣衆使有以異于後世之人故當是時婦人之所能言童子之所可知有後世老師宿儒之所惑而不悟者也武夫之所道鄙人之所守有後世豪傑名士之所憚而愧之者也堯舜三代從容無為周四海于一堂之上而流風餘俗詠嘆之不息凡以此也周道微不幸而有秦君臣莫知屈已以學而樂于自用其所建立悖矣而惡夫非之者乃燒詩書殺學士掃除天下之庠序然後非之者愈多而終于不勝何哉先王之道徳出于性命之理而性命之理出于人心詩書能循而達之非能奪其所有而予之以其所無也經雖亡出于人心者猶在則亦安能使人舍已之昭昭而從我于聾昏哉然是心非特秦也當孔子時即有欲毁鄉學者矣盖上失其政又自為義不務出至善以勝之而患乎有為之難則是心非特秦也墨子區區不知失者在此而發尚同之論彼其為愚亦獨何異于秦嗚呼道之不一久矣揚子曰如将復駕其所說莫若使諸儒金口而木舌盖有意乎辟雍學校之事善乎其言雖孔子復出必從之矣今天子以盛徳新即位庶幾能及此乎今之守吏實古之諸侯其異于古者不在乎施設之不專而在乎所受于朝廷未有先王之法度不在乎無所于教而在乎所以教未有以成士大夫仁義之材䖍雖地曠以逺得所以教則雖悍昏囂凶抵禁觸法而不悔者亦將有以聰明其耳目而善其心又况乎學問之民故余為書二侯之績因道古今之變及所望乎上者使歸而刻石焉君子齋記天子諸侯謂之君卿大夫謂之子古之為此名也所以命天下之有徳故天下之有徳通謂之君子有天子諸侯卿大夫之位而無其徳可以謂之君子盖稱其位也有天子諸侯卿大夫之徳而無其位可以謂之君子盖稱其徳也位在外也遇而有之則人以其名與之而以貎事之徳在我也求而有之則人以其實與之而心服之夫人服之以貎而不以心與之以名而不以實能以其位終身而無謫者盖亦幸而已矣故古之人以名為羞以實為慊不務服人之貎而思有以服人之心非獨如此也以為求在外者不可以力求也故雖窮困屈辱樂之而勿去非以夫窮困屈辱為人之樂者在是也以夫窮困屈辱不足以撓我心為可樂也已河南裴君主簿于洛陽治齋于其官而命之曰君子裴君豈慕夫在外者而欲有之乎豈以為世之小人衆而躬行君子者獨我乎由前則失已由後則失人我知裴君不為是也亦曰勉于徳而已盖所以牓于其前朝夕出入觀焉思古之人所以為君子而務及之也獨仁不足以為君子獨智不足以為君子仁足以盡性智足以窮理而又通乎命此古之人所以為君子也雖然古之人不云乎徳輶如毛毛猶有倫未有欲之而不得也然則裴君之為君子也孰禦之焉故余嘉其尚而樂為道之宋文選巻十一
