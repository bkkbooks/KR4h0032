body:
  text: 宋文選巻一歐陽永叔文本論上佛法為中國患千餘嵗世之卓然不惑而有力者莫不欲去之已嘗去矣而復大集攻之暫破而愈堅撲之未滅而愈熾遂至于無可奈何是果不可去耶盖亦未知其方也夫醫者之于疾也必推其疾之所自來而治其受病之處病之中人乗乎氣虗而入焉則善醫者不攻其疾而務養其氣氣實則病去此自然之效也故救天下之患者亦必推其患之所自來而治其受患之處佛居西土去中國最逺而有佛固已乆矣堯舜三代之際王政脩明禮義之教充于天下於此之時雖有佛而無由入及三代衰王政闕禮義廢後二百餘年而佛至乎中國由是言之佛所以為吾患者乗其闕廢之時而來此其受患之本也補其闕修其廢使王政明而禮義充則雖有佛無所施于吾民矣此亦自然之勢也尭舜三代之為政設為井田之法籍天下之人計其口而皆授之田凡人之力能勝耕者莫不有田而耕之斂以什一差其征賦以督其不勤使天下之人力皆盡于南畝而不計乎其他然又懼其勞且怠而入于邪僻也于是為制牲牢酒醴以養其體笙匏俎豆以悅其耳目于不耕休力之時而教之以禮故因其田獵而為蒐狩之禮因其嫁娶而為婚姻之禮因其死葬而為喪祭之禮因其飲食羣聚而為鄉射之禮非徒以防其亂又因而教之使知尊卑長幼凡人之大倫也故凡養生送死之道皆因其欲而為之制飾之物采而文焉所以悦之使其易趨也順其性情而節焉所以防之使其不過也然猶懼其未也又為立學以講明之故上自天子之郊下至鄉黨莫不有學擇民之聰明者而習焉使相告語而勸誘其愚惰嗚呼何其備也盖堯舜三代之為政如此其慮民之意甚精治民之具甚備防民之術甚周誘民之道甚篤行之以勤而被于物者洽浸之以漸而入于民者深故民之生也不用力于南畝則從事于禮樂之際不在其家則在乎庠序之間耳聞目見無非禮義樂而趨之不知其倦終身不見異物又奚暇外慕哉故曰雖有佛無由而入者謂有此具也及周之衰秦并天下盡去三代之法而王道中絶後之有天下者不能勉強其為治之具不備防民之術不周佛于此時乘間而出千有餘嵗之間佛之來者日益衆吾之所為者日益壊井田最先廢而兼并遊惰之奸起其後所謂蒐狩婚姻喪祭鄉射之禮凡所以教民之具相次而盡廢然後民之奸者有暇而為他其良者冺然不見禮義之及已夫姦民有餘力則思為邪僻良民不見禮義則莫知所趨佛于此時乗其隙方鼓其雄誕之說而牽之則民不得不從而歸之矣又况王公大人徃徃倡而崇之曰佛是真可歸依者然則吾民何疑而不歸焉幸而有一不惑者方艴然怒曰佛何為者吾將操戈而逐之又曰吾將有説以排之夫千嵗之患徧于天下豈一人一日之可為民之沉酣入于骨髄非口舌之可勝然則將奈何曰莫若修其本以勝之昔戰國之時楊墨交亂孟子患之而專言仁義之說仁義之說勝則楊墨之學廢漢之時百家並興董生患之而退修孔氏之道孔氏之道明而百家自息此謂修其本以勝之之效也今八尺之夫被甲荷㦸勇盖三軍然而見佛則拜聞佛之說則有畏慕之誠者何也彼誠壯佼其中心茫然無所守而然也一介之士渺然柔懦進退畏怯然而聞有道佛者則義形于色非徒不為之屈又欲驅而絶之者何也彼無他焉學問明而禮義熟中心有所守以勝之也然則禮義者勝佛之本也今一介之士知禮義者尚能不為之屈使天下皆知禮義則勝之矣此自然之勢也本論中昔荀卿子之說以為人性本惡著書一篇以持其論予始愛之及見世人之歸佛者然後知荀卿之說謬焉甚矣人之性善也彼為佛者棄其父子絶其夫婦于人性甚戾又有蠶食蟲蠧之弊然而民皆相率而歸焉者以佛有為善之說故也嗚呼誠使吾民曉然知禮義之為善則安知不相率而從哉奈何教之諭之之不至也佛之說熟于人耳入乎其心乆矣至于禮義之事則未嘗見聞今將號于衆曰禁汝之佛而為吾禮義則民將駭而走矣莫若為之以漸使其不知而趨焉可也盖鯀之治水也障之故其害益暴及禹之治水也導之則其患息盖患深勢盛則難與敵莫若馴致而去之易也今堯舜三代之政其說尚傳其具皆在誠能講而修之行之以勤浸之以漸使民皆樂而趨焉則充行乎天下而佛無所施矣傳曰物莫能兩大自然之勢也奚必曰火其書廬其居哉昔者戎狄蠻夷雜居九州之間所謂徐戎白狄荆蠻淮夷之類者是也三代既衰若此之類並侵于中國故秦以西戎據宗周吳楚之國皆僣號稱王春秋書用鄫子傳記被髮于伊川而仲尼亦以不左衽為幸當是之時佛雖不來中國㡬何其不大亂也以是而言王道不明而仁義廢則生民之患亟矣及孔子作春秋孟子距楊墨之説然後王道復明方今九州之民莫不右衽而冠帶其為患者特佛耳其所以勝之之道非有甚髙難行之說也患乎忽而不為耳夫郊天祀地與乎宗廟社稷朝廷之儀皆天子之大禮也今皆舉而行之至于所謂蒐狩婚姻喪祭鄉射之禮此郡縣有司之事也在乎講明而頒布之耳然非行之以勤浸之以漸則不能入于人而成化自古王者之政必世而後仁今之議者將曰佛來千餘嵗有力者尚無可奈何何用此迂緩之說為是則以一日之功不速就而棄必世之功不為也可不惜哉昔孔子嘆作俑者不仁盖嘆乎啟其漸而至于用殉也然則為佛者不尤甚于作俑乎當其始來未見其害引而内之今之為害著矣非待先覺之明而後見也然而恬然不以為怪者何哉夫物極則反數窮則變此理之常也今佛之盛乆矣乘其窮極之時可以反而變之不難也昔三代之政皆聖人之事業及其乆也必有弊故三代之術皆變其質文而相救就使佛為聖人及其弊也猶將救之况其非聖人者乎夫奸邪之士見信于人者彼雖小人必有所長以取信是以古之人君惑之至于亂亡而不悟今佛之法可謂奸且邪矣盖其為說亦有可以惑人者使世之君子雖見其弊而不思救豈又善惑者歟抑亦不得其救之之術也救之莫若脩其本以勝之捨是而將有為雖賁育之勇孟軻之辯太公之隂謀吾見其力未及施言未及出計未及行而先䧟于禍敗矣何則患深勢盛難與敵非馴致而為之莫能也故曰修其本以勝之作本論夲論下天下之事有本末其為治者有先後堯舜之書略矣後世之治天下未嘗不取法于三代者以其推本末而知所先後也三王之為治也以理數均天下以爵地等邦國以井田域民以職事任官天下有定數邦國有定制民有定業官有定職使下之共上勤而不困上之治下簡而不勞財足于用而可以備天災也兵足以禦患而不至于為患也凡此具矣然後飾禮樂興仁義以教導之是以其政易行其民易使風俗淳厚而王道成矣雖有荒子孱孫繼之猶七八百嵗而後已夫三王之為治豈有異于人哉財必取于民官必養于禄禁暴必以兵防民必以刑與後世之治者大抵同也然後世常多亂敗而三王獨能安全者何也三王善推本末知所先後而為之有條理後之有天下者孰不欲安且治乎用心益勞而政益不就鰓鰓然常恐亂敗及之而輙以至焉者何也以其不推本末不知先後也當今之務衆矣所當先者五也其二者有司之所知其三者則未之思也足天下之用莫先乎財繫天下之安危莫先乎兵此有司之所知也然財豐矣取之無限而用之無度則下益屈而上益勞兵強矣而不知所以用之則兵驕而生禍所以節財用兵者莫先乎立制制已具偹兵已可使財已足用所以共守之者莫先乎任人是故均財而節兵立法以制之任賢以守法尊名以厲賢此五者相為用有天下者之當務當今之世所先而執事者之所忽也方今四海之内非有亂也上之政令非有暴也天時水旱非有大故也君臣上下非不和也以晏然至廣之天下無一間隙之端而南方敢殺天子之命吏西方敢有崛強之王北方敢有抗禮之帝者何也生齒之數日益衆土地之産日益廣公家之用日益急四方不服中國不尊天下不實者何也以五者之不備故也請試言其一二方今農之趨耕可謂勞矣工商取利乎山澤可謂勤矣上之征賦𣙜易商利之臣可謂纎悉而無遺矣然一遇水旱如明道景祐之間則天下公私乏絶是無事之世民無一歳之備而國無數年之儲也以此知財之不足也古之善用兵者可使之赴水火今廂禁之軍有司不敢役必不得已而暫用之則謂之借倩彼兵相謂曰官倩我而官之文符亦曰倩夫賞者所以酬勞也今以大禮之故不勞之賞三年而一徧所費八九百萬有司不敢緩月日之期兵之得賞不以無功知媿乃稱多量少比好嫌惡小不如意則羣聚而呼持梃欲擊天子之大吏無事之時其猶若此以此知兵驕也夫財用悉出而猶不足者以無定數也以兵之敢驕者以用之未得其術以此知制之不立也夫財匱兵驕法制未一而莫有奮然忘身許國者以此知不任人也不任人者非無人也彼或挾材藴知特以時方惡人之好名各藏蓄收斂不敢奮露惟恐近於名以犯時人所惡是以人人變賢為愚愚者無所責賢者被譏疾遂使天下之事將弛廢而莫敢出力以為之此不尚名之弊者天下之最大患也故曰五者之皆廢也前日五代之亂可謂極矣五十三年之間易五姓十三君而亡國被弑者八長者不過十餘嵗甚者三四嵗而亡夫五代之主豈皆愚者邪其心豈樂禍亂而不欲為乆安之計乎顧其力有不能為者時也當是時也東有汾晉西有岐蜀北有強狄南有江淮閩廣吴越荆潭天下分為十三四四靣環之以至狹之中國又有叛將強臣割而據之其君天下者類皆為國日淺威徳未洽強君武主力而為之僅以自守不幸孱子懦孫不過一再傳而復亂敗是以養兵如兒子之啖虎狼猶恐不為用尚何敢制以殘敝之民人贍無貲之征賦頭㑹箕斂猶恐不足尚何曰節財以冨民天下之勢方若敝廬補其奥則隅壊整其桷則棟傾枝撑扶持苟存而已尚何暇法象規圜矩方而為制度乎是以兵無制用無節國家無法度一切苟且而已今宋之為宋八十年矣外平僣亂無抗敵之國内削方鎮無強叛之臣天下為一海内晏然為國不為不乆天下不為不廣也語曰長袖善舞多財善賈言有資者其為易也方今承三聖之基業据萬乘之尊名以有四海一家之天下盡大禹貢賦之地莫不内輸惟上之所取不可謂乏財六尺之卒荷戈勝甲力彀五石之弩彎二石之弓者數百萬惟上制而令之不可謂乏兵中外之官居職者數千員官三班吏部常積者又數百三嵗一詔布衣而應詔者萬餘人試禮部者七八千惟上之擇不可謂乏賢民不見兵革者凡四十年矣外振兵武攘夷狄内修法度興徳化惟上之所為不可謂無暇以天子之慈聖仁儉得一二明智之臣相與而謀之天下積聚可如文景之富制禮作樂可如成周之盛奮發威烈以耀名譽可如漢武帝唐太宗之顯赫論道徳可興堯舜之治然而財不足用於上而下已弊兵不足威於外而敢驕於内制度不可為萬世法而日益叢雜一切苟且不異五代之時此甚可歎也是所謂居得致之位當可致之時又有能致之資然誰憚而乆不為乎朋黨論臣聞朋黨之說自古有之惟幸人君辨其君子小人而已大凡君子與君子以同道為朋小人與小人以同利為朋此自然之理也然臣謂小人無朋惟君子則有之其故何哉小人所好者禄利也所貪者貨物也當其同利之時暫相黨引以為朋者偽也及其見利而争先或利盡而交踈則反相賊害雖其兄弟親戚不能相保故臣謂小人無朋其暫為朋者偽也君子則不然所守者道義所行者忠信所惜者名節以之修身則同道而相益以之事國則同心而共濟終始如一此君子之朋也故為人君者但當退小人之偽朋用君子之真朋則天下治矣堯之時小人共工驩兠等四人為一朋君子八元八愷十六人為一朋舜佐堯退四凶小人之朋而進元愷君子之朋堯之天下大治及舜自為天子而臯䕫稷契等二十二人並列于朝更相稱美更相推讓凡二十二人為一朋而舜皆用之天下亦大治書曰紂有臣億萬惟億萬心周有臣三千惟一心紂之時億萬人各異心可謂不為朋矣然紂以亡國周武王之臣三千人為一大朋而周用以興後漢獻帝時盡取天下名士囚禁之目為黨人及黄巾賊起漢室大亂後方悔悟盡解黨人而釋之然已無救矣唐之晚年漸起朋黨之論及昭宗時盡殺朝之名士咸投之黄河曰此輩清流可投濁流而唐遂亡矣夫前世之主能使人人異心不為朋莫如紂能禁絶善人為朋莫如漢獻帝能誅滅清流之朋莫如唐昭宗之世然皆亂亡其國更相稱美推讓而不自疑莫如舜之二十二臣舜亦不疑而皆用之然而後世不誚舜為二十二人朋黨所欺而稱舜為聰明之聖者以能辨君子與小人也周武之世舉其國之臣三千人共為一朋自古為朋之多且大莫如周然周用此以興者善人雖多而不厭也嗟夫興亡治亂之迹為人君者可以鑒矣春秋論上事有不幸出于乆逺而傳乎二說則奚從曰從其一之可信者然則安知可信者而從之曰從其人而信之可也衆人之說如彼君子之說如此則舍衆人而從君子君子博學而多聞矣然其傳不能無失也君子之說如彼聖人之說如此則舍君子而從聖人此舉世之人皆知其然而學春秋者獨異乎是孔子聖人也萬世取信一人而已若公羊髙糓梁赤左丘明三子者博學而多聞矣其傳不能無失者也孔子之于經三子之于傳有所不仝則學者寧舍經而從傳不信孔子而信三子甚哉其惑也經于魯隠公之事書曰公及邾儀父盟于蔑其卒也書曰公薨孔子始終謂之公三子者曰非公也是攝也學者不從孔子謂之公而從三子謂之攝其于晉靈公之事孔子書曰趙盾弑其君夷臯三子者曰非趙盾也是趙穿也學者不從孔子信為趙盾而從三子信為趙穿其于許悼公之事孔子書曰許世子止弑其君買三子者曰非弑之也買病死而止不嘗藥耳學者不從孔子信為弑君而從三子信為不嘗藥其舍經而從傳者何哉經簡而直傳新而竒簡直無悦耳之言新竒有可喜之論是以學者樂聞而易惑也予非敢曰不惑然信于孔子而篤者也經之所書予之所信也經所不書予所不知也難者曰子之言有激而云爾夫三子者皆學乎聖人而傳所以述經也經文隠而意深三子者從而發之故經有不言傳得而詳耳非為二説也予曰經所不書三子者何從而知其然也曰推其前後而知之且其有所傳而得也國君必即位而隠不書即位此傳得知其攝也弑君者不復見經而盾復見經此傳得知弑君非盾也君弑賊不討則不書塟而許悼公書塟此傳得知世子止之非實弑也經文隠矣傳曲而暢之學者以謂三子之説聖人之深意也是以從之爾非謂舍孔子而信三子也予曰然則妄意聖人而惑學者三子之過而已使學者必信乎三子予不能奪也使其惟是之求則予不得不為之辨春秋論中孔子何為而脩春秋正名以定分求情而責實别是非明善惡此春秋之所以作也自周衰以來臣弑君子弑父諸侯之國相屠戮而争為君者天下皆是也當是之時有一人焉能好㢘而知讓立乎争國之亂世而懐讓國之髙節孔子得之于經冝如何而别白之冝如何而褒顯之其肯沒其攝位之實而雷同衆君誣以為公乎所謂攝者臣行君事之名也伊尹周公共和之臣嘗攝矣不聞商周之人謂之王也使息姑實攝而稱號無異于正君則名分不正而是非不白夫攝者心不欲為君而身假行君之事雖行君事而其實非君也今書曰公則是息姑心不欲之實不為之而孔子加之失其本心誣以虗名而沒其實善夫不求其情不責其實而善惡不明如此則孔子之意踈而春秋謬矣春秋辭有同異尤謹嚴而簡約所以别嫌明㣲慎重而取信其于是非善惡難明之際聖人所盡心也息姑之攝也㑹盟征伐賞刑祭祀皆出于已舉魯之人皆聴命于已其不為正君者幾何惟不有其名耳使其名實皆在已則何從而知其攝也故息姑之攝與不攝惟在為公與不為公别嫌明㣲繫此而已且其有讓桓之志未及行而見殺其生也志不克伸其死也被虗名而違本意則息姑之恨何伸于後世乎其甚髙之節難明之善亦何望于春秋乎今説春秋者皆以名字氏族予奪為輕重故曰一字為褒貶且公之一字豈不重于名字氏族乎孔子于名字氏族不妄以加人其肯以公妄加于人而沒其實乎以此而言隠實為攝則孔子决不書曰公孔子書為公則隠决非攝難者曰然則何為不書即位曰惠公之終不見其事則隠之始立亦不可知孔子從二百年後得其遺書而修之闕其所不知所以傳信也難者又曰謂為攝者左氏爾公羊糓梁皆以為假立以待桓也故得以假稱公予曰凡魯之事出于已舉魯之人聴于已生稱曰公死書曰薨何從而知其假春秋論下弑逆大惡也其為罪也莫贖其于人也不容其在法也無赦法施于人雖小必慎况舉大法而加大惡乎既輙加之又輙赦之則自侮其法而人不畏春秋之法不如是之輕易也三子説春秋書趙盾以不討賊故加之大惡既而以盾非實弑則又復見于經以明盾之無罪是輙加之而輙赦之爾以盾為無弑心乎其可輕以大惡加之以盾不討賊情可責而宜加之乎則其後頑然未嘗討賊既不改過以自贖何為遽赦使同無罪之人其于進退皆不可此非春秋意也趙穿弑君大惡也盾不討賊不能為君復仇而失刑于下二者輕重不較可知就使盾為可責然穿焉得免也今免首罪為善人使無辜者受大惡此决知其不然也春秋之法使為惡者不得倖免疑似者有所辨明所謂是非之公也據三子之說初靈公欲殺盾盾走而免穿盾族也遂弑而盾不討其迹渉于與弑矣此疑似難明之事聖人尤當求情責實以明白之使盾果有弑心乎則自然罪在盾矣不得曰為法受惡而稱其賢也使果無弑心乎則當為之辨明必先正穿之惡使罪有所歸然後責盾縱賊則穿之大惡不可倖而免盾之疑似之迹獲辨而不討之責亦不得辭如此則是非善惡明矣今為惡者獲免而疑似之人䧟于大惡此决知其不然也若曰盾不討賊有幸弑之心與自弑同故寜捨穿而罪盾此乃逆詐用情之吏矯激之為耳非孔子忠恕春秋以王道治人之法也孔子患舊史是非錯亂而善惡不明所以修春秋就令舊史如此其肯從而不正之乎其肯從而稱美又教人以越境逃惡乎此可知其謬傳也問者曰然則夷臯孰弑之曰孔子所書是矣趙盾弑其君也今有一人焉父病躬進藥而不嘗又有一人焉父病而不躬進藥而二父皆死又有一人焉􅍾刄而殺其父使吏治之是三人者其罪同乎曰雖庸吏猶知其不可同也躬藥而不知嘗者有愛父之孝心而不習于禮是可哀也無罪之人耳不躬藥者誠不孝矣雖無愛親之心然未有殺父之意使善治獄者猶當與操刄殊科况以躬藥之孝反與操刄同其罪乎此庸吏之不為也然則許世子止實不嘗藥則孔子决不書曰弑君孔子書為弑君則止决非不嘗藥難者曰聖人借止以垂教爾對曰不然夫所謂借止以垂教者不過欲人之知嘗藥耳聖人一言明以告人則萬世法也何必加孝子以大惡之名嘗藥之事卒不見于文使後世但知止為弑君而莫知藥之當嘗也教未可垂而已䧟人于大惡矣聖人垂教不如是之迂也果曰責止不如是之刻也難者曰然則盾曷為復見于經許悼公曷為書塟曰弑君之臣不見經此自三子説耳果聖人法乎悼公之塟且安知其不討賊而書塟也自止以弑見經後四年吴敗許師又十有八年當定公之四年許男始見于經而不名許之書于經者畧矣止之事迹不可得而知也難者曰三子之説非其臆出也其得于所傳如此然則所傳者皆不可信乎曰傳聞何可盡信公羊糓梁以尹氏卒為正卿左氏以尹氏卒為隠母一以為男子一以為婦人得于所傳者盖如是是可盡信乎石鷁論夫據天道仍人事筆則筆而削則削此春秋之所作也援他説攻異端是所是而非所非此三傳之所殊也若乃上揆之天意下質之人情推至隠以探萬事之元重將來以立一王之法者莫近于春秋矣故杜預以謂經者不刋之書范寗亦云義以必當為理然至一經之指三傳殊説是彼非此學者疑焉魯僖之十六年隕石于宋五六鷁退飛過宋都左氏傳曰石隕于宋星也六鷁退飛風也公羊又曰聞其隕然視之則石察之則五故先言石而後言五視之則鷁徐而視之則退飛故先言六而後言鷁糓梁之意又謂先後之數者聚散之辭也石鷁猶盡其辭而况于人乎左氏則辨其物公糓則鑒其意噫豈聖人之㫖不一耶將後之學者偏見耶何紛紛而若是也且春秋載二百年之行事隂陽之所變見災異之所著聞究其所終各有條理且左氏以石為星者莊公七年星隕如雨若所以隕者是星則當星隕而為石何得不言星而直曰隕石乎夫大水大雪為異必書若以小風而鷁自退非由風之力也若大風而退之則衆鳥皆退豈獨退鷁乎成王之風有㧞木之力亦未聞退飛鳥也若風能退鷁則是過成王之風矣而經獨不書曰大風退鷁乎以公羊之意謂數石視鷁而次其言且孔子生定哀之時去僖公五世矣當石隕鷁飛之際是宋人次于舊史則又非仲尼之善志也且仲尼隔數世修經又焉及親數石而視鷁乎糓梁以謂石後言五鷁先言六者石鷁㣲物聖人尚不差先後以謹記其數則于人之褒貶可知矣若乃西狩獲麟不書幾麟鸜鵒來巢不書幾鸜鵒豈獨謹記于石鷁而忽于麟鸜鵒乎如此則仲尼之志荒矣殊不知聖人紀災異著勸戒而已矣又何區區于謹數乎必曰謹物察數人皆能之非獨仲尼而後可也噫三者之説一無是矣而周内史叔興又以為隂陽之事非吉凶所生且天裂陽地動隂有隂凌陽則日蝕陽勝隂則嵗旱隂陽之變出為災祥國之興亡由是而作既曰隂陽之事孰謂非吉凶所生哉其不亦甚乎泰誓論書稱商始咎周以乗黎乘黎者西伯也西伯以征伐諸侯為職事其伐黎而勝也商人已疑其難制而患之使西伯赫然見其不臣之狀與商並立而稱王如此十年商人反晏然不以為怪其父師老臣如祖伊㣲子之徒亦黙然相與熟視而無一言此豈近于人情耶由是言之謂西伯受命稱王十年者妄説也以紂之雄猜暴虐嘗醢九侯而脯鄂侯矣西伯聞之竊歎遂執而囚之幾不免死至其叛已不臣而自王乃反優容而不問者十年此豈近于人情耶由是言之謂西伯受命稱王十年者妄説也孔子曰三分天下有其二以服事商使西伯不稱臣而稱王安能服事于商乎且謂西伯稱王者起于何説而孔子之言萬世之信也由是言之謂西伯受命稱王十年者妄説也伯夷叔齊古之知義之士也方其讓國而去頋天下皆莫可歸聞西伯之賢共徃歸之當是時紂雖無道天子也天子在上諸侯不稱臣而稱王是僣叛之國也然二子不以為非依之乆而不去至武王伐紂始以為非而棄去彼二子者始頋天下莫可歸卒依僣叛之國而不去不非其父而非其子此豈近于人情耶由是言之謂西伯受命稱王十年者妄説也泰誓稱十有一年説者因以謂自文王受命九年及武王居喪二年并數之耳是以西伯聴虞芮之訟謂之受命以為元年此又妄説也古者人君即位必稱元年常事耳不以為重也後世曲學之士説春秋始以改元為重事然則果常事歟固不足道也果重事歟西伯即位已改元矣中間不冝改元而又改元至武王即位冝改元而反不改元乃上冐先君之元年并其居喪稱十一年及其㓕商而得天下其事大于聴訟逺矣又不改元由是言之謂西伯以受命之年為元年者妄説也後之學者知西伯生不稱王而中間不再改元則書詩所載文武之事粲然明白而不誣矣或曰然則武王畢喪伐紂而泰誓曷為稱十有一年對曰畢喪伐紂出于諸家之小説而泰誓六經之明文也昔者孔子當衰周之際患衆説紛紜以惑亂當世于是退而脩六經以為後世法及孔子既歿去聖稍逺而衆説復興與六經相亂自漢以來莫能辨正今有卓然之士一取信乎六經則泰誓者武王之事也十有一年者武王即位之十有一年耳復何疑哉司馬遷作周本紀雖曰武王即位九年祭于文王之墓然後治兵于孟津至作伯夷列傳則又載父死不塟之説皆不可為信是以吾無取焉取信于書可矣易問上或問大衍之數易之藴乎學者莫不盡心焉曰大衍易之末也何必盡心焉易者文王之作也其書則六經也其文則聖人之言也其事則天地萬物君臣父子夫婦人倫之大端也大衍筮占之一法耳非文王之事也然則不足學乎曰得其大者可以兼其小未有學其小而能至其大者也知此然後知學易矣六十四卦自古用焉夏商之世筮占之説略見于書文王遭紂之亂有憂天下之心有慮萬世之志而無所發以為卦爻起于竒偶之數隂陽變易交錯而成文有君子小人進退動静剛柔之象而治亂盛衰得失吉凶之理具焉因假取以寓其言而名之曰易至其後世用以占筮孔子出于周末懼文王之志不見于後世而易專為筮占用也乃作彖象發明卦義必稱聖人君子王后以當其事而常以四方萬國天地萬物之大以為言盖明非止于卜筮也所以推原本意而矯世失然後文王之志大明而易始列乎六經矣易之淪于卜筮非止今世也㣲孔子則文王之志沒而不見矣夫六爻之文占辭也大衍之數占法也皆古所用也文王更其辭而不改其法故曰大衍非文王之事也所謂辭者有君子小人進退動静剛柔之象治亂盛衰得失吉凶之理學者專其辭于筮占猶見非于孔子况遺其辭而執其占法欲以見文王作易之意不亦逺乎凡欲為君子者學聖人之言欲為占者學大衍之數惟所擇之焉耳易問中或問繫辭果非聖人之作前世之大儒君子不論何也曰何止乎繫辭舜之塗廪浚井不載于六經不道于孔子之徒盖里巷人之語也及其傳也乆孟子之徒道之事固有出于謬妄之説其初也大儒君子以世莫之信置而不論及其傳之乆也後世反以謂更大儒君子而不非是實不誣矣由是曲學之士溺焉者多矣自孔子沒周益衰王道喪而學廢接乎戰國百家之異端起十翼之説不知起于何人自秦漢以來大儒君子不論也或者曰然則何以知非聖人之作也曰大儒君子之于學也理達而已矣中人已下指其迹提其耳而譬之猶有惑焉者溺于習聞之乆曲學之士喜為竒説以取勝也何謂子曰者講師之言也吾嘗以譬學者矣元者善之長亨者嘉之㑹利者義之和貞者事之幹此所謂文言也方魯穆姜之道此言也在襄公之九年後十有五年而孔子生左氏之傳春秋也固多浮誕之辭然其用心必亦欲其書之信後世也使左氏知文言為孔子作也必不以追附穆姜之説而疑後世也盖左氏者不意後世以文言為孔子作也孟子曰盡信書不如無書孟子豈好非六經者黜其雜亂之説所以尊經也易問下或問大衍占筮之事也其于筮占之説無所非乎曰其法是也其言非也用蓍四十有九分而為二掛一揲四歸竒再扐其法是也象兩象三至于乾坤之䇿以當萬物之數者其言皆非也傳曰知者創物又曰百工之事皆聖人之作也筮者上古聖人之法也其為數也出于自然而不測四十有九是也其為用也通于變而無窮七八九六是也惟不測與無窮故謂之神惟神故可以占今為大衍者取物合數以配蓍是可測也以九六定乾坤之策是有限而可窮也矧占之而不效乎竒偶隂陽之數也隂陽天地之正氣也二氣升降有進退而無老少且聖人未嘗言而雖繫辭之龎雜亦不道也問者曰然則九六何為而變曰夫蓍四十有九無不用也昔之言大衍者取四揲之䇿而捨掛扐之數兼知掛扐之多少則九六之變可知矣蓍數無所配合隂陽無老少乾坤無定䇿知此然後知筮占矣嗚呼文王無孔子易其淪于卜筮乎易無王弼其淪于異端之説乎因孔子而求文王之用心因弼而求孔子之意因予言而求弼之得失可也原弊論孟子曰養生送死王道之本管子曰倉廪實而知禮節故農者天下之本也而王政所由起也古之為國者未嘗敢忽而今之為吏者不然簿書聴斷而已矣聞有道農之事則相與笑之曰鄙夫知賦斂財用之為急不知務農為先者是未原為政之本末也知務農而不知節用以愛農是未盡務農之方也古之為政者上下相移用以濟下之用力者甚勤上之用物者有節民無遺力國不過費上愛其下下給其上使不相困三代之法皆如此而最備于周周之法曰井牧其田十而一之一夫之力督之必盡其所任一日之用節之必量其所入一歳之耕供公與民食皆出其間而常有餘故三年而餘一年之備今乃不然耕者不復督其力用者不復計其出入一歳之耕供公僅足而民食不過數月甚者塲功甫畢簸糠麩而食粃稗或採橡實畜菜根以延冬春夫糠覈橡實孟子所謂狗彘之食也而卒嵗之民不免食之不幸一水旱則相枕為餓莩此甚可歎也夫三代之為國公卿士庻之禄廪兵甲車牛之財用山川宗廟鬼神之供給未嘗闕也是皆出于農而民之所耕不過今九州之地也嵗之凶荒亦時時而有與今無以異今固盡有嚮時之地而制度無過于三代者昔者用常有餘而今常不足何也其為術相反而然也昔者知務農知節用今以不勤之農占無節之用故也非徒不勤農又為衆弊以耗之非徒不量民力以為節又直不量天力之所任也何謂衆弊有誘民之弊有兼并之弊有力役之弊請詳言之今夫坐華屋享美食而無事者曰浮圖之民仰衣食而養妻子者曰兵戎之民此在三代時南畝之民也今之議者以浮圖並周孔之事曰三教不可以去兵戎曰國備不可以去浮圖不可並周孔不言而易知請試言之國家自景徳罷兵三十三嵗矣兵嘗經用者老死今盡而後來者未嘗聞金鼓識戰陳也生于無事而飽于衣食也其勢不得不驕惰今衛兵入宿不自持被而使人持之禁兵給粮不自荷而雇人荷之其驕如此况肯冒辛苦以戰鬪乎前日西邉之吏如髙化軍齊宗舉兩用兵而輙敗此其效也夫就使兵耐辛苦而能鬬戰雖耗農民為之可也柰何有為兵之虗名而其實驕惰無用之人也古之凡民長大壯健者皆在南畝農隙則教之以戰今乃大異一遇凶歳則州郡吏以尺度量民之長大而試其壯健者招之去為禁兵其次不及尺度而稍怯弱者籍之以為廂兵吏招人多者有賞而民方窮時争投之故一經凶荒則所留在南畝者惟老弱也而吏方曰不收為兵則恐為盗噫苟知一時之不為盗而不知其終身驕惰而竊食也古之長大壯健者任耕而老弱者游惰今之長大壯健者游惰而老弱者留耕也何相反之甚耶然民盡力乎南畝者或不免乎狗彘之食而一去為僧兵則終身安佚而享豊腴則南畝之民不得不日减也故曰有誘民之弊者謂此也此其耗之一端也古者計口而受田家給而人足井田既壞而兼并乃興今大率一户之田及百頃者養客數十家其間用主牛而出己力者用已牛而事主田以分利者不過十餘户其餘皆出産租而僑居者曰浮客而有畬田夫此數十家者素非冨而畜積之家也其春秋神社婚姻死塟之具又不幸遇凶荒與公家之事當其乏時嘗舉債于主人而後償之息不兩倍則三倍及其成也出種與税而後分之償三倍之息盡其所得或不能足其場功朝畢而暮乏食則又舉之故冬春舉食則指麥于夏而償麥償盡矣夏秋則指禾于冬而償也似此數十家者嘗食三倍之物而一户嘗盡取百頃之利也夫主百頃而出税賦者一户盡力而輸一户者數十家也就令國家有寛征薄賦之恩是徒盖一家之幸而數十家者困苦常自若也故曰有兼并之弊者謂此也此亦耗之一端也民有幸而不役于人能有田而自耕者下自二頃至一頃皆以等書于籍而公役之多者為大役少者為小役至不勝則賤賣其田或逃而去故曰有力役之弊者謂此也此亦耗之一端也夫此三弊是其大端又有竒衺之民去為浮巧之工與夫兼并商賈之人為僣侈之費又有貪吏之誅求賦斂之無名其弊不可以盡舉也既不勸之使勤又為衆弊以耗之大抵天下中民之士冨與貴者化粗糲為精善是一人常食五人之食也為兵者養父母妻子而計其饋運之費是一兵常食五農之食也為僧者養子弟而自豐食是一僧常食五農之食也貧民舉倍息而食者是一人常食二人三人之食也天下幾何其不乏也何謂不量民力以為節方今量國用而取之民未嘗量民力而制國用也古者冡宰制國用量入以為出一嵗之物三分之一以給公上一以給民食一以備凶荒今不先制乎國用而一切臨民而取之故有支移之賦有和糴之粟有入中之粟有和買之絹有雜料之物茶鹽山澤之利有𣙜有征制而不足則有司屢變其法以争毫末之利用心益勞而益不足者何也制不先定而取之無量也何謂不量天力之所任此不知水旱之謂也夫隂陽在天地間騰降而相推不能無愆伏如人身之有血氣不能無疾病也故善醫者不能使人無疾病療之而已善為政者不能使嵗無凶荒備之而已堯湯大聖不能使無水旱而能備之者也古者豐年補救之術三年耕必留一年之蓄是凡三歳期一嵗以必灾也此古之善知天者也今有司之調度用足一嵗而已是期天歳歳不水旱也故曰不量天力之所任是以前二三嵗連遭旱蝗而公私乏食是期天之無水旱卒而遇之無備故也夫井田什一之法不可復用于今為計者莫若就民而為之制要在下者盡力而無耗弊上者量民而用有節則民與國庻幾乎俱富矣今士大夫方共修太平之基頗推務本以興農故輙原其弊而列之以俟興利除害者採于有司也宋文選巻一
