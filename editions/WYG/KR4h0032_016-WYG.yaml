body:
  text: 宋文選巻十六石守道文上蔡侍郎書侍郎閣下夫物生而性不齊裁正物性者天吏也人生而材不備長育人材者君宰也裁正而後物遂性故曲者直者酸者辛者仆者立者皆得其和易曰乾道變化各正性命是也長育而後人材美故剛者柔者暴者舒者急者各得其中洪範曰㑹其有極歸其有極是也和謂之至道中謂之大德中和而天下之理得矣介者正所謂不合其中而不得其和者也喜怒哀樂未發謂之中喜怒哀樂之将生必先㡬動焉㡬者動之微也事之未兆也當其㡬動之時喜也怒也哀也樂也皆可觀焉是喜怒哀樂合於中也則就之是喜怒哀樂不合於中也則去之有不善知之於未兆之前而絶之故發而皆中節也易曰吉之先見不言凶而言吉者其能知善不善於幾微之時善則行之不善則改之凶何由而至也介見天下闕得其治則憤悶發於内而言語形於外已暴著於外猶不知恊於中闕於事邪欲其吉之先見發而皆中節其可得乎故凶悔吝當隨之冬集至闕下有人宻道閣下之語於介者箴規訓誡丁寕切至如聼箕子皇極之義若聞孔思中庸之篇釋然大覺前日之非噫天以剛方直烈之性授於介不納介於中夫剛方直烈不以中輔之暴殘戕折日可待矣今閣下敺介歸之於中是天以剛方直烈付於介閣下納之令德天欲暴殘戕折於介而閣下賜之更生也介荷閤下仁育陶宰為至厚矣今西走蜀四千里不敢以䟦渉為勞以平生未得一登閣下之門為恨引首南望不勝拳拳之心不宣介再拜上范經畧書夫天生時聖人乘時君子治時易之家人後有睽睽後有蹇蹇後有觧家人之道窮必乖故睽睽故難生不可以終難故受之以觧觧以觧其難也然則天下無事國家無不有難在治之矣黄帝之蚩尤舜之苖民禹之防風周之管蔡漢之諸呂七國唐之安史諸侯不能累黄帝疵舜禹痼周瘡漢病唐能治之也聖朝八十年始有賊昊之患國家與賊為家人今我與始乖故樹孽境上則正合大易之時也治此時也實屬於閣下蹇之繇曰利見大人正吉彖曰蹇難也險在前也見險而能止智矣哉利見大人往有功也當位正吉以正邦也其說謂非大人不能濟蹇非知者不能止險不當位與當位失正無以正邦故六二王臣蹇蹇匪躬之故二與五應二居臣位五居君位不以五在難中私身遠害而蹇蹇以進志扶王室故九五大蹇朋来觧之繇亦曰有攸徃夙吉言有難而徃以速為吉也賊昊犯順之明年天子則用閣下經畧矣殆一年未見成功讒害日進乃罷閣下而專任夏暨陳二公又半年賊昊轉暴熾社稷之靈寤於上遂罷二公而復閣下經畧初賊昊猖獗閣下尚謫守於吳人皆曰不用閣下賊不可破及劉石敗此論益喧然滿都下天子乃釋閣下罪益官進職與夏韓同節制陜西路閤下之謀未獲見用故成功緩且有間遂罷閤下今復起閤下專當一面雖足以極閤下之才亦畧足以施閤下之智矣噫閤下智施之四海有餘况一隅哉人将見賊昊之首置汴四門矣生是時也必生是人也人與時相遇故曰有非常之時然後有非常之事有非常之事然後有非常之功用兵四年卒無尺寸功此功歸於閤下矣淮西之賊五十年功卒歸裴度當時賊揣唐室公卿可畏者晉公矣遂陰使賊害之天地神祗扶持守䕶刀斫不死卒收蔡功賊昊揣境上諸將可畏者閤下矣遂以書間在朝公卿果有請誅閤下者頼天子聰明聖神閤下獲全晉公刀斫不死乃相憲宗擒元濟閤下書間不入乃復大任其亦卒破元昊乎介义觀兵興以来人多辭勞就逸憚險苟安獨閤下不愛其身不顧其家不惜其禄位極誠盡節以必得賊昊後歸為心此得王臣蹇蹇之節有攸徃夙吉之善天下以征西之任歸於閤下又閤下實有取元昊之才而復能盡忠臣之節區區元昊有不平乎介不才國家無事也不能有一言以助衣裳之治國家有事也不能持一矢以效干戈之用如閤下諸公皆暴露霜雪衣不敢煖食不敢飽士卒皆被甲胄冐鋒鏑入萬死岀一生民皆輸財轉粟饑渴道路乃獨夕而臥晏而起恬愉休逸飽水肥草自比於山鹿野麋豈所安乎然自視不肖無毫毛可施用竊為閤下得山東豪傑三人負罪而有才者二人沛縣梁構兖州姜潜任城張浻皆負文武材畧有英雄之氣習於兵勇於用智誠通敏精力堅悍若使各當一隊必能得士死心先諸将立功若使守一城捍一寨兹一城一寨遂為金湯不可得破若使儒衣綬帶隨元戎而周旋兵機戰謀惟元戎取之兹三人實豪傑之士也非閤下三人不肯事非閤下亦不能用兹三人構事劉顔子望潜事明復先生浻初事子望後事明復皆學有根蒂道有夲原其噐必深其用必遠固非淺近輕妄尚勇好兵之流也閤下幸厚用之所謂負罪而有才者二人前兖州奉符縣尉李温前宿州臨渙縣令曹起皆進士策名起亦事子望温亦事明復能知聖人之道樂蹈名節好履仁義守一官能勤且亷善養民䋲吏人頗受其福起刑一人至死以不得縣吏心及州帥善意自懼不能直棄官竄去温以不善事上官為苛吏籠置於深法平價買官騾一誣温損官錢數緡除名覊管滌州二人皆有才負志節慕忠義知兵集戰劉牧注師卦當行師用兵之時勝敵而已唯才能智勇是用不復録其行故陳平盗嫂韓信岀袴下黥布刑不妨為漢之功臣况兵家宜取負罪遺行之人用之何者負罪則世不録遺行則人不齒知其無以進於時而信於人終将廢矣則思效用以自補立功以自贖故兵書曰王臣失位思立其功者聚為一隊言必能决死以戰是以漢武帝賢良之詔求􅘆弛之士奔踶之馬取是道也温與起宜先收而不宜見棄閤下幸當留意晉公平淮西吏部馬總桞公綽諸人實助其功今閤下幕中固不乏人矣介以謂明堂所頼者惟一柱然衆材附之乃立大勲所任者唯一人然羣謀濟之乃成閤下幕中雖不乏人如構潜浻三人亦未可不取温等二人實宜備驅策介自視無毫毛可施用苟得五人者與朝廷立尺寸功足以贖介不肖之罪是敢冒將軍鈇鉞之威言兹五人取舍惟閤下命介不任拳拳之誠不次介頓首再拜與范思遠書思遠足下大江可渉也有黿鼉蛟螭横焉泰山可登也有虎豹豺狼當焉不斬其黿鼉戮其蛟螭江終不可渉也已不殛其虎豹殄其豺狼山終不可登也已聖人之道猶大江也猶泰山也今之為榛塞者其害何啻黿鼉蛟螭虎豹豺狼夫欲聖人之道大通四海上下流行而無阻礙必也先闢去其榛塞者距退楊墨然後孟子之功勝也排去佛老然後吏部之道行也思遠亦嘗思之乎介嘗謂他日有功於此者必在思遠與王建中熈道者故去年冬曽以書暨熈道文字十二篇附致思遠書中言熈道非有過實者但思遠未嘗深與之語自是迄於今凡六七月不聞命疑思遠不深以介為然介雖甚無識當與家人童孺言亦未嘗妄毁譽人敢誣於大君子乎思遠今欲追復古聖之道非熈道恐無可與同闢去榛塞者未知終以為如何與裴員外書裴君員外足下前日專使至厚貺長書目駭心悚流汗竟趾非所當矣咸章韶夏至樂也不奏於䕫牙之府而奏於鄙俚惡能審其聲而知其音也飛兎騕䮍逸馭也不騁於王樂之前而鬻於市人惡能審其駿而知其良也然而餒甚者人饋之以大牢雖食之不知其㫖而知貪乎味也如渴甚者人飲之以㫖酒雖啜之不知其醇而知嗜其甘也固亦心腹飽飫而靈府浹洽也噫文之弊已乆自桞河東王黄州孫漢公軰相隨而亡世無文公儒師天下不知所凖的猶學夫樂者不知六律之有統五音之有㑹而滛哇之聲百千萬變徒嚵嚵慆人心噪噪聒人耳終莫能適夫節奏而和於人神文之夲日壊枝葉競岀道源益分波𣲖彌多天下悠悠其誰與歸輕薄之流得斯自騁故雕巧纂組之辭徧滿九州而世不禁也妖怪詭誕之說肆行天地間而人不禦也今天下大道榛塞人無所由趍而之於堯舜周孔之聖人唯詰屈一經而已吾常思得孟韓大賢人岀為芟去其荆棘逐去其狐狸道大闢而無荒磧人由之直之於聖不有經曲小道如依大塗而行憧憧徃来舟車通焉適中夏之四海東西南北坦然廓然如動無有阻礙徃年官在汶上始得士熈道今春来南郡又逄孫明復韓孟兹遂生矣斯文之弊吾不復為憂斯道之塞吾不復以為懼也然則吾願與足下協施其力而助二人焉来書過稱将走六服之外至於萬百里而避之也豈敢當惟足下無中道叛去幸甚不宣介再拜與韓密學書經畧密學閤下有非常之事然後有非常之人有非常之人然後有非常之功近自唐觀之武氏變周易唐非常也梁公立非常之功禄山盗據兩京非常也汾陽立非常之功朱泚之亂非常也西平立非常之功淮西之賊非常也晉公立非常之功今元昊猖狂敢侮天子以夷狄而慢中國以螻蟻而亢至尊亦非常也求非常之人立非常之功莫若閤下聖君聰明能知人故自興師已来閤下獨當上注意曽未期嵗由中諫升為樞宻直學士是急非常之功於閤下也得不留意焉今用兵之處誠已得人然建大厦者非一材維泰山者非一䋲為梁公猶取張柬之桓彦範五人為之助為晉公亦以韓吏部馬總栁公綽諸君子為之佐然後功立成也前竊見閤下言貝州人趙三郎者深州人李七郎者彼徒以武力可任閤下尚且不遺之况於天下之豪傑哉泰山布衣孫明復沛縣布衣梁構太平布衣姜潜任城布衣張浻皆有文武資材仁義忠勇䇿謀畧可應大任國家無事時足容偃蹇山林嘯傲雲泉今邊冦内侮牽朝廷露師轉粟之勞煩吾君宵衣旰食之慮復等豈得申申燕居飽食高枕也閤下經畧陜西苟得四人實有以助成閤下非常之功不次介再拜與王建中秀才書四月四日徂徕石介謹致書王君茂材足下洪水方割下民其咨禹乘四載隨山刋木櫛風沐雨以安横流以平九州武王既定禍亂紂之餘民瘡瘠未合周公踐祚攝政一飯三吐哺一沐三握髮下白屋之士制禮作樂以成太平幽厲失道天下凌遲孔子絶糧於陳削迹於衛伐檀於宋歴聘七十國而不得用删詩書定禮樂賛易象脩春秋以祖述堯舜憲章文武斯三聖人固已勤矣固已勞矣然而卒不憚者息民患也行聖道也孔子既歿微言遂絶楊墨之徒榛塞正路孟子正人心息邪說距詖行放滛辭以闢楊墨說齊宣梁惠七國之君以行仁義炎靈中歇賊莽盗國衣冠墜地王道盡矣揚雄以一枝木扶之著太𤣥五萬言以明天地人之道作法言十三篇以闢揚正教魏晉迄陳隋帝王之道掃地而無遺矣生人之命遂絶而不救矣文中子以太平之策十有二篇干隋文帝不遇退居河汾之間續詩書正禮樂脩元經賛易道九年而六經大就佛老之教蠧於中國千百年矣韓愈憤然於千百年下孤力排毁不避其死論佛骨貶潮州八千里而志彌慤守益堅斯四賢者亦已勤矣亦已勞矣然而卒不憚者亦以息民患也行聖道也葢古聖賢方其天下未寕生人未安聖道未明以謂職在於已不敢安其居也方今正道缺壊聖經隳離滛文繁聲放於天下佛老妖怪誕妄之教楊墨汗漫不經之言肆行於天地間天子不禁周公孔子之道孟軻揚雄之文危言若綴旒之㡬絶先生不救吾徒豈得而安居乎雖不逮古聖賢遠矣亦當窮精畢力而後已庶幾其道由吾徒而後粗存猶愈於不為也足下生民之先覺者也適水者天下之人西而足下獨東矣葢滄海之所在也適山者天下之人之秦之越而足下獨之魯矣葢泰山之所處也適於東湏至於海至於海必渉其深然後知水矣之於魯湏登泰山登泰山必窮其高然後知山矣適於東不至於海如不東矣至於海不渉其深如不渉矣之於魯不登泰山如不之魯矣登泰山不窮其高如不登矣况其有中道而將止者乎介幸而不隨天下之人之秦之越而獨隨足下其援我手我其躡足下履牽連挽引庶能至焉慎無為半塗而廢者不宣上李雜端書雜端執事魏文公曰願為良臣不為忠臣良臣身獲美名君受顯號子孫傳福世世無疆忠臣身受誅夷君䧟大惡家國並䘮空有其名葢樂得堯舜而事之也夫稷契咎陶能得其時其道易行也龍逄比干不得其時其道難行也以堯舜為之君稷契咎陶為之臣朝立敢諫皷進善旌誹謗木闢四門達四聰明四目言有不從之乎諫有愎乎故身獲美名君受顯號桀紂為之君雖龍逄比干為之臣滅德作威敷虐萬方焚炙忠良刳剔孕婦言有從之乎諫有納之乎故身受誅夷君䧟大惡然堯舜為之君其道易行也必有稷契咎陶而為之臣其道乃行故身受美名而不讓桀紂為之君其忠難行也必有龍逄比干而為之臣其忠乃立故身受誅夷而不避稷契咎陶非擇其美名也龍逄比干非欲其誅夷也葢為臣之定分惟忠是守事君之大義惟忠是蹈雖世有治亂君有昏明為臣之分事君之義有去就乎忠有廢乎故龍逄比干死而不廢敢諫書曰為君難為臣不易文公於此所以惕懼而極言也今天子神明睿武負羲軒之姿道德過堯舜雄毅似禹湯静專而動闢淵黙而神聲一朝崛然立起於軒墀之上獨任萬㡬視前日政有紊綱紀者一發號令正七條事越五日又罷八御藥官頺風掃焉權臣屏焉教化政令自天子岀焉又三日引河陽舊相公居廊廟以摠大政任元老取青州牧天章閣范公領中司以執憲法用正人也召閤下自河北轉運使入霜臺以知雜事求直臣也留太常博士范仲淹為諫官以司獻替開言路也倬哉雄斷睿畧深謀大智其三王之舉也執事懐王佐才略魁閎亮直揭於朝右得堯舜之主而事之其道固易行也使身獲美名君受顯號獨讓稷契咎陶乎願為良臣獨無魏文公之盛心乎舜舉咎陶不仁者遠執事冠獬豸簮白筆執天子法䋲内外九品官無使不仁在君側春秋傳曰見無禮於其君者如鷹鸇之逐鳥雀焉夫日月天之目也日月沒氣祲掩六合天為之昏日月升烟霧闢四遐天為之明御史天子之目也御史曠厥職佞邪蔽九重君為之昏御史舉厥職姦醜竄四夷君為之明執事職彈舉日正色立於朝持天子綱紀肅正朝序無使佞邪蔽君之明天下綱紀在一臺之士臺綱正則朝廷正朝廷正則天下四海無不正者矣惟執事思厥職知所任既克思既克知克行其事易曰鼎折足覆公餗其形渥凶言不勝其任也孔子曰惟名與器不可以假人執事始以直道進亦以直道脩善之善者也無干大易折足覆餗之罪使天下有名噐假人之議所望於執事也介嘗聞於稠人廣衆中舉天下忠謇骨鯁之士則以執事為首天子聰明睿智察縉紳中能直言敢諫剛正不撓亦謂無過執事故天子發於精衷外取執事處於憲臺以持天子綱紀天下聞之皆曰天子能得人亦曰執事能稱職介忝嘗被大賢半顧之遇懼萬一有所不副天子意天下缺俾天子暨天下皆失知人則哲之明敢告之於初惟執事聼納焉上孔中丞書夫子之道不行於當年傳於其家直四十餘世以俟子孫如此其遠也夫子没後世有子思焉安國焉頴達焉止於發揚其言而已有漢相光唐相緯雖得位亦不能盡行其道夫子之道其肯鬰然蟠伏於其家乃躍起奮岀散漫於天下天下人皆可以得之漢高祖唐太宗能得之於上以之有天下三百年孟軻揚雄文中子韓愈能得之於下以之有其名於億萬世唯孔氏子孫無有得之者俟四十餘世僅二千年閤下乃得之今夫子之道不專在於天下在於閤下也閤下又且赫然有聲烈於天下復得位於朝見用於世閤下徒能得夫子之道其将以夫子之道事於聖君施於天下俾國家為二帝三王為兩漢為鉅唐矣夫子之志曰吾志在春秋春秋天子之事也世衰道微邪說暴行有作臣弑其君者有之子弑其父者有之夫子懼之而又時無君已無位不能誅不能正乃作春秋焉所以正王綱舉王法故春秋成亂臣賊子懼為司㓂則七日而誅少正卯於兩觀之下攝相事則齊終不敢窺兵河南當時之君則昏也當時之位則攝也尚不及閤下得明君有大位為中丞逾月而未聞有舉焉閤下在朝朝廷尚有姦臣敢在位天下蠧賊未悉除是夫子道猶未克盡舉豈夫子直四十餘世僅二千年以俟閤下宜念之且天子之設御史府尊其位崇其任不與他府並舊有大夫則中丞亞大夫而領其屬今大夫闕則中丞其長也故中丞之任特重焉中丞之責尤重焉君有佚豫失德悖亂亡道荒政咈諫廢忠慢賢御史府得以諫責之相有依違順㫖蔽上罔下貪寵忘諫專福作威御史府得以糾䋲之将有驕悍不順恃武肆害玩兵棄戰暴刑毒民御史府得以舉劾之君至尊也相與將至貴也且得諫責糾劾之餘可知也御史府之尊嚴也如軒陛之下廟堂之上進退百官行政教岀號令明制度紀賞罰有不如法者御史得言之御史府視中書樞宻雖若卑中書樞宻亦不敢與御史府抗威争禮而返畏悚而尊事之御史府之重其無與比然湏得如閤下者居之始貴矣易曰苟非其人道不虚行禮曰人存則政舉閤下聖人之後又能得聖人之道以方重剛正公忠清直烈烈在於朝為天子獻可替否賛謀猷持綱紀天下想望其風采者十五年間簡於清衷期将大用且歴試於外更觀其能連三大藩皆卓然有治聲聞於天宇浹於日下御史府中丞虚位日班於紫宸殿下佩金煌煌行聲鏘鏘且有百數天子弗録之乃南走三百里以驛召閤下直入其府登其位自陛下獨决萬幾来登崇俊良黜逐纎人革故鼎新百度備舉太平之望日月以隆然而天人之心猶鬰然不大舒釋者以閤下尚稽大任也至是天人之心始大舒釋矣閤下自初及終皆以直道進詩曰靡不有初鮮克有終介嘗聞朝大夫語曰有某官為某官時忠鯁讜直謇謇敢言觸龍逆鱗不避誅死由是人主知之聲名藹然聳動朝野不四五年取顯仕今為某官位彌高身彌貴禄厚惠渥私庭曵青綬者五六人門前炎炎可炙手顧此勢力榮寵有所惜也如有物塞其耳如有葉蔽其目如有鉗緘其口朝廷有闕政國家有遺事若不聞若不覩而不復言則向之忠鯁讜直謇謇敢言乃沽名耳其以為速進之謀乎噫士之積道德富仁義於厥身葢假於權位以布諸行事利於天下也豈有屑屑然謀夫衣食者歟正色直已立於朝以行其道乃使天下有此論庸無傷乎古今君子少小人多君子常不勝小人小人不惟常勝君子而又不能容之惡直醜正嚚嚚寔繁幸而有一君子在於朝則百小人排之非鐵心石腸剛正不折未有不從而靡者小人不容君子也今有人位未顯身在下能堅正不顧其身敢直言極諫犯天子顔色封章抗䟽論天下利害羣小人必叢立指㸃曰此人速進也沽虚名也非以行道也吁吾徒不見容於小人也不取信於天下也固若是乎學周公孔子之道不用則巻而懐之用之則肯已乎實将施及國家布於天下以左右吾君綏吾民矣羣小人排毁不已實可怪也閤下亦當大警戒之勿使天下有所論則君子幸甚天下幸甚不宣上蔡副樞書夫聖賢不徒生也四凶在朝堯德不明舜起佐堯流共工於幽洲竄三苖於三危放驩兠於崇山殛鯀於羽山洪水方割下民其咨禹乘四載隨山刋木决九川距四海成王㓜弱周公踐祚制禮作樂世衰道微邪説暴行有作王道失叙禮壊樂崩三綱將絶彛倫攸斁夫子作春秋明易象删詩書定禮樂祖述堯舜憲章文武楊墨塞路儒幾滅矣孟子作十四篇而闢之新莽簒漢道斯潜矣揚雄作凖易五萬言法言十三章而章之晉宋齊梁陳並時而亡王綱毁矣人倫棄矣文中子續經以存之釋老之害甚於楊墨悖亂聖教蠧損中國吏部獨力以排之故四凶去堯徳明洪水息蒸民粒禮樂作周太平六經就舜堯禹湯文武周公之道存楊墨闢孔教行法言脩莽惡顯續經成王綱舉釋老微中國乂是知時有弊則聖賢生聖賢生皆救時之弊唐季之荒頓五代之攙搶太祖一戎而夷之錢唐之不朝并州之未貢太宗傳檄而賔之真宗脩其制度明其法律章其物采和其政令正其禮樂通其教化陛下守之制度則脩矣法律既明矣物采既章矣政令既和矣禮樂既正矣教化既通矣然則時無弊乎曰何得而無之今之時弊在文矣夫有天地故有文天尊地卑乾坤定矣高卑以陳貴賤位矣動静有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣文之所由生也天垂象見吉凶聖人象之河岀圗洛岀書聖人則之文之所由見也觀乎天文以察時變觀乎人文以化成天下文之所由用也三皇之書言大道也謂之三墳五帝之書言常道也謂之五典文之所由述也四始六義存乎詩典謨誥誓存乎書安上治民存乎禮移風易俗存乎樂窮理盡性存乎易懲惡勸善存乎春秋文之所著也文之時義大矣哉故春秋傳曰經緯天地曰文易曰文明剛健語曰遠人不服則脩文徳以来之三王之政曰救質莫若文堯之徳曰煥乎其有文章舜則曰濬哲文明禹則曰文命敷於四海周則曰郁郁乎文哉漢則曰與三代同風故兩儀文之體也三綱文之象也五常文之質也九疇文之數也道徳文之夲也禮樂文之飾也孝悌文之美也功業文之容也教化文之明也刑政文之綱也號令文之聲也聖人職文者也君子章之庶人由之具兩儀之體布三綱之象全五常之質叙九疇之數道徳以夲之禮樂以飾之孝悌以美之功業以容之教化以明之刑政以綱之號令以聲之燦然其君臣之道也昭然其父子之義也和然其夫婦之順也尊卑有法上下有紀貴賤不亂内外不凟風俗歸厚人倫既正而王道成矣今夫文者以風雲為之體花木為之象辭華為之質韻句為之數聲律為之夲雕鏤為之飾組繡為之美浮淺為之容華丹為之闕對偶為之綱鄭魏為之聲浮薄相扇風流忘返遺兩儀三綱五常九疇而為之文也棄禮樂孝悌功業教化刑政號令而為之文也聖人職之君子章之庶人由之君臣何由明父子何由親夫婦何由順尊卑何由紀貴賤何由叙内外何由别而化日以薄風日以滛俗日以僻此所為今之時弊也曰時有弊必有聖賢生而救之者豈非吾明君與吾賢弼哉主上天資英威乃神乃聖剛健中正有乾之元徳聰明睿智有古之神武尸居淵黙則人不見其機龍興神悚則天下知其變如藝祖之武如神宗之英如眞宗之仁信乎明君也閤下射策冠天下士斯文未䘮蔚然宗工人其代之承帝理物夙夜宥宻䌤綸天地之化惟時惟幾裁成天地之道如䕫益如稷契信乎賢弼也以明君賢弼相與救乎斯文之弊易如反掌矣然而斯文重噐也舉之者在乎衆力斯文大弊也革之者必乎逾時天下有志憤斯文之弊力求斯文之夲其身履道心守正閤下豈不欲引之使施力焉竊見鄆州鄉貢進士王建中其人孜孜於此者二十年矣其道則周公孔子之道也其文則栁仲塗張晦之之文也其行則古君子之行也仲塗没晦之死加之公疎繼往子望亦逝斯文其無歸矣建中獨能得之建中一布衣耳貧且賤栖栖鄉閭間父母㫖甘不繼豈能振起哉上有明君倡之賢弼和之使建中承音接響傳而之天下匪朝伊夕聲充盈於宇宙矣文不正弊不革未之有也斯百數十年之弊雕刓元化之文物傷亂風教莫斯之甚閤下一日能救之則閤下之功與舜禹周公孔孟揚雄文中子吏部並美閤下幸留意焉噫建中其天下賢乎豈止於文而已其噐識備而材用足智謀周而宇範遠施之於事王佐才也識時運知進退常岀處明顯晦言必信行必果喜過服義閑邪存誠其近古之中庸者乎安貧守節非其義一介不取於人非其人未嘗與之徃還亷介清愼不屈權貴不畏強禦如復孝亷建中其首當之介嘗與之遊入齊中竊得其文十篇皆化成之文也若夫言帝王之道則有道論明性命之理稱仁徳之貴則有夀顔論根善惡之夲窮慶殃之自則有善惡必有餘論大聖人之言辨注者之誤則有畏聖人言論舉五常之夲究禍福之謂則有原福上下篇明鬼神之理存教化之大則有原鬼篇守正背邪遺近趨遠則有隨時觧達聖人之時廣夫子之道則有夫子得時辨擇賢養善察姦除惡則有莠辨今皆獻之此其小者也未得其一二建中在京師可令盡冩看則見其人矣亦知介不妄也昨夲州李屯田若䝉曾状其實聞上乞時召試策今聞依例禮部就試萬一失其人是失天下之賢也亦可為國家惜之伏惟閤下特留意焉介官州縣也身卑賤也名微且昧也建中至单薄也至𦕈小也閤下至貴重也至顯崇也以州縣卑且賤微且昧之人薦至单薄至𦕈小於至貴重至顯崇不亦僣矣葢知建中之深今走天下求知建中者惟閤下矣捨閤下則建中無歸矣故不敢逃僣越之罪直冒大賢以聞干凟鈞嚴云云不宣介再拜上趙先生書謹上書先生左右介近得姚鉉文粹及昌黎集觀其述作有三代制度兩漢遺風殊不類今之文曰詩賦者曰碑頌者曰銘賛者或序記或書箴必夲於教化仁義根於禮樂刑政而後為之辭文者驅引帝王之道施於國家敷於人民以佐神靈以浸蟲魚次者正百度叙百官和隂陽平四時以舒暢元化輯安四方今之為文其工者不過句讀妍巧對偶的當而已極美者不過事實繁多聲律調諧而已雕鏤篆刻傷其夲浮華縁飾䘮其眞於教化仁義禮樂刑政則缺然無髣髴者易曰文明以止觀乎人文化成天下春秋傳曰經緯天地曰文堯則曰聰明文思禹則曰文命敷于四海周則曰郁郁乎文哉漢則曰文章爾雅訓辭深厚今之文何其衰乎去唐百餘年其間文人計以千數而斯文寂寥缺壊乆而不振者非今之人盡不賢於唐之人盡不能為唐之文也葢其弊由於朝廷敦好時俗習尚漬深積漸非一朝一夕也不有大賢奮袖於其間崛然而起將無革之者乎唐之初承隋陳剥亂之後餘人薄俗尚染齊梁流風文體卑弱氣質脞叢猶未足以鼓舞萬物聲明六合建章武皇帝負羲軒之姿懐唐虞之材卓然起立於軒墀之上以武公戢定海内刮疵剔瑕乾清坤寕以文徳化成天下驚潜燭幽雷動日潤韓吏部愈應期㑹而生學獨去常俗直以古道在已乃以空桑雲和千數百年希濶冺滅已亡之曲獨唱於萬千人間舉人耳慣所聴唯鄭衛惉滯之聲忽然聞其太古之上無為之世雅頌之音恍惚茫昧如䘮聰如失明有駭而亟走者有陋而竊笑者有怒而大罵者叢聚嘲噪萬口應答聲無窮休愛而喜前而聴隨而和者唯栁宗元皇甫湜李翺李觀李漢孟郊張籍元稹白樂天輩數十子而已吏部志復古道奮不顧死雖擯斥摧毁日百千端曾不少改所守數十子亦皆恊賛附㑹能窮精畢力效吏部之所為故以一吏部數十子力能勝萬百千人之衆能起三數百年之弊唐之文章所以坦然明白揭於日月渾渾灝灝浸如江海同於三代駕於兩漢者吏部與數十子之力也今天子繼明守成道徳高厚功業巍然直與唐並今卿士大夫垂紳曵組森森布列行義超然直與唐比獨斯文邈乎不可視於唐居上者㸃畫語言猝織章句如彼畫工不知繪事後素以為質但誇其藻火之明丹漆之多如彼追師不知良玉不琢以為美但誇其雕刻之工文理之縟載毫輦筆窮山刋木横刻其文字布於天下以為後進式後進耳所習聞聲名赫奕位望顯盛者惟是不知前人有孟軻揚雄董仲舒司馬相如賈誼韓愈栁宗元之才之雄也目所常見制作滛麗文辭侈靡者唯是不知前世有三代鉅唐之文之懿也父訓其子兄教其弟童而朱研其口長而組繡於手天下靡然向風寢以成俗吁無變之者有以待先生也如唐之弊變之待吏部也繼唐之文章紹吏部之志唯先生能先生無與讓先生識與天地相際接學臻古今藴奥名節徳範人倫師表所謂有臯䕫之才伊呂之志周孔之道軻雄之文施之於一國之間和風仁聲油然其洽矣施之於廊廟之上皇猷帝功卓然其成矣而命與才戾四十始登一第仕纔得上農夫之禄料不能得居廟堂之上調爕元化訏謨百度堯舜其君仁夀其民也天豈虚生先生於世哉傳曰五百年一賢人生孔子至孟子孟子至揚子揚子至文中子文中子至吏部吏部至先生其騐歟孔子至孟子孟子至楊子楊子至文中子文中子至吏部皆不虚生也存厥道於億萬世迄於今而道益明也名不朽也今滛文害雅世教隳壊扶顛持危當在有道先生豈得不為乎仲尼有云吾欲託之空言不如見之行事深切著明也先生如果欲有為則請先生為吏部介願率王建中之徒為李翺李觀先生唱於上介等和於下先生擊其左介等攻其右先生掎之介等角之又豈知不能勝兹萬百千人之衆革兹百數十年之弊使有宋之文赫然為盛與大漢相視鉅唐同風哉語曰當仁不讓於師孔子不曰天之未䘮斯文也孟子不曰我亦欲正人心息邪說距詖行放滛辭以承三聖揚子不曰後之塞路者有矣竊自比於孟子文子不曰千載之下有紹宣尼之業者吾不得而讓也吏部不曰釋老之害過於楊墨吾欲全之於已壊之後使其道由愈而粗傳盖知其道在已不得而讓也今也道寔在於先生先生豈得讓乎介竊痛斯文衰道不充力不足不能救世有賢儒君子天下所屬意豈特區區小子竊有望乎左右先生留意焉宋文選巻十六
