body:
  text: 宋文選巻三十張文潛文進齋記古之君子無須臾而不學故其為徳無須臾而不進鷄鳴而興暮夜而休一日之間出則蒞官治民事師友對賔客入則事其親撫其家敎其賤㓜振其族姻與誦說講辨上世聖賢之言語文章制度服物而燕樂則御琴瑟布尊爼拜俯升降酬酢相侑勉勉汲汲須臾之間習其事學其理通其曲折而服其訓戒蓋其學無頃刻不切於心非特其迹然也安居無事精思而深念之矯揉其心志調伏其氣質觀天地之道察萬物之理以究道徳之微妙而通其性命死生之始末者亦未始有頃刻之休是故其徳日進而不可止蓋自其息而察之則豈特日進哉晝之所逹過于旦夜之所得加于晡矣豈特旦暮晡夜之别哉一語一嘿一起居而新故不相襲矣自其為士而至聖人也如日之運于天小之為旦夜中昃之變大之為寒暑春秋之異然微細而察之則雖求毫釐絲忽之間而不可得嗚呼士之欲進于道其勤苦勉強蓋必如是而後至則亦以勞矣後世之士其不至于聖人也亦可知矣古之君子飲食游觀疾病死生之際未嘗不在于學士㑹食而問殽烝則飲食之際未嘗不學也夫子風乎舞雩詠而歸則游觀之際未嘗不學也㑹子病而易大夫之簀則疾病之際未嘗不學也今之所謂學者既剽盗其肌膚攘剟其土苴比于古之人可大媿矣然少而習之未㡬見而自以為業成者十九也冠而仕則冠而棄之壯而仕則壯而棄之以夫滅裂苟偷之習而亟捨于既仕之日故後世之君子大抵從仕數年則言語笑貎嗜欲玩習之際比之進取之初以儒自名者固已大異矣古之君子其學也内以修身外以治人所學愈髙所治愈修而成功愈崇是故君子立于世則天下被其福嗚呼三代之衰儒者之功不大見于世而生民之望于君子者未能厭滿其欲豈非士之學未至而道未及哉嗚呼民之休戚係于道學之成否則夫為士可不勉歟冀州州學記朝廷以學校道藝敎天下之士亦已久矣而其興衰亦繫其守長之能否慶厯中始詔郡縣立學而信都乃即孔子廟而為之僅以塞詔其後為守者欲興之數矣皆不果成元祐某年河東劉侯守冀始大作學舎師之授經有堂而諸生肄業有室凡學之百需皆具精壯完好可以傳久逺又為之買良田治市舎籍其所入以養士而士之來學者日有餼學之有司月有給其秀民良才從其先生長者皆往㳺焉四方之士聞而來者日至劉侯喜其有成而使其屬李公輔請文于譙郡張耒以記之為之言曰嗟乎政事之緩急如人之于飲食不可彊也强使急者緩如止飢者之食強使緩者急如待食以進飽二者無怪其不可也余嘗怪今之士大夫皆能責守令不如古者興學校隆師儒讀書行禮其中而為守令者雖責之不受亦不害其為政論守令之能否與夫人民之利病亦絶不在此何也三代之時天子諸侯之有學其朝夕政事之所係不啻如今省寺之要且急也自出師受成獻馘皆必由之則一士之不率敎至勤天子公卿而親臨焉蓋無足怪當此之時雖欲緩而不治亦不可得先王之俗既亡更數千嵗風俗禮樂既已大異矣而朝廷郡縣之政視學校無毫髪相及而乃日夜責之以不如古我則無用而强授之此何為者也且不怪夫冠者之不為章甫騎者之不為四馬而獨怪學校之不如三王不亦異哉夫求三王之治不立學是廢食于飢而必責學校于今日猶強食于飽必不行矣由是言之學之興廢其本未遠矣吏未有責也夫未可以責吏則劉侯之為此殆苟然歟蓋昔者子貢欲去告朔之餼羊子曰爾愛其羊我愛其禮夫不告朔而去羊未害也然使後世有知告朔者自此羊始以今之政為無事于學而不可為也因我之無用而毁古人之所急安知來者之不有作乎此劉侯之所不忍也侯之意深矣元祐四年十二月十七日記伐木記人與物各以其氣相勝而後能全夫氣也者假其所託而後有者也夫長江大河積水之淵俯視杳然莫知其深長波巨𣲖出沒奔突近窺而神寒遠視而目竦此則蛟龍虬蜃魚黿之所託以禦物之害己者而全其生者也髙山大麓緜亘盤屈翳以林薄捍以木石縈溪絡澗懸壁千仞使人望而不敢近近則畏而走此則虎豹熊羆之所託以禦物之害己者而自全其生者也使虎豹窺魚龍之淵蛟黿視熊羆之藪則惶怖疾走而求去之矣何則物各以其所託者見其氣氣勝則非其類者避之矣今夫􅓜祠墟墓之間入者惨然而心不寧目不敢肆視足不敢肆㳺其音肅肅如畏是何也業祠墟墓鬼神之所託而人之氣不勝故也夫唯氣勝者全故氣不勝者受其病故虎兕蛟鼉易其所處則其心悲沮而無聊者病之所從入也余官福昌古邑之廢者也官舍依山為地十餘畆其竹與木居十六地曠人寡草木茂遂其大者皆百餘年根幹蔽覆若幄若屋交羅籠絡縈以蔦蔓凡日將旦夕將晦鳥鳴獸號聲音千百終日閴然不聞人聲夫環為城通為衢限為域立為屋室闢為塲圃夷易洞逹内外相應面陽而背隂附燥而瞰濕間以草木表以臺觀人之所託也惟其所託者若是故禽獸不敢藏蛇蚖無所蟠居之而安㳺之而樂而人之氣乃能勝其異己者是故無疾患無驚惕壽考安樂逺去疾厲而今吾之所居草木居大半矣其堅頑碩老無以異于藪澤此則鳥獸之所慿而蛇虺狐貉之所樂而人之所居乃其棄餘則凡使吾四鄰之外晨夜而不敢出其心矜矜若畏敵國一夕數興寢而不夢是豈非蛇虺狐貉之氣勝而人之所託者弱耶於是聚吏徒集斧斤一日之役十夫不三日而盡伐之剖根窮本芟伐剪剔大者備梁柱小者中椽杙弱者補籓籬惡者從薪蒸洒掃墾除平地乃見隂陽䟽通表裏洞然屋室堦闥如湧而出于是鳥獸之聲狐貉之迹不復至矣朝㳺而足不忌夜處而心不惕吾知人之氣勝矣夫氣也者起乎其所類發乎其所託莫知其然而然者也何則物以類處者未嘗自見其氣也所託者無情不能與物為使也至其相待而後成相感而後發自外而視之隠然不可無也大荒之瀕行者反顧久廢之室寢者數驚推之而無故窮之而無物故物之未始有形而不可慢者其氣也歟雙槐堂記古之君子其將責人以有功也必使之樂其職安其居以其優㳺喜樂之心而就吾事夫豈徒苟悅之哉凡人之情其將有為也其心樂而為之則致精而不苟雖殫力費心而不自知故所為者有成而無難古之御吏也為法不苛其勤惰宻踈隨其人之所欲而吾獨要其成是古之循吏皆能有所建立夫望人以功而使其情愁怛不樂求捨去之不暇誰肯以其怨沮不平之心而副我之所欲哉頃時予見監司病郡縣之政不立扼腕盛怒曰是惟飲食燕樂居處㳺觀之好吾日夜以法督責之使無得有一于此一嵗之日數計晷刻吾從而課率之使無得有頃刻之閒以約束為不足而繼以辱罵辱罵為不足而繼以訊告方此時吏起不待晨卧不及暖廢飲食冒疾病屋室敗漏不敢修完器用敝乏不敢改作其勤苦如是猶不足以當其意宜其郡縣之政無所不舉大小得職而民物安堵矣然吏益姦民益勞文書具于有司而事實不立吏足以免其身之責而民不知徳相為欺紿以善一時而監司卒亦不得而察也豈非其所為者無至誠喜樂之心出于畏罪不獲巳苟以充職故耶其事功之㓕裂如此理固然也酸棗令王君治邑有能名以其餘力作燕居之堂洒掃完潔足以宴賔客閱圖書庭有雙槐因以為名夫王君豈以謂苟勞而無益不若暇佚而有功將安其居樂其身以其獄訟簿書之閒與賢士大夫彈琴飲酒歡欣相樂舒心而養神使其中裕然然後觀物圖其致用意于文法尋尺外以追古循良君子之風以大變俗吏之弊而為之哉夫古之善為政者不佚而常安不勞而善成吾知王君其有得于此矣扵是為之書陵川縣山水記陵川河東之窮邑也其民蓋有唐晉之餘風儉樸而敦本而澤潞在唐為雄鎮以精兵聞天下故其民好武為健鬬夫以儉樸好武之民則其于山水竒勝之觀宜其忽而不治委棄而不惜也今縣令張侯以暇日與其僚逰于縣西南所謂四梁拒者見其風景稍異披榛而得二泉焉其一出石下激石而聲琅然張君名之曰潄玉其一出大石下而石狀如龜因名之曰龜泉㑹二水而注之石螭之口以下達于大池構亭于泉側名曰爽氣亭後為石磴磴窮為小亭名之曰白雲軒而其喬林秀木水石竒麗之狀皆悅可人意而不可以言盡也孔子曰仁者樂山智者樂水夫盡仁之成名必若堯舜而語智之正必若禹然世之好山水者豈皆具聖人之成徳哉予以謂凡安靜可久淳厚而不變者皆仁之類也臨事而不滯遇物而不惑者皆智之類也張君從予㳺其行巳撡術其為仁智之類有餘矣而又好學而甚文予意其為政滋久政事日信于民以其簿書之簡日徜徉于山水之間仰喬木而俯清泉資之以煙雲魚鳥之麗把酒賦詩與夫雜見于文字言語者將超然出塵㧞俗而恨未之見也政和元年五月漢光武廟記南頓令江君惇裕以書屬耒曰吾邑有漢世祖􅊍武皇帝祠邑人奉祠甚謹而昔人所記陋甚君為我述焉將刻石以詔後世耒辭之不可謹按光武皇帝以哀帝建平元年生于濟陽而皇考欽實為南頓令帝嘗從父于此既得天下亦屢臨幸蓋平生之所逰處則邑之有祠所從來久矣豈獨水旱疾癘之請有賜于民亦其豐功盛徳後世有不能㤀者故南頓之民世祠之惟謹蓋無足怪漢自成哀不君權歸外家王莽卒盗而有之天下大亂民心思漢惟世祖以匹夫起田畆出入行陣躬夷大難勇無堅敵智無遺策故能祀漢配天光復舊物一時羣雄芟夷略盡撫有方夏覃及蠻貊聲敎所暨比隆武宣是宜英鷙強伉玩兵黷武視民如草芥而不講于治國之事也而武功既成海内既定則抑功臣進文吏投戈講萟息馬論道英偉之度屈于禮樂驍猛之氣束于儒學敦尚經術接賓客延儒雅開廣學校修明典禮煥然一變舊漢之俗蓋常以謂吾理天下欲以柔道行之至于明章繼志承統纘修洪業典章文物粲然大備故後世言禮樂稽古推東漢焉孝和以後漢徳不競破壊板蕩可謂極矣而仗莭死義之士如袁安楊震李固陳蕃之徒救于上符融郭泰范滂許卲之徒助于下矜尚名莭以震激衰弊蹈死而不悔至于獻帝人主持號而已而曹操終不敢身自取之彼其心誠有所畏故也蓋禮樂之功風化之美足以保國長世如此皆世祖之遺烈也嗚呼自三代以來一人而已建武十九年南廵進幸南頓縣舎置酒㑹賜吏人復南頓田租一嵗父老前叩頭言皇考居此日久陛下之寺舎每來輒加厚恩願賜復十年帝曰天下重器嘗恐不任日復一日安敢逺期十嵗吏人又言陛下實惜之何言謙也帝大笑又増一嵗中元元年又復南頓繇役同之濟陽則帝之于是邦豈若他邑漠然而已乎髙祖曰吾萬嵗後魂魄猶思沛吾意光武于南頓亦云崇寧元年五月二十日司馬溫公祠堂記元祐元年九月甲子丞相司馬公薨朝廷議所以追崇之于是進爵為公而國于溫惟司馬氏係出晉安平獻王孚而獻王河内溫人也故推本其故家而封之五年奉議郎王仲儒為溫令告其邑人曰惟司馬公道徳功烈著于朝廷施及生民者自匹夫匹婦與夫荒外戎狄悍夫姦民心革誠服左右兩宫格于太平是其功徳宜配社稷天下祀之而溫者國也顧不能祠而可乎于是度地作堂畫公像而禮祠焉告于譙郡張耒使記之耒為之言曰盛徳之不作于世久矣古之所謂盛徳者不施而民服無事而民信未嘗動顔色見詞氣而天下從之若子弟之慕父兄故其為功也不勞而物莫之能禦三代之亾聖賢不作而士之能有所立于世者亦多矣然皆費心殫力招天下而從之以其智勝之後能有成是何也徳不足而取辦于其才故也故其所建立勞苦而淺陋夫豈不欲為盛徳之事哉蓋其所積者有不足故也子產君子也猶曰唯有徳者能以寛服民其次莫如猛夫子產豈欲為猛哉以謂徳之效實難懼夫好髙之難成也是以甘心于其次以求無失嗚呼徳者子產之所難而况其下者乎故自秦漢而後更千有餘嵗而盛徳之士不作蓋無足怪惟司馬公事君而君敬之未嘗求民而民與之非其類者有不合而無不信受其罰者有不說而無敢謗其自洛入覲也郡邑田里至于京師觀者千萬環聚嗟嘆至于泣下嗟乎此可以言語術智得之哉故其相天下也因物之所利而與之因人之所厭而更之從容指麾内外響應而天下無事矣蓋自秦漢以來至公而盛徳之效始見于世可謂盛矣嗚呼當大事處大疑勇者招敵智者召謀惟有徳而後萬物服則夫二聖之所以用公其可知也夫耒辱㳺公之門而喜王君之好徳使以其說書于堂而刻之二宋二連君祠堂記治國有善政不如在位有善人之化民速也在位有善人不如其鄉有善人之化民易也夫人之情所感動常在其所易接而親者若夫政事者固民之所畏則其從之蓋有不得已之心焉其及物淺矣安陸之應山楚之窮邑也然其民好文多學者其俗良善不爭純靜易治其里之人為余言曰始吾邑之人未始知學之利也有宋氏兄弟者講學吾邑之法興佛舎其後兩人皆取髙第有聲名久之並為大官名尊益顯所以吾邑之人其鄙䝉不學自棄扵學者愧之其居法興時有連氏兄弟者與二宋君㳺相好也其後亦登科兩人起家仕不振然視所同舎生冨貴先顯可攀為聲勢而兩人亦自力不少屈己以附之其官終不顯故吾邑之人其不篤于廉耻徼倖貪利者愧之凡吾邑之俗好學而文純靜有耻者四君子之化也後五十年宋景文之孫羲年令應山與連君之從子仲儒縁邑人之意作祠堂于法興方丈之西嗚呼為吏于鄉其有思徳久而民祠之者㡬人在位之人不如其鄉里之君子也二宋公之行事爵里書于國史士大夫舉知之連君錫以尚書職方員外郎致仕好修而自重諒直多聞之君子也其仲諱庠字元禮為尚書都官郎中敏于政事號良吏世稱王陽在位貢禹彈冠為故舊之美然嚴光所以為帝逃之不肯仕彼獨何哉連君不因宋君以顯名當世卒以湮没而不悔被誠知所處與世俗所謂顯晦異矣宋文選巻三十
