body:
  text: 宋文選卷二十九張文潛文送秦少章赴臨安主簿序詩不云乎蒹葭蒼蒼白露為霜夫物不受變則材不成人不涉難則智不明季秋之月天地始肅寒氣欲至方是時天地之間凡植物出于春夏雨露之餘華澤充溢支莭美茂及繁霜夜零旦起而視之如戰敗之軍卷旗棄鼓裹鎗而馳吏士無人色豈特如是而已于是天地閉塞而成冬則摧敗拉毁之者過半其為變亦酷矣然自是弱者堅虛者實津者燥皆斂藏其英華于腹心而各效其成深山之木上撓青雲下庇千人者莫不病焉况所謂蒹葭者乎然匠石操斧以入于林一舉而盡之以充棟梁桷杙輪輿輹輻巨細強弱無不勝其任者此所謂損之而益敗之而成虐之而樂者也吾黨有秦少章者余為太學官時以文章示余愀然而告曰我惟家貧奉命于大人而勉為科舉之文也異時率其意為詩章古文往往清麗竒偉工于舉業百倍元祐六年及第調臨安主簿舉子中第可少樂矣而秦子每見余輒不樂余問其故秦子曰余世之介士也性所不樂不能為言所不合不能交飲食起居動靜百為不能勉以隨人今一為吏皆失已而為物之應小自偃蹇禍悔隨至異時一身資養于父母今則婦子仰食于我欲不為吏亦不可得自今以往如沐漆而求解矣余解之曰子之前日春夏之草木也今日之病子者蒹葭之霜也凡人性惟安之求夫安者天下之大患也遷之為貴重耳不十九年于外則歸不能霸子胥不奔則不能入郢二子者方其羇窮憂患之時隂益其所短而進其所不能者非如學于口耳者之淺淺也自今吾子思前之所為其可悔者衆矣其所知益加多矣反身而安之則行于天下無可憚者矣能推食與人者嘗飢者也賜之車馬而辭者不畏徒步者也苟畏飢而惡步則將有苟得之心焉為害不既多乎故隕霜不殺者物之災也逸樂終身者非人之福也元祐七年仲春十一日書送吳怡序吾友吳熙老好學樂善敏于為吏不苟于其職嘗主簿于蘄之羅田部使者才之使尉黃岡余舊與之相聞而來黃岡也余方坐事屏居而熙老獨喜從豫遊余謂之曰余棄人也又負罪于有司子與罪人遊且纍君熙老不然猶喜豫翰墨言語得之輒寶藏余年老多病學問日衰落文字尤荒熙老所求十不能答一二而熙老意益勤不倦夫人之好惡之不可解如此居黃岡無數月又遷蘄水丞將去黃求豫言贈其行余為之不能無言曰子盍觀于貨乎所操者愈竒則藏之也愈深知之者愈寡然一旦而得所售則萬金之直有不較而樂輸之者方其未售也閉肆而處終日寂然其鄰里莫知也而持盤賣餅兒日一自操盤而出自譽其貨呶呶也千人之聚則往即之自旦至夜勞力如此得百錢之直之外則偃然有過望之喜矣夫所操者不厚則自處也薄夫自處也薄則亦無所不至矣其理然也君子進德修業夙夜強學其所操者豈萬金之貨也哉吾願熙老好善愈勤樂善愈富為吏而有賜于民多積而深藏之自愛而重出之則將名譽充于四海出入紫闥訏謨黃閣可跂而俟也敢以是為遺行之言章祕丞集序古之論人者考其人不計其功固有其才可以為而不幸不及施與既施而中奪者何可勝數而中材常人乘時以功名顯者世常有之孟子曰若夫成功則天也夫成敗繫天者其未可以賢不肖必也司馬子長論李將軍為將其言哀痛反覆深悲其無功以謂百姓知不知皆為流涕至論霍去病無他美獨曰常有天幸不至乏絶夫子長不少假借于屢勝之去病而獨拳拳于老死之李廣何哉彼惟深痛夫庸人冒時以取名而豪傑之士制於命而不得少就其志故其豫奪之際如此嗟夫豈獨人事哉凡物亦然大夏生殖而叢棘能有所庇疾風烈寒大木百圍僵仆而死秋水時至溝畎有一溉之功而嵗旱淵竭江河不足活魚鱉物固係其所遭者哉今年春豫遇友人會稽章邦老于宛丘一見豫再拜泣涕出其先人祕丞君詩文三編及其行狀求豫文以為之序其文章議論甚髙而嘆其不大施設也送秦覯從蘇杭州為學序秦子善文章而工為詩其言清麗刻深三反九復一章乃成大抵悲愁鬱塞無聊者之言也其于物也秋蛩寒蟬鵙鴂猿狖之號鳴也霜竹之風氷谷之水楚囚之弦越羈之呻吟也嘻秦子內有事親之喜外有朋友之樂冬裘而夏絺甘食而清飲其中寧有介然者而顧為是耶世之文章多出于窮人故後之為文者喜為窮人之辭秦子無憂而為憂者之辭殆出此耶吾請為子言之古之所謂儒者不主于學文而文章之工亦不可謂其能窮苦而刻深也發大議定大䇿開人之所難感內足以正君外足以訓民使于四方鄰國寢謀言于軍旅敵人聽命則古者臧文仲叔向子産晏嬰令尹子文之徒實以是為文後世取法焉其于文也雲蒸雨降雷霆之震也有生于天地之間實賴之是故係萬物之休戚于其舌端之語默嗟夫天地發生雷雨時行子獨不聞之而從草根之蟲危枝之翼呼以相求子亦窮矣夫古之所謂儒者所用之國無敵若臧文仲叔向子産晏子令尹子文其望孔子亦逺矣而其功烈亦足以振顯一時故猶能以儒者之效名一世夫不足以治國而能知古今考妖祥紀事實多聞而博通則古者太史氏之職而初不以是為儒者也楚左史倚相能讀三墳五典八索九丘而楚之治國不責倚相由是言之古之論史與儒異事而司馬談為太史號通古今善文詞猶曰文史星厯近乎卜祝之間主上以倡優畜之其尊禮不如公孫丞相汲黯此則漢之初猶有古之遺俗在也嗚呼儒之名實不正久矣自漢以來聖賢之學廢而孔子之徒皆以其師之書自重于世聚徒而授之若是者當時皆以儒之名歸之而司馬談序九流儒者才當其一彼未嘗見其真而信當時之所指故從而論其失而班固以謂出古司徒之官嗚呼何其陋也儒者之治天下九流之列皆其用也顧與淺末術數各致其一曲者同哉吾意今儒者之所學古太史之流而非世之所急也子饗其全無食其餘據其源無挹其流子方從眉山公其以豫言質之而歸告余也賀方回樂府序文章之于人有滿心而發肆口而成不待思慮而工不待雕琢而麗者皆天理之自然而情性之道也世之言雄暴虓武者莫如劉季項籍此兩人者豈有兒女之情哉至于過故鄉而感慨别美人而涕泣情發于言流為歌詞含思悽惋聞者動心焉此兩人者豈其費心而得之哉直寄其意耳余友賀方回博學業文而樂府之詞絶妙一世携一編示豫大抵倚聲而為之詞皆可歌也或者譏方回好學能文而惟是為工何哉余應之曰是所謂滿心而發肆口而成雖欲巳焉而不得者若其粉澤之工則其才之所至亦不自知也夫其盛麗如遊金張之堂而妖冶如攬嬙施之袪幽潔如屈宋悲壯如蘇李覽者自知之蓋有不可勝言者矣李德載字序表弟李成甫字公輔告余以不安其字也求易之詩不云乎其車既載乃棄爾輔載輸爾載將伯助豫無棄爾輔員于爾輻屢顧爾僕不輸爾載夫車之所載或安焉或輸焉係之于輔之棄與不棄也則輔之于車功亦大矣雖然輔之于物有功于車而非車也考一車之物而輔不與焉然正六轡謹輪輻僕在前馬伏軛而輔不至車不安登險而憂傾涉淖而憂濡視車中之載如寄物焉且天下之物固有不相有而相須不同域而相感者豈獨輔也哉千金之裘成于工人之十針南越之箭激于飛鳥之遺闕火蘊於石而金發之兵切于膚而甲拒之故其在人則學是也夫學之于人非性之所素能也而性不得學則不明故夫子曰我非生而知之好古敏以求之夫人之得于天者其道素具矣四端之於我非外鑠我者也堯舜之于塗人其本則一而已彼為是堯舜塗人之别者學不學異也性在巳學在物自外而視之相去亦逺矣而堯跖由之物固不能無待而獨成哉夫學有道道有序循其序而積之者行而能遠涉而能髙夫下則鳥獸蟲魚器械服物之理無不通中則修身正家治天下之業無不立上則逹性命通死生官天地府萬物獨立于萬物之上而無與為侣而學庶乎至矣雖然有患忽小而務大躐等而求至者吾惡之久矣自燕之秦者必之晉自魯厯楚者必厯衛天下之所共由而不能越者也夫無見乎小而能眀大與不涉乎等而能速至者其可信也哉故保性以為車力學以為輔而載爾德焉則周流天下徉徜海外以求子所欲其有不得者乎子以德載易之齋説上先王之為祭祀也非以徒厭吾心而已其心庶幾以為實也于是乎有齋焉夫齋者聖人之所以交鬼神而求接其所不可測者也夫鬼神可得而交不可測者可得而接則祭祀者豈特塞其情而已耶夫天下之物莫妙于人心其靜而不搖則萬物不得藏其私其誠而不散則天地隂陽之無情而吾心可以動焉其為物也至虛而易染至明而易汙蓋人之生自幼以至于老無非假物以滅其真益私智以盜其和其虛而明者日夜暗蔽而不發故其智之所至不過其耳目情智之所及而不足以行逺于是自其形之所不能接者棄而不治以謂是果不可得而交也豈知夫天下之亹亹皆不能出于吾心使還吾之初而不喪則吾未見夫不可為者蓋聖人之於祭祀也其至誠惻怛之心將求見其所祭者于是有齋焉夫齋也者去其所蔽滌濯昏蒙而發其虛明之天質者也是故謹戒靜肅使夫亂吾心者一不至于吾前故靜久則虛虛極則明至于明矣則荒忽而不測流散而無形者昭然吾得以接之矣古之言齋唯揚雄知其説其言曰存亡形屬荒絶者其唯齋乎故余於齋而得心術焉齋説下聖人之于齋也將以清其心而接其所祭交其形之所不及而格其心之所不至蓋其道非出于祭祀而後設也其原乃出于治心推其治心之術而用之于祭祀而已矣然則何謂心術蓋齋者聖人之所以洗心滌慮以盡天下之理者也彼其心淵靜沖泊萬物不足以入之故舉天下之亹亹日夜交于前而不足以入吾之靈府動靜並作而不相亂往來同應而不相害凡吾所受于天者無纎毫為之蔽心完質具而天下之道盡矣大至于天地廣至于萬物至頥不能伏其情至遠不能遁其實而天下之理得矣故能贊造化參天地鬼神叶其吉凶隂陽關其動靜推是道于祭也有不格者乎故齋而後臨祭者是清心以鑒物之説也聖人之于孝也篤於誠而盡于禮矣設之稻粱庶羞以致其欲求之于隂陽內外以致其氣然以謂是為未盡而思所以必致之故考初推本而制為齋戒之義還吾本真以格物之散復吾清明以求物之隱故曰齋之日必見所祭者嗚呼祭之有齋也祭之道極矣藥戒張子病痞積于中者伏而不能下自外至者悍而不能納從醫而問之曰非下之不可歸而飲其藥既飲而暴下不終日而向之伏者散而無餘向之悍者柔而不支焦膈𨗳逹呼吸開利快然若未始有疾者不數日痞復作投以故藥其快然亦如初自是逾月而痞五作五下每下輒愈然張子之氣一語而三引體不勞而汗股不勞而栗膚革無所耗于外而其中薾然莫知其所來嗟夫痞非不可已余從而下之術未爽也而吾之薾然者獨何歟聞楚之南有良醫焉往而問之醫嘆曰子無嘆薾然者也凡子之術固為薾然者也坐吾語汝天下之理有甚快于子心者其末必有傷求無傷于終者則初無望于快吾心隂伏而陽蓄氣與血不運而為痞橫乎子之胸中者其纍大矣擊而去之不須臾而除甚大之纍和平之物不能為也必將擊搏震撓而後可夫人之和氣沖然而甚微泊乎其易危擊搏震撓之功未成而子之和氣蓋已病矣由是觀之則子之痞凡一快者則子之和一傷矣不終月而快者五則子之和氣不既索乎故膚不勞而汗股不勞而栗薾然如不可終日也且將去子之痞而無害於和乎子歸燕居三月而後藥可為也張子歸燕居三月齋戒而復請之醫曰子之氣少完矣取藥而授之曰服之三月而痞少平又三月而少康終年而後復常且飲藥不得亟進張子歸而行其説其初使人悶然蓋三投其藥而三反之也然日不見其所攻之效久服則月異而時不同蓋終嵗而疾平張子謝而問其故醫曰是治國之説也豈特醫之于疾哉子獨不見秦之治民乎勑之以命悍而不聽令勤之以事放而不畏法令之不聽法之不畏則秦之民嘗痞矣商君見其痞也厲以刑法威以斬伐徑悍猛鷙不貸毫髮痛剗而力鉏之于是秦之政如建瓴流蕩四逹無敢或拒而秦之痞嘗一快矣自孝公以至二世凡幾痞而幾快矣頑者已圮強者已柔而秦之民無歡心矣故猛政一快者歡心一已積快而不已而秦之四肢枵然徒有其物而已民心日離而君孤立于上故匹夫大呼不終日而百疾皆起秦欲運其手足肩膂而漠然不我應矣故秦之亡者是好為快者之過也昔先王之民其初亦嘗痞矣先王豈不知砉然擊去之為速也惟其有懼于終也故不敢求快于吾心優柔而撫存之教以仁義𨗳之禮樂隂解其亂而除去其滯使其悠然自趨于平安而不自知方其末也旁視而悶然者有之矣然月計嵗察則前嵗之俗非今嵗之俗也不擊不搏無所忤逆是以日去其戾氣而不嬰其歡心於是政成教逹安樂悠久而無後患矣是以三代之治皆更數聖人歷數百年而後俗成則余之藥終年而愈疾者蓋無足怪也故曰天下之理有甚快于豫心者其末也必有傷求無傷于其終則無望于快吾心雖然豈獨于治天下哉張子出而記其説諱言髙宗自誅長孫無忌放禇遂良等後天下以言為諱者二十餘年其後一御史嘗抗論一不急事時謂鳯鳴朝陽方其以言為諱也武氏不出房闥而取其國天子自殿陛之下門闕之外顛倒錯亂無由知之而其左右忠臣良士豈無良䇿善計亦不敢告故以牝奪雄坐房奧奪廟社犯天下之至順為天下之難成而有功此譬如盜入主人之家執其主塗其耳目而唯其所為何求而不得哉張子曰天將亂人之國則必使諱人之言人之愛其身其寢食起居有少異焉而人告之則必信之又從而治之夫如是則可以終身而無病今其寢食起居類非平人之狀而其親戚朋友旁視而不敢告一日病作而死矣太宗以蘭陵公主園賞言者其直百萬非好名也事當然也敢言漢王鳳以外戚輔政殺王章以杜天下能言之口而梅福以南昌尉上書顯攻之而不忌唐文宗時中人握禁兵制天子樞密使權過宰相誰敢少忤其意而劉蕡對䇿肆言其惡斥其篡弒廢立之罪而明皇時李林甫為相幾二十年固寵市權愚瞽其君內助楊氏之勢外成祿山之亂補闕杜璡嘗再上書論事斥為下邽令林甫以語動其餘曰立仗馬終日無聲飫三品芻豆一鳴則黜之矣後雖欲不鳴得乎由是諫爭路絶矣夫林甫威未慘于漢庭之外戚唐文宗之宦官也而梅福劉蕡敢犯之而林甫以區區貶斥而天下之士震怖如畏虎狼此其故何也王鳯得政之初帝失德未深猶可與論道理商成敗而漢之公卿猶有賢智忠義之士也文宗太和二年名臣在朝者如裴度李絳韋處厚之徒猶有數人公卿侍從之間差可告語其勢猶足以持典刑也故此二子者非妄發恣行而心實有所恃也若林甫之時人主淫昏于上視天下之治亂如越人視秦人之肥瘠不可與言矣而朝廷之士有一介之善略能别白黑者林甫斥之而無餘矣國空無人上下內外皆從君于昏者也而天下之士雖欲有言何恃以救其禍乎此人之所甚畏也嗚呼國無善人國非其國也可不惜哉明皇嘗論林甫曰此子妬賢嫉能無與為比則其時人物可知也讀韓信傳或問韓信服髙帝乎豫曰韓信為髙帝將數年常將重兵滅大國而動以蒯通武涉之邪説信無所顧召之而至令之而行何為不服曰然則何卒反乎曰信服髙帝之智力而不服其為人是以反也然則何也夫信之反非重失楚也在于偽遊雲夢而執之也夫偽遊雲夢之計是市井下俚之智而萬乘之主親行之此信所以怏怏北面而薄其君以謂不足為其下也夫暴奪人之冨貴而幽囚之欲使夫雄傑者帖然而無怨非服之以德屈之以理則不可夫以市井下俚之䇿而詐韓信彼身可執心輕其上矣彼且聞其計出于謀臣則君臣皆輕矣是不反何待然則為髙祖者奈何必待夫反形明白乃明其罪引天下兵誅之耳信雖難制然不數年而定一偽遊而縛韓信自爾出令天下誰敢信之歟自古士有所負而功名見于世者未嘗有肯以身輕就人者也何者彼輕就人者其規矩凖繩將在彼矣夫如是則我之所有安得盡布之哉且保鏌鎁之利者不以試薪售和氏之璧者不登門彼皆不求人而人求之若不得已焉而後即之者亦自其理然也韓信當秦之亡天下之窮士也非孔孟進退之莭然蕭何獨察其非汲汲于求顯待之不厚禮之不至則不為用也故以髙帝之倨必使之築壇齋戒偹禮而後官之舉之三軍之下而加之諸將之上而不疑知不若是信將不滿而無留心矣諸葛亮戰國之䇿士也髙卧于隆中其主就而後起而後能使劉備三分天下而伸于強敵彼孫武求試兵法于宫人叔孫通度上所能行而制禮其事業功名卒以不顯有以也夫讀唐書古之人主自中庸以上為理所屈皆能行之而誠未必加也若漢文帝之于務農唐太宗之于從諫幾于誠矣或問二君之誠孰愈豫謂文帝寡于言而意有餘未嘗為外貌觀美煩于辭令而形于制度不過詔令丁寧而已而身之所履則可信不誣矣夫知稼穡必尚儉彼身衣弋綈足履革舄集書囊于殿帷罷露臺却走馬此其意可見也太宗每見賢臣則求詳諫援引古今出入經傳慷慨歎息語必成文雖無害于聞過而有好名之心焉此于誠有所不及也意有餘者忘言實已修者忘名理之必然也文皇常恨不撲殺此老文德皇后問誰帝曰魏徴夫太宗之信用徴如此而猶有殺心焉則其平日之厚敬而深信之或未必情也且好諫者不諱其過而魏徴以諫草與史臣帝聞而怒遂有仆碑罷婚之事何怒之深也如此二事或者疑而不信豫謂或有之矣髙宗之淫昏孱暗又內為悍妻操制其柄外聚羣不逞于朝而禍不及其身也有以也非幸也其智蓋有足以自衛者彗見東方言者以為髙麗將亡之祥帝曰髙麗小夷且亦吾民也夫是言能出諸其口則有不可欺者矣以廢子賢之故怒某人嘗與交通令其父訓其子父殺之帝聞而不喜也更貶其父夫刑政能如是則希其意者必相戒而天下聞之猶有父子之義焉夫能酌理而不盡欺參以義而諂有所不受使其應變之際十五出此足以保其身矣書唐吐蕃傳後自漢以來其能制四夷使不為中國患者莫若唐然獨一區區之吐蕃能困之豈其制之未得其術耶自太宗以來固已屢失其術而其尤可笑者平涼之盟也匹夫操刀而殺人則必從容伺察待其不偹而後發執刀而呼曰束爾手吾將汝殺則雖賁育不敢施于三尺之童何則人固不可易也不然則必狂疾者也使之束手而待之告之殺而不避也則亦必狂疾者也吐蕃之於唐固非有深誠篤信之可以不虞也方德宗之時吾方疑之彼曰必使多爾大臣而後盟惟杜希全李觀而後可擇其地利則曰必梨木林而後可彼得殺吾之大臣而劫二將以空涇原靈夏之備而擇險阻之地以為設伏之利此其必變之迹特未曰吾將變耳乘彼吾疑而直行其謀而求我成之其易我也甚矣而唐之將相大臣晏然不之虞如接君子長者與之握手壇上而不少備此何以異于將殺之則告之束手而偃然不拒而待死者哉彼渾瑊者忠有餘而智不足者也古之善將者逺至于鄰國之動靜皆知之夫豈有他術哉測之以謀而伺之以實爾夫縛其二將而不知三萬之卒伏于肘腋而不覺也則安在其為智也嗚呼平涼之盟所以大可歎也彼尚結贊之智何足貴也是殺人而告之束手者之智也其為智亦殆矣彼李晟之知不可與盟也是知人殺之則避者之智也其可否之間亦明矣當是時唐之臣如渾瑊馬燧者亦可謂善將矣而猶如此况無二臣者哉書韓退之傳後有問於張子者操賞罰榮辱以勢臨天下者莫不欲天下勸沮于其賞罰取舍于其榮辱而其勢常有所不行蓋有益勸而人益羞愈沮而人愈慕若韓退之于唐殆若此矣退之所自負與世之所推者于德莫如好直于萟莫如文章然以直取禍則逐山陽貶潮陽以文章招纍則其文詞一世莫尚試于有司屢試而屢黜平生所述國家大事獨有平淮西碑耳然刋者未畢而磨者至也是宜沮喪湮滅與世俱亡泯然無所見于世矣然每斥而名益彰每沮而事益顯抑者之力不勝譽者之舌雖退之亦自謂動而得謗名亦隨之是誠何説也張子曰是何足怪昔者先王之賞罰榮辱所以天下奔走而從之者惟其取天下之所欲勸者而賞且榮之取天下之欲沮者而罰且辱之故賞一人而人勉惟恐其不若也罰一人而人懼惟恐其似之也且先王安能以巳之所好惡而力驅天下以從我哉直取天下之榮辱而制天下之向背耳彼唐之汙政其昏惑瞀亂無所取𠂻制好惡可否于一巳之私智而濟之以蔽欺之姦何怪夫所沮者人慕所進者人耻歟且彼惟不可抑也是以愈抑而聲愈振子獨不見夫千仞之水決而注之川乎大木梗之大石捍之排以巨峽道以髙麓而後怒號哮吼聲振百里抑之者愈大則其聲也愈暴故小遏之則小鳴大塞之則大震何則彼其勢惟不可止故也何怪夫身益困名益聞也題賈長卿續髙彥休讀白樂天事髙彥休作唐闕史辨白樂天無因母墜井作賞花新井詩賈子又從而續辨之張子曰二子之謂愛白公則可矣未可謂知白公也古之聖賢誰能無謗何獨樂天也哉有謂舜囚堯而奪之位伊尹放太甲而王世未嘗有辨舜與伊尹之非篡者也其心誠知其不然則辨無自而萌于心是其為説無待而自然人之飽者人誣之以飢未有自疑而辨其非飢者人知舜與伊尹之非篡如自信其飽雖或從而誣之而不在辨之之域矣故凡世之辨巳與辨人其言雖工而察其心之始萌蓋其于信嘗有所不足而後不能無言彼雖不能無疑于其初其考于理校于迹而後能消其不信之心於是乎有辨故曰二子未可謂知白公也嗚呼小人之害君子也亦多術矣謗之于意外惑之于疑似世之君子傍視而不平者起而與之辨夫惟辨起知之所不足故縱言極口而益召天下之多言多言繁興而是非足以兩行于世夫惟真知而泯言者而後謗止夫世之真知君子者才幾人則小人之毁賢敗善何時而止耶悲夫書宋齊丘化書後齊丘偽唐謀臣其智特犬鼠之雄耳何足道哉其為化書雖皆淺機小數亦微有見于道德其能成功有以也吾嘗論黃老之道德本于清淨無為遣去情纍而其末多流為智術刑名何哉夫惟靜者見物之情而無為者知事之要據其要而中其情者智術之所從出也仁義生于恩恩生于人情聖人莭情而不遣也無情之至至于無親則忍矣此刑名之所以用也齊丘之道既陋而其文章頗亦髙簡有可喜者其言曰君有竒闕天下不親雖聖賢出斯言不廢宋文選卷二十九
