body:
  text: 宋文選卷五司馬君實文中和論呈韓秉國與景仁君子從學貴乎博求道貴乎要道之要在治其方寸之地而已大禹謨曰人心惟危道心惟微惟精惟一允執厥中危則難安微則難明精之所以明其微也一之所以安其危也要在執中而已故中庸有曰喜怒哀樂之未發謂之中發而皆中節謂之和君子之心於喜怒哀樂之未發未始不存乎中故謂之中庸庸常也以中為常也及其既發必制之以中則無不中節中節則和矣是故中和一物也養之以中發之以和故曰中者天下之大本也和者天下之逹道也智者知此者也仁者守此者也禮者履此者也樂者樂此者也政者正其不然者也刑者威其不從者也合而言之謂之道道者聖賢之所共由也豈惟人哉天地之所生成萬物靡不由之故曰致中和天地位焉萬物育焉孔子曰君子無終食之間違仁造次必於是顛沛必於是故曰道不可須臾離可離非道也孔子曰中庸之為德也其至矣乎民鮮久矣又曰回也其心三月不違仁其餘則日月至焉而已矣日月至焉者斯已賢矣以是觀之能久於中庸者蓋鮮矣孔子曰知者樂仁者壽蓋言知夫中和者無入而不自得能無樂乎守夫中和者清明在躬志氣如神能無壽乎詩曰樂只君子邦家之基樂只君子萬壽無期又曰樂只君子邦家之光樂只君子萬壽無疆蓋言君子有中和之德則邦家安榮既樂且壽也孔子曰克己復禮為仁蓋言禮者中和之法仁者中和之行故得禮斯得仁矣孔子閒居曰無聲之樂志氣不違以至於氣至既起樂記曰易直子諒之心生則樂以至於不言而信不怒而威蓋言樂以中和為本以鐘鼓為末也商頌曰不競不救不剛不柔敷政優優百祿是遒蓋言政以中和為美也大雅曰惠此中國以綏四方無縱詭隨以謹無良蓋言刑以中和為貴也孔子曰飯蔬食飲水曲肱而枕之樂亦在其中矣又曰回也一簞食一瓢飲不改其樂揚子曰紓朱懷金之樂也外顔氏子之樂也內蓋言聖賢內守中和雖幽隱貧賤不失其樂也劉康公曰民受天地之中以生所謂命也能者養之以福不能者敗以取禍中庸曰大德者必得其壽蓋言君子動以中和為節至於飲食起居咸得其宜則隂陽不能病天地不能夭雖不道引服餌不失其壽也孟子曰我善養吾浩然之氣夫志氣之帥也氣體之充也志至焉氣次焉故孟子養德以氣言之蓋能謹守中和之志不以喜怒哀樂亂其氣則志平氣順德日新矣故曰持其志無暴其氣及夫德之成也沛然不息確然不動挺然不屈故曰至大至剛以直養而無害不有道義以充其內能如是乎故曰配義與道無是餒也凡人為不善能欺天下之人不能欺其心雖忍而行之於其心不能無芥蒂焉然則浩然之氣不存矣故曰行有不慊於心則餒矣君子優游從容以養其氣雖不敢忽忘亦不正以為事欲其速成故曰必有事焉而勿正心勿忘勿助長也操之則存捨之則亡久而無怠然後能自得之此其所以難言也揚子曰藏心於淵美厥靈根君子存神於內應務於外雖往來萬變未嘗失其所守是以百骸治而德本植焉故曰神不外也志之所至氣必輔之君子乘之以為善小人乘之以為惡故曰氣者所適善惡之馬也君子守中和之心養中和之氣既得其樂又得其壽夫復何求哉孔子曰狂者進取又曰吾黨之小子狂簡斐然成章如光之謂矣雖然此皆纂述聖賢之言非取諸胸臆也夫道猶的也射者莫不志於的其中否則未可知也必俟有道者乃能裁之再與秉國論中和呈景仁丁通直來䝉貺書審起居安和至喜示喻見與景仁書似怪論議有所不同此何言哉朋友道廢久矣光述中和論所以必欲呈秉國者正為求切磋琢磨庶幾近於是耳豈欲秉國雷同而已雅聞秉國有論光不勝其喜故因景仁請見之何謂怪也然光至愚於秉國之論猶有所未逹者請試陳之惟秉國擇焉秉國云中之說有二對外而為言一也無過與不及一也此誠如所諭然中者皆不近四旁之名也指形而言之則有中有外指德而言之則有中有和此書以中為名其所指者蓋德也非形也如秉國所云則中庸應云喜怒哀樂之未發謂之中及其既發謂之外不則云喜怒哀樂之未發謂之虛發而皆中節謂之和乃相應也秉國又云虛則明塞則暗此誠如所喻然所謂虛者非空洞無物之謂也不以好惡利害蔽其明是也夫心動物也一息之間升天沈淵周流四海固不肯兀然如木石也惟賢者治之能止於一擇其所止莫如中庸故虞書曰惟精惟一允執厥中也凡人固有無喜無怒無哀無樂之時當此之際其心必有所在小人則追求嗜好靡所不之君子則處於中庸之地不動以待事也大學曰知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得又曰為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信言各有所在也荀子曰德操然後能定能定然後能應能定能應夫是之謂成人亦言所定在德也又曰人何以知道曰心心何以知曰虛一而靜心未嘗不藏也然而有所謂虛不以所已藏害所將受謂之虛心未嘗不兩也然而有所謂一不以夫一害此一謂之一心未嘗不動也然而有所謂靜不以夢劇亂知謂之靜然則虛者固不謂空洞無物靜者固不謂兀然如木石也凡曰虛曰靜曰定云者如大學與荀卿之言則得中而近道矣如佛老之言則失中而逺道矣光所以不好佛老者正以其不得中道可言而不可行故也借使有人真能獨居燕坐屏物棄事以求虛無寂滅心如死灰形如槁木及有物歘然來感之必未免出應之則其喜怒哀樂未必皆能中節也曷若治心養氣専以忠為事則物雖輻凑橫至一以中待之無有不中節者矣秉國又引王弼解復其見天地之心以證虛無為衆本之所自出夫萬物之有誠皆云出於無既有則不可以無治之矣光常病輔嗣好以老莊解易恐非易之本指未足以為據也輔嗣以雷動風行千變萬化為非天地之心然則為此者果誰耶夫雷風日月山澤此天地所以生成萬物者也若皆寂然至無則萬物何所資耶天地之雷雲風雨猶人之有喜怒哀樂必不能無亦不可無也故易曰雲行雨施品物流形詩曰君子如怒亂庶遄沮君子如祉亂庶遄已但動靜有節隱見有時不可過與不及過與不及皆為灾害必得中然後和和然後能育萬物也自有天地以來陽極則隂生隂極則陽生動極則靜靜極則動盛極則衰衰極則盛否極則泰泰極則否若循環之無端萬物莫不由之故曰一隂一陽之謂道此皆天地之心然復者陽生之卦也天地之大德曰生故聖人贊之曰復其見天地之心乎言天地之道雖一往一來本以好生為心也易道幽深而輒敢妄為之解其罪甚大亦不自識其是與非也抑求之空言不若驗之實事竊聞秉國平日好習靜光不勝區區願秉國試輟習靜之心以為習中之心動靜語默飲食起居皆在於中勿須臾離也久而觀其所得所失孰少孰多則秉國必自得之矣豈待光之煩言哉愚慮如此所不及者不惜更示不宣五規并進狀臣光幸得備位諫官竊以國家之事言其大者逺者則汪洋濩落而無目前朝夕之益陷於迂濶言其小者近者則叢挫委瑣徒足以凂聖聽失於苛細夙夜惶惑口與心謀涉歷纍旬乃敢自决與其受苛細之責不若取迂濶之議伏以祖宗開業之艱難國家致治之光美難得而易失不可以不慎故作保業隆平之基因而安之者易為功頽壞之勢從而救之者難為力故作惜時道前定則不窮事前定則不困人無逺慮必有近憂故作逺謀燎原之火生于熒熒懷山之水漏于涓涓故作重微象龍不足以致雨畫餅不足以療饑華而不實無益於治故作務實合而言之謂之五規此皆守邦之要道當世之切務戅陋狂瞽觸冒忌諱惟知納忠不敢愛死伏望陛下萬幾之餘游豫之間垂精留神特賜省覽萬一有取裁而行之則臣生于天地之間不與草木同朽矣保業天下重器也得之至難守之至艱在昔始受天命之時天下之人皆我所比肩也相與角智力而爭之智竭不能抗力屈不能支然後肯稽顙而為臣當是之時有智相偶者則為二相參者則為三愈多則愈分自非智力首出於世則天下莫得而一也斯不亦得之至艱乎及夫繼體之君羣雄已服衆心已定上下之分明強弱之勢殊則中人之性皆以為子孫萬世如泰山之不可搖也於是有驕惰之心生驕者玩兵黷武窮泰極侈神怒不恤民怨不知一旦渙然四方潰縻秦隋之季是也惰者沉酣宴安慮不及逺善惡雜揉是非顛倒日復一日至於不振漢唐之季是也二者或失之強或失之弱其致敗一也斯不亦守之至艱乎臣竊觀自周室東遷以來王政不行諸侯多僣分崩離析不可勝紀凡五百有五十年而合於秦秦虐用其民十有一年而天下亂又八年而合於漢漢為天下二百有六年而失其柄王莽盜之十有七年而復為漢更始不能自保光武誅除僣僞凡十有四年然後能一之又一百五十有三年董卓擅朝州郡瓦解更相吞噬至於魏氏海內三分凡九十有一年而合於晉晉得天下才二十年惠帝昏愚宗室構難羣胡乘釁濁亂中原散為六七聚為二三凡二百八十有八年而合於隋隋得天下才二十有八年煬帝無道九州幅裂八年而天下合於唐唐得天下一百有三十年明皇恃其承平荒於酒色養其疽囊以為子孫不治之疾於是漁陽竊發四海橫流肅代以降方鎮跋扈號令不從朝貢不至名為君臣實為仇敵陵夷衰微至於五代三綱頺絶五常殄滅懷璽未暖處宫未安朝成夕敗有如逆旅禍亂相尋戰爭不息流血成川澤聚骸成丘陵生民之類其不盡者幾希於是太祖皇帝受命於上帝起而拯之躬被甲胄櫛風沐雨東征西伐掃除海內當是之時食不暇飽寢不遑安以為子孫建太平之業大勛未集太宗皇帝嗣而成之几二百二十有五年然後大禹之迹復混而為一黎民遺種始有所息肩矣由是觀之上下一千七百餘年天下一統者五百餘年而已其間時時有小禍亂不可悉數國家自平河東以來八十餘年內外無事然則三代以來治平之世未有若今日之盛者也今民有十金之産猶以為先人所營苦身勞志謹而守之不敢失墜况於承祖宗艱難之業奄有四海傅祚萬世可不重哉可不慎哉夏書曰豫臨兆民懍乎若朽索之馭六馬周書曰心之憂危若蹈虎尾涉於春氷臣願陛下夙興夜寐兢兢業業思祖宗之勤勞致王業之不易援古以鑒今知太平之世難得而易失則天下生民至於鳥獸草木無不幸甚矣惜時夏至陽之極也而一隂生冬至隂之極也而一陽生盛衰之相承治亂之相生天地之常經自然之至數也其在周易泰極則否否極則泰豐亨宜日中孔子傳之曰日中則昃月盈則蝕天地盈虧與時消息而况於人乎况於鬼神乎是以聖人當國家隆盛之時則戒懼彌甚故能保其令聞永久無疆矣凡守太平之業其術無他如守巨室而已今有巨室於此將以傳之子孫為無窮之規則必植其堂基壯其柱石彊其棟梁厚其茨蓋髙其垣墻嚴其關鍵既成又擇其子孫之良者使謹而守之日省月視欹者扶之弊者補之如是則亘千萬年無頺壞也夫民者國之堂基也禮法者柱石也公卿者梁棟也百吏者茨蓋也將帥者垣墉也甲兵者關鍵也是六者不可不朝念而夕思也夫繼體之君謹守祖宗之成法苟不隳之以逸欲敗之以讒諂則世世相承無有窮期及夫逸欲以隳之讒諂以敗之神怒於上民怨於下一旦渙然而去之則雖有仁智恭儉之君焦心勞力猶不能救陵夷之運遂至於顛沛而不振嗚呼可不鑒哉今國家以此承平之時立綱布紀定萬世之基使如南山之不朽江河之不竭可以指顧而成耳失今不為已乃頓足扼腕而恨之將何益矣詩云我日斯邁而月斯征夙興夜寐無忝爾所生時乎時乎誠難得而易失也逺謀易曰君子以思患而豫防之書曰逺乃猷詩曰猷之未逺是用大諫昔聖人之教民也使之方暑則備寒方寒則備暑七月之詩是也今夫市井負販之人猶知旱則資車水則資舟夏則儲裘褐冬則儲絺綌彼偷安苟生之徒朝醉飽而暮饑寒者雖與之共為編户貧富必不侔矣況為天下國家者豈可不制治於未亂保邦於未危乎詩曰逮天之未隂雨徹彼桑土綢繆牖户今此下民或敢侮豫孔子曰為此詩者其知道乎能治其國家誰敢侮之逮天之未隂雨者國家閒暇無有灾害之時也徹彼桑土者求賢於隱微也綢繆牖户者修敇其政教也夫桑土者鴟梟所以固其室也賢俊者明主所以固其國也國既固矣雖有侮之者庸何傷哉臣竊見國家邊境有急羽書相銜或一方饑饉餓莩盈野則廟堂之上焦心勞思忘寢廢食以憂之當是之時未嘗不以將帥之不選士卒之不練牧守之不良倉廩之不實追責前人以其備禦之無素也幸而熢燧息年榖登明王舉萬壽之觴于上羣公百官歌太平縱娛樂於下晏然自以為長無可憂之事矣嗚呼使自今以往四夷不復犯邊水旱不復為灾則可矣若猶未也則天幸安可數恃哉陛下何不試以閒暇之時思不幸邊鄙有警饑饉荐臻則將帥可任者為誰牧守可倚者為誰雖在千里之外使之嘗如目前至於甲兵之利鈍金榖之盈虛皆不可不前知豫謀也若待事至而後求之則已晚矣四夷水旱事之細也抑又有大於是者陛下亦嘗留少頃之慮乎詩云維此聖人瞻言百里維彼愚人覆狂以喜此言逺謀之難知近言之易行也夫謀逺則似迂似迂則人皆忽之其為害至慘也亦無切身之急為利至大也而無旦夕之驗則愚者抵掌謂之迂也宜矣國家之制百官莫得久於其位求其功也速責其過也備是故或養交飾譽以待遷或容身免過以待去上自公卿下及斗食自非憂公忘私之人大抵多懷茍且之計莫肯為十年之規况萬世之慮乎自非陛下惕然逺覽勤而思之日復一日長此不已豈國家之利哉此其所以痛心泣血日夜而憂也昔賈誼當漢文帝之時以為天下之勢方病大瘇又苦􅏓盩又類辟且病痱陛下視方今國家安固公私富實百姓樂業孰與漢文然則天下之病無乃更甚乎失今不治必為痼病陛下雖欲治之將無及已治之之術非有他竒巧也在察其病之緩急擇其藥之良苦隨而攻之勿責目前之近功期於萬世治安而已矣重微虞書曰兢兢業業一日二日萬幾幾之為言微也言當戒懼萬事之微也夫水之微也捧土可塞及其盛也漂木石沒丘陵火之微也勺水可滅及其盛也焦都邑燔山林故治之於微則用力寡而功多治之於盛則用力多而功少是故聖帝明王皆消惡於未萌弭禍於未形天下隂被其澤而莫知其所以然也周易坤之初六曰履霜堅氷至霜者寒之始也氷者寒之極也坤之初六於律為林鍾於厯為建未之月陽氣方盛而隂氣已萌物未知之也是故聖人謹之曰履霜堅氷至言人君者當絶惡於未形杜亂於未成也繫辭曰知幾其神乎君子知微知彰知柔知剛萬夫之望謂此道也孔子謂魯哀公曰昧爽夙興正其衣冠平旦視朝慮其危難一物失理亂亡之端君以此思憂則憂可知矣太宗皇帝命昭宣使河州團練使王繼恩討蜀平之宰相請除繼恩宣徽使太宗不許曰宣徽使位亞兩府若使繼恩為之是宦官執政之漸也宰相固請以繼恩之功大他官不足以賞之太宗怒切責宰相特置宣政使以授之真宗皇帝欲與章穆皇后及後宫游內庫后辭曰婦人之性見珍寶財貨不能無求夫府庫者國家所以養六軍備非常也今耗散之於婦人非所以重社稷真宗深以為然遂止由是觀之先帝以睿明卓越防微杜漸如此之深可不念哉昔扁鵲見齊桓侯曰君之疾在腠理不治將深桓侯不悅曰醫之好利也欲以不疾為功及在血胍在腸胃桓侯皆不信及在骨髓扁鵲望之遂逃去徐福言霍氏太盛宜以時抑制漢宣帝不從及霍氏誅人為訟其功以為曲突徙薪無恩澤焦頭爛額為上客故未然之言常見棄及其已然又無所及夫宴安怠惰肇荒淫之基竒巧珍玩發奢泰之端甘言卑辭啓徼幸之徒附耳屏語開讒賊之門不惜名器導僣逼之源假借威福授陵奪之柄凡此六者其初甚微朝夕狎玩未睹其害日滋月益遂至深固比知而革之用力百倍矣伏惟陛下思萬幾之至重覽大易之明戒誦孔子之格言繼先帝之聖志使扁鵲得早從事毋使徐福有曲突之嘆則可以隆之於廟堂而德冒四海治之於今日而福流萬世也優游逍遙而光烈顯大豈不美哉務實周書曰若作梓材既勤朴斫惟其塗丹雘此言為國家者必先實而後文也安國家利百姓仁之實也保基緒傳子孫孝之實也辨貴賤立紀綱禮之實也和上下親逺近樂之實也决是非明好惡政之實也詰奸邪禁暴亂刑之實也察言行試政事求賢之實也量材能課功狀審官之實也詢安危訪治亂納諫之實也選勇果習戰鬭治兵之實也實之不存雖文之盛美無益也方今逺方窮民轉死於溝壑而屢赦有罪循門散錢其於仁也不亦逺乎本根不固有識寒心而道宫佛廟廣修御容其於孝也不亦逺乎統嗣不明祭器紊亂而雕繢文物修飾容貌其於禮也不亦逺乎羣心乖戾元元怨苦而斷竹數黍􅒱叩古器其於樂也不亦逺乎是非錯繆賢不肖混殽而鈎校簿書訪尋比例其於政也不亦逺乎奸暴不誅寃結不理而拘泥微愆糾擲細過其於刑也不亦逺乎行能之士沉淪草野而考校文辭指决聲病其於求賢不亦逺乎材任相違職業廢弛而檢勘出身比類資序其於審官不亦逺乎久大之謀棄而不省淺近之言應時施行其於納諫不亦逺乎將帥不良士卒不精而廣聚虛教徒取外觀其於治兵不亦逺乎凡此十者皆文具而實亡本存而末在譬猶膠板為舟摶土為楫敗布為帆朽索為繂畫以丹青衣以文繡使偶人駕之而履其上以之居平陸則煥然信可觀矣若以之涉江河犯風濤豈不危哉伏望陛下撥去浮文悉敦本實選任良吏以子惠庶民深謀逺慮以保宗廟張布綱紀使天下有歡心移易風俗使人無離愁别白是非使萬事歸正誅鋤奸惡使威令必行取有益罷無用使野無遺賢進有功退不職使朝無曠官察讜言考得失使謀無不盡選智將揀勇士使征無不服如是則國家安若泰山而四維之也又何必以文彩之飾歌頌之聲眩惑愚俗之耳目哉上皇帝直言書臣伏讀詔書喜極以泣昔成湯以六事自責今陛下以四事求諫聖人所謂異世同符凡詔書所言皆今日之深患陛下既已知之羣臣夫復何言曽子曰尊其所聞則髙明矣行其所知則光大矣陛下誠知其如是復能斷制無疑不為左右所惑則安知今日之灾沴不為大戊之桑榖髙宗之雊雉成王之雷風宣王之旱魃更為社稷生民之福也然自詔下以來臣不知中外之臣亦有以當今急務生民之疾苦力為陛下别白言之者乎蓋必有之矣而臣未得聞也臣竊不自揆伏念父子受國重恩備位侍從嚮在朝廷屢以狂瞽塵俯聖聰間以衰疾自求間官不聞朝廷之議者四年於兹矣今者幸遇陛下發不諱之詔問以朝政之闕失斯特千載一遇古人雖在畎畝猶不忘君况在位食祿者乎是以不敢畏當途避衆怒愛微軀保妻子心知時事之可憂而蹇默不言也竊觀陛下英睿之性希世少倫即位以來勵精求治恥為繼體守成之常主髙欲慕堯舜之隆下不失漢唐之盛擢俊傑之才使之執政言無不聽計無不從所譽者超遷所毁者斥退垂衣拱手惟其所為推心置腹人莫能間雖齊桓公之任管仲蜀先主之任諸葛殆不及也執政亦悉心竭力以副陛下之所欲恥為碌碌守法循故事之臣而每以周公自任是宜百度交正四民豐樂頌聲旁溢嘉瑞㳫至而六年之間百度紛擾四民失業怨憤之聲所不忍聞灾異之大古今罕比此其故何哉豈非執政之臣所以輔陛下者未得其道歟所謂未得其道者在於好人同已惡人異已是也陛下既全授之以威福之柄使之制作新法以利天下是宜與衆共之舍短取長以求盡善而獨任己意惡人攻難羣臣有與之同者則擢用不次與之異者則禍辱隨之人情誰肯去福而取禍棄榮而就辱是以天下之士躁於富貴者翕然而附之爭勸陛下益加委信順從其言嚴斷刑罰以絶異議如是者往往立取美官比年已來中外執事權者皆此類也其有懷忠直守亷恥則擯斥廢棄或罹罪戾無所容立至於臺諫之官天子耳目所以規朝政之闕失糾大臣之專恣此則陛下當自擇而亦使執政擇之彼專用其親愛之人小有所違即加貶逐以懲後來必得便佞之尤者然後使為之如此則執政之愆謬羣臣之奸慝生民之疾苦逺方之寃抑陛下何得而聞之又奉使詢訪利害於四方者亦其所親愛之人皆先稟其㫖憑其氣勢以驅迫州縣之吏善惡繫其筆端升黜由其唇吻彼州縣之吏承迎奉順之不贍奚暇與之講利害立同異哉及其入奏則言州縣守宰咸以為便經久可行陛下但見其文書燦然可觀以為法之至美詢謀僉同豈知在外之所為也或有更增其條目務為新巧互陳利病各事改張使畫一之法日殊月異久而不言使民莫知所從蓋由襲故則無功出竒則有賞彼皆進身之私計非有益國便民之心也又令使者督責所在監司監司督責所在州縣上下相驅競為苛刻奉行新法稍不盡力則謂之非才不職也及沮壞新法互行停替或未熟新法誤有違犯者皆不理赦降官去官與犯贓罪者同而重於犯私罪者州縣之吏惟奉行文書求免罪戾之不暇民事不復留心矣又僣遣邏卒聽市道之人有誹謗者執而刑之又出榜立賞募人告捕誹謗朝政者臣不知自古聖帝明王之政固如是耶昔堯稽於衆舍己從人舜誡羣臣曰豫違汝弼汝無面從退有後言此其為帝王稱首也秦惡聞其過殺其直諫之士禁偶語之人及其禍敗行路之人皆知之而已獨不知此其所以為萬世之明戒也子産相鄭鄭人游於鄉校以議執政或為請毁之子産曰何為而毁之夫人朝夕退而游焉以議執政之善否其所善者吾則行之其所否者吾則改之是吾師也若之何而毁之吾聞忠善以損怨不聞作威以防怨嚴為之防豈不遽止然猶防川大决所犯傷人必多吾不克救也不如小决使導吾聞而藥之也何今之執政異於古之執政者乎齊景公謂梁丘據曰惟據與我和夫晏子曰據亦同也安得為和和如和羮焉水火醯醢鹽梅以烹魚肉宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以替其否是以政不虐民民無爭心今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之今在朝之臣對問啓沃其有異於梁丘據者乎衛侯言計非是而羣臣之和者如出乎一口子思曰以吾觀衛所謂君不君臣不臣也人主自臧則衆謀不進事是臧之猶以衆謀况和非以長惡乎夫不察事之是非而悅人之贊己暗莫甚焉不度理之所在而阿諛求容諂莫甚焉君暗臣諂以在民上民不與也若此不已國無類矣子思言於衛侯曰君之國事將日非矣君出言自以為是而卿大夫莫敢矯其非卿大夫亦自以為是而士庶人亦莫敢矯其非君臣既自賢矣而上下同聲而賢之賢之則順而有福矯之則逆而有禍如此則善安從生今執政主新法而上下同志而贊之亦有異於衛國之政乎是以士大夫憤悶鬱結視屋竊嘆而不敢言庶人饑寒憔悴號呼而無所告此則陛下所謂忠謀讜言鬱於上聞而阿諛壅閟以成其私者也苟忠讜退伏阿諛滿側而欲望百度之正四方之富頌聲之洽嘉瑞之臻固已難矣今朝廷之闕政其大者有六而已一曰廣散青苗使民負債日重而縣官實無所得二曰免上户之役斂下户之錢以養浮浪之人三曰置市易之司與細民爭利而實耗散官物四曰中國未治而侵擾四夷得少失多五曰排結保甲教習凶器以擾農民六曰信狂狡之人妄興水利以勞民費財若其他瑣瑣米鹽之事皆不足為陛下道也捨其大而言其小捨其急而言其緩外有獻替之迹內懷附㑹之心是奸邪之尤者臣不敢為也凡此六者之為害人無貴賤愚智莫不知之及至陛下左右前後之人日譽新法之善者其心亦知其不可但希合聖心附㑹執政以盜富貴耳一旦陛下之志移則彼之所言亦異耳臣今不敢復費簡札特叙六者利害以瀆聖聽但願陛下勿問阿諛之黨勿詢權臣之心斷志罷之必有為陛下言其詳者矣此六者之中青苗免役錢為害尤大夫力者民之所生而有也榖帛者可以耕桑而得也至於錢則縣官之所鑄民不得私為也自未行新法之時民間之錢固已少矣富商大賈藏鏹者或有之彼農民之富則不過占田稍廣積榖稍多室屋完修耕牛不假而已未嘗有積錢巨萬於家者其貧者藍縷不蔽形糟糠不充腹春指夏熟夏望秋成或為人耕種資以為生亦未嘗識錢也故古之取民者各因其所有而取之凡農民之役不過出力稅不過榖帛自唐末興兵始有稅錢者故白居易譏之曰私家無錢爐平地無銅山言責民以所無也今有司之為法則不然無問市井田野之人由中及外自朝及夕惟錢是求農家值豐歲賤糶所收之榖以輸官比常年之價或三分减一於斛斗之中或十分加二以求售於人若值凶年無榖可糶而吏責其錢不已欲賣田則家家賣田欲賣屋則家家賣屋欲賣牛則家家賣牛既無所售則不免伐桑柘撤室屋以賣其薪或殺牛以賣其肉然後得錢以輸官然民一年如此則明年恃何以為生也故自行新法以來農民尤被害農者天下之本也農既失業餘民安取食哉今貨益重物益輕年雖饑饉物不甚貴而民倍困為國計者可不少思其故哉此皆斂錢之咎也今北盡塞表東被海涯南踰江淮西抵巴蜀自去歲至今絶少雨雪井泉溪澗往往涸竭三麥無收民已絶望孟夏過半種未入土中下之户大抵乏食採木皮食草根以延旦暮若又如此其當奈何當此之際而州縣之吏督責青苖免役不敢少緩鞭笞縲絏惟恐不逮父子遑遑如在湯火號泣呼天無復生望臣恐鳥窮則啄獸窮則攫民困已極矣而無救恤羸者不轉死於溝壑壯者不聚而為盜賊將何之矣若東西南北所在嘯聚連羣結黨日流月蔓瀰滿山澤蹈籍城邑州縣不能禁官軍不能討當此之時方議罷去新法又何益哉緑林赤眉黃巾黑山之徒自何而有皆苦於賦斂歲復饑饉窮困無聊之民耳此誠宗廟社稷之深憂而廟堂之上方且晏然自得以為太平之業八九已成此臣之所痛心疾首晝則忘食夜則忘寢不避死亡欲默而不能也易復之初九曰不逺復無祗悔元吉言能改過不逺則雖悔不大至上六曰迷復凶有灾眚用行師終有大敗以其國君凶至於十年不克征言迷而有復凶且有灾於君道尤不利者也昔秦穆敗於崤秦誓曰惟古之謀人則曰未就豫忌惟今之謀人姑將以為親雖則云然尚猷詢兹黃髮則罔所愆蓋悔棄老成人之道用利口之淺謀以取覆敗而思補其過也故能終雪前恥强霸西戎漢武帝征伐四夷中國虛耗盜賊羣起又喪二師之軍乃下哀痛之詔曰乃者以縛馬書遍示丞相御史二千石中大夫為文學者皆以敵自縛其馬不祥甚哉公車方士太史太卜皆以為吉及謀計卦兆悉皆反繆然後悟公卿方士之諂諛對不以誠致誤國事有悔於心也故禁苛暴止擅賦力本務農而天下復安國家自行新法以來天下之人心祈口禱惟冀陛下之早悟以拯救其失以蘇疲民如望天之膏澤日復一日以至於今及今改之猶可救也過則民力竭一旦渙然離散乃始安輯豈不難哉臣竊觀陛下詔書寅畏天戒深自譴咎叮嚀懇惻以求至言是陛下已知前日之失而欲有所改為也若徒著之空文而於新法無所更變猶臨鼎哀魚之爛而益薪不已又將何益哉陛下誠能垂日月之明奮乾剛之斷斥逐阿諛勿使壅閉自擇忠讜以為諫官收還威福之柄悉由已出詔天下青苗勿使復散見在民間逋缺者計從初官本錢作數年輸納更不收其利免役錢除放差役並仍舊法罷市易務其所積貨物依元買價出賣所缺官物錢亦除利傕本罷拓土闢境之兵先阜安中國然後征伐四夷罷保甲教閲使民服田力穡所興修水利委諸州縣相度凡利少害多者悉罷之如此則中外歡呼上下感悅和氣薰蒸雨必應矣彼阿諛之人附㑹執政者皆沿新法以得富貴陛下以為非而舍之彼如魚之失水必力爭固執而不肯移願陛下勿問之也竊觀陛下今以旱熯之故避殿撤食其焦勞至矣而民終不與其澤不如罷此六者則漙博之德及於四海矣又聞京師近雖得雨而畿甸之外旱氣如故王者以四海為家無有逺近皆陛下之赤子願陛下雖狥羣臣之請御正殿復常膳猶應兢兢業業憂勞四方不可遽自寬以謂無復有旱熯之灾也又諸州奏雨往往止欲解陛下之焦勞一寸則云三寸三寸則云一尺多不以實不可不察也又青苗之法灾傷及五分則當倚閣其間官吏有不仁者至於抑過百姓只放四分以下稅此尤可罪者臣居冗散之地若朝廷間小小關失臣不敢與聞今坐視百姓困於新法若此則為朝廷深憂而陛下曾不之知乂今年已來臣衰疾䆮增萬一不續先朝露齎懷忠不盡之情長抱恨于泉下矣是以冒死一為陛下言之倘陛下猶棄忽而不之信此則天也臣不敢復言矣干冒冕旒無任戰汗之至上體要疏月日具位臣某謹昧死再拜上疏皇帝陛下臣准御史臺牒狀申奉四月二十日詔敕傳曰近臣盡規以其榮恥休戚與上同也今在位者視朕過失與朝廷政事之闕默而不言乃或私議竊嘆若以其責為不在己夫豈皆習見成俗以為當然其亦有含章懷寶待唱而發者也今百度隳弛風俗偷薄惰惡灾異譴告不一此誠忠賢助朕憂愓以創制改法救弊除患之時宜令侍從官自今視朕過失與朝廷政事之闕無有巨細各具章奏極言無隱噫言善而不用朕有厥咎循之而勿言爾為不恭朕將用此考察在位所以事君之實明黜陟焉臣以駑下之材自仁宗皇帝時䝉擢在侍從服事三朝恩隆德厚隕身喪元不足為報雖訪問所不及猶將披肝瀝膽以致區區之忠况聖意采納之勤督責之嚴諄諄如是臣敢營私避怨慝情愛己不為陛下别白當今之切務庶幾小補萬分之一耶臣聞為政有體治事有要自古聖帝明王垂拱無為而天下大治者凡用此道也何謂為政有體君為元首臣為股肱上下相維內外相制若網之以綱絲之以紀故詩云勉勉我王綱紀四方又云愷悌君子四方之綱古之王者設三公九卿二十七大夫八十一元士以綱紀其內設侯伯州牧卒正連帥屬長以綱紀其外尊卑有序若身之使臂臂之使指莫不率從此為政之體也何謂治事有要夫人智有分而力有涯以一人之智力兼天下之衆務欲物物而知之日亦不給矣是故尊者治衆卑者治寡治衆者事不得不約治寡者事不得不詳約則舉其大詳則舉其細此自然之勢也益稷曰元首明哉股肱良哉庶事康哉君明則能擇臣臣良則能治事也又曰元首叢脞哉股肱惰哉萬事墮哉言君親細務則臣不盡力而事廢壞也立政曰文王罔攸兼於庶言庶獄庶慎惟有司之牧夫是訓用違庶獄庶慎文王罔敢知於兹言文王擇有司而任之其餘皆不足知也康誥曰庸庸祗祗威威顯民言文王用其可用祇其可祇刑其可刑專明此道以示民也是故王者之職在於量材任人賞功罰罪而已苟能謹擇公卿牧伯而屬任之則其餘不待擇而精矣謹擇公卿牧伯之賢愚善惡而進退誅賞之則其餘不待進退誅賞而治矣然則王者所擇之人不為多所察之事不為煩此事之要也臣竊見陛下日出視朝繼以經席日中乃還宫禁入宫之後竊聞亦不自閒省閲天下奏事羣臣章疏逮至昏夜又御燈火研味經史博觀羣書雖中宗高宗之不敢荒寧文王之日昃不食臣以為不能及也然自踐祚以來孜孜求治於今三年而功業未著者殆未得其體要故也祖宗創業垂統為後世法內則設中書樞密院御史臺三司審官審刑等在京諸司外則設轉運使知州知縣等衆官以相統御上下有叙此所謂綱紀者也今陛下好使大臣奪小臣之事小臣役大臣之職是以大臣解體不肯竭忠小臣諉上不肯盡力此百官所以廢弛而萬事所以隳頺者也而陛下用為致治之本此臣所大惑也臣微賤不得盡知朝廷之事且以耳目所接近日數事臣所知者言之其餘陛下可以類求也昔漢文帝問陳平天下歲决獄及錢榖出入幾何平曰陛下即問决獄責廷尉問錢榖責治粟內史必也使卿大夫各得盡其職此乃宰相職也若平者可謂能知治體矣今之兩府皆古宰相之任也中書主文樞密院主武若乃百官之長非其人刑賞大政失其宜此兩府之責也至於錢榖之不充條例之不當此三司之責也陛下苟能精選知錢榖憂公私之人以為三司副判官諸路轉運使各使久於其任以盡其能有功則進無功則退名不能亂實僞不能掩真安民勿擾使之日富取之有道用之有節何患財利之不豐哉今乃使兩府大臣悉取三司條例别置一局聚文士數人與之謀議改更制置三司皆不與聞臣恐所改更者未必勝於其舊而徒紛亂祖宗成法考古則不合適今則非宜吏緣為姦農商失業數年之後府庫耗竭於上百姓愁困於下衆心離駭將不復振矣且兩府於天下之事無所不總若百官之職皆使兩府治之則在上者不勝其勞而在下者為無所用矣又監牧使主養馬四園苑主課利今乃使監牧使不屬羣牧司四園苑不屬三司提舉司則在下者各得專權自恣而在上者為無所用矣陛下方欲納天下於大治而使百官在上者不委其下在下者不禀其上能為治乎若此之類臣竊恐似未得其體也凡天下之事在一縣者當委之知縣在一州者當委之知州在一路者當委之轉運使在邊鄙者當委之將帥然後事乃可集何則久在其位識其人情知其物宜賞罰之權足以休戚所部之人使之信服故也今朝廷每有事不委之將帥監司守宰使之自為方略責以成效而施其刑賞常好别遣使者銜命奔走旁午於道所至徒有煩擾之弊而于事未必有益不若勿遣之為愈也夫事之利害吏之能否皆非使者所能素知不免臨時詢采於人所詢者或遇公明忠信之人猶僅能得其一二或遇私暗姦險之人則是非為之倒置矣此二者交集於前而使者不能猝辨也是以往往害事而少能為益非將帥監司守宰皆賢而使者皆愚也纍歲之講求與一朝之謀議積久之采察與目前之毁譽精粗詳略其勢不同故也其有居官纍嵗而不知利害臨人積久而不知能否或雖知利害而不能變更雖知能否而不能黜陟此乃愚昧私曲之人朝廷當察而去之更擇賢者以代其位不當數遣使者擾亂其間使不得行其職業也又庸人之情苟策非已出則媢嫉沮壞惟恐其成官吏若是者十常五六若使使者所規畫曲盡其宜在彼之日其當職之人已怏怏不悅不肯同心以助其謀協力以成其事曰朝廷自遣専司治之我何敢與知及返命之日彼必敗之於後曰使者既謀而授我我今竭力而成之功悉歸于首謀之人我何有哉此所以謂不若毋遣使者而屬任當職之人為愈也夫使者所以通逺邇之情固不可無然今之轉運使即古使者之任茍得人而委之賢於遣使者逺矣若監司自為姦慝貪縱或有所隱蔽欺罔或為部內之人所訟或所謀畫之事未得其宜朝廷欲察其罪惡審其虛實判其曲直决其是非然後别遣使者案之若案得其實監司有罪則當刑不才則當廢豈有但已者也今每有一事朝廷輒自京師遣使往治之是在外之官皆無所用也使者既代之治事而當職之人亦無所刑無所廢是只使之拱手旁觀偷安竊祿者矣若此之類臣竊恐似未得其體也今朝廷之士左右之人皆曰陛下聰明剛斷威福在已太平之功可指日而致臣愚竊獨以為未也臣聞古之聖帝明王聞人之言則能識其是非故謂之聰觀人之行則能察其邪正故謂之明是非既辨邪正既分姦不能惑倿不能移故謂之剛取是而捨非誅邪而用正確然無所疑故謂之斷誅一不善而天下不善者皆懼故謂之威賞一有功而天下有功者皆喜故謂之福今陛下聰明剛斷則誠體之矣欲收威福之柄則有其志矣然於所以為之之道尚或有所未盡故臣以為太平之功未可期也夫帝王之道當務其逺者大者而略其近者小者國之大事當與公卿議之而不當使小臣參之四方之事當委牧伯察之而不當使左右覘之倘公卿牧伯尚不能擇賢者而任之小臣左右獨能得賢者而使之乎若茍為不賢則險詖私謁無不為矣今陛下好于禁中出手詔指揮外事非公卿所薦舉牧伯所糾劾或非次遷官或無故廢罷外人疑駭不知所從此豈非朝廷之士左右之人所謂聰明剛斷威福在己者耶陛下聞其言而信之臣竊以為過矣夫公卿所薦舉牧伯所糾劾或謂之賢者而不賢謂之有罪而無罪皆有迹可見責有所歸故不敢大為欺岡若姦臣密白陛下今陛下自為聖意以行之則威福集於私門怨謗歸於陛下矣安得謂之威福在陛下耶且陛下向時手詔所指揮者悉非大事至於兩禁美官邊蕃將帥省府職任諸路監司此皆衆人之所希求治亂之所繫屬當除授之際竊恐未必一一出聖意也若乃貪邪姦猥之人陛下所明知而黜去者或更改官而升資或不久復進用然則威福之柄果不在陛下而陛下偶未之思也以此觀之面譽陛下聰明剛斷威福在已太平立致者非愚則諛不可不察也陛下必𣣔威福在己曷若謹擇公卿大臣明正忠信者留之愚昧阿私者去之在位者皆得其人然後凡舉一事則與之公議於朝使各言其志陛下清心平慮擇其是者而行之非者不能復奪也凡除一官亦與之公議於朝使各舉所知陛下清心平慮擇賢者而任之不肖者不能復爭也如此則謀者舉者雖在公卿大臣而行之用之皆在陛下安得謂之威福不得已耶陛下此之不為而顧彼之欲行臣竊恐似未得其要也夫三人羣居無所統一不散則亂是故立君以司牧之羣臣百姓勢均力敵不能相治故從人君决之人君者所以行賞罰决是非也若人君不肯决當使從誰决之乎夫人心不同如其面焉國家凡舉一事朝野之人必或以為是或以為非凡用一人必或以為賢或以為不肖此固人情之常自古而然不足怪也要在人主審其是非而取舍之取是而捨非則安榮取非而舍是則危辱此乃安危榮辱之所以分也是以聖主重之故博謀羣臣下及庶人然而終决之者要在人君也古人有言曰謀之在多斷之在獨謀之多故可以觀利害之極致斷之獨故可以定天下之是非若知謀而不知斷則羣下人人各欲逞其私志斯衰亂之政也詩云謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道哀哉為猷匪先民是程匪大猷是經惟邇言是聽惟邇言是爭如彼築室於道謀是用不潰于成此言周室之衰人臣不明先王之大道務爭近小之事人君不能定其可否而事終無成也漢世國家有大典禮大政令大刑獄大征伐必下公卿大夫博士議郎議其議者固不能一必有參差不齊者矣於是天子稱制决之曰丞相議是或曰廷尉當是而羣下厭然無有不服者矣今陛下聽羣臣各盡其情以議事此誠善矣然終不肯以聖志裁决遂使羣臣有尚勝者以巧文相攻辨口相擠至于再至于三互相反覆無有限極臣愚深恐虧朝廷之政體損陛下之明德流聞四方取輕夷狄非嘉事也夫天下之事有難决者必先以道揆之若權衡於輕重規矩之於方圓錙銖毫忽不可欺矣是以人君務明先王之道而不習律令知根本既植則枝葉必茂也近者登州婦人阿云謀殺其夫重傷垂死情無可愍在理甚明已傷不首於法無疑中材之吏皆能立斷已經審刑院大理寺刑部斷為死罪而前知登州許遵文過飾非妄為巧說朝廷命兩制定奪者再命兩府定奪者再敕出而復收者一收而復出者一爭論縱橫至今未定夫以田舍一婦人有罪於四海之廣萬幾之衆其事之細何啻秋毫之末朝廷欲斷其獄委一法吏足矣今乃紛紜至此設更有可疑之事大於此者將何以决之夫執條據例者有司之責原情制議者君相之事也分爭辨訟非禮不决禮之所去刑之所取也阿云之事陛下試以禮觀之豈難决之獄哉彼謀殺為一事為二事謀為所因不為所因此苛察繳繞之論乃文法俗吏之所爭豈明君賢相所當留意耶今議論嵗餘而後成法終於棄百代之常典悖三綱之大義使良善無告姦凶得志豈非狥其枝葉而忘其根本之所致耶若此之類臣竊恐似未得其要也此皆衆人之所私議竊歎而莫敢明言者臣獨以受恩深重不顧斧鉞為陛下言之惟聖明裁察臣昧死再拜上疏越州張察推字序天下之事未嘗不敗於專而成於共專則隘隘則暌暌則窮共則博博則通通則成故君子修身治心則與人共其道興事立業則與人共其功道隆功著則與人共其名志得欲從則與人共其利是以道無不明功無不成名無不榮利無不長小人則不然専己之道而不能從善服義以自廣也専己之功而不能任賢與能以自大也専己之名而日恐人之勝己也専己之利而不欲人之有之也是以道不免於蔽功不免於損名不免於辱利不免於亡此二者君子小人之大分也陜郡張君名共才甚美行甚修舉進士登上科今從事於浙東某辱與張君為同郡人習其為人固久竊以為古者名於親而字於朋友亦附名而為義焉某是敢輒廣其名之義而字曰大成以勉之異日張君克充其名顯裕光大庸可量哉聞喜縣重修縣學記或問太古何如曰不如今治也何以言之曰古之人寒衣而饑食貪生而畏死不殊於今也喜怒哀樂好惡畏欲與民俱生非今有而古無也古之人食鳥獸之肉草木之實而衣其皮鳥獸日益殫草木日益稀人日益衆物日益寡視此或不足視彼或有餘能相與守死而勿爭乎爭而不已相賊傷相滅亡人之類蓋可計日而盡也聖人者愍其然於是作而治之擇其賢智而君長之分其田土而疆域之聚其父子兄弟夫婦而安養之施其禮樂政令而綱紀之明其道德仁義孝慈忠信亷讓而教道之猶有狂愚傲狠之民悖戾而不從者於是鞭撲以威之鈇鉞以戮之甲兵以殄之是以民相與安分而保常養生而送終繁衍而久長也及周之衰先王之道覆蕩崩壞幾無餘矣其不絶者纎若毫芒是非孔子起而振之廓而引之使闊大顯融以迄於今則生民之衆幾何其不淪而為禽夷也今國家所以奉事孔子非輕也廟食於國於州於縣以嵗時陳其俎豆鳴其金石以禮饗之自天子之貴親北面而拜焉所以然者非一人之私為道然也然吏於州縣者或以簿領鞭撲為急務視孔子之祠及學校廢為餘事置之曽不誰何彼真俗吏無足道者聞喜自前世固搢紳大夫之林藪也縣有孔子廟咸平中武吏慈釋回修之尉李垂為之記厥後繼而為長者其嚴事孔子之心不能及釋回於是廟屋頺隳垣墉地缺草樹荒椔碑石斷仆况於鄉飲酒之容絃歌之音固不可得而暏聞矣今大夫馬君至而嘆曰嗚呼為川者知防而不知濬則橫潰而不禁為民者知怒而不知教則愁怨而不從故善為川者相髙下而導之善為民者明是非而告之是以為者逸而從者昜物遂性而功速成也今為吏者不能揭先王之道以教之而曰吾専任刑罰亦足為治者是掩民之耳目而為陷阱俟之也不仁孰大焉乃屬邑中之賢士大夫而告之曰今孔子之廟廢不修士無所講其業民無所承其化斯豈惟今之罪亦二三子之恥也皆曰斯固邑人日夜所不忘而不敢請也今明府有命是天相聖人之道而以明府賜邑人也敢不奔走而承之乃相與斂材聚土葺屋之隳而壯大之修垣之圯而高厚之去木之椔而改樹之起碑之仆而更刻之民不加賦吏不告勞不日而新廟焕然成矣於是邑中之賢士大夫相與誦堯舜之書咏商周之詩於其中彬彬然有鄒魯之風矣噫馬君之於學也既正其基矣猶未也今之吏率三歲而更後之人繼而長於斯者宜勿替馬君之功引而申之學者宜卒成馬君之志而張大之知人所以嚴事孔子者非徒飾其辭論其文也固將明其道循其法心喻而身行之使近者悅化逺者慕效由邑及於鄉由鄉及於家父靡不慈子靡不孝兄靡不友弟靡不恭夫然後知學之成而為益大也夫道之汚隆豈有常邪人為之則存不為之則亡非道去人人去道也古者至治之時或耕者推畔行者推塗獄訟不興盜賊不作彼風俗若是之美者豈古則可為而今不可為耶由教之未至故也今基既正矣其餘則勉之而已矣何憚不及於古耶人之言曰古民淳質故可教今民僞薄故不可教是瞽惑之言不足稽也於廟之成馬君謂某旁縣之人也宜為之記某以不文辭不敢為使者三返而不獲命因直述所聞而書圉人傳汧侯有馬悍戾不可乘服以為無用將棄之野愛其疾足募有能馴之者祿以百金有圉人叩門而告曰臣能馴之汧侯使養馬數月益調服步驟緩急折旋左右惟人所志汧侯喜賞以百金之祿拜為圉師衆騶疾之譛於汧侯曰馬馴矣彼何功而徒費侯百金臣請代之侯逐圉人居數月馬復悍戾如故侯乃召圉人而謝曰子能使悍馬馴子去而馬復悍敢問何術也對曰臣賤夫也不知異術而惟養馬之知夫馬太肥則陸梁太瘠則不能任重䇿之急則駭而難馴緩則不肯盡力善為圉者渴之饑之飲之秣之視其肥瘠而豐殺其菽粟緩之以盡其材急之以禁其逸鞭䇿以警其怠御控以馴其心使之得其宜適而不勞亦不使有遺力焉其術其法得於心應於手已不能傳之於人人亦不能從已傳也如此故馬之材在馬馬之性在我雖悍戻何傷哉汧侯曰善圉人曰是術也豈特養馬而已抑治國亦猶是也夫材智之士治國者之悍馬也捨之則不能以興功業御之不以道則不獲其利而桀黠不可制故明君者能用材智之士而以爵祿賞罰御之是以爵太高則驕祿太豐則墮驕墮之臣雖有智力君不得而使也制之急則不得盡其能制之緩則不肯宣其用不任恩渥一驅之以威則愁怨而離心故明君者節其爵祿裁其緩急恩澤足以結其心威嚴足以服其志則士生死貴賤之命在於君矣雖慓悍何憂哉汧侯悅位為上卿任以國政用其術推而行之汧國大治宋文選卷五
