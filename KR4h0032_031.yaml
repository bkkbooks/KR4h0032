body:
  text: 宋文選卷三十一黃魯直文答王觀復書庭堅頓首啓蒲元禮來辱書勤懇千萬知在官雖勞勩無日不勤翰墨何慰如之即日初夏便有暑氣不審起居何如所送新詩皆興寄髙逺但語生硬不諧律吕或詞氣不逮初造意時此病亦只是讀書未精博耳長袖善舞多錢善賈不虛語也南陽劉協嘗論文章之難云意翻空而易竒文徴實而難工此語亦是沈謝輩為儒林宗主時好作竒語故後生立論如此好作竒語自是文章病但當以理為主理得而辭順文章自然出羣拔萃觀杜子美到䕫州後詩韓退之自潮州還朝後文章皆不煩繩削而自合矣往年嘗請問東坡先生作文章之法東坡云但熟讀禮記檀弓當得之既而取檀弓二篇讀數百過然後知後世作文章不及古人之病如觀日月也文章蓋自建安以來好作竒語故其氣象衰薾其病至今猶在唯陳伯玉韓退之李習之近世歐陽永叔王介甫蘇子瞻秦少遊乃無此病耳公所論杜子美詩亦未極其趣試更深思之若入蜀下峽年月則詩中自可見其曰九鑽巴噀火三蟄楚祠雷則往來兩川九年在䕫府三年可知也恐更須改定乃可入石適多病少安之餘賔客妄謂不肖有東歸之期日日到門疲于應接蒲元禮來告行草草具此世俗寒溫禮數非公所望于不肖者故皆略之三月二十四日與潘子真書庭堅叩頭子真足下纍辱惠書及詩竊伏天材髙妙鍾山川之美有名世之資未嘗不歎息也黃鵠一舉千里非荆雞之材所能啄菢以是久未知所答雖然有一于此可少助萬分之一致逺者不可以無資故適千里者三月聚糧又當知所向問其道里之曲折然後取塗而無悔鈎深而索隱溫故而知新此治經之術也經術者所以使人知所向也博學而詳說之極支離以趨簡易此觀書之術也博學者所以使人知道里之曲折也夫然後載司南以適四方而不迷懷道鑒以對萬物而不惑㑹子曰尊其所聞則髙明矣行其所知則光大矣聞道也不以養口耳之間而養心可謂尊其所聞矣在父之側則願如舜文王在兄弟之間則願如伯夷李子可謂行其所知矣欲速成患人不知好與不已若者處賢于俗人則可矣此學者之深病也齊心服形靜而後求諸巳若無此四病者則善矣若有似之願留意也與潘邠老書庭堅頓首纍辱手記以退食輒奉老人寢食或至中夜得息故不果每報大谷公石刻巳奉許作但未得暇耳數事已喻駒父詩中多佳句甚歎服也晉主夏盟而豫楚非所以為民也然其勢不得不豫楚司馬侯之言以告諸侯則有詞矣文公之知趙衰也不特壺餐從徑而不食也舉是以為原大夫所以令羣大夫也晏子曰大者不踰間小者出入可也蓋君子斟酌世故以制行則如此非所以觀其私也若夫觀其私則德無小大忠信而已矣故君子有悔而無吝也西方之書論聖人之學以為由初發心以至成道唯一直心無委曲相此最近之承與季共日以講學為事甚善甚善多謝季共不果别作啓再與潘邠老書庭堅頓首辱以少儀見推一日之長雖荷傾倒之意不獲終辭顧德薄而道不明何以當此愧悚訪逮所疑猶愧叩之則窮也嘗謂求之藝賜之達由之勇師之莊皆聖人之一也由夫子觀之其人性學之蔽如此爾猶言伯夷之隘栁下惠之不恭孔子曰如有用我者吾其為東周乎故陳恆弒其君請討之耳非以敵國相征也孟子曰今以燕伐燕何為勸之其可不疑也禹菲飲食惡衣服卑宫室堯舜之禮有所行周公誅管蔡舜之義不得申也執一而廢百小道固大人弗為固者膠于物之迹也離乎性矣夫愛而哭之性也畏而哭之利也明于故然後可以知性故雖非性而可以求性也不避礙而鑿險阻以求必行此老氏以智為賊者也妄意如此不審然否答王子飛書陳履常正字天下士也讀書如禹之治水知天下之絡脉有開有塞而至于九川滌源四海㑹同者也其作詩淵源得老杜句法今之時人不能當也至于作文深知古人之關鍵其論事救首救尾如常山之蛇時輩未見其比公有意于學者不可不往掃斯人之門古人云讀書十年不如一詣習主簿端有此理若見為問訊千萬答洪駒父書駒父外甥教授别來三嵗未嘗不思念閒居絶不與人事相接故不能作書雖晉城亦未曾作書也專人來得手書審在官不廢講學眠食安勝諸稚子長茂慰喜無量寄詩語意老重數過讀不能去手繼以歎息少加意讀書古人不難到也諸文亦皆好但少古人繩墨耳可更熟讀司馬子長韓退之文章凡作一文皆須有宗有趣終始關鍵有開有闔如四瀆雖納百川或匯而為廣澤汪洋千里要自發源注海耳老夫紹聖以前不知作文章斧斤取舊所作讀之皆可笑紹聖以後始知作文章但已老病惰懶不能下筆也外甥勉之為我雪耻罵犬文雖雄竒然不作可也東坡文章妙天下其短處在好罵慎勿襲其軌也甚恨不得相見極論詩與文章之善病臨書不能萬一千萬強學自愛少飲酒為佳再答洪駒父書所寄釋權一篇詞筆縱橫極見耳目之新更須治經探其淵源乃可到古人耳青瑣祭文語意甚工但用字時有未安處自作語最難老杜作詩退之作文無一字無來處蓋後人讀書少故謂韓杜自作此語耳古之能為文章者真能陶冶萬物雖取古人之陳言入于翰墨如靈丹一粒㸃鐡成金也文章最為儒者未事然素學之又不可不知其曲折幸熟思之至于推之使髙如泰山之崇崛如垂天之雲作之使雄壯如滄江八月之濤海運吞舟之魚又不可守繩墨令儉陋也胡宗元詩集序士有抱青雲之器而陸沉林臯之下與麋鹿同羣與草木共盡獨託于無用之空言以為千載不朽之計謂其怨邪則其言仁義之澤也謂其不怨邪則又傷已不見其人然則其言不怨之怨也夫寒暑相推草木與榮衰焉慶榮而弔衰其鳴皆若有謂候蟲是也不得其平則聲若雷霆澗水是也寂寞無聲以宫商考之則動而中律金石絲竹是也維金石絲竹之聲國風雅頌之言似之澗水之言楚人之言似之至于候蟲之聲則末世詩人之言似之今夫詩人之玩于詞以文物為工終日不休若舞世之不知者以待世之知者然然其喜也無所于逢其怨也無所于伐能春能秋能雨能暘發于心之工伎而好其音造物者不能加焉故余無以命之而寄于候蟲焉清江胡宗元自結髮迄于白首未嘗廢學其胸次所藏未肯下一世之士也前莫挽後莫推是以窮于丘壑然以其耆老于翰墨故後生晚出無不讀書而好文其卒也子弟門人次其詩為若干卷宗元之子遵道嘗與豫為僚故持其詩來求序于篇首觀宗元之詩好賢而樂善安土而候時寡怨之言也可以追次其平生見其少長不倦忠信之士也至于遇變而出竒因難而見巧則又似于豫所論詩人之態也其興託髙逺則附于國風其忿世疾邪則附于楚辭後之觀宗元詩者亦以是求之故書而歸之胡氏宋完字序僰道宋君完曰完也有志從學于先生之門而未能自克出從市井之囂葷然其有味而常見侮于人入聞先生之言淡然其無味而常見敬于人二者交戰敢問其故涪翁字之曰志父而命之曰志父來前士唯無志則不可學誠有志乎不難追配古人矣戰市井之囂又何難哉古之言曰不以物挫志之謂完季札子臧不以國挫志泰伯虞仲不以天下挫志是以縉紳先生于今尊之夫志者戰不義之良將也不怒而威不言而信揔百行而出戰可謂堂堂之陳未有能當其鋒者矣而况市井之囂曲巷之好頻頻之黨酒食嬉戲相逐追者乎詩云豈不爾思室是逺而子不邇求豈有執戈而禦之者乎文安國字序洹水文安國悅虎豹之文方雕其毛而澤于南山之霧雨將以希時文之思致身為萬物乘之器黃子字之曰子家而告之曰學若是也不及質盍嘗與言其本雖物不同量吾不心化而欲奏族庖之刀是螳螂用其才者也事其君為容悅安社稷以為悅揭日月而求之四方其去道逺矣至于以詩禮發家疲于世故之追胥而反于家人藏器于户牖收息至踵則萬物皆投戈而受命矣一人失家不免鄉曲笑天下失家恬以為當然吾欲莊語恐以此得罪困于石據于蒺藜與不同量者為有方者也虎兕出于柙龜玉毁于櫝中與不同量者為無方者也此兩者同出于安而危之始也女巧組繡雖若雲漢衆雌而無雄者也故莫若歸求其本質之柔者能有所不為則剛氣之弱者不從于無益則强知柔之剛者觀水知弱之强者觀弓弛以此嚮道六通四闢而安樂以天下為無畛之域子之家也又安用建鼓而求之詩云豫室翹翹豫尾翛翛風雨所漂搖未聞道之心照物不徹隨流而善堙不倚則不立世故憂患之風雨能傾動人吾子勉之矣趙安時字序合肥趙安時學士大夫也其質甚美黃庭堅謂之少莊以尊其名且告之曰莊周昔之體醇白而家萬物者也時命繆逆故熙然與造物者遊此其于禮義君臣之際皂白甚明顧俗學世師窘束于名物以域進退故築其垣而封之于聖智之外彼曹何足與談大方之家嘗試相與言其土梗五石之瓠浮江湖以相適我殖擁腫之樗謝斧斤之不若感栗林之戮而不庭者三月寧貸粟于縣令而畏楚國相可謂知巳矣知迹之不可以得履知斫輪之妙于手其學也觀古人之不可傳可謂知言矣觀本于濠上之魚絶意于郢人之斤知生死不入虞氏之心魯國之儒者一人可謂知人矣知新生之犢之無求凡亡之不喪其存柙干越之劍而不試遊發硎之刃而不見全牛棄智于垂涎之蟻得計于伏涔之魚可謂知天矣雖然吾又未嘗言其莊語也少莊自澡雪于塵滓之中蟬蛻于俗學之市而權輿于君子之方必不能規市人之履迹而責三倍之贏故吾直告以大道之一忽少莊四顧徘徊則萬繭吐緒矣逮其旁皇四逹必能因莊生之所言知其所未嘗言者楊概字序江清楊概問字于黃子黃子字之宰平而語之曰概無列于五量五量待是而後平聖人之作百工也生平于衡而五量受法焉五量官入不能自平則命概為之師概國器也是宰天下之平與物交而懷市道以相傾人情不能無然也由籥合而受之至于萬不能計取與之家皆責贏焉彼安能以不欺維概也中立而無私天下歸心焉非以其無心故邪今夫學至于無心而近道矣得志乎光被四表不得志乎藏之六經皆無心以經世故邪曰然則願聞性命之說黃子曰今孺子總髮而服大人之冠執經談性命猶河漢而無極也吾不知其說焉君子之道焉可誣也吾子欲有學則自爼豆鐘鼓宫室而學之灑掃應對進退而行之曰是可以學經乎曰吾子强學力行而考合先王之言彼如符璽之文可印也韓非曰先生有郢書而後世多燕說夫家奮私智而講無詔之書幾何其不為燕說也吾久不喜作書生語因楊君聊復談故并書之黃育字序㑹稽黃渥與庭堅皆出于婺之州黃田七世以上失其譜以年相望與渥相近也故復以昆弟合宗渥之言曰異時與我同昭穆者皆以今𨽻字形同類為名唯渥未之得今願改曰育敢以字請庭堅曰古者生以字尊名沒以誅易名易名之實有宗也有勸也其治在後人尊名之義有宗也有勸也其治當其身今曰懋逹以配育名則宜夫草木之茂亹亹以勸四時及其日至而立于成功之㑹非深根固蒂得其養故耶彼逹于道者不可以窮故獨立于萬物之表而無終始以今不出閭巷之智望之相去逺矣然孟子以謂聖人與我同類者何耶今舉一粒之種則曰是與太倉同類人之聞之也見色而爭慮清氣平則聞命矣蓋長育以逹其才故也榖之育苖也逹于粢盛水之育源也逹于海君子之聞道也逹于天地之大蓋聞道者必明于權銖兩低昻與道翺翔稱天下以此不以萬物易巳由是觀之病于夏畦曾子難之未同而言仲由不知君子以直養氣而已氣者萬物受命而效形名者也懋逹乎勉之在邦必達在家必逹伯夷叔齊廟記伯夷叔齊墓在河東蒲坂雷首之陽見于水經地志可考不妄其即墓為廟則不知所始以二子之賢意其為唐晉之典祀也舊矣元祐六年豫同年進士臨菑王闢之為河東縣政成乃用四年九月大享赦書以公錢七萬及廢徹淫祠之屋作新廟凡三十有二楹貴德尚賢聞者興起貌象祠器皆中法程某月某甲子有事于廟乃相與謀記嵗月乞文于豫章黃庭堅謹按伯夷叔齊有國君之二子逃其國而不有者也豫嘗求其說伯夷之不得立也其宗與國人必有不說者矣叔齊之立也其宗與國人必有不說者矣于是時紂又在上虐用諸侯則二子之去亦以避紂耶二子雖去其國其社稷必血食如初也雖不經見以曹子臧吳季札之傳考之意其若是也故孔子以為不降其志不辱其身身中清廢中權求仁而得仁又何怨又曰齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓于首陽之下民到於今稱之孟子以為非其君不事非其民不使不立于惡人之朝不與惡人言故聞伯夷之風者貪夫亷懦夫有立志此則二子之行也至于諫武王不用去而餓死則豫疑之陽夏謝景平曰二子之事凡孔子孟子之所不言可無信也其初蓋出莊周空無事實其後司馬遷作史記列傳韓愈作頌事傳三人而空言成實若三家之學皆有罪于聖人者也徒以文章擅天下學者又弗深考顧從而信之以豫觀謝氏之論可謂篤信好學者矣然可為智者道也豫觀今之為吏愒日玩嵗及為政者鮮矣政且不舉又何暇于教民今河東為縣吏治膚敏政成而舉典祀以教民可謂知本矣故樂為之書并書豫所聞二子事以告來者鄂州資深堂記通城縣學官資深堂前縣令臨川鄒君餘損道之所作也通城故崇陽之聚也民病于𨽻崇陽求專逹于武昌故熙寧五年詔割崇陽之三鄉為通城縣六安曹君登子漸為令曹君為吏嚴能知所先後其作邑民勸趨之官府足以鳩民則致力于學宫因其溪山之陽作夫子廟爰及諸生之舍以待其秀民興焉未遑教事而曹君去由是閲數令方貸民出子錢併役兼任而藏其雇傭之竒以為最嵗上丁釋奠府吏執事趨如令則止及令東平王君定民佐才之時病其邑子之不學頗理曹君之緒執經以待問而士不至雖然曹君之功不遂隳墮亦王君之力也鄒君始下車知通城戴君輿耆艾有德而明經術以書幣聘焉戴君至而士大夫有所矜式鄒君曰講堂者利于羣居而不利于宴居使賢者退而與諸生雜處吾懼賢者之不安席也乃因民之餘力而作斯堂于是投耒耜而挾書棄惰遊而受業者日至焉頃之夙夜于其家者知貴老出入于其鄉者知尚齒于市于田見儒衣者皆肅然父老乃相與嘆曰毁我財而成我子弟勞我力而逸我耆老蓋學之功耶繼鄒君者臨川吳君履中與權吳君發政甚愛民而論政先養士其獄犴平矣曰此俗吏之所能也于是復以書幣聘海昏李君亮采李君應之則與李君分職曰子典其教事而我知其政李君力學以待舉修己以致人士皆樂之吳君事退則來燕于堂左經右律靡日不勤凡宫室不能風雨器用不可薦羞皆彌縫補苴使無憾于是通城之學可以責士之不來而士得師友並興于學矣夫性者民所自有也彼其怙富滅德放貧為濫強有力者嚚柔良者不立豈獨民之罪哉長上不勸學也今自曹君以來有勸學之心而猶待四人然後其政行善政之難也如此夫昔者鄒君甚愛斯堂嘗以書抵京師求豫記之㑹豫不暇及是吳君為之請焉豫謂鄒君者名斯堂不空語諸生從事焉不可不知也淺聞寡見者之教也不能引之至于道故學者皆得一而媛媛姝姝彼其得一也非自得之故也孟子曰君子深造之以道欲自得之也見異端而弗能弗畔居之不安也趨下流而失其本資之不深也今夫水决之東則東流决之西則西流背原而往矣左之右之而常逢其原亦必有道矣夫教者欲速效而不使人自得之學者欲速化而不求自得之皆孟子之罪人也故表章鄒君之意以曉諸生若夫挈楹計工述其襟帶溪山之觀則非兩令之屬豫者故不書閬州整暇堂記無事而使物物得其所可以折千里之衝之謂整有事而以逸待勞以實擊虛彼不足而我有餘之謂暇夫不素備而應卒可以徼幸于無患而其顛沛狼戾者十常八九也豈唯人事哉天之于物疾風震雷伏于土中者皆萌動然後阜蕃而成夏落其實而枯其枝然後閉塞而成冬夫惟整故能暇上天之道也昔者晉欒針使于楚楚執政問晉國之勇對曰好以衆整又問如何曰好以暇雖晉國爭盟務以辭相勝充其情楚豈能與中國抗衡哉今之郡守古諸侯也提千里之兵以守關要平居宴安拙者奉三尺而有餘至于倉卒變故巧者應事機而不足此惟不知素整暇也榮陽魚侯仲修仁宗時御史中丞魚公家也儒素有風力其家法存焉為閬中太守知學問為治民之源知芖儉為勸學之路先本後末右經而左律在官二年內明而外肅吏畏而民服乃作堂以燕樂之表裏江山不知風雨于以燕賔客講問闕遺沈沈翼翼千里之觀也堂成而魚侯甚愛之問名于江南黃庭堅庭堅曰若魚侯可謂能整能暇矣故名之曰整暇所以美其成功而勸其未至也詩云逮天之未隂雨徹彼桑土綢繆牖户今此下民或敢侮豫可謂能整矣又曰來歸自鎬我行永久飲御諸友炮鱉膾鯉侯誰在矣張仲孝友前所叙說以告後人後作賦詩以為魚侯壽故并記之冀州養正堂記冀州古信都有漢為安平侯國地當河漳之間一都㑹民習懻忮任俠自武四方遊手之民囊槖其間不事本業其淫俗猶班班見于載籍無名山大川以為要關其地四戰之國也自中原有事于兵革此邦未嘗不與焉故其民空匱憔悴甚于它州聖人撫有四海天下屬安丁壯耕桑老弱不任事百有餘年而民未知休息生養之利嵗一艱食可望以恩者不能相救蓋其地産瘠鹵人不根著故耳于今為州在國北門堅壁重兵樓櫓險壯外夷賔客朝賀有期㑹所由出入故守者常用士大夫之選元豐元年十一月詔用扶風魯侯魯侯忠信豈弟不鄙其州拊循鰥寡動用禮法民奮于田士興于學乃遑暇于燕息之地太守居故有便堂權輿于都水監昌言仲謨而魯侯為築屋四旁與堂周旋風雨寒暑有所遷就而堂事告備魯侯隱几以休詩書酌酒以御賔客巾履徜徉木隂鳥語之中思所以為邦之本而有得焉謂其堂曰養正是在易之頥正吉觀頥自求口實者也齊王之子亦人子也居貴冨之養而氣體與人殊况能自求其心居天下之廣居則所養冝何如呼於垤澤之門者非宋君也而聲似之以其居相似也其居與古人相似而病不及古人吾則不信也夫惟不言不笑不取是非物之情飄風暴雨天地不能持久也未同而言脅肩諂笑苟可以得車所治每下而不耻者吾不知也至于時然後言樂然後笑義然後取彼其中必有以信之詩云鼓鐘于宫聲聞于外夫事其事而小大得情語默當物齊心服形于宫庭屋漏之地而民氣和于耕桑隴畝之上彼其于性命之情必有不蘄于規矩凖繩而正者焉嘉魯侯之不鄙其州知律民者在巳得巳者在心其居民上不以一日忘所以養源者故極言其致遺魯侯鑱石壁間使信都之士師魯侯之好學以成其材其民知魯侯之用心而勸其事又使來者得覽觀焉魯侯名有開字元翰簡肅公之子能世其家者也筠州瑞芝亭記晉陵邵君叶為新昌宰視事之三月靈芝五色十二生于便坐之室吏民來觀無不動色相與言曰吾令君殆將有嘉政以福我民乎山川鬼神其與知之矣不然此不蒔而秀不根而成非人力所能致而自至者何也乃相與廓其室四逹為亭命曰瑞芝奔走來謁記于豫章黃庭堅黃庭堅曰豫觀神農草木經青芝生泰山赤芝生衡山黃芝生嵩山白芝生華山黑芝生常山皆久食而輕身延年而不老蓋序列養生之藥不言瑞世之符又其傳五芝曰赤者如珊瑚白者如截肪黑者如澤漆青者如翠羽黃者如紫金皆光明洞徹如堅氷而世之所名芝草不能若是也故嘗考于信書自先秦之世未有稱述芝草者及漢孝武厭飫四海之冨貴求致神仙不死天下騷然元封中乃有芝草九莖連葉生甘泉殿齊房中于是赦天下作芝房之歌孝宣興于民間勵精萬事事無過舉然廟享數有美祥頗甘心焉故復修孝武郊祀以瑞紀年元康中金芝九莖産函德殿銅池中然此芝不生于五嶽果神農經所謂芝者耶豫又竊怪漢世既嘉尚芝草而兩漢循吏之傳未有聞焉何也豈其所居民得其職所去民思其功生則羽儀于朝歿則蒸嘗于社則是民之鳳凰麒麟醴泉芝草也耶抑使民田畝有禾黍則不必芝草生户庭使民伏臘有雞豚則不必麟鳳在郊棷黠吏不舞文則不必虎渡河里胥不追擾則不必蝗不入境此其見效優于空文也耶昔黃霸引上計吏問興化之條有鶡雀來自京兆舍中飛集丞相府上霸以為皇天報下神雀欲圖上奏京兆尹張敞言郡國計吏竊笑丞相之仁厚智略有餘而微信竒怪也恐丞相興化之條或長詐僞以敗風俗天子嘉納焉劉昆為江陵令連年火災昆輒向火叩頭多能反風降雨遷𢎞農太守驛道多虎崤澠不通昆為政二年虎負子渡河乃召入為光祿勳詔問昆江陵反風滅火𢎞農虎北渡河行何德政而致是對曰偶然耳左右皆笑其質帝歎曰是乃君子之言由君子觀之張敞之篤論世祖之知言建成之文不如光祿之質也雖然新昌之吏民愛其令君將徼福焉焉可誣也又嘗試論之古之傳者曰上世蓋有屈軼指佞萐莆扇庖蓂莢紀厯嶰竹生律既不經見後世亦不聞有之則前世之有芝草特未定也邵君家世儒者諸父兄皆以文學行義表見于薦紳邵君又喜能好修求自列于循吏之科故其氣焰而取之異草來瑞使因是而發政于民慘怛而無倦民將盡力于田士將盡心于學則夫非常之物不虛其應且必受賜金增秩之賞用儒術顯于朝廷矣豈獨夸耀下邑而已乎故并書豫所論芝草循吏之實使歸刻之論語斷篇論語一書孔子之門人親受聖言雖經秦火編簡斷缺然而文章條理可疑者少由漢以來師承不絶比諸傳記最有依據可以考六經之同異證諸子之是非學者所當盡心夫趨名者于朝趨利者于市觀義理者于其㑹論語者義理之㑹也凡學者之于孔氏有如問仁有如問孝問政問君子者衆矣所問非有更端而所對每不一蓋聖人之于教人善盡其材視其學術之弊性習之偏息黥補劓之功深矣古之言者天下殊塗而同歸百慮而一致學者倘不能領㑹恐于義理終不近也近世學士大夫知好此書者已衆然宿學者盡心故多自得晚學者因人故多不盡心不盡其心故使章分句解曉析詁訓不能心通性達終無所得荀卿曰善學者通倫類蓋聞一而知一此晚學者之病也聞一以知二固可以謂之善學由此以進智可至于聞一以知十由此以進智可至于一以貫之一以貫之聖人之事也由學者之門地至聖人之奧室其塗雖甚長然亦不過事事反求諸已忠信篤實不敢自欺所行不敢後其所聞所言不敢過其所行每鞭其後積自得之功也夫不仕無義也子使漆雕開仕對曰吾斯之未能信而孔子說蓋漆雕開在聖人之門聞義雖甚髙至于反身以自誠則未能篤信其心未能篤信則事至而不能無惑以不能無惑之心適事而欲應變曲當不可得也此漆雕開所以不願仕也先王制禮行道之人皆有三年之愛于其父母而宰豫欲于朞祥之中食稻衣錦引天下至薄之行自以為安漸漬孝弟之說不為不久豈其無所忌憚吐不仁之言至于如此蓋若宰豫者其先受之質薄自其至誠內觀實見三年為哀已忘而強勉為之者將欲加厚其質而不可得故不敢少自隱匿方求孔子之至言以洗雪其邪心以窮受薄之地不暇恤人之議己也豈其不仁者欲見一時之言而近仁者將載于終身之行古之學者所自得于內而不恤其外凡如此也此所以有講有學有朋友切磨以相發明非為文章可傳後世辨論可屈衆人而發也其所聞于師與自得于心者如此方其學于師也不敢聽于耳而聽之以心于其反諸身也不敢求諸外而求之內故樂與諸君子講學以求養心寡過之術志勇之不作久矣同與諸君勉之孟子斷篇由孔子以來求其是非趣舍與孔子合者唯孟子一人孟子聖人也荀卿著書號為祖述孔氏而詆訾孟子以為略法三王而不知其統蓋荀卿見孟子道性善言必稱堯舜義不見諸侯其迹與孔子不合故云爾曾不知前聖後聖所謂合若符契者要于歸潔其身者觀之孟子論孔子去魯不知者以為為肉其知者以為為無禮乃若孔子則欲以微罪行以微罪行此聖人之忠厚非孟子不足以知之學者欲知孟子率以是觀之其智不足以知孟子安能知孔子然則荀卿所謂知孔子者特未可信聖人無名而淳于髠以名實求孟子固不足以知之荀卿曾未能逺過淳于髠也揚子雲曰孟子勇于義而果于德知言之要知德之奧非苟知之亦允蹈之言雖不多以子雲之言行反覆考之足以發子雲之知言司馬遷號稱博極羣書至如論伊尹百里奚皆不信孟子此所以得罪于子雲也由孔子以來力學者多矣而才有孟子由孟子以來力學者多矣而才有揚雄來者豈可不勉方將講明養心治性之理與諸君共學之惟勉思古人所以任巳者跛奚移文女弟阿通歸李安詩為置婢無所得乃得跛奚蹣跚離疏不利走趨顙出屋檐足達戶樞三嫗挽不來兩嫗推不去主人不悅厨人怒罵黃子笑之曰堯牽羊而舜鞭之羊不得食堯舜俱疲百羊在谷牧一童子草露晞而出草露濕而歸不亡一羊在其指撝故曰使人也器之物有所不可則亦有所宜警夜偷者不以馬司晝漏者不以雞凖繩規矩異用殊施天傾西北地缺東南尺有所不逮寸有所覃子不通之則屨不可運土蕢不可當履坐而睨之小大俱廢子如通之則瞽者之耳聾者之目絶利一源收功十百事固有精于一則盡善遍用智則無功有所不能乃有所大能焉呼跛奚來前吾為若詔之汝能與壯士拔距乎能與羣狙爭芋乎能與八駿取路乎能逐三窟狡兔乎皆曰不能曰是固不能閨門之內固無所事此今將詔若可為者汝無狀于行當任坐作不得頑癡自今謹飭晨入庖舍滌鎗瀹釡料簡蔬茹留精黜粗臠肉法欲方膾魚法欲長起溲如截肪煮餅深注湯和糜勿投醯韲臼晚用薑葱泄不欲焦旋葅不欲黃飯不欲著牙揚盆勿駐沙進火守烓水沃沸鼎斟酌薌芼生熟必告姨㜮臨食爬垢撩髮染指􅜻杓嘬胾懷骨事無小大盡當關白食了滌器三正三反收拭蠲潔寢匙覆埦陶瓦髹素視在謹數兄弟為行牡牝相當日中事閒浣衣潄襦器穢器淨謹循其初素衣當白染衣增色梔鬱為黃紅螺蚜光挼藍杵草茅搜橐皂漿胰粉白無不媚好燥濕處亭尉帖坦平來往之役資它使令牛羊下來喚雞棲桀撑拒門關間護草竊飲飯猫犬堙塞鼠穴凡鳥攫肉猫觸鼎犬􅜻鎗鼠窺甑皆汝之罪也春蠶三卧升蔟自裹七晝七夜無得停火紵麻藤葛蕉任絺綌鍚踈手作無有停時紾緝偷工夫一日得半工一纓亦有餘暑時蘊蒸肩凉蜜水薰艾出蚊氷􅐻去蠅果生守樹果熟守筥執弓懷彈驅嚇飛鳥無得吮嘗日使殘少姆嫗罵譏瘧痢泄嘔天寒置籠衣衾畢烘搔癢抑痛炙手撋凍無事倚牆鞋履可作堂上囂呼傳聲代諾截長續短鳬鶴皆憂持勤補拙與巧者儔凡前之為汝能之不跛奚對曰我缺于足猶全于手如前之為雖勞何咎黃子曰若是則不既有用矣乎皆應曰然無不意滿解疑或議涪翁御奴婢不用鞭撻能慈而不能威涪翁笑曰奴婢賤人不過為惡而詐善慢令而詐恭當其見效在前雖我亦不能不怒退而自省不肖之狀在豫躬者甚多方具自鞭其後又何暇捨巳之沐猴而治人之沐猴哉或曰孔子曰小懲而大戒小人之福也然則非歟涪翁曰然有是言也不曰不教而誅謂之虐不戒視成謂之暴慢令致期謂之賊乎今之用鞭撻者有能離此三過乎昔陶淵明為彭澤令遣一力助其子之耕耘告之曰此亦人子也善遇之此所謂臨人而有父母之志者也夫臨人而無父母之心是豈人也哉是豈人也哉宋文選卷三十一
