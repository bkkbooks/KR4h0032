body:
  text: 宋文選巻七王禹偁文投宋拾遺書十一月二十日鄉貢進士王某謹齋莊沐浴裁書百拜於拾遺執事某嘗謂書契以來以文垂教者首曰孔孟之道始否而終泰則孟不足侔於孔也何者夫子連聘七十國而無尺土之位則否於始也明矣洎祖述堯舜憲章文武張三綱之目提五常之領制禮以檢人迹作樂以和人心恢刑政以救人失崇祭祀以介人福使後之為君者為臣者為父者為子者不可斯須而離也則泰於終也又明矣孟子生不享其位死不行其教所著書亦在世之空文爾孰學而行之乎唯皮子請以孟氏為學科屬唐祚將終棄而不用可痛惜哉孟軻氏没揚雄氏作時哀平失道賢莽用權子雲以窮愁著書始務脫禍故作太𤣥凖周易法言凖論語微機深㫖世人鮮知能師而受者止一侯芭而已方之孟氏季孟間也揚雄氏喪文中子生知隋運將終聖道來躋退居河汾間修先王之業九年而成王氏六經門弟子有若鉅鹿魏徴河南房元齡京兆杜如晦咸北面師之隋文中子迹逝矣門弟子歸於唐盡出先師之道以弼於文皇故能立貞觀之業垂三百年傳十八葉夫豈非王氏教之效歟謂隋之夫子焉雖劣於仲尼而復優於孟揚又明矣文中子滅昌黎文公出師戴聖人之道述作聖人之言從而學者有若趙郡李翱江夏黄頗安定皇甫湜固其徒也然位不足以行其道時不足以振其教故不能復貞觀之風矣獨以詞㫖幽逺規正人倫亦曰唐之夫子焉下韓氏二百年世非無其文章罕能聚徒衆於門張聖賢之道矣其或者復授於明公乎明公履孔孟揚雄之業振仲淹退之之辭矧天與其時身得厥位則追還唐風不為難焉然登明公之門師明公之道者甚禾衆止聞胡田二君矣豈明公道髙徳深之所隔也而誨人誘善之未至耶某又聞不傷胎卵之命則麟鳯見矣不骨死馬之骨則千里之駒來矣明公方欲張姬孔之道聚游夏之風盍以某為首則賢於某者不逺千里而至矣賢既至則明公之道得不光明乎道之光明也則明公得不為宋之夫子乎得不為文之大柄乎頃者明公之典宋魯也某嘗策杖辭親掲厲行潦編文著書求明公之顧一接威重屬明公有泰山之禱某以晨羞闕貢旅火是逼不果志業彷徨而歸居魯西二年間貧病相絆乞衣假食以給切累勉強為文皆有悲愁寒凍之意不知他人之見者憫乎咎乎周乎舍乎但以硯席舊交變化殆盡故里眦睚以為不才今年春始敢囊琴笈文來詣輦轂登明公之門以求譽師明公之道以進身未知明公按劍而拒之解榻而延之向所謂以某為首則賢於某者不逺千里而來矣其在今日哉且某輟㫖甘之具為桂玉之費久留闕下則身與親凍餒俱至矣進之退之俟明公命答黄宗旦書某白秀才黄生足下淳化初某自西掖貶官商洛生走僕齎書且引孫何丁謂之事求知於我後一年某徴拜右正言直昭文館改禮部員外郎知制誥召入翰林充學士留闕下者二年生未嘗及吾門洎某黜守滁上生復辱書惠文以尋前好是生不以位之髙下專以道求於我也甚善甚善觀生之文詞理雅正讀之忘倦若與胡舍人論春秋書述數千年事迹議數十家得失剖析明白若抵諸掌雖古作者無以過此又顔子好學論援經而證事義盡而語簡使薛邕而自為之未必至是生道日益而文日新也某前書所謂生之文二子之文也天下人將知之不誣矣然而謀道者貴乎有益求知者貴乎盡心生之於我也厚矣我之於生也其有隱乎何者某讀生正漢臣策對一章文義誠為髙古其間責晁錯不言王道謂漢文幾於王矣以史傳較之責錯太重褒文稍過耳語曰擬人必於其倫又曰人之有過各於其黨觀過斯知仁矣說者曰小人不能行君子之行非小人之過也夫行王道者禹湯文武周公而已漢文何主哉言王道者孔子孟軻荀卿揚雄而已晁錯何人也故子長稱錯學申商刑名峭直刻深者也是以錯之對策不根古道直指時事而亦有譏焉其對國之大體引五帝者蓋言漢文不能行帝道也對人情之終始引三王者蓋言漢文不能行王道也對直言極諫引五霸者蓋言漢文止正師納諫如五霸焉志在削諸侯尊天子亦伯臣之傑者也又其殺身奉國有足多者於王道則逺矣故曰責錯太重者為是也夫西漢諸帝孝文最賢節儉愛人誠得之矣幾乎王道則恐未能孟子稱仁政必自經界始而漢廢古井田用秦阡陌是本已去矣禹㑹塗山玉帛萬國一防風後至而殺之不赦周公於三叔親可知也流言一作伐而滅之呉王稱疾不朝文帝賜之几杖養成大惡流患子孫行王道者果若是乎至嬖鄧通為賢臣放賈生為王傅惑辛垣平之妖而黷祀五帝忿馮唐之諫而曰獨亡間處耶失德盈編不可悉數故曰褒文稍過者是也雖然生以大儒之行專取王道亦無累於文也某以朋友切磋之道待生而有是說也生以為何如某頓首答張扶書秀才張生足下僕之登第也與子之兄為同恩生故僕兄事子之兄父事子之父子之於僕亦弟也子又以攜文致書問道於我他人宜有答也况子之於我哉然僕頃嘗為長洲令因病起抄書得目疾不喜視書書不讀久矣雖強之少頃必息其目不數日不能竟一巻用是見僕道益荒而文益衰也又四年之中再為謫吏頓挫摧辱殆無生意以私家衣食之累未即引去黽勉于簿書間以度朝夕尚有意講道而評文乎為子力讀十數章茫然難得其句昧然難見其義可謂好大而不同俗矣夫文傅道而明心也古聖人不得已而為之也且人能一乎心至乎道修身則無咎事君則有立及其無位也懼乎心之所有不得明乎外道之所畜不得傳乎後於是乎有言焉又懼乎言之易泯也於是乎有文焉信哉不得已而為之也既不得已而為之又欲乎句之難道耶又欲乎義之難曉耶必不然矣請以六經明之詩三百篇皆儷其句諧其音可以播筦弦薦宗廟子之所熟也書者上古之書二帝三王之世之文也言古文者無出於此則曰惠廸吉從逆凶又曰德日新萬邦惟懐志自滿九族乃離在禮儒行者夫子之文也則曰衣冠中動作慎大讓如慢小讓如偽云云者在樂則曰鼓無當於五聲五聲不得不和水無當於五色五色不得不彰在春秋則全以屬辭比事為教不可備引焉在易則曰乾道成男坤道成女日月運行一寒一暑夫豈句之難道耶夫豈義之難曉耶今為文而捨六經又何法焉若第取其書之所謂弔由靈易之所謂朋盍簮者模其語而謂之古亦文之弊也近世為古文之主者韓吏部而已吾觀吏部之文未始句之難道也未始義之難曉也其間稱樊宗師之文必出於己不襲蹈前人一言一句又稱薛逢為文以不同俗為主樊薛之文不行於世吏部之文與六籍共盡此蓋吏部誨人不倦進二子以勸學者故吏部曰吾不師今不師古不師難不師易不師多不師少惟師是爾今子年少志專雅識古道又其文不背經㫖甚可嘉也姑能逺師六經近師吏部使句之易道義之易曉又輔之以學助之以氣吾將見子以文顯於時也某頓首再答張扶書秀才張生足下僕之前書欲生之文句易道義易曉遂引六經韓文以為證生繼為書啟謂揚雄以文比天地而下云云者甚乎哉子之篤於道而好於古者也僕為子條辨之庶知僕之用也子之所謂揚雄以文比天地不當使人易度易測者僕以為雄自大之詞也非格言也不可取而為法矣夫天地易簡者也測天者知剛健不息而行四時測地者知含𢎞光大而生萬物天地畢矣何難測度哉若較其尋尺廣袤而后謂之盡則天地一器也安得言其廣大乎且雄之太𤣥凖易也易之道聖人演之賢人注之列於六經懸為學科其義甚明而可曉也雄之太𤣥既不用於當時又不行於後代謂雄死已來世無文王周孔則信然矣謂雄之文過於伏羲吾不信也僕謂雄之太𤣥乃空文爾今子欲舉進士而以文比太𤣥僕未之聞也子又謂六經之文語艱而義奥者十二三易道而易曉者十七八其艱奥者非故為之語當然矣今子之文則不然凡三十篇語皆迂而艱也義皆昧而奥也豈子之文也過於六籍耶若猶未也子其擇焉子謂韓吏部曰僕之為文意中以為好者人必以為惡焉或時應事作俗下筆令人慚及示人人即以為好者此蓋唐初之文有六朝淫風有四子艷格至貞元元和間吏部首唱古道人未之從故吏部意中自是而人能是之者百不一二下筆自慚而人是之者十有八故吏部有是歎也今吏部自是者著之於集矣自慙者棄之無遺矣僕獨意祭裴少卿文在焉其畧云儋石之儲不供於私室方丈之食毎盛於賔筵此必吏部自慙而當時人好之者也今之世亦然也子著書立言師吏部之集可矣應事作俗取祭裴文可矣夫何惑焉又謂漢朝人莫不能文不獨司馬相如劉向揚雄為之最是謂功用深其文名逺者數子之文班固取之列於漢書若相如上林賦喻蜀封禪文劉向諫山陵揚雄議邊事皆子之所見也曷嘗語艱而義奥乎謂功用深者取其理之當耳非語迂義暗而謂之功用也生其志之向有江翊黄者自謂好古僕見其文義尚淺故答之曰修之不已則為閒人今子希慕髙逺欲專以絶俗為至故僕欲子之文句易道義易曉也孔子曰由也兼人故退之求也不及故進之亦僕之志也某頓首代伯益上夏啟書臣益言臣與先帝比肩而事堯舜在二十二人之數先帝以老臣為賢以天下授臣臣德薄力寡不足當之且知天意人事盡歸於吾君矣今君身臨大寳手握神器老臣得伸一言以為禆益哉夫天下者非一人之天下也天下之天下也理之得其道則民輔之失其道則民去之民既去又孰與同其天下乎故帝堯不授於子而授於大舜大舜不傳於家而傳於先帝蓋恐失道而民去矣是知親一子則不能子兆人成一家則不能家六合聖人之用心也如是先帝得之雖勤吾君繼之忽忘其勤臣恐失大寳而毁神器也先帝力拯横流為民粒食得九疇定九州乗四載距四海櫛風沐雨奠山濬川却昏墊之憂平水土之患以父殛而是念聞子哭而不名然後六府孔修四隩攸宅興播植之科定貢賦之差億兆熈熈以成淳化是以授禪而有天下可謂艱難矣及其在位也卑宫室惡衣食見罪人而泣聞昌言而拜故能㑹諸侯於塗山執玉帛於萬國可謂勤儉矣今君得不思其艱難乎念其勤儉乎且創業者易守文者難始則苦於焦勞終或流於逸樂今君生居帝宫坐即大位勿謂家傳之勿謂已有之宜惕惕而懼其失也矧乎天無所親親於有德人無所懐懐於有仁苟不肖而毁先業亦為臣羞吾君以臣言為何哉聴用之則銘於案几可也罪咎之則斥於荒裔可也庶幾老臣朽骨泉壤見先帝而無愧色矣斯言非佞君其念之臣益頓首擬留侯與四皓書漢丞相留侯張良謹裁書遣使致於商山四先生侍者蓋聞有天地以來聖人曰軒轅有崆峒之請又曰帝堯有箕山之讓况乎風移世變民澆化漓北面而為臣者乎有國家之未决智慮所不及得不資取於賢士哉先生抱大道藏大器榮辱之事出於身外興亡之理了於掌中膠漆雲泉泥滓爵位瓊林瑶池以遊以息雲漿霞饌以飲以食芳君桂父先生之交也青鸞紫鳯先生之駕也龜亡鶴夭神氣愈清桂朽椿枯童顔未改萬乗不能屈其節千金不能聘其才真所謂神仙中人風塵外物然而歴觀古之聖賢未嘗不有意於民也故隱見隨其時語黙得其所進則為天下之福退則為天下之亂在暴秦勃興荼毒華夏虎猛擇肉網宻凝脂君德甚於虎狼人命輕於草芥先生知國不可輔民不可化拂衣髙蹈遁於山林其隱也可謂得其時矣今皇帝奮布衣提利劍撥大亂定大難起龍虎於豐谷㑹雲雷於泗濵席巻亂秦電掃強楚可謂英雄矣既而革秦之暴纂堯之緒定覆盆之固成垂拱之風唯於儲嗣之間忽有廢立之義臣下股慄弗敢遑寧良與帝同起於草莽間始五六年經七十戰出竒畫策未嘗有一事見違唯於此時言不獲用既掉三寸舌為帝者之師封萬户侯乃布衣之極敢於此際愛死不諫乎蓋恐死而無益於國事矣良又聞古之天下者禪讓於賢今之天下者封樹其子亦已德薄於古矣苟不選賢擇能樹嫡立長能無毁宗社乎今太子為人元良立事貞固少海流潤洊雷震聲三善克隆百枝無䘮帝欲廢而不用天下失望朝廷愕然先生於此時可不有意於民哉良願先生出雲關開岫幌駕𤣥鶴馭金虬俯降殿庭辱對旒冕定天下之惑决君上之疑隱見語黙之道豈獨美於昔賢耶以免於聖人之所議望先生無截轅杜轡之虞發函一披則萬國幸甚良頓首待漏院記天道不言而品物亨歳功成者何謂也四時之吏五行之佐宣其氣矣聖人不言而百姓親萬邦寧者何謂也三公論道六卿分職張其教矣是知君逸於上臣勞於下法乎天也古之善相天下者自咎䕫至房魏可數也是不獨有其德亦皆務於勤耳况夙興夜寐以事一人卿大夫猶然况宰相乎朝廷自國初因舊制設宰臣待漏院於丹鳯門之右示勤政也至若北闕向曙東方未明相君啟行煌煌火城相君至止噦噦鸞聲金門未闢玉漏猶滴徹蓋下車於焉以息待漏之際相君其有思乎其或兆民未安思所泰之四夷未附思所來之兵革未息何以弭之田疇多蕪何以闢之賢人在野我將進之佞人立朝我將斥之六氣不和灾眚洊至願避位以禳之五刑未措欺詐日生請修德以釐之憂心忡忡待旦而入九門既啟四聰甚邇相君言焉時君納焉皇風於是乎清夷蒼生以之而富庶若然總百官食萬錢非幸也宜也其或私讎未復思所逐之舊恩未報思所榮之子女玉帛何以致之車馬器玩何以取之姦人附勢我將陟之直士抗言我將黜之三時告灾上有憂色搆巧詞以悦之羣吏弄法君聞怨言進謟容以媚之私心慆慆假寐而坐九門既開重瞳屢迴相君言焉時君惑焉政柄於是乎隳哉帝位以之而危矣若然則死下獄投逺方非不幸也亦宜也是知一國之政萬人之命懸乎宰相可不慎歟復有無毁無譽旅進旅退竊位而苟禄備員而全身者亦無所取焉棘寺小吏王某為文請誌院壁用規於執政者年月日記四皓廟碑易稱知進退存亡而不失其正者其唯聖人乎先生避秦知亡也安劉知存也應孝惠之聘知進也拒髙祖之命知退也四者備矣而正在其中先生非聖而孰為聖乎若其秦亂而不避則焚書坑儒髙斯之流也漢危而不出則素隱行怪巢由之徒也應髙祖之命則溺其冠而騎其項矣拒孝惠之聘則功不立而名不稱矣引而伸之先生可謂全德者矣嘗試論之曰古稱周公聖人也鞭伯禽教孺子居攝六年明辟未復而召公不説於内三叔流言於外盛德大業幾墜於地吁扶㓜君秉大政之難也有如是哉觀乎戚姬之嬖如意之寵以妾並后以孽代宗本根一揺社稷將墜咸謂扶蘇之賜死胡亥之亡國可翹足而待也何止炎靈之不祀抑亦黔首之罹禍豈無留侯陳八難罷六國則可議主鬯則以水而投石也豈無曲逆間強楚解長平則可言立嫡則圓鑿而方枘也先生一出而助之一言而定之漢庭公卿皆出其下而能錙銖鍾鼎桎梏衣冠安萬乗而不有其功抗匹夫而不食其禄自非至人逹識孰能與於此乎向使先生定漢嗣為漢臣報德議功必在平勃之右當以左輔右弼前疑後丞而處之居是時也以四鉅賢事一少帝挾震主之威負不賞之功又何止流言不説之事哉欲望其茹紫芝卧商嶺其可得乎是知先生之出非獨謀漢也實將救時也先生之退非獨全身也亦將矯世也危而䕶之不宴安於獨善可謂救乎時矣定而去之不乗時以聚禄可謂矯乎世矣用是警民猶有建相立順之徒矣嗚呼世之為人臣議廢立者可勝道哉或因定策而専國或因援主而無君戕殺兇殘何莫由此其後滔天於莽卓盗國於曹馬移徙龜鼎易於奕棋纍纍簡編可為太息是以先生危則坐之安則去之其來也至公於萬民其往也無私於一身前所謂知進退存亡而不失其正者千古四賢而已或者周公相成王攝天子功成治定制禮作樂號為先聖歴代仰之豈先生之道過於周公乎愚曰周公乗文武之業知王化可興故輔之以行道焉先生當暴秦之後知伯道終雜故去之以逺害焉周公聖人之用者先生聖人之晦者但時異而迹殊耳非所謂過乎周公者辛夘歳予坐事解制誥職翌日有商於貳使之命下車拜廟西山之側退立廊廡古碑在焉自唐御史大夫賛皇李公而下作者若干人因歴覽之美則美矣叙先生之道似有未盡就館濡筆申之以碑斯文也豈直歌鴻飛狀鶴髪而已哉實欲使立朝廷為臣子而挾㓜冲圖富貴者聞而知懼亦春秋誅亂臣賊子之㫖也其詞曰猗歟先生時行則行髙眠商嶺逃難秦坑知秦之祚亡於子嬰知漢之祚存於惠盈一言悟主萬邦以貞不有其功不食其禄逺害全身矯世勵俗清泉洗耳紫芝充腹獵犬自烹冥鴻不復矯矯髙節悠悠後來漢之戾園晉之愍懐江充厚誣賈后雄猜先生不生孰為來哉昏亂之世廢立不已操欺孤兒莽抱孺子成既自我權亦歸已先生不生孰將去矣蒼野峩峩祠荒薜蘿遺像斯在德音可歌清風廩廩素髮皤皤永懐貞道刻石山阿宋文選巻七
