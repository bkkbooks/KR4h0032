body:
  text: 宋文選巻二十二李邦直文固本䇿講學者所以進於先王之道軌制其情欲増長其心術扶神理性祛滯决惑如是而已者也人之不學則不知先王之道茫乎如冥行而無所之雖有仁智靈識且化而為邪矣故剛者不學為暴不為斷柔者不學為懦不為仁明者不學則過察而偏聰者不學則過聴而亂學先王之道知忠信仁義之原與安危禍福之所自召愚可以為智闇可以為明以中人之資而不失為君子學可不務哉魯哀公自稱曰生于深宫之中長于婦人之手未嘗知哀未嘗知樂未嘗知喜未嘗知懼而孔子告之以哀樂喜懼之説竇長君出于田間平勃恐其驕而為不善使與當世賢士長者居故竇長君卒為賢侯今夫百金之家則必求良師友以業其羣㓜子弟矣師友或不擇而使羣子弟日與庸𨽻浮民為儕黨詡詡囂囂相與扇暱而為惡學之不率而恣于毬鞠博簺彈弋狗馬之間未見能善其後也雖有百金之産里巷之人咸知其通蕩轉徙可拱而俟矣惟其友之不擇故墜其羣㓜于小人之塗以遺家之辱非㓜者之罪長者之弗思也故賢父兄莫不求師友使材其子弟而業之百金之家尚知慮此况有天下之冨將以藩戚為手足而衛心腹將以宗室為枝葉而强本根其體如是之重是尤宜長計而逺慮者豈不若百金之家之為者哉書載堯徳之首必曰親九族九族親則曰平百姓百姓平則曰和萬邦其先後次第如此本支百世文王也貽厥孫謀以燕翼子武王也周官有師氏保氏大司樂之職其世子皆齒列國子弟而共學而受六徳六行六藝之教其法葢詳矣本朝太宗亦嘗擇王龜從等厚賜以寵之使訓諸王以忠孝而章聖用崔􅀈之嚴以代戚維之不職如此其重慎也今宗枝之盛昌大而蕃衍尊寵而優安振振於古矣然亦或失於不學此非後世之大慮而王室之所甚闕者歟今諸宫雖有其職而任之或非其人雖有其人而待之或非其禮朝廷未嘗選當世賢者為宫官其用薦而為之者又未嘗延見戒諭之以厚其意宗室知人主任之之薄則師之不得不輕舒惰尊驕孰敢諷礪之者苦學術如垢病視師道如泥塗故賢者亦恥居是職望望以去文孫武子入則與嬖人妾子嬉出則與徒奴倖倡語習于浮滛湛於宴娱耳目惟不善之接非所以重世而光國也雖有河間之雄材東平之樂善唐元軌之長厚亦漂溺矣以明主之仁篤于親親之恩差等其戚踈隆以貴爵豐以廪餼雖厚若此徒足其欲而已耳議者考古義而較之于今以謂愛育之道其缺然也臣願詔大臣選端厲誠潔之士著行能通經術者任以為宗室教導之官而嚴異其禮以待之使宗室漸知尊學重道之問無有倨而不聴者然後横經聚問指示聖賢之意曰如是謂忠信孝弟仁義禮樂用之必安而終身享其福此可為者也謂不善為之則雖冨貴而有危亡之禍此不可為者也授以六藝之趣三綱五常之極與前史所載歴世治亂之體皆俾畧知大體陛下復于朝讌之隙或臨幸而察之或召而勉進之又稍為褒貶之格以朂其良以警其惰凡憸薄小人與嬉㺯非禮之具弗得納于其門使之日清月糅性習相長九族愉愉知為善歸正之路則慈祥篤順寛博之風行于王家而上榮祖宗下儀四海内矣厚俗䇿民之厚薄無古今顧治道何如耳今之天下土地廣而人民衆兵冦不作咸安于漁樵耕織之業其盛可與古治侔矣所愧于古者風俗之不厚也風俗之薄非民之罪非質性而然國家法制之失也風俗之大端孝弟而已矣民之忘孝弟而溺於薄惡考之于古未有甚于今者也賈誼語秦之俗曰家富子壯則出分家貧子壯則出贅借父耰鋤慮有徳色母取箕帚立而誶語抱哺其子與公併倨婦姑不相悦則反唇而相稽以為慈子嗜利去禽獸亡幾今天下之民莫不割其室廬計其桑柘殊井爨墳墓離血氣色膂之親而邈若胡越其聫族而居者千室無二三焉奚翅秦俗之薄也秦俗之薄亦商鞅為之耳商鞅之法家有兩男而不分異者倍其賦秦人安得而孝弟也今國家計丁黄以任征役之事其籍異而口寡者皆幸而免焉幸免者衆而征役之事併于同籍之家故乖析者自視以為計而愷悌之民困于調發亦分丁離籍以求幸免于征役之事甚者寡母之嫁喜䘮期之終朝為天倫暮為鄰里朝為九族暮為冦仇争辨錐刀囂囂于郡邑奚翅秦俗之薄也夫民固無知在為上者導之而已矣今導之以幸免之路使天性愷悌者廹于征役牽于法制而不得遂其輯睦同居之樂一室為之千室慕之慕惡之風曖然盈于天下耳目之所習民咸以是為適然莫有羞愧怪駭者故曰非民之罪非質性而然國家法制之失也國家建太平之業將以比隆于唐虞軼迹于三代顧與秦同俗而尚不知變乎周之時閭師黨正州長鄉大夫之職皆親民之吏也或正嵗或月吉則書其民有孝弟睦婣之行者而謂之賢者國有力政則不及焉其鄉師又為鄉刑以糾其尤不率者也漢之時孝者復其身時有所賜其奬勸孝弟睦婣之俗而懲薄惡之民教訓法度葢詳備如此尚懼狃習之未去而民縱其欲而弗勉焉今雖未能如周漢之法為之懲沮而又開幸免之路導民於睽異薄惡而曽不為禁歟其有所謂勸善之法不過誘鄉愚夫婦剟髀以食其長上之癯疾者然後賞之以粟帛斯以為孝弟而已矣此正先王之所誅也古之聖人於化民也不務為其所難有一人焉能奮然而為天下之所不能為而無益于治謂之惑世故舉世之人不敢為鬼怪非常之行驚衆以為髙性適於中和而已今夫田野之民少長怡怡冬夏相羣于丘墓園廬之間弟從其兄子從其父務趨雨澤而力耕耨閒暇有餘之時炮羔炊黍臘社而嘗烝不為悖慢鬭博踔去他所惑抵戮辱以憂其家者斯足以為孝弟之民矣其斯以為教故民之從之者樂而易今且賤樂易中和之行擾之使不得為而勉之以其所難以導民觀先王之教葢未有然者也臣以為欲風俗之厚莫若誘民於孝弟欲民之孝弟莫若使離異者不得幸免其征役今若著為定令同産宗族䘮服期年以上者雖析籍異賦亦總計其丁黄之數而任征役之事親盡然後與他戸同既不得以籍異口寡而幸免焉則囂薄之民無所望而愷悌之民得以遂其常性而為輯睦同居之樂一室為之千室慕之則篤厚之風漸於天下矣不耗刑賞不撓律令非有甚髙之議難行之説奚為而不可為耶若夫約周漢勸懲之㫖而為之法則又朝廷之美臣愚不能預也民之厚薄無古今顧治道何如耳廣助䇿人之于事不專則不可以有成譬之工人焉智者彈畫而按使有力者運斤揮斵各執其具各治其事不復紛紛齊于其上工之長則彈畫者不至于錯繆而功易成矣或者得智匠而任以為工之長使之為大室不得專於彈畫而又齊之以庸工則智者日為庸工之所擾其心以為不已治之彼或姦偷而不力于事乃敗一室故左手持斤以治楹右手持斵以治橑又目視榱桶思易而正之中心雜然其智不盡于為室之大體功安得而成哉惟輔相之治國亦然天下之事治富矣治其綱要而弗為煩屑之所叢則慮專而䇿得夫進賢退姦使百官各得其任為禮樂教化文武法度以鎮撫逺近之民上翼天子于道而外應四夷之變此政之本統輔相之所宜思也及乎章牘之後先命誥之詳畧程式之髙下勾剥其互異審䖏其條次細文曲例毫末之間此正吏胥之事耳今也輔相不得專心于巨論大計而常兼為吏胥之事則雖周召之才將不足以給之故朝廷簡輔相甚當其强敏者僅足以祛决奏署而無所留而政之本統或不及思則比比負責而去上下輙指朱墨之誤以扺輔相而吏胥豪于其間姦有所庇而憂譴不及如是雖周召復出知不可以成治功矣今文武之柄舉歸之中書樞宻院其所以令于天下者一言之増損或可以繫刑罰爵禄之輕重厚薄居二府者故亦不敢以任吏胥也臣愚以為欲分二府耳目之小勞使得專心于巨論大計而不屑簿書之間减曲私之訪有讜直博雅之助莫若東漢府掾之制為可復也三公之府有長史有曹掾或主署用遷除或主民户祠祀農桑或主詞訟盗賊或主貨幣鹽鐡或主倉榖郵驛或主卒徒轉漕或主奏議或録衆事皆以天下賢者巖穴䖏逸郡國茂異為之特為仕進之要而朱穆何敞班彪崔瑗李膺之徒常由此塗用矣有道之士沓然萃至于輔相之左右枉或直之闕或補之而公府為之清明故東漢之世宦豎權寵狼據于内外獨公府未嘗隨而為姦其本正也今二府之吏為天下府吏之冠事雖不出于府史然亦典其籍受其議覘之國論日在廟堂之側由刀筆不進者積之嵗年或補郎官或徙使目國家待之抑亦不輕矣或進秩増禄而使為外官尚皆牽戀以去彼何為者耶周書謂侍御僕從罔非正人而孟軻亦曰一齊人傅之衆楚人咻之言左右不可以不正也今若約東漢之制而詔二府房置一掾慎選天下之材徳亷節以公卿辟署而授之使專其評覈諮受檢勘典掌按比煩辱之事又副以小史而書之掾有清績遷領都掾都掾有年勞出轉要官則轉相專於國計而弗為小勞之所汨亂周召之材可以行其志成其治矣議者不過謂賢者不可納于趨走之列以為辱且郡縣掾佐亦士人為之趨走於府郡而弗謂之辱何哉朝廷之常禮上下之大分也况二府為天下澄原端本之地而有不可者哉養材䇿堯舜之世民莫不樂于善而趨于篤厚今之世所謂獨行君子者堯舜之民皆以為常故謂之五常有異於此者當世指之為凶人以為天下大戮矣何哉教道素行而為善之人多也後世教衰俗薄如四凶者滔滔皆是故天下以孝弟為異行以忠信為竒節事父兄者望厚賞而無過者以謂堪大臣其嶄然出衆而以賢傑自名者有不及堯舜之民者矣如之何望天下之治一二于唐虞也故王者之大務莫急于教教者所以養材也養之久材為之日衆無教之養之之道則材為之日寡材衆足用材寡則不足用矣人之生也自非聖人自然之質未有不待教而成者也是故父兄之善教一家之人才者必多師儒之善教一塾之士才者必多國君之善教一國之臣才者必多非天之有所私聚才而生之所以養才之道備使材能不得而不成也茍不善教則中人以下莫不䧟溺而入于不善故人衆而才者少非天之有所惡不善而生之其所養之教之者非其道使才能不得而成也誠使王者善養天下之材則聰眀技敏之民皆將化而為才取之而稱所求用之而稱所使昔樊氏善為生嘗欲治器先種梓漆里人初笑其迂後皆從而假器用焉故樊氏之富傾天下一為生之民尚知為數十年之先養其材然後治器况王者為萬民之盛哉三代之治莫不養材而周最為備秀于民者養之于鄉秀扵鄉者養之于學秀于學者養之于太學秀于太學者論而辨之位而禄之而養之于朝廷或為公卿大夫或為牧伯將帥皆繇此乎出故古者五十而後爵自成童至于五十其耳之所聞其目之所覩其心之所存莫非詩書禮樂仁義忠孝之道雖有頑悍竒衺而不去者抑亦寡矣自㓜至于成童其君上之所令其父兄之所率其師長之所誨莫非文武大道雖有天資昏蔽而不可成才者抑亦寡矣故周之世也特長詩人羙之而菁菁者莪之篇作至秦則不然焚㓕先聖之術其所以示民者非刑則戰民莫不姦譎好亂相糅而為惡一旦俱亂而秦亦不能禦也惟東漢最重經術太學大盛而四方老師大儒或教授至千人家薫戸習咸競于學于時天下賢能者日益多明章之後童昏相繼推其微弱暗暴之勢可以朝夕而亡然長久歴二百載與西漢等豈非君子衆多之力歟今天下號為太平然養材之道微缺學校為廢區博士為冷官士之進於仁義者非其性則或其家之訓而國家所以教育之道不行焉是故仁義之才日寡取之而不稱所求用之而不稱所使忽有可憂之對至大之責或四顧而無所付此才不素養之效也孔子雖聖其權則匹夫然而門弟子自中人以上莫不成才欲相而有如顔淵欲將而有如仲由欲使為諸侯而有如仲弓欲使宰而有如子㳺子羽唐太宗之將相房杜李魏二溫王陳軰多出于西河汾晋之間大抵皆王通之門人也一聖一賢養材而材之富也如是今材不素養故以天下之大而常患無人臣以謂欲左右皆正小大皆治勢危而有以扶事亟而有以託在乎得材材之易得在乎素養素養之術有三一曰興學校二曰選置五經博士三曰復漢之大學生員三者行而教之養之之道備學者于是通古今樂名節而文武之器班班出矣審分䇿臣之尊君非從䛕也君之制法使下必尊上而不敢忽非驕樂而便已也君尊則法尊法尊則令尊令尊則朝廷尊朝廷尊誰敢不從也君尊則大臣尊大臣尊則朝廷尊朝廷尊則進者足以為榮退者足以為辱進退足以為榮辱則賞罰行賞罰行則仁義之民我得而牧技敏之民我得而試豪虣不順之民我得而抑如是而天下莫不趨走振動惟上之聼也君尊則國之形勢彊形勢彊則夷狄不敢侮姦宄不敢窺外不為夷狄所侮内不為姦宄所窺近無一旦駭發之隙逺無百年陵夷之漸如是而天下奚憂不服也故古之明君雖渇聞天下之事渇見天下之治煦煦焉日接臣庶而躬訪之然至尊至重至深至固之體小人不得而揺也古之忠臣雖直已之節奪君之非力折死諌小且犯顔色大或肝腦塗地不顧然尊主之禮未嘗敢少頃曠也故蹴路馬之芻者有誅非謂芻之可貴齒路馬者有誅非謂馬之不可齒皆所以尊尊也古之法禁行在諸篇之上觸其條目則誤者遷竄大者誅殛非獨以尊君所以窒不順之原而重社稷安天下也故人君之儀殿陛耽耽而金朱塗其闕雖有販夫莫之敢指冕戴珠玉日月在衣罏煙輦道而朝羣臣嚴鐘吹盛羽儀旄頭警蹕驅泳永羅悉備而適郊廟雖有親倖莫之敢戯非禮不食非禮不服非禮不動非法不言非以為法所以養尊安之形而杜侵慢之蚤也人臣之禮臚傳而趨以進首幾至地而俯伏以言非仁義之說不敢以輙聞非忠信之情不敢以自列得廢而廢得死而死食君之食履君之土戴君之天下之分適然也見君臣之大守也仁主之子育萬姓四十載矣其勤未嘗過時而朝也日幾中而朝者罷未嘗有惰色見于外也進臣下以禮而退之以義夫上之不苛責于下而以禮義進退之其恩父愛而天覆之不異矣臣子宜如何自為也而中外之臣或弗明上下之分有偃蹇頡頏而自如者動必詆時言必訾上輕為桀驁而曽不知憚聞政令之誤相視而嘻險妄詭儌譁議于列以藹羣聴以傷柄臣罪萬于顔異事百于楊惲而戮辱不及此朝廷所以不尊也遷任小戾于資格小慊於素望則囂辨不已延却而不前公為慢章取必于上自䖏曰是而歸曲朝廷狂訐醜詆或駭流議無一毫震怛之意有識知禮之士憤其凌冒髪指冠矣而上不詰此朝廷所以不尊也越涯犯職角為豪竒言不當言以求採天下之譽而邀厚福下議上小列大是非貿亂矣而執法不之按公府不之䋲此朝廷所以不尊也漢華隂守承嘉上封事言朱雲可試守御史大夫少傅衡以謂下輕其上爵賤人圖柄臣則國家揺動而民不静嘉遂坐之唐文皇時盧相尚固辭父州都督而斷首于朝堂故邀君者古之所諱而臣子之所宜同嫉也荀况曰三尺之岸虚車不能登峻故也百仭之山任負車登焉何則凌故也賈誼曰人主尊如堂羣臣如陛衆庶如地亷逺地則堂髙近地則堂卑髙者難攀卑者易陵今其勢防阤而弛矣其漸不可以不正也是亦無他明君臣之分而責其尤慢者使羣臣増忠裕勤莫不滌去故情而嚴上之令則朝廷尊矣慎柄䇿有王者之事有大臣之事有將帥之事有有司之事有嬖臣之事㧞任忠賢以為將相責之以天下之安危可用則用可黜則黜斷之以至公而無所疑王者之事也坐于廟堂夾輔人主進退百官大臣之事也提士衆出入于生死帥將之事也審情實以為輕重不敢附私有司之事也結襪折枝嘗藥徹膳出納詔教掃除宫中啓閉門闥嬖臣之事也貴賤小大各守其業而天下治嬖臣不可使之為大臣將相有司之事如裳之不可以為衣履之不可以為冠錐之不可以為㦸也如䑕之不可負方斛之器犬之不可駕國馬之輈也故天下之大柄三曰官賞曰兵曰刑王者之得失治亂之所繋安危之所從天下之所以為休戚故王者重之必付之于將相有司而不以私其左右所謂嬖臣者不過言甘而色令順指令健于使令寵之極饒之以財而足矣饒之以財而不及于政則天下無恟恟之議小人有終身之安而王者未失為明君後世不然惑其所近忌其所逺意謂天下之人舉無足信而莫忠于嬖臣者内外大事凡可以為國憂必嬖臣監督之然後以為安其意侵取將相有司之事任于嬖臣官賞兵刑莫不為小人之所有破大公之法激四海之怒姦盗不順指之以為辭以至于亂天下彼嬖臣者趦趄煜爚于人君之側當得金錢足以快口腹耳目之欲則亦已矣又自知巳之可惡常恐天下之人嫉已而誅除之故蚤莫計慮為全安深固之䇿偷取時柄以自環或專官賞或典兵戎或預刑獄得官賞之柄則進其黨伍于朝以為援得兵之柄則震脅主心而威制天下得刑之柄則沮忠直之氣而窒言者之口自古危亡未有不始于此者也王者獨何取于嬖臣哉漢之衰也有王甫侯覧伍璜張讓之徒唐之衰也有李輔國程元振王守澄魚朝恩劉季述田令孜之徒穴于朝廷之間而私有大柄公卿將相多出其門所欲進則吹嘘咳唾立致貴要棄置大臣如奕棋然又有北軍校尉有神䇿軍中尉有觀軍容有諸道監軍兵柄皆在嬖臣而天子或自其廢置又有黄門北寺獄有掖庭詔獄有神䇿北軍獄忠賢之不附已者雖將相大刑或留仗内而成于中人之手此漢唐之所以亡也嘗謂漢文帝不獨有治天下之道而亦善寵小人鄧通極嬖矣欲富之則賜之銅山而使之擅鑄及戯弄于朝申屠嘉欲舉法不敢亟赦之度已困辱然後謝嘉而召通故嬖臣在側而人下未嘗不指目憤怨雖有嬖臣亦為文帝可矣茍如文帝豈惟一嬖臣雖十數猶足以為治後世之君寵小人則付之以將相有司之柄不為文帝之所以嬖之者豈不誤哉方明王在上集用天下之正人故小人雖多莫敢輙動屏息歛手以聼朝廷之所為然久屈故態宜有憤欎弗平之氣彼且伺人主之惑待賢者之隙將泄其怒而大有所為此實亂亡之幾不可不素慮也徃日用兵之地及河防之要與詔獄之大者輙臨訊以寺人而進退大臣又或訪其毁譽之詭此可為懔懔者也明主誠能守官賞兵刑之柄不為嬖臣之所盗而有功則雖傾内府以寵之未足以危社稷而為天下之大害可不慎歟觧蔽䇿君子與小人不能偕立于人君之朝勢如水火寒暑之戰薄然而小人之黨勝十常七八其故何也葢由人君好逸而惡勞樂近而忘逺夫姦聲麗色竒臭異味宫室苑囿狗馬弋獵之樂入乎耳奪乎目悅乎鼻口順乎心腹而便乎身體居䖏皆其蚤莫之所安于人君而最近固已樂為者矣而小人之道模揣其意曰吾君徳過堯舜基業安于泰山矣此不足以為害言道而入于惡若決江河而下注于萬仭之淵故小人之說易行而其黨多勝君子則不然直欲人君屈已以事仁義閑情欲而狥天下之民宴安之娱人君之所喜為者也而輙爭之曰是不可過為過為必且亡國憂勤恭儉昧旦而朝日旰而食夜分而寐人君之所厭者也而輙强之曰是不可不為茍不能此必且亡國其事最勞而危亡禍亂之形方且藏於茫昧微冥之中其最逺而未易見故君子之道難行多不見納于人君而常為小人之所勝惟至明極斷之主卓然有立而不惑乃能斥已之所樂而憂天下杜一時之欲而善後世不使小人勝乎君子其餘莫不沉酣漸漬欲長及成横流潰裂禍及海内然後歸之于天曰非我也此陽九百六之數使之然也可不為之悲哉夫中君以上其心亦莫不願治而惡危亡知君子之可用以為治矣然而用小人至於亂亡者前後相望也幸而君子用矣又不能親信終始之使就其業不幸而小人用矣或心知其非而不能果決除去浸滛留連亂亡而後已此其故又何也常以為人君之蔽有二一曰不明二曰多欲指真為偽指偽為真是不明也不忍去佞臣恐失其所欲不肯用正人恐妨已之所欲是多欲也唐徳宗曰天下皆言盧杞姦邪朕何不知此不明者也明皇用韓休為相宫中滛樂稍過其節必問左右韓休知否言畢而諌䟽輙至嘗把鏡不樂或曰自韓休為相陛下無一日之歡何不逐去而戚戚如是曰吾靣雖瘦天下必肥然終亦罷韓休而用國忠林甫此多欲者也不明之蔽其惡小多欲之蔽其惡大不明之蔽天資不足而不知所以為故曰其惡小多欲之蔽知善而弗為故曰其惡大以不眀之蔽任小人天下怨之怨在於小人而及於君以多欲之蔽任小人天下怨之怨在於君而及乎小人為蔽不同而為禍有先後其亂天下一也人君寡欲而惟明君子勝而天下自治矣辨邪䇿姦臣之所以難明以其善匿無形而忠臣之所以多不遇以其勁情直指而不恤可疑之地也故雖姦臣必材材多而為患愈大雖忠臣必有過材或不備而忠未嘗忘也是故知臣最難御臣之難次之欲人主之知臣莫若指姦臣之形以示人主朝廷之上審按而考績之如掲氷鑑以待來者其能隠者幾希姦臣之形人主不可以不察也有細姦有巨姦才足以覆之言足以發之貌足以持之氣足以守之聾上下之聼而偷禄取譽主不能怒衆不能語卒之實利在已而害歸於衆此巨姦者也才不足以自覆言不足以自發貌不足以自持氣不足以自守煦煦柔佞偷容苟合而已耳此細姦者也姦之小大人主不可以不察也姦臣必内圓而外方名是而實非始順而終悖罄乎至誠而甚異于道故有撃斷以為公局繳以為明險健以為勇悍訐以為通巧譎以為智驕忮以為介儒懦以為仁抑抗以為髙不言其所可言以為敦不為其所可為以為慎小信以為忠此姦臣之積人主不可以不察也姦臣之與忠臣固不相若然而姦邪之所排䧟或外示相與而内實仇之其所汲引或外示乖離而隂為之左右上欲絀賢者則譛之以可排之狀上欲進已知則開之以可用之名其言深微其事隠晦使人君隨已意以為禍福而不知悟所以然者唐髙宗欲立武昭儀禇遂良守先帝之命而争髙宗欲止李勣知武后必得志于天下曰此家事耳何須問外人明皇欲相牛仙客張九齡力諌李林甫曰天子用人何為不可由二臣姦言而唐室中壊此邪正之論人主不可以不察也姦臣之始進多以非其道商鞅因嬖人以進于秦段熲因宦者以進于漢宇文融皇甫鏄因聚斂王璵因妖妄宗楚客因宫妾鄭注因藥術王叔文因棊以進于唐非其道而進其末無不為姦臣者臣下之所以進人主不可以不察也夫天變者成王之所以感悟而狼䟦之詩周大夫之所以開周公也而許史恭顯假日變以除周堪張猛武三思造攝提之應以進紀䖏納李逢吉張權輿為非衣之謡以傾裴度此姦臣之偽人主不可以不察也故人主善察姦臣之形姦雖未去亦蟠縮而不敢措其用封倫佞於隋而直于唐許敬宗忠謹于文皇而讒謟于髙宗之時是也詩曰為鬼為蜮則不可得彼非鬼蜮其情皆可以得之矣人主誠留意於此彼安得而逃哉宋文選巻二十二
