body:
  text: 宋文選卷八孫明復文堯權議堯以上聖之資居天子之位可生也可殺也可興也可廢也彼八凱八元者天下共知其善也堯豈反不知之哉知之反不能舉耶彼三苗四凶者天下共知其惡也堯豈反不知之哉知之反不能去耶若知其善而不能舉知其惡而不能去則知堯亦非聖人矣書序可以謂聰明文思光宅天下者乎噫彼八凱八元者堯非不能舉也能舉而不舉也三苗四凶者堯非不能去也能去而不去也能舉而不舉能去而不去者權也堯以天下至廣神器至重朱既不肖弗堪厥嗣故命於舜舜起於微陋雖曰睿聖然世德弗耀四嶽十二牧未盡服其德九州四海未盡䝉其澤不可遽授之以大位也若遽授之則四嶽十二牧其盡臣之乎九州四海其盡戴之乎不臣不戴則爭且叛矣堯懼其如是也非權曷以授之於是潛神隱耀厥用弗彰以觀於舜故八凱八元雖積其善而不舉也三苗四凶雖積其惡而不去也堯若盡舉八凱八元盡去三苗四凶則舜有何功於天下耶是故堯不舉而俾舜舉之堯不去而俾舜去之俟其功著於天下四嶽十二牧莫不共臣之九州四海莫不共戴之然後授以大位絶其爭且叛也非堯誰能與於此故孔子曰大哉堯之為君也巍巍乎唯天為大惟堯則之蕩蕩乎民旡能名焉巍巍乎其有成功也煥乎其有文章蓋言堯以權事授舜其道宏大髙逺之若是而人莫有能見其迹者而先儒稱堯不能舉不能去妄哉舜制議舜既受命庸十六相放四凶也以帝天下之制猶有未至者焉乃窮神極慮以增以益夫所謂帝天下之制者君君臣臣上下貴賤之序久久不相潰者是也厥初生民冥焉而無知浩焉而無防薿薿羣羣孰君孰師與鳥獸並黃帝觀乾坤創法度衣之裳之以辨君臣以正上下以明貴賤由是帝天下之制從而著焉黃帝創之于前帝堯奉之于後然二帝之間厥制未盡黃帝取乾坤分上下為一人之服以至于堯無所增益逮乎虞舜再觀厥象以盡其神謂五等之制不可不正也於是分其命數異其等威殊其采章以登以降自公而下率之以兩然後一人之服五等之制煥然而備俾臣無以僭其君下無以陵其上賤無以加其貴僭陵篡奪之禍不作雖四海之廣億兆之衆上穆下熙可髙拱而視故易曰黃帝堯舜垂衣裳而天下治臯陶曰天命有德五服五章哉是也若五等之制非由虞帝而備則易何以兼言于舜皋陶謨何以繫之于唐書耶或曰舜三十登庸三十在位五十載陟方乃死且舜自歷試與居攝三十年在天子之位又五十年其八十年間作事垂法為萬世利者多矣今子稱舜止以因一人之服增五等之制者何願聞其說曰善乎爾之問也吾之所言聖人之極致也夫乾者君之道坤者臣之道衣上而裳下者乾坤之象也衣之可加乎裳示君之可加于臣也裳之不可加于衣示臣之不可加于君也聖人南嚮而治天下久久不相潰者始諸此也故舜增五等之制自下而上俾貴賤之序益明天子之位益尊此舜所以杜萬世僭陵篡奪無窮之禍也雖後聖有作千制萬度無以渝于此矣故曰吾之所言者聖人之極致也文王論春秋左氏傳吳公子季札來聘請觀于周樂見舞象簫南籥者曰美哉猶有憾說者曰憾恨也文王恨不及已致太平意以謂文王不能夷商紂於當世取天下於己手有遺恨焉愚甚惑之竊謂季子之是言也非知樂者也厚誣於聖人矣若果如是季子之言也則是文王懷二以事其上匿怨以伺其間包藏禍心乃亂臣賊子矣何者文王受封商室列為諸侯紂雖無道也安得為人之臣而有無君之心哉矧以文王為西伯位於諸侯之上賜之弓矢鈇鉞使得征伐紂之有德於文王也厚矣文王宜乎竭力盡能夙夜匪懈以事于紂也又豈可背惠忘施以怨報德將成干紀亂常之事哉噫事必不然章章矣觀乎紂既失德毒流四海諸侯咸叛而文王事之獨無二心故孔子曰三分天下有其二以服事殷周之德其可謂至德也已矣又曰下之事上也雖有庇民之大德不敢有君民之心仁之厚也有庇民之大德有事君之小心其舜禹文王周公之謂歟若文王猶憾也則孔子何以謂之至德與仁厚者乎或曰史記齊世家敘太公之迹其後亦言西伯昌之脫羑里與吕尚隂謀修德以傾商政其事多兵權與竒計若文王果無憾也則何得與太公隂謀修德以傾商政其事多兵權竒計之如是哉由是觀之季子之言又何誣也曰蓋此秦火之後簡編錯亂司馬子長修史記叙太公之迹也不能實録善事乃散取雜亂不經之說以廣其異聞爾斯固不足疑于聖人也嗚呼古稱季札賢明博達觀樂能盡知其興衰而於此也何䝉暗頓惑之若是耶逮乎杜預服䖍之徒復無卓識絶見以發明之斯又乖謬之甚也辨四皓四先生儒也哀周之亡疾秦之亂脫身乎虐焰沈冥乎商山非欲潔其身而亂大倫者也蓋有道則見無道則隱者也曷以知其然哉夫傳嗣立嫡周道也為國之大者莫大於傳嗣傳嗣之大莫大於立嫡不可不正也苟一失其正則覆亡篡奪之禍隨之自秦氏肆虐燔滅羣聖之典周道絶矣絶而復傳之者四先生也昔漢祖攜一劒行四海由布衣取天子位斯可謂真主矣及夫禍亂既定嗜欲既起內有嬖寵之惑外有廢嫡之議羣臣汹汹莫之能止四先生將因是以行其道故從子房而出吐一言以正太子之位此非周道絶而四先生復傳之者乎然四先生之出豈止為漢而出哉為萬世而出也漢祖起干戈中素不喜儒四先生懼其辱也故旋踵而去終于岩石之下嗟乎逮今千餘祀人未有能知其潛德隱耀者昔伯夷叔齊諫武王不食而死非孔子稱之則西山之餓夫也後世孰稱之哉司馬遷班固不能博采厥善發舒其光為四先生立傳垂於無窮斯其過矣噫萬世之下使臣不敢戕其君者夷齊是也萬世之下使庶不敢亂其嫡者四先生也董仲舒論孔子而下至西漢間世稱大儒者或曰孟軻氏荀卿氏揚雄氏而已以其立言垂範明道救時功豐德巨也至于董仲舒則忽而不舉此非明有所未至識有所未周乎何哉昔者秦滅羣聖之言欲愚四海也蓋天奪之鑒以授于漢故生仲舒于孝武之世焉於時大教頺缺學者疏濶莫明大端仲舒曄然奮起首能發聖道之本根新孝武之耳目上自二帝下訖三代其化基治具咸得之于心而筆之于書將以緝乾綱之絶紐闢三道之梗塗矣故其對䇿推明孔氏抑黜百家請諸不在六藝之科孔子之術者皆絶其道勿使並進息滅邪說斯可謂盡心于聖人之道者也噫暴秦之後聖人之道晦矣晦而復明者仲舒之力也彼孟軻荀卿當戰國之際雖則諸子紛亂然去聖未逺先王之典經盡在揚雄處新室之間雖則大禍是懼然漢有天下滋久講求典禮抑亦云備故其微言大法洽於聞見揭而行之張以為教易耳若仲舒燔滅之餘典經已壞其微言大法希於聞見探而索之駕以為說不其艱哉况乎暴秦之禍甚於戰國之亂與新室之懼耶然四子之道一也使易地而處則皆然矣愚嘗病世之學者鮮克知仲舒之懿又病班孟堅作仲舒之贊言劉向稱仲舒有王佐才伊吕亡以加管晏之屬伯者之佐殆不及也至向子歆以為淵源所漸未及乎游夏而曰管晏弗及伊吕之不加過矣愚謂歆以仲舒盛德先覺顧已勿及疾而詆之者也故雖其父言亦以為過且仲舒于孔氏之門其功深矣觀其道也出於游夏逺矣對孝武大明王道之端與夫任德不任刑之說雖伊吕又何加焉蓋用與不用爾使孝武能盡師其言决而用之則漢氏之德比隆三代矣厥後曷有惑乎神仙之事困於征伐之弊哉仲舒不用非孝武之過平津之罪也平津嘗害其能而逐之兩事驕主才弗克施既而退死于家吁可惜也孟堅筆削之際不能斥劉歆之浮論惑而書之失于斷矣辨揚子千古諸儒咸稱子雲作太𤣥以凖易今考子雲之書觀子雲之意因見非凖易而作也蓋疾莽而作也何哉昔者哀平失道賊莽亂常包藏禍心竊弄神器違天咈人莫甚于此雖火德中否而天命未改是以元元之心猶戴于漢是時不知天命者爭言符瑞稱莽功德以濟其惡以苟富貴若劉歆甄豐之徒皆位至上公獨子雲既恥從莽命以聖王之道自守故其位不過一大夫而已子雲既能疾莽之篡逆又懼來者蹈莽之迹復肆惡於人上乃上酌天時行運盈縮消長之數下推人事進退存亡成敗之端以作太𤣥𤣥有三方九州二十七部八十一家者三公九卿二十七大夫八十一元士之象也𤣥君象也總而治之起于牛宿之一度終于斗宿之二十二度而或八十一首七百二十九贊二萬六千二百四十四䇿大明天人終始逆順之理君臣上下去就之分順之者吉逆之者凶以戒違天咈人戕君盜國之輩此子雲之本意也孰謂凖易而作哉諸儒咸稱太𤣥凖易者蓋以易緯言卦起于中孚震離兊坎配于四方其六十卦各主六十七分以周一嵗三百六十五日四分日之一執此而言之也殊不知易緯者隂陽象說非聖人格言若執此以為易則易之道泥矣且太𤣥之于易猶四體之一支也何以謂之凖易者乎斯言蓋根于桓談太𤣥曰是書也與大易凖班固謂雄以經莫大於易故作太𤣥使子雲被僭大易之名于千古是不知子雲者也書漢元帝贊後儒者長世御俗宣教化之大本也漢宣帝不識帝王逺略故鄙之曰俗儒好是古非今使今眩于名實不知所守何足委任及夫元帝即位徒有好儒之名復無用儒之實雖外以貢薛韋平為宰相而內以𢎞恭石顯為腹心是時天下之政皆自恭顯出貢薛之徒言不必行計不必從但具備位而已自恭顯殺蕭望之京房之後羣臣側足喪氣畏權懼誅雖睹朝廷之失刑政之濫莫復敢有抗言於時者元帝昏然不寤益信顯恭是故姦邪日進紀綱日亂風俗日壞災異日見孝宣之業職此而衰矣而史固稱上少而好儒及即位登用儒生委之以政故貢薛之徒迭為宰相而上牽制文義優游不斷孝宣之業衰焉噫史固所謂牽文義者非儒者之文義乎昔宣帝嘗怒元帝言用儒生曰亂吾家者太子也今觀史固之贊宛是元帝用儒生亂其家者也此史固不思之甚矣向使元帝能納蕭望之劉更生京房賈捐之之謀退去憸人進用碩老與之講求治道以天下為心則邦家之休祖宗之烈可垂于無窮矣安有衰滅者哉史固筆削論定善惡之際何不書上即位登用儒生不能委之政牽制佞幸優游不斷孝宣之業衰焉如是則褒貶得其中矣吾大懼後世繼體守文之君覽史固之贊以為自昔儒生之不足為用也而委任佞幸以致衰亂禍不淺矣書賈誼傳後讀漢書者靡不尤偉賈生文帝也吾觀賈生宣室對鬼神之事竊謂漢世多言神怪者由賈生啓之於前而公孫卿之徒寖之於後也且怪力亂神聖人之所不語賈生何得極其神怪虛無之言使文帝為之前席若以為辨斯則辨矣然於世主何所補哉此非賈生自以被謗謫去久而復用諛辭順㫖而對之者乎然則何以與文帝言也如響之若是哉厥後遂使新垣平得以肆其闊誕文帝作渭陽五帝廟又長門立五帝壇妄以祈福逮乎孝武尤好鬼神之祀李少君以祠竈穀道進亳人繆忌以祀泰一方進及齊人少翁東膠欒大公孫卿皆以言怪得幸以亂漢德故曰漢世多言神怪者賈生啓之于前而公孫卿之徒寖之于後也噫古稱誼有王佐才吾觀誼所陳一痛哭二流涕六長歎息之言誼誠王佐才也若文帝聰明而能斷用之不疑則功德可量哉惜其失于是言也吾懼後世復有年少才如賈生者不能以道終始因少有摧躓而諛辭順㫖妄言乎天子前以啓怪亂之階也罪平津成天下之至治者有君也有臣也有君而無臣不足以成至治有臣而無君不足以成至治聖如堯舜以咎陶大禹后䕫伯夷佐佑之賢如禹湯以伯益后稷伊尹仲虺翼輔之然後能致其盛德大業輝照于千古而不可攀况其下者乎故曰成天下之至治者有君也有臣也三代既往而西漢為盛吾觀孝武聰明宏達聽斷在已有禹湯之資然其盛德大業終弗克以肖之者有君無臣也昔秦氏肆虐羣聖之道燼矣髙祖以干戈取天下故講求之未暇也孝惠暗懦不足以議孝文孝景止以恭儉為天下先惟孝武天啓其衷巍然獨出思復三代之至治也於是尊用儒術勵精古道出府庫以購其書空岩穴以聘其賢由是天下為之丕變而嚮方焉噫羣賢之道逮秦而燼微孝武則終將泯泯而弗章矣孝武之功也盛哉是時平津起徒步不數年位居丞相非不用也嚮使平津能內竭乃誠外采羣議以啓沃使孝武日聞其所未聞日至其所未至則三代之至治可不日而復矣嗟乎平津無制禮作樂長世御民之才但以持祿固位自圖安樂為事本傳稱每朝㑹議開陳其端使人主自擇不肯面折廷諍又稱嘗與公卿約議至上前皆背其約以順上㫖此非持祿固位自圖安樂者乎孝武職此之由其心蕩矣自是方士邪怪之說得以入焉按平津元朔五年十一月代薛澤為丞相元狩二年三月薨且孝武崇神仙之淫祀惑少君之妖言祠竈入海以求神仙不死之事此皆平津之所睹也蔑聞吐一言以救之卒使孝武之心蕩而不復為千古笑誠可惜也伊尹有言曰豫不克俾厥后為堯舜豫心愧恥若撻于市嗟乎平津無伊尹之心誠可罪也宋文選卷八
