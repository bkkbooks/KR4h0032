body:
  text: 宋文選卷二十五張文潜文敦俗論所謂人主之利勢者惟其能供天下之所求而我無所求于人故能奔走天下使其進退取捨莫不在我而天下之人雖欲去之而不得蓋惟其能貴故天下之賤者尊之惟其能富故天下之貧者宗之使之脫然捨去斯二者則天下之人誰肯以區區之名而服之哉故富與貴者人君操之以用其下者也雖然天下之利惟富貴而後可為則先王之治宜其隆勢利重權位使其民惟富貴之知而見其已之尊嚴然其率天下也何其退約亷遜教其民務為安貧樂賤之事而深抑好爭務勝之心者何也夫天下之人不可使求為利也夫使天下之人惟利之為求則大者篡小者叛惟其得之而後已嗚呼使人皆欲得其上之所樂則將日仇其上而奪之夫如是則吾之立于天下之上不亦甚殆也哉是故先王思所以長享富貴之利求其安而無亂服而無爭是故為是亷恥冲退之道使之輕祿位而賤權勢而惟仁義之知公卿之爵人之所甚欲也然三遜而後受萬鍾之祿人之所甚貪也然無名而不敢當嗚呼使天下之人皆仁義之人耶則吾捐國而與之有不受者矣三代之歷年後世莫及而考其教化風俗之美詩書之所載後世亦無有繼之者然則其效可知也余嘗悲夫自聖人之亡後世之治天下者不明于此也開功名權利之門以誘天下而使其民汲汲然惟利之知而幸其區區之功利尚功而賤德貴才而廢道奬勝而羞敗進位而卑齒故天下始囂然皆有樂富好貴之心而不安其分及顧其貧賤而惡之而日思所以去之之術夫惟人惡其貧賤而求去之而天下之亂始起矣故後世之所謂利其國而自安者未始不亡其國而自危也昔者秦之俗蓋若此矣方其疾戰不顧以取諸侯也使其人惟攻戰爭奪之為求故秦之民皆忘其上而利其身功成戰克而後天下之人移其勝敵之志為仇君之心蓋其平日之所養耳目之所習有以使之而無足怪也嗚呼爭之不可啓也如此養虎之肉不敢全而生委之懼其使裂以動其怒而况持爭具而授之與夫先王之道其始若鈍而後能利其始若迂而效最切蓋老子曰非以其無私耶故能成其私夫成其私而惟私之求則天下去之夫惟公以得天下之情者天下之所歸也天下之所歸而有不能得其所欲者乎蓋梁惠王問孟子以利而孟子對以仁義其說以謂上下交征利而國危又曰未有仁而遺其親未有義而後其君者夫為利者其意非以危國而其極至于國危仁義者若非所以自利也而其效也使人不敢遺而後之則聖人之所以安其身豈匹夫匹婦之淺近歟嗚呼孟子可為知利之實矣用大論能用大而後能治天下而用大之術為最難夫惟有所不治而後能用大矣何則治大者莫若立法有所不治而後法立矣屨人之為屨也非量國人之足而為之也度其中而為之夫一國之足雖不能盡合于吾屨而中者居多故雖不知則人之足而吾不失鬻屨之利必將人人而較之則吾之為工不亦甚勞而長短小大之差要之不可盡得嗚呼使吾之為屨足以半國之人足矣雖有所遺而何害吾之大利哉通此說者其知用大乎夫立法以治天下者而吾之法果足以盡天下之理網羅籠絡使天下之智巧不足以用其奸乎吾知其不能也夏后氏之為忠也使禹不知後世之將野則禹不智也知而為之是禹亦無如之何也商之質周之文亦猶是也夫以聖人之智猶有所屈于事物之變則立法以求盡天下之理吾知聖人有所不能故立法于此足以通天下之情至于聰明之不及思慮之所難測出于人情之外者吾有所不治也而吾之法立矣且吾之法果何為而起歟無乃出于天下之大情萬物之常理耶嗜膾炙者百人而惡之者一人膾炙之美未害也使吾法足以當國人之十九則吾之利多矣其所不及焉吾可以無恤矣非不欲恤也勢不可也嗚呼自堯舜三代以來更數聖人其講天下之法亦詳矣然後世可考者如井田封建車徒之制亦不過設為大法而已世之惑者徒見其為法之略以為不可以施于市而不知聖人示之大法不以臆度之區區而預盡天下之委曲苟有不合者付之人而已一絲之不齊無害其為裘一粒之不精無害其為食故曰有所不治而峻法立矣傳曰小有所治者大有所失近有所遺者逺有所包此達于治體之論也或曰量國人之足而為屨不畏勞者能之盡天下之情以立法不厭詳者能之吾未見其不可也應之曰非勞與詳之避也國人之足可以盡量天下之情可以盡得雖費終身之力而為之何憚焉吾知决不可為也吾不若從其逸而擇夫為利者為之也嗚呼何至屑屑然語治天下之勞哉知所以立法而後知用大知用大而後能不出户而天下無遺慮矣知人論甚矣用人之難也天下之實材常深伏而不發非遇事焉則有終身不可窺者欲其勇足以暴三軍服四夷而其外如怯其節足以斷大事成大勇而其外若不能有所為者方其未發也其言語動作坦然無以異于常人卒然即之而不知其器是故非有深智英明之君不得而用之而世之小人常有以自蔽其不肖以惑世主之聽而卒敗天下之事可勝歎哉彼小人者其中實怯而視其外則發揚振勵而若勇其中實庸而聽其言則辨給開敏而若才卒然即之若真可與有為者是故世主往往甘心而不辭至于謀窘計失而後悔悟嗚呼用人之難也如此蓋嘗聞之古之求知人者于人也不觀其形似而察其中于已也不逆于耳目而逆于心察其中則見其所窘逆于心則為慮也深彼小人之將欺我也不過多為形似以動吾耳目之間而已彼安能為實哉而吾應之也常出其所不意而使小人之情見而天下之實才亦雖欲伏匿而不得蓋昔者霍光之所為固非有征伐攻取之謀而文采緣飾之可喜也朴然庸人而已耳非有武帝之聰明不足以知之故卒然用之而不疑與之以兵尊之以權提孺子之天下使之謀之而光果有以當之也蓋當其初朝廷之臣孰不以為過而至其有所主則有震懼而不敢與者然則光之平生之所為豈可以占其後之所發哉議者不知武帝之用光蓋其知人之明而遂以謂當時之臣惟光可以勝其任誠徒見其成功而後知之不知當世之人才足以治軍旅决成敗而書生儒者之論孰非仗節死義之人安肯棄而不求而授一木彊之霍光哉唐之文宗昭宗其憤亂也甚矣不愛髙爵厚祿以致天下之士投其誠而與之此其志皆可以立功而其取人無術故徒以益亂彼李訓張濬者其言語動作如可以立功者也大言而不顧敢為而不憚故二君惑之雖有間言不可得而入其後卒然而發以區區之宦人不能少制其亂提兵數萬而不能取李克用之一鏃卒之身滅國弱為天下笑彼二君惑于形似故也李係好言兵而王鐸與之兵李元平好大言而關播授之權卒于無成為天下笑嗚呼使人之知人獨視其外而可以不疑則知人者帝何其難之也憫刑論上昔者先王之時議事以制不為刑辟者何也夫天下之情無窮而刑之所治有極使天下之吏操有限之法以治無窮之情而不得少議于其中而惟法之知則天下之情無乃一枉于法而失其實與是以先王之時一權諸人而不任法是故使法出于人而不使人出于法至于後世其所以治天下之具不能如先王之盛時淳厚之德衰而吏有率私以立法作其無法而放肆者故後世始有刑法之書以治天下然天下之弊雖不可以不救而天下之情不可枉也是故法簡網踈而人與法兩立而不偏廢穆王之刑以謂輕重諸罰有權夫五刑之屬止于三千者法之所不可移惟其輕重之間有所謂權者是故猶不廢行法者之志方是時罪入于法之內則歸之法罪出于法之外則歸之權雖不如先王之盛時而天下猶未受其弊嗚呼奈何一歸之法而不任人也自秦漢以來治天下之具苟且滅裂務使天下為不可欺而待天下之吏以謂不可使少行其意也故一切任法而廢人余嘗悲夫後世任法之弊也蓋其弊非獨法不足以盡其情而其極乃至于變其情而合諸法蓋罪無必而易移法有限而難動故罪輕而法重也不幸無輕刑以處之則有入之重者矣罪重而刑輕不幸無重刑以重之則有出之輕者矣變罪而附法失情而合文不畏情之不盡而慮法之不合蓋其間有所謂疑慮而上諸有司者十不過一二而已嗚呼任法以治天下而天下無正刑矣余嘗推其原而後悲夫天下之治未始不自賢不肖始也先王之時天下之治簡肅而精修其人才皆足以過絶天下而上有聖哲之絶德故堯舜之際與夫三代之盛時至于鳥獸之無情隂陽之不可測而人之才智皆能為之故其後有豢龍御龍之官而四時之官皆能候天地之氣導取其節而制其和由是言之則人之所以深思極慮以治事赴功者何如哉自聖人之亡其後世比于先王之盛固已少减而天下之事日以煩治詭僞生于其中而信厚之德薄人之賢者不及于先王之時而間之以不肖至于近古而任人之道益已大壞賢不肖混亂而不可知天下之事日以廢缺夫惟得人如先王之時故可以捨法而不任而賢不肖之相半也故人與法並行後世非無賢也而要以不可知故歸之法推其原求其本則法之弊蓋出于人之弊也夫惟能隆任人之術詳于擇人而後法可以少簡姑無望其不為刑辟人與法並行者可以庶幾矣憫刑論下立法以紏天下之過者必欲天下行之而不敢逆然而常至于沮而不行者何也是其立法非人之情故也何謂非人之情夫天下之所共惡者而時輕之天下之所共恕者而時重之不當恕而强為之仁不必惡而過為之罰凡此者天下之情所不安者也今夫天下之情有所謂狼惡而不逆衆指而惡之者幸而入于刑而考于法則輕而不足以懲之則夫行法者必有不平之心故必入而處之以重夫如是則是好為輕者之所不行也夫人固有不幸而入于刑者有誠犯而其心無犯者不幸而遇刑而考于法則重則行法者必有不忍之心焉是故有出而置之輕夫如是則好為重者之好不行也昔者聖人之于天下其言無不聽其令無不信然卒不可變者天下之好惡也惟其然故天下之所惡者聖人不彊恕以為仁天下之所哀者聖人不深治也故法立而天下安之傳之後世久而不敢易夫犯天下之所惡而吾報之以所惡當天下之所喜而吾寬之以所欲則天下之吏雖不如吾法之所為而人固已隂服之矣吾之法因彼之情故也故欲吾之法立于天下者莫若原天下之情而無所出入使天下無不樂之心而後可也後之惑者不深求先王之意而求夫恩威之名而不究其實以謂恩主于貸而有罪者捨之以為恩威有所禁則小過者刑之以為威行之者不快而被之者不服則何怪乎吾之法不立哉或曰吾之法過于威耶則不惟行吾法者有不樂于其心而固取亂于民使過于輕耶民將懷我彼行吾法者之不快是何足顧也嗚呼是不然也天下之情自顧其所為誠有拂于人而人不加怒彼固以為可欺而罔人之心至矣故人之不察其過而知德者君子也尚何懷之有哉夫治天下者何必苟為惠以諂天下之情也殺之而當其罪雖日殺而天下恱服矣馭相論天子能使天下之權在宰相而進退宰相之權在天子夫如是者可謂知馭相矣夫天子之所以必尊宰相者非以私宰相也而其勢乃所以自尊今以天子之輔相左右朝夕之所接以取謀而使天下之人有輕之心則天子之勢亦卑矣夫人之情涉江河而畏險則終身不敢行海何則彼以謂江河為可畏而况於海乎彼且以謂宰相為不可慢而况其君乎嗚呼又非特如此而已也彼天子之力足以辦天下之事則何所俟于相以吾為不能獨治也而後擇相而委之委人以事而奪之權猶為不任而已矣故必使之可取可捨可賞可罰捨吾疑二之心而使少行其意而後彼得以自盡夫如是故不幸而有過吾有以責之夫使宰相之勢無以異于羣有司必使之一聽于我而後可則彼有罪而吾將無以責之而彼且有藉其口矣故曰宰相不可以無權夫與人以權者必使之其利在我以謂與爾以權者凡以為我也斯可矣使竊吾權以據之久而不還以為己私利則吾將折而受制此天下之大患也今夫世之畜犬與鷹者方其逐禽于野則必解羈弛禁縱之而不制然至不順而害人則吾必能制其命夫縱之而不足以收之則幾何其不為患也誠得天下之至賢如伊尹周公霍光孔明之徒不以天下易匹夫之命者而任之則何所復求然天下之賢不可以常得而吾之任人或以才而忘其汚或以功而捨其素未必皆天下之至賢也是使擅天下之權于掌握之間而吾無以制之而望其不亂其庸可得乎故古之待大臣者天子為之盡恭致禮而至其有罪則不恕有殺而無罰夫惟君致禮則宰相尊至有罪而不恕也此所以為天子之權歟故曰必使進退之權在天子曹操司馬懿父子初不過能竊天子之權攻伐出處放意恣行而已而漢魏之主惟其無有以制之是故養其勢固其身而卒盜其位若唐德宗則疑宰相而不任懲奸臣之弊而謂天下之人舉不可信乃一切自用其聰明當時宰相奉行文書而已故當是時藩臣有輕朝廷之心彼一人之聰明而當天下之亹亹則數見其所窘而左右大臣皆有苟且之志而無出力死難之意則宜其陵犯而無忌也嗚呼與人以權而我不能收漢魏之主是也畏權之去我而奪人之職者唐德宗是也是二者皆過矣嗚呼天下之事不可以無術也而馭臣為最難或者不知其故以謂先王之時一本于忠信而無術不亦謬乎夫坤之道臣道也而象為馬吾未見馬之可以亡馭也馭之以術何害于忠信耶將論天子之臣自公卿大夫雖或闕焉而不足以為急其不可以一日闕者其為將乎夫將之所以為急者非以夫任之有以過夫公卿大夫也為其事之不常有而人之能之者少也今夫醫之為藥也金石草木之珍世之所共有者未必藏也至于逺方之物山海之竒産與夫人力之不可以常得者則必預畜以待其用今夫百姓之不安而財用之不登刑罰之未平而禮義之不興其為患大矣然其為事也天下之所習知故其為術也人人皆足以措手足卒然求其人而易得也講其術而易曉也譬之于金石草木之珍其所治者大矣然人人所知而有之雖不素有無害也或一旦之急提百萬之卒以與人戰勝則生敗則死天下之人無事則廢而不講有事則避而不願見者也故其為事不常有于天下幸而千萬人之間而有一人焉學焉而知其術用焉而見其利故人之習之者少非卒然可以朝求而夕得苟取而驟用者也譬之有疾于此而待逺方之竒藥豈不殆哉先王知其然故雖隆仁義禮樂以化天下之俗消伏悖戾好爭之心而常隂求天下之竒才以待不測之患蓋常寓其法于六鄉六遂之間使卒乘車徒之制素具而朝廷之公卿大夫外之諸侯之君朝聘燕享從容歡欣之際必陳弓矢以講射而四時之隙則命有司以講武以天子之尊而馳騁于草野親金鼓干戈之勞以射取禽獸蓋享晏者人情之所樂而弓矢者威武之具田野者燕樂之事而殺獸者征伐之容蓋先王所以藏天下之所長于人情從容之際凡此者所以隂養天下豪傑之氣使之一旦習知其術安之而不懾也是故先王之于將也非特能求之而又能養以致之至于後世秦漢以來其慮天下之變已不能如先王之時而獨知求而用之而已養之有術以致其才求之有方而知其實此先王之法也故其術無窮養之無術而知求之愈于不求焉可也比于先王之時則十已失其九矣嗚呼先王之法後世既亡矣安坐而不求求之而非道者未見其可也宋文選卷二十五
