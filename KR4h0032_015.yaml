body:
  text: 宋文選卷十五石守道文中國論夫天處乎上地處乎下居天地之中者曰中國居天地之偏者曰四方四方外也中國內也天地為之乎內外所以限也夫中國者君臣所自立也禮樂所自作也衣冠所自出也冠婚祭祀所自用也縗麻喪泣所自制也果蓏菜茹所自殖也稻麻黍稷所自有也東方曰夷被髮文身有不火食者南方曰蠻雕題交趾有不火食者西方曰戎被髮衣皮有不粒食者北方曰狄衣毛穴居有不粒食者其俗皆自安也相易則亂仰觀於天則二十八舍在焉俯觀於地則九州分野在焉中觀於人則君臣父子夫婦兄弟賔客朋友之位在焉非二十八舍九州分野之內非君臣父子夫婦兄弟賔客朋友之位皆夷狄也二十八舍之外干乎二十八舍之內是亂天常也九州分野之外入乎九州分野之內是易地理也非君臣父子夫婦兄弟賔客朋友之位是悖人道也苟天常亂於上地理易於下人道悖於中不為中國矣聞乃有巨人名曰佛自西來入我中國有龎眉名曰耽自胡來入我中國各以其人易中國之人以其道易中國之道以其俗易中國之俗以其書易中國之書以其教易中國之教以其居廬易中國之居廬以其禮樂易中國之禮樂以其文章易中國之文章以其衣服易中國之衣服以其飲食易中國之飲食以其祭祀易中國之祭祀雖然中國人猶未嘗樂焉而從之也其佛者乃説曰天有堂地有獄從我遊則升天堂矣否則擠地獄其老者亦説曰我長生之道不死之藥從我逰則長生矣否則夭死且人有為耒耜以使人農也為詩書以使人士也為器材以使人工也為貨幣以使人商也臣拜乎君子拜乎父弟事乎兄幼順乎長冠以束乎髮帶以繩乎腰履以羈乎足妻子以待乎飬賔師以須乎奉縗麻喪泣之制使人為哀禋祀祭享之位使人為孝爾之勞也如是我皆無是之苦於是人或懼之或悅之始有從之者既從之也人則曰莫尊乎君與之伉禮無兄以事也無長以順也無妻子以飬也無賔師以奉也無髮以束也無帶以繩也無縗麻喪泣以為哀也無禋祀祭享以為孝也中國所為士與農工與商者我皆坐而衣食之我貴也如此故其人歡然而去之也靡然而趨之也噫今不離此而去彼背中國而趨佛老者幾或曰如此將為之奈何曰各人其人各俗其俗各教其教各禮其禮各衣服其衣服各居廬其居廬四夷近四夷中國處中國各不相亂如斯而已矣則中國中國也四夷四夷也漢論上噫嘻王道其駮於漢乎湯革夏改正朔易服色以順天命而已其餘盡循禹之道周革商改正朔易服色以順天命而已其餘盡循湯之道漢革秦不能盡循周之道王道於斯駮焉夫井田三王之法也什一三王之制也封建三王之治也射御三王之禮也學校三王之教也度量以齊衣服以章宫室以等三王之訓也三王市㕓而不稅關譏而不征林麓川澤以時入而不禁用民之力嵗不過三日五十者養於鄉六十者養於國七十者養於學孤寡鰥獨皆有常餼周衰王道息秦并天下遂盡滅三王之道漢革秦之祚已久不能革秦之弊猶襲秦之政而井田卒不用也什一卒不行也射御卒不舉也學校卒不興也度量卒不齊也衣服卒不用也宫室卒不等也市㕓而稅關譏而征林麓川澤不以時而入用民之力無日五十六十七十者不養孤寡鰥獨無常餼三王之道不復非秦之罪也漢之罪也桀滅夏道湯亦受命克承禹烈故夏之民歸於商不見商之政而見禹之政紂滅商道武亦受命克承湯烈故商之民歸於周不見周之政而見湯之政秦滅周道漢亦受命不襲周之政而沿秦之弊立漢之政故秦之民歸於漢見漢之政而不見周之政蓋以漢之禮樂易三王之禮樂也以漢之制度易三王之制度也以漢之爵賞易三王之爵賞也以漢之法律易三王之法律也以漢之政令易三王之政令也噫漢順天應人以仁易暴以治易亂三王之舉也其始何如此其盛哉其終何如此其卑哉三王大中之道置而不行區區襲秦之餘立漢之法可惜矣漢論中或曰漢改三王之道作之者其誰歟曰曹參陸賈叔孫通之罪也漢高祖以干戈而定天下陸賈曰陛下馬上得之不可馬上治之於是使賈著秦所以得天下及古今成敗之國賈凡著十二篇每奏一篇帝輒稱善高祖已平天下羣臣飲酒爭功或妄呼拔劍擊柱上患之叔孫通乃與弟子百餘人雜採古禮與秦儀以為漢儀帝用之曰今日知為皇帝之貴也漢高祖豁達大度聰明神聖溫恭濬哲英威睿武其資才固不下乎湯禹與文武道之使為帝則帝矣使為王則王矣方平定禍亂思為漢家改正朔定禮樂立制度明文章施道德張教化一風俗興太平以垂於千萬世賈若能遠舉皇帝之道致於人君施於國家布於天下通若能純用三王之禮於朝廷通於政教格於後世以髙皇之材而不能行之乎乃齪齪進夫當時之近務王霸之猥略貴乎易行孜孜舉夫近古之野禮亡秦之雜儀求夫疾效使高祖上視湯武有慙德漢家比蹤三王為不侔可惜也哉初蕭何為相天下未甚乂而何死曹參代之參以為蕭為之規當守之勿失日飲醇酒寬縱不治事雖復惠帝求治參不能竭才輔之直以髙祖之初定禍亂蕭何之草創律令民僅出塗炭為已太平國僅立法式為已大備當其高祖之既平禍亂蕭何之既定律令惠帝之方求治參能竭伊尹致君如堯舜之心周公輔成王致太平之道以事惠帝制度之未備者備之教化之未格者格之文章之未備者備之禮律之未明者明之刑政之未和者和之盡循三王之道而行之賈與通既施之於前參復行之於後漢豈有不及三王之治者乎故曰陸賈叔孫通曹參之罪也漢論下或曰時有澆淳道有升降當漢之時固不同三代之時也盡行三王之道可乎曰時有澆淳非謂後之時不淳於昔之時也道有升降非謂今之道皆降於古之道也夫時在治亂道在聖人非謂有先後耳桀紂興則民性暴湯武興則民性亦善湯之時固在桀之後武之時固在紂之後耳而湯武之時豈有不淳於桀紂之時其道降是亦已降乎其民亦已難教乎時治則淳時亂則澆非時有澆淳也聖人存則道從而隆聖人亡則道從而降非道有升降也民厭周久矣苦秦甚矣秦之政檻穽也民得出檻穽也唯使之從三王之政非如檻穽之深閉可畏也既得出檻穽而得適非檻穽人皆樂然從之也况使從三王大中之道躋於泰然安樂乎當高祖提秦之民於千萬丈不測深淵中置之於平地若示之以三王之政革之以三王之化鼓之以三王之號令明之以三王之律度民有不肯從之乃曰不如在千萬丈不測深淵中之樂耶吾未之信也當乎天下初定也民未有富兼地民未有強凌弱民未有衆吞寡民未有大并小因定之經界因為之井田民有爭乎國未有巡行之費國未有兵衆之動國未有土木之耗因為之什一之法因立之中正之道國闕用乎封建以域之射鄉以仁之庠序以教之養老以厚之秦之民不為漢之民為三王之民也民不見漢之政見三王之政也伊尹俾其君不及堯舜其心愧耻若撻於市湯去堯舜數百年矣而又承桀之大亂其時固亦澆漓矣且能以堯舜之道事其君使其君如堯舜曹參陸賈叔孫通乃獨不能以三王之道事於漢使漢不及三王誠可罪也或曰漢之輔政前有蕭何張良中有平勃後有霍光魏相公孫博陽侯韋賢父子而獨責於賈與通暨曹相國不亦偏乎曰易之革曰天地革而四時成湯武革命順乎天而應乎人君子以治厯明時鼎曰君子以正位凝命當高祖定天下乃革去故鼎取新之日也曹參陸賈叔孫通正當君子以治厯明時正位凝命之際也會其時乘其際不能創制度明律令以垂萬世法適當其罪也至於後世法令已定矣條章已著矣制度已行矣朝廷循之已成熟矣百姓信之已慣習矣而遽更之得無亂乎富者已連田兼地矣強已凌弱矣衆已吞寡矣大已并小矣而遽正之以經界居之以井田民肯從乎後嗣奢縱日作土木不息內畜嬪侍外耽畋遊殫天下之財疲天下之力猶供億不足而遽行中正之道取什一之賦罷關市開山澤國其不乏乎故眺錯請削地而被誅仲舒請限民田而不用霍光魏相公孫韋賢博陽侯雖有其才豈復能為漢家革制度乎適不當其時也故吾罪曹參陸賈叔孫通也季札論夫饉一身以存萬代君臣上下之分者夷齊也墟一國以存萬代父子兄弟之親者季札也噫夷齊非苟義也札非苟讓也以夷齊之明且智豈不知紂之不仁塗炭天下武王順乎天而應乎人以至仁而伐至不仁拯民塗炭中至於安樂泰然也蓋以謂堯禪舜舜禪禹禹傳子天下之大公也而舜賢也禹賢也啓賢也堯舜之禪讓禹之傳嗣皆與賢也可以法湯伐桀武伐紂雖天下之大義而桀紂君也湯武臣也以臣伐其君不可以訓堯舜禹皆傳乎賢而湯始以兵伐桀湯既以兵伐桀而自為君武王又以臣伐紂而自為君且大懼後世不知有堯舜禹之以大公之命而傳乎賢但知湯武之以大義伐桀紂而將有假大義之名戕賊篡弒其君者故諫於馬前死於首陽噫夷齊非苟義也存萬代君臣上下之分也以季札之明且智豈不知吳國以季子則存以諸樊則亡豈不知能保其先人之國則為孝覆絶其先人之祀則為不孝蓋以謂父與子天下之大親也兄與弟天下之大倫也周室既衰王政絶矣天子爭立諸侯篡奪弟殺其兄子弒其父無國無之且大懼後世不知有父子之親兄弟之愛皆以謂子得以篡其父弟得以奪其兄則親愛滅矣故託以子臧讓於諸樊噫季札非苟讓也存萬世父子兄弟之親也且非夷齊則後世殺君接踵矣非季札則後世弒父繼踵矣獨孤及作季札論云云者豈知季札之所存也吁及徒知廢先君之命非孝滅其國不仁獨不知奉先君以為孝孝之末也全一國以為仁仁之小也與其奉先君已沒之命孰若存先王大中之教與其全一國將墜之緒孰若救萬世篡弒之禍嗚呼季札之意遠哉及豈知之也故孔子稱伯夷叔齊曰古之賢人也謂季札曰吳之習禮者也伊呂論人之稱曰伊呂以其道相近心相一功相同也余以謂伊呂之功則同其道其心則有異者其君無道其國必亡在畎畝之中不以其君無道而遂忘其君不以其將必亡而遂棄其國五往就之見其君進其説欲其君之克念其國之不亡禹未泯祀伊尹之心也其君無道其國將必亡遂棄其國不往就見其君進其説晏安坐於磻溪之中忍其君不道俟其國將亡者呂望之心也然伊尹卒不得見聼桀卒不悔知善夏卒不能復存終歸於湯而放桀滅夏先就其君而君不從不忍其民之塗炭然後歸湯得君子去就之道矣向若桀能納伊尹之謀克念作聖夏之祀未殄矣望之心曷嘗及於此乎君暴虐於上民塗炭於下國之祀日且墜矣不一起往説其君救其民存其國祀直以歸於文王佐武伐紂滅商不一就見其君進其説安知其君之不受其説之不行直棄絶之望之心不如伊尹之心望之道不若伊尹之道萬分之一有悔亂改過之心以望為太公黜其政而從於善湯之社未遷矣惜乎望之不一往也周公論或問曰周公相成王制禮作樂一飯三吐哺一沐三握髮起以待士何汲汲也如此沐與飯且不暇舜相堯禹相舜益相禹伊尹相湯傅説相高宗皆不如周公之勤且勞也豈周公之德不及禹舜益伊尹傅説乎曰周公不得不然也堯聖人也舜聖人也高宗聖人也舜禹益伊尹傅説勤且勞復何為哉周公則不得不然也成王孺子也方在襁褓之中知成王果聖人耶且后稷公劉古公王季文王武王積千年以得天下武王死成王幼弱武王以后稷公劉古公王季文王之天下及成王以託周公周公受武王之託負天下之重苟成王不似墜覆其業則是后稷公劉古公王季文王武王之天下周公失之也周公豈得不勤且勞乎又何暇乎沐且飯也周公者皆然舜禹益與伊尹傅説所相君所逄時異也孰謂周公之德不及耶噫余觀周公相成王之心至矣成王嘗刻桐葉以為圭戲以賜唐叔周公即入賀成王曰戲也周公曰天子無戲言遂以國封唐叔周公相成王之心也至矣成王為戲言以國封人成王復敢戲乎戲且不敢敢荒寧乎敢逸豫乎敢侮慢乎敢惑亂不道乎敢驕淫無禮乎周公相成王之心也至矣唐柳宗元以謂唐叔小弱弟不當封周公成其不中之戲以地以人與小弱者為之主其得為聖乎不達周公之心也已是非辨天子將舉人而任之問於宰相一人是之一人非之宰相將推人而舉之問於百官一人是之一人非之則將誰質曰質於其言之賢者賢者是非公也小人不黨則謗矣曰問於朝廷問於天下朝廷非之天下是之朝廷是之天下非之則將誰質曰質於天下天下是非公也朝廷不讎則嫉矣去黨與謗棄讎暨嫉人皆能是是非非也存黨與謗懷讎暨嫉未可與言是非矣嗚呼余觀能是是非非推於天下而人不以為私更乎萬世而人不可以易古獨有三人堯也舜也孔子也堯舜知朱均之不肖而不與其子知舜禹之賢而以天下讓是非著矣孔子為春秋是非二百四十二年當時無一人妄受其惡無一人謬享其善是非當矣次則孟軻韓愈也孟軻是湯武非桀紂韓愈是周孔非佛老是非判矣自堯舜至於今凡幾千百年有此五人是非之難也如此凡人愛憎以情善惡由已千載朽骨九泉腐肉猶以好惡升黜於秃毫枯竹間况與之比肩而事主接武而趨朝乎則知人無堯舜孔子孟軻韓愈之心皆不可與言是非矣吁今亦有以一飯厚薄而為愛且憎者劉工部在南京有士自不修劉不禮之退而怨且怒逄人罵劉語不休孔大諫在兖州有人不得善遇退而怨且怒到處謗孔辭甚醜然二子者是亦不為顯非亦不為辱何懼哉余懼冕旒之前軒陛之下有以姦為賢有以賢為姦有以佞為忠有以忠為佞有以詐為直有以直為詐有以邪為正有以正為邪亂吾君之聽衒吾君之目惑吾君之心者以賢為姦則龍逄見誅矣以忠為佞則比干見殺矣以直為詐則周公見疑矣以正為邪則屈原見疏矣以姦為賢則飛亷見進矣以佞為忠則靳尚見信矣以詐為直則趙高見任矣以邪為正則王莾見用矣如是豈不亂天下乎豈不危社稷乎余是懼故作是非辨辨謗介讀青州劉概韓吏部傳論曰憲宗迎佛骨羣臣無敢言者獨吏部論之走南荒八千里此豈利於身利於道也介於此知吏部之功也潮陽之湫鱷魚為害潮人患之吏部至投文以逐之一夕盡去鱷魚厥性暴戾無識猶感其化而去焉使吏部立巖廊輔元首施其道而化天下之暴戾無識復有如鱷魚者乎必無也鱷魚可化况於人乎介於此知吏部之道也曰使史臣謂排釋老於道未大不知大其道者復何也介於此知吏部之尊也曰諱辨其旨不獨為賀也有激於時爾凡人怠於敦孝而亟於避諱甚無取也介於此知吏部之孝也曰鯀無德於民猶有靈於晉國宗元有德於民豈無靈於羅池者乎吏部碑之何所不可介於此知吏部之是也曰平蔡碑非不善也信一婦人而磨之焉知實録不類蔡碑介於此知吏部之受誣也則是吏部之誣由概而後釋吏部之道由概而後明概亦可稱為端直士矣天聖四年秋詔郡國舉進士時故諫議大夫滕公涉守青州謂概能明吏部之道特為首送概少則為古文專意聖人之道性僻野以介特自守常居深山中或逾年一下山未嘗一造權豪門先兩為青州舉送以是名字不得高至是首送青人皆大怒滕之所為以滕不知人或謂概有化丹砂為黃金術滕意得之特為首送或以為概恃當塗力故得首送滕於是被此謗噫八九年矣介昨日架上整亂書得概韓吏部傳論讀之知吏部之大道知概之名不虛得知滕之被謗噫吏部之道二三百年得劉概伸之劉概之名二三十年得滕公發之滕公之謗八九年得石介明之故作辨謗云辨惑吾謂天地間必然無者有三無神仙無黃金術無佛然此三者舉世人皆惑之以為必有故甘心樂死而求之然吾以為必無者吾有以知之大凡窮天下而奉之者一人也莫崇於一人莫貴於一人無求不得其欲無取不得其志天地兩間苟所有者惟不索焉索之莫不獲也秦始皇之求為仙漢武帝之求為黃金蕭武帝之求為佛勤已至矣而秦始皇帝遠遊死蕭武帝餓死漢武帝鑄黃金不成推是而言吾知必無神仙也必無佛也必無黃金術也辨私儒者好稱説孔子之道非大言也非私於其師之道也孔子之道治人之道也一日無之天下必亂如粟米不可一日少少則人飢如布帛不可一日乏乏則人凍死孔子之道君臣也父子也夫婦也朋友也長幼也天下不可一日無君臣不可一日無父子不可一日無夫婦不可一日無朋友不可一日無長幼萬世可以常行一日不可廢者孔子之道也離孔子之道而言之其道雖美不致於遠其言雖切無補於用猶錦繡不可以待寒珠玉不可以療飢故儒者稱説不及焉非遺之也辨易王績為負苓者傳載薛收之言曰伏羲畫八卦而文王繫之不逮省文矣以為文病也負苓者曰文王焉病伏羲氏病甚者也昔者伏羲氏之未畫八卦也三才其不立乎四序其不行乎百物其不生乎萬象其不森乎以謂伏羲氏泄道之密漏神之機為始兆亂者吁可怪也夫易之作救亂而作也聖人不得已也亂有深淺故文有繁省亂萌於伏羲故八卦已矣漸於文王故六十四已矣極於夫子故極其辭而後能止伏羲後有神農氏黃帝氏少昊氏顓頊氏高辛氏唐堯氏虞舜氏禹湯皆聖人也豈獨不能繫易之一辭無亂以救也文王豈獨能過是九聖人亂不可不救也作易非以為巧救亂也文王夫子非以衒辭明易也易不作天下至今亂不止文王夫子無述易至今不明薛收苓者不達易甚矣朋友解薑潛至之被水害苦甚奉符李溫仲淵與至之友且通家義甚厚憐至之之困災為借弓手營救因以私役人罪之察盜賊捍水火縣尉之職也溫得其職又得朋友之義患難相恤及得罪大懼朋友之道絶因解之夫父子兄弟以親愛君師朋友以義合也入則事父兄出則事君師朋友君臣之際猶有爵祿之貪得其利焉師友之分非道義不合夫所謂道者親而不可離者也夫所謂義者合而不可解者也古之管仲鮑叔王陽貢禹以義始而以義終者也張儀蘇秦陳餘張耳以利始而以利終者也義無不克終利無有克終今夫人之趨權利熱則蜂來寒則鳥去平生握手把酒敘歡欣肝膽吐在地一旦急難危患則掉臂急趨而過之若越人視秦人之疾不獨不一顧又從排陷之朋友之道薄也如此有人反其薄而就於厚則以為罪今奉符縣尉李溫與進士薑潛同師受業有升堂拜母之義潛居奉符之太平鎮今嵗夏六月七日一夜水大至太平之人死者五人其一則權酒使臣張借職也在太平參肆伯家潛被水尤苦夜風雨震電天大黑水且暴來潛左手扶老母右手扶嬰兒妻子弟妹纍纍隨其後出沒於水中僅得脫死走太平四里餘就高阜以避潛之居廬邸店并其所以待嵗時佐伏臘之用凡百萬與所藏書數千卷盡為水害溫與潛友義甚厚潛之患難不細溫豈不足為有勢力可以庇潛之居而操夲縣尉權略足以施於潛尚更退顧其身愛惜礙國禁苟逃錙銖罪不為潛致毫髮力忍晏然坐視此誠禽獸之所不肻為也東家火西家焦髮爛額為撲滅赤子入井路人下乘弛擔匍匐走救之潛之水甚於東家火也潛之將至於死猶赤子之入井也溫少被仲兄故龍圗之教長師泰山孫明復先生及親慕王建中而交石介識周公孔子之道知仁義忠信且與潛友厚反顧身愛惜乃不如禽獸之心乎不如西家路人乎以古朋友之道責之溫猶負大罪潛之窮且困如此才能借九日力遺一囊麵未足以解潛昏墊之災然以今人推之溫能不退顧其身愛惜其官抵冒刑禁以濟夫朋友危患是亦能以義始終者也故舊不遺者也患難相恤者也法網凝密乃籠溫去繩之以微文置之於深典此不惟傷朋友之道亦以害國家教化之夲國家夲設禁所以禁小人非施之於君子也小人大為之禁亦或踰之君子則有禮樂而已矣使溫徇國家之常禁則廢朋友之大義禁者權也權有時而用制小人不以權則壞法亂民為害必滋義者常也常者道之中也中常用待君子不以中是示天下之無君子矣溫為君子而以小人制之豈其宜溫亦不足深惜夫朋友之道遂絶矣天下風俗更薄矣噫州縣吏貪墨殘毒者滿目曽不聞舉一人溫奉公守法溫持亷溫愛民溫有文行溫有節義溫孝於事親溫忠於事上溫信於朋友反得罪悲夫書淮西碑文後淮西之賊五十年王師屢戰無功天啓神算以授裴度度克恭行天罰以夷大叛天下之兵百十萬之將過時不下度建大謀以任李訴訴克先登賊城以殱元凶淮西以平蔡人以生天人相與乎君臣協心乎上下同力乎推其用則度得天也訴得人也計其功則度任智也訴任力也曰燥者曰潤者人止知其風雨也曰生者曰成者人止知其春秋也然不動而運其用者天也曰戰者曰勝者人止知其訴也光顔也重胤也然無為而任其謀者度也漢高帝取天下蕭何無汗馬之勞韓信攻必取戰必勝曹參身被七十創而至於論功則曰發蹤指示者人也追殺獸者狗也度與訴之功亦猶是乎文公豈昧此者著辭於碑優度功誰曰不實也初度輔政以羣賊未除宜延接竒士共為籌畫乃請於私第接延賔客自是天下賢俊得以效計議於丞相則取蔡之謀已落於彀中矣諸將連年出兵玩寇相視持以嵗月未有成功而羣臣皆欲罷兵度獨唱堅議與上協心計定意斷衆不能破請身自督戰且曰誓不與此賊偕全則得勝之算已運於掌上矣及至郾城巡撫諸軍宣達上旨士皆賈勇時諸道兵皆有中使監之軍陳進退不由主帥勝則先使獻捷偶衄則凌挫百端度至行營並奏去之兵柄專制之於主將衆皆喜悅軍法嚴肅號令畫一則將軍之令專行於閫外矣以天下取蔡之謀堂上得勝之算閫外將軍之令合而用之一而行之易曰師貞丈人吉有不利乎七月度出十月賊平成天下之務通天下之志不疾而速不怒而威非惟幾惟深與神其孰能與於此乎故曰度得天也其功無敵於天下矣録蠧書魚辭蠧書魚曰吾常遊於文字間文字有所殘缺者人則曰吾蠧之故目豫曰蠧書魚夫書豈吾蠧之耶昔者孔子修春秋帝皇之道取三代之政述之為經則謂之書其文要而簡其道正而一所以扶世而佑民示萬世常行不易之道也後世人有悖之者則其書或息其書息則聖人之道隳壞也斯得不謂之蠧乎文中子曰九師興而易道微三傳作而春秋散齊韓毛鄭詩之末也大戴小戴禮之衰也又楊墨之言出而孔子之道塞佛老之教行而堯舜之道潛斯則易其九師之蠧乎春秋其三傳之蠧乎詩其齊韓毛鄭之蠧乎禮其大戴小戴之蠧乎孔子道其楊墨之蠧乎堯舜道其佛老之蠧乎魏晉以降迄於今又有聲律對偶之言雕鏤文理刓刻典經淫華相沿巧偽相衒劘削聖人之道離拆六經之旨道日以刻削而不修六經之旨日以解散而不合斯文其蠧也書之蠧有自來矣而謂豫曰蠧書魚豫敢辭擊蛇笏銘并序天地至大有邪氣干於其間為凶暴為殘賊聼其肆行如天地卵育之而莫禦也人生最靈或異類出於其表為妖怪信其異端如人蔽覆之而莫露也祥符年寧州天慶觀有蛇妖極怪異郡刺史日兩至於其庭朝焉人以為龍舉州人內外遠近罔不駿奔於門以覲恭莊肅祗無敢怠者今龍圗侍御孔公時佐幕在是邦亦隨郡刺史於其庭公曰明則有禮樂幽則有鬼神是蛇不以誣乎惑吾民亂吾俗殺無赦以手版擊其首遂斃於前則蛇無異焉郡刺史暨州內外遠近庶民昭然若發蒙見青天覩白日故不能肆其凶殘而成其妖惑易曰是故知鬼神之情狀公之謂乎夫天地間有純剛至正之氣或鍾於物或鍾於人人有死物有盡此氣不滅烈烈然彌亘億萬世而長在在堯時為指佞草在魯為孔子誅少正卯刃在齊在晉為董史筆在漢武朝為東方朔戟在成帝朝為朱雲劍在東漢為張綱輪在唐為韓愈論佛骨表逐鱷魚文為假太尉擊朱泚笏今為公擊蛇笏故佞人去堯德聰少正卯戮孔法舉罪趙盾晉人懼辟崔子齊刑明距董偃折張禹劾梁兾漢室乂佛老微聖德行鱷魚徙潮患息朱泚傷唐朝振怪蛇死妖氣散噫天地鍾純剛至正之氣在公之笏豈徒斃一蛇而已軒陛之下有罔上欺民先意順旨者曰公以此笏指之廟堂之上有蔽賢蒙惡違法亂紀者曰公以此笏麾之朝廷之內有諛容佞色附邪背正者以此笏擊之夫如是則軒陛之下不仁者去廟堂之上無姦臣朝廷之內無佞人則笏之功也豈止在一蛇公以笏為任笏得公而用公方為朝廷正人笏方為公之良器敢稱德於公作笏銘曰至正之氣天地則有笏惟靈物笏乃能受笏之為物純剛正直公惟正人公乃能得笏之在公能破淫妖公之在朝讒人乃消靈氣未竭斯笏不折正道未亡斯笏不藏惟公寶之烈烈其光宋文選卷十五
