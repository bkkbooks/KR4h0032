body:
  text: 宋文選卷二十三唐子西文憫俗論自古諸侯風俗大小曷嘗不與其國相稱齊地負海膏壤二千里則其俗闊達寬緩而多智全晉未分時在春秋世最為强國則其俗用意深逺有古帝王之遺風鄒魯居洙泗之間迫于齊楚國小而地狹則其俗亦復齷齪而謹畏今天下大矣堯舜三代之地蓋不至於此民生其間耳之所聞目之所睹體之所安者壯矣而風俗之大不足以稱之有是理否風俗非一事要以人材為本今士大夫達時變識事情警敏有餘矣至於學治道通大體氣力度量足以支久而任重者未可多得是豈無有也有而不容於時今之建言者類皆薄物細故非天下所以治亂安危而士之所言亦不過趣一切辦治而已非能有益於宗廟社稷也學術小故無大論議力量狹故無大功名以為上世悉然則前此風俗嘗廣矣當是之時唯恐其疏爾形勢非有不同年表日厯非甚相逺而更病其隘是必有說矣吾聞江海之水必有吞舟之魚通都大邑必有千金之家以四方萬里之國而非得恢廓宏逺之風以充之是猶衣九尺之衣束十圍之帶髙視闊步而血氣不逾中人也可乎建武永平之治未必優于西京而風俗不及者正以其小也傳曰不知其形視其影也今百工之所造商賈之所鬻士女之所服者日益狹陋而一時人物大率悍而短小此非其影耶古之化俗惡者可使為善邪者可使為正今俗非有他也獨患小爾顧不可使知大乎名治論古者一代之興則有一代之治故曰夏后氏尚忠商人尚質周人尚文雖聖人之道不可以名言而施之政事必有稱號可指非但王者如此而一國之治亦然故曰周公治魯尚齒而親親太公治齊尚賢而尊尊自是以來漢唐之臣議論之士亦云以道勝寬和為本今周宋之為政久矣其所尚者何也士之通經術知古誼者不為不衆日夜講究治道以遊于世者亦不為不熟其所稱引動以宗周為言而問以當代治體則茫然不知所以名之惟其無得于此是以有慕于彼愚誠不自揆蓋嘗妄論之矣屨不必同要之適足治不必同要之適時故成周之治任人而國朝之治任法任人者非不用法也以人為本而輔之以法任法者非不用人也以法為本而行之以人自古法無全是亦無全非而人忠佞智愚賢不肖至為遼絶故任法之世無甚利亦無甚害而任人之世非大治則大亂矣周時公卿不過數族周召毛原執政至數百載不絶今之大臣更出迭入逺者十餘年極矣近者期而已雖無纍世輔弼之利亦無妨賢專恣之害矣周之諸侯既錫以土宇則刑賞生殺之柄悉舉以委之今郡縣之權不過鞭撲爾過此以往則相顧而議法矣雖無藩屏形勢之利亦無戰爭侵奪之害矣周官任官必考論人物謂之量才度德今不然矣以資歷為髙下以注籍為先後揭闕于道應法者得之雖無為官擇人之利亦無好惡狥私之害矣周時取士使之自相推擇謂之鄉舉里選今又異於此矣蓋自國初以來三易取士之法然要之不離文字糊名易書暗考而名取之雖無出長入治之利亦無毁譽比周之害矣其大略如此故周之極熾者刑措不用四十餘年典章文物之盛信有以絶人而晚節禍敗亦足以稱此國家受命百五六十年間海內晏然如一日者此任人任法之效也昔者李績無大勝亦無大敗薛萬徹非大勝即大敗而近世論將未嘗不以英衛為先然則今之所得多于成周亦明矣而士方歉然不足爭說人主以成康之隆而不知國朝規摹處置所以成就天下之勢者固已如此非獨不知國朝亦復不知成周矣何則人有情而法無心情之所在恩怨以之其無心者漠然而已今者欲成康乎則必脫略文法而一切任人夫以天下之大利而索之於繩墨之內是猶以李績之節制而求之萬徹之竒勝終不可冀然與其蹈萬徹之險孰若李績之持重足任哉辨同論道至於聖人極矣豈容復有異乎然禹之措置如此湯之措置則如此文武周公之措置則又如此使數人者比肩而事主交臂而共政則論事之際吾意其必有同異者矣寧能盡合乎是猶有辭焉曰時不同也若諸子之論性豈復繫於時哉而孟子之說如此荀子揚子之說則如此韓子之說則又如此使數人者比肩而事主交臂而共政則論事之際吾意其必有同異者矣寧能盡合乎是亦有解焉曰師友不同也若子夏子游曾子子張之徒則又將安所諉哉皆出於周末不可謂之異時皆受道於洙泗之間不得謂之異師請業請益周旋出處奔走憂患蓋無適而不同者此數十年不得謂之異友而論文論學如黑白之相反方圓水火之不相及也此復何哉說者以為孔子沒學者無所統一使夫子在學者宜不至此然吾聞夫子行年六十而六十化始之所是卒而非之曰言豈一端而已夫各有所當也此一人爾而有所謂昔日之言者有所謂今日之言者而况於衆口乎是以先王知羣言之不可一也因使人人極其說而不以同異為誅賞公卿大夫之出於斯時者亦人人各薦其所聞而不以同異為喜愠何者閨門之內父子兄弟相與言而有可有不可筮人市筮卜師引龜而參之一從一不從故曰物之不齊物之情也寧可罪哉今為申商之學者則不然以謂同心同德者周人所以興離心離德者商人所以忘刑賞生殺足以整齊天下而不能塞異議之口則非所以一道德而同風俗憶古之所謂同心同德者果謂此邪吾不忍聞是說也周公之時朝廷之士為不少矣而東征之議書稱十夫豫翼則同者寡而不同者衆矣豈皆小人耶豈皆誅之耶夫以周公之權而十人者助之其勢足以銖鋤羣臣之異已者為有餘矣鼻息天下其孰敢違然近於人情通於物理忠于王室而推至公於天下者終不肯為此何則駕馭羣臣正恐其雷同耳奴婢同則家道危臣下同則人主孤人主孤則天下之禍可勝諱哉古之人所以貴和而賤同者慮此察言論古之人臣抵掌緩頰說人主以用兵者其言未嘗不引義慷慨豪健俊偉使聽者踊躍激發奮然而從之至考論其心則有為國計者有為身謀者是不可以不察也今夫戰則除害於時不戰則遺患於後此有必勝之勢彼有必敗之道思慮深熟利害之形了然於胸中知其决不誤國而後為之若此者為國計非身謀也張華裴度是已天下既平謀臣宿將以侯就第杜門却掃無所用其竒則瞋目扼腕爭為用兵之說庶幾有以騁其智勇而舒其意氣若此者為身謀非為國計也臧宫馬武是已國家無事貪財嗜利之臣無所僥幸則必鼓倡兵端以求其所欲兵革一動則金錢貨幣玉帛子女何求而不得若此者為身謀非國計也陳湯甘延夀是已官崇祿厚無所羡慕惴惴然唯恐一日失勢而不保其所有則必建開邉之議以中人主之欲以久其權若此者為身謀非國計也楊國忠是已前侯故將失職之臣負罪憂畏思有以撼動其君則爭議邉功以希復進若此者為身謀非國計也竇憲是已古之人臣逆節已萌而功效未著人心未服則未嘗不因戰伐之功以收天下之望若此者為身謀非國計也桓溫劉裕是已嗟乎秦漢以來說人主以用兵者多矣或勝或不勝要之為國計者至少為身謀者如此其多途也可不鍳哉可不戒哉存舊論漢時儀注大抵率意制造不應古誼者十至八九其文采法度略矣然而天下之人見即喜不見即悲中更王氏之亂廢棄不用者十餘年光武入洛東都之民始見司𨽻僚屬歡喜踴躍父老或至垂泣曰不圖今日復見漢官威儀自是天下翕然歸之相與出力鋤去新室以成中興之業而復其宗廟社稷蓋又二百餘年雖漢之所以復興者不專在是然亦不可謂無助也且漢官威儀非若三代之盛叔孫所為非有周公之學蕭何智識又雜以秦制非復聖人之法也而遺民見之如盲者復視廢者復起如流浪積嵗而返其故鄉其見父子兄弟感慨之極至於咨嗟流涕其得民心如此此何理也耶方是之時以三代車服示之吾知其民不復泣矣何者漢之為漢十世於此矣知有劉氏而已矣救天下於戰國秦項水火之中而措之於安全逸樂之地百數十年海內無事斯民得以養生得以送死得以事其父母而長育其子孫者漢之力也三代逺矣何有於我哉由是觀之古者帝王之興其正朔服色自為一王法而不慕前朝異姓已陳之迹其用意深矣由是觀之國家舊物宜使斯民常見而熟識之以習其耳目而繫其心自非不得已者不得輕有改易變置以自絶於民也亦灼然矣嚮使今日變其一明日廢其二祖宗餘澤日益就盡不在目前不幸而姦人撼之則人心搖而天下亡矣古者公卿大夫猶知守其家法至數十世不失其衣冠閥閲豈無隆替而國人信服終莫之敢抗謂之名家舊族而况數百年為天下國家者哉禍福論昔人談禍福者固嘗居之善惡矣然其效可睹也其始曰為善者必得福為惡者必得禍取報于天如探左契於是天下之人悚然而畏然為善者果得福乎為惡者果得禍乎是特未可知也言既不效則遷就其說曰為善者未遽有福也要久而後吉為惡者非遽有禍也要久而後凶譬之束薪要得其熟於是天下之人憮然而疑今君子長者子孫苖裔不為少矣而果吉乎蠧民害物專門為惡者古亦衆矣而果亦凶乎是未可知也既又不效則復遷就其說曰為善者得福常多不幸而抵禍者或寡矣為惡大者概得禍幸而免者亦時時有之於是天下之人啞然而笑今所謂常得者果多乎所謂幸不幸者果少乎是未可知也自始至此三易其說而言輒不效則民益解體而矯激之論生焉曰為善者反得禍為惡者反得福自漢以來嘗有是說然蹈道者豈盡得禍乎姦佞險賊不忠不孝者豈盡得福乎其效亦可睹也矣吾意以謂禍福出於天善惡出乎人二者不相為謀如五星散行而有時乎相值人見其適相值也而遂引以為常不可謂合於理矣今世或為善而福或為善而漠然無有禍福其為惡也亦如之不為善不為惡者亦如之要之不可測善乎楊子之言曰修其善者為善人修其惡者為惡人善惡之報惟是為有證易稱積善餘慶詩言自求多福書言福善禍淫孟子言禍福自已求之彼非有失也有為然也正友論庾公之斯以朋友之故廢君命而君子不以為私叩輪去金發虛矢以塞責而君子不以為欺酈况之說其友也其言甚甘而君子不以為險其友為之墯肱隕首覆宗絶祀而君子不以為忍知此二義然後可以言友矣方漢之時吕祿之權為如何其宗族親黨日夜相與思慮計議者為如何國家社稷宗廟之勢為如何而父又却質其急為如何又安得捨所重以全所輕則以計切之也固宜彼子濯孺子之事豈至是哉以區區之鄭固非衛之所以存亡而區區之子濯孺子又非鄭之所以强弱敵去而追之兹又國事之區區者而彎弓于其友則在名義為至重此孟子所謂一鈎金與一輿羽之勢也何得以吕祿比之夫莫重於金莫輕於羽此雖三尺之童足以知之至於輕重之中又有輕重焉則非通孟子者不能權之矣孟子之書世未有通之者故漢魏之臣如蘇章子禁之徒皆以得已之事親誅其友猶復毅然自謂忠于朝廷而世亦莫知其為天下之至惡自是而後一變而相證再變而相告三變而至相誣衊也豈不愈惑哉嗚呼名教之事聖賢談之盡矣患不深考爾君使已誅其友則如之何曰審之禍大則誅之餘者可救而救之可贖而贖之無罪者辨之不可則辭于君要之不可以執戈友為不善則如之何曰審之禍大而誅之其次痛責而力止之不從則去之其小者則忠告之不從則已終不可棄也夫上則善其君下則善其友使君臣朋友之間無不滿焉者豈非人之所欲哉不幸而至于此則古人所以處之者亦有道矣而論者不察以君臣為公指朋友謂之私何其不思之甚歟孔子曰以孝事君則忠曽子曰朋友不信非孝也是相生法也何名為私乎父子兄弟出于天君臣夫婦朋友出于人而父子兄弟夫婦主恩君臣朋友主義則五教之中近于君臣者唯朋友為然故欲知人臣之忠者必于朋友焉觀之寧有賊害其友而能忠於所事者乎是物理之必不然者矣以公心處之何適而非公苟私矣則君臣父子夫婦長幼皆私也寧獨友哉嗟乎教之所自出者三而世闕其一曰師其所以為教者五而抑其一曰友上席侍郎書知府侍郎閣下庚備位學校三載于此在輩流中年齒最為老大詞氣學術最為淺陋教養訓導之方最為踈拙所以未即逐去正賴主人以為重今閣下還朝曉夕擢用為執政為宰相為公為師此誠門下小子之所願聞然孤官小官遽奪所依此其胸中不能無介然者日夜思慮未知所以補報萬一而書生門户無有他技因效其所得於古人者唯閣下裁擇庚初讀書時未習時事意謂古之聖賢例須建立功名其後涉世益深更事益多考論前代經史益見其首尾乃知古人之心本不如此舟遇險則有功燭遇夜則有功藥遇病則有功桔橰遇旱則有功戈弩劒㦸臨衝兜鍪遇戰鬬則有功草木障塞而益有功民不粒食而稷有功天理人倫顛倒失次而契有功夷蠻賊寇干紀亂治而咎繇有功自此以降不可勝舉然皆因時立功非聖賢本意伊陟臣扈巫咸相太戊無他竒功以格上帝乂王家為功巫賢甘盤傅說相祖乙武丁不聞有功以保乂有商為功君陳相成王畢公相康王不自立功以循周公之業為功後世知有功之為功而不知無功之為功其去道已逺兹謂聖賢有心于功名其探聖賢益淺矣天下承平日久綱紀文章纎悉備具無有毫髮未盡未便一部周禮舉行略遍但一姓姬爾竊謂今日之勢正當持循法度不宜復有增廣建置歌呼于吏舍者勿問醉吐草茵者勿逐客至欲有所開說者飲以醇酒勿聽擇士唯取通大體知古誼者用之雖不立功而功在其中矣庚之所得於古人者如此不知其當否也閣下儻以為然歸見何丞相其亦以此說告之愚齊記元符三年洛陽蘇公通守南陽治書室于㕔事之偏名之曰愚齊而屬某為之記某言于公曰愚有等級公將安處也有顔子之愚有髙柴之愚有寧武子之愚楊子以朝錯為愚栁子厚自以為愚顔子之愚老子之所謂盛德者也髙柴之愚中庸之所謂不及者也寧武子之愚則詩人之所謂亦維斯類者也朝錯之愚則語之所謂直者也若夫栁子厚之愚則事載在方册有不可語者文章學術為百代所宗自唐以來論當世大儒則必稱韓栁而自以為愚可乎然正元之黨婦人女子皆知其必敗而栁子獨不寤也謂之不愚可乎是數子者其愚固有等級公將安處也以謂髙柴之愚材不及于道以為寧武子之愚則生非不逢于時以為朝錯之愚則無吳楚之變以為栁子厚之愚則無伾文之事庚將處公以顔子之愚則公豈有意乎公生平嗜書手不釋編既已自得於心矣推其緒餘以教諸子皆能有立其長子大夀更以文學知名於時而公猶以愚自處此真有意於所謂盛德者歟傳曰希顔之人亦顔之徒公何辭焉請以是為記年日月陽唐庚記易庵記客問陶隱居吾欲注周易本草孰先隱居曰易宜先客曰何也隱居曰注易誤猶不至殺人注本草誤則有不得其死者矣世以隱居為知言與吾之說大異蓋六經者致治之本也漢時决疑獄斷國論悉引經術兹豈細故而易言哉本草所以辨物六經所以辨道道者物之所以生物者人之所資以為生一物之誤猶不及其餘道術一誤則無復孑遺矣前世儒臣引經誤國其禍至於伏尸百萬流血千里本草之誤豈至是哉注本草誤其禍疾而小注六經誤則禍遲而大隱居注本草矣故知本草之為難而未嘗注經故不知經為尤難而不可率易如此世以不服藥為中醫此言雖小可以喻大吾用易不審陷難幾死今幸閒廢方且據床熟讀而深思之復書此二本其一以自警其一以寄二子焉卓錫泉記人之精神亦何所不至哉揮戈可以退日摶臂可以隕霜悲泣可以頺城浩嘆可以决石而况于得道者乎諸妄既除表裏皆空一真之外無復餘物則其精神之運又何如哉吾遊羅浮至寶積寺飲泉而甘寺僧曰此卓錫泉也昔梁景泰禪師始居此山其徒以無水難之師笑而不答已而庵成師卓錫于地泉湧數尺自是得井寺中迄今賴之知水者以為甲於嶠南而自梁以來未有紀其事者夫師之為人誠不可得知然吾聞世間萬有皆心想所生而古之學道未有不用定慧得者定則深完慧則流通以深完流通之精神而致吾心想中物如父之使子君之使臣有必得之勢其於此者特未得多也或曰前世之士如李廣利耿恭之徒皆功名進取之人以成敗得喪為心其精神之富不踰常人而喑嗚叱咤飛泉為之湧溢與師無異此何理也曰二人者皆一時貴臣左氏所謂用物精多至於神明方其由於絶域之中感奮激發於萬死一生之時其用意至到無進退二體唯其出於一切之誠而無定慧之素以故得之艱勤非若師之頥指目使既捷而且逸也嗟乎事之不立也我知之矣志意耗於思慮聰明流於視聽則精神所感不行於父子兄弟之間而尚何有於物苟能全吾之神則雖山石之堅水泉之柔雍容談笑之間堅者可使闢柔者可使激而躍之而獨不得於人乎吾是以知天下之善無不可立者年月日記顔魯公祠堂記上元中顔魯公為蓬州長史過新政作離堆記四百餘言書而刻之石壁上字徑三寸雖崩壞剝裂之餘而典刑具在使人見之凛然也元符三年余友强叔來尹是邑始為公作祠堂於其側而求文以為記余謂仁之勝不仁久矣然有時乎不勝而反為所陷焉命也史臣論公晚節偃蹇為姦臣所擠見隕賊手是未必然公孫丞相以仲舒相膠西梁冀以張綱守廣陵李逢吉以韓愈使鎮州而盧杞以公使希烈其用意正相類爾然於數君終不能有所傷而公獨不免於虎口由是觀之士之成敗存亡豈不有命耶而小人軒然自以為得計不以謬乎且吾聞古之尚友者以友天下善士為未足又尚論古之人誦其詩讀其書思見其人而不可得則方且欲招屈子於江濵起士㑹於九原蓋其志所願則超然慕於數千百載之後而况於公乎公之功名事業已絶於人而文學之妙亦不可及因其心畫其所在而祠之此昔人尚友之意也嘗試與强叔登離堆探石堂觀其遺迹而味其平生則公之精神風采猶或可以想見也夫李氏山園記伯陽甫續史記後三百年而老聃伯陽為柱下史後世因以伯陽甫為伯甫則二人為一人矣范武子晉士㑹也而古今人表置士㑹于中上列武子于上中則一人為二人矣豈惟人哉龍目一名益智而益智非龍目龍目出海南山谷間味甘益智出西域味辛而廣雅曰益智龍目也則二物為一物矣枇杷盧橘一也而上林賦曰盧橘夏熟黃甘橙楱枇杷橪柿椁奈厚朴則一物為二物矣夫父祖之事子孫有不及知州里之物耆舊有不遍賭而况述千載之上數千萬里之外者乎亦何能無失耶吾南遷惠州寓居於城南李氏之山南園園髙下數十畝草木華實無所不有而龍目盧橘為特盛吾兄弟甥舅無日不往來逍遙于其下而笑舊說之謬蓋嘗以比伯陽甫之事而為之嘆息因書其事使後世知有是園又知吾嘗遊戲于此又知著述不可以不慎而學諸子百家之言者亦知其有得失而審所取云宋文選卷二十三
